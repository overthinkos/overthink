name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: [self-hosted, overthink]
    steps:
      - uses: actions/checkout@v4

      - name: Build ov
        run: go build -o "$GITHUB_WORKSPACE/bin/ov" .
        working-directory: ov

      - name: Run tests
        run: go test ./...
        working-directory: ov

      - name: Validate configuration
        run: bin/ov validate

      - name: Verify generation
        run: bin/ov generate

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, overthink]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Build ov
        run: go build -o "$GITHUB_WORKSPACE/bin/ov" .
        working-directory: ov

      - name: Stage ov binary for ov-cli layer
        run: mkdir -p layers/ov-cli/bin && cp bin/ov layers/ov-cli/bin/ov

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Prune old images
        run: podman image prune -af --filter "until=168h" || true

      - name: Build and push all images
        run: |
          set -euo pipefail
          targets=$(bin/ov list targets)
          for image in $targets; do
            echo "--- Building $image ---"
            bin/ov build --push --jobs 1 "$image"
            echo "--- Pruning after $image ---"
            podman image prune -af --filter "until=1m" || true
          done

      - name: Prune dangling images
        if: always()
        run: podman image prune -f || true
