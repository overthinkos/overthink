name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: [self-hosted, overthink]
    steps:
      - uses: actions/checkout@v4

      - name: Build ov
        run: go build -o "$GITHUB_WORKSPACE/bin/ov" .
        working-directory: ov

      - name: Run tests
        run: go test ./...
        working-directory: ov

      - name: Validate configuration
        run: bin/ov validate

      - name: Verify generation
        run: bin/ov generate

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, overthink]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Build ov
        run: go build -o "$GITHUB_WORKSPACE/bin/ov" .
        working-directory: ov

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push all images
        run: bin/ov build --push
