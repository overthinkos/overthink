# Build the native `charly` package artifacts (.pkg.tar.zst / .rpm / .deb) and attach
# them to the GitHub release on a v<CalVer> tag push. Each package is built
# through the SAME `charly box pkg` verb + build.yml local_pkg.build_template used
# locally (`task pkg:*`) and by the deploy-time localpkg path — one build
# definition, distro-natively.
#
# Runs on the self-hosted CachyOS runner (labels: self-hosted, overthink) — an
# Arch host carrying the full charly toolchain. So `pac` builds NATIVELY: makepkg as
# the runner's uid 1000 (makepkg refuses root, which is exactly how the rootless
# runner executes jobs), with no archlinux container and no sudo — every PKGBUILD
# `depends=` is already installed on the runner, so `makepkg -sf` resolves them
# without touching pacman. `rpm`/`deb` build distro-natively in the runner's
# rootless nested podman. `workflow_dispatch` runs the build jobs from a branch
# (the release-upload step is tag-guarded), so the build can be exercised without
# minting a tag.
name: release-packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pac:
    runs-on: [self-hosted, overthink]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Build .pkg.tar.zst (native makepkg, uid 1000)
        run: |
          go -C charly build -ldflags "-X main.BuildCalVer=$(bash pkg/arch/calver.sh)" -o ../bin/charly .
          bin/charly box pkg pac
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  rpm-deb:
    runs-on: [self-hosted, overthink]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Build .rpm and .deb
        run: |
          go -C charly build -ldflags "-X main.BuildCalVer=$(bash pkg/arch/calver.sh)" -o ../bin/charly .
          bin/charly box pkg rpm deb
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  # Raw static `charly-linux-<arch>` binaries — the asset the `charly` candy's
  # curl-fallback fetches when composing the layer from a remote @github ref
  # (where bin/charly is a gitignored build artifact absent from the clone).
  # CGO_ENABLED=0 → a fully static binary that runs on any rootfs (incl. the
  # pacstrap/debootstrap bootstrap roots) without a libc dependency. The candy's
  # curl points at `releases/latest/download/`, so it always resolves to the
  # newest release's asset — no per-release URL bump.
  binary:
    runs-on: [self-hosted, overthink]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Build static charly-linux-<arch> binaries
        run: |
          CALVER=$(bash pkg/arch/calver.sh)
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go -C charly build -ldflags "-X main.BuildCalVer=${CALVER}" -o "../charly-linux-${arch}" .
          done
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            charly-linux-amd64
            charly-linux-arm64
