#  SINGLE SOURCE OF TRUTH for the Arch base + builder image pair
#  (`arch` + `arch-builder`). There is exactly ONE copy of these two
#  definitions — they are NOT also in image.yml — so there is no duplication.
#
#  Included by BOTH this repo's overthink.yml (locally) AND the
#  `overthinkos/arch` submodule (remotely, via
#  `include: '@github.com/overthinkos/overthink/arch-base.yml:<tag>'`).
#
#  arch-builder's layer: list uses github references (not plain names) so
#  the SAME file resolves in both contexts: a remotely-included file's plain
#  layer names would resolve against the CONSUMING project's layers/ (which the
#  submodule does not have). With github refs, BOTH main and the submodule
#  fetch these layers from this repo by reference — github references
#  everywhere, one definition.
#
#  Every github ref MUST pin to the SAME tag the submodule pins its other refs
#  to (CollectRemoteRefs rejects one bare ref appearing at two versions).
version: 2026.141.1600
image:
    arch:
        base: docker.io/library/archlinux:latest
        distro:
            - arch
        build:
            - pac
        builder:
            aur: arch-builder
            cargo: arch-builder
            npm: arch-builder
            pixi: arch-builder
        produce:
            - pixi
            - npm
            - cargo
            - aur
    arch-builder:
        base: arch
        layer:
            - '@github.com/overthinkos/overthink/layers/pixi:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/build-toolchain:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/yay:v2026.141.1600'
        produce:
            - pixi
            - npm
            - cargo
            - aur
