#  SINGLE SOURCE OF TRUTH for the main repo's base image stacks — the Arch pair
#  (`arch` + `arch-builder`) and the Fedora stack (`fedora` + `fedora-builder` +
#  `fedora-nonfree`). Combined from the former arch-base.yml + fedora-base.yml in
#  the 2026-05 import-namespace cutover. There is exactly ONE copy of each
#  definition — they are NOT also in box.yml — so there is no duplication.
#
#  Flat-imported by this repo's charly.yml (root namespace) AND by the
#  overthinkos/{arch,fedora,bootc} submodules (which import it under the `charly`
#  namespace — `ov.arch`, `ov.fedora`, `ov.arch-builder`, …). The CachyOS base
#  is NOT here: it is owned by the overthinkos/cachyos submodule and pulled back
#  into this repo's `versa` image via the `cachyos` import namespace.
#
#  Every builder/nonfree layer: list uses github references (not plain names) so
#  the SAME file resolves both locally (root namespace) and remotely (the `charly`
#  namespace in a submodule that has no candy/ of its own). github references
#  everywhere, one definition. The shared builder-layer refs (pixi / nodejs /
#  build-toolchain / yay / rpmfusion) pin to one recent ecosystem tag so a
#  consumer that also references a changed layer (e.g. nodejs) resolves it to a
#  single version: the warn-and-newest-wins resolver is silent only when every
#  reference to a given layer agrees on that layer's own version:.
#
#  version: is the SCHEMA CalVer (bumped by the per-kind-versioning cutover); the
#  builder-layer refs pin to ecosystem tag v2026.144.2044. Run `charly box
#  reconcile` to advance them together when a shared layer moves.
version: 2026.143.844
box:
    arch:
        version: 2026.144.1443
        # quay.io is the official Arch Linux registry mirror (same image content
        # as docker.io/library/archlinux) WITHOUT Docker Hub's aggressive
        # unauthenticated pull-rate limit — which otherwise blocks CI / repeated
        # base rebuilds with "toomanyrequests". Prefer it as the base source.
        # Pinned to a precise date-serial base tag (NO :latest anywhere) so the
        # FROM resolves to a fixed digest — reproducible builds, no surprise
        # upstream drift, cache-stable downstream. Bump to a newer `base-*` tag
        # when refreshing the Arch base; quay's `base-*` tags are immutable.
        base: quay.io/archlinux/archlinux:base-20260525.0.535911
        distro:
            - arch
        build:
            - pac
        builder:
            aur: arch-builder
            cargo: arch-builder
            npm: arch-builder
            pixi: arch-builder
        produce:
            - pixi
            - npm
            - cargo
            - aur
    arch-builder:
        base: arch
        candy:
            - '@github.com/overthinkos/overthink/candy/pixi:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/yay:v2026.159.1413'
        produce:
            - pixi
            - npm
            - cargo
            - aur
    # arch-builder + CUDA toolkit + NVENC SDK headers, so multi-stage builders
    # (pixi/cargo) can compile GPU-encode code — notably pixelflux's nvenc-sys
    # (real NvencEncoder) for the cachyos-gpu GPU streaming desktop. The stock
    # arch-builder has no CUDA, so selkies' build.sh keeps the NVENC stub there
    # (container selkies-desktop is unchanged); pointing a build at this builder
    # flips on real GPU encode. Build-time only.
    cuda-arch-builder:
        base: arch-builder
        # @github-qualified (like arch-builder's own layers) so this builder
        # resolves when pulled CROSS-REPO — e.g. image/cachyos's selkies-*-nvidia
        # images set builder.pixi: ov.cuda-arch-builder, which builds this image as
        # an intermediate in the consumer's graph; a bare `cuda` would be an
        # "unknown layer" there (it's a main-repo layer, not the consumer's).
        candy:
            - '@github.com/overthinkos/overthink/candy/cuda:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/nvenc-headers:v2026.159.1413'
        produce:
            - pixi
            - npm
            - cargo
            - aur
    fedora:
        version: 2026.144.1443
        base: quay.io/fedora/fedora:43
        distro:
            - fedora:43
            - fedora
        builder:
            cargo: fedora-builder
            npm: fedora-builder
            pixi: fedora-builder
        produce:
            - pixi
            - npm
            - cargo
    fedora-builder:
        # base: fedora-nonfree (NOT plain fedora) so the RPM Fusion repos land in
        # the BASE chain — guaranteeing they are enabled before build-toolchain's
        # dnf install of the nonfree codec devel libs (ffmpeg-devel / x264-devel /
        # libva-devel), independent of intra-image layer ordering. GlobalLayerOrder
        # is popularity-based and, in a submodule that mixes arch-builder +
        # fedora-builder consumers, can otherwise rank build-toolchain ahead of a
        # same-image rpmfusion layer, breaking the builder. Putting rpmfusion in
        # the base removes that ordering dependency entirely.
        base: fedora-nonfree
        candy:
            - '@github.com/overthinkos/overthink/candy/pixi:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.159.1413'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.159.1413'
        produce:
            - pixi
            - npm
            - cargo
    fedora-nonfree:
        base: fedora
        # Explicit builder map: fedora-nonfree is a base consumers compile on
        # (e.g. fedora-coder), and builder maps do NOT propagate transitively
        # through the base chain — nor across an import-namespace boundary. In
        # the main repo this is redundant with defaults.builder, but a submodule
        # importing this as ov.fedora-nonfree declares no defaults.builder, so
        # consumers there inherit their builders from this map (qualified as
        # ov.fedora-builder at the consumer site).
        builder:
            cargo: fedora-builder
            npm: fedora-builder
            pixi: fedora-builder
        candy:
            - '@github.com/overthinkos/overthink/candy/rpmfusion:v2026.159.1413'
