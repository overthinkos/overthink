    composition-app:
        base: fedora
        candy:
            - sshd
            - charly
            - eval-composition-layer
    # composition self-test SOURCE — a stable in-main image whose two
    # image-scope eval probes are consumed (read, filtered, re-run on the
    # selftest target pods) by the eval.yml `composition-import-selftest`
    # recipe's `from:` expander. Replaces the relocated `fedora-coder`. The
    # keep probe (`composition-source-charly`) tests `charly` presence, which passes on
    # both the `selftest-image` and `composition-app` target pods (both ship the
    # `charly` layer) AND on this image itself; `composition-source-marker` exists
    # only to exercise the `exclude:` filter (it is never imported/run).
    composition-source:
        base: fedora
        candy:
            - charly
        eval:
            - command: test -x /usr/bin/charly
              id: composition-source-charly
              exit_status: 0
            - command: test -d /etc
              id: composition-source-marker
              exit_status: 0
    # =================================================================
    # eval-pod — combined fast R10 mechanism fixture (fedora-minimal:43).
    # Two layers cover four pipeline mechanisms in one disposable bed:
    # kind:image build (markers), kind:layer composition order
    # (eval-stack-layer asserts eval-base-layer's marker survived),
    # kind:pod runtime (nc on :18794 + supervisord), and DeployTarget
    # rendering (supervisord sleep service). Together with the eval-local
    # kind:local template it smoke-tests every container-side kind path
    # end-to-end via `charly eval run eval-pod`.
    # =================================================================
    eval-pod:
        base: quay.io/fedora/fedora-minimal:43
        distro:
            - fedora:43
            - fedora
        produce: []
        description:
            feature: Combined fast eval fixture — image/layer/pod/DeployTarget mechanism smoke
            narrative: Two-layer fedora-minimal image backing the eval-pod kind:eval bed (`charly eval run eval-pod`) — covers kind:image build, kind:layer composition order, kind:pod runtime (nc :18794 + supervisord), and DeployTarget rendering (supervisord sleep).
            tag:
                - working
        candy:
            - eval-base-layer
            - eval-stack-layer
        port:
            - 18794:18794
    # Minimal Arch pod backing the eval-vscode-pod bed — the disposable R10 for the
    # vscode layer's Arch direct-download install path (version-pin cutover). The
    # `supervisord` layer keeps the pod alive for eval-live; the vscode layer's baked
    # build-scope eval (code exists + `code --version`) runs at image + live scope.
    vscode-test:
        base: arch
        candy:
            - eval-keepalive
            - vscode
        description:
            feature: Arch vscode install smoke (direct-download path) — backs the eval-vscode-pod bed
            tag:
                - working
    android-emulator:
        base: selkies.selkies-labwc
        platform:
            - linux/amd64
        candy:
            - nodejs
            - java-openjdk
            - android-sdk
            - appium-server
            - android-emulator-layer
        port:
            - "3000:3000"
            - "4723:4723"
            - "5037:5037"
            - "2222:2222"
            # Inherited from the selkies-desktop layer chain — chrome-cdp
            # publishes 9222 (Chrome DevTools Protocol) and chrome-devtools-mcp
            # publishes 9224 (Streamable HTTP MCP). The mcp-provides OCI label
            # baked into selkies-desktop expects these ports published; declare
            # them here so inherited eval probes resolve correctly.
            - "9222:9222"
            - "9224:9224"
        env:
            - EMULATOR_NAME=ov_avd_36
            - EMULATOR_API_LEVEL=36
            - EMULATOR_DEVICE=pixel_9a
        description:
            feature: |
                Android 16 (API 36, Google Play x86_64) emulator on pixel_9a on top
                of the selkies-desktop streaming chain. The google_apis_playstore
                image ships Play Store + Google Play services (GMS) + Google Chrome
                PREINSTALLED. Browser UI on https://localhost:3000 (Selkies WebRTC),
                Appium WebDriver on :4723, ADB server on :5037 (set
                ANDROID_ADB_SERVER_SOCKET=tcp:localhost:5037 to drive from host).
                Install apps either declaratively — a `kind: android` device + a
                `target: android` deploy applies layers' `apk:` packages onto the
                running emulator (apkeep in-pod) — or imperatively via the generic
                `charly eval adb install-app` verb (both share one installer). apk
                sources: apk-pure default, google-play via an AAS-token secret.
                CPU/RAM auto-size from the host at runtime.
                Requires /dev/kvm + kvm-group passthrough for hardware acceleration;
                the layer declares this via security.devices so the quadlet
                auto-emits AddDevice=/dev/kvm.
            tag: [testing]
        eval:
            - id: image-emulator-binary
              file: /opt/android-sdk/emulator/emulator
              exists: true
            - id: image-adb-binary
              file: /opt/android-sdk/platform-tools/adb
              exists: true
            - id: image-appium-binary
              file: /usr/bin/appium
              exists: true
            - id: image-java-binary
              file: /usr/bin/java
              exists: true
            - id: image-start-emulator-script
              file: /usr/local/bin/start-emulator
              exists: true
              mode: "0755"
