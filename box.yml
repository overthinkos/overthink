    openclaw-desktop:
        # All-in-one CachyOS power image: the selkies streaming desktop + the
        # openclaw-full gateway/tool stack (claude-code/codex/gemini included) +
        # a CPU ollama + the full nested charly toolchain (build images, run nested
        # rootless pods, launch rootless libvirt VMs from a terminal inside the
        # desktop). build:[pac,aur] is required for selkies' AUR google-chrome
        # + wlrctl.
        enabled: true
        base: cachyos.cachyos
        build:
            - pac
            - aur
        platform:
            - linux/amd64
        candy:
            - agent-forwarding
            - selkies-desktop
            - openclaw-full
            - ollama
            - charly
            - container-nesting
            - golang
            - gh
            - dbus
        port:
            - 3000:3000
            - 9222:9222
            - 9224:9224
            - 2222:2222
            - 18789:18789
            - 11434:11434
        eval:
            # --- build scope: binaries present across all four stacks ---
            - command: test -x /usr/bin/labwc && test -x /usr/bin/google-chrome-stable && test -x /usr/local/bin/traefik && test -x /usr/sbin/sshd
              id: openclaw-desktop-selkies-binaries
              exit_status: 0
            - command: test -x /usr/bin/ollama && test -x /usr/bin/charly && test -x /usr/bin/gocryptfs && test -x /usr/bin/socat
              id: openclaw-desktop-charly-ollama-binaries
              exit_status: 0
            - command: test -x /usr/bin/podman && test -x /usr/bin/buildah && test -x /usr/bin/skopeo && test -x /usr/bin/newuidmap && test -x /usr/bin/newgidmap
              id: openclaw-desktop-nested-binaries
              exit_status: 0
            # --- build scope: nested-rootless posture ---
            - command: grep -cE '^user:[0-9]+:[0-9]+$' /etc/subuid
              id: openclaw-desktop-subuid-user-two-ranges
              exit_status: 0
              stdout:
                - matches: ^2
            - command: getcap /usr/bin/newuidmap | grep -c cap_setuid
              id: openclaw-desktop-newuidmap-cap
              exit_status: 0
            - file: /etc/containers/policy.json
              id: openclaw-desktop-policy-json
              exists: true
            - command: grep -E '^userns\s*=\s*"host"' /etc/containers/containers.conf
              id: openclaw-desktop-containers-conf-userns-host
              exit_status: 0
            - command: grep -E '^userns\s*=\s*"host"' /home/user/.config/containers/containers.conf
              id: openclaw-desktop-user-containers-conf-userns-host
              exit_status: 0
            - command: sh -c 'env | grep -q "^_CONTAINERS_USERNS_CONFIGURED="'
              id: openclaw-desktop-env-containers-userns-configured
              exit_status: 0
            - command: sh -c 'env | grep -qx "BUILDAH_ISOLATION=chroot"'
              id: openclaw-desktop-env-buildah-isolation
              exit_status: 0
            # --- deploy scope: nested toolchain works ---
            - command: podman run --rm quay.io/libpod/alpine:latest /bin/true
              id: openclaw-desktop-nested-podman-run
              timeout: 60s
              scope: deploy
              in_container: true
            - command: virsh -c qemu:///session list --all
              id: openclaw-desktop-libvirt-session-list
              scope: deploy
              in_container: true
              exit_status: 0
            - command: charly version
              id: openclaw-desktop-charly-version
              scope: deploy
              in_container: true
            - command: charly doctor
              id: openclaw-desktop-charly-doctor
              scope: deploy
              in_container: true
            # --- deploy scope: the three fused services are live ---
            - addr: 127.0.0.1:${HOST_PORT:9224}
              id: openclaw-desktop-chrome-devtools-mcp-port
              timeout: 5s
              scope: deploy
              reachable: true
            - addr: 127.0.0.1:${HOST_PORT:18789}
              id: openclaw-desktop-gateway-port
              timeout: 5s
              scope: deploy
              reachable: true
            - http: http://127.0.0.1:${HOST_PORT:11434}/api/tags
              id: openclaw-desktop-ollama-api
              status: 200
              scope: deploy
    openclaw-full:
        enabled: true
        base: cachyos.cachyos
        candy:
