box:
    name: arch
    version: 2026.144.1443
    # quay.io is the official Arch Linux registry mirror (same image content
    # as docker.io/library/archlinux) WITHOUT Docker Hub's aggressive
    # unauthenticated pull-rate limit — which otherwise blocks CI / repeated
    # base rebuilds with "toomanyrequests". Prefer it as the base source.
    # Pinned to a precise date-serial base tag (NO :latest anywhere) so the
    # FROM resolves to a fixed digest — reproducible builds, no surprise
    # upstream drift, cache-stable downstream. Bump to a newer `base-*` tag
    # when refreshing the Arch base; quay's `base-*` tags are immutable.
    base: quay.io/archlinux/archlinux:base-20260525.0.535911
    distro:
        - arch
    build:
        - pac
    builder:
        aur: arch-builder
        cargo: arch-builder
        npm: arch-builder
        pixi: arch-builder
    produce:
        - pixi
        - npm
        - cargo
        - aur
