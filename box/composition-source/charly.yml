box:
    # composition self-test SOURCE — a stable in-main image whose two
    # image-scope eval probes are consumed (read, filtered, re-run on the
    # selftest target pods) by the eval.yml `composition-import-selftest`
    # recipe's `from:` expander. Replaces the relocated `fedora-coder`. The
    # keep probe (`composition-source-charly`) tests `charly` presence, which passes on
    # both the `selftest-image` and `composition-app` target pods (both ship the
    # `charly` layer) AND on this image itself; `composition-source-marker` exists
    # only to exercise the `exclude:` filter (it is never imported/run).
    name: composition-source
    base: fedora
    candy:
        - charly
    eval:
        # NB: composition-source-charly is NOT a redundant presence check —
        # it is the image-SECTION fixture the `composition-import-selftest`
        # recipe imports by id (scope:[image], select:[composition-source-charly])
        # to prove image-scope test import works. Distinct from the charly
        # candy's layer-section `charly-binary`. Do not fold into the layer.
        - command: test -x /usr/bin/charly
          id: composition-source-charly
          exit_status: 0
        - command: test -d /etc
          id: composition-source-marker
          exit_status: 0
