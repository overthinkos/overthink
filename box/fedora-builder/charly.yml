box:
    name: fedora-builder
    # base: fedora-nonfree (NOT plain fedora) so the RPM Fusion repos land in
    # the BASE chain — guaranteeing they are enabled before build-toolchain's
    # dnf install of the nonfree codec devel libs (ffmpeg-devel / x264-devel /
    # libva-devel), independent of intra-image layer ordering. GlobalLayerOrder
    # is popularity-based and, in a submodule that mixes arch-builder +
    # fedora-builder consumers, can otherwise rank build-toolchain ahead of a
    # same-image rpmfusion layer, breaking the builder. Putting rpmfusion in
    # the base removes that ordering dependency entirely.
    base: fedora-nonfree
    candy:
        - '@github.com/overthinkos/overthink/candy/pixi:v2026.160.1105'
        - '@github.com/overthinkos/overthink/candy/nodejs:v2026.160.1105'
        - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.160.1105'
    produce:
        - pixi
        - npm
        - cargo
