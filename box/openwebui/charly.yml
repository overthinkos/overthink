box:
    name: openwebui
    enabled: false
    base: fedora
    candy:
        - agent-forwarding
        - openwebui
        - dbus
    port:
        - 8080:8080
    eval:
        - command: test -x ${HOME}/.local/bin/openwebui-entrypoint && test -x ${HOME}/.pixi/envs/default/bin/python
          id: openwebui-composition
          exit_status: 0
        - command: printenv WEBUI_ADMIN_EMAIL
          id: openwebui-required-env-injected
          scope: deploy
          in_container: true
          exit_status: 0
