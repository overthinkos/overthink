candy:
    version: 2026.145.1302
    name: android-sdk
    description: |
        Android SDK installed from CachyOS/AUR packages under /opt/android-sdk:
        cmdline-tools (sdkmanager/avdmanager), platform-tools (adb), build-tools
        36 (aapt2), platform android-36, the emulator, and apkeep (the
        by-package-name app downloader the `charly eval adb install-app` verb drives
        IN the pod). Every AUR package installs into /opt/android-sdk (verified
        PKGBUILD prefixes), so they coexist with the one sdkmanager-fetched
        component. The Android 16 (API 36, google_apis_playstore x86_64) SYSTEM
        IMAGE has NO package anywhere — it is the single component sdkmanager
        fetches (using the AUR cmdline-tools), cached in a persistent build mount
        keyed per API level + variant. requires java-openjdk for sdkmanager +
        emulator runtime. cachyos (Arch-derived) consumes the arch: section and
        routes aur → arch-builder; the consuming image must declare
        build:[pac,aur] (android-emulator inherits it from the selkies-desktop
        chain).
    require:
        - java-openjdk
    env:
        ANDROID_HOME: "/opt/android-sdk"
        ANDROID_SDK_ROOT: "/opt/android-sdk"
    path_append:
        - "/opt/android-sdk/cmdline-tools/latest/bin"
        - "/opt/android-sdk/platform-tools"
        - "/opt/android-sdk/emulator"
    var:
        EMULATOR_API_LEVEL: "36"
        EMULATOR_SYS_IMG: "x86_64"
        EMULATOR_IMG_TYPE: "google_apis_playstore"
        # apkeep is installed from its upstream precompiled x86_64 binary (NOT the
        # AUR Rust package): the AUR build fails to link ring/zstd-sys native
        # objects under Arch's default lld --gc-sections. Same precompiled-binary
        # pattern this repo uses for uv/traefik/etc. apkeep ships x86_64-only.
        APKEEP_VERSION: "0.18.0"
    distro:
        arch:
            # Emulator runtime libs (Qt/GL/audio): the AUR packages provide the
            # SDK TOOLS, these provide the shared libs the emulator dlopens.
            # Qt 6.5+ (bundled in the emulator) needs xcb-util-cursor to load the
            # xcb platform plugin even with -no-window, else the process exits
            # before AVD boot. pacman --needed skips libs already in the base.
            package:
                - unzip
                - which
                - gcc-libs
                - mesa
                - libglvnd
                - libx11
                - libxrandr
                - libxi
                - libxcursor
                - libxrender
                - libxxf86vm
                - libxfixes
                - libxcomposite
                - libxkbcommon-x11
                - alsa-lib
                - libpulse
                - xcb-util-cursor
            aur:
                # SDK toolchain via AUR — all install under /opt/android-sdk.
                # build-tools-36 brings aapt2 (absent before this layer; Appium's
                # ADB badging probe logged "Could not find 'aapt2'").
                # NB: apkeep is NOT here — it's installed from the upstream
                # precompiled binary (see the download: task below), because its
                # AUR Rust build fails to link ring/zstd-sys under lld.
                package:
                    - android-sdk-cmdline-tools-latest
                    - android-sdk-platform-tools
                    - android-sdk-build-tools-36
                    - android-platform-36
                    - android-emulator
    task:
        # apkeep — the by-package-name app downloader the host-side
        # `charly eval adb install-app` verb runs IN this pod (apk-pure default,
        # google-play via AAS token). Installed from the upstream precompiled
        # x86_64 binary (apkeep ships a bare binary, no tarball → no extract);
        # the AUR Rust build fails to link ring/zstd-sys under lld --gc-sections.
        - download: "https://github.com/EFForg/apkeep/releases/download/${APKEEP_VERSION}/apkeep-x86_64-unknown-linux-gnu"
          to: /usr/local/bin/apkeep
          mode: "0755"
          user: root
        # The ONE component with no package anywhere: the API-36
        # google_apis_playstore x86_64 system image. sdkmanager (from the AUR
        # cmdline-tools) fetches it into a persistent cache mount, then it is
        # copied into /opt/android-sdk alongside the AUR-installed tools. The
        # cache survives a base-image cache-miss so a rebuild does NOT re-pull
        # Google's ~2GB image (whose CDN intermittently serves corrupt zips). The
        # sentinel is API+variant-keyed so a prior API level's completed download
        # in the persistent mount cannot short-circuit a new API/variant pull.
        - cmd: |
            set -euo pipefail
            export JAVA_HOME=/usr/lib/jvm/charly-jdk21
            export PATH="$JAVA_HOME/bin:/opt/android-sdk/cmdline-tools/latest/bin:$PATH"
            SDK_CACHE=/var/cache/charly-android-sysimg
            SYSIMG="system-images;android-${EMULATOR_API_LEVEL};${EMULATOR_IMG_TYPE};${EMULATOR_SYS_IMG}"
            SENTINEL="${SDK_CACHE}/.charly-sysimg-complete-${EMULATOR_API_LEVEL}-${EMULATOR_IMG_TYPE}"
            if [ ! -f "${SENTINEL}" ]; then
              # Bounded for-loop emits enough y's for the license prompts without
              # the SIGPIPE that `yes | sdkmanager` triggers under pipefail.
              for _ in $(seq 1 100); do echo y; done | sdkmanager --sdk_root="${SDK_CACHE}" --licenses >/dev/null
              sdkmanager --sdk_root="${SDK_CACHE}" "${SYSIMG}"
              touch "${SENTINEL}"
            fi
            mkdir -p /opt/android-sdk/system-images
            cp -a "${SDK_CACHE}/system-images/." /opt/android-sdk/system-images/
          user: root
          cache:
            - /var/cache/charly-android-sysimg
    eval:
        - id: sdkmanager-binary
          file: /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager
          exists: true
        - id: avdmanager-binary
          file: /opt/android-sdk/cmdline-tools/latest/bin/avdmanager
          exists: true
        - id: adb-binary
          file: /opt/android-sdk/platform-tools/adb
          exists: true
        - id: aapt2-binary
          # AUR android-sdk-build-tools-36 lays build-tools down under `36/`
          # (not `36.0.0/`) — verified in the built image.
          file: /opt/android-sdk/build-tools/36/aapt2
          exists: true
        - id: emulator-binary
          file: /opt/android-sdk/emulator/emulator
          exists: true
        - id: apkeep-binary
          command: which apkeep
          exit_status: 0
        - id: platform-36-installed
          file: /opt/android-sdk/platforms/android-36
          exists: true
          filetype: directory
        - id: system-image-installed
          file: /opt/android-sdk/system-images/android-36/google_apis_playstore/x86_64
          exists: true
          filetype: directory
        - id: adb-runs
          command: /opt/android-sdk/platform-tools/adb version
          exit_status: 0
          stdout:
            - contains: "Android Debug Bridge"
