candy:
    version: 2026.144.1443
    name: asciinema
    description: Terminal session recorder (asciinema)
    package:
        - asciinema
    eval:
        - id: asciinema-binary
          file: /usr/bin/asciinema
          exists: true
        - id: asciinema-version
          command: /usr/bin/asciinema --version
          exit_status: 0
          stdout:
            - contains: "asciinema"
