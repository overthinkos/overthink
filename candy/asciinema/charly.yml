asciinema:
    candy:
        version: 2026.144.1443
        description: |
            Record and replay terminal sessions as asciicast v2 .cast files
            The asciinema candy installs the asciinema terminal recorder from the
            distro package (named `asciinema` on RPM, DEB, and PAC alike). It
            provides the /usr/bin/asciinema CLI whose `rec` subcommand captures a
            terminal session -- timing, input, and output -- into a replayable
            asciicast v2 .cast file; this is the engine behind
            `charly check record start --mode terminal`.
    asciinema-package:
        package:
            - asciinema
    asciinema-step-0:
        check: the asciinema recorder binary is installed at /usr/bin/asciinema
        plugin: file
        plugin_input:
            file: /usr/bin/asciinema
            exists: true
    asciinema-step-1:
        check: the asciinema package is registered in the distro package database
        plugin: package
        plugin_input:
            package: asciinema
            installed: true
    asciinema-step-2:
        check: running asciinema --version prints the asciinema version banner and exits cleanly
        exit_status: 0
        stdout:
            - contains: asciinema
        plugin: command
        plugin_input:
            command: /usr/bin/asciinema --version
    asciinema-step-3:
        check: asciinema --help advertises the rec subcommand that captures terminal sessions
        exit_status: 0
        stdout:
            - contains: rec
        plugin: command
        plugin_input:
            command: /usr/bin/asciinema --help
