blogwatcher:
    candy:
        version: 2026.144.1443
        description: |
            Blog/RSS feed monitor CLI installed from source via go install
            Installs the blogwatcher cobra CLI (github.com/Hyaxia/blogwatcher)
            with `go install`, landing the binary at ${HOME}/go/bin/blogwatcher
            (GOPATH=~/go, with ~/go/bin appended to PATH). The install is
            verifiable without the network: the binary is present and
            executable, and `blogwatcher --help` runs (exit 0) and lists its
            feed-management subcommands (add, scan, blogs, articles, read).
    blogwatcher-require:
        require:
            - golang
    blogwatcher-env:
        env:
            GOPATH: "~/go"
    blogwatcher-path_append:
        path_append:
            - "~/go/bin"
    blogwatcher-step-0:
        run: |
            command=go install github.com/Hyaxia/blogwatcher/cmd/blogwatcher@latest
            go clean -cache
        run_as: "${USER}"
        plugin: command
        plugin_input:
            command: |
                go install github.com/Hyaxia/blogwatcher/cmd/blogwatcher@latest
                go clean -cache
    blogwatcher-step-1:
        check: the blogwatcher binary is installed at ~/go/bin/blogwatcher
        plugin: file
        plugin_input:
            file: ${HOME}/go/bin/blogwatcher
            exists: true
    blogwatcher-step-2:
        check: running blogwatcher --help exits 0 and lists the scan subcommand
        exit_status: 0
        stdout:
            - contains: scan
        plugin: command
        plugin_input:
            command: "${HOME}/go/bin/blogwatcher --help 2>&1"
    blogwatcher-binary-executable:
        check: command=test -x ${HOME}/go/bin/blogwatcher
        id: blogwatcher-binary-executable
        exit_status: 0
        plugin: command
        plugin_input:
            command: "test -x ${HOME}/go/bin/blogwatcher"
    blogwatcher-cli-help:
        check: command=${HOME}/go/bin/blogwatcher --help 2>&1
        id: blogwatcher-cli-help
        exit_status: 0
        stdout:
            - contains: scan
            - contains: blogs
        plugin: command
        plugin_input:
            command: "${HOME}/go/bin/blogwatcher --help 2>&1"
