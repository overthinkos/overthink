build-toolchain:
    candy:
        version: 2026.144.1443
        description: |
            A complete C/C++/Rust build toolchain (gcc, make, cmake, cargo, nasm) for compiling native software inside builder images.
            build-toolchain installs the generic native-compilation stack: the
            GNU C/C++ compiler (gcc), GNU make, the CMake build-system
            generator, the Rust/cargo toolchain, the nasm assembler, ccache,
            gdb, git, and a wide set of -devel/-dev headers. Every consuming
            builder stage (fedora-builder, arch-builder) depends on these
            binaries being on PATH, so each is directly file- and
            version-checkable inside the built image.
    build-toolchain-env:
        env:
            CCACHE_DISABLE: "1"
    build-toolchain-package:
        package:
            - autoconf
            - automake
            - binutils
            - bison
            - ccache
            - cmake
            - flex
            - gdb
            - git
            - libtool
            - nasm
            - patch
    build-toolchain-distro:
        distro:
            arch:
                package:
                    - clang
                    - ffmpeg
                    - gcc
                    - glibc
                    - libdrm
                    - libinput
                    - libjpeg-turbo
                    - seatd
                    - libva
                    - libxkbcommon
                    - make
                    - mesa
                    - ninja
                    - opusfile
                    - pixman
                    - pkgconf
                    - portaudio
                    - rust
                    - systemd
                    - wayland
                    - x264
            debian:
                package:
                    - build-essential
                    - cargo
                    - clang
                    - libavcodec-dev
                    - libavformat-dev
                    - libavutil-dev
                    - libclang-dev
                    - libdrm-dev
                    - libgbm-dev
                    - libinput-dev
                    - libturbojpeg0-dev
                    - libpixman-1-dev
                    - libseat-dev
                    - libsystemd-dev
                    - libswscale-dev
                    - libudev-dev
                    - libva-dev
                    - libwayland-dev
                    - libx264-dev
                    - libxkbcommon-dev
                    - ninja-build
                    - libopusfile-dev
                    - pkg-config
                    - portaudio19-dev
                    - rustc
            fedora:
                package:
                    - cargo
                    - clang-devel
                    - cli11-devel
                    - ffmpeg-devel
                    - gcc
                    - gcc-c++
                    - glibc-devel
                    - libdrm-devel
                    - libinput-devel
                    - libjpeg-turbo-devel
                    - libseat-devel
                    - libudev-devel
                    - libva-devel
                    - libxkbcommon-devel
                    - make
                    - mesa-libgbm-devel
                    - ninja-build
                    - opusfile-devel
                    - pixman-devel
                    - portaudio-devel
                    - pkgconf
                    - pkgconf-m4
                    - pkgconf-pkg-config
                    - redhat-rpm-config
                    - rpm-build
                    - rpm-sign
                    - rust
                    - systemd-devel
                    - wayland-devel
                    - x264-devel
            ubuntu:
                package:
                    - build-essential
                    - cargo
                    - clang
                    - libavcodec-dev
                    - libavformat-dev
                    - libavutil-dev
                    - libclang-dev
                    - libdrm-dev
                    - libgbm-dev
                    - libinput-dev
                    - libturbojpeg0-dev
                    - libpixman-1-dev
                    - libseat-dev
                    - libsystemd-dev
                    - libswscale-dev
                    - libudev-dev
                    - libva-dev
                    - libwayland-dev
                    - libx264-dev
                    - libxkbcommon-dev
                    - ninja-build
                    - libopusfile-dev
                    - pkg-config
                    - portaudio19-dev
                    - rustc
    build-toolchain-step-0:
        check: the GNU C compiler binary is installed at /usr/bin/gcc
        plugin: file
        plugin_input:
            file: /usr/bin/gcc
            exists: true
    build-toolchain-step-1:
        check: gcc reports its version and exits successfully
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/gcc --version
    build-toolchain-step-2:
        check: GNU make is available to drive Makefile builds
        plugin: file
        plugin_input:
            file: /usr/bin/make
            exists: true
    build-toolchain-step-3:
        check: the CMake build-system generator is available
        plugin: file
        plugin_input:
            file: /usr/bin/cmake
            exists: true
    build-toolchain-step-4:
        check: cmake reports its version and exits successfully
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/cmake --version
    build-toolchain-step-5:
        check: the cargo Rust package manager is installed
        plugin: file
        plugin_input:
            file: /usr/bin/cargo
            exists: true
    build-toolchain-step-6:
        check: the nasm assembler (needed by SIMD native crates) is installed
        plugin: file
        plugin_input:
            file: /usr/bin/nasm
            exists: true
    build-toolchain-step-7:
        check: cargo reports its version and exits successfully
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/cargo --version
    build-toolchain-step-8:
        check: the GNU debugger is available for native debugging
        plugin: file
        plugin_input:
            file: /usr/bin/gdb
            exists: true
    build-toolchain-step-9:
        check: ccache is available to accelerate repeat compilations
        plugin: file
        plugin_input:
            file: /usr/bin/ccache
            exists: true
    build-toolchain-step-10:
        check: git is available so builder stages can clone pinned sources
        plugin: file
        plugin_input:
            file: /usr/bin/git
            exists: true
    make-version:
        check: command=/usr/bin/make --version
        id: make-version
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/make --version
