candy:
    version: 2026.144.1443
    name: build-toolchain
    description:
        feature: A complete C/C++/Rust build toolchain (gcc, make, cmake, cargo, nasm) for compiling native software inside builder images.
        narrative: |
            build-toolchain installs the generic native-compilation stack: the
            GNU C/C++ compiler (gcc), GNU make, the CMake build-system
            generator, the Rust/cargo toolchain, the nasm assembler, ccache,
            gdb, git, and a wide set of -devel/-dev headers. Every consuming
            builder stage (fedora-builder, arch-builder) depends on these
            binaries being on PATH, so each is directly file- and
            version-checkable inside the built image.
        tag: [working]
    env:
        CCACHE_DISABLE: "1"
    package:
        - autoconf
        - automake
        - binutils
        - bison
        - ccache
        - cmake
        - flex
        - gdb
        - git
        - libtool
        - nasm
        - patch
    distro:
        arch:
            package:
                - clang
                - ffmpeg
                - gcc
                - glibc
                - libdrm
                - libinput
                - libjpeg-turbo
                - seatd
                - libva
                - libxkbcommon
                - make
                - mesa
                - ninja
                - opusfile
                - pixman
                - pkgconf
                - portaudio
                - rust
                - systemd
                - wayland
                - x264
        debian:
            package:
                - build-essential
                - cargo
                - clang
                - libavcodec-dev
                - libavformat-dev
                - libavutil-dev
                - libclang-dev
                - libdrm-dev
                - libgbm-dev
                - libinput-dev
                - libturbojpeg0-dev
                - libpixman-1-dev
                - libseat-dev
                - libsystemd-dev
                - libswscale-dev
                - libudev-dev
                - libva-dev
                - libwayland-dev
                - libx264-dev
                - libxkbcommon-dev
                - ninja-build
                - libopusfile-dev
                - pkg-config
                - portaudio19-dev
                - rustc
        fedora:
            package:
                - cargo
                - clang-devel
                - cli11-devel
                - ffmpeg-devel
                - gcc
                - gcc-c++
                - glibc-devel
                - libdrm-devel
                - libinput-devel
                - libjpeg-turbo-devel
                - libseat-devel
                - libudev-devel
                - libva-devel
                - libxkbcommon-devel
                - make
                - mesa-libgbm-devel
                - ninja-build
                - opusfile-devel
                - pixman-devel
                - portaudio-devel
                - pkgconf
                - pkgconf-m4
                - pkgconf-pkg-config
                - redhat-rpm-config
                - rpm-build
                - rpm-sign
                - rust
                - systemd-devel
                - wayland-devel
                - x264-devel
        ubuntu:
            package:
                - build-essential
                - cargo
                - clang
                - libavcodec-dev
                - libavformat-dev
                - libavutil-dev
                - libclang-dev
                - libdrm-dev
                - libgbm-dev
                - libinput-dev
                - libturbojpeg0-dev
                - libpixman-1-dev
                - libseat-dev
                - libsystemd-dev
                - libswscale-dev
                - libudev-dev
                - libva-dev
                - libwayland-dev
                - libx264-dev
                - libxkbcommon-dev
                - ninja-build
                - libopusfile-dev
                - pkg-config
                - portaudio19-dev
                - rustc
    scenario:
        - name: c-compiler-builds-and-reports-version
          step:
            - then: the GNU C compiler binary is installed at /usr/bin/gcc
              file: /usr/bin/gcc
              exists: true
            - then: gcc reports its version and exits successfully
              command: /usr/bin/gcc --version
              exit_status: 0
        - name: build-orchestrators-present
          step:
            - then: GNU make is available to drive Makefile builds
              file: /usr/bin/make
              exists: true
            - then: the CMake build-system generator is available
              file: /usr/bin/cmake
              exists: true
            - then: cmake reports its version and exits successfully
              command: /usr/bin/cmake --version
              exit_status: 0
        - name: rust-and-native-asm-toolchain-present
          step:
            - then: the cargo Rust package manager is installed
              file: /usr/bin/cargo
              exists: true
            - then: the nasm assembler (needed by SIMD native crates) is installed
              file: /usr/bin/nasm
              exists: true
            - then: cargo reports its version and exits successfully
              command: /usr/bin/cargo --version
              exit_status: 0
        - name: developer-utilities-present
          step:
            - then: the GNU debugger is available for native debugging
              file: /usr/bin/gdb
              exists: true
            - then: ccache is available to accelerate repeat compilations
              file: /usr/bin/ccache
              exists: true
            - then: git is available so builder stages can clone pinned sources
              file: /usr/bin/git
              exists: true
        - name: make-version
          step:
            - id: make-version
              command: /usr/bin/make --version
              exit_status: 0
