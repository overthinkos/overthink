candy:
    version: 2026.149.1210
    name: cachyos-extras
    description:
        feature: Installs the CachyOS host-parity workstation toolset — pacman/AUR helpers, diagnostic monitors, editors, tunnels, and desktop-integration packages.
        narrative: |
            The remaining host workstation tools not already covered by the charly dev
            stack — the CLI/diagnostic/app gap from the CachyOS netinstall + the
            operator's manual installs, reverse-resolved to top-level packages.
            Excludes host-hardware/boot/firmware/network entries by design. accounts
            service is here because SDDM/Plasma user management needs it. Every entry
            lands as a real pacman repo or AUR package, so each tool's binary and
            package identity is independently verifiable on the built image.
        tag: [working]
    require:
        - yay
    distro:
        arch:
            package:
                # System / pacman tooling
                - pacman-contrib
                - pkgfile
                - rebuild-detector
                - paru
                - plocate
                # Diagnostics / monitors
                - btop
                - duf
                - glances
                - pv
                # Editors / terminal / apps (host parity)
                - micro
                - nano
                - nano-syntax-highlighting
                - vim
                - alacritty
                - meld
                - firefox
                # Net / fs / mail
                - inetutils
                - nfs-utils
                - syncthing
                - s-nail
                - unrar
                # Desktop integration helpers
                - accountsservice
                - xdg-user-dirs
                - xdg-utils
                - python-defusedxml
                - python-packaging
            aur:
                package:
                    - cloudflared-bin
                    - gvisor-tap-vsock
    scenario:
        - name: diagnostic-monitors-installed
          step:
            - then: the btop resource monitor binary is present
              file: /usr/bin/btop
              exists: true
            - then: the duf disk-usage viewer binary is present
              file: /usr/bin/duf
              exists: true
        - name: aur-helper-and-tunnel-installed
          step:
            - then: the paru AUR helper binary is present
              file: /usr/bin/paru
              exists: true
            - then: the cloudflared-bin AUR tunnel client resolves on PATH
              command: command -v cloudflared
              exit_status: 0
        - name: syncthing-daemon-installed
          step:
            - then: the syncthing file-synchronisation daemon binary is present
              file: /usr/bin/syncthing
              exists: true
        - name: btop-binary
          step:
            - id: btop-binary
              file: /usr/bin/btop
              exists: true
        - name: syncthing-binary
          step:
            - id: syncthing-binary
              file: /usr/bin/syncthing
              exists: true
        - name: paru-binary
          step:
            - id: paru-binary
              file: /usr/bin/paru
              exists: true
        - name: accountsservice-installed
          step:
            - id: accountsservice-installed
              package: accountsservice
              installed: true
        - name: cloudflared-binary
          step:
            - id: cloudflared-binary
              command: command -v cloudflared
              exit_status: 0
