candy:
    version: 2026.159.0748
    name: charly
    description: |
        Full charly toolchain — the CLI binary + the VM stack (virtualization),
        encrypted storage (gocryptfs), and console relay (socat) — composed into
        ONE layer that works identically on container/pod, host/local, and
        bootc/VM targets via the `virtualization` layer's mixed-entry `service:`
        pattern. This is the single canonical `charly` layer: bake it where a
        deployment needs a persistent on-`$PATH` charly or the full toolchain inside
        (the `charly-mcp` server, the `*-charly` showcases, nested-pod orchestrators).
        Images that only need transient in-container `charly` (the dbus delegation
        path) need NOT bake it — the host copies `charly` in on demand
        (`EnsureOvInVenue`; see `/charly-tools:charly`).
    candy:
        - virtualization
        - gocryptfs
        - socat
    distro:
        arch:
            package:
                - portaudio
                - opusfile
        debian:
            # tailscale is a mandatory charly dep but is NOT in Debian main, so the
            # .deb (pkg/debian) omits it; the charly candy supplies it for deb-family
            # via the tailscale apt repo. arch/fedora get tailscale from their
            # native package's deps instead, so it is deb-family-scoped here.
            package:
                - libportaudio2
                - libopusfile0
                - tailscale
            repo:
                - name: tailscale
                  url: "https://pkgs.tailscale.com/stable/debian"
                  key: "https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg"
                  suite: trixie
                  components: main
        fedora:
            package:
                - portaudio
                - opusfile
        ubuntu:
            package:
                - libportaudio2
                - libopusfile0
                - tailscale
            repo:
                - name: tailscale
                  url: "https://pkgs.tailscale.com/stable/ubuntu"
                  key: "https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg"
                  suite: noble
                  components: main
    # On a DEPLOY target charly is installed as the proper OS-tracked package for the
    # target distro's format (LocalPkgInstallStep): pac → opencharly-git built from
    # pkg/arch via makepkg + pacman -U; rpm → opencharly built from pkg/fedora via
    # rpmbuild + dnf install; deb → opencharly built from pkg/debian via
    # dpkg-buildpackage + apt-get install. Each install AUTO-RESOLVES the package's
    # dependencies from the target's repos. The sources live at the SUPERPROJECT
    # root (pkg/<fmt>) — resolved by walking UP from the deploy project dir, so a
    # consumer nested under image/<distro> still finds them. An IMAGE build has no
    # host-package-build step, so it DOWNLOADS the published package
    # (format.<fmt>.local_pkg.download_template) and installs it via the same
    # dep-resolving install command — same OS-tracked result, no curl'd raw binary.
    localpkg:
        pac: pkg/arch
        rpm: pkg/fedora
        deb: pkg/debian
    # No install task: the charly binary is installed by the `localpkg:` mechanism
    # above — the proper OS package, dependency-resolving + OS-tracked, on EVERY
    # distro. A DEPLOY target (target: local / vm) builds the format's source on
    # the host and installs it (pacman -U / dnf install / apt-get install); an
    # IMAGE build (OCITarget) downloads the PUBLISHED package
    # (build.yml format.<fmt>.local_pkg.download_template → releases/latest/download/
    # opencharly-${ARCH}.{pkg.tar.zst,rpm,deb}) and installs it the same way. One
    # install path, no curl'd raw binary.
    #
    # The package lands the binary at /usr/bin/charly. Probe via PATH
    # (`command -v charly`) so the eval passes regardless of which path placed it.
    eval:
        - id: charly-binary
          command: command -v charly
          exit_status: 0
          stdout:
            - matches: "/(usr/bin|usr/local/bin)/charly"
        - id: charly-version
          command: charly version
          exit_status: 0
          stdout:
            - matches: "[0-9]{4}\\.[0-9]+"
