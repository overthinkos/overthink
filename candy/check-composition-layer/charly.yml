candy:
    version: 2026.144.1443
    name: check-composition-layer
    description:
        feature: bench-composition — marker for from-composition-selftest hand-written probe
        narrative: |
            Writes /etc/charly-composition-selftest, satisfying the
            composition-handwritten-probe scenario in from-composition-selftest.
        tag: [working]
    task:
        - mkdir: /etc
          run_as: root
          mode: "0755"
        - write: /etc/charly-composition-selftest
          run_as: root
          mode: "0644"
          content: |
            charly composition selftest marker
    scenario:
        - name: composition-marker-present
          step:
            - then: the composition selftest marker file exists at /etc/charly-composition-selftest
              file: /etc/charly-composition-selftest
              exists: true
            - then: the marker file is written world-readable at mode 0644
              file: /etc/charly-composition-selftest
              mode: "0644"
        - name: composition-marker-content-matches
          step:
            - then: the marker file carries the composition selftest marker string
              file: /etc/charly-composition-selftest
              contains:
                - charly composition selftest marker
        - name: composition-marker-exists
          step:
            - id: composition-marker-exists
              file: /etc/charly-composition-selftest
              exists: true
        - name: composition-marker-content
          step:
            - id: composition-marker-content
              file: /etc/charly-composition-selftest
              contains:
                - charly composition selftest marker
        - name: composition-marker-mode
          step:
            - id: composition-marker-mode
              file: /etc/charly-composition-selftest
              mode: "0644"
