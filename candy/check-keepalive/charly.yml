candy:
    version: 2026.155.1526
    name: check-keepalive
    description:
        feature: A supervisord keepalive program holds a service-less pod at steady-state.
        narrative: |
            Minimal supervisord keepalive — a `sleep infinity` service so a pod whose
            layer-under-test is a build-time install (no service of its own) still
            reaches steady-state for `charly check live` / `charly check run`, AND supervisord
            gets a valid /etc/supervisord.conf (its baked `supervisorctl pid` check
            needs an assembled config, which only exists when some layer contributes a
            service:). No extra packages — `sleep` is in coreutils on every base, so
            this is distro-agnostic (arch/fedora/debian). Used by test images like
            `vscode-test` that back a `kind: check` pod bed. The candy installs nothing
            of its own; its observable effects are the composed supervisord binary and
            the assembled config carrying the keepalive program.
        tag: [working]
    candy:
        - supervisord
    service:
        - name: keepalive
          exec: /usr/bin/sleep infinity
          restart: always
    scenario:
        - name: keepalive-program-assembled
          step:
            - then: the assembled supervisord config registers a keepalive program
              file: /etc/supervisord.conf
              contains:
                - "[program:keepalive]"
            - and: the keepalive program runs /usr/bin/sleep infinity
              file: /etc/supervisord.conf
              contains:
                - "command=/usr/bin/sleep infinity"
            - and: composing check-keepalive pulls in the supervisord init binary
              file: /usr/bin/supervisord
              exists: true
        - name: keepalive-holds-pod-at-steady-state
          step:
            - then: supervisord reports the keepalive program RUNNING on the live pod
              command: supervisorctl status keepalive
              stdout:
                contains: RUNNING
              context:
                - runtime
        - name: keepalive-program-registered
          step:
            # Build-scope — the candy's unique observable effect: contributing a
            # service: forces the supervisord-conf assembly stage to bake a
            # [program:keepalive] section running sleep infinity into the merged
            # /etc/supervisord.conf (chmod 0644, readable by the image user).
            - id: keepalive-program-registered
              file: /etc/supervisord.conf
              contains:
                - "[program:keepalive]"
                - "command=/usr/bin/sleep infinity"
        - name: keepalive-supervisord-binary
          step:
            # Build-scope — the observable effect of `candy: [supervisord]`: the init
            # binary the keepalive program runs under is present in the image.
            - id: keepalive-supervisord-binary
              file: /usr/bin/supervisord
              exists: true
        - name: keepalive-running
          step:
            # Deploy-scope — the live functional probe: supervisord actually keeps the
            # keepalive program RUNNING, so the pod holds steady-state.
            - id: keepalive-running
              command: supervisorctl status keepalive
              stdout:
                contains: RUNNING
              context:
                - runtime
