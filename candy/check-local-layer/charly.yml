candy:
    version: 2026.144.1443
    name: check-local-layer
    description:
        feature: Drop /etc/check-local-marker on the host filesystem
        narrative: |
            Used by the check-local kind:local template to exercise the
            ShellExecutor + HostDeployTarget path. Marker file is written by
            a write: task; deploy-scope check probe runs on the host (not in a
            container) to verify the file is present after `charly deploy add`.
        tag: [working]
    task:
        - write: /etc/check-local-marker
          run_as: root
          mode: "0644"
          content: |
            check-local v1
    scenario:
        # Agent Driven Evaluation acceptance scenarios baked into this
        # candy's ai.opencharly.description label. Every step embeds a
        # file/command check verb (BIND-BY-SHAPE), so all are DETERMINISTIC.
        # Scenario 1 is build-scope — the write: task bakes the marker into
        # any image composing this candy. Scenario 2 is deploy-scope and
        # host-side (in_container: false) — the candy's real purpose is the
        # check-local kind:local HostDeployTarget apply that drops the marker
        # onto the host filesystem.
        - name: check-local-marker-written
          step:
            - then: the check-local marker file is present at /etc/check-local-marker
              file: /etc/check-local-marker
              exists: true
            - then: the marker records the check-local version stamp "check-local v1"
              file: /etc/check-local-marker
              contains:
                - contains: "check-local v1"
        - name: check-local-marker-on-host
          step:
            - then: after the check-local kind:local apply, the marker resolves on the host filesystem outside any container
              command: "test -f /etc/check-local-marker"
              in_container: false
              context:
                - runtime
        - name: check-local-marker-exists
          step:
            # Deploy-scope: the kind:local apply writes the marker onto the HOST
            # filesystem (no container) — probe host-side with in_container: false.
            - id: check-local-marker-exists
              command: "test -f /etc/check-local-marker"
              in_container: false
              context:
                - runtime
        - name: check-local-marker-host-content
          step:
            - id: check-local-marker-host-content
              command: "grep -q 'check-local v1' /etc/check-local-marker"
              in_container: false
              context:
                - runtime
        - name: check-local-marker-build
          step:
            # Build-scope: the write: task also bakes the marker into any image
            # composing this candy — present with mode 0644 and the version stamp.
            - id: check-local-marker-build
              file: /etc/check-local-marker
              exists: true
              mode: "0644"
        - name: check-local-marker-build-content
          step:
            - id: check-local-marker-build-content
              file: /etc/check-local-marker
              contains:
                - contains: "check-local v1"
