candy:
    version: 2026.144.1443
    name: check-target-layer
    description:
        feature: bench-target — demonstrates charly benchmark with a real AI
        narrative: |
            Minimal synthetic layer used solely to exercise charly benchmark
            end-to-end against a real Claude Code runner. The single scenario
            below checks for a marker file the layer does NOT currently create,
            so baseline always fails. An AI solves it by adding a write: task
            to this candy.yml that creates /etc/charly-bench-marker containing the
            string "charly benchmark target".
        tag: [bench, throwaway]
    # Placeholder task. Exists only to satisfy `charly box validate`'s
    # "layer must have at least one install artifact" rule. The AI's job
    # during `charly benchmark run` is to ADD a `write:` task here that
    # creates /etc/charly-bench-marker with the expected content.
    task:
        - mkdir: /etc/charly-bench
          run_as: root
          mode: "0755"
    scenario:
        - name: marker file is present with expected content
          tag: ["@skeleton"]
          step:
            # Single Then step (no narrative-only Given) so the scenario
            # has zero pending steps and Classify can return VerdictSolved
            # when the AI's edit makes it pass.
            - then: the marker file exists with the expected content
              file: /etc/charly-bench-marker
              exists: true
              contains:
                - charly benchmark target
        - name: scaffold directory is created
          # Asserts the candy's ONLY real current install artifact (the
          # mkdir task below). Passes on the real candy, fails if the candy
          # is a no-op — the genuine acceptance shape, complementing the
          # @skeleton marker scenario that stays red until an AI solves it.
          step:
            - then: the benchmark scaffold directory exists and is a directory
              file: /etc/charly-bench
              exists: true
              filetype: directory
            - then: the scaffold directory is world-traversable at mode 0755
              file: /etc/charly-bench
              mode: "0755"
