candy:
    version: 2026.144.1443
    name: check-tier23-layer
    description: |
        bench-tier23 — tier 2 + tier 3 in a shared pod
        Tier 2: HTTP server on port 8080 returning a body containing "charly benchmark".
        Tier 3: curl installed + persistent /srv/bench/version.txt.
        Both tiers share the same pod (harness-tier23).
    require: []
    distro:
        fedora:
            package:
                - curl
                - python3
                - iproute
                - procps-ng
    port:
        - 8080
    service:
        - name: bench-http
          exec: "/usr/bin/python3 -m http.server --bind 0.0.0.0 --directory /srv/bench 8080"
          restart: always
          priority: 20
          enable: true
          scope: system
    plan:
        - run: mkdir=/srv/bench
          mkdir: /srv/bench
          run_as: root
          mode: "0755"
        - run: write=/srv/bench/version.txt
          write: /srv/bench/version.txt
          run_as: root
          mode: "0644"
          content: |
            tier3-ok
        - run: write=/srv/bench/index.html
          write: /srv/bench/index.html
          run_as: root
          mode: "0644"
          content: |
            <!doctype html>
            <html><body>
            <h1>charly benchmark</h1>
            <p>tier2 + tier3 are happy.</p>
            </body></html>
        - check: curl is installed so tier3 can fetch artifacts over HTTP
          file: /usr/bin/curl
          exists: true
        - check: the persistent tier3 version marker is on disk and carries tier3-ok
          file: /srv/bench/version.txt
          contains:
            - tier3-ok
        - check: the tier2 HTTP server answers on port 8080 with a page containing "charly benchmark"
          http: http://127.0.0.1:${HOST_PORT:8080}/
          status: 200
          body:
            - contains:
                - charly benchmark
          context:
            - runtime
        - check: file=/srv/bench/version.txt
          id: tier23-version-file
          file: /srv/bench/version.txt
          exists: true
          contains:
            - tier3-ok
        - check: file=/srv/bench/index.html
          id: tier23-index-exists
          file: /srv/bench/index.html
          exists: true
        - check: addr=127.0.0.1:${HOST_PORT:8080}
          id: tier23-port-open
          addr: 127.0.0.1:${HOST_PORT:8080}
          context:
            - runtime
