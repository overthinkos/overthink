chrome-cdp:
    candy:
        version: 2026.170.2101
        description: |
            Chrome DevTools Protocol automation suite exposing CDP on port 9222 via the cdp-proxy service
            A CDP automation toolkit layered on /charly-selkies:chrome for
            containerized headless streaming desktops. Installs chrome-wrapper
            (CDP flags + Windows-UA spoofing + GPU detection), chrome-restart,
            browser-open, and cdp-proxy into ~/.local/bin; stages the
            chrome-windows browser extension under ~/.local/share; symlinks
            google-chrome-stable to the wrapper; and runs cdp-proxy as the
            always-restart `cdp-proxy` service forwarding published port 9222 to
            Chrome's internal 9223. Composes /charly-selkies:chrome-devtools-mcp
            for the MCP server. Every fact below is observable: the installed
            scripts and their CDP/UA configuration, the staged extension, the
            running proxy service, and the HTTP 200 Chrome's /json/version
            endpoint returns through the proxy. Container-only — every feature
            assumes a headless context, so it is NOT for target:local installs.
    chrome-cdp-require:
        require:
            - chrome
            - supervisord
            # plugin-cdp serves the cdp: check verb (out-of-process); chrome-cdp authors cdp:
            # checks AND is the chrome-headless CDP driver, so requiring it puts plugin-cdp in
            # every composing image's closure for collectReferencedPluginWords to load.
            - plugin-cdp
    chrome-cdp-candy:
        candy:
            - chrome-devtools-mcp
    chrome-cdp-path_append:
        path_append:
            - "~/.local/bin"
    chrome-cdp-env:
        env:
            BROWSER: "browser-open"
    chrome-cdp-env_provide:
        env_provide:
            BROWSER_CDP_URL: "http://{{.ContainerName}}:9222"
    chrome-cdp-port:
        port:
            - 9222
    chrome-cdp-service:
        service:
            - name: cdp-proxy
              exec: "%(ENV_HOME)s/.local/bin/cdp-proxy"
              restart: always
              enable: true
              scope: system
    chrome-cdp-step-0:
        run: mkdir=${HOME}/.local/bin
        mkdir: "${HOME}/.local/bin"
        run_as: "${USER}"
    chrome-cdp-step-1:
        run: mkdir=${HOME}/.local/share/chrome-windows
        mkdir: "${HOME}/.local/share/chrome-windows"
        run_as: "${USER}"
    chrome-cdp-step-2:
        run: mkdir=${HOME}/.config
        mkdir: "${HOME}/.config"
        run_as: "${USER}"
    chrome-cdp-step-3:
        run: copy=chrome-wrapper
        copy: chrome-wrapper
        to: "${HOME}/.local/bin/chrome-wrapper"
        mode: "0755"
        run_as: "${USER}"
    chrome-cdp-step-4:
        run: copy=chrome-restart
        copy: chrome-restart
        to: "${HOME}/.local/bin/chrome-restart"
        mode: "0755"
        run_as: "${USER}"
    chrome-cdp-step-5:
        run: copy=browser-open
        copy: browser-open
        to: "${HOME}/.local/bin/browser-open"
        mode: "0755"
        run_as: "${USER}"
    chrome-cdp-step-6:
        run: copy=cdp-proxy
        copy: cdp-proxy
        to: "${HOME}/.local/bin/cdp-proxy"
        mode: "0755"
        run_as: "${USER}"
    chrome-cdp-step-7:
        run: copy=chrome-windows/manifest.json
        copy: chrome-windows/manifest.json
        to: "${HOME}/.local/share/chrome-windows/manifest.json"
        mode: "0644"
        run_as: "${USER}"
    chrome-cdp-step-8:
        run: copy=chrome-windows/rules.json
        copy: chrome-windows/rules.json
        to: "${HOME}/.local/share/chrome-windows/rules.json"
        mode: "0644"
        run_as: "${USER}"
    chrome-cdp-step-9:
        run: copy=chrome-windows/content.js
        copy: chrome-windows/content.js
        to: "${HOME}/.local/share/chrome-windows/content.js"
        mode: "0644"
        run_as: "${USER}"
    chrome-cdp-step-10:
        run: link=${HOME}/.local/bin/google-chrome-stable
        link: "${HOME}/.local/bin/google-chrome-stable"
        target: chrome-wrapper
        run_as: "${USER}"
    chrome-cdp-step-11:
        check: the chrome-wrapper launcher is installed and executable in the user's local bin
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/chrome-wrapper
            exists: true
            mode: "0755"
    chrome-cdp-step-12:
        check: the wrapper enables Chrome's CDP on the internal debugging port 9223
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/chrome-wrapper
            contains:
                - contains: "remote-debugging-port=9223"
    chrome-cdp-step-13:
        check: the wrapper spoofs a Windows user-agent for cross-site compatibility
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/chrome-wrapper
            contains:
                - contains: "Windows NT 10.0"
    chrome-cdp-step-14:
        check: the cdp-proxy forwarder script is installed and forwards published 9222 to internal 9223
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/cdp-proxy
            exists: true
            contains:
                - contains: "LISTEN_PORT = 9222"
                - contains: "TARGET_PORT = 9223"
    chrome-cdp-step-15:
        check: the browser-open helper that $BROWSER points at is installed and executable
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/browser-open
            exists: true
            mode: "0755"
    chrome-cdp-step-16:
        check: the chrome-windows extension manifest is staged under the user's data dir
        plugin: file
        plugin_input:
            file: ${HOME}/.local/share/chrome-windows/manifest.json
            exists: true
    chrome-cdp-step-17:
        check: the chrome-windows content script is staged alongside the manifest
        plugin: file
        plugin_input:
            file: ${HOME}/.local/share/chrome-windows/content.js
            exists: true
    chrome-cdp-step-18:
        check: the cdp-proxy service is running under the init system
        context:
            - runtime
        plugin: service
        plugin_input:
            service: cdp-proxy
            running: true
    chrome-cdp-step-19:
        check: Chrome's CDP /json/version endpoint answers HTTP 200 with a websocket debugger URL through the proxy
        timeout: 5s
        eventually: 90s
        retry_interval: 3s
        context:
            - runtime
        plugin: http
        plugin_input:
            http: http://127.0.0.1:${HOST_PORT:9222}/json/version
            status: 200
            body:
                - contains: "webSocketDebuggerUrl"
    browser-open-wrapper:
        check: file=${HOME}/.local/bin/browser-open
        id: browser-open-wrapper
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/browser-open
            exists: true
    cdp-proxy-wrapper:
        check: file=${HOME}/.local/bin/cdp-proxy
        id: cdp-proxy-wrapper
        plugin: file
        plugin_input:
            file: ${HOME}/.local/bin/cdp-proxy
            exists: true
    chrome-cdp-port-2:
        check: addr=127.0.0.1:${HOST_PORT:9222}
        id: chrome-cdp-port
        timeout: 5s
        # Readiness wait: the cdp-proxy comes up shortly after the container
        # starts; poll rather than fire once.
        eventually: 60s
        retry_interval: 2s
        context:
            - runtime
        plugin: addr
        plugin_input:
            addr: 127.0.0.1:${HOST_PORT:9222}
            reachable: true
