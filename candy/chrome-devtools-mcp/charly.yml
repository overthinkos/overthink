chrome-devtools-mcp:
    candy:
        version: 2026.144.1443
        description: |
            Chrome DevTools MCP server exposes browser-automation tools over Streamable HTTP on port 9224
            Installs the chrome-devtools-mcp Node.js server (npm) and the Python
            mcp-proxy bridge (pixi). A supervisord service runs mcp-proxy, which
            bridges the stdio MCP server to Streamable HTTP on port 9224 and points
            chrome-devtools-mcp at Chrome's DevTools Protocol on 127.0.0.1:9222.
            Both binaries are on disk at build time; once Chrome is reachable the
            live endpoint answers MCP pings and advertises the browser-automation
            tool catalog (navigate_page, take_screenshot, ...).
    chrome-devtools-mcp-require:
        require:
            - nodejs
            - supervisord
            # plugin-mcp is the OUT-OF-TREE plugin that serves the `mcp:` check verb
            # (the github.com/modelcontextprotocol/go-sdk MCP CLIENT lives there, not in
            # charly's core check surface). This candy AUTHORS `mcp:` checks, so requiring
            # plugin-mcp puts it in every composing image's scanned candy set; the host's
            # collectReferencedPluginWords then build-connects it before the baked `mcp:`
            # checks dispatch — otherwise they SKIP with `unknown verb "mcp"`. (box/<distro>
            # adopts the matching @github pin via reconcile later — the deliberate cross-repo
            # lag; the R10 bed loads the LOCAL candy via the superproject override.)
            - plugin-mcp
    chrome-devtools-mcp-port:
        port:
            - 9224
    chrome-devtools-mcp-mcp_provide:
        mcp_provide:
            - name: chrome-devtools
              url: "http://{{.ContainerName}}:9224/mcp"
              transport: http
    chrome-devtools-mcp-service:
        service:
            - name: chrome-devtools-mcp
              exec: "%(ENV_HOME)s/.pixi/envs/default/bin/mcp-proxy --host 0.0.0.0 --port 9224 -- %(ENV_HOME)s/.npm-global/bin/chrome-devtools-mcp --browser-url http://127.0.0.1:9222 --no-usage-statistics"
              restart: always
              enable: true
              scope: system
    chrome-devtools-mcp-step-0:
        check: the chrome-devtools-mcp server binary is installed under the npm global prefix
        plugin: file
        plugin_input:
            file: ${HOME}/.npm-global/bin/chrome-devtools-mcp
            exists: true
    chrome-devtools-mcp-step-1:
        check: the mcp-proxy stdio-to-HTTP bridge binary is installed in the pixi env
        plugin: file
        plugin_input:
            file: ${HOME}/.pixi/envs/default/bin/mcp-proxy
            exists: true
    chrome-devtools-mcp-step-2:
        check: the MCP endpoint answers a protocol ping on port 9224
        mcp: ping
        timeout: 30s
        eventually: 90s
        retry_interval: 3s
        context:
            - runtime
    chrome-devtools-mcp-step-3:
        check: the advertised tool catalog includes the core browser-automation tools
        mcp: list-tools
        eventually: 90s
        retry_interval: 3s
        stdout:
            - contains: navigate_page
            - contains: take_screenshot
        context:
            - runtime
    chrome-devtools-mcp-step-4:
        agent-check: navigation and screenshot calls drive a live Chrome session via the DevTools Protocol
    chrome-devtools-mcp-service-2:
        check: service=chrome-devtools-mcp
        id: chrome-devtools-mcp-service
        context:
            - runtime
        plugin: service
        plugin_input:
            service: chrome-devtools-mcp
            running: true
    chrome-devtools-mcp-port-2:
        check: addr=127.0.0.1:${HOST_PORT:9224}
        id: chrome-devtools-mcp-port
        timeout: 5s
        # Readiness wait: the mcp-proxy binds 9224 shortly after start.
        eventually: 60s
        retry_interval: 2s
        context:
            - runtime
        plugin: addr
        plugin_input:
            addr: 127.0.0.1:${HOST_PORT:9224}
            reachable: true
