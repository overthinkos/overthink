candy:
    version: 2026.144.1443
    name: chrome-devtools-mcp
    description:
        feature: Chrome DevTools MCP server exposes browser-automation tools over Streamable HTTP on port 9224
        narrative: |
            Installs the chrome-devtools-mcp Node.js server (npm) and the Python
            mcp-proxy bridge (pixi). A supervisord service runs mcp-proxy, which
            bridges the stdio MCP server to Streamable HTTP on port 9224 and points
            chrome-devtools-mcp at Chrome's DevTools Protocol on 127.0.0.1:9222.
            Both binaries are on disk at build time; once Chrome is reachable the
            live endpoint answers MCP pings and advertises the browser-automation
            tool catalog (navigate_page, take_screenshot, ...).
        tag: [working]
    require:
        - nodejs
        - supervisord
    port:
        - 9224
    mcp_provide:
        - name: chrome-devtools
          url: "http://{{.ContainerName}}:9224/mcp"
          transport: http
    service:
        - name: chrome-devtools-mcp
          exec: "%(ENV_HOME)s/.pixi/envs/default/bin/mcp-proxy --host 0.0.0.0 --port 9224 -- %(ENV_HOME)s/.npm-global/bin/chrome-devtools-mcp --browser-url http://127.0.0.1:9222 --no-usage-statistics"
          restart: always
          enable: true
          scope: system
    scenario:
        # DETERMINISTIC (build-scope file checks): the two binaries the
        # dual builder (npm + pixi) drops on disk. Fail if nothing installed.
        - name: mcp-server-binary-installed
          step:
            - then: the chrome-devtools-mcp server binary is installed under the npm global prefix
              file: ${HOME}/.npm-global/bin/chrome-devtools-mcp
              exists: true
        - name: mcp-proxy-bridge-installed
          step:
            - then: the mcp-proxy stdio-to-HTTP bridge binary is installed in the pixi env
              file: ${HOME}/.pixi/envs/default/bin/mcp-proxy
              exists: true
        # DETERMINISTIC (deploy-scope mcp probes): the running endpoint answers
        # the protocol and advertises the browser-automation tools. Agent-graded
        # for the free-form "Chrome session reachable" prose step.
        - name: browser-tools-exposed-over-http
          step:
            - then: the MCP endpoint answers a protocol ping on port 9224
              mcp: ping
              timeout: 10s
              eventually: 90s
              retry_interval: 3s
              context:
                - runtime
            - then: the advertised tool catalog includes the core browser-automation tools
              mcp: list-tools
              eventually: 90s
              retry_interval: 3s
              stdout:
                - contains: navigate_page
                - contains: take_screenshot
              context:
                - runtime
            - then: navigation and screenshot calls drive a live Chrome session via the DevTools Protocol
        - name: chrome-devtools-mcp-binary
          step:
            - id: chrome-devtools-mcp-binary
              file: ${HOME}/.npm-global/bin/chrome-devtools-mcp
              exists: true
        - name: mcp-proxy-binary
          step:
            - id: mcp-proxy-binary
              file: ${HOME}/.pixi/envs/default/bin/mcp-proxy
              exists: true
        - name: chrome-devtools-mcp-service
          step:
            - id: chrome-devtools-mcp-service
              service: chrome-devtools-mcp
              running: true
              context:
                - runtime
        - name: chrome-devtools-mcp-port
          step:
            - id: chrome-devtools-mcp-port
              addr: 127.0.0.1:${HOST_PORT:9224}
              reachable: true
              timeout: 5s
              # Readiness wait: the mcp-proxy binds 9224 shortly after start.
              eventually: 60s
              retry_interval: 2s
              context:
                - runtime
        - name: mcp-chrome-devtools-ping
          step:
            # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
            # Runs only under `charly eval live <image>` (deploy-scope). No `call` test — the
            # chrome-devtools tools need a live Chrome session; ping + tool-catalog are
            # safe non-destructive probes.
            # Readiness waits: the MCP server proxies to Chrome's CDP (--browser-url
            # 9222), so its liveness depends on Chrome being up — poll until ready.
            - id: mcp-chrome-devtools-ping
              mcp: ping
              timeout: 10s
              eventually: 90s
              retry_interval: 3s
              context:
                - runtime
        - name: mcp-chrome-devtools-list-tools
          step:
            - id: mcp-chrome-devtools-list-tools
              mcp: list-tools
              eventually: 90s
              retry_interval: 3s
              stdout:
                - contains: navigate_page
                - contains: take_screenshot
              context:
                - runtime
