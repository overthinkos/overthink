candy:
    version: 2026.144.1443
    name: chrome-sway
    description:
        feature: Sway autostarts the Chrome CDP browser via a config.d drop-in that execs chrome-wrapper
        narrative: |
            A composition candy with one install of its own: a Sway config.d
            drop-in (chrome-sway.conf) holding `exec chrome-wrapper`, so the
            compositor launches Chrome on startup. It composes /charly-selkies:sway
            (the headless compositor that reads config.d), /charly-selkies:chrome
            (the browser), and /charly-selkies:chrome-cdp (which installs the
            chrome-wrapper launcher the snippet execs). Every fact below is
            observable: the installed drop-in, its exec directive, the
            chrome-wrapper target it references, and the composed Chrome + Sway
            binaries the autostart depends on.
        tag: [working]
    require:
        - sway
    candy:
        - chrome
        - chrome-cdp
    task:
        - mkdir: "${HOME}/.config/sway/config.d"
          run_as: "${USER}"
        - copy: chrome-sway.conf
          to: "${HOME}/.config/sway/config.d/chrome-sway.conf"
          mode: "0644"
          run_as: "${USER}"
    scenario:
        - name: sway-autostarts-chrome-via-dropin
          step:
            - then: the chrome-sway autostart snippet is installed in sway's config.d drop-in dir
              file: ${HOME}/.config/sway/config.d/chrome-sway.conf
              exists: true
              mode: "0644"
            - then: the snippet tells sway to exec the chrome-wrapper launcher on startup
              file: ${HOME}/.config/sway/config.d/chrome-sway.conf
              contains:
                - contains: "exec chrome-wrapper"
            - then: the chrome-wrapper launcher the snippet execs is installed and executable
              file: ${HOME}/.local/bin/chrome-wrapper
              exists: true
              mode: "0755"
        - name: browser-and-compositor-composed
          step:
            - then: Google Chrome is installed for the compositor to launch
              file: /usr/bin/google-chrome-stable
              exists: true
            - then: the sway compositor that reads the config.d drop-in is installed
              file: /usr/bin/sway
              exists: true
        - name: chrome-sway-config
          step:
            - id: chrome-sway-config
              file: ${HOME}/.config/sway/config.d/chrome-sway.conf
              exists: true
              mode: "0644"
        - name: chrome-sway-autostart-directive
          step:
            - id: chrome-sway-autostart-directive
              file: ${HOME}/.config/sway/config.d/chrome-sway.conf
              contains:
                - contains: "exec chrome-wrapper"
        - name: chrome-sway-wrapper-target
          step:
            - id: chrome-sway-wrapper-target
              file: ${HOME}/.local/bin/chrome-wrapper
              exists: true
              mode: "0755"
        - name: chrome-sway-chrome-binary
          step:
            - id: chrome-sway-chrome-binary
              file: /usr/bin/google-chrome-stable
              exists: true
        - name: chrome-sway-sway-binary
          step:
            - id: chrome-sway-sway-binary
              file: /usr/bin/sway
              exists: true
