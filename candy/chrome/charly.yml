chrome:
    candy:
        version: 2026.168.0936
        description: |
            Installs the Google Chrome browser cross-distro as a runnable binary at a stable path.
            Google Chrome browser package. Cross-distro: pulls from Google's
            direct RPM repo on Fedora, the AUR on Arch/CachyOS. Lands the
            google-chrome-stable binary plus its desktop entry, and best-effort
            registers it as the default web browser via xdg-settings. No CDP
            scaffolding, no supervisord — for headless container CDP automation,
            compose /charly-selkies:chrome-cdp on top. Verifiable: the binary
            exists at a fixed path, the package is installed, and it ships its
            .desktop entry. (A `--version` invocation is NOT a reliable check —
            when chrome-cdp wraps the binary it launches a full browser instead of
            printing a version banner, contending with the running desktop chrome.)
    chrome-env:
        env:
            CHROME_FLAGS: "--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks"
    chrome-env_accept:
        env_accept:
            - name: HTTP_PROXY
              description: "HTTP proxy URL for Chrome (e.g., http://proxy:8080)"
            - name: HTTPS_PROXY
              description: "HTTPS proxy URL for Chrome (e.g., http://proxy:8080)"
            - name: NO_PROXY
              description: "Comma-separated bypass list (e.g., localhost,127.0.0.1,.internal)"
    chrome-security:
        security:
            shm_size: "1g"
            memory_max: "6g"
            memory_high: "5g"
            memory_swap_max: "2g"
    chrome-package:
        package:
            - alsa-lib
            - at-spi2-core
            - gtk3
            - libdrm
            - libxkbcommon
            - nss
            - procps-ng
            - libva-utils
    chrome-distro:
        distro:
            arch:
                package:
                    - vulkan-icd-loader
                    - mesa
                    - libcups
                    - iproute2
                aur:
                    package:
                        - google-chrome
            fedora:
                package:
                    - vulkan-loader
                    - mesa-dri-drivers
                    - cups-libs
                    - iproute
                    - google-chrome-stable
                repo:
                    - name: google-chrome
                      url: "https://dl.google.com/linux/chrome/rpm/stable/x86_64"
                      gpgkey: "https://dl.google.com/linux/linux_signing_key.pub"
    chrome-volume:
        volume:
            - name: chrome-data
              path: "~/.chrome-debug"
    chrome-step-0:
        run: command=BROWSER= xdg-settings set default-web-browser google-chrome.desktop || true
        run_as: "${USER}"
        plugin: command
        plugin_input:
            command: BROWSER= xdg-settings set default-web-browser google-chrome.desktop || true
    chrome-step-1:
        check: the google-chrome-stable binary is present at its canonical path
        plugin: file
        plugin_input:
            file: /usr/bin/google-chrome-stable
            exists: true
    chrome-step-2:
        check: the google-chrome.desktop entry the default-browser task references is installed
        plugin: file
        plugin_input:
            file: /usr/share/applications/google-chrome.desktop
            exists: true
    chrome-package-installed:
        check: package=google-chrome-stable
        id: chrome-package-installed
        plugin: package
        plugin_input:
            package: google-chrome-stable
            package_map:
                arch: google-chrome
                fedora: google-chrome-stable
            installed: true
