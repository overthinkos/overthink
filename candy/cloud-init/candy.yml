candy:
    version: 2026.144.1443
    name: cloud-init
    require:
        - sshd
    package:
        - cloud-init
    distro:
        arch:
            package:
                - cloud-guest-utils
        debian:
            package:
                - cloud-guest-utils
        fedora:
            package:
                - cloud-utils-growpart
        ubuntu:
            package:
                - cloud-guest-utils
    task:
        - mkdir: /etc/cloud/cloud.cfg.d
          user: root
        - write: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
          mode: "0644"
          user: root
          content: |
            datasource_list: [ NoCloud, None ]
    service:
        - name: cloud-init-local
          use_packaged: cloud-init-local.service
          enable: true
          scope: system
        - name: cloud-init
          use_packaged: cloud-init.service
          enable: true
          scope: system
        - name: cloud-config
          use_packaged: cloud-config.service
          enable: true
          scope: system
        - name: cloud-final
          use_packaged: cloud-final.service
          enable: true
          scope: system
