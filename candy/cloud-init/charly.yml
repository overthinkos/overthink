candy:
    version: 2026.144.1443
    name: cloud-init
    description:
        feature: Cloud-init NoCloud provisioning for first-boot VM/cloud instance bootstrap.
        narrative: |
            Installs cloud-init and the growpart partition-resize utility, then
            pins the datasource to NoCloud via a drop-in at
            /etc/cloud/cloud.cfg.d/99-nocloud.cfg so a bootc/VM guest reads its
            seed ISO (user-data/meta-data) at first boot. The cloud-init binary,
            the growpart binary, and the NoCloud drop-in are all baked into the
            image and independently checkable.
        tag: [working]
        scenario:
            - name: cloud-init-binary-installed
              step:
                - then: the cloud-init binary is present in the image
                  file: /usr/bin/cloud-init
                  exists: true
                - then: cloud-init responds to --version with a version string
                  command: cloud-init --version 2>&1
                  exit_status: 0
                  stdout:
                    - matches: '[0-9]+\.[0-9]'
            - name: nocloud-datasource-pinned
              step:
                - then: the NoCloud datasource drop-in is installed mode 0644
                  file: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
                  exists: true
                  mode: "0644"
                - then: the drop-in restricts the datasource list to NoCloud
                  file: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
                  contains:
                    - contains: datasource_list
                    - contains: NoCloud
            - name: growpart-utility-available
              step:
                - then: the growpart partition-resize utility is installed
                  file: /usr/bin/growpart
                  exists: true
    require:
        - sshd
    package:
        - cloud-init
    distro:
        arch:
            package:
                - cloud-guest-utils
        debian:
            package:
                - cloud-guest-utils
        fedora:
            package:
                - cloud-utils-growpart
        ubuntu:
            package:
                - cloud-guest-utils
    task:
        - mkdir: /etc/cloud/cloud.cfg.d
          user: root
        - write: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
          mode: "0644"
          user: root
          content: |
            datasource_list: [ NoCloud, None ]
    service:
        - name: cloud-init-local
          use_packaged: cloud-init-local.service
          enable: true
          scope: system
        - name: cloud-init
          use_packaged: cloud-init.service
          enable: true
          scope: system
        - name: cloud-config
          use_packaged: cloud-config.service
          enable: true
          scope: system
        - name: cloud-final
          use_packaged: cloud-final.service
          enable: true
          scope: system
    eval:
        - id: cloud-init-binary
          file: /usr/bin/cloud-init
          exists: true
        - id: cloud-init-package
          package: cloud-init
          installed: true
        - id: cloud-init-version
          command: cloud-init --version 2>&1
          exit_status: 0
          stdout:
            - matches: '[0-9]+\.[0-9]'
        - id: cloud-init-nocloud-datasource
          file: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
          exists: true
          mode: "0644"
          contains:
            - contains: datasource_list
            - contains: NoCloud
            - contains: None
        - id: cloud-init-growpart-binary
          file: /usr/bin/growpart
          exists: true
        - id: cloud-init-growpart-package
          package: cloud-utils-growpart
          package_map:
            arch: cloud-guest-utils
            debian: cloud-guest-utils
            ubuntu: cloud-guest-utils
            fedora: cloud-utils-growpart
          installed: true
