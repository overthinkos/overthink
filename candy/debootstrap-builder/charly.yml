candy:
    version: 2026.144.1443
    name: debootstrap-builder
    description: |
        Privileged builder toolchain that bootstraps and makes bootable a Debian-family rootfs from scratch
        Tools needed to bootstrap a Debian-family rootfs from scratch via
        debootstrap, partition a VM disk, and install grub-efi for a
        bootable Debian/Ubuntu system. Used as the layer composition for
        the debian-debootstrap-builder / ubuntu-debootstrap-builder images,
        which run as privileged containers under `charly box build` and
        `charly vm build` for kind:bootstrap source kinds.

        Counterpart of candy/pacstrap-builder; both compose the same
        disk-build toolchain (qemu-img + parted + mkfs + grub-efi) plus
        the family-specific bootstrap tool. Verifiable at build scope: each
        tool ships a named binary on PATH and a registered dpkg package.
    package:
        - debootstrap
        - debian-archive-keyring
        - ubuntu-keyring
        - qemu-utils
        - dosfstools
        - e2fsprogs
        - xfsprogs
        - btrfs-progs
        - parted
        - util-linux
        - grub-efi-amd64-bin
        - grub-common
        - efibootmgr
        - mount
        - ca-certificates
    plan:
        - check: the debootstrap bootstrap tool is installed at /usr/sbin/debootstrap
          file: /usr/sbin/debootstrap
          exists: true
        - check: the debootstrap package is registered in the dpkg database
          package: debootstrap
          installed: true
        - check: qemu-img is available to create and convert the VM disk image
          file: /usr/bin/qemu-img
          exists: true
        - check: qemu-img runs and reports its version
          command: /usr/bin/qemu-img --version
          stdout: qemu-img version
        - check: parted is available to partition the disk image
          file: /usr/sbin/parted
          exists: true
        - check: grub-install is present to write the EFI bootloader into the rootfs
          file: /usr/sbin/grub-install
          exists: true
        - check: efibootmgr is installed to register the EFI boot entry
          package: efibootmgr
          installed: true
        - check: package=e2fsprogs
          id: debootstrap-builder-e2fsprogs-package
          package: e2fsprogs
          installed: true
        - check: package=dosfstools
          id: debootstrap-builder-dosfstools-package
          package: dosfstools
          installed: true
