debug-tools:
    candy:
        version: 2026.144.1443
        description: |
            In-container debug toolkit — network, process, file, and system-stats probes for inspecting deployed services from the inside
            Installs a distro-agnostic debugging toolkit so an operator can
            inspect a deployed service from inside the container without
            re-deploying. Network probes (ip/ss/lsof/ping/dig/nc/socat/tcpdump/
            traceroute/mtr/wget), process inspection (ps/top/htop/pgrep/free/
            vmstat/strace/ltrace), file/text inspection (file/tree/xxd/vim/nano),
            system stats (iotop/iftop/sysstat), and session helpers (tmux/rsync).
            Every headline binary lands at a fixed path, so its presence is
            directly verifiable. rpm/deb/pac sections cover Fedora/Debian/Ubuntu/Arch.
    debug-tools-distro:
        # Distro-specific package lists. Tool names diverge across distros
        # (e.g. nmap-ncat vs ncat vs gnu-netcat) so per-distro lists are the
        # honest authoring path — no synthetic "common" package list that
        # would silently install nothing on the wrong distro.
        distro:
            fedora:
                package:
                    # Process inspection
                    - procps-ng # ps, top, kill, pkill, pgrep, free, vmstat, watch
                    - htop
                    - iotop
                    - iftop
                    - strace
                    - ltrace
                    - sysstat # iostat, mpstat, pidstat, sar
                    # Network
                    - iproute # ip, ss, tc
                    - net-tools # netstat, ifconfig (deprecated but expected)
                    - bind-utils # dig, nslookup, host
                    - iputils # ping, ping6, tracepath, arping
                    - nmap-ncat # nc
                    - socat
                    - tcpdump
                    - traceroute
                    - mtr
                    - wget
                    - lsof
                    # File / text inspection
                    - file
                    - tree
                    - vim-enhanced # full vim (provides /usr/bin/vim + xxd via vim-common dep)
                    - nano
                    # Session helpers
                    - tmux
                    - rsync
                    - yq # YAML manipulator (Fedora ships a Python yq)
            arch:
                package:
                    - procps-ng
                    - htop
                    - iotop
                    - iftop
                    - strace
                    - ltrace
                    - sysstat
                    - iproute2
                    - net-tools
                    - bind-tools # dig, nslookup, host
                    - iputils
                    - openbsd-netcat # nc (Arch extra ships openbsd-netcat; gnu-netcat is AUR-only)
                    - socat
                    - tcpdump
                    - traceroute
                    - mtr
                    - wget
                    - lsof
                    - file
                    - tree
                    - vim
                    - nano
                    - tmux
                    - rsync
                    - go-yq # mikefarah/yq Go implementation
            debian:
                package:
                    - procps
                    - htop
                    - iotop
                    - iftop
                    - strace
                    - ltrace
                    - sysstat
                    - iproute2
                    - net-tools
                    - dnsutils # dig, nslookup, host
                    - iputils-ping
                    - ncat # nc
                    - socat
                    - tcpdump
                    - traceroute
                    - mtr-tiny
                    - wget
                    - lsof
                    - file
                    - tree
                    - vim
                    - nano
                    - tmux
                    - rsync
                    # yq omitted — Debian/Ubuntu ship it via snap; install via pixi
                    # if a yq workflow becomes essential.
            ubuntu:
                package:
                    - procps
                    - htop
                    - iotop
                    - iftop
                    - strace
                    - ltrace
                    - sysstat
                    - iproute2
                    - net-tools
                    - dnsutils
                    - iputils-ping
                    - ncat
                    - socat
                    - tcpdump
                    - traceroute
                    - mtr-tiny
                    - wget
                    - lsof
                    - file
                    - tree
                    - vim
                    - nano
                    - tmux
                    - rsync
    debug-tools-step-0:
        check: the DNS lookup tool dig is present for probing service discovery
        plugin: file
        plugin_input:
            file: /usr/bin/dig
            exists: true
    debug-tools-step-1:
        check: the socket-statistics tool ss is present for inspecting listening ports
        plugin: file
        plugin_input:
            file: /usr/sbin/ss
            exists: true
    debug-tools-step-2:
        check: tcpdump is present for capturing traffic between services
        plugin: file
        plugin_input:
            file: /usr/sbin/tcpdump
            exists: true
    debug-tools-step-3:
        check: the process-table tool ps is available to list running processes
        plugin: file
        plugin_input:
            file: /usr/bin/ps
            exists: true
    debug-tools-step-4:
        check: the interactive process monitor htop is available
        plugin: file
        plugin_input:
            file: /usr/bin/htop
            exists: true
    debug-tools-step-5:
        check: the syscall tracer strace is available to debug a stuck process
        plugin: file
        plugin_input:
            file: /usr/bin/strace
            exists: true
    debug-tools-step-6:
        check: an editor (vim) is present so config files can be inspected in place
        plugin: file
        plugin_input:
            file: /usr/bin/vim
            exists: true
    debug-tools-step-7:
        check: tmux is present so a long-running probe survives a dropped exec session
        plugin: file
        plugin_input:
            file: /usr/bin/tmux
            exists: true
    debug-tools-step-8:
        check: lsof is present to report which process holds an open file or socket
        plugin: file
        plugin_input:
            file: /usr/bin/lsof
            exists: true
    ping-binary:
        check: command=command -v ping
        id: ping-binary
        exit_status: 0
        plugin: command
        plugin_input:
            command: command -v ping
    nc-binary:
        check: command=command -v nc
        id: nc-binary
        exit_status: 0
        plugin: command
        plugin_input:
            command: command -v nc
    nano-binary:
        check: file=/usr/bin/nano
        id: nano-binary
        plugin: file
        plugin_input:
            file: /usr/bin/nano
            exists: true
    tree-binary:
        check: file=/usr/bin/tree
        id: tree-binary
        plugin: file
        plugin_input:
            file: /usr/bin/tree
            exists: true
    wget-binary:
        check: file=/usr/bin/wget
        id: wget-binary
        plugin: file
        plugin_input:
            file: /usr/bin/wget
            exists: true
    file-binary:
        check: file=/usr/bin/file
        id: file-binary
        plugin: file
        plugin_input:
            file: /usr/bin/file
            exists: true
    rsync-binary:
        check: file=/usr/bin/rsync
        id: rsync-binary
        plugin: file
        plugin_input:
            file: /usr/bin/rsync
            exists: true
    procps-package:
        check: package=procps-ng
        id: procps-package
        plugin: package
        plugin_input:
            package: procps-ng
            package_map:
                fedora: procps-ng
                arch: procps-ng
                debian: procps
                ubuntu: procps
            installed: true
    htop-package:
        check: package=htop
        id: htop-package
        plugin: package
        plugin_input:
            package: htop
            installed: true
    strace-package:
        check: package=strace
        id: strace-package
        plugin: package
        plugin_input:
            package: strace
            installed: true
    tcpdump-package:
        check: package=tcpdump
        id: tcpdump-package
        plugin: package
        plugin_input:
            package: tcpdump
            installed: true
    tmux-package:
        check: package=tmux
        id: tmux-package
        plugin: package
        plugin_input:
            package: tmux
            installed: true
    lsof-package:
        check: package=lsof
        id: lsof-package
        plugin: package
        plugin_input:
            package: lsof
            installed: true
