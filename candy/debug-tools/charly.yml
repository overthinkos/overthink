candy:
    version: 2026.144.1443
    name: debug-tools
    description: |
        In-container debug toolkit — network, process, file, and system-stats probes for inspecting deployed services from the inside
        Installs a distro-agnostic debugging toolkit so an operator can
        inspect a deployed service from inside the container without
        re-deploying. Network probes (ip/ss/lsof/ping/dig/nc/socat/tcpdump/
        traceroute/mtr/wget), process inspection (ps/top/htop/pgrep/free/
        vmstat/strace/ltrace), file/text inspection (file/tree/xxd/vim/nano),
        system stats (iotop/iftop/sysstat), and session helpers (tmux/rsync).
        Every headline binary lands at a fixed path, so its presence is
        directly verifiable. rpm/deb/pac sections cover Fedora/Debian/Ubuntu/Arch.
    # Distro-specific package lists. Tool names diverge across distros
    # (e.g. nmap-ncat vs ncat vs gnu-netcat) so per-distro lists are the
    # honest authoring path — no synthetic "common" package list that
    # would silently install nothing on the wrong distro.
    distro:
        fedora:
            package:
                # Process inspection
                - procps-ng # ps, top, kill, pkill, pgrep, free, vmstat, watch
                - htop
                - iotop
                - iftop
                - strace
                - ltrace
                - sysstat # iostat, mpstat, pidstat, sar
                # Network
                - iproute # ip, ss, tc
                - net-tools # netstat, ifconfig (deprecated but expected)
                - bind-utils # dig, nslookup, host
                - iputils # ping, ping6, tracepath, arping
                - nmap-ncat # nc
                - socat
                - tcpdump
                - traceroute
                - mtr
                - wget
                - lsof
                # File / text inspection
                - file
                - tree
                - vim-enhanced # full vim (provides /usr/bin/vim + xxd via vim-common dep)
                - nano
                # Session helpers
                - tmux
                - rsync
                - yq # YAML manipulator (Fedora ships a Python yq)
        arch:
            package:
                - procps-ng
                - htop
                - iotop
                - iftop
                - strace
                - ltrace
                - sysstat
                - iproute2
                - net-tools
                - bind-tools # dig, nslookup, host
                - iputils
                - openbsd-netcat # nc (Arch extra ships openbsd-netcat; gnu-netcat is AUR-only)
                - socat
                - tcpdump
                - traceroute
                - mtr
                - wget
                - lsof
                - file
                - tree
                - vim
                - nano
                - tmux
                - rsync
                - go-yq # mikefarah/yq Go implementation
        debian:
            package:
                - procps
                - htop
                - iotop
                - iftop
                - strace
                - ltrace
                - sysstat
                - iproute2
                - net-tools
                - dnsutils # dig, nslookup, host
                - iputils-ping
                - ncat # nc
                - socat
                - tcpdump
                - traceroute
                - mtr-tiny
                - wget
                - lsof
                - file
                - tree
                - vim
                - nano
                - tmux
                - rsync
                # yq omitted — Debian/Ubuntu ship it via snap; install via pixi
                # if a yq workflow becomes essential.
        ubuntu:
            package:
                - procps
                - htop
                - iotop
                - iftop
                - strace
                - ltrace
                - sysstat
                - iproute2
                - net-tools
                - dnsutils
                - iputils-ping
                - ncat
                - socat
                - tcpdump
                - traceroute
                - mtr-tiny
                - wget
                - lsof
                - file
                - tree
                - vim
                - nano
                - tmux
                - rsync
    plan:
        - check: the DNS lookup tool dig is present for probing service discovery
          file: /usr/bin/dig
          exists: true
        - check: the socket-statistics tool ss is present for inspecting listening ports
          file: /usr/sbin/ss
          exists: true
        - check: tcpdump is present for capturing traffic between services
          file: /usr/sbin/tcpdump
          exists: true
        - check: the process-table tool ps is available to list running processes
          file: /usr/bin/ps
          exists: true
        - check: the interactive process monitor htop is available
          file: /usr/bin/htop
          exists: true
        - check: the syscall tracer strace is available to debug a stuck process
          file: /usr/bin/strace
          exists: true
        - check: an editor (vim) is present so config files can be inspected in place
          file: /usr/bin/vim
          exists: true
        - check: tmux is present so a long-running probe survives a dropped exec session
          file: /usr/bin/tmux
          exists: true
        - check: lsof is present to report which process holds an open file or socket
          file: /usr/bin/lsof
          exists: true
        - check: command=command -v ping
          id: ping-binary
          command: command -v ping
          exit_status: 0
        - check: command=command -v nc
          id: nc-binary
          command: command -v nc
          exit_status: 0
        - check: file=/usr/bin/nano
          id: nano-binary
          file: /usr/bin/nano
          exists: true
        - check: file=/usr/bin/tree
          id: tree-binary
          file: /usr/bin/tree
          exists: true
        - check: file=/usr/bin/wget
          id: wget-binary
          file: /usr/bin/wget
          exists: true
        - check: file=/usr/bin/file
          id: file-binary
          file: /usr/bin/file
          exists: true
        - check: file=/usr/bin/rsync
          id: rsync-binary
          file: /usr/bin/rsync
          exists: true
        - check: package=procps-ng
          id: procps-package
          package: procps-ng
          package_map:
            fedora: procps-ng
            arch: procps-ng
            debian: procps
            ubuntu: procps
          installed: true
        - check: package=htop
          id: htop-package
          package: htop
          installed: true
        - check: package=strace
          id: strace-package
          package: strace
          installed: true
        - check: package=tcpdump
          id: tcpdump-package
          package: tcpdump
          installed: true
        - check: package=tmux
          id: tmux-package
          package: tmux
          installed: true
        - check: package=lsof
          id: lsof-package
          package: lsof
          installed: true
