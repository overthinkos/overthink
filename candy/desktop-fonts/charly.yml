desktop-fonts:
    candy:
        version: 2026.144.1443
        description: |
            JetBrains Mono coding font, Liberation web fonts, and Nerd Fonts symbols installed system-wide
            Installs three font families from each distro's packages: the
            JetBrains Mono coding font (waybar/swaync default), the Liberation
            serif/sans/mono web-font family (Chrome's sans rendering fallback),
            and the Nerd Fonts symbol set (waybar/swaync icon glyphs). Each font
            ships as an installed OS package, so its presence is verifiable by
            querying the package database; cross-distro package names (Arch
            ttf-* vs Fedora *-fonts) are resolved per-distro via package_map.
    desktop-fonts-distro:
        distro:
            arch:
                package:
                    - ttf-jetbrains-mono
                    - ttf-liberation
                    - ttf-nerd-fonts-symbols
                    - ttf-nerd-fonts-symbols-mono
            fedora:
                package:
                    - jetbrains-mono-fonts
                    - liberation-fonts
                    - nerd-fonts
                copr:
                    - che/nerd-fonts
    desktop-fonts-step-0:
        check: the JetBrains Mono coding-font package is installed for waybar and swaync
        plugin: package
        plugin_input:
            package: jetbrains-mono-fonts
            package_map:
                arch: ttf-jetbrains-mono
                fedora: jetbrains-mono-fonts
            installed: true
    desktop-fonts-step-1:
        check: the Liberation web-font family Chrome falls back to for sans rendering is installed
        plugin: package
        plugin_input:
            package: liberation-sans-fonts
            package_map:
                arch: ttf-liberation
                fedora: liberation-sans-fonts
            installed: true
    desktop-fonts-step-2:
        check: the Nerd Fonts symbol set providing waybar and swaync icon glyphs is installed
        plugin: package
        plugin_input:
            package: nerd-fonts
            package_map:
                arch: ttf-nerd-fonts-symbols
                fedora: nerd-fonts
            installed: true
