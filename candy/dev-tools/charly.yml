candy:
    version: 2026.159.1803
    name: dev-tools
    description:
        feature: Cross-distro developer CLI toolkit (search, edit, monitor, archive, FUSE) with a normalized bat binary path
        narrative: |
            dev-tools installs a broad set of command-line developer utilities
            (ripgrep, neovim, htop, bat, restic, rclone, yamllint, ...) uniformly
            across Arch, Fedora, Debian, and Ubuntu. A post-install task
            normalizes Debian/Ubuntu's `batcat` binary to /usr/bin/bat so the
            same paths and commands resolve on every distro. Every claim below
            is checkable against the built image: binaries land at fixed paths
            and run.
        tag: [working]
    package:
        - bat
        - bpftrace
        - fdupes
        - html2text
        - htop
        - mosh
        - neovim
        - podman-compose
        - rclone
        - restic
        - ripgrep
        - squashfuse
        - strace
        - sysstat
        - yamllint
        - yq
        - zoxide
    distro:
        arch:
            package:
                - android-tools
                - arch-install-scripts
                - asciinema
                - bcc
                - direnv
                - fastfetch
                - fd
                - fuse2
                - fuse3
                - gopls
                - qemu-desktop
                - shellcheck
        debian:
            package:
                - android-sdk-platform-tools
                - bridge-utils
                - debootstrap
                - fastfetch
                - fd-find
                - libfuse-dev
                - libfuse3-dev
                - qemu-system-x86
                - qemu-user-static
                - qemu-utils
                - shellcheck
        fedora:
            package:
                - android-tools
                - apptainer
                - apptainer-suid
                - arch-install-scripts
                - asciinema
                - bcc
                - bpftop
                - bridge-utils
                - debootstrap
                - direnv
                - dislocker
                - ecryptfs-utils
                - fastfetch
                - fd-find
                - fuse-devel
                - fuse-dislocker
                - fuse3-devel
                - jdupes
                - podman-machine
                - podman-remote
                - podman-tui
                - qemu-kvm
                - qemu-user-binfmt
                - qemu-user-static
                - ShellCheck
                - thefuck
            option:
                - "--setopt=tsflags=noscripts"
        ubuntu:
            # fastfetch is NOT in Ubuntu noble main (Debian trixie + Fedora + Arch
            # ship it under the same name). Under the distro-specificity cascade,
            # packages UNION across the matching chain ([ubuntu:24.04, ubuntu]) —
            # cascade cannot SUBTRACT — so fastfetch must simply never appear on
            # any ubuntu level (express the exclusion structurally, not by a
            # version override that a broader level would re-add).
            package:
                - android-sdk-platform-tools
                - bridge-utils
                - debootstrap
                - fd-find
                - libfuse-dev
                - libfuse3-dev
                - qemu-system-x86
                - qemu-user-static
                - qemu-utils
                - shellcheck
    # Distro-tolerant post-install: Debian/Ubuntu package `bat` installs the
    # binary as /usr/bin/batcat (the `bat` name collides with a legacy Debian
    # utility). Provide /usr/bin/bat as a symlink so downstream docs, scripts,
    # and declarative tests that reference /usr/bin/bat work uniformly. On
    # Fedora/Arch this task is a no-op: /usr/bin/bat already exists from their
    # packages and the `[ ! -e ]` guard short-circuits.
    task:
        - command: |
            if [ -f /usr/bin/batcat ] && [ ! -e /usr/bin/bat ]; then
              ln -sf /usr/bin/batcat /usr/bin/bat
            fi
          run_as: root
    scenario:
        - name: core-search-and-edit-tools-present
          step:
            - then: the ripgrep fast-search binary is on PATH
              file: /usr/bin/rg
              exists: true
            - then: the neovim editor binary is on PATH
              file: /usr/bin/nvim
              exists: true
            - then: the htop process monitor binary is on PATH
              file: /usr/bin/htop
              exists: true
        - name: bat-pager-normalized-across-distros
          step:
            - then: /usr/bin/bat resolves on every distro (native on Fedora/Arch, batcat symlink on Debian/Ubuntu)
              file: /usr/bin/bat
              exists: true
            - then: the bat pager runs and reports its version
              command: bat --version
              exit_status: 0
              stdout:
                - contains: bat
        - name: yaml-tooling-usable
          step:
            - then: the yamllint linter runs and reports its version
              command: yamllint --version
              exit_status: 0
            - then: an engineer can lint a malformed YAML file and have yamllint flag the syntax error
        - name: fastfetch-binary
          step:
            # fastfetch is not in Ubuntu noble main (Debian trixie + Fedora + Arch
            # ship it under the same name). The ubuntu section deliberately omits it
            # (the cascade cannot subtract, so it is absent on EVERY ubuntu level) —
            # skip the probe on ubuntu. exclude_distro matches any of the image's
            # distro tags, so the bare `ubuntu` tag covers ubuntu:24.04 and beyond.
            - id: fastfetch-binary
              file: /usr/bin/fastfetch
              exists: true
              exclude_distro:
                - ubuntu
        - name: gopls-binary
          step:
            # gopls (Go language server) — Go dev tooling for the coder/workstation
            # profiles (charly-cachyos + the distro -coder boxes). Packaged on Arch as
            # `gopls`; the cachyos coder profile is Arch-based. Other distros package
            # it under different names / not at all, so the probe is Arch-scoped until
            # those names are verified on their beds.
            - id: gopls-binary
              file: /usr/bin/gopls
              exists: true
              exclude_distro:
                - debian
                - ubuntu
                - fedora
        - name: neovim-package
          step:
            # neovim ships under the same package name on every distro (top-level
            # `package:` base), so a bare package check needs no package_map.
            - id: neovim-package
              package: neovim
              installed: true
