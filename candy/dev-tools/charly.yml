candy:
    version: 2026.159.1803
    name: dev-tools
    description: |
        Cross-distro developer CLI toolkit (search, edit, monitor, archive, FUSE) with a normalized bat binary path
        dev-tools installs a broad set of command-line developer utilities
        (ripgrep, neovim, htop, bat, restic, rclone, yamllint, ...) uniformly
        across Arch, Fedora, Debian, and Ubuntu. A post-install task
        normalizes Debian/Ubuntu's `batcat` binary to /usr/bin/bat so the
        same paths and commands resolve on every distro. Every claim below
        is checkable against the built image: binaries land at fixed paths
        and run.
    package:
        - bat
        - bpftrace
        - fdupes
        - html2text
        - htop
        - mosh
        - neovim
        - podman-compose
        - rclone
        - restic
        - ripgrep
        - squashfuse
        - strace
        - sysstat
        - yamllint
        - yq
        - zoxide
    distro:
        arch:
            package:
                - android-tools
                - arch-install-scripts
                - asciinema
                - bcc
                - direnv
                - fastfetch
                - fd
                - fuse2
                - fuse3
                - gopls
                - qemu-desktop
                - shellcheck
        debian:
            package:
                - android-sdk-platform-tools
                - bridge-utils
                - debootstrap
                - fastfetch
                - fd-find
                - libfuse-dev
                - libfuse3-dev
                - qemu-system-x86
                - qemu-user-static
                - qemu-utils
                - shellcheck
        fedora:
            package:
                - android-tools
                - apptainer
                - apptainer-suid
                - arch-install-scripts
                - asciinema
                - bcc
                - bpftop
                - bridge-utils
                - debootstrap
                - direnv
                - dislocker
                - ecryptfs-utils
                - fastfetch
                - fd-find
                - fuse-devel
                - fuse-dislocker
                - fuse3-devel
                - jdupes
                - podman-machine
                - podman-remote
                - podman-tui
                - qemu-kvm
                - qemu-user-binfmt
                - qemu-user-static
                - ShellCheck
                - thefuck
            option:
                - "--setopt=tsflags=noscripts"
        ubuntu:
            # fastfetch is NOT in Ubuntu noble main (Debian trixie + Fedora + Arch
            # ship it under the same name). Under the distro-specificity cascade,
            # packages UNION across the matching chain ([ubuntu:24.04, ubuntu]) —
            # cascade cannot SUBTRACT — so fastfetch must simply never appear on
            # any ubuntu level (express the exclusion structurally, not by a
            # version override that a broader level would re-add).
            package:
                - android-sdk-platform-tools
                - bridge-utils
                - debootstrap
                - fd-find
                - libfuse-dev
                - libfuse3-dev
                - qemu-system-x86
                - qemu-user-static
                - qemu-utils
                - shellcheck
    plan:
        - run: |
            command=if [ -f /usr/bin/batcat ] && [ ! -e /usr/bin/bat ]; then
              ln -sf /usr/bin/batcat /usr/bin/bat
            fi
          command: |
            if [ -f /usr/bin/batcat ] && [ ! -e /usr/bin/bat ]; then
              ln -sf /usr/bin/batcat /usr/bin/bat
            fi
          run_as: root
        - check: the ripgrep fast-search binary is on PATH
          file: /usr/bin/rg
          exists: true
        - check: the neovim editor binary is on PATH
          file: /usr/bin/nvim
          exists: true
        - check: the htop process monitor binary is on PATH
          file: /usr/bin/htop
          exists: true
        - check: /usr/bin/bat resolves on every distro (native on Fedora/Arch, batcat symlink on Debian/Ubuntu)
          file: /usr/bin/bat
          exists: true
        - check: the bat pager runs and reports its version
          command: bat --version
          exit_status: 0
          stdout:
            - contains: bat
        - check: the yamllint linter runs and reports its version
          command: yamllint --version
          exit_status: 0
        - agent-check: an engineer can lint a malformed YAML file and have yamllint flag the syntax error
        - check: file=/usr/bin/fastfetch
          id: fastfetch-binary
          file: /usr/bin/fastfetch
          exists: true
          exclude_distro:
            - ubuntu
        - check: file=/usr/bin/gopls
          id: gopls-binary
          file: /usr/bin/gopls
          exists: true
          exclude_distro:
            - debian
            - ubuntu
            - fedora
        - check: package=neovim
          id: neovim-package
          package: neovim
          installed: true
