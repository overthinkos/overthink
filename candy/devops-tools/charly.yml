devops-tools:
    candy:
        version: 2026.162.1430
        description: |
            provisions cloud and infra CLI tooling (AWS CLI v2, Scaleway CLI, OpenTofu, kubectx/kubens) plus JSON/sync/DNS utilities
            Installs the AWS CLI v2, the Scaleway CLI, OpenTofu, and the
            kubectx/kubens kubectl context switchers as standalone binaries under
            /usr/local/bin, alongside jq, rsync, unzip, and the per-distro DNS
            lookup tools (dig). Every tool lands at a fixed path and reports its
            version, so the composition is verifiable in a disposable container
            without any cloud account or live cluster.
    devops-tools-require:
        require:
            - nodejs
    devops-tools-package:
        package:
            - jq
            - rsync
            - unzip
    devops-tools-distro:
        distro:
            arch:
                package:
                    - bind-tools
            debian:
                package:
                    - dnsutils
            fedora:
                package:
                    - bind-utils
            ubuntu:
                package:
                    - dnsutils
    devops-tools-step-0:
        run: |
            command=curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            cd /tmp && unzip -q awscliv2.zip
            ./aws/install
            rm -rf /tmp/awscliv2.zip /tmp/aws
        run_as: root
        plugin: command
        plugin_input:
            command: |
                curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
                cd /tmp && unzip -q awscliv2.zip
                ./aws/install
                rm -rf /tmp/awscliv2.zip /tmp/aws
    devops-tools-step-1:
        run: |
            command=SCW_URL=$(curl -fsSL https://api.github.com/repos/scaleway/scaleway-cli/releases/latest | grep "browser_download_url.*linux_amd64\"" | grep -v ".sha256" | cut -d'"' -f4)
            [ -z "$SCW_URL" ] && SCW_URL="https://github.com/scaleway/scaleway-cli/releases/download/v2.45.0/scaleway-cli_2.45.0_linux_amd64"
            curl -fsSL "$SCW_URL" -o /usr/local/bin/scw
            chmod +x /usr/local/bin/scw
        run_as: root
        plugin: command
        plugin_input:
            command: |
                SCW_URL=$(curl -fsSL https://api.github.com/repos/scaleway/scaleway-cli/releases/latest | grep "browser_download_url.*linux_amd64\"" | grep -v ".sha256" | cut -d'"' -f4)
                [ -z "$SCW_URL" ] && SCW_URL="https://github.com/scaleway/scaleway-cli/releases/download/v2.45.0/scaleway-cli_2.45.0_linux_amd64"
                curl -fsSL "$SCW_URL" -o /usr/local/bin/scw
                chmod +x /usr/local/bin/scw
    devops-tools-step-2:
        run: |
            command=curl -fsSL "https://raw.githubusercontent.com/ahmetb/kubectx/master/kubectx" -o /usr/local/bin/kubectx
            curl -fsSL "https://raw.githubusercontent.com/ahmetb/kubectx/master/kubens" -o /usr/local/bin/kubens
            chmod +x /usr/local/bin/kubectx /usr/local/bin/kubens
        run_as: root
        plugin: command
        plugin_input:
            command: |
                curl -fsSL "https://raw.githubusercontent.com/ahmetb/kubectx/master/kubectx" -o /usr/local/bin/kubectx
                curl -fsSL "https://raw.githubusercontent.com/ahmetb/kubectx/master/kubens" -o /usr/local/bin/kubens
                chmod +x /usr/local/bin/kubectx /usr/local/bin/kubens
    devops-tools-step-3:
        run: |
            command=curl -fsSL "https://get.opentofu.org/install-opentofu.sh" -o /tmp/install-opentofu.sh
            chmod +x /tmp/install-opentofu.sh
            bash /tmp/install-opentofu.sh --install-method standalone
            rm -f /tmp/install-opentofu.sh
        run_as: root
        plugin: command
        plugin_input:
            command: |
                curl -fsSL "https://get.opentofu.org/install-opentofu.sh" -o /tmp/install-opentofu.sh
                chmod +x /tmp/install-opentofu.sh
                bash /tmp/install-opentofu.sh --install-method standalone
                rm -f /tmp/install-opentofu.sh
    devops-tools-step-4:
        check: the AWS CLI v2 binary is installed at /usr/local/bin/aws
        plugin: file
        plugin_input:
            file: /usr/local/bin/aws
            exists: true
    devops-tools-step-5:
        check: aws reports its own version string
        exit_status: 0
        stdout:
            - contains: aws-cli
        plugin: command
        plugin_input:
            command: /usr/local/bin/aws --version
    devops-tools-step-6:
        check: the Scaleway CLI binary is installed at /usr/local/bin/scw
        plugin: file
        plugin_input:
            file: /usr/local/bin/scw
            exists: true
    devops-tools-step-7:
        check: OpenTofu is installed and reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/local/bin/tofu version
    devops-tools-step-8:
        check: the kubectx kubectl-context switcher script is installed
        plugin: file
        plugin_input:
            file: /usr/local/bin/kubectx
            exists: true
    devops-tools-step-9:
        check: the kubens kubectl-namespace switcher script is installed
        plugin: file
        plugin_input:
            file: /usr/local/bin/kubens
            exists: true
    devops-tools-step-10:
        check: jq is installed and reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/jq --version
    devops-tools-step-11:
        check: the dig DNS lookup tool resolves on PATH from the per-distro bind package
        exit_status: 0
        plugin: command
        plugin_input:
            command: command -v dig
    tofu-binary:
        check: file=/usr/local/bin/tofu
        id: tofu-binary
        plugin: file
        plugin_input:
            file: /usr/local/bin/tofu
            exists: true
    jq-binary:
        check: file=/usr/bin/jq
        id: jq-binary
        plugin: file
        plugin_input:
            file: /usr/bin/jq
            exists: true
    scw-version:
        check: command=/usr/local/bin/scw version
        id: scw-version
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/local/bin/scw version
