docker-ce:
    candy:
        version: 2026.144.1443
        description: |
            Docker CE engine, containerd runtime, and the buildx/compose plugins
            The docker-ce candy installs the upstream Docker Community Edition stack -
            the docker CLI + dockerd engine, the containerd runtime, and the buildx and
            compose plugins - from Docker's own repositories (the docker metapackage on
            Arch). It also queues the iptable_nat kernel module for load at boot so the
            docker bridge network can NAT. Every artifact is a fixed on-disk path or a
            CLI that reports its version, so the install is directly verifiable.
    docker-ce-distro:
        distro:
            arch:
                package:
                    - containerd
                    - docker
                    - docker-buildx
                    - docker-compose
            debian-13:
                package:
                    - containerd.io
                    - docker-buildx-plugin
                    - docker-ce
                    - docker-ce-cli
                    - docker-compose-plugin
                repo:
                    - name: docker-ce-debian
                      url: "https://download.docker.com/linux/debian"
                      key: "https://download.docker.com/linux/debian/gpg"
                      suite: trixie
                      components: stable
            fedora:
                package:
                    - containerd.io
                    - docker-buildx-plugin
                    - docker-ce
                    - docker-ce-cli
                    - docker-compose-plugin
                repo:
                    - name: docker-ce-stable
                      url: "https://download.docker.com/linux/fedora/docker-ce.repo"
            ubuntu-24.04:
                package:
                    - containerd.io
                    - docker-buildx-plugin
                    - docker-ce
                    - docker-ce-cli
                    - docker-compose-plugin
                repo:
                    - name: docker-ce-ubuntu
                      url: "https://download.docker.com/linux/ubuntu"
                      key: "https://download.docker.com/linux/ubuntu/gpg"
                      suite: noble
                      components: stable
    docker-ce-step-0:
        run: command=mkdir -p /etc/modules-load.d && echo "iptable_nat" >> /etc/modules-load.d/ip_tables.conf
        run_as: root
        plugin: command
        plugin_input:
            command: mkdir -p /etc/modules-load.d && echo "iptable_nat" >> /etc/modules-load.d/ip_tables.conf
    docker-ce-step-1:
        check: the docker CLI binary is installed at /usr/bin/docker
        plugin: file
        plugin_input:
            file: /usr/bin/docker
            exists: true
    docker-ce-step-2:
        check: the docker CLI reports its version and exits cleanly
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/docker --version
    docker-ce-step-3:
        check: the containerd runtime binary is installed at /usr/bin/containerd
        plugin: file
        plugin_input:
            file: /usr/bin/containerd
            exists: true
    docker-ce-step-4:
        check: the containerd runtime reports its version and exits cleanly
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/containerd --version
    docker-ce-step-5:
        check: the docker compose plugin is wired into the docker CLI
        exit_status: 0
        plugin: command
        plugin_input:
            command: /usr/bin/docker compose version
    docker-ce-step-6:
        check: the iptable_nat module is queued for load at boot so the docker bridge can NAT
        plugin: file
        plugin_input:
            file: /etc/modules-load.d/ip_tables.conf
            contains: iptable_nat
    docker-ce-package:
        check: package=docker-ce
        id: docker-ce-package
        plugin: package
        plugin_input:
            package: docker-ce
            package_map:
                arch: docker
                fedora: docker-ce
            installed: true
    containerd-package:
        check: package=containerd.io
        id: containerd-package
        plugin: package
        plugin_input:
            package: containerd.io
            package_map:
                arch: containerd
                fedora: containerd.io
            installed: true
