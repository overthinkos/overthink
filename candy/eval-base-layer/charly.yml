candy:
    version: 2026.144.1443
    name: eval-base-layer
    description:
        feature: Drop /etc/eval-base-marker as the first layer of the eval-pod stack
        narrative: |
            Single-file marker layer — the build-scope smoke target AND the
            composition-order anchor for the combined eval-pod bed
            (`charly eval run eval-pod`). It writes /etc/eval-base-marker; the
            eval-stack-layer that composes on top asserts this marker is still
            present, proving layer-composition order survives the build pipeline.
        tag: [working]
    task:
        - write: /etc/eval-base-marker
          run_as: root
          mode: "0644"
          content: |
            eval-base v1
    scenario:
        # Agent Driven Evaluation acceptance scenarios, baked into this
        # candy's ai.opencharly.description label. Both steps are
        # DETERMINISTIC (embedded file check verbs → run at build AND
        # deploy scope by `charly box/eval feature run`); the marker is a
        # build-time artifact, so a missing or empty file fails them.
        - name: eval-base-marker-present
          step:
            - then: the eval-base marker file is present at /etc/eval-base-marker
              file: /etc/eval-base-marker
              exists: true
        - name: eval-base-marker-records-version
          step:
            - then: the marker records the eval-base version string "eval-base v1"
              file: /etc/eval-base-marker
              contains:
                - contains: "eval-base v1"
        - name: eval-base-marker-exists
          step:
            - id: eval-base-marker-exists
              file: /etc/eval-base-marker
              exists: true
        - name: eval-base-marker-content
          step:
            - id: eval-base-marker-content
              file: /etc/eval-base-marker
              contains:
                - contains: "eval-base v1"
