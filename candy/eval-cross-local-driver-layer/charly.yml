candy:
    version: 2026.156.1530
    name: eval-cross-local-driver-layer
    description:
        feature: Minimal host (target:local) venue for a cross-deployment local DRIVER peer
        narrative: |
            Establishes a host venue for the eval-cross-local-http bed's local
            DRIVER peer: a `command:` check with `on: <this>` runs on the host
            against a SEPARATE pod SUBJECT (cross-kind — local driver, pod
            subject). USER-level only (a marker under $HOME, no root/sudo/gates)
            so bringUpPeers applies it unattended via `charly deploy add`.
        tag: [working]
        scenario:
            - name: driver-marker-present
              step:
                - then: applying the layer leaves the cross-local-driver marker file under the host cache dir
                  file: "${HOME}/.cache/charly-cross-local-driver-marker"
                  exists: true
            - name: driver-marker-carries-version-stamp
              step:
                - then: the marker records the driver version stamp the cross-local-http bed reads back to confirm the host-driver peer applied
                  file: "${HOME}/.cache/charly-cross-local-driver-marker"
                  contains:
                    - charly-cross-local-driver v1
    task:
        - mkdir: "${HOME}/.cache"
          user: "${USER}"
        - write: "${HOME}/.cache/charly-cross-local-driver-marker"
          user: "${USER}"
          mode: "0644"
          content: |
            charly-cross-local-driver v1
    eval:
        - id: cross-local-driver-marker
          scope: deploy
          command: "test -f ${HOME}/.cache/charly-cross-local-driver-marker"
          in_container: false
        - id: cross-local-driver-marker-content
          scope: deploy
          command: "cat ${HOME}/.cache/charly-cross-local-driver-marker"
          in_container: false
          stdout:
            - contains: charly-cross-local-driver v1
