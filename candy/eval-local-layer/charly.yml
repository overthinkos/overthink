candy:
    version: 2026.144.1443
    name: eval-local-layer
    description:
        feature: Drop /etc/eval-local-marker on the host filesystem
        narrative: |
            Used by the eval-local kind:local template to exercise the
            ShellExecutor + HostDeployTarget path. Marker file is written by
            a write: task; deploy-scope eval probe runs on the host (not in a
            container) to verify the file is present after `charly deploy add`.
        tag: [working]
        scenario:
            # Agent Driven Evaluation acceptance scenarios baked into this
            # candy's ai.opencharly.description label. Every step embeds a
            # file/command check verb (BIND-BY-SHAPE), so all are DETERMINISTIC.
            # Scenario 1 is build-scope — the write: task bakes the marker into
            # any image composing this candy. Scenario 2 is deploy-scope and
            # host-side (in_container: false) — the candy's real purpose is the
            # eval-local kind:local HostDeployTarget apply that drops the marker
            # onto the host filesystem.
            - name: eval-local-marker-written
              step:
                - then: the eval-local marker file is present at /etc/eval-local-marker
                  file: /etc/eval-local-marker
                  exists: true
                - then: the marker records the eval-local version stamp "eval-local v1"
                  file: /etc/eval-local-marker
                  contains:
                    - contains: "eval-local v1"
            - name: eval-local-marker-on-host
              step:
                - then: after the eval-local kind:local apply, the marker resolves on the host filesystem outside any container
                  scope: deploy
                  command: "test -f /etc/eval-local-marker"
                  in_container: false
    task:
        - write: /etc/eval-local-marker
          user: root
          mode: "0644"
          content: |
            eval-local v1
    eval:
        # Deploy-scope: the kind:local apply writes the marker onto the HOST
        # filesystem (no container) — probe host-side with in_container: false.
        - id: eval-local-marker-exists
          scope: deploy
          command: "test -f /etc/eval-local-marker"
          in_container: false
        - id: eval-local-marker-host-content
          scope: deploy
          command: "grep -q 'eval-local v1' /etc/eval-local-marker"
          in_container: false
        # Build-scope: the write: task also bakes the marker into any image
        # composing this candy — present with mode 0644 and the version stamp.
        - id: eval-local-marker-build
          file: /etc/eval-local-marker
          exists: true
          mode: "0644"
        - id: eval-local-marker-build-content
          file: /etc/eval-local-marker
          contains:
            - contains: "eval-local v1"
