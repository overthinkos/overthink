candy:
    version: 2026.161.2302
    name: eval-stack-layer
    # The eval listener's container port. Boxes composing this candy inherit it
    # (CollectBoxPorts) and auto-publish it on a free 127.0.0.1 host port — the
    # eval-pod box no longer declares `port: 18794:18794` itself.
    port:
        - 18794
    description:
        feature: Combined kind:layer + kind:pod + DeployTarget smoke on top of eval-base-layer
        narrative: |
            The second (and final) layer of the eval-pod stack. In one layer it
            proves three mechanisms the combined eval-pod bed
            (`charly eval run eval-pod`) covers beyond the build smoke:
              * layer composition order — asserts /etc/eval-base-marker (written by
                the prior eval-base-layer) is still present;
              * kind:pod runtime — runs `nc -lk 18794` under the configured init
                system and probes the listening port (harness + in-container ss);
              * DeployTarget rendering — runs `sleep infinity` under supervisord and
                probes the service is running.
            Installs ncat + iproute (port listener) + coreutils (sleep) + supervisor.
            Both services are custom exec entries — fedora-minimal ships no systemd
            units for nc/sleep, so the layer is supervisord-only on container targets.
        tag: [working]
    distro:
        fedora:
            package:
                - iproute
                - ncat
                - coreutils
                - supervisor
    task:
        - write: /etc/eval-stack-marker
          run_as: root
          mode: "0644"
          content: |
            eval-stack v1
    service:
        - name: eval-listener
          exec: "/usr/bin/nc -lk 18794"
          restart: always
          priority: 20
          autostart: true
          enable: true
          scope: system
        - name: eval-sleep
          exec: "/usr/bin/sleep infinity"
          restart: always
          priority: 20
          autostart: true
          enable: true
          scope: system
    scenario:
        # Agent Driven Evaluation acceptance scenarios baked into this layer
        # (they ride into the eval-pod image's ai.opencharly.description
        # label). The first scenario's step is DETERMINISTIC (an embedded
        # check verb → runs at build AND deploy scope); the second is
        # PROSE-ONLY (no verb → agent-graded by `charly eval feature run
        # eval-pod`, reported unbound/skip by build-scope
        # `charly box feature run`).
        - name: eval-stack-marker-present
          step:
            - then: the eval-stack marker file is present at /etc/eval-stack-marker
              file: /etc/eval-stack-marker
              exists: true
        - name: eval-listener-reachable
          step:
            - then: the eval listener accepts a TCP connection on port 18794 from inside the deployment
        - name: eval-stack-marker-exists
          step:
            - id: eval-stack-marker-exists
              file: /etc/eval-stack-marker
              exists: true
        - name: eval-compose-order
          step:
            - id: eval-compose-order
              file: /etc/eval-base-marker
              exists: true
        - name: eval-port-listening
          step:
            - id: eval-port-listening
              port: 18794
              listening: true
              context:
                - runtime
        - name: eval-ss-listening
          step:
            - id: eval-ss-listening
              command: "ss -tlnp 2>/dev/null | grep ':18794'"
              exit_status: 0
              in_container: true
              context:
                - runtime
        - name: eval-service-running
          step:
            - id: eval-service-running
              service: eval-sleep
              running: true
              context:
                - runtime
