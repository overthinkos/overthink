candy:
    version: 2026.144.1443
    name: eval-tier1-layer
    description:
        feature: bench-tier1 — marker file for harness tier1 scenarios
        narrative: |
            Writes /etc/charly-bench-marker containing the string "charly benchmark target",
            satisfying the tier1-easy harness recipe.
    task:
        - mkdir: /etc
          user: root
          mode: "0755"
        - write: /etc/charly-bench-marker
          user: root
          mode: "0644"
          content: |
            charly benchmark target
    eval:
        - id: tier1-marker-exists
          file: /etc/charly-bench-marker
          exists: true
        - id: tier1-marker-content
          file: /etc/charly-bench-marker
          contains:
            - charly benchmark target
