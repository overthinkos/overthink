candy:
    version: 2026.162.1430
    name: filebrowser
    require:
        - supervisord
    env:
        FILEBROWSER_CONFIG: "/etc/filebrowser/config.yaml"
    port:
        - 8080
    volume:
        - name: data
          path: "~/.filebrowser/data"
        - name: files
          path: "~/.filebrowser/files"
    alias:
        - name: filebrowser
          command: filebrowser
    var:
        FILEBROWSER_VERSION: v1.2.4-stable
    task:
        - download: "https://github.com/gtsteffaniak/filebrowser/releases/download/${FILEBROWSER_VERSION}/linux-${ARCH}-filebrowser"
          extract: none
          to: /usr/local/bin/filebrowser
          mode: "0755"
          user: root
        - mkdir: /etc/filebrowser
          user: root
        - copy: config.yaml
          to: /etc/filebrowser/config.yaml
          mode: "0644"
          user: root
    eval:
        - id: filebrowser-binary
          file: /usr/local/bin/filebrowser
          exists: true
          mode: "0755"
        - id: filebrowser-config
          file: /etc/filebrowser/config.yaml
          exists: true
        - id: filebrowser-service
          scope: deploy
          service: filebrowser
          running: true
        - id: filebrowser-port
          scope: deploy
          addr: 127.0.0.1:${HOST_PORT:8080}
          reachable: true
          timeout: 5s
        - id: filebrowser-http
          scope: deploy
          http: http://127.0.0.1:${HOST_PORT:8080}/
          status: 200
          timeout: 5s
        # The candy owns the `data` volume (declared above), so the
        # "data dir exists" probe lives here — one check covers every box
        # composing filebrowser.
        - id: filebrowser-volumes-exist
          scope: deploy
          file: ${VOLUME_CONTAINER_PATH:data}
          filetype: directory
    service:
        - name: filebrowser
          exec: /usr/local/bin/filebrowser
          env:
            FILEBROWSER_CONFIG: /etc/filebrowser/config.yaml
          restart: always
          enable: true
          scope: system
