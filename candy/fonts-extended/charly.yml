candy:
    version: 2026.149.1210
    name: fonts-extended
    description: |
        The full CachyOS desktop font set — Noto CJK + emoji, Cantarell, DejaVu, Bitstream Vera, Open Sans, Meslo Nerd, and awesome-terminal glyphs — installed system-wide
        The full CachyOS desktop font set (the netinstall "fonts" subgroup) on
        top of the lean desktop-fonts layer: Noto (incl. CJK + emoji),
        Cantarell, DejaVu, Bitstream Vera, Open Sans, Meslo Nerd, and the
        awesome-terminal glyphs. Separate from desktop-fonts so the lightweight
        streaming-desktop images don't pull the heavy CJK set; a full KDE
        workstation wants it. Each family ships as an installed Arch package,
        so its presence is verifiable by querying the package database.
    require:
        - desktop-fonts
    distro:
        arch:
            package:
                - noto-fonts
                - noto-fonts-cjk
                - noto-fonts-emoji
                - cantarell-fonts
                - ttf-bitstream-vera
                - ttf-dejavu
                - ttf-opensans
                - ttf-meslo-nerd
                - awesome-terminal-fonts
    plan:
        - check: the heavy Noto CJK font set — the reason this candy is split out from desktop-fonts — is installed
          package: noto-fonts-cjk
          installed: true
        - check: the Noto color-emoji font is installed
          package: noto-fonts-emoji
          installed: true
        - check: the Noto base Latin family is installed
          package: noto-fonts
          installed: true
        - check: the Cantarell GNOME UI font is installed
          package: cantarell-fonts
          installed: true
        - check: the DejaVu family is installed
          package: ttf-dejavu
          installed: true
        - check: the Bitstream Vera family is installed
          package: ttf-bitstream-vera
          installed: true
        - check: the Open Sans family is installed
          package: ttf-opensans
          installed: true
        - check: the Meslo Nerd patched font for terminal and powerline glyphs is installed
          package: ttf-meslo-nerd
          installed: true
        - check: the awesome-terminal-fonts glyph set is installed
          package: awesome-terminal-fonts
          installed: true
