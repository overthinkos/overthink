candy:
    version: 2026.144.1443
    name: gemini
    description:
        feature: Installs the Google Gemini CLI globally via npm so `gemini` is on PATH for AI coding assistance and search.
        narrative: |
            The candy depends on nodejs and ships a package.json pinning
            @google/gemini-cli, which the build installs globally under
            NPM_CONFIG_PREFIX (~/.npm-global). The result is verifiable: the
            gemini binary lands at ~/.npm-global/bin/gemini, the scoped package
            is unpacked under ~/.npm-global/lib/node_modules/@google/gemini-cli,
            and `gemini --version` exits cleanly and prints a semantic version.
        tag: [working]
    require:
        - nodejs
    scenario:
        - name: cli-binary-installed
          step:
            - then: the gemini binary is installed into the npm global bin directory
              file: ${HOME}/.npm-global/bin/gemini
              exists: true
        - name: npm-package-unpacked
          step:
            - then: the @google/gemini-cli scoped package is unpacked under the npm global lib directory
              file: ${HOME}/.npm-global/lib/node_modules/@google/gemini-cli/package.json
              exists: true
        - name: cli-reports-version
          step:
            - then: running gemini --version exits cleanly and prints a semantic version
              command: ${HOME}/.npm-global/bin/gemini --version
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+"
