candy:
    version: 2026.144.1443
    name: gifgrep
    description: |
        GIF search and download CLI installed from source via go install
        Installs the gifgrep Kong-based CLI (github.com/steipete/gifgrep)
        with `go install`, landing the binary at ${HOME}/go/bin/gifgrep
        (GOPATH=~/go, with ~/go/bin appended to PATH). The install is
        verifiable without the network: the binary is present and
        executable, and `gifgrep --help` runs (exit 0) and prints its Kong
        usage banner listing the search/tui/still/sheet subcommands.
    require:
        - golang
    env:
        GOPATH: "~/go"
    path_append:
        - "~/go/bin"
    plan:
        - run: |
            command=go install github.com/steipete/gifgrep/cmd/gifgrep@latest
            go clean -cache
          command: |
            go install github.com/steipete/gifgrep/cmd/gifgrep@latest
            go clean -cache
          run_as: "${USER}"
        - check: the gifgrep binary is installed at ~/go/bin/gifgrep
          file: ${HOME}/go/bin/gifgrep
          exists: true
        - check: running gifgrep --help exits 0 and prints the Kong usage banner
          command: "${HOME}/go/bin/gifgrep --help 2>&1"
          exit_status: 0
          stdout:
            - contains: "Usage:"
        - check: command=test -x ${HOME}/go/bin/gifgrep
          id: gifgrep-binary-executable
          command: "test -x ${HOME}/go/bin/gifgrep"
          exit_status: 0
