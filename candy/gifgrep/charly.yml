candy:
    version: 2026.144.1443
    name: gifgrep
    description:
        feature: GIF search and download CLI installed from source via go install
        narrative: |
            Installs the gifgrep Kong-based CLI (github.com/steipete/gifgrep)
            with `go install`, landing the binary at ${HOME}/go/bin/gifgrep
            (GOPATH=~/go, with ~/go/bin appended to PATH). The install is
            verifiable without the network: the binary is present and
            executable, and `gifgrep --help` runs (exit 0) and prints its Kong
            usage banner listing the search/tui/still/sheet subcommands.
        tag: [working]
    require:
        - golang
    env:
        GOPATH: "~/go"
    path_append:
        - "~/go/bin"
    task:
        - command: |
            go install github.com/steipete/gifgrep/cmd/gifgrep@latest
            go clean -cache
          run_as: "${USER}"
    scenario:
        # DETERMINISTIC: the file check verb runs at build AND deploy scope.
        - name: gifgrep-binary-installed
          step:
            - then: the gifgrep binary is installed at ~/go/bin/gifgrep
              file: ${HOME}/go/bin/gifgrep
              exists: true
        # DETERMINISTIC: the binary actually runs as a Kong CLI and prints
        # its usage banner (fails if go install produced a broken binary).
        - name: gifgrep-cli-responds
          step:
            - then: running gifgrep --help exits 0 and prints the Kong usage banner
              command: "${HOME}/go/bin/gifgrep --help 2>&1"
              exit_status: 0
              stdout:
                - contains: "Usage:"
        - name: gifgrep-binary
          step:
            # The candy's whole job: land the gifgrep binary at ~/go/bin.
            - id: gifgrep-binary
              file: ${HOME}/go/bin/gifgrep
              exists: true
        - name: gifgrep-binary-executable
          step:
            # Present is not enough — assert it is an executable file.
            - id: gifgrep-binary-executable
              command: "test -x ${HOME}/go/bin/gifgrep"
              exit_status: 0
        - name: gifgrep-cli-help
          step:
            # Functional probe: the binary runs as a Kong CLI and prints its usage
            # banner (fails if go install produced a non-working or wrong binary).
            - id: gifgrep-cli-help
              command: "${HOME}/go/bin/gifgrep --help 2>&1"
              exit_status: 0
              stdout:
                - contains: "Usage:"
