candy:
    version: 2026.144.1443
    name: github-actions
    description:
        feature: Local GitHub Actions execution and workflow linting via act and actionlint.
        narrative: |
            Installs the act CLI at /usr/bin/act for running GitHub Actions
            workflows locally, the actionlint linter at /usr/local/bin/actionlint
            for static workflow validation, and the guestfs-tools package. Each
            tool lands at a fixed path and self-reports a version, so its presence
            and basic operability are deterministically verifiable.
        tag: [working]
        scenario:
            - name: act-runs-workflows-locally
              step:
                - then: the act CLI is installed at its fixed path
                  file: /usr/bin/act
                  exists: true
                - then: act reports its version without error
                  command: /usr/bin/act --version
                  exit_status: 0
            - name: actionlint-validates-workflows
              step:
                - then: the actionlint linter is installed at its fixed path
                  file: /usr/local/bin/actionlint
                  exists: true
                - then: actionlint reports its version without error
                  command: /usr/local/bin/actionlint -version
                  exit_status: 0
    package:
        - guestfs-tools
    task:
        # act: version-pinned GitHub release install — unified across Fedora and
        # Arch. The COPR/act-cli Fedora path was dropped in favour of this
        # distro-agnostic tarball install so the layer composes into arch-coder
        # without needing an `aur:` section (aur: requires pacman in the final
        # image stage, which Fedora images don't have).
        - cmd: |
            set -e
            ACT_VERSION="0.2.85"
            BUILD_ARCH=$(uname -m)
            case "$BUILD_ARCH" in
              x86_64) ARCH=x86_64 ;;
              aarch64) ARCH=arm64 ;;
              *) echo "unsupported arch: $BUILD_ARCH" >&2; exit 1 ;;
            esac
            curl -fsSL "https://github.com/nektos/act/releases/download/v${ACT_VERSION}/act_Linux_${ARCH}.tar.gz" -o /tmp/act.tar.gz
            tar -xzf /tmp/act.tar.gz -C /usr/bin/ act
            chmod +x /usr/bin/act
            rm -f /tmp/act.tar.gz
          user: root
        # actionlint: version-pinned to avoid GitHub API rate limits and the
        # greedy-regex bug that broke URL extraction against single-line JSON.
        # Uses /releases/download/<tag>/<asset> which is stable and cacheable.
        - cmd: |
            set -e
            ACTIONLINT_VERSION="1.7.12"
            BUILD_ARCH=$(uname -m)
            case "$BUILD_ARCH" in
              x86_64) ARCH=amd64 ;;
              aarch64) ARCH=arm64 ;;
              *) echo "unsupported arch: $BUILD_ARCH" >&2; exit 1 ;;
            esac
            curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_${ARCH}.tar.gz" -o /tmp/actionlint.tar.gz
            tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin/ actionlint
            chmod +x /usr/local/bin/actionlint
            rm -f /tmp/actionlint.tar.gz
          user: root
    eval:
        - id: act-binary
          file: /usr/bin/act
          exists: true
        - id: act-version
          command: /usr/bin/act --version
          exit_status: 0
        - id: actionlint-binary
          file: /usr/local/bin/actionlint
          exists: true
        - id: actionlint-version
          command: /usr/local/bin/actionlint -version
          exit_status: 0
        - id: guestfs-tools-package
          package: guestfs-tools
          installed: true
