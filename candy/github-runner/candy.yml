candy:
    version: 2026.157.1917
    name: github-runner
    require:
        - supervisord
        # Rootless nested podman/buildah/skopeo + subuid/subgid layout +
        # newuidmap/newgidmap file-caps + containers/storage/policy configs all
        # come from container-nesting. This layer carries only the
        # runner-specific pieces (R3 — no duplication).
        - container-nesting
    distro:
        arch:
            package:
                # Runner toolchain (podman/buildah/skopeo/crun/fuse-overlayfs are
                # provided by container-nesting).
                - jq
                - git
                - go
                - cloud-guest-utils            # growpart
                - qemu-user-static             # aarch64 cross-arch CI (binfmt)
                - qemu-user-static-binfmt
                - cosign                       # repo package (replaces binary download)
                # .NET runtime deps for the actions-runner binary — the runner's
                # bundled installdependencies.sh has no Arch branch, so its native
                # deps are declared explicitly here. (libz is NOT listed: CachyOS
                # ships zlib-ng-compat, which Provides zlib/libz.so — an explicit
                # `zlib` is an unresolvable conflict with it.)
                - icu
                - krb5
                - openssl
                - libunwind
                - lttng-ust
                # ov-host runtime deps that complete the `ov` PKGBUILD `depends=`
                # set ON THE RUNNER, so the release-packages CI job builds the pac
                # artifact NATIVELY here: with every dep already installed,
                # `makepkg -sf` resolves them all and never shells out to
                # `sudo pacman` (the rootless runner has no passwordless sudo).
                # The rest of depends= is provided by the ov/virtualization layers.
                - slirp4netns                  # rootless podman networking fallback
                - libisoburn                   # xorriso — VM NoCloud seed-ISO builder
                - cdrtools                     # genisoimage/mkisofs seed-ISO fallback
                - swtpm                        # software TPM 2.0 for VM guests
    volume:
        - name: state
          path: ~/actions-runner
    env:
        RUNNER_WORK_DIR: "${HOME}/actions-runner/_work"
        RUNNER_GROUP: "Default"
    env_accept:
        - name: RUNNER_ORG
          description: "GitHub org/user to register the runner with (e.g. overthinkos). Pass via: ov config githubrunner -e RUNNER_ORG=<org>"
    secret_accept:
        - name: RUNNER_TOKEN
          description: "Short-lived GitHub Actions runner registration token (gh api -X POST /orgs/<org>/actions/runners/registration-token). Credential-store backed; never written to deploy.yml or the quadlet."
    var:
        RUNNER_VERSION: "2.334.0"
    hook:
        # Registration only runs when a token is supplied — so a disposable bed
        # (no token) deploys the image without registering, and a stale token is
        # a clean no-op rather than an error.
        post_enable: |
            [ -z "${RUNNER_TOKEN:-}" ] && { echo "RUNNER_TOKEN empty — skipping runner registration"; exit 0; }
            : "${RUNNER_NAME:=${OV_CONTAINER_NAME:-runner}}"
            : "${RUNNER_LABELS:=overthink}"
            "${HOME}/actions-runner/config.sh" --unattended \
              --url "https://github.com/${RUNNER_ORG}" \
              --token "${RUNNER_TOKEN}" \
              --name "${RUNNER_NAME}" \
              --labels "${RUNNER_LABELS}" \
              --replace --work _work
        pre_remove: |
            [ -z "${RUNNER_TOKEN:-}" ] && { echo "RUNNER_TOKEN empty — skipping deregistration"; exit 0; }
            "${HOME}/actions-runner/config.sh" remove \
              --token "${RUNNER_TOKEN}"
    task:
        # GitHub Actions runner — pinned, declarative download (content-addressed
        # cache, reproducible). The runner self-updates against GitHub at runtime,
        # so a pinned base version is correct. Installed under $HOME (uid 1000),
        # not root-owned /opt. The download runs as root because the shared
        # /tmp/downloads content-cache mount is root-owned; the extracted tree is
        # chowned back to uid 1000 below so the rootless runner can write
        # _work/.runner/.credentials at runtime.
        - mkdir: "${HOME}/actions-runner"
          user: "${USER}"
        - download: "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
          extract: tar.gz
          to: "${HOME}/actions-runner"
          user: root
        - cmd: |
            rh=$(getent passwd 1000 | cut -d: -f6)
            chown -R 1000:1000 "${rh}/actions-runner"
          user: root
        # Registry mirror for ghcr.io (host pull-through cache at 127.0.0.1:5000;
        # falls back to ghcr.io directly if absent). Rootless podman prefers
        # ~/.config/containers over /etc/containers.
        - mkdir: "${HOME}/.config/containers/registries.conf.d"
          user: "${USER}"
        - write: "${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf"
          user: "${USER}"
          mode: "0644"
          content: |
            [[registry]]
            prefix = "ghcr.io"
            location = "ghcr.io"
            [[registry.mirror]]
            location = "127.0.0.1:5000"
            insecure = true
    service:
        - name: github-runner
          exec: "%(ENV_HOME)s/actions-runner/run.sh"
          restart: always
          working_directory: "%(ENV_HOME)s/actions-runner"
          enable: true
          scope: system
    eval:
        # --- build scope: the composition actually works (run the binaries) ---
        # config.sh executes the .NET Runner binary → proves the icu/krb5/.NET
        # native deps resolved on cachyos (the key cachyos-port signal).
        - id: gr-runner-config-runs
          command: "${HOME}/actions-runner/config.sh --version"
          exit_status: 0
        - id: gr-runner-run-sh
          file: "${HOME}/actions-runner/run.sh"
          exists: true
        - id: gr-cosign
          command: cosign version
          exit_status: 0
        - id: gr-skopeo
          command: skopeo --version
          exit_status: 0
        - id: gr-buildah
          command: buildah --version
          exit_status: 0
        - id: gr-go
          command: go version
          exit_status: 0
        - id: gr-git
          command: git --version
          exit_status: 0
        - id: gr-qemu-aarch64
          file: /usr/bin/qemu-aarch64-static
          exists: true
        - id: gr-go-pkg
          package: golang
          package_map:
            arch: go
          installed: true
        - id: gr-icu-pkg
          package: icu
          installed: true
        # ov-host runtime deps completing the `ov` PKGBUILD depends= set, so the
        # release-packages CI job builds the pac artifact natively (makepkg needs
        # no sudo when every dep is present). FAIL without the package: additions.
        - id: gr-pkgbuild-dep-slirp4netns
          package: slirp4netns
          installed: true
        - id: gr-pkgbuild-dep-libisoburn
          package: libisoburn
          installed: true
        - id: gr-pkgbuild-dep-cdrtools
          package: cdrtools
          installed: true
        - id: gr-pkgbuild-dep-swtpm
          package: swtpm
          installed: true
        # --- deploy scope: rootless runtime state ---
        # Runs as uid 1000 (NOT root) — the whole point of the rootless cutover.
        - id: gr-rootless-uid
          scope: deploy
          command: id
          stdout:
            - contains: "uid=1000"
        # Rootless nested podman works (no mount_too_revealing EPERM).
        - id: gr-nested-podman-info
          scope: deploy
          command: podman info
          exit_status: 0
        - id: gr-nested-podman-run
          scope: deploy
          command: "podman run --rm quay.io/libpod/alpine:latest true"
          exit_status: 0
        - id: gr-ghcr-mirror
          scope: deploy
          file: "${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf"
          exists: true
        - id: gr-newuidmap-cap
          scope: deploy
          command: getcap /usr/bin/newuidmap
          stdout:
            - contains: cap_setuid
