github-runner:
    candy:
        version: 2026.157.1917
        description: |
            A GitHub Actions self-hosted runner that builds CI jobs rootless inside a disposable box.
            Installs the pinned actions/runner release under ${HOME}/actions-runner
            (config.sh + run.sh, run as uid 1000) plus the CI toolchain — jq/git/go/cosign,
            qemu-user-static for aarch64 binfmt cross-builds, and the rootless nested
            container stack (podman/buildah/skopeo via container-nesting). The .NET runtime
            deps (icu/krb5/openssl/libunwind/lttng-ust) are declared explicitly because the
            runner's installdependencies.sh has no Arch branch — so config.sh actually runs.
    github-runner-require:
        require:
            - supervisord
            # Rootless nested podman/buildah/skopeo + subuid/subgid layout +
            # newuidmap/newgidmap file-caps + containers/storage/policy configs all
            # come from container-nesting. This layer carries only the
            # runner-specific pieces (R3 — no duplication).
            - container-nesting
    github-runner-distro:
        distro:
            arch:
                package:
                    # Runner toolchain (podman/buildah/skopeo/crun/fuse-overlayfs are
                    # provided by container-nesting).
                    - jq
                    - git
                    - go
                    - cloud-guest-utils # growpart
                    - qemu-user-static # aarch64 cross-arch CI (binfmt)
                    - qemu-user-static-binfmt
                    - cosign # repo package (replaces binary download)
                    # .NET runtime deps for the actions-runner binary — the runner's
                    # bundled installdependencies.sh has no Arch branch, so its native
                    # deps are declared explicitly here. (libz is NOT listed: CachyOS
                    # ships zlib-ng-compat, which Provides zlib/libz.so — an explicit
                    # `zlib` is an unresolvable conflict with it.)
                    - icu
                    - krb5
                    - openssl
                    - libunwind
                    - lttng-ust
                    # charly-host runtime deps that complete the `charly` PKGBUILD `depends=`
                    # set ON THE RUNNER, so the release-packages CI job builds the pac
                    # artifact NATIVELY here: with every dep already installed,
                    # `makepkg -sf` resolves them all and never shells out to
                    # `sudo pacman` (the rootless runner has no passwordless sudo).
                    # The rest of depends= is provided by the charly/virtualization layers.
                    - slirp4netns # rootless podman networking fallback
                    - libisoburn # xorriso — VM NoCloud seed-ISO builder
                    - cdrtools # genisoimage/mkisofs seed-ISO fallback
                    - swtpm # software TPM 2.0 for VM guests
    github-runner-volume:
        volume:
            - name: state
              path: ~/actions-runner
    github-runner-env:
        env:
            RUNNER_WORK_DIR: "${HOME}/actions-runner/_work"
            RUNNER_GROUP: "Default"
    github-runner-env_accept:
        env_accept:
            - name: RUNNER_ORG
              description: "GitHub org/user to register the runner with (e.g. overthinkos). Pass via: charly config githubrunner -e RUNNER_ORG=<org>"
    github-runner-secret_accept:
        secret_accept:
            - name: RUNNER_TOKEN
              description: "Short-lived GitHub Actions runner registration token (gh api -X POST /orgs/<org>/actions/runners/registration-token). Credential-store backed; never written to deploy.yml or the quadlet."
    github-runner-var:
        var:
            RUNNER_VERSION: "2.334.0"
    github-runner-hook:
        hook:
            # Registration only runs when a token is supplied — so a disposable bed
            # (no token) deploys the image without registering, and a stale token is
            # a clean no-op rather than an error.
            post_enable: |
                [ -z "${RUNNER_TOKEN:-}" ] && { echo "RUNNER_TOKEN empty — skipping runner registration"; exit 0; }
                : "${RUNNER_NAME:=${CHARLY_CONTAINER_NAME:-runner}}"
                : "${RUNNER_LABELS:=opencharly}"
                "${HOME}/actions-runner/config.sh" --unattended \
                  --url "https://github.com/${RUNNER_ORG}" \
                  --token "${RUNNER_TOKEN}" \
                  --name "${RUNNER_NAME}" \
                  --labels "${RUNNER_LABELS}" \
                  --replace --work _work
            pre_remove: |
                [ -z "${RUNNER_TOKEN:-}" ] && { echo "RUNNER_TOKEN empty — skipping deregistration"; exit 0; }
                "${HOME}/actions-runner/config.sh" remove \
                  --token "${RUNNER_TOKEN}"
    github-runner-service:
        service:
            - name: github-runner
              exec: "%(ENV_HOME)s/actions-runner/run.sh"
              restart: always
              working_directory: "%(ENV_HOME)s/actions-runner"
              enable: true
              scope: system
    github-runner-step-0:
        run: mkdir=${HOME}/actions-runner
        mkdir: "${HOME}/actions-runner"
        run_as: "${USER}"
    github-runner-step-1:
        run: download=https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz
        download: "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
        extract: tar.gz
        to: "${HOME}/actions-runner"
        run_as: root
    github-runner-step-2:
        run: |
            command=rh=$(getent passwd 1000 | cut -d: -f6)
            chown -R 1000:1000 "${rh}/actions-runner"
        run_as: root
        plugin: command
        plugin_input:
            command: |
                rh=$(getent passwd 1000 | cut -d: -f6)
                chown -R 1000:1000 "${rh}/actions-runner"
    github-runner-step-3:
        run: mkdir=${HOME}/.config/containers/registries.conf.d
        mkdir: "${HOME}/.config/containers/registries.conf.d"
        run_as: "${USER}"
    github-runner-step-4:
        run: write=${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf
        write: "${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf"
        run_as: "${USER}"
        mode: "0644"
        content: |
            [[registry]]
            prefix = "ghcr.io"
            location = "ghcr.io"
            [[registry.mirror]]
            location = "127.0.0.1:5000"
            insecure = true
    github-runner-step-5:
        check: the GitHub Actions runner is extracted under the home directory with its config.sh present
        file: "${HOME}/actions-runner/config.sh"
        exists: true
    github-runner-step-6:
        check: the runner's run.sh service launcher is present
        file: "${HOME}/actions-runner/run.sh"
        exists: true
    github-runner-step-7:
        check: config.sh executes, proving the .NET native deps (icu/krb5/openssl/libunwind/lttng-ust) resolved on this distro
        exit_status: 0
        plugin: command
        plugin_input:
            command: "${HOME}/actions-runner/config.sh --version"
    github-runner-step-8:
        check: skopeo (rootless image copy) reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: skopeo --version
    github-runner-step-9:
        check: buildah (rootless image build) reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: buildah --version
    github-runner-step-10:
        check: cosign (image signing) reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: cosign version
    github-runner-step-11:
        check: the go toolchain used by CI jobs reports its version
        exit_status: 0
        plugin: command
        plugin_input:
            command: go version
    github-runner-step-12:
        check: the aarch64 qemu interpreter is installed so jobs can cross-build for arm64 via binfmt
        file: /usr/bin/qemu-aarch64-static
        exists: true
    github-runner-step-13:
        check: the runner service process runs as the unprivileged uid 1000, never root
        stdout:
            - contains: "uid=1000"
        context:
            - runtime
        plugin: command
        plugin_input:
            command: id
    github-runner-step-14:
        check: rootless nested podman works inside the box (no mount_too_revealing EPERM)
        exit_status: 0
        context:
            - runtime
        plugin: command
        plugin_input:
            command: podman info
    github-runner-step-15:
        check: a CI job can actually pull and run a container image rootless
        exit_status: 0
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "podman run --rm quay.io/libpod/alpine:latest true"
    gr-git:
        check: command=git --version
        id: gr-git
        exit_status: 0
        plugin: command
        plugin_input:
            command: git --version
    gr-go-pkg:
        check: package=golang
        id: gr-go-pkg
        package: golang
        package_map:
            arch: go
        installed: true
    gr-icu-pkg:
        check: package=icu
        id: gr-icu-pkg
        package: icu
        installed: true
    gr-pkgbuild-dep-slirp4netns:
        check: package=slirp4netns
        id: gr-pkgbuild-dep-slirp4netns
        package: slirp4netns
        installed: true
    gr-pkgbuild-dep-libisoburn:
        check: package=libisoburn
        id: gr-pkgbuild-dep-libisoburn
        package: libisoburn
        installed: true
    gr-pkgbuild-dep-cdrtools:
        check: package=cdrtools
        id: gr-pkgbuild-dep-cdrtools
        package: cdrtools
        installed: true
    gr-pkgbuild-dep-swtpm:
        check: package=swtpm
        id: gr-pkgbuild-dep-swtpm
        package: swtpm
        installed: true
    gr-ghcr-mirror:
        check: file=${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf
        id: gr-ghcr-mirror
        file: "${HOME}/.config/containers/registries.conf.d/ghcr-mirror.conf"
        exists: true
        context:
            - runtime
    gr-newuidmap-cap:
        check: command=getcap /usr/bin/newuidmap
        id: gr-newuidmap-cap
        stdout:
            - contains: cap_setuid
        context:
            - runtime
        plugin: command
        plugin_input:
            command: getcap /usr/bin/newuidmap
