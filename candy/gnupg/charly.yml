gnupg:
    candy:
        version: 2026.144.1443
        description: |
            GnuPG encryption and signing tools for GPG agent forwarding
            Installs the GnuPG suite (gpg, gpgconf, gpg-agent, gpg-connect-agent)
            from the distro package -- gnupg on arch/debian/ubuntu, gnupg2 on
            fedora. The binaries land in /usr/bin and gpg reports its GnuPG
            version string, so the install and the agent-forwarding tooling are
            directly verifiable inside the built image.
    gnupg-distro:
        distro:
            arch:
                package:
                    - gnupg
            debian:
                package:
                    - gnupg
            fedora:
                package:
                    - gnupg2
            ubuntu:
                package:
                    - gnupg
    gnupg-step-0:
        check: the gpg encryption/signing binary is present at /usr/bin/gpg
        plugin: file
        plugin_input:
            file: /usr/bin/gpg
            exists: true
    gnupg-step-1:
        check: invoking gpg --version exits cleanly and identifies itself as GnuPG
        exit_status: 0
        stdout:
            - contains: "gpg (GnuPG)"
        plugin: command
        plugin_input:
            command: /usr/bin/gpg --version
    gnupg-step-2:
        check: the gpg-agent daemon ships so a forwarded host agent can answer key operations
        plugin: file
        plugin_input:
            file: /usr/bin/gpg-agent
            exists: true
    gnupg-step-3:
        check: the gpgconf helper ships so the agent socket path can be resolved
        plugin: file
        plugin_input:
            file: /usr/bin/gpgconf
            exists: true
    gnupg-package:
        check: package=gnupg
        id: gnupg-package
        plugin: package
        plugin_input:
            package: gnupg
            package_map:
                fedora: gnupg2
            installed: true
