candy:
    version: 2026.144.1443
    name: gocryptfs
    description: Encrypted filesystem (gocryptfs) for charly config encrypted volume operations
    package:
        - gocryptfs
    eval:
        - id: gocryptfs-binary
          file: /usr/bin/gocryptfs
          exists: true
        - id: gocryptfs-version
          command: /usr/bin/gocryptfs -version
          exit_status: 0
