candy:
    version: 2026.144.1443
    name: gocryptfs
    description:
        feature: Encrypted filesystem (gocryptfs) for charly config encrypted volume operations
        narrative: |
            Installs the gocryptfs FUSE package — cross-distro the same name on
            rpm (Fedora), pac (Arch) and deb (Debian/Ubuntu) — so charly can
            mount encrypted volumes. The candy's whole deliverable is the
            gocryptfs binary at /usr/bin/gocryptfs; the observable proof it is
            present and runnable is that the binary exists and `gocryptfs
            -version` reports a version string. charly drives the actual
            encrypt/mount lifecycle (each mount runs in a per-volume
            `charly-enc-<image>-<volume>` systemd --user scope).
        tag: [working]
    package:
        - gocryptfs
    scenario:
        # The candy's OWN deliverable: the gocryptfs binary on disk.
        - name: gocryptfs-binary-installed
          step:
            - then: the gocryptfs encrypted-filesystem binary is installed at /usr/bin/gocryptfs
              file: /usr/bin/gocryptfs
              exists: true
        # The binary is runnable and reports a version string — proves a
        # working install, not just a stray file on disk.
        - name: gocryptfs-reports-version
          step:
            - then: gocryptfs runs and prints a version string (gocryptfs vX.Y.Z) on stdout
              command: /usr/bin/gocryptfs -version
              exit_status: 0
              stdout:
                - matches: "gocryptfs v[0-9]"
        - name: gocryptfs-binary
          step:
            - id: gocryptfs-binary
              file: /usr/bin/gocryptfs
              exists: true
        - name: gocryptfs-package
          step:
            - id: gocryptfs-package
              package: gocryptfs
              installed: true
        - name: gocryptfs-version
          step:
            - id: gocryptfs-version
              command: /usr/bin/gocryptfs -version
              exit_status: 0
              stdout:
                - matches: "gocryptfs v[0-9]"
