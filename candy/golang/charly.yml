golang:
    candy:
        version: 2026.144.1443
        description: |
            Go programming language compiler — the `go` toolchain on $PATH
            Installs the Go compiler/toolchain from each distro's package repo
            (arch `go`, debian/ubuntu `golang-go`, fedora `golang-bin`), landing
            the `go` driver binary at /usr/bin/go. Verifiable end to end: the
            binary exists, `go version` reports a Go toolchain version, and the
            toolchain actually compiles and runs a standalone Go program.
    golang-distro:
        distro:
            arch:
                package:
                    - go
            debian:
                package:
                    - golang-go
            fedora:
                package:
                    - golang-bin
            ubuntu:
                package:
                    - golang-go
    golang-step-0:
        check: the go compiler binary is installed at /usr/bin/go
        plugin: file
        plugin_input:
            file: /usr/bin/go
            exists: true
    golang-step-1:
        check: running `go version` succeeds and prints a Go toolchain version
        exit_status: 0
        stdout:
            - matches: "go version go[0-9]"
        plugin: command
        plugin_input:
            command: /usr/bin/go version
    golang-step-2:
        check: the toolchain compiles and runs a standalone Go program and prints its output
        exit_status: 0
        stdout:
            - contains: charly-go-build-ok
        plugin: command
        plugin_input:
            command: |
                set -e
                d=$(mktemp -d)
                printf 'package main\nimport "fmt"\nfunc main() { fmt.Println("charly-go-build-ok") }\n' > "$d/main.go"
                cd "$d"
                export HOME="$d" GOCACHE="$d/.gocache" GOPATH="$d/.gopath" GOFLAGS=-mod=mod
                /usr/bin/go mod init charlygotest >/dev/null 2>&1 || true
                /usr/bin/go run main.go
    go-package:
        check: package=go
        id: go-package
        plugin: package
        plugin_input:
            package: go
            package_map:
                arch: go
                debian: golang-go
                ubuntu: golang-go
                fedora: golang-bin
            installed: true
