hermes-playwright:
    candy:
        version: 2026.144.1443
        description: |
            Playwright Chromium browser baked into the Hermes image for headless browser automation
            Installs the Chromium browser via `npx playwright install chromium`
            into /tmp/.cache/ms-playwright (PLAYWRIGHT_BROWSERS_PATH) plus the
            Fedora system libraries (nss, gtk3, alsa-lib, ...) Chromium needs to
            launch. Verifiable: the browser build dir + chrome executable land
            under the cache path, and the runtime libraries are in the rpm db.
    hermes-playwright-require:
        require:
            - hermes
    hermes-playwright-env:
        env:
            PLAYWRIGHT_BROWSERS_PATH: "/tmp/.cache/ms-playwright"
    hermes-playwright-distro:
        distro:
            fedora:
                package:
                    - alsa-lib
                    - at-spi2-core
                    - cups-libs
                    - gtk3
                    - libdrm
                    - libxkbcommon
                    - nss
                    - mesa-dri-drivers
                    - vulkan-loader
                    - libXcomposite
                    - libXdamage
                    - libXrandr
                    - pango
                    - cairo
    hermes-playwright-security:
        security:
            shm_size: "1g"
    hermes-playwright-step-0:
        run: command=HOME=/tmp npx playwright install chromium
        command: HOME=/tmp npx playwright install chromium
        run_as: "${USER}"
    hermes-playwright-step-1:
        check: the Playwright browsers cache directory is baked into the image
        file: /tmp/.cache/ms-playwright
        exists: true
    hermes-playwright-step-2:
        check: a Chromium build directory is present under the cache path
        command: ls /tmp/.cache/ms-playwright
        stdout:
            - contains: chromium
    hermes-playwright-step-3:
        check: the installed Chromium browser binary is executable
        command: |
            bin=$(ls /tmp/.cache/ms-playwright/chromium-*/chrome-linux/chrome /tmp/.cache/ms-playwright/chromium_headless_shell-*/chrome-linux/headless_shell 2>/dev/null | head -1)
            test -x "$bin" && echo "EXEC_OK:$bin"
        stdout:
            - contains: EXEC_OK
    hermes-playwright-step-4:
        check: the NSS library Chromium links against is installed
        package: nss
        installed: true
    hermes-playwright-step-5:
        check: the GTK3 runtime Chromium needs to launch is installed
        package: gtk3
        installed: true
    hermes-playwright-step-6:
        agent-check: Playwright can launch the installed Chromium headlessly to drive a browser automation session
    hermes-playwright-alsa-lib-package:
        check: package=alsa-lib
        id: hermes-playwright-alsa-lib-package
        package: alsa-lib
        installed: true
