[workspace]
name = "hermes"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.13,<3.14"
pip = "*"

[pypi-dependencies]
# Core
openai = ">=2.21.0,<3"
anthropic = ">=0.39.0,<1"
python-dotenv = ">=1.2.1,<2"
fire = ">=0.7.1,<1"
httpx = ">=0.28.1,<1"
rich = ">=14.3.3,<15"
tenacity = ">=9.1.4,<10"
pyyaml = ">=6.0.2,<7"
requests = ">=2.33.0,<3"
jinja2 = ">=3.1.5,<4"
pydantic = ">=2.12.5,<3"
prompt_toolkit = ">=3.0.52,<4"

# Tools
exa-py = ">=2.9.0,<3"
firecrawl-py = ">=4.16.0,<5"
parallel-web = ">=0.4.2,<1"
fal-client = ">=0.13.1,<1"
edge-tts = ">=7.2.7,<8"
PyJWT = {version = ">=2.12.0,<3", extras = ["crypto"]}

# Optional: modal
modal = ">=1.0.0,<2"

# Optional: daytona
daytona = ">=0.148.0,<1"

# Optional: messaging
python-telegram-bot = {version = ">=22.6,<23", extras = ["webhooks"]}
discord-py = {version = ">=2.7.1,<3", extras = ["voice"]}
aiohttp = ">=3.13.3,<4"
slack-bolt = ">=1.18.0,<2"
slack-sdk = ">=3.27.0,<4"

# Optional: cron
croniter = ">=6.0.0,<7"

# Optional: cli
simple-term-menu = ">=1.0,<2"

# Optional: tts-premium
elevenlabs = ">=1.0,<2"

# Optional: voice
faster-whisper = ">=1.0.0,<2"
sounddevice = ">=0.4.6,<1"
numpy = ">=1.24.0,<3"

# Optional: pty
ptyprocess = ">=0.7.0,<1"

# Optional: honcho
honcho-ai = ">=2.0.1,<3"

# Optional: mcp
mcp = ">=1.2.0,<2"

# Optional: acp
agent-client-protocol = ">=0.9.0,<1.0"

# Optional: dingtalk
dingtalk-stream = ">=0.1.0,<1"

# Optional: feishu
lark-oapi = ">=1.5.3,<2"

# Optional: dev
debugpy = ">=1.8.0,<2"
pytest = ">=9.0.2,<10"
pytest-asyncio = ">=1.3.0,<2"
pytest-xdist = ">=3.0,<4"
