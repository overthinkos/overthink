candy:
    version: 2026.144.1443
    name: immich-ml
    description: |
        Immich machine-learning backend serving face recognition and smart-search inference on port 3003.
        Installs the uv Python package manager, then builds a dedicated
        virtualenv at /opt/immich/machine-learning/.venv and installs the
        immich_ml module from the pinned Immich source release. A supervised
        immich-ml service runs `python -m immich_ml`, exposing the ML
        inference API on port 3003 (its /ping endpoint answers "pong") so the
        Immich server can offload face detection and CLIP smart-search
        embedding to this backend.
    require:
        - immich
    env:
        IMMICH_MACHINE_LEARNING_ENABLED: "true"
        IMMICH_MACHINE_LEARNING_URL: "http://127.0.0.1:3003"
        MACHINE_LEARNING_HOST: "0.0.0.0"
        MACHINE_LEARNING_PORT: "3003"
        MACHINE_LEARNING_WORKERS: "1"
        MACHINE_LEARNING_WORKER_TIMEOUT: "120"
        TRANSFORMERS_CACHE: "~/.immich/models"
    port:
        - 3003
    volume:
        - name: models
          path: "~/.immich/models"
    var:
        IMMICH_VERSION: v2.7.5
    service:
        - name: immich-ml
          exec: "bash -c 'export PATH=/opt/immich/machine-learning/.venv/bin:$PATH VIRTUAL_ENV=/opt/immich/machine-learning/.venv && python -m immich_ml'"
          env:
            IMMICH_HOST: 0.0.0.0
            IMMICH_PORT: 3003
          restart: always
          working_directory: /opt/immich/machine-learning
          priority: 40
          enable: true
          scope: system
    plan:
        - run: download=https://astral.sh/uv/install.sh
          download: "https://astral.sh/uv/install.sh"
          extract: sh
          env:
            UV_INSTALL_DIR: /usr/local/bin
          run_as: root
        - run: |
            command=curl -L "https://github.com/immich-app/immich/archive/refs/tags/${IMMICH_VERSION}.tar.gz" | tar xz -C /tmp
            mv /tmp/immich-$(echo ${IMMICH_VERSION} | sed 's/^v//') /tmp/immich
          command: |
            curl -L "https://github.com/immich-app/immich/archive/refs/tags/${IMMICH_VERSION}.tar.gz" | tar xz -C /tmp
            mv /tmp/immich-$(echo ${IMMICH_VERSION} | sed 's/^v//') /tmp/immich
          run_as: root
        - run: |
            command=uv venv /opt/immich/machine-learning/.venv
            cd /tmp/immich/machine-learning && VIRTUAL_ENV=/opt/immich/machine-learning/.venv uv pip install ".[cpu]"
            cp -r /tmp/immich/machine-learning/immich_ml /opt/immich/machine-learning/
            rm -rf /tmp/immich
          command: |
            uv venv /opt/immich/machine-learning/.venv
            cd /tmp/immich/machine-learning && VIRTUAL_ENV=/opt/immich/machine-learning/.venv uv pip install ".[cpu]"
            cp -r /tmp/immich/machine-learning/immich_ml /opt/immich/machine-learning/
            rm -rf /tmp/immich
          run_as: root
        - run: mkdir=${HOME}/.immich/models
          mkdir: "${HOME}/.immich/models"
          run_as: "${USER}"
        - run: mkdir=${HOME}/.cache/immich_ml
          mkdir: "${HOME}/.cache/immich_ml"
          run_as: "${USER}"
        - check: the dedicated machine-learning virtualenv ships a python interpreter
          file: /opt/immich/machine-learning/.venv/bin/python
          exists: true
        - check: the immich_ml inference module is installed into the machine-learning tree
          file: /opt/immich/machine-learning/immich_ml
          filetype: directory
        - check: the uv package manager that built the venv is on the system PATH
          file: /usr/local/bin/uv
          exists: true
        - check: the per-user model cache directory is provisioned under the home tree
          file: ${HOME}/.immich/models
          filetype: directory
        - check: the supervised immich-ml service is running
          service: immich-ml
          running: true
          context:
            - runtime
        - check: the ML inference API answers its health probe on port 3003 with pong
          command: curl -fsS http://127.0.0.1:3003/ping
          exit_status: 0
          in_container: true
          stdout:
            - contains: pong
          context:
            - runtime
        - check: service=immich-ml
          id: immich-ml-service-running
          service: immich-ml
          running: true
          context:
            - runtime
        - check: command=curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3003/ping
          id: immich-ml-internal-port
          command: curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:3003/ping
          exit_status: 0
          in_container: true
          stdout:
            - equals: "200"
          context:
            - runtime
