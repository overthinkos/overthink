candy:
    version: 2026.144.1443
    name: java-openjdk
    description: |
        OpenJDK 21 runtime + JDK tools with a distro-agnostic JAVA_HOME canonical symlink
        OpenJDK 21 headless runtime + JDK tools. Cross-distro: Fedora ships
        java-21-openjdk(-headless/-devel); Arch ships jdk21-openjdk; Debian/
        Ubuntu ship openjdk-21-jdk-headless. A build task symlinks the
        distro-agnostic JAVA_HOME (/usr/lib/jvm/charly-jdk21) onto whichever
        JDK 21 root the package installed, so consumers (Android SDK, Appium,
        Gradle, sbt) discover java + javac without hardcoding a distro path.
        Every claim below is observable: the binaries, the canonical symlink
        target, and the reported runtime version.
    env:
        # Distro-agnostic JAVA_HOME. The task below symlinks /usr/lib/jvm/charly-jdk21 to
        # whichever JDK 21 root the distro package installed (fedora java-21-openjdk,
        # arch java-21-openjdk, debian/ubuntu java-21-openjdk-amd64), so consumers
        # (android-sdk, appium-server, the emulator service) never hardcode a
        # distro-specific path. The previous hardcoded /usr/lib/jvm/jre-21-openjdk
        # only existed on Fedora — it silently broke every other distro.
        JAVA_HOME: "/usr/lib/jvm/charly-jdk21"
    path_append:
        - "/usr/lib/jvm/charly-jdk21/bin"
    distro:
        fedora:
            package:
                - java-21-openjdk-headless
                - java-21-openjdk-devel
        arch:
            package:
                - jdk21-openjdk
        debian:
            package:
                - openjdk-21-jdk-headless
        ubuntu:
            package:
                - openjdk-21-jdk-headless
    plan:
        - run: |
            command=set -e
            # Establish the canonical, distro-agnostic JAVA_HOME (see env: above).
            # Pick the JDK 21 root the distro package installed and symlink a stable
            # path to it. Prefer the full JDK (has bin/javac) over a bare JRE.
            jdk=""
            for c in /usr/lib/jvm/java-21-openjdk /usr/lib/jvm/java-21-openjdk-amd64 \
                     /usr/lib/jvm/java-21-openjdk-* /usr/lib/jvm/jre-21-openjdk; do
              if [ -x "$c/bin/java" ]; then jdk="$c"; break; fi
            done
            [ -n "$jdk" ] || { echo "java-openjdk: no JDK 21 found under /usr/lib/jvm" >&2; exit 1; }
            ln -sfn "$jdk" /usr/lib/jvm/charly-jdk21
            echo "java-openjdk: JAVA_HOME -> /usr/lib/jvm/charly-jdk21 -> $jdk"
          command: |
            set -e
            # Establish the canonical, distro-agnostic JAVA_HOME (see env: above).
            # Pick the JDK 21 root the distro package installed and symlink a stable
            # path to it. Prefer the full JDK (has bin/javac) over a bare JRE.
            jdk=""
            for c in /usr/lib/jvm/java-21-openjdk /usr/lib/jvm/java-21-openjdk-amd64 \
                     /usr/lib/jvm/java-21-openjdk-* /usr/lib/jvm/jre-21-openjdk; do
              if [ -x "$c/bin/java" ]; then jdk="$c"; break; fi
            done
            [ -n "$jdk" ] || { echo "java-openjdk: no JDK 21 found under /usr/lib/jvm" >&2; exit 1; }
            ln -sfn "$jdk" /usr/lib/jvm/charly-jdk21
            echo "java-openjdk: JAVA_HOME -> /usr/lib/jvm/charly-jdk21 -> $jdk"
          run_as: root
        - check: the JRE launcher is installed at /usr/bin/java
          file: /usr/bin/java
          exists: true
        - check: the compiler is installed at /usr/bin/javac
          file: /usr/bin/javac
          exists: true
        - check: the distro-agnostic JAVA_HOME exposes a working java launcher
          command: test -x /usr/lib/jvm/charly-jdk21/bin/java
          exit_status: 0
        - check: the distro-agnostic JAVA_HOME exposes a working javac compiler
          command: test -x /usr/lib/jvm/charly-jdk21/bin/javac
          exit_status: 0
        - check: the runtime identifies itself as OpenJDK version 21
          command: /usr/bin/java -version 2>&1
          exit_status: 0
          stdout:
            - contains: "21."
        - check: command=/usr/bin/java -version
          id: java-runs
          command: /usr/bin/java -version
          exit_status: 0
        - check: package=openjdk-21-jdk-headless
          id: java-openjdk-package
          package: openjdk-21-jdk-headless
          package_map:
            fedora: java-21-openjdk-headless
            arch: jdk21-openjdk
          installed: true
