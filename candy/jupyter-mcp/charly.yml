candy:
    version: 2026.144.1443
    name: jupyter-mcp
    description:
        feature: JupyterLab CRDT MCP server extension — fastmcp + the in-tree jupyter_mcp distribution pip-installed into the parent pixi env and enabled as a Jupyter Server extension.
        narrative: |
            A Tier 1 post-install candy with no pixi.toml of its own: it pip-installs
            fastmcp and the in-tree jupyter_mcp package into the default pixi
            environment provided by the parent jupyter / jupyter-ml layer, then writes
            a jupyter_server_config.d drop-in that enables jupyter_mcp as a Jupyter
            Server extension. The observable effects — fastmcp importable, jupyter_mcp
            importable, the enabling JSON present, and (once a jupyter box is deployed)
            the Streamable HTTP MCP server routing /mcp — are all verifiable.
        tag: [working]
    task:
        # fastmcp via pip: pixi's cross-platform resolver conflicts with
        # opentelemetry-api on aarch64, so we bypass pixi for this one dep.
        - command: ~/.pixi/envs/default/bin/pip install "fastmcp>=3.2.0"
          run_as: "${USER}"
        # The in-tree jupyter_mcp distribution — --no-deps because deps above.
        - command: ~/.pixi/envs/default/bin/pip install --no-deps /ctx/jupyter_mcp
          run_as: "${USER}"
        # Enable the extension in Jupyter Server config.
        - command: |
            JUPYTER_CONFIG_DIR=~/.pixi/envs/default/etc/jupyter/jupyter_server_config.d
            mkdir -p "$JUPYTER_CONFIG_DIR"
            echo '{"ServerApp": {"jpserver_extensions": {"jupyter_mcp": true}}}' > \
              "$JUPYTER_CONFIG_DIR/jupyter_mcp.json"
          run_as: "${USER}"
    scenario:
        - name: fastmcp-runtime-present
          step:
            - then: fastmcp is installed in the parent pixi default environment
              command: ${HOME}/.pixi/envs/default/bin/pip show fastmcp
              exit_status: 0
              stdout:
                - contains: "Name: fastmcp"
        - name: extension-package-importable
          step:
            - then: the in-tree jupyter_mcp extension package imports from the pixi env
              command: ${HOME}/.pixi/envs/default/bin/python -c "import jupyter_mcp"
              exit_status: 0
        - name: server-extension-enabled
          step:
            - then: the Jupyter Server config drop-in enables the jupyter_mcp extension
              file: ${HOME}/.pixi/envs/default/etc/jupyter/jupyter_server_config.d/jupyter_mcp.json
              exists: true
              contains:
                - contains: "jupyter_mcp"
        - name: mcp-endpoint-routes
          step:
            - then: the deployed JupyterLab routes /mcp to the MCP handler (an empty POST returns 400, not a 404)
              http: http://127.0.0.1:${HOST_PORT:8888}/mcp
              method: POST
              status: 400
              timeout: 5s
              context:
                - runtime
            - then: an agent can list the notebook_*/cell_*/room_list MCP tools and round-trip a cell edit through the live server
