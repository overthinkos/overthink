candy:
    version: 2026.144.1531
    name: jupyter-ml
    require:
        - cuda
        - supervisord
    candy:
        - llama-cpp
        - unsloth
        - jupyter-mcp
    env:
        NVIDIA_PYTHON_PROJECT: "~/.pixi"
        LD_LIBRARY_PATH: "/usr/lib64:$HOME/llama.cpp"
    distro:
        arch:
            package:
                - git
                - gcc
        fedora:
            package:
                - git
                - gcc
                - gcc-c++
    port:
        - 8888
    mcp_provide:
        - name: jupyter
          url: "http://{{.ContainerName}}:8888/mcp"
          transport: http
    volume:
        - name: workspace
          path: /workspace
    eval:
        # Build-scope smoke for the NLP packages added to pixi.toml — mirrors the
        # jupyter layer's spacy-import check. Catches model rename / API drift at
        # image build, not at first notebook open.
        - id: spacy-import
          command: ${HOME}/.pixi/envs/default/bin/python -c "import spacy; spacy.load('en_core_web_sm')"
          exit_code: 0
        # JupyterLab extension shipped as a PyPI wheel. The wheel installs
        # files under share/jupyter/labextensions/jupyterlab-quarto/ and a
        # source dir literally named "jupyterlab-quarto" (hyphen — NOT a
        # Python-importable module name). The runtime contract is "enabled
        # in the labextension registry", not "import succeeds" — verify via
        # `jupyter labextension list`. The `2>&1` is required because the
        # command writes to stderr.
        - id: jupyterlab-quarto-enabled
          command: ${HOME}/.pixi/envs/default/bin/jupyter labextension list 2>&1
          exit_code: 0
          stdout:
            # Regex (not literal contains) because `jupyter labextension list`
            # emits ANSI color codes inline between "enabled" and "OK" even on
            # a non-TTY pipe (e.g. \x1b[32menabled\x1b[0m \x1b[32mOK\x1b[0m).
            # The .* spans them.
            - matches: "jupyterlab-quarto.*enabled.*OK"
        # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
        # Runs only under `ov eval live <image>` (deploy-scope). Build-scope and
        # functional HTTP checks are contributed by the composed jupyter-mcp layer.
        - id: mcp-jupyter-ml-ping
          scope: deploy
          mcp: ping
          timeout: 10s
        - id: mcp-jupyter-ml-list-tools
          scope: deploy
          mcp: list-tools
          stdout:
            - contains: cell_insert
            - contains: cell_execute
        - id: mcp-jupyter-ml-list-notebooks
          scope: deploy
          mcp: call
          tool: notebook_list
          input: "{}"
          exit_status: 0
    service:
        - name: jupyter-ml
          exec: "bash -c 'if [ -n \"${JUPYTER_TOKEN_FILE:-}\" ] && [ -f \"${JUPYTER_TOKEN_FILE}\" ]; then TOKEN=$(cat \"${JUPYTER_TOKEN_FILE}\"); exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=/workspace --IdentityProvider.token=\"$TOKEN\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; else exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=/workspace --IdentityProvider.token=\"\" --ServerApp.password=\"\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; fi'"
          restart: always
          working_directory: "%(ENV_HOME)s"
          enable: true
          scope: system
