                        r = await c.call_tool(t, a or {})
                        return r.data if r.data is not None else json.loads(
                            "".join(b.text for b in r.content if hasattr(b, "text"))
                        )
                    stem = f"_check_canon_{uuid.uuid4().hex[:8]}"
                    p = f"{stem}.ipynb"
                    await call("notebook_create", {"path": p})
                    # Three different path forms — all must converge on ONE room.
                    await call("cell_insert", {"path": p, "index": 0, "source": "x"})
                    await call("cell_insert", {"path": f"./{p}", "index": 1, "source": "y"})
                    await call("cell_insert", {"path": f"/workspace/{p}",
                                                "index": 2, "source": "z"})
                    rl = await call("room_list")
                    matching = [r for r in rl if stem in r.get("path","")]
                    assert len(matching) == 1, f"expected 1 room, got {len(matching)}: {matching}"
                    # All three inserts landed in the SAME notebook. Upstream
                    # YNotebook auto-injects a default empty code cell on first
                    # room init, so 3 inserts + 1 default = 4.
                    cells = (await call("notebook_get", {"path": p}))["cells"]
                    assert len(cells) == 4, f"expected 4 cells (3 inserts + 1 default), got {len(cells)}"
                    print("OK")
            asyncio.run(main())
            PYEOF
          exit_status: 0
          stdout:
            - contains: "OK"
          in_container: true
          context:
            - runtime
        - check: |
            command=${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
            import asyncio, json
            from fastmcp import Client
            async def main():
                async with Client("http://localhost:8888/mcp") as c:
                    # Host path (outside container's /workspace) MUST be rejected.
                    try:
                        r = await c.call_tool("cell_get", {
                            "path": "/home/atrawog/Atrapub/workspace/anything.ipynb",
                            "index": 0,
                        })
                        text = "".join(b.text for b in r.content if hasattr(b, "text"))
                        is_error = bool(getattr(r, "is_error", False))
                        if not is_error and "outside" not in text and "ValueError" not in text:
                            raise SystemExit(f"host path accepted: {text!r}")
                    except Exception as e:
                        if "outside" in str(e) or "resolves outside" in str(e):
                            print("OK")
                            return
                        if "ValueError" in str(e):
                            print("OK")
                            return
                        raise
                    print("OK")
            asyncio.run(main())
            PYEOF
          id: mcp-jupyter-host-path-rejected
          command: |
            ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
            import asyncio, json
            from fastmcp import Client
            async def main():
                async with Client("http://localhost:8888/mcp") as c:
