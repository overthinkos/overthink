candy:
    version: 2026.144.1443
    name: jupyter
    description:
        feature: JupyterLab notebook server with a CRDT MCP server for agent-driven notebook editing.
        narrative: |
            Installs JupyterLab into the pixi default environment (the jupyter-lab
            binary), adds the spaCy en_core_web_sm NLP model and the
            jupyterlab-quarto extension, and serves notebooks on port 8888 from
            the /workspace volume under supervisord. A bundled MCP server (composed
            from jupyter-mcp) exposes notebook_*/cell_* tools at /mcp so an agent
            can create and edit notebooks over the Model Context Protocol.
        tag: [working]
    require:
        - supervisord
    candy:
        - jupyter-mcp
    env:
        MCP_SERVER_NAME: "jupyter"
    distro:
        fedora:
            package:
                - git
    port:
        - 8888
    mcp_provide:
        - name: jupyter
          url: "http://{{.ContainerName}}:8888/mcp"
          transport: http
    volume:
        - name: workspace
          path: /workspace
    service:
        - name: jupyter
          exec: "bash -c 'if [ -n \"${JUPYTER_TOKEN_FILE:-}\" ] && [ -f \"${JUPYTER_TOKEN_FILE}\" ]; then TOKEN=$(cat \"${JUPYTER_TOKEN_FILE}\"); exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=/workspace --IdentityProvider.token=\"$TOKEN\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; else exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=/workspace --IdentityProvider.token=\"\" --ServerApp.password=\"\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; fi'"
          restart: always
          working_directory: "%(ENV_HOME)s"
          enable: true
          scope: system
    scenario:
        - name: jupyterlab-installed
          step:
            - then: JupyterLab is installed as a pixi-managed binary in the default env
              file: ${HOME}/.pixi/envs/default/bin/jupyter-lab
              exists: true
        - name: nlp-stack-ready
          step:
            - then: the spaCy en_core_web_sm model loads for NLP notebooks
              command: ${HOME}/.pixi/envs/default/bin/python -c "import spacy; spacy.load('en_core_web_sm')"
              exit_status: 0
        - name: notebook-server-serves-api
          step:
            - then: the workspace volume is mounted for notebooks
              file: /workspace
              filetype: directory
              context:
                - runtime
            - then: the JupyterLab service is running under supervisord
              service: jupyter
              running: true
              context:
                - runtime
            - then: the JupyterLab REST API answers on the published port with a server version
              http: http://127.0.0.1:${HOST_PORT:8888}/api
              status: 200
              body:
                - contains: version
              context:
                - runtime
        - name: mcp-notebook-tools-exposed
          step:
            - then: the Jupyter MCP server responds to a protocol ping
              mcp: ping
              timeout: 10s
              context:
                - runtime
            - then: the MCP tool catalog exposes the notebook and cell manipulation tools
              mcp: list-tools
              stdout:
                - contains: notebook_create
                - contains: cell_execute
              context:
                - runtime
            - then: an agent can create a notebook and edit its cells through the MCP server end to end
        - name: workspace-dir
          step:
            # Workspace mount is created by the deploy volume — only present at runtime.
            - id: workspace-dir
              file: /workspace
              filetype: directory
              context:
                - runtime
        - name: jupyter-lab-binary
          step:
            - id: jupyter-lab-binary
              file: ${HOME}/.pixi/envs/default/bin/jupyter-lab
              exists: true
        - name: spacy-import
          step:
            # Verify spacy + en_core_web_sm model load — build-scope smoke for the NLP
            # additions in pixi.toml. The verify-spacy pixi task does the actual import.
            - id: spacy-import
              command: ${HOME}/.pixi/envs/default/bin/python -c "import spacy; spacy.load('en_core_web_sm')"
              exit_code: 0
        - name: jupyterlab-quarto-enabled
          step:
            # JupyterLab extension shipped as a PyPI wheel. The wheel installs
            # files under share/jupyter/labextensions/jupyterlab-quarto/ and a
            # source dir literally named "jupyterlab-quarto" (hyphen — NOT a
            # Python-importable module name). The runtime contract is "enabled
            # in the labextension registry", not "import succeeds" — verify via
            # `jupyter labextension list`. The `2>&1` is required because the
            # command writes to stderr.
            - id: jupyterlab-quarto-enabled
              command: ${HOME}/.pixi/envs/default/bin/jupyter labextension list 2>&1
              exit_code: 0
              stdout:
                # Regex (not literal contains) because `jupyter labextension list`
                # emits ANSI color codes inline between "enabled" and "OK" even on
                # a non-TTY pipe (e.g. \x1b[32menabled\x1b[0m \x1b[32mOK\x1b[0m).
                # The .* spans them.
                - matches: "jupyterlab-quarto.*enabled.*OK"
        - name: jupyter-service
          step:
            - id: jupyter-service
              service: jupyter
              running: true
              context:
                - runtime
        - name: jupyter-port
          step:
            - id: jupyter-port
              addr: 127.0.0.1:${HOST_PORT:8888}
              reachable: true
              timeout: 5s
              context:
                - runtime
        - name: jupyter-api
          step:
            # Service answers on its routed port at deploy time. The HOST_PORT
            # substitution means remapping in deploy.yml just works.
            - id: jupyter-api
              http: http://127.0.0.1:${HOST_PORT:8888}/api
              status: 200
              body:
                - contains: "version"
              context:
                - runtime
        - name: mcp-jupyter-ping
          step:
            # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
            # Runs only under `charly eval live <image>` (deploy-scope).
            - id: mcp-jupyter-ping
              mcp: ping
              timeout: 10s
              context:
                - runtime
        - name: mcp-jupyter-list-tools
          step:
            # Assert the post-2026-05-06 11-tool MCP surface — notebook_*/cell_* +
            # notebook_list_users + room_list. Room *management* tools (room_open,
            # room_close, room_close_all, room_pick) were deleted: clients no
            # longer manage CRDT rooms; the server auto-attaches to any existing
            # room or creates one on demand.
            - id: mcp-jupyter-list-tools
              mcp: list-tools
              stdout:
                - contains: notebook_list
                - contains: notebook_create
                - contains: notebook_get
                - contains: notebook_watch
                - contains: notebook_list_users
                - contains: cell_get
                - contains: cell_update
                - contains: cell_insert
                - contains: cell_delete
                - contains: cell_execute
                - contains: room_list
                - not_contains: room_open
                - not_contains: room_close
                - not_contains: room_pick
              context:
                - runtime
        - name: mcp-jupyter-list-notebooks
          step:
            - id: mcp-jupyter-list-notebooks
              mcp: call
              tool: notebook_list
              input: "{}"
              exit_status: 0
              context:
                - runtime
        - name: mcp-jupyter-cell-update-preserves-id
          step:
            # Multi-step regression scenarios for the post-cutover invariants.
            # Driven via a single python+fastmcp session (ONE MCP transport);
            # each scenario is a self-contained reproducer that fails on the
            # pre-cutover code. Failure of any of these = a regression.
            - id: mcp-jupyter-cell-update-preserves-id
              command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json, sys, uuid
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        async def call(t, a=None):
                            r = await c.call_tool(t, a or {})
                            return r.data if r.data is not None else json.loads(
                                "".join(b.text for b in r.content if hasattr(b, "text"))
                            )
                        p = f"_eval_id_{uuid.uuid4().hex[:8]}.ipynb"
                        await call("notebook_create", {"path": p})
                        await call("cell_insert", {"path": p, "index": 0,
                                                    "source": "alpha", "cell_type": "markdown"})
                        before = (await call("cell_get", {"path": p, "index": 0}))["id"]
                        await call("cell_update", {"path": p, "index": 0, "source": "beta"})
                        after = (await call("cell_get", {"path": p, "index": 0}))["id"]
                        assert before == after, f"id drift {before!r} -> {after!r}"
                        print("OK")
                asyncio.run(main())
                PYEOF
              exit_status: 0
              stdout:
                - contains: "OK"
              in_container: true
              context:
                - runtime
        - name: mcp-jupyter-cell-update-preserves-count
          step:
            - id: mcp-jupyter-cell-update-preserves-count
              command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json, uuid
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        async def call(t, a=None):
                            r = await c.call_tool(t, a or {})
                            return r.data if r.data is not None else json.loads(
                                "".join(b.text for b in r.content if hasattr(b, "text"))
                            )
                        p = f"_eval_count_{uuid.uuid4().hex[:8]}.ipynb"
                        await call("notebook_create", {"path": p})
                        for i, src in enumerate(["a","b","c","d","e"]):
                            await call("cell_insert", {"path": p, "index": i,
                                                        "source": src, "cell_type": "markdown"})
                        # Upstream YNotebook auto-injects a default empty code cell
                        # on first room init, so baseline = N_inserts + 1. The
                        # invariant we care about: cell_update preserves count.
                        before = len((await call("notebook_get", {"path": p}))["cells"])
                        for idx, src in [(0,"A"),(2,"C"),(4,"E"),(0,"AA"),(2,"CC")]:
                            await call("cell_update", {"path": p, "index": idx, "source": src})
                        after = len((await call("notebook_get", {"path": p}))["cells"])
                        assert before == after, f"count drift {before} -> {after}"
                        print("OK")
                asyncio.run(main())
                PYEOF
              exit_status: 0
              stdout:
                - contains: "OK"
              in_container: true
              context:
                - runtime
        - name: mcp-jupyter-single-room-canonical-paths
          step:
            - id: mcp-jupyter-single-room-canonical-paths
              command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json, uuid
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        async def call(t, a=None):
                            r = await c.call_tool(t, a or {})
                            return r.data if r.data is not None else json.loads(
                                "".join(b.text for b in r.content if hasattr(b, "text"))
                            )
                        stem = f"_eval_canon_{uuid.uuid4().hex[:8]}"
                        p = f"{stem}.ipynb"
                        await call("notebook_create", {"path": p})
                        # Three different path forms — all must converge on ONE room.
                        await call("cell_insert", {"path": p, "index": 0, "source": "x"})
                        await call("cell_insert", {"path": f"./{p}", "index": 1, "source": "y"})
                        await call("cell_insert", {"path": f"/workspace/{p}",
                                                    "index": 2, "source": "z"})
                        rl = await call("room_list")
                        matching = [r for r in rl if stem in r.get("path","")]
                        assert len(matching) == 1, f"expected 1 room, got {len(matching)}: {matching}"
                        # All three inserts landed in the SAME notebook. Upstream
                        # YNotebook auto-injects a default empty code cell on first
                        # room init, so 3 inserts + 1 default = 4.
                        cells = (await call("notebook_get", {"path": p}))["cells"]
                        assert len(cells) == 4, f"expected 4 cells (3 inserts + 1 default), got {len(cells)}"
                        print("OK")
                asyncio.run(main())
                PYEOF
              exit_status: 0
              stdout:
                - contains: "OK"
              in_container: true
              context:
                - runtime
        - name: mcp-jupyter-host-path-rejected
          step:
            - id: mcp-jupyter-host-path-rejected
              command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        # Host path (outside container's /workspace) MUST be rejected.
                        try:
                            r = await c.call_tool("cell_get", {
                                "path": "/home/atrawog/Atrapub/workspace/anything.ipynb",
                                "index": 0,
                            })
                            text = "".join(b.text for b in r.content if hasattr(b, "text"))
                            is_error = bool(getattr(r, "is_error", False))
                            if not is_error and "outside" not in text and "ValueError" not in text:
                                raise SystemExit(f"host path accepted: {text!r}")
                        except Exception as e:
                            if "outside" in str(e) or "resolves outside" in str(e):
                                print("OK")
                                return
                            if "ValueError" in str(e):
                                print("OK")
                                return
                            raise
                        print("OK")
                asyncio.run(main())
                PYEOF
              exit_status: 0
              stdout:
                - contains: "OK"
              in_container: true
              context:
                - runtime
        - name: mcp-jupyter-auto-attach-from-cold
          step:
            - id: mcp-jupyter-auto-attach-from-cold
              command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json, uuid
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        async def call(t, a=None):
                            r = await c.call_tool(t, a or {})
                            return r.data if r.data is not None else json.loads(
                                "".join(b.text for b in r.content if hasattr(b, "text"))
                            )
                        p = f"_eval_cold_{uuid.uuid4().hex[:8]}.ipynb"
                        # No prior tool to "open" the room — cell_insert auto-attaches.
                        # Upstream YNotebook auto-injects a default empty code cell, so
                        # baseline = 1, after 1 insert = 2.
                        await call("notebook_create", {"path": p})
                        await call("cell_insert", {"path": p, "index": 0, "source": "auto"})
                        cells = (await call("notebook_get", {"path": p}))["cells"]
                        sources = [c.get("source") for c in cells]
                        assert any("auto" in str(s) for s in sources), \
                            f"inserted cell missing: {cells}"
                        rl = await call("room_list")
                        assert any(p in r.get("path","") for r in rl), \
                            f"room not auto-created for {p}"
                        print("OK")
                asyncio.run(main())
                PYEOF
              exit_status: 0
              stdout:
                - contains: "OK"
              in_container: true
              context:
                - runtime
