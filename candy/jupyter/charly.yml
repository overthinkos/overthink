    mcp-jupyter-auto-attach-from-cold:
        check: |
            command=${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
            import asyncio, json, uuid
            from fastmcp import Client
            async def main():
                async with Client("http://localhost:8888/mcp") as c:
                    async def call(t, a=None):
                        r = await c.call_tool(t, a or {})
                        return r.data if r.data is not None else json.loads(
                            "".join(b.text for b in r.content if hasattr(b, "text"))
                        )
                    p = f"_check_cold_{uuid.uuid4().hex[:8]}.ipynb"
                    # No prior tool to "open" the room — cell_insert auto-attaches.
                    # Upstream YNotebook auto-injects a default empty code cell, so
                    # baseline = 1, after 1 insert = 2.
                    await call("notebook_create", {"path": p})
                    await call("cell_insert", {"path": p, "index": 0, "source": "auto"})
                    cells = (await call("notebook_get", {"path": p}))["cells"]
                    sources = [c.get("source") for c in cells]
                    assert any("auto" in str(s) for s in sources), \
                        f"inserted cell missing: {cells}"
                    rl = await call("room_list")
                    assert any(p in r.get("path","") for r in rl), \
                        f"room not auto-created for {p}"
                    print("OK")
            asyncio.run(main())
            PYEOF
        id: mcp-jupyter-auto-attach-from-cold
        exit_status: 0
        stdout:
            - contains: "OK"
        context:
            - runtime
        plugin: command
        plugin_input:
