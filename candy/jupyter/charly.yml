            in_container: true
    mcp-jupyter-cell-update-preserves-count:
        check: |
            command=${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
            import asyncio, json, uuid
            from fastmcp import Client
            async def main():
                async with Client("http://localhost:8888/mcp") as c:
                    async def call(t, a=None):
                        r = await c.call_tool(t, a or {})
                        return r.data if r.data is not None else json.loads(
                            "".join(b.text for b in r.content if hasattr(b, "text"))
                        )
                    p = f"_check_count_{uuid.uuid4().hex[:8]}.ipynb"
                    await call("notebook_create", {"path": p})
                    for i, src in enumerate(["a","b","c","d","e"]):
                        await call("cell_insert", {"path": p, "index": i,
                                                    "source": src, "cell_type": "markdown"})
                    # Upstream YNotebook auto-injects a default empty code cell
                    # on first room init, so baseline = N_inserts + 1. The
                    # invariant we care about: cell_update preserves count.
                    before = len((await call("notebook_get", {"path": p}))["cells"])
                    for idx, src in [(0,"A"),(2,"C"),(4,"E"),(0,"AA"),(2,"CC")]:
                        await call("cell_update", {"path": p, "index": idx, "source": src})
                    after = len((await call("notebook_get", {"path": p}))["cells"])
                    assert before == after, f"count drift {before} -> {after}"
                    print("OK")
            asyncio.run(main())
            PYEOF
        id: mcp-jupyter-cell-update-preserves-count
        exit_status: 0
        stdout:
            - contains: "OK"
        context:
            - runtime
        plugin: command
        plugin_input:
            command: |
                ${HOME}/.pixi/envs/default/bin/python - <<'PYEOF'
                import asyncio, json, uuid
                from fastmcp import Client
                async def main():
                    async with Client("http://localhost:8888/mcp") as c:
                        async def call(t, a=None):
                            r = await c.call_tool(t, a or {})
                            return r.data if r.data is not None else json.loads(
                                "".join(b.text for b in r.content if hasattr(b, "text"))
                            )
                        p = f"_check_count_{uuid.uuid4().hex[:8]}.ipynb"
                        await call("notebook_create", {"path": p})
                        for i, src in enumerate(["a","b","c","d","e"]):
                            await call("cell_insert", {"path": p, "index": i,
                                                        "source": src, "cell_type": "markdown"})
                        # Upstream YNotebook auto-injects a default empty code cell
                        # on first room init, so baseline = N_inserts + 1. The
                        # invariant we care about: cell_update preserves count.
                        before = len((await call("notebook_get", {"path": p}))["cells"])
                        for idx, src in [(0,"A"),(2,"C"),(4,"E"),(0,"AA"),(2,"CC")]:
                            await call("cell_update", {"path": p, "index": idx, "source": src})
                        after = len((await call("notebook_get", {"path": p}))["cells"])
                        assert before == after, f"count drift {before} -> {after}"
                        print("OK")
                asyncio.run(main())
                PYEOF
