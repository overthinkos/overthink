candy:
    version: 2026.144.1443
    name: k3s-agent
    description:
        feature: k3s worker (agent) node — joins an existing k3s-server via pre-shared token
        narrative: |
            The k3s-agent candy renders /etc/rancher/k3s/config.yaml (mode 0600) with the
            cluster server URL and the shared pre-shared token, then installs and enables a
            k3s-agent.service systemd unit that runs `k3s agent`. On a deployed node the
            agent registers with the control plane and the node reaches the Ready state —
            no join-token handoff, only the server URL plus the credential-store token.
        tag: [working]
    require:
        - k3s
    # Same pre-shared token as k3s-server consumes. Both layers declare
    # secret_require with the same name, so whichever resolves first
    # auto-generates a 32-byte hex token via the credential store
    # (DefaultCredentialStore.Set) and the other reads the persisted
    # value — server and every agent automatically share the token with
    # zero operator setup. Override only when you need a specific value:
    #   charly secrets set charly/secret/K3S_CLUSTER_TOKEN <value>
    secret_require:
        - name: K3S_CLUSTER_TOKEN
          description: Pre-shared token matching the cluster server's token. Auto-generated on first deploy; shared via the credential store.
    # K3S_SERVER_URL is declarative (the operator knows the server's URL
    # when authoring deploy.yml). Typical value: https://k3s-srv.lan:6443.
    env_require:
        - name: K3S_SERVER_URL
          description: URL of the k3s server's API (e.g., https://k3s-srv.lan:6443). Required.
    task:
        # 1. Render the k3s agent config. `server:` and `token:` in the
        # config file (not CLI flags) so rotation is a file write rather
        # than a unit edit.
        - command: |
            set -euo pipefail
            if [ -z "${K3S_SERVER_URL}" ]; then
              echo "K3S_SERVER_URL is required — set it in deploy.yml env for this agent." >&2
              exit 1
            fi
            mkdir -p /etc/rancher/k3s
            cat >/etc/rancher/k3s/config.yaml <<YAML
            server: "${K3S_SERVER_URL}"
            token: "${K3S_CLUSTER_TOKEN}"
            YAML
            chmod 0600 /etc/rancher/k3s/config.yaml
          run_as: root
          # K3S_CLUSTER_TOKEN comes from the secrets injector;
          # K3S_SERVER_URL from deploy.yml env. Do not re-declare here.
        # 2. Emit the systemd unit directly (see the same note in
        # candy/k3s-server/candy.yml — charly's service renderer isn't yet
        # wired into host/VM deploy paths).
        - command: |
            set -euo pipefail
            cat >/etc/systemd/system/k3s-agent.service <<'UNIT'
            [Unit]
            Description=Lightweight Kubernetes (agent)
            Documentation=https://k3s.io
            Wants=network-online.target
            After=network-online.target

            [Service]
            Type=notify
            ExecStart=/usr/local/bin/k3s agent
            KillMode=process
            Delegate=yes
            LimitNOFILE=1048576
            LimitNPROC=infinity
            LimitCORE=infinity
            TasksMax=infinity
            TimeoutStartSec=0
            Restart=always
            RestartSec=5s

            [Install]
            WantedBy=multi-user.target
            UNIT
            systemctl daemon-reload
            systemctl enable --now k3s-agent.service
          run_as: root
    scenario:
        - name: agent-config-rendered
          step:
            - then: the rendered agent config exists with owner-only permissions
              file: /etc/rancher/k3s/config.yaml
              exists: true
              mode: "0600"
            - then: the config points the agent at the cluster server URL
              file: /etc/rancher/k3s/config.yaml
              contains: "server:"
        - name: agent-service-installed
          step:
            - then: the k3s-agent systemd unit is installed
              file: /etc/systemd/system/k3s-agent.service
              exists: true
            - then: the unit starts the node in agent (worker) mode
              file: /etc/systemd/system/k3s-agent.service
              contains: "k3s agent"
        - name: agent-joins-cluster
          step:
            - then: the worker node registers with the server and reaches Ready
              k8s: wait-nodes
              cluster: "${K3S_CLUSTER}"
              name: "${HOSTNAME}"
              timeout: 180s
              stdout:
                contains: "Ready"
              context:
                - runtime
            - then: the joined worker becomes schedulable so cluster workloads can land on it
        - name: k3s-agent-config-file
          step:
            - id: k3s-agent-config-file
              file: /etc/rancher/k3s/config.yaml
              exists: true
              mode: "0600"
              context:
                - build
        - name: k3s-agent-service-unit
          step:
            - id: k3s-agent-service-unit
              file: /etc/systemd/system/k3s-agent.service
              exists: true
              context:
                - build
        - name: agent-joined
          step:
            # Deploy-scope: verify this node actually joined the cluster.
            # Uses charly check k8s wait-nodes --name <hostname> — the cluster flag
            # resolves to the sibling k3s-server's ClusterProfile (the operator
            # must name the cluster profile to match, e.g., via ${K3S_CLUSTER}).
            - id: agent-joined
              k8s: wait-nodes
              cluster: "${K3S_CLUSTER}"
              name: "${HOSTNAME}"
              timeout: 180s
              stdout:
                contains: "Ready"
              context:
                - runtime
