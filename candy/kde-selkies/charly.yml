candy:
    version: 2026.155.2227
    name: kde-selkies
    description: |
        A full KDE Plasma Wayland session nested inside pixelflux and streamed over selkies/WebRTC
        The KDE Plasma flavor PRIMITIVE for the selkies streaming desktop: runs a
        full KDE Plasma Wayland session (startplasma-wayland = kwin_wayland +
        plasmashell) NESTED inside pixelflux's virtual compositor (wayland-1) via
        kde-selkies-session, so the browser stream shows Plasma. This is the KDE
        analogue of the labwc layer — the swappable nested-compositor seam.

        Composes selkies (transport) + kde-shell (the SDDM-free Plasma session)
        + pipewire (audio) — NO seat, NO SDDM, NO graphical.target. The
        kde-selkies-session service uses supervisord's %(ENV_HOME)s syntax
        (resolved for both supervisord pods and systemd-user targets by
        service_render.go) and is started by a poll-for-wayland-1 service exactly
        like labwc — the wrapper's socket poll IS the ordering primitive, so it
        runs headless as a pod with no graphical-session.target. The encoder is
        left UNSET so pixelflux auto-detects per host: NVENC on the NVIDIA flavor
        (pixelflux built un-stubbed against the cuda-arch-builder), VA-API on the
        AMD flavor, CPU x264 otherwise — so the SAME layer streams on every GPU
        config (the encoder identity is asserted per-image in the GPU check beds).

        This streamed Plasma is the pixelflux virtual-framebuffer session —
        intentionally distinct from any SDDM/Plasma DRM session a physical monitor
        shows on a real GPU output (that is kde-desktop's job).
    require:
        - selkies
        - kde-shell
        - pipewire
        - dbus
    env:
        SELKIES_FRAMERATE: "60"
    service:
        # Nested KDE Plasma session, started after pixelflux (selkies, priority 8)
        # has created wayland-1. The wrapper polls for the socket — so NO
        # graphical-session.target / seat / SDDM ordering is needed (headless pod;
        # identical contract to labwc-wrapper at the same priority).
        - name: kde-selkies-session
          exec: "%(ENV_HOME)s/.local/bin/kde-selkies-session"
          restart: always
          priority: 12
          start_sec: 3
          enable: true
          # user scope: the nested Plasma session runs in the deploy user's
          # session (session bus + XDG_RUNTIME_DIR from the user manager), so it
          # finds pixelflux's wayland-1 at the same per-user runtime dir.
          scope: user
    plan:
        - run: mkdir=${HOME}/.local/bin
          mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - run: copy=kde-selkies-session
          copy: kde-selkies-session
          to: "${HOME}/.local/bin/kde-selkies-session"
          mode: "0755"
          run_as: "${USER}"
        - check: the kde-selkies-session launcher is installed and executable in the deploy user's PATH
          file: ${HOME}/.local/bin/kde-selkies-session
          exists: true
          mode: "0755"
        - check: the launcher execs startplasma-wayland to bring up the nested KDE Plasma session
          file: ${HOME}/.local/bin/kde-selkies-session
          contains:
            - contains: "startplasma-wayland"
        - check: the KDE Plasma session entrypoint the launcher execs is present (composed from kde-shell)
          file: /usr/bin/startplasma-wayland
          exists: true
        - check: the KWin Wayland compositor that renders the nested session into pixelflux is present
          file: /usr/bin/kwin_wayland
          exists: true
        - check: kdotool — the KWin window-automation tool that drives `charly check wl` on this session — is present
          file: /usr/bin/kdotool
          exists: true
        - check: the pipewire audio daemon composed for the streamed session is present
          file: /usr/bin/pipewire
          exists: true
        - check: the nested KDE Plasma session reaches RUNNING under supervisord without crash-looping
          command: |
            sleep 20
            supervisorctl status kde-selkies-session
          stdout:
            - matches: "RUNNING"
          in_container: true
          # supervisord + the Plasma session only run in a live deployment, not a
          # disposable `podman run --rm` box (no init, no compositor) — runtime-only.
          context:
            - runtime
        - check: the selkies web UI streams the live Plasma desktop over HTTPS on port 3000
          http: https://127.0.0.1:${HOST_PORT:3000}/
          status: 200
          allow_insecure: true
          timeout: 10s
        - agent-check: the streamed frames show a real KWin-composited KDE Plasma desktop (panel + wallpaper), not a black frame or a wlroots session
        - check: |
            command=sleep 20
            supervisorctl status kde-selkies-session
          id: kde-selkies-stable
          command: |
            sleep 20
            supervisorctl status kde-selkies-session
          stdout:
            - matches: "RUNNING"
          in_container: true
          context:
            - runtime
        - check: http=https://127.0.0.1:${HOST_PORT:3000}/
          id: kde-selkies-stream-https
          http: https://127.0.0.1:${HOST_PORT:3000}/
          status: 200
          allow_insecure: true
          timeout: 10s
          context:
            - runtime
        - check: wl=status
          id: kde-wl-compositor-is-kwin
          wl: status
          stdout:
            - matches: "compositor: +kwin"
            - matches: "kdotool: +available"
          context:
            - runtime
        - check: wl=type
          id: kde-wl-keyboard-wtype
          wl: type
          text: "ovkwin"
          context:
            - runtime
        - check: wl=toplevel
          id: kde-wl-toplevel-via-kdotool
          wl: toplevel
          stdout:
            - matches: "."
          context:
            - runtime
        - check: wl=clipboard
          id: kde-wl-clipboard-set
          wl: clipboard
          action: set
          text: "ovclip-kwin"
          context:
            - runtime
        - check: wl=clipboard
          id: kde-wl-clipboard-get
          wl: clipboard
          action: get
          stdout:
            - contains: "ovclip-kwin"
          context:
            - runtime
