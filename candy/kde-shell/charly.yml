candy:
    version: 2026.155.2119
    name: kde-shell
    description:
        feature: Installs the shared SDDM-free KDE Plasma Wayland session package set — plasma-desktop, the core session components, a curated app set, and the kdotool KWin automation tool — used by both the bare-metal seat and the headless streamed pod.
        narrative: |
            The SDDM-free KDE Plasma Wayland SESSION package set — the shared subset
            needed by BOTH the bare-metal KDE desktop (kde-desktop, which adds SDDM +
            graphical.target on a real GPU output) AND the headless streamed KDE pod
            (kde-selkies, which runs startplasma-wayland nested in pixelflux with no
            seat). plasma-desktop is the dependency-pulling top package (drags
            plasma-workspace + kwin_wayland + plasmashell + kf6 + qt6 + breeze as
            deps). Only the core session components + a curated app set usable in
            both venues live here; workstation-only extras (partition tools,
            kdeconnect, bluetooth, firewall/thunderbolt, kwallet, kinfocenter, media
            players) stay in kde-desktop so the streaming pod is not bloated. Factored
            out of kde-desktop so the bare-metal seat and the headless pod share ONE
            package list (R3). require: dbus (the Plasma session bus). Every package
            lands a binary at a fixed /usr/bin path, so presence is directly verifiable.
        tag: [working]
    require:
        - dbus
    distro:
        arch:
            package:
                # Dependency-pulling top package: plasma-desktop pulls
                # plasma-workspace + kwin_wayland + plasmashell + kf6 + qt6 + breeze.
                - plasma-desktop
                - xorg-xwayland
                # Core Plasma session components (needed headless AND bare-metal).
                - plasma-pa
                - plasma-nm
                - powerdevil
                - kscreen
                - kde-gtk-config
                - breeze-gtk
                - kdialog
                - kio-admin
                # Curated KDE apps usable in both the seat and the stream.
                - ark
                - dolphin
                - konsole
                - kate
                - kcalc
                - gwenview
                - spectacle
            aur:
                # kdotool — the KWin window-management automation tool driving
                # `charly check wl` on KWin (the KWin analogue of wlroots' wlrctl). It
                # talks to KWin via the scripting D-Bus API: search /
                # windowactivate / windowminimize / windowclose / windowstate
                # (fullscreen) / getwindowgeometry. Pointer + keyboard injection
                # are NOT provided by kdotool (KWin scripting cannot synthesize
                # input) — keyboard uses wtype, pointer is a separate cutover.
                package:
                    - kdotool
    scenario:
        # Deterministic scenarios — each step embeds a check verb (file/package),
        # so they run at BOTH build and deploy scope and would FAIL if the
        # package set were not installed.
        - name: plasma-wayland-session-binaries-present
          step:
            - then: plasmashell, the Plasma shell, is installed at /usr/bin/plasmashell
              file: /usr/bin/plasmashell
              exists: true
            - then: kwin_wayland, the Wayland compositor, is installed at /usr/bin/kwin_wayland
              file: /usr/bin/kwin_wayland
              exists: true
            - then: startplasma-wayland, the session entry point, is installed at /usr/bin/startplasma-wayland
              file: /usr/bin/startplasma-wayland
              exists: true
        - name: plasma-desktop-top-package-installed
          step:
            - then: the dependency-pulling top package plasma-desktop is installed in the rpm/pacman database
              package: plasma-desktop
              installed: true
        - name: curated-kde-apps-present
          step:
            - then: the Dolphin file manager is installed at /usr/bin/dolphin
              file: /usr/bin/dolphin
              exists: true
            - then: the Konsole terminal is installed at /usr/bin/konsole
              file: /usr/bin/konsole
              exists: true
        - name: kdotool-kwin-automation-available
          step:
            - then: kdotool, the KWin window-management automation tool that drives charly check wl on KWin, is installed at /usr/bin/kdotool
              file: /usr/bin/kdotool
              exists: true
        - name: plasma-desktop-installed
          step:
            - id: plasma-desktop-installed
              package: plasma-desktop
              installed: true
        - name: plasmashell-binary
          step:
            - id: plasmashell-binary
              file: /usr/bin/plasmashell
              exists: true
        - name: kwin-wayland-binary
          step:
            - id: kwin-wayland-binary
              file: /usr/bin/kwin_wayland
              exists: true
        - name: startplasma-wayland-binary
          step:
            - id: startplasma-wayland-binary
              file: /usr/bin/startplasma-wayland
              exists: true
        - name: dolphin-binary
          step:
            - id: dolphin-binary
              file: /usr/bin/dolphin
              exists: true
        - name: konsole-binary
          step:
            - id: konsole-binary
              file: /usr/bin/konsole
              exists: true
        - name: kdotool-binary
          step:
            - id: kdotool-binary
              file: /usr/bin/kdotool
              exists: true
