candy:
    version: 2026.155.2227
    name: labwc
    description: |
        A nested labwc Wayland compositor hosting the Selkies streaming desktop
        labwc installs a wlroots-based Wayland compositor plus the foot terminal,
        thunar file manager, and Xwayland for X11 compatibility. The labwc-wrapper
        connects to pixelflux's wayland-1 socket and creates its own wayland-0
        client socket so desktop apps render into the captured desktop; rc.xml
        maximizes every window and autostart wires the session. Every installed
        binary and config file is verifiable on the built image, and the
        supervised labwc service must reach a stable RUNNING state at deploy.
    require:
        - dbus
    # autostart script has a wait-for-supervisord-socket guard (see autostart)
    env:
        WAYLAND_DISPLAY: "wayland-0"
        XDG_RUNTIME_DIR: "/tmp"
    env_accept:
        - name: XKB_DEFAULT_LAYOUT
          description: "XKB keyboard layout (e.g., us, de, fr, gb). Default: us"
        - name: XKB_DEFAULT_VARIANT
          description: "XKB keyboard variant (e.g., dvorak, nodeadkeys). Default: none"
        - name: XKB_DEFAULT_MODEL
          description: "XKB keyboard model (e.g., pc105, pc104, chromebook). Default: pc105"
        - name: XKB_DEFAULT_OPTIONS
          description: "XKB options (e.g., compose:ralt, caps:escape). Default: none"
    distro:
        arch:
            package:
                - labwc
                - foot
                - xorg-xwayland
                - thunar
        fedora:
            package:
                - labwc
                - foot
                - xorg-x11-server-Xwayland
                - thunar
    service:
        - name: labwc
          exec: "%(ENV_HOME)s/.local/bin/labwc-wrapper"
          env:
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 12
          start_sec: 2
          enable: true
          scope: system
    plan:
        - run: mkdir=${HOME}/.local/bin
          mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - run: mkdir=${HOME}/.config/labwc
          mkdir: "${HOME}/.config/labwc"
          run_as: "${USER}"
        - run: copy=labwc-wrapper
          copy: labwc-wrapper
          to: "${HOME}/.local/bin/labwc-wrapper"
          mode: "0755"
          run_as: "${USER}"
        - run: copy=rc.xml
          copy: rc.xml
          to: "${HOME}/.config/labwc/rc.xml"
          mode: "0644"
          run_as: "${USER}"
        - run: copy=autostart
          copy: autostart
          to: "${HOME}/.config/labwc/autostart"
          mode: "0644"
          run_as: "${USER}"
        - check: the labwc Wayland compositor binary is installed at /usr/bin/labwc
          file: /usr/bin/labwc
          exists: true
        - check: the labwc-wrapper that nests the compositor under pixelflux wayland-1 is installed
          file: ${HOME}/.local/bin/labwc-wrapper
          exists: true
        - check: the labwc rc.xml configuration (server-side decorations, maximize-all window rule) is present
          file: ${HOME}/.config/labwc/rc.xml
          exists: true
        - check: the labwc autostart session script is present
          file: ${HOME}/.config/labwc/autostart
          exists: true
        - check: the foot terminal emulator is installed for the desktop session
          file: /usr/bin/foot
          exists: true
        - check: the thunar file manager is installed for the desktop session
          file: /usr/bin/thunar
          exists: true
        - check: Xwayland is installed so X11 applications run inside the Wayland session
          file: /usr/bin/Xwayland
          exists: true
        - agent-check: once pixelflux's wayland-1 socket is healthy, labwc creates its own wayland-0 socket and hosts the desktop applications as a stable supervised service
        - check: service=labwc
          id: labwc-service-running
          service: labwc
          running: true
          context:
            - runtime
        - check: command=test -e /tmp/wayland-0
          id: labwc-wayland-socket
          command: test -e /tmp/wayland-0
          exit_status: 0
          in_container: true
          eventually: 60s
          retry_interval: 3s
          context:
            - runtime
        - check: command=supervisorctl status labwc | awk '/RUNNING/{n=split($NF,a,":"); s=a[n]+a[n-1]*60+a[n-2]*3600; if(s>=20){f=1}} END{exit !f}'
          id: labwc-stable
          in_container: true
          exit_status: 0
          eventually: 120s
          retry_interval: 5s
          command: "supervisorctl status labwc | awk '/RUNNING/{n=split($NF,a,\":\"); s=a[n]+a[n-1]*60+a[n-2]*3600; if(s>=20){f=1}} END{exit !f}'"
          context:
            - runtime
