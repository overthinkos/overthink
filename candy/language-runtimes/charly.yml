candy:
    version: 2026.144.1443
    name: language-runtimes
    description:
        feature: System language runtimes (.NET 9 SDK, PHP CLI, system Python 3) installed on PATH and version-reachable.
        narrative: |
            language-runtimes installs the .NET 9 SDK (distro package on
            Fedora/Arch, Microsoft's dotnet-install.sh on Debian/Ubuntu), the PHP
            CLI, and the system Python 3 interpreter — each landing at a /usr/bin
            path. Every runtime exposes a version subcommand, so its presence is
            directly verifiable from a fresh build with no service or deploy state.
            (Go and Node.js are installed too but their acceptance is owned by the
            golang/nodejs candies — not duplicated here, per R3.)
        tag: [working]
    require:
        - nodejs
        - rust
    distro:
        arch:
            package:
                - dotnet-sdk
                - go
                - icu
                - php
                - python
        debian:
            package:
                - golang-go
                - libicu-dev
                - php-cli
                - python3-dev
        debian-13:
            package:
                - golang-go
                - libicu-dev
                - php-cli
                - python3-dev
        fedora:
            package:
                - dotnet-sdk-9.0
                - golang-bin
                - golang-bazil-fuse-devel
                - libicu
                - php
                - python3-devel
                - python3-ramalama
                - nodejs-devel
        ubuntu:
            package:
                - golang-go
                - libicu-dev
                - php-cli
                - python3-dev
        ubuntu-24.04:
            package:
                - golang-go
                - libicu-dev
                - php-cli
                - python3-dev
    task:
        # dotnet-sdk-9.0 installer — distro-agnostic gate.
        #
        # No-op on Fedora/Arch — their rpm:/pac: blocks already installed
        # dotnet-sdk-9.0 via distro repos.
        #
        # On Debian/Ubuntu, neither Canonical's archive nor Microsoft's apt repo
        # reliably ship dotnet-sdk-9.0 (verified 2026-04: Canonical noble ships
        # 8.0 and 10.0 only; Microsoft's noble apt repo ships only 10.0; Debian
        # 13 via Microsoft's repo does have 9.0, but relying on that cross-distro
        # asymmetry invites future drift). Microsoft's official dotnet-install.sh
        # downloads a specific channel's tarball to an arbitrary prefix — the
        # canonical cross-distro install method. We install to /usr/share/dotnet
        # and symlink into /usr/bin so the standard test probes /usr/bin/dotnet
        # successfully.
        #
        # The outer `command -v dotnet` guard makes the task idempotent across
        # tag-only rebuilds and skips Fedora/Arch where the package installed
        # dotnet already.
        - command: |
            if command -v dotnet >/dev/null 2>&1; then
              exit 0
            fi
            if ! command -v apt-get >/dev/null 2>&1; then
              # Not a Debian-family distro — defer to the distro's declarative
              # package section (or accept it's intentionally unavailable).
              exit 0
            fi
            # Microsoft's dotnet-install.sh needs libicu at runtime but doesn't
            # bring transitive dependencies. libicu-dev is already installed by
            # this layer's deb: section.
            install -d /usr/share/dotnet
            curl -fsSL https://builds.dotnet.microsoft.com/dotnet/scripts/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
            chmod +x /tmp/dotnet-install.sh
            /tmp/dotnet-install.sh --channel 9.0 --install-dir /usr/share/dotnet
            ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
            rm -f /tmp/dotnet-install.sh
          run_as: root
    scenario:
        # ADE acceptance scenarios baked into ai.opencharly.description. Every
        # step embeds a check verb (file/command) → DETERMINISTIC, runs under
        # `charly box feature run` at build scope. They mirror the check: list.
        - name: dotnet-sdk-reachable
          step:
            - then: the .NET 9 SDK binary is installed at /usr/bin/dotnet
              file: /usr/bin/dotnet
              exists: true
            - then: dotnet reports its SDK version and exits cleanly
              command: /usr/bin/dotnet --version
              exit_status: 0
        - name: php-cli-reachable
          step:
            - then: the PHP CLI binary is installed at /usr/bin/php
              file: /usr/bin/php
              exists: true
            - then: php prints its version banner and exits cleanly
              command: /usr/bin/php --version
              exit_status: 0
        - name: system-python3-reachable
          step:
            - then: the system Python 3 interpreter is at /usr/bin/python3 (the RPM one, not a pixi-env path)
              file: /usr/bin/python3
              exists: true
            - then: python3 reports its version and exits cleanly
              command: /usr/bin/python3 --version
              exit_status: 0
