candy:
    version: 2026.144.1443
    name: libnotify
    description:
        feature: Ships the notify-send CLI for posting desktop notifications from inside the container.
        narrative: |
            Installs the Fedora libnotify package, which provides the notify-send
            command-line client plus the libnotify shared library. notify-send posts
            desktop notifications over the D-Bus session bus to a running notification
            daemon (such as swaync), so shell scripts and interactive users can raise
            notifications. The binary path, its owning package, and its --version
            handshake are all verifiable in a disposable build-scope container.
        tag: [working]
    require:
        - dbus
    distro:
        fedora:
            package:
                - libnotify
    scenario:
        - name: notify-send-cli-available
          step:
            - then: the notify-send CLI is installed at /usr/bin/notify-send
              file: /usr/bin/notify-send
              exists: true
            - then: the libnotify package providing the client is installed
              package: libnotify
              installed: true
        - name: notify-send-reports-version
          step:
            - then: notify-send --version runs cleanly and prints its version string
              command: notify-send --version 2>&1
              exit_status: 0
              stdout:
                - contains: notify-send
        - name: notify-send-delivers-desktop-notification
          step:
            - then: a notification sent with notify-send appears in the running notification daemon on the desktop
        - name: libnotify-notify-send-binary
          step:
            - id: libnotify-notify-send-binary
              file: /usr/bin/notify-send
              exists: true
        - name: libnotify-package
          step:
            - id: libnotify-package
              package: libnotify
              installed: true
        - name: libnotify-version
          step:
            - id: libnotify-version
              command: notify-send --version 2>&1
              exit_status: 0
              stdout:
                - contains: notify-send
