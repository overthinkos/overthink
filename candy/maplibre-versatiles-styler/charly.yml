candy:
    version: 2026.144.1443
    name: maplibre-versatiles-styler
    description:
        feature: Bundles the MapLibre VersaTiles styler control locally into the image so the map UI loads it without runtime CDN access.
        narrative: |
            maplibre-versatiles-styler is a MapLibre GL JS control that adds an
            interactive sidebar widget for switching between VersaTiles style
            presets, editing color palettes, and adjusting fonts/language. This
            candy installs the npm package (GitHub release tarball, with an
            npm-install fallback) into /opt/maplibre-versatiles-styler/, shipping
            the prebuilt ESM + UMD bundles so the notebook's MapLibre cell can
            load the styler from the image instead of unpkg.com at runtime (the
            versatiles-frontend layer re-exports the directory at /styler/).
            Observable by the install directory and at least one non-empty
            JavaScript bundle landing there, plus the node/npm bundling toolchain.
        tag: [working]
    require:
        - supervisord
    distro:
        arch:
            package:
                - nodejs
                - npm
                - curl
                - jq
        fedora:
            package:
                - nodejs
                - npm
                - curl
                - jq
    task:
        - mkdir: /opt/maplibre-versatiles-styler
          run_as: root
        # ---- maplibre-versatiles-styler UMD bundle ----
        # Two-tier install identical to versatiles-style:
        # tier 1 = GitHub release tarball if available, tier 2 = npm-
        # install + copy the package's `dist/` directory. The package's
        # npm entry exposes both an ES module and a UMD bundle; we ship
        # both at /opt/maplibre-versatiles-styler/ so consumers can pick.
        - command: |
            set -euo pipefail
            TMPDIR=$(mktemp -d)
            cd "$TMPDIR"

            # Tier 1: try a GitHub release asset
            if curl -fsSL "https://api.github.com/repos/versatiles-org/maplibre-versatiles-styler/releases/latest" \
                 | jq -r '.assets[].browser_download_url' \
                 | grep -E '\.tar\.gz$' \
                 | head -1 > tarball_url \
               && [ -s tarball_url ]; then
              ASSET=$(cat tarball_url)
              echo "Installing maplibre-versatiles-styler from GitHub release: $ASSET"
              curl -fsSL "$ASSET" -o styler.tar.gz
              tar -xzf styler.tar.gz -C /opt/maplibre-versatiles-styler || \
                tar -xzf styler.tar.gz -C /opt/maplibre-versatiles-styler --strip-components=1
            else
              # Tier 2: npm install + copy dist/
              echo "Falling back to npm install maplibre-versatiles-styler"
              npm install --prefix "$TMPDIR" maplibre-versatiles-styler --no-audit --no-fund
              PKG="$TMPDIR/node_modules/maplibre-versatiles-styler"
              # The package's prebuilt UMD bundle typically lives in dist/.
              # Copy the whole package directory so all entry points
              # (ESM, UMD, type-defs) are available regardless of which
              # files the iframe references.
              cp -r "$PKG/." /opt/maplibre-versatiles-styler/
            fi

            # Sanity: at least one bundled JS file present.
            if ! find /opt/maplibre-versatiles-styler -maxdepth 4 -name '*.js' -size +1c | head -1 | grep -q .; then
              echo "ERROR: no JS bundle found under /opt/maplibre-versatiles-styler after install" >&2
              ls -la /opt/maplibre-versatiles-styler/
              exit 1
            fi

            cd /
            rm -rf "$TMPDIR" /root/.npm
          run_as: root
    scenario:
        - name: styler-bundle-installed
          step:
            - then: the styler install directory exists in the built image
              file: /opt/maplibre-versatiles-styler
              filetype: directory
              exists: true
            - then: at least one non-empty JavaScript bundle is present for consumers to load
              command: |
                find /opt/maplibre-versatiles-styler -maxdepth 4 -name '*.js' -size +1c | head -1 | grep -q .
              exit_status: 0
        - name: bundling-toolchain-present
          step:
            - then: the node runtime used to fetch and bundle the package is installed
              package: nodejs
              installed: true
            - then: the npm client used by the install fallback is available
              package: npm
              installed: true
        - name: maplibre-versatiles-styler-dir
          step:
            # Build-scope: the install directory was created.
            - id: maplibre-versatiles-styler-dir
              file: /opt/maplibre-versatiles-styler
              filetype: directory
              exists: true
        - name: maplibre-versatiles-styler-bundle-present
          step:
            # Build-scope: at least one non-empty JS bundle landed (entry-
            # point filename varies across versions: `maplibre-versatiles-styler.umd.js`,
            # `index.js`, `dist/index.js`, etc.; lenient match by extension).
            - id: maplibre-versatiles-styler-bundle-present
              command: |
                find /opt/maplibre-versatiles-styler -maxdepth 4 -name '*.js' -size +1c | head -1 | grep -q .
              exit_status: 0
        - name: maplibre-versatiles-styler-nodejs-package
          step:
            # Build-scope: the node/npm toolchain that fetches + bundles the
            # package is installed (identical package names on arch + fedora).
            - id: maplibre-versatiles-styler-nodejs-package
              package: nodejs
              installed: true
        - name: maplibre-versatiles-styler-npm-package
          step:
            - id: maplibre-versatiles-styler-npm-package
              package: npm
              installed: true
