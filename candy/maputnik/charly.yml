candy:
    version: 2026.144.1443
    name: maputnik
    description:
        feature: Visual MapLibre GL style editor (Maputnik SPA) built from upstream source and served as a static dist over HTTP on port 8000
        narrative: |
            Clones the upstream maplibre/maputnik repo at image-build time, runs
            `npm ci` + `npm run build -- --base=/`, and copies Vite's emitted
            dist/ to /opt/maputnik/build/. The --base=/ override keeps asset URLs
            root-relative so they resolve under the serve path instead of 404ing
            at /maputnik/assets/*. The stdlib `python3 -m http.server 8000
            --directory /opt/maputnik/build` runs as the always-restart maputnik
            service. It pairs with the osm-tools martin tile server (the editor at
            :8000 points at the tile catalog at :3000). Every fact below is
            observable: the built SPA dist + index.html, the node build
            toolchain, the running service, the HTTP 200 the editor returns, and
            the absence of the /maputnik/ asset prefix in the served HTML.
        tag: [working]
    require:
        - supervisord
    distro:
        arch:
            package:
                # Arch ships nodejs (currently 24+) and npm in extra; package names
                # match Fedora exactly. The supervisor RPM/PAC pulls python3 in as
                # a runtime dep on both distros, so /usr/bin/python3 is present
                # for the http.server service exec below.
                - nodejs
                - npm
                - git
        fedora:
            package:
                # nodejs ships nodejs 22 + npm 10 on Fedora 43 — sufficient for current
                # maputnik upstream. If an upstream node-version-specific build break
                # surfaces, switch to `nodejs:20` module stream (the codebase already
                # has prior art for distro module streams).
                - nodejs
                - npm
                # git is needed to clone the maputnik source at build time.
                - git
    port:
        - 8000 # maputnik static-dist HTTP server
    task:
        - mkdir: /opt/maputnik
          run_as: root
        # ---- Build maputnik from upstream source ----
        # The upstream Docker image (ghcr.io/maplibre/maputnik) ships a built
        # static dist + a tiny static server, but composing it as a sidecar
        # would change the versa pod from single-container to multi-container
        # (a structural shape change). Instead we build it in-image in one cmd:
        # task and serve via python -m http.server (system python3 from the
        # supervisor RPM dep — no marimo-pixi-env coupling).
        #
        # Build duration: ~30-60 sec on a warm npm cache, ~2 min cold. Output
        # under maputnik upstream's `build/` dir lands at /opt/maputnik/build/
        # so the http.server --directory pointer below resolves correctly.
        - command: |
            set -euo pipefail
            # Clone shallow + most recent tag's tip. The maputnik repo has no
            # binary releases on GitHub — source build is the canonical install.
            git clone --depth 1 https://github.com/maplibre/maputnik /tmp/maputnik
            cd /tmp/maputnik
            # `npm ci` over `npm install` because lockfile is upstream-provided
            # and we want deterministic resolution. --no-audit + --no-fund cut
            # ~5 sec of network chatter that only spams stderr.
            npm ci --no-audit --no-fund
            # Maputnik's package.json `"build": "tsc && vite build"` runs
            # vite with its default `--base=/maputnik/`, which bakes
            # /maputnik/assets/* references into the emitted HTML. We
            # serve the static dist at `/` via python -m http.server, so
            # those baked paths 404 in the browser. Override base to `/`
            # so asset URLs are root-relative and resolve against our
            # serve path. The `--` forwards the flag through npm to vite.
            npm run build -- --base=/
            # Maputnik uses Vite (`tsc && vite build --mode=production`); Vite
            # default output is `dist/`, NOT `build/` (the source-tree `build/`
            # is just release scripts). Copy the actual SPA artifact and
            # error loudly if the layout changes upstream.
            if [ -d dist ]; then
              mkdir -p /opt/maputnik
              cp -r dist /opt/maputnik/build
            else
              echo "maputnik build did not produce ./dist directory" >&2
              ls -la
              exit 1
            fi
            cd /
            rm -rf /tmp/maputnik
            # Drop npm cache to shrink image (~150-300 MB delta).
            rm -rf /root/.npm
          run_as: root
    service:
        - name: maputnik
          # System python3 (from the supervisor RPM's own dependency) — keeps
          # this layer free of any pixi-env coupling. http.server is in stdlib;
          # --directory pins the served root to the build artifact.
          exec: /usr/bin/python3 -m http.server 8000 --directory /opt/maputnik/build
          restart: always
          working_directory: /opt/maputnik
          priority: 34
          enable: true
          scope: system
    scenario:
        # DETERMINISTIC build-scope facts — embedded check verbs run at both
        # `charly box feature run` and `charly check feature run`.
        - name: maputnik-spa-built-into-static-dist
          step:
            - then: the maputnik static dist directory was built from upstream source
              file: /opt/maputnik/build
              filetype: directory
              exists: true
            - then: the SPA entrypoint index.html is present in the served dist
              file: /opt/maputnik/build/index.html
              exists: true
        - name: node-build-toolchain-present
          step:
            - then: the node runtime used to build the SPA is installed and runnable
              command: node --version
              exit_status: 0
        # DETERMINISTIC deploy-scope facts — the running service answers HTTP
        # 200 at root on the published port and the Vite --base=/ override is
        # locked in (no /maputnik/ asset prefix leaks into the served HTML).
        - name: maputnik-served-over-http
          step:
            - then: the maputnik service is running under the init system
              service: maputnik
              running: true
              context:
                - runtime
            - then: the static SPA answers HTTP 200 at the container root on the published port
              http: http://127.0.0.1:${HOST_PORT:8000}/
              status: 200
              timeout: 10s
              context:
                - runtime
        - name: maputnik-assets-served-at-root
          step:
            - then: the served HTML carries no /maputnik/ asset prefix, so asset URLs resolve at the serve root
              command: |
                ! curl -fsS http://localhost:8000/ | grep -q '"/maputnik/'
              in_container: true
              exit_status: 0
              context:
                - runtime
        # PROSE-ONLY free-form behaviour — agent-graded against the live
        # deployment (reported unbound by build-scope `charly box feature run`).
        - name: maputnik-editor-ui-renders
          step:
            - then: the loaded SPA presents the Maputnik visual style editor interface (layer list and map canvas), not a blank page
        - name: maputnik-build-dir-exists
          step:
            # Build-scope: maputnik built and is non-empty.
            - id: maputnik-build-dir-exists
              file: /opt/maputnik/build
              filetype: directory
              exists: true
        - name: maputnik-index-html
          step:
            - id: maputnik-index-html
              file: /opt/maputnik/build/index.html
              exists: true
        - name: nodejs-installed
          step:
            # Build-scope: nodejs binary present (for any future build verification).
            - id: nodejs-installed
              command: node --version
              exit_status: 0
        - name: maputnik-running
          step:
            # Deploy-scope: the http.server is up and serving the SPA.
            - id: maputnik-running
              service: maputnik
              running: true
              context:
                - runtime
        - name: maputnik-port-reachable
          step:
            - id: maputnik-port-reachable
              addr: "127.0.0.1:${HOST_PORT:8000}"
              reachable: true
              timeout: 10s
              context:
                - runtime
        - name: maputnik-http-up
          step:
            - id: maputnik-http-up
              http: "http://127.0.0.1:${HOST_PORT:8000}/"
              status: 200
              timeout: 10s
              context:
                - runtime
        - name: maputnik-asset-base-not-prefixed
          step:
            # Vite's default `--base=/maputnik/` bakes /maputnik/assets/* into
            # the emitted index.html — those URLs 404 in the browser when we
            # serve at root. The build now passes `--base=/`; this assertion
            # locks it in (regression catches a future revert to the default).
            - id: maputnik-asset-base-not-prefixed
              command: |
                ! curl -fsS http://localhost:8000/ | grep -q '"/maputnik/'
              in_container: true
              exit_status: 0
              context:
                - runtime
