candy:
    version: 2026.159.1324
    name: nodejs
    description:
        feature: A Node.js runtime with the npm and pnpm package managers on the default PATH.
        narrative: |
            Installs the distro nodejs package (NodeSource node 20.x on Ubuntu so the
            in-box CLIs that require node >=20 work), the matching npm CLI, and a
            self-contained pnpm standalone binary at /usr/local/bin/pnpm. Every artifact
            is a real file at a known path with a working --version, so the runtime is
            directly verifiable.
        tag: [working]
        scenario:
            - name: node-runtime-available
              step:
                - then: the node interpreter is installed at /usr/bin/node
                  file: /usr/bin/node
                  exists: true
                - then: node reports its version and exits cleanly
                  command: /usr/bin/node --version
                  exit_status: 0
            - name: npm-cli-available
              step:
                - then: the npm package manager is installed at /usr/bin/npm
                  file: /usr/bin/npm
                  exists: true
                - then: npm reports its version and exits cleanly
                  command: /usr/bin/npm --version
                  exit_status: 0
            - name: pnpm-standalone-installed
              step:
                - then: the self-contained pnpm binary lands on the system PATH at /usr/local/bin/pnpm
                  file: /usr/local/bin/pnpm
                  exists: true
                - then: pnpm runs and reports its version
                  command: pnpm --version
                  exit_status: 0
    env:
        NPM_CONFIG_PREFIX: "~/.npm-global"
        npm_config_cache: "~/.cache/npm"
    path_append:
        - "~/.npm-global/bin"
    package:
        - nodejs
    distro:
        arch:
            package:
                - npm
        debian:
            package:
                - npm
        fedora:
            package:
                - npm
        ubuntu:
            # Ubuntu 24.04 (noble) apt freezes nodejs at 18.19.1 — too old for the
            # box's own npm CLIs (firebase requires node >=20; gemini-cli's undici
            # needs the node>=20 global `File`; oracle's string-width needs the
            # node>=20 unicode-sets `v` regex flag). Install nodejs from NodeSource
            # (node 20.x): apt prefers its higher version over noble's 18. The base
            # `package: [nodejs]` (top-level) supplies the package name; this section
            # only adds the repo. The apt `npm` package is INTENTIONALLY omitted —
            # NodeSource's nodejs BUNDLES npm at /usr/bin/npm, and installing the
            # separate apt `npm` alongside it pulls conflicting node-* deps (broken
            # packages). debian/fedora/arch keep their apt/dnf/pacman npm (their base
            # node is already >=20). This is the deliberate "NodeSource upgrade that
            # DROPS the separate npm" the prior note described — now required because
            # the in-box CLIs outgrew noble's frozen node 18.
            repo:
                - name: nodesource
                  url: "https://deb.nodesource.com/node_20.x"
                  key: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
                  suite: nodistro
                  components: main
    var:
        PNPM_VERSION: "10.33.4"
    task:
        # pnpm standalone binary (self-contained — bundles its own node) into
        # /usr/local/bin, on the default system PATH for every user incl. root
        # (Immich runs pnpm as root). NOT a package.json: that triggers the npm
        # multi-stage builder on this layer, which the builder images that COMPOSE
        # nodejs (arch-builder/fedora-builder) cannot self-provide. pnpm's release
        # asset tokens are x64/arm64 (match neither ${ARCH} nor ${BUILD_ARCH}).
        - cmd: |
            case "${BUILD_ARCH}" in
              x86_64)  PNPM_ARCH="x64" ;;
              aarch64) PNPM_ARCH="arm64" ;;
              *) echo "Unsupported arch: ${BUILD_ARCH}"; exit 1 ;;
            esac
            curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v${PNPM_VERSION}/pnpm-linux-${PNPM_ARCH}" -o /usr/local/bin/pnpm
            chmod 0755 /usr/local/bin/pnpm
          user: root
    eval:
        - id: node-binary
          file: /usr/bin/node
          exists: true
        - id: node-version
          command: /usr/bin/node --version
          exit_status: 0
        - id: nodejs-package
          package: nodejs
          installed: true
        - id: npm-binary
          file: /usr/bin/npm
          exists: true
        - id: npm-version
          command: /usr/bin/npm --version
          exit_status: 0
        # pnpm is installed globally from package.json (npm -g) into ~/.npm-global/bin
        # (on PATH via path_append) — Immich's source build + its packageManager
        # (pnpm@10) require it.
        - id: pnpm-available
          command: pnpm --version
          exit_status: 0
