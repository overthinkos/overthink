candy:
    version: 2026.144.1443
    name: notebook-finetuning
    data:
        - src: data/finetuning
          volume: workspace
          dest: finetuning
    description:
        feature: Unsloth fine-tuning notebook collection
        narrative: |
            Provisions Unsloth fine-tuning notebooks into the workspace
            volume's `finetuning/` subdirectory at deploy time. Includes
            Unsloth_Setup, Vision_Training, SFT, GRPO, DPO, Reward,
            RLOO, and QLoRA variants. Data-only — no packages, no
            services. Consumed by jupyter-ml-notebook for an Unsloth-ready
            JupyterLab image.
    scenario:
        - name: finetuning notebooks land in the workspace volume
          step:
            - then: the finetuning subdirectory is provisioned in the workspace
              file: ${VOLUME_CONTAINER_PATH:workspace}/finetuning
              filetype: directory
              context:
                - runtime
            - and: the Unsloth_Setup producer notebook is present
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/finetuning/
              exit_status: 0
              stdout:
                - matches: "Unsloth_Setup"
              context:
                - runtime
        - name: the unsloth notebook collection is baked into the image
          step:
            - then: the Unsloth_Setup producer notebook is staged in the image data tree
              file: /data/workspace/finetuning/00_Unsloth_Setup.ipynb
              exists: true
            - and: the notebooks.yaml manifest cataloguing the collection is staged
              file: /data/workspace/finetuning/notebooks.yaml
              exists: true
            - and: a substantial collection of training notebooks is staged, not just the setup notebook
              command: find /data/workspace/finetuning -maxdepth 1 -name "*.ipynb" | wc -l
              exit_status: 0
              stdout:
                - matches: "[1-9][0-9]"
            - then: the notebooks span the documented Unsloth training methods (SFT, GRPO, DPO, Reward, RLOO, QLoRA) as runnable examples
        - name: notebook-finetuning-staged-dir
          step:
            # Build-scope — the notebook collection is baked into the image data
            # staging tree at /data/<volume>/<dest>/ (COPY --chown=uid:gid), so these
            # run under `charly check box` as the image's default user.
            - id: notebook-finetuning-staged-dir
              file: /data/workspace/finetuning
              filetype: directory
        - name: notebook-finetuning-setup-staged
          step:
            - id: notebook-finetuning-setup-staged
              file: /data/workspace/finetuning/00_Unsloth_Setup.ipynb
              exists: true
        - name: notebook-finetuning-manifest-staged
          step:
            - id: notebook-finetuning-manifest-staged
              file: /data/workspace/finetuning/notebooks.yaml
              exists: true
        - name: notebook-finetuning-sft-staged
          step:
            - id: notebook-finetuning-sft-staged
              file: /data/workspace/finetuning/03_SFT_Training_Qwen.ipynb
              exists: true
        - name: notebook-finetuning-qlora-staged
          step:
            - id: notebook-finetuning-qlora-staged
              file: /data/workspace/finetuning/08_QLoRA_Multi_Adapter_Qwen_Think.ipynb
              exists: true
        - name: notebook-finetuning-collection-staged
          step:
            - id: notebook-finetuning-collection-staged
              command: find /data/workspace/finetuning -maxdepth 1 -name "*.ipynb" | wc -l
              exit_status: 0
              stdout:
                - matches: "[1-9][0-9]"
        - name: notebook-finetuning-provisioned
          step:
            # Deploy-scope — at deploy time the data is provisioned into the workspace
            # volume's finetuning/ subdirectory (needs the mounted volume + runtime vars).
            - id: notebook-finetuning-provisioned
              file: ${VOLUME_CONTAINER_PATH:workspace}/finetuning
              filetype: directory
              context:
                - runtime
        - name: notebook-finetuning-setup-present
          step:
            - id: notebook-finetuning-setup-present
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/finetuning/
              exit_status: 0
              stdout:
                - matches: "Unsloth_Setup"
              context:
                - runtime
