candy:
    version: 2026.144.1443
    name: notebook-llm-on-supercomputers
    data:
        - src: data/llms_on_supercomputers
          volume: workspace
          dest: llms_on_supercomputers
    description:
        feature: LLMs on Supercomputers course notebooks (TU Wien AI Factory Austria)
        narrative: |
            Provisions the full TU Wien AI Factory Austria "LLMs on
            Supercomputers" course curriculum into the workspace volume's
            `llms_on_supercomputers/` subdirectory at deploy time.
            Notebooks are organised as a structured curriculum (D0_*,
            D1_*, D2_*, D3_* prefixes for course days) covering Bazzite
            setup, distributed training fundamentals, scaling patterns,
            and HPC-specific tooling. Data-only — no packages, no
            services.
        scenario:
            - name: course notebooks land in the workspace volume
              step:
                - then: the llms_on_supercomputers subdirectory is provisioned in the workspace
                  scope: deploy
                  file: ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers
                  filetype: directory
                - and: at least one course notebook (D0_* prefix) is present
                  scope: deploy
                  command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/
                  exit_status: 0
                  stdout:
                    - matches: "D0_"
