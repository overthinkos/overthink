candy:
    version: 2026.144.1443
    name: notebook-llm-on-supercomputers
    data:
        - src: data/llms_on_supercomputers
          volume: workspace
          dest: llms_on_supercomputers
    description:
        feature: LLMs on Supercomputers course notebooks (TU Wien AI Factory Austria)
        narrative: |
            Provisions the full TU Wien AI Factory Austria "LLMs on
            Supercomputers" course curriculum into the workspace volume's
            `llms_on_supercomputers/` subdirectory at deploy time.
            Notebooks are organised as a structured curriculum (D0_*,
            D1_*, D2_*, D3_* prefixes for course days) covering Bazzite
            setup, distributed training fundamentals, scaling patterns,
            and HPC-specific tooling. Data-only — no packages, no
            services.
    scenario:
        - name: course notebooks land in the workspace volume
          step:
            - then: the llms_on_supercomputers subdirectory is provisioned in the workspace
              file: ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers
              filetype: directory
              context:
                - runtime
            - and: at least one course notebook (D0_* prefix) is present
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/
              exit_status: 0
              stdout:
                - matches: "D0_"
              context:
                - runtime
        - name: the full multi-day curriculum and its datasets are provisioned
          step:
            - then: a D3 fine-tuning-day notebook is present, proving the curriculum spans more than the setup day
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/
              exit_status: 0
              stdout:
                - matches: "D3_"
              context:
                - runtime
            - and: the supporting datasets subdirectory ships alongside the notebooks
              file: ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/datasets
              filetype: directory
              context:
                - runtime
            - and: the booking-queries classification CSV is present for the RAG and evaluation notebooks
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/datasets/
              exit_status: 0
              stdout:
                - matches: "booking_queries_dataset.csv"
              context:
                - runtime
        - name: llm-supercomputers-dir
          step:
            - id: llm-supercomputers-dir
              file: ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers
              filetype: directory
              context:
                - runtime
        - name: llm-supercomputers-setup-notebook
          step:
            - id: llm-supercomputers-setup-notebook
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/
              exit_status: 0
              stdout:
                - matches: "D0_"
              context:
                - runtime
        - name: llm-supercomputers-finetuning-notebook
          step:
            - id: llm-supercomputers-finetuning-notebook
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/
              exit_status: 0
              stdout:
                - matches: "D3_"
              context:
                - runtime
        - name: llm-supercomputers-datasets
          step:
            - id: llm-supercomputers-datasets
              file: ${VOLUME_CONTAINER_PATH:workspace}/llms_on_supercomputers/datasets
              filetype: directory
              context:
                - runtime
