candy:
    version: 2026.144.1443
    name: notebook-ollama
    data:
        - src: data/ollama
          volume: workspace
          dest: ollama
    description:
        feature: Ollama integration notebook collection
        narrative: |
            Provisions Ollama (https://ollama.ai) integration notebooks
            into the workspace volume's `ollama/` subdirectory at deploy
            time. Producer 00_Ollama_Requests demonstrates the local-LLM
            HTTP API; consumers exercise specific patterns (chat, RAG,
            embeddings, tool calling). Pairs naturally with the
            `charly-ollama:ollama` server layer for a self-contained local
            LLM stack. Data-only — no packages, no services.
        scenario:
            - name: ollama notebooks land in the workspace volume
              step:
                - then: the ollama subdirectory is provisioned in the workspace
                  scope: deploy
                  file: ${VOLUME_CONTAINER_PATH:workspace}/ollama
                  filetype: directory
                - and: the Ollama_Requests producer notebook is present
                  scope: deploy
                  command: ls ${VOLUME_CONTAINER_PATH:workspace}/ollama/
                  exit_status: 0
                  stdout:
                    - matches: "Ollama_Requests"
