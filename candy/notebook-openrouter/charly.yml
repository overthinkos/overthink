candy:
    version: 2026.144.1443
    name: notebook-openrouter
    env_require:
        - name: OPENROUTER_API_KEY
          description: "API key for OpenRouter LLM inference"
    data:
        - src: data/openrouter
          volume: workspace
          dest: openrouter
    description:
        feature: OpenRouter API integration notebook collection
        narrative: |
            Provisions OpenRouter (https://openrouter.ai) integration
            notebooks into the workspace volume's `openrouter/` subdirectory
            at deploy time. Producer 00_OpenRouter_Basics demonstrates the
            API surface; consumers exercise specific use cases. Requires
            OPENROUTER_API_KEY at runtime — declared via env_require so
            `charly config` warns at deploy time when the env var is unset.
            Data-only — no packages, no services.
        scenario:
            - name: openrouter notebooks land in the workspace volume
              step:
                - then: the openrouter subdirectory is provisioned in the workspace
                  scope: deploy
                  file: ${VOLUME_CONTAINER_PATH:workspace}/openrouter
                  filetype: directory
                - and: the OpenRouter_Basics producer notebook is present
                  scope: deploy
                  command: ls ${VOLUME_CONTAINER_PATH:workspace}/openrouter/
                  exit_status: 0
                  stdout:
                    - matches: "OpenRouter_Basics"
