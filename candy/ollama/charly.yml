candy:
    version: 2026.144.1443
    name: ollama
    require:
        # GPU-agnostic: the ollama binary auto-detects the GPU at runtime (CPU
        # fallback when none present), so CUDA is an IMAGE-level composition choice
        # (the `ollama` image lists `cuda` explicitly), NOT a layer dependency.
        # This lets CPU consumers (e.g. `openclaw-desktop` on cachyos) compose the
        # layer without dragging the Fedora/NVIDIA `cuda` layer onto a pac base.
        - supervisord
    env:
        OLLAMA_HOST: "0.0.0.0"
        OLLAMA_MODELS: "~/.ollama/models"
    env_provide:
        OLLAMA_HOST: "http://{{.ContainerName}}:11434"
    port:
        - 11434
    volume:
        - name: models
          path: "~/.ollama"
    alias:
        - name: ollama
          command: ollama
    description:
        feature: GPU-agnostic Ollama LLM inference server on port 11434
        narrative: |
            Installs the upstream Ollama binary (release tarball extracted to /usr,
            no systemd) and runs `ollama serve` as a custom supervisord service that
            listens on 0.0.0.0:11434. The binary auto-detects a GPU at runtime and
            falls back to CPU inference, so the candy carries no CUDA dependency.
            Pulled models persist under the ~/.ollama models volume. The running
            service exposes the Ollama HTTP API (e.g. /api/tags) so any composing box
            can serve and query local models.
        tag: [working]
    task:
        # Ollama binary release tarball (no systemd)
        - download: "https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst"
          extract: tar.zst
          to: /usr
          run_as: root
    service:
        - name: ollama
          exec: "ollama serve"
          restart: always
          enable: true
          scope: system
    scenario:
        # DETERMINISTIC build-scope step — the installed binary artifact.
        - name: ollama-binary-installed
          step:
            - then: the ollama binary is installed at /usr/bin/ollama
              file: /usr/bin/ollama
              exists: true
        # DETERMINISTIC deploy-scope steps — the live serve API + CLI version.
        - name: ollama-serves-inference-api
          step:
            - then: the running ollama service answers the model-tags API with HTTP 200 on port 11434
              http: http://127.0.0.1:${HOST_PORT:11434}/api/tags
              status: 200
              context:
                - runtime
            - then: the ollama CLI reports an "ollama version" string
              command: ollama --version
              stdout:
                - matches: "^ollama version"
              context:
                - runtime
        # PROSE-ONLY step — model persistence is genuinely free-form (a real
        # `ollama pull` + restart), so it binds to the agent grader.
        - name: ollama-model-volume-persists
          step:
            - then: models pulled via `ollama pull` are stored under the ~/.ollama models volume and survive a service restart
