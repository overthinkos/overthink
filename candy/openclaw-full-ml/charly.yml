candy:
    version: 2026.144.1443
    name: openclaw-full-ml
    description:
        feature: OpenClaw full headless stack plus the CUDA speech-ML tools (whisper STT + sherpa-onnx TTS)
        narrative: |
            openclaw-full-ml is a metalayer that installs nothing of its own and
            composes three candies, so the observable effect is the union of their
            key artifacts:
              * openclaw-full — the OpenClaw gateway plus every headless CLI tool
                (ffmpeg, ripgrep, gh, tmux, sqlite, uv, ...). The gateway binary
                lands at ~/.npm-global/bin/openclaw and ffmpeg/rg at /usr/bin.
              * whisper — OpenAI Whisper speech-to-text installed via pixi into the
                shared default environment, exposing the `whisper` console script
                at ~/.pixi/envs/default/bin/whisper (ffmpeg is its audio decoder).
              * sherpa-onnx — offline text-to-speech whose VITS piper voice model
                is downloaded and extracted to
                ~/.local/share/sherpa-onnx/models/vits-piper-en_US-lessac-high.
            Each branch is verifiable by the presence of its landed artifact, so a
            no-op composition fails every check below.
        tag: [working]
        scenario:
            - name: openclaw-core-tools-composed
              step:
                - then: the OpenClaw gateway binary is installed (provided by openclaw-full)
                  file: ${HOME}/.npm-global/bin/openclaw
                  exists: true
                - then: ffmpeg (whisper's audio decoder, from openclaw-full) is installed at /usr/bin/ffmpeg
                  file: /usr/bin/ffmpeg
                  exists: true
                - then: the ripgrep search binary (from openclaw-full) is installed at /usr/bin/rg
                  file: /usr/bin/rg
                  exists: true
            - name: speech-ml-stack-present
              step:
                - then: the whisper speech-to-text console script is installed in the default pixi environment
                  file: ${HOME}/.pixi/envs/default/bin/whisper
                  exists: true
                - then: the sherpa-onnx offline TTS voice-model directory is extracted under the user data dir
                  file: ${HOME}/.local/share/sherpa-onnx/models/vits-piper-en_US-lessac-high
                  filetype: directory
            - name: gateway-drives-speech-tools
              step:
                - then: the running OpenClaw gateway can transcribe audio through whisper and synthesize speech through sherpa-onnx end to end
    candy:
        - openclaw-full
        - whisper
        - sherpa-onnx
    # Metalayer with no install of its own: each check asserts a KEY ARTIFACT of a
    # composed candy (the observable effect of the composition). Build-scope —
    # every path is baked into the image at build time.
    eval:
        # openclaw-full branch
        - id: openclaw-full-ml-gateway-binary
          file: ${HOME}/.npm-global/bin/openclaw
          exists: true
        - id: openclaw-full-ml-ffmpeg
          file: /usr/bin/ffmpeg
          exists: true
        - id: openclaw-full-ml-ripgrep
          file: /usr/bin/rg
          exists: true
        # whisper branch (speech-to-text)
        - id: openclaw-full-ml-whisper-cli
          file: ${HOME}/.pixi/envs/default/bin/whisper
          exists: true
        # sherpa-onnx branch (text-to-speech) — the extracted voice model proves
        # the model tarball was downloaded, not just that mkdir ran.
        - id: openclaw-full-ml-sherpa-tts-model
          file: ${HOME}/.local/share/sherpa-onnx/models/vits-piper-en_US-lessac-high
          filetype: directory
