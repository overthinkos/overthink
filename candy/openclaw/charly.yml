candy:
    version: 2026.162.1430
    name: openclaw
    require:
        - nodejs
        - socat
        - supervisord
    env:
        NODE_ENV: "production"
    port:
        - 18789
    port_relay:
        - 18789
    volume:
        - name: data
          path: "~/.openclaw"
    alias:
        - name: openclaw
          command: openclaw
    service:
        - name: openclaw
          exec: "%(ENV_HOME)s/.npm-global/bin/openclaw gateway --port 18789"
          restart: always
          enable: true
          scope: system
    # The gateway this candy runs — checked HERE so one check covers every box
    # composing it (openclaw, openclaw-full, openclaw-desktop).
    eval:
        - id: openclaw-binary
          file: ${HOME}/.npm-global/bin/openclaw
          exists: true
        - id: openclaw-gateway-port
          scope: deploy
          addr: 127.0.0.1:${HOST_PORT:18789}
          reachable: true
          timeout: 5s
