candy:
    version: 2026.162.1430
    name: openclaw
    description:
        feature: Headless OpenClaw AI gateway service on port 18789
        narrative: |
            Installs the openclaw npm package globally (package.json ->
            npm install -g) so the gateway binary lands at
            ~/.npm-global/bin/openclaw, then runs it as the supervised
            `openclaw` service (`openclaw gateway --port 18789`). socat
            relays the loopback-bound gateway onto the container interface
            and a `data` volume persists ~/.openclaw. Binary presence, the
            supervised service, and the reachable port are all verifiable.
        tag: [working]
        scenario:
            # First scenario's step is DETERMINISTIC at build scope (the npm
            # global binary must exist); the next two are DETERMINISTIC at
            # deploy scope (the supervised service must be running and the
            # published gateway port must accept a TCP connection).
            - name: gateway-binary-installed
              step:
                - then: the openclaw gateway binary is installed into the npm global bin
                  file: ${HOME}/.npm-global/bin/openclaw
                  exists: true
            - name: gateway-service-running
              step:
                - then: the openclaw gateway runs as a supervised service
                  scope: deploy
                  service: openclaw
                  running: true
            - name: gateway-port-reachable
              step:
                - then: the running gateway accepts a TCP connection on its published port 18789
                  scope: deploy
                  addr: 127.0.0.1:${HOST_PORT:18789}
                  reachable: true
                  timeout: 5s
    require:
        - nodejs
        - socat
        - supervisord
    env:
        NODE_ENV: "production"
    port:
        - 18789
    port_relay:
        - 18789
    volume:
        - name: data
          path: "~/.openclaw"
    alias:
        - name: openclaw
          command: openclaw
    service:
        - name: openclaw
          exec: "%(ENV_HOME)s/.npm-global/bin/openclaw gateway --port 18789"
          restart: always
          enable: true
          scope: system
    # The gateway this candy runs — checked HERE so one check covers every box
    # composing it (openclaw, openclaw-full, openclaw-desktop).
    eval:
        - id: openclaw-binary
          file: ${HOME}/.npm-global/bin/openclaw
          exists: true
        - id: openclaw-service-running
          scope: deploy
          service: openclaw
          running: true
        - id: openclaw-gateway-port
          scope: deploy
          addr: 127.0.0.1:${HOST_PORT:18789}
          reachable: true
          timeout: 5s
