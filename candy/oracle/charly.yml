oracle:
    candy:
        version: 2026.144.1443
        description: |
            Oracle CLI for bundling prompts and running multi-engine AI queries
            Installs the @steipete/oracle npm package globally from package.json,
            placing the oracle executable on PATH at ${HOME}/.npm-global/bin/oracle.
            Requires the nodejs runtime. The binary's presence and its --version
            entrypoint are deterministically verifiable in the built image with no
            network access or API credentials.
    oracle-require:
        require:
            - nodejs
    oracle-step-0:
        check: the oracle executable is installed at ${HOME}/.npm-global/bin/oracle
        plugin: file
        plugin_input:
            file: ${HOME}/.npm-global/bin/oracle
            exists: true
    oracle-step-1:
        check: running oracle --version exits cleanly
        exit_status: 0
        plugin: command
        plugin_input:
            command: ${HOME}/.npm-global/bin/oracle --version
    oracle-step-2:
        agent-check: the oracle CLI and its nodejs runtime are installed in the image
    oracle-step-3:
        agent-check: a user runs oracle with a bundled prompt against its configured AI engines
    oracle-step-4:
        agent-check: oracle dispatches the prompt to each configured engine and returns their answers
