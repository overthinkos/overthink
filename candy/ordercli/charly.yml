candy:
    version: 2026.144.1443
    name: ordercli
    description: Food delivery order status CLI (Foodora)
    require:
        - golang
    env:
        GOPATH: "~/go"
    path_append:
        - "~/go/bin"
    task:
        - cmd: |
            go install github.com/steipete/ordercli/cmd/ordercli@latest
            go clean -cache
          user: "${USER}"
