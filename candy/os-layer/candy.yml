candy:
    version: 2026.144.1443
    name: os-layer
    description:
        feature: os — predictable system-state fixture for harness phase 1
        narrative: |
            Writes /etc/charly-os-marker containing the predetermined content
            marker `charly-os-content-marker`, and registers a long-lived bash
            service so that `pgrep -x bash` succeeds. Combined with a fedora
            base + supervisord this satisfies every scenario in the
            single-pod-system-state recipe.
    distro:
        fedora:
            package:
                - bash
                - procps-ng
                - iproute
                - util-linux
    task:
        - mkdir: /etc
          user: root
          mode: "0755"
        - write: /etc/charly-os-marker
          user: root
          mode: "0644"
          content: |
            charly-os-content-marker
    service:
        - name: os-bash
          exec: "/usr/bin/bash -c 'while true; do sleep 60; done'"
          restart: always
          priority: 50
          enable: true
          scope: system
    eval:
        - id: os-marker-exists
          file: /etc/charly-os-marker
          exists: true
        - id: os-marker-content
          file: /etc/charly-os-marker
          contains:
            - charly-os-content-marker
        - id: os-bash-installed
          package: bash
          installed: true
