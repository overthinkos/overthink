candy:
    version: 2026.144.1443
    name: pixi
    description:
        feature: pixi package-manager binary installed and runnable
        narrative: |
            The pixi candy downloads the upstream pixi release binary and
            extracts it to /usr/local/bin/pixi -- the conda-forge package
            and environment manager that backs the python / python-ml
            candies and the fedora/arch builder images. Verifiable by
            asserting the binary landed on PATH and reports its version.
        tag: [working]
    # env: + path_append: moved to build.yml's pixi BUILDER definition
    # in 2026-04-29 so images that consume pixi via pixi.toml-triggered
    # builds (and don't list `pixi` as a top-level layer for sibling-
    # grouped auto-intermediate inheritance) still get the runtime env
    # contract. See `runtime_env:` and `path_contributions:` on the
    # pixi block in build.yml.
    task:
        # pixi upstream releases use uname-style arch (x86_64/aarch64), not BuildKit form.
        - download: "https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${BUILD_ARCH}-unknown-linux-musl.tar.gz"
          extract: tar.gz
          to: /usr/local/bin
          run_as: root
    # Shell-init: put ~/.pixi/bin (where pixi installs per-user environments
    # and global tools) on the interactive shell PATH. Container images get
    # this via build.yml runtime_env on the pixi BUILDER definition; this
    # block covers target:local host deploys where the interactive shell
    # has its own PATH discovery (no Containerfile ENV directive in scope).
    shell:
        path_append:
            - "~/.pixi/bin"
    scenario:
        - name: pixi-binary-installed
          step:
            - then: the pixi binary is installed at /usr/local/bin/pixi
              file: /usr/local/bin/pixi
              exists: true
        - name: pixi-reports-its-version
          step:
            - then: running pixi --version exits cleanly and prints a version string
              command: /usr/local/bin/pixi --version
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+"
        - name: pixi-binary
          step:
            - id: pixi-binary
              file: /usr/local/bin/pixi
              exists: true
        - name: pixi-version
          step:
            - id: pixi-version
              command: /usr/local/bin/pixi --version
              exit_status: 0
