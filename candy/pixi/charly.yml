candy:
    version: 2026.144.1443
    name: pixi
    description: |
        pixi package-manager binary installed and runnable
        The pixi candy downloads the upstream pixi release binary and
        extracts it to /usr/local/bin/pixi -- the conda-forge package
        and environment manager that backs the python / python-ml
        candies and the fedora/arch builder images. Verifiable by
        asserting the binary landed on PATH and reports its version.
    # Shell-init: put ~/.pixi/bin (where pixi installs per-user environments
    # and global tools) on the interactive shell PATH. Container images get
    # this via build.yml runtime_env on the pixi BUILDER definition; this
    # block covers target:local host deploys where the interactive shell
    # has its own PATH discovery (no Containerfile ENV directive in scope).
    shell:
        path_append:
            - "~/.pixi/bin"
    plan:
        - run: download=https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${BUILD_ARCH}-unknown-linux-musl.tar.gz
          download: "https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${BUILD_ARCH}-unknown-linux-musl.tar.gz"
          extract: tar.gz
          to: /usr/local/bin
          run_as: root
        - check: the pixi binary is installed at /usr/local/bin/pixi
          file: /usr/local/bin/pixi
          exists: true
        - check: running pixi --version exits cleanly and prints a version string
          command: /usr/local/bin/pixi --version
          exit_status: 0
          stdout:
            - matches: "[0-9]+\\.[0-9]+"
        - check: command=/usr/local/bin/pixi --version
          id: pixi-version
          command: /usr/local/bin/pixi --version
          exit_status: 0
