candy:
    version: 2026.144.1443
    name: playwright
    description:
        feature: Installs the Playwright browser-automation CLI globally via npm so `playwright` is on PATH (OpenClaw AI snapshots).
        narrative: |
            The candy depends on nodejs and ships a package.json pinning the
            `playwright` npm package, which the build installs globally under
            NPM_CONFIG_PREFIX (~/.npm-global). The result is verifiable: the
            playwright binary lands at ~/.npm-global/bin/playwright, the package
            is unpacked under ~/.npm-global/lib/node_modules/playwright,
            `playwright --version` exits cleanly and prints a semantic version,
            and `playwright --help` lists the core automation commands (install,
            codegen) that define the CLI surface.
        tag: [working]
        scenario:
            - name: cli-binary-installed
              step:
                - then: the playwright binary is installed into the npm global bin directory
                  file: ${HOME}/.npm-global/bin/playwright
                  exists: true
            - name: npm-package-unpacked
              step:
                - then: the playwright package is unpacked under the npm global lib directory
                  file: ${HOME}/.npm-global/lib/node_modules/playwright/package.json
                  exists: true
            - name: cli-reports-version
              step:
                - then: running playwright --version exits cleanly and prints a semantic version
                  command: ${HOME}/.npm-global/bin/playwright --version 2>&1
                  exit_status: 0
                  stdout:
                    - matches: "[0-9]+\\.[0-9]+"
            - name: cli-help-lists-core-commands
              step:
                - then: running playwright --help lists the install and codegen automation commands
                  command: ${HOME}/.npm-global/bin/playwright --help 2>&1
                  stdout:
                    - contains: "install"
                    - contains: "codegen"
    require:
        - nodejs
    eval:
        - id: playwright-binary
          file: ${HOME}/.npm-global/bin/playwright
          exists: true
        - id: playwright-package
          file: ${HOME}/.npm-global/lib/node_modules/playwright/package.json
          exists: true
        - id: playwright-version
          command: ${HOME}/.npm-global/bin/playwright --version 2>&1
          exit_status: 0
          stdout:
            - matches: "[0-9]+\\.[0-9]+"
        - id: playwright-help-lists-commands
          command: ${HOME}/.npm-global/bin/playwright --help 2>&1
          stdout:
            - contains: "install"
            - contains: "codegen"
