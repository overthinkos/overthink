plugin-adb:
    candy:
        version: 2026.180.0001
        description: |-
            OUT-OF-TREE charly plugin owning ALL Android device interaction: the `adb`
            Android-Debug-Bridge check VERB, the `deploy:android` SUBSTRATE (the
            `target: android` app-install deploy, F1), AND the goadb-backed device
            probe the `charly status` collector needs — a standalone Go module (go.mod
            + main.go) that speaks the ADB wire protocol over go-plugin gRPC via the
            charly plugin SDK (charly/plugin/sdk). charly's loader fetches this candy's
            repo, go-builds the provider binary on the HOST, and serves it
            OUT-OF-PROCESS via LocalTransport — so the github.com/zach-klippenstein/goadb
            dependency + the SINGLE apk install path (apkeep + adb, R3) live HERE, out
            of charly's core go.mod. Authoring is unchanged: the verb keeps its `adb:`
            discriminator + every modifier on charly's core #Op (ResolveVerb →
            grpcProvider → invokeVerbProvider hands it the full #Op), and `target:
            android` resolves to this plugin's deploy:android provider over the E3b
            reverse channel — the host preresolves the device endpoint + the apk specs
            (android_deploy_preresolve.go) and ships them in DeployVenue.Substrate;
            this plugin gates on boot then installs. Provides the full 12-method verb
            surface (devices/shell/install/install-app/uninstall/getprop/screencap/
            logcat-tail/wait-for-device/wait-ui-settled/current-focus/keyevent) plus
            the deploy substrate. The R10 consumer is the check-android-emulator-pod
            bed (via android-emulator-layer).
    plugin-adb-decl:
        plugin:
            providers:
                - verb:adb
                - deploy:android
            source: github.com/overthinkos/overthink/candy/plugin-adb
    adb-devices-online:
        check: the running emulator is attached to the adb server (the out-of-process plugin verb dispatches through the registry and probes the live device)
        id: adb-devices-online
        adb: devices
        stdout:
            - contains: emulator-5554
        context:
            - runtime
