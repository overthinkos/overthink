plugin-adb:
    candy:
        version: 2026.174.0900
        description: |-
            OUT-OF-TREE charly plugin serving the `adb` Android-Debug-Bridge check
            verb AND the goadb-backed Android app-install / device-probe operations
            the `target: android` deploy + `charly status` collector need — a
            standalone Go module (go.mod + main.go) that speaks the ADB wire protocol
            over go-plugin gRPC via the charly plugin SDK (charly/plugin/sdk).
            charly's loader fetches this candy's repo, go-builds the provider binary
            on the HOST, and serves it OUT-OF-PROCESS via LocalTransport — so the
            github.com/zach-klippenstein/goadb dependency lives HERE, out of charly's
            core go.mod, while `adb:` authoring stays unchanged: the verb keeps its
            `adb:` discriminator + every modifier on charly's core #Op, and dispatches
            through the provider registry exactly like a built-in (ResolveVerb →
            grpcProvider → invokeVerbProvider hands it the full #Op). Provides the full
            12-method surface (devices/shell/install/install-app/uninstall/getprop/
            screencap/logcat-tail/wait-for-device/wait-ui-settled/current-focus/
            keyevent). The R10 consumer is the check-android-emulator-pod bed (via
            android-emulator-layer).
    plugin-adb-decl:
        plugin:
            providers:
                - verb:adb
            source: github.com/overthinkos/overthink/candy/plugin-adb
    adb-devices-online:
        check: the running emulator is attached to the adb server (the out-of-process plugin verb dispatches through the registry and probes the live device)
        id: adb-devices-online
        adb: devices
        stdout:
            - contains: emulator-5554
        context:
            - runtime
