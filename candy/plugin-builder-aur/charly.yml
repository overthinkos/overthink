plugin-builder-aur:
    candy:
        version: 2026.181.0400
        description: |-
            OUT-OF-TREE charly plugin serving the `aur` builder's DEPLOY-TIME IR shim. A standalone
            Go module dispatching the two deploy-time builder ops to the shared charly/plugin/kit
            logic (R3): OpCollectContext (aur → {packages, replaces} from the candy's aur: section)
            and OpReverse (aur → package-remove, system scope, pac format — the host fills the
            UninstallCmd later via fillReverseUninstallCmds). The host invokes both in its build
            PRE-PASS, BEFORE the pure BuildDeployPlan compile, so the compiler never dials a plugin.
            The builder's BUILD-TIME multi-stage (yay/makepkg → pacman -U) stays the CORE embedded
            vocabulary (emitBuilderStages + the host-side runVenueBuilderStep engine); selection stays
            DETECTION (a candy's aur: section), never an authored external_builder:.
    plugin-builder-aur-decl:
        plugin:
            providers:
                - builder:aur
            source: github.com/overthinkos/overthink/candy/plugin-builder-aur
    aur-builder-module-present:
        check: the out-of-tree aur builder plugin ships a buildable Go module (go.mod + the provider main) the host builds + serves out-of-process for the deploy-time OpCollectContext/OpReverse pre-pass
        id: aur-builder-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
