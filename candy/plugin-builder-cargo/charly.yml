plugin-builder-cargo:
    candy:
        version: 2026.181.0300
        description: |-
            OUT-OF-TREE charly plugin serving the `cargo` builder's DEPLOY-TIME IR shim. A standalone
            Go module dispatching the two deploy-time builder ops to the shared charly/plugin/kit
            logic (R3): OpCollectContext (cargo records no stage context — binaries are read from
            Cargo.toml [[bin]] host-side at install time) and OpReverse (cargo → cargo-uninstall when
            binaries are known). The host invokes both in its build PRE-PASS, BEFORE the pure
            BuildDeployPlan compile, so the compiler never dials a plugin. The builder's BUILD-TIME
            multi-stage stays the CORE embedded vocabulary (emitBuilderStages); selection stays
            DETECTION (a candy's Cargo.toml), never an authored external_builder:.
    plugin-builder-cargo-decl:
        plugin:
            providers:
                - builder:cargo
            source: github.com/overthinkos/overthink/candy/plugin-builder-cargo
    cargo-builder-module-present:
        check: the out-of-tree cargo builder plugin ships a buildable Go module (go.mod + the provider main) the host builds + serves out-of-process for the deploy-time OpCollectContext/OpReverse pre-pass
        id: cargo-builder-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
