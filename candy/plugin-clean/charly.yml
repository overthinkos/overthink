plugin-clean:
    candy:
        version: 2026.181.0001
        description: |-
            OUT-OF-TREE charly COMMAND-class plugin serving the externalized `charly clean`
            CLI — the build-artifact retention/prune surface, a standalone Go module (go.mod +
            main.go) ported OUT of charly's core CLI registration, so the operator-facing
            `charly clean` command no longer compiles into the core binary as a top-level command.

            One of cutover C15's four remaining WELDED-command externalizations (charly
            clean/settings/candy/version), after candy/plugin-tmux, plugin-preempt, plugin-feature,
            plugin-vm, and plugin-doctor. `charly clean` is WELDED to core — its CleanCmd.Run
            handler (charly/clean.go) reads the project charly.yml `defaults:` (keep_images /
            keep_check_runs), resolves the build engine (ResolveRuntime), and prunes .build/ /
            .check/ artifacts + the charly-labeled podman image tags — project + engine + filesystem
            machinery this out-of-process plugin cannot reach — so clean.go MUST STAY CORE (R3). The
            SOLUTION (the vm/doctor precedent — re-home the leaf onto a hidden core command and
            raw-forward to it): core re-homes CleanCmd onto the hidden `charly __clean` command,
            and this plugin is a THIN FORWARDER that syscall.Exec's `charly __clean <args…>`.
            `clean` is a flags-only LEAF (no subcommands), so the plugin raw-forwards the
            pass-through args rather than re-expressing a grammar — the simplest welded-command
            shape. No core symbol crosses the boundary; no ad-hoc podman.

            charly's loader fetches this candy's repo, go-builds the provider binary on the HOST,
            and on `charly clean <args…>` syscall.Exec's it in CLI mode (sdk.Main → cliMain) — or
            runs the host-installed /usr/lib/charly/plugins binary on a project-less host (the
            pkg/arch bake). The plugin owns real terminal stdio, so the prune report reaches the
            operator's terminal natively.

            command:clean is dispatched via the CLI syscall.Exec path, NOT the gRPC provider
            registry — so it is declared in plugin.providers (for the CLI-grammar prescan + baked
            `.providers` manifest) but advertises NO Describe capability. The R10 witness is the
            disposable check-commands-local bed: `charly clean --dry-run` exits 0 and prints the
            would-remove retention report host-side, proving the externalized command + the
            hidden-command raw-forward dispatch end-to-end.
    plugin-clean-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-clean
            providers:
                - command:clean
    # ADE build-context check: a deterministic check that does NOT depend on a live deployment —
    # it mirrors candy/plugin-doctor's doctor-module-present: a trivial build-context
    # `plugin: command` (the built-in command CHECK verb) running `true`, proving the host can
    # build + fork/exec the module. The full CLI end-to-end (`charly clean --dry-run` → exit 0
    # with the would-remove report) is exercised by the live R10 bed (check-commands-local).
    clean-module-present:
        check: the out-of-tree command plugin ships a buildable Go module (go.mod + the provider main) the host can build + fork/exec; the full `charly clean` end-to-end is exercised by the live R10 (check-commands-local)
        id: clean-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
