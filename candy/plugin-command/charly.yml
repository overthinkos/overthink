plugin-command:
    candy:
        version: 2026.176.2800
        description: |-
            The `command` check verb relocated into a candy: run a shell command
            in-container (via the live check engine), host-side (os/exec under charly
            check live), or backgrounded (fire-and-forget, PID registered with the plan
            for teardown), asserting exit/stdout/stderr. A HOST-COUPLED verb on the
            charly/plugin/kit contract (CheckVerbProvider + the AddBackground context
            extension), so it is COMPILED-IN-ONLY. Its run: ACT is the dedicated
            package-main install-task emitCmd branch, not a kit role. Matchers via sdk.MatchAll.
    plugin-command-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-command
            providers:
                - verb:command
    command-verb-dispatches:
        check: the command verb dispatches through the provider registry and runs a shell command asserting its exit status
        id: command-verb-dispatches
        plugin: command
        plugin_input:
            command: "true"
        context: [runtime]
