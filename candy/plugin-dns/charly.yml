plugin-dns:
    candy:
        version: 2026.176.1900
        description: |-
            The `dns` check verb relocated into a candy: a name-resolution probe
            (in-container `getent hosts` under charly check box, host-side
            `net.LookupIP` under charly check live, with optional required-address
            matching). A HOST-COUPLED verb — its RunVerb runs against the live check
            engine (charly/plugin/kit.CheckContext), so it is COMPILED-IN-ONLY. A pure
            check verb; a port/process-template relocation on the kit contract.
    plugin-dns-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-dns
            providers:
                - verb:dns
    dns-verb-dispatches:
        check: the dns verb dispatches through the provider registry and probes name resolution on a live deployment
        id: dns-verb-dispatches
        plugin: dns
        plugin_input: {dns: localhost, resolvable: true}
        context: [runtime]
