plugin-doctor:
    candy:
        version: 2026.181.0001
        description: |-
            OUT-OF-TREE charly COMMAND-class plugin serving the externalized `charly doctor`
            CLI — the host-dependency-status surface, a standalone Go module (go.mod + main.go)
            ported OUT of charly's core CLI registration, so the operator-facing `charly doctor`
            command no longer compiles into the core binary as a top-level command.

            The FIFTH WELDED-command externalization in the core-externalization program (after
            candy/plugin-tmux, candy/plugin-preempt, candy/plugin-feature, and candy/plugin-vm).
            `charly doctor` is WELDED to core — its DoctorCmd.Run handler (charly/doctor.go) calls
            package-main host-detection symbols (credentialHealth; DetectGPU / DetectAMDGPU /
            GPURunArgs / DetectHostDevices; DetectVFIO / VfioGroupAccessible / MemlockLimitBytes)
            that this out-of-process plugin cannot reach — so doctor.go MUST STAY CORE (R3). The
            SOLUTION (the vm precedent — re-home the whole leaf onto a hidden core command and
            raw-forward to it): core re-homes DoctorCmd onto the hidden `charly __doctor` command,
            and this plugin is a THIN FORWARDER that syscall.Exec's `charly __doctor <args…>`.
            `doctor` is a flags-only LEAF (no subcommands), so the plugin raw-forwards the
            pass-through args rather than re-expressing a grammar — the simplest welded-command
            shape. No core symbol crosses the boundary; no ad-hoc podman/virsh.

            charly's loader fetches this candy's repo, go-builds the provider binary on the HOST,
            and on `charly doctor <args…>` syscall.Exec's it in CLI mode (sdk.Main → cliMain) — or
            runs the host-installed /usr/lib/charly/plugins binary on a project-less host (the
            pkg/arch bake). The plugin owns real terminal stdio, so the dependency-status report
            reaches the operator's terminal natively.

            command:doctor is dispatched via the CLI syscall.Exec path, NOT the gRPC provider
            registry — so it is declared in plugin.providers (for the CLI-grammar prescan + baked
            `.providers` manifest) but advertises NO Describe capability. The R10 witness is the
            disposable check-doctor-local bed: `charly doctor` exits 0 and prints the
            host-dependency report host-side, proving the externalized command + the hidden-command
            raw-forward dispatch end-to-end.
    plugin-doctor-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-doctor
            providers:
                - command:doctor
    # ADE build-context check: a deterministic check that does NOT depend on a live deployment —
    # it mirrors candy/plugin-feature's feature-module-present: a trivial build-context
    # `plugin: command` (the built-in command CHECK verb) running `true`, proving the host can
    # build + fork/exec the module. The full CLI end-to-end (`charly doctor` → exit 0 with the
    # host-dependency report) is exercised by the live R10 bed (check-doctor-local).
    doctor-module-present:
        check: the out-of-tree command plugin ships a buildable Go module (go.mod + the provider main) the host can build + fork/exec; the full `charly doctor` end-to-end is exercised by the live R10 (check-doctor-local)
        id: doctor-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
