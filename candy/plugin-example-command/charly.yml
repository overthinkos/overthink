plugin-example-command:
    candy:
        version: 2026.175.0900
        description: |-
            Reference OUT-OF-TREE charly COMMAND-class plugin — a standalone Go module
            (go.mod + main.go) serving the `examplecommand` command over go-plugin gRPC
            via the charly plugin SDK (charly/plugin/sdk). charly's loader fetches this
            candy's repo, go-builds the provider binary on the HOST, and serves it
            OUT-OF-PROCESS via LocalTransport. On `charly examplecommand <args…>`, charly's
            CLI dispatch (provider_command_external.go dispatchExternalCommand) forwards
            the pass-through tokens as op.Params = {"args": [...]} on an OpRun Invoke; the
            plugin writes a marker FILE (first arg, else /tmp/charly-examplecommand/ran)
            containing the joined args, so a test can assert the command ran AND received
            its args. The command-class companion of the verb-class
            candy/plugin-example-external. The command class is external-capable: charly
            prescans `examplecommand` into the CLI grammar and lazy-connects this provider
            out-of-process on the first `charly examplecommand` invocation.
    plugin-example-command-decl:
        plugin:
            providers:
                - command:examplecommand
            source: github.com/overthinkos/overthink/candy/plugin-example-command
    # ADE check: a deterministic build-context check that does NOT depend on the project
    # context the `charly examplecommand` CLI needs (the prescan finds this candy from the
    # project dir). It mirrors candy/plugin-example-deploy's pattern — a trivial
    # build-context `plugin: command` (the built-in command CHECK verb) running `true`.
    # The full CLI end-to-end (`charly examplecommand <args>` → marker file) is exercised
    # by the Go e2e (TestDispatchExternalCommand_LazyConnect) + the live R10.
    examplecommand-module-present:
        check: the out-of-tree command plugin ships a buildable Go module (go.mod + the provider main) the host can build + serve out-of-process; the full `charly examplecommand` end-to-end is exercised by the Go e2e + the live R10
        id: examplecommand-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
