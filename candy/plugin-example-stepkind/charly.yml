plugin-example-stepkind:
    candy:
        version: 2026.181.0001
        description: |-
            Reference OUT-OF-TREE charly class:step plugin (F3) — a standalone Go module
            (go.mod + main.go) serving the `examplestepkind` install-step KIND over go-plugin
            gRPC via the charly plugin SDK. It proves the EXTERNAL-STEP-KIND contract: the
            plugin DECLARES its install-step Scope/Venue/Gate in its Describe StepContract, the
            host carries it OPAQUELY ("external:examplestepkind" + Payload) through the
            InstallPlan IR, and the host's OPEN DEFAULT ARM dispatches the step's OpExecute over
            the E3b reverse channel — where it writes a venue marker and returns a teardown
            ReverseOp the host records + replays (record-and-replay). The step-class companion
            of the verb-class candy/plugin-example-external and the deploy-class
            candy/plugin-example-deploy.
    plugin-example-stepkind-decl:
        plugin:
            providers:
                - step:examplestepkind
            source: github.com/overthinkos/overthink/candy/plugin-example-stepkind
    plugin-example-stepkind-run:
        run: run the plugin-contributed step kind on the venue — composed into a target local or vm deploy, the host routes this run-step to an external step (external.examplestepkind), walks it via the open default arm, and dispatches its OpExecute so the plugin writes the marker (proves a plugin-contributed step kind travels author through compile, wire, host, to plugin)
        run_as: ${USER}
        context:
            - deploy
        plugin: examplestepkind
        plugin_input:
            marker: EXAMPLE-STEPKIND-OK
    examplestepkind-marker-present:
        check: the external step kind wrote its venue marker (proves "external:examplestepkind" dispatched + executed at deploy)
        id: examplestepkind-marker-present
        context:
            - deploy
        plugin: file
        plugin_input:
            file: /tmp/charly-examplestepkind/marker
            exists: true
    examplestepkind-module-present:
        check: the out-of-tree class:step plugin ships a buildable Go module the host can build + serve out-of-process
        id: examplestepkind-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
