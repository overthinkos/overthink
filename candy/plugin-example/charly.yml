plugin-example:
    candy:
        version: 2026.172.0001
        description: |-
            Reference BUILT-IN plugin candy: provides the `exampleprobe` check verb
            (a deterministic pass-with-marker probe, registered in-process via init)
            and verifies it with its own plan. The canonical "a plugin is a candy"
            example — same authoring/discovery/validation/ADE as any candy, plus a
            `plugin:` block declaring the reserved-word Providers it serves.
    plugin-example-decl:
        plugin:
            source: builtin
            providers:
                - verb:exampleprobe
    exampleprobe-passes:
        check: the exampleprobe plugin verb dispatches through the provider registry and passes
        id: exampleprobe-passes
        context: [build, deploy]
        plugin: exampleprobe
        plugin_input:
            marker: exampleprobe-marker-ok
