plugin-installstep:
    candy:
        version: 2026.182.1200
        description: |-
            Compiled-in DUAL-PLACEMENT charly class:step plugin serving the BUILD-context OpEmit
            leg for the compiler-emitted builtin InstallStep kinds. Two sub-categories: the seven
            PURE kinds (C1.1) — file, shell-hook, shell-snippet, service-packaged, service-custom,
            repo-change, apk-install — whose fragment is pure string formatting from the
            compiler-produced spec.InstallStepView (the SAME view the deploy walk consumes), so the
            plugin returns the pod-overlay Containerfile fragment directly from OpEmit; and the
            HOST-COUPLED system-packages kind (C1.2), whose build-context render needs the host build
            engine (DistroDef format templates + RenderTemplate) and so calls back the host's
            "step-emit" host-builder over the reverse channel (Executor.HostBuild) and echoes the
            returned fragment. The DEPLOY leg for ALL these kinds STAYS unchanged in
            charly/plugin/kit.WalkPlans (system-packages is a host-engine kind driven via RunHostStep
            → renderHostPackageCommand); this plugin serves ONLY OpEmit. apk-install declares
            Emits=false (no build fragment — the android deploy preresolver reads the step at deploy).
            The C1.1/C1.2 externalization of the builtin InstallStep build-emit: the build leg moves
            out of charly's OCITarget.emit* methods into this plugin, the deploy leg is unchanged. Its
            Go lives in this candy's own module (NewProvider/NewMeta + a cmd/serve out-of-process
            shim), compiled INTO charly via charly.yml compiled_plugins:.
    plugin-installstep-decl:
        plugin:
            providers:
                - step:file
                - step:shell-hook
                - step:shell-snippet
                - step:service-packaged
                - step:service-custom
                - step:repo-change
                - step:apk-install
                - step:system-packages
            source: github.com/overthinkos/overthink/candy/plugin-installstep
    installstep-module-present:
        check: the compiled-in class:step build-emit plugin ships a buildable Go module the host can build + serve (in-proc in the default binary, out-of-process via cmd/serve when not compiled in)
        id: installstep-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
