plugin-interface:
    candy:
        version: 2026.176.1700
        description: |-
            The `interface` check verb relocated into a candy: probes a network
            interface's presence / MTU / addresses via `ip` on the live deployment. A
            HOST-COUPLED verb — its RunVerb runs against the live check engine
            (charly/plugin/kit.CheckContext), so it is COMPILED-IN-ONLY. A pure check
            verb (probe-only); a port/process-template relocation on the kit contract.
    plugin-interface-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-interface
            providers:
                - verb:interface
    interface-verb-dispatches:
        check: the interface verb dispatches through the provider registry and probes a network interface on a live deployment
        id: interface-verb-dispatches
        plugin: interface
        plugin_input: {interface: lo}
        context: [runtime]
