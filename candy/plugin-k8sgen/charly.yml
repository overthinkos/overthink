plugin-k8sgen:
    candy:
        version: 2026.181.0001
        description: |-
            KUSTOMIZE GENERATOR plugin (C8/M13) — the pure manifest generation that turns a
            deployment node + a kind:k8s cluster template + the image's ports/uid/gid into a
            Kustomize base/ + overlays/<inst>/ tree (Deployment/StatefulSet/DaemonSet/Job/
            CronJob/Pod, Service, PVCs, Ingress, kustomization wiring). Carved out of charly
            core (charly/k8s_generate.go); charly's in-core GenerateK8sKustomize is a thin
            shim that extracts ports/uid/gid from the image Capabilities, Invokes this
            plugin's OpEmit, then does the disk I/O + the host-side egress gate before the
            bytes hit disk. Compiled-in (the deploy + from-box paths call it).
    plugin-k8sgen-decl:
        plugin:
            providers:
                - verb:k8sgen
            source: github.com/overthinkos/overthink/candy/plugin-k8sgen
    k8sgen-module-present:
        check: the kustomize-generator plugin ships a buildable Go module the host compiles in
        id: k8sgen-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
