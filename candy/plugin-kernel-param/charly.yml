plugin-kernel-param:
    candy:
        version: 2026.176.2300
        description: |-
            The `kernel-param` MULTI-ROLE state-provision verb relocated into a candy.
            CHECK: read /proc/sys/<key-as-slashes> via the live check engine and match
            the value. ACT: render `sysctl -w key=value`. A HOST-COUPLED verb on the
            charly/plugin/kit contract (CheckVerbProvider + ProvisionActor), so it is
            COMPILED-IN-ONLY. The first multi-role verb on the kit ProvisionActor
            extension; matchers reuse the shared sdk.MatchAll.
    plugin-kernel-param-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-kernel-param
            providers:
                - verb:kernel-param
    kernel-param-verb-dispatches:
        check: the kernel-param verb dispatches through the provider registry and reads a sysctl value from /proc/sys
        id: kernel-param-verb-dispatches
        plugin: kernel-param
        plugin_input:
            kernel-param: kernel.ostype
            value:
                - Linux
        context: [runtime]
