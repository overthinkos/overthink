plugin-libvirt:
    candy:
        version: 2026.176.2300
        description: |-
            The `libvirt` live-container check verb relocated into a candy: VM management via
            the libvirt API on a live deployment (list, info, screenshot, send-key, QMP,
            qemu-guest-agent, snapshots, events). A SCHEMA-LESS host-coupled LIVE verb — its
            modifiers ride the closed base #Op; RunVerb delegates dispatch to the host via
            kit.CheckContext.RunCharlyVerb, so it is COMPILED-IN-ONLY. The `charly check
            libvirt` driver command (the go-libvirt-backed impl) stays host-side for now;
            relocating it sheds go-libvirt from charly's binary (a follow-on).
    plugin-libvirt-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-libvirt
            providers:
                - verb:libvirt
    libvirt-verb-dispatches:
        check: the libvirt verb dispatches through the provider registry and lists the libvirt domains for a live VM deployment
        id: libvirt-verb-dispatches
        libvirt: list
        context: [runtime]
