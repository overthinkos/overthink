plugin-package-group:
    candy:
        version: 2026.176.3205
        description: |-
            The `package-group` plugin KIND relocated into a candy: a KIND provider dispatching
            via the pb Invoke(OpLoad) envelope (decode the authored `package-group:` entity into
            its core spec type, re-marshal as canonical JSON). Serves itself in BOTH
            placements (compiled-in OR out-of-process) like the matching/exampleprobe
            verbs + the init kind — no kit contract needed (kinds are pb-shape).
    plugin-package-group-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-package-group
            providers:
                - kind:package-group
    package-group-kind-module-present:
        check: the package-group kind plugin ships a buildable Go module the host compiles in (default) or serves out-of-process; its entity decode is exercised by any box/deploy composing a `package-group:` node
        id: package-group-kind-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
