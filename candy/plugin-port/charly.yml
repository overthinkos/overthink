plugin-port:
    candy:
        version: 2026.176.1500
        description: |-
            The `port` check verb relocated into a candy: the in-container listening
            probe (ss/netstat) or a host-side TCP reachability dial. A HOST-COUPLED
            verb — its RunVerb runs against the live check engine
            (charly/plugin/kit.CheckContext), so it is COMPILED-IN-ONLY (no
            out-of-process placement; the live context cannot cross a process
            boundary). The FIRST verb on the kit contract and the relocation template
            for the other host-coupled check verbs/kinds.
    plugin-port-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-port
            providers:
                - verb:port
    port-verb-dispatches:
        check: the port verb dispatches through the provider registry and probes a listening port on a live deployment
        id: port-verb-dispatches
        plugin: port
        plugin_input: {port: 22, listening: true}
        context: [runtime]
