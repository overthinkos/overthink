plugin-resource:
    candy:
        version: 2026.176.3206
        description: |-
            The `resource` plugin KIND relocated into a candy: a KIND provider dispatching
            via the pb Invoke(OpLoad) envelope (decode the authored `resource:` entity into
            its core spec type, re-marshal as canonical JSON). Serves itself in BOTH
            placements (compiled-in OR out-of-process) like the matching/exampleprobe
            verbs + the init kind — no kit contract needed (kinds are pb-shape).
    plugin-resource-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-resource
            providers:
                - kind:resource
    resource-kind-module-present:
        check: the resource kind plugin ships a buildable Go module the host compiles in (default) or serves out-of-process; its entity decode is exercised by any box/deploy composing a `resource:` node
        id: resource-kind-module-present
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
