plugin-tunnel:
    candy:
        version: 2026.182.1200
        description: |-
            OUT-OF-TREE charly plugin serving the `tunnel` VERB (verb:tunnel) — the
            externalized tailscale/cloudflare TUNNEL EXECUTION LEG (core-externalization
            cutover C16b). It is DUAL-PLACEMENT: its importable provider package
            (NewProvider/NewMeta, serving verb:tunnel + its self-contained CUE schema over
            the SDK Describe channel) is COMPILED INTO charly when listed in charly.yml
            `compiled_plugins:` (the default — registered in-process via
            registerCompiledPlugin), and the SAME provider is served OUT-OF-PROCESS over
            go-plugin gRPC by the cmd/serve shim (host-built + connected via LocalTransport)
            when it is not. Placement is invisible above the provider registry.

            The RESOLUTION half of the tunnel subsystem STAYS in charly's core
            (charly/tunnel.go: ResolveTunnelConfig / TunnelConfigFromMetadata + the pure
            schemeTarget/tailscaleFlag/isTCPFamily helpers the quadlet emitter shares, and
            the tunnelConfigPath the systemd unit references). Only the EXECUTION leg lives
            HERE: charly's core tunnel_plugin.go resolves a TunnelConfig, then forwards
            TunnelStart / TunnelStop / cloudflareTunnelSetup over this verb's Invoke envelope
            ({method, config}); the plugin runs the actual tailscale serve/funnel and
            cloudflared lifecycle, stopping at the exec/auth boundary. Every core tunnel
            consumer (start.go / config_image.go) is UNCHANGED — it resolves the same
            TunnelConfig and calls the same seams.

            verb:tunnel ALSO carries a benign `plan` (dry-run) method: given a TunnelConfig
            it returns the EXACT tailscale/cloudflared argv it WOULD run WITHOUT exec, so a
            disposable bed proves the registry dispatch + the TunnelConfig wire round-trip +
            the moved command-building logic with ZERO tailscale/cloudflare credentials. The
            R10 consumer is box/fedora's check-tunnel-pod bed (a `plugin: tunnel`
            method:plan step asserting the built argv).
    plugin-tunnel-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-tunnel
            providers:
                - verb:tunnel
    # ADE build-context check — the deterministic module-present check: a `plugin: command`
    # running `true`, mirror plugin-secrets' secrets-plugin-builds. It proves the candy
    # ships a buildable Go module (go.mod + the provider main) the host can build and serve
    # verb:tunnel; the full dispatch + argv round-trip is exercised by tunnel-plan-argv (and
    # by check-tunnel-pod). Deterministic, keyring/creds-free.
    tunnel-plugin-builds:
        check: the out-of-tree plugin ships a buildable Go module providing verb:tunnel (the externalized tailscale/cloudflare execution leg) the host can build, compile in, and serve over gRPC; the full dispatch + argv round-trip is exercised by tunnel-plan-argv + the check-tunnel-pod bed
        id: tunnel-plugin-builds
        context:
            - build
        plugin: command
        plugin_input:
            command: "true"
    # ADE plan-dispatch check — the creds-free dry-run. Dispatches verb:tunnel with
    # method:plan and asserts the built tailscale argv, proving the registry dispatch + the
    # TunnelConfig wire round-trip + the moved command-building logic without any tailscale
    # daemon or credentials. context: runtime (the plugin-verb ADE pattern, mirror
    # plugin-example-external's externalprobe-dispatches).
    tunnel-plan-argv:
        check: verb:tunnel plan builds the exact tailscale serve/funnel argv from a wire TunnelConfig (registry dispatch + config round-trip + moved argv logic), creds-free
        id: tunnel-plan-argv
        context:
            - runtime
        plugin: tunnel
        plugin_input:
            method: plan
            config:
                provider: tailscale
                box_name: plugin-tunnel
                ports:
                    - port: 8888
                      backend_port: 8888
                      protocol: http
                      public: false
                    - port: 443
                      backend_port: 443
                      protocol: https+insecure
                      public: true
            expect:
                - tailscale serve --bg --https=8888 http://127.0.0.1:8888
                - tailscale funnel --bg --https=443 https+insecure://127.0.0.1:443
