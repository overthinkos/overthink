plugin-user:
    candy:
        version: 2026.176.2500
        description: |-
            The `user` MULTI-ROLE state-provision verb relocated into a candy. CHECK:
            `getent passwd` via the live check engine and compare uid/gid/home/shell.
            ACT: render an idempotent `useradd`. A HOST-COUPLED verb on the
            charly/plugin/kit contract (CheckVerbProvider + ProvisionActor), so it is
            COMPILED-IN-ONLY. No matchers — direct field comparison.
    plugin-user-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-user
            providers:
                - verb:user
    user-verb-dispatches:
        check: the user verb dispatches through the provider registry and probes an account via getent passwd
        id: user-verb-dispatches
        plugin: user
        plugin_input:
            user: root
            uid: 0
        context: [runtime]
