plugin-vnc:
    candy:
        version: 2026.178.1200
        description: |-
            OUT-OF-TREE charly plugin serving the `vnc` RFB/VNC check verb — a standalone
            Go module (go.mod + main.go) that drives a live deployment's VNC desktop over
            the RFB protocol (RFC 6143: the custom stdlib-only VNC client — VeNCrypt/TLS +
            ZRLE decode), served OUT-OF-PROCESS over go-plugin gRPC via the charly plugin
            SDK (charly/plugin/sdk). charly's loader fetches this candy's repo, go-builds the
            provider binary on the HOST, and serves it via LocalTransport — so the RFB client
            lives HERE, out of charly's core check surface (the latest external dep-shed after
            candy/plugin-cdp; nothing VNC-specific remains in core — the former `charly check
            vnc vm` CLI is subsumed into the declarative `vnc:` verb against a vm target).
            `vnc:` authoring stays unchanged: the verb keeps its `vnc:` discriminator + every
            modifier (x/y/text/key/artifact/method/params) + the #VncMethod enum on charly's
            core #Op, and dispatches through the provider registry exactly like a built-in
            (ResolveVerb → grpcProvider → invokeVerbProvider hands it the full #Op). The host
            owns the podman / venue / libvirt / port-mapping resolution (preresolveVncEndpoint),
            pre-resolving the deployment's VNC endpoint — a container's published port 5900, or
            a VM's libvirt-discovered <graphics type='vnc'> listener bridged/tunneled to a
            host-reachable TCP address — plus the resolved password into the check env, so this
            plugin needs no container inspection at all. Provides status/screenshot/click/mouse/
            type/key/rfb. The R10 consumer is a wayvnc-bearing pod bed whose check composes this
            plugin (e.g. sway-browser-vnc via sway-desktop-vnc).
    plugin-vnc-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-vnc
            providers:
                - verb:vnc
    vnc-verb-dispatches:
        check: the vnc verb dispatches through the provider registry and reports the VNC server status on a live desktop deployment with a wayvnc endpoint (the out-of-process plugin verb dials the host-resolved RFB address)
        id: vnc-verb-dispatches
        vnc: status
        stdout:
            - contains: ok
        eventually: 60s
        retry_interval: 5s
        context:
            - runtime
