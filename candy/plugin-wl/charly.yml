plugin-wl:
    candy:
        version: 2026.178.0600
        description: |-
            OUT-OF-TREE charly plugin serving the `wl` live-container check verb — a standalone
            Go module (go.mod + main.go) that drives Wayland/sway desktop automation inside a
            running deployment (input, windows, screenshots, sway IPC, overlay, atspi,
            clipboard — ~40 methods) over go-plugin gRPC via the charly plugin SDK
            (charly/plugin/sdk). charly's loader fetches this candy's repo, go-builds the
            provider binary on the HOST, and serves it OUT-OF-PROCESS via LocalTransport — so
            the Wayland/sway driver lives HERE, out of charly's core check surface. wl is the
            LAST live-container verb to leave the core: after it, ZERO check verbs are
            compiled-in. `wl:` authoring stays unchanged: the verb keeps its `wl:`
            discriminator + every modifier
            (x/y/x2/y2/direction/amount/target/text/key/combo/command/action/query/artifact) +
            the #WlMethod enum on charly's core #Op, and dispatches through the provider
            registry exactly like a built-in (ResolveVerb → grpcProvider → invokeVerbProvider
            hands it the full #Op). EXEC-based (the third, after record + dbus): the host
            attaches its live DeployExecutor over the E3b reverse channel and this plugin dials
            back through the SDK (sdk.ExecutorFromInvoke) to RunCapture the venue's compositor
            tools (screenshot pulls the PNG via GetFile) — it owns no podman / SSH machinery
            and no CDP client (the CLI-only --from-cdp/--from-sway/--from-x11 coordinate
            translation was dropped; the declarative `wl: click` uses X/Y directly). The R10
            consumer is a desktop pod bed whose check composes this plugin (the sway-browser-vnc
            bed's `wl: sway-tree` + `wl: screenshot`).
    plugin-wl-decl:
        plugin:
            source: github.com/overthinkos/overthink/candy/plugin-wl
            providers:
                - verb:wl
    wl-verb-dispatches:
        check: the wl verb dispatches through the provider registry and reports the Wayland/sway compositor status on a live desktop deployment (the out-of-process plugin verb drives the venue's compositor over the executor reverse channel)
        id: wl-verb-dispatches
        wl: status
        context:
            - runtime
