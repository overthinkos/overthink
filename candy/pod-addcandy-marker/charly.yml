pod-addcandy-marker:
    candy:
        version: 2026.181.1200
        description: |
            Drop /etc/pod-addcandy-marker — the add_candy-on-pod overlay witness
            Single-file marker layer authored solely to be add_candy'd onto a pod
            deploy whose deploy-key differs from its image-name (the
            check-addcandy-pod bed). It writes /etc/pod-addcandy-marker carrying the
            distinctive token POD-ADDCANDY-MARKER-OK; the bed asserts that token is
            present INSIDE the running container, so the bed passes iff the
            `<deploy-key>-overlay` image (which carries this layer) is the one
            actually deployed — and fails if `charly config` resolved the BASE
            image instead (the add_candy-on-pod quirk). Pure file-write layer: no
            packages, no host-format dependence, so it overlays cleanly on any base.
    pod-addcandy-marker-step-0:
        run: write=/etc/pod-addcandy-marker
        write: /etc/pod-addcandy-marker
        run_as: root
        mode: "0644"
        content: |
            POD-ADDCANDY-MARKER-OK v1
    pod-addcandy-marker-step-1:
        check: the pod-addcandy marker file is present at /etc/pod-addcandy-marker
        plugin: file
        plugin_input:
            file: /etc/pod-addcandy-marker
            exists: true
    pod-addcandy-marker-step-2:
        check: the marker records the distinctive token "POD-ADDCANDY-MARKER-OK"
        plugin: file
        plugin_input:
            file: /etc/pod-addcandy-marker
            contains:
                - contains: "POD-ADDCANDY-MARKER-OK"
