candy:
    version: 2026.166.1751
    name: pre-commit
    description: |
        A pre-commit git-hooks toolchain — the pre-commit orchestrator plus the taplo TOML and markdownlint Markdown linters its hooks invoke.
        Installs the pre-commit framework via pixi (conda-forge), the taplo TOML
        linter/formatter via cargo, and the markdownlint-cli Markdown linter via npm.
        Each tool lands as a real executable at a known path with a working --version,
        so the hook toolchain is directly verifiable.
    require:
        - nodejs
        - rust # cargo install taplo-cli below requires cargo on PATH.
        # (nodejs is retained for completeness; pre-commit itself needs node for some hooks.)
    package:
        - pre-commit
    plan:
        - run: command=cargo install taplo-cli --locked
          command: cargo install taplo-cli --locked
          run_as: "${USER}"
        - check: the pre-commit orchestrator is installed in the pixi environment
          file: ${HOME}/.pixi/envs/default/bin/pre-commit
          exists: true
        - check: pre-commit reports its version and exits cleanly
          command: ${HOME}/.pixi/envs/default/bin/pre-commit --version
          exit_status: 0
        - check: the taplo TOML linter/formatter binary is installed from cargo
          file: ${HOME}/.cargo/bin/taplo
          exists: true
        - check: taplo reports its version and exits cleanly
          command: ${HOME}/.cargo/bin/taplo --version
          exit_status: 0
        - check: the markdownlint Markdown linter lands on the npm-global PATH
          file: ${HOME}/.npm-global/bin/markdownlint
          exists: true
        - check: markdownlint reports its version and exits cleanly
          command: ${HOME}/.npm-global/bin/markdownlint --version
          exit_status: 0
