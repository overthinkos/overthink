candy:
    version: 2026.144.1443
    name: python
    require:
        - pixi
    description:
        feature: A CPython 3.13 interpreter provided as a pixi-managed conda-forge environment.
        narrative: |
            The python candy ships a pixi.toml that pins python >=3.13,<3.14 from
            conda-forge. A pixi builder stage materializes the environment at
            ~/.pixi/envs/default, so the CPython interpreter lands at a fixed,
            PATH-contributed path. It is verifiable by file existence, the version
            it reports, and by running real standard-library code through it.
        tag: [working]
    scenario:
        - name: interpreter-installed-at-default-env
          step:
            - then: the pixi-managed CPython interpreter exists at the default environment bin path
              file: ${HOME}/.pixi/envs/default/bin/python
              exists: true
            - then: the interpreter reports a CPython 3.13 version
              command: ${HOME}/.pixi/envs/default/bin/python --version
              exit_status: 0
              stdout:
                - contains: "3.13"
        - name: runs-standard-library-code
          step:
            - then: the interpreter executes a standard-library snippet (incl. the sqlite3 C extension) and reports major.minor 3 13
              command: ${HOME}/.pixi/envs/default/bin/python -c "import sys, json, sqlite3; print(sys.version_info.major, sys.version_info.minor)"
              exit_status: 0
              stdout:
                - contains: "3 13"
