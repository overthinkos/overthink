python:
    candy:
        version: 2026.144.1443
        description: |
            A CPython 3.13 interpreter provided as a pixi-managed conda-forge environment.
            The python candy ships a pixi.toml that pins python >=3.13,<3.14 from
            conda-forge. A pixi builder stage materializes the environment at
            ~/.pixi/envs/default, so the CPython interpreter lands at a fixed,
            PATH-contributed path. It is verifiable by file existence, the version
            it reports, and by running real standard-library code through it.
    python-require:
        require:
            - pixi
    python-step-0:
        check: the pixi-managed CPython interpreter exists at the default environment bin path
        plugin: file
        plugin_input:
            file: ${HOME}/.pixi/envs/default/bin/python
            exists: true
    python-step-1:
        check: the interpreter reports a CPython 3.13 version
        exit_status: 0
        stdout:
            - contains: "3.13"
        plugin: command
        plugin_input:
            command: ${HOME}/.pixi/envs/default/bin/python --version
    python-step-2:
        check: the interpreter executes a standard-library snippet (incl. the sqlite3 C extension) and reports major.minor 3 13
        exit_status: 0
        stdout:
            - contains: "3 13"
        plugin: command
        plugin_input:
            command: ${HOME}/.pixi/envs/default/bin/python -c "import sys, json, sqlite3; print(sys.version_info.major, sys.version_info.minor)"
