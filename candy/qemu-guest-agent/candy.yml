candy:
    version: 2026.149.1200
    name: qemu-guest-agent
    description: |
        QEMU guest agent — full host↔guest control channel. Installs the agent
        package, contributes the virtio-serial channel libvirt device, enables
        the system service, and wires the fsfreeze hook so the host can take
        application-consistent snapshots (guest-fsfreeze-freeze/thaw).

        All guest-agent RPCs (guest-exec, guest-file-*, guest-fsfreeze-*,
        guest-set-*) are exposed — the package's default config blocks none,
        and the qemu-ga.conf written here documents and pins that intent. The
        fsfreeze hook is the one capability not active by default: it lets the
        host quiesce filesystems and run per-app pre/post-freeze scripts dropped
        into /etc/qemu/fsfreeze-hook.d/.

        Cross-distro: the package name is identical on Arch/CachyOS and Fedora;
        the service + channel + config apply unchanged.
    package:
        - qemu-guest-agent
    libvirt:
        - <channel type='unix'><target type='virtio' name='org.qemu.guest_agent.0'/></channel>
    task:
        # Hook dispatcher dir for per-application freeze/thaw scripts.
        - mkdir: /etc/qemu/fsfreeze-hook.d
          user: root
        # The standard qemu fsfreeze dispatcher: runs every executable in
        # fsfreeze-hook.d with the freeze|thaw argument. Exits 0 when there are
        # no hooks, so a bare freeze of mounted filesystems always succeeds.
        - write: /etc/qemu/fsfreeze-hook
          user: root
          mode: "0755"
          content: |
            #!/bin/sh
            # Overthink-managed qemu-ga fsfreeze hook dispatcher.
            set -e
            command="$1"
            case "$command" in
                freeze|thaw) ;;
                *) echo "usage: $0 freeze|thaw" >&2; exit 1 ;;
            esac
            FSFREEZE_D=/etc/qemu/fsfreeze-hook.d
            [ -d "$FSFREEZE_D" ] || exit 0
            for hook in "$FSFREEZE_D"/*; do
                [ -f "$hook" ] && [ -x "$hook" ] && "$hook" "$command"
            done
            exit 0
        # Expose the full RPC surface and enable the fsfreeze hook. The package
        # default already blocks no RPCs; this makes the intent explicit and
        # turns on application-consistent freezing.
        - write: /etc/qemu/qemu-ga.conf
          user: root
          mode: "0644"
          content: |
            # Overthink: full guest-agent functionality. No RPCs are blocked
            # (guest-exec, guest-file-*, guest-fsfreeze-*, guest-set-* all work).
            [general]
            fsfreeze-hook=/etc/qemu/fsfreeze-hook
    service:
        - name: qemu-guest-agent
          use_packaged: qemu-guest-agent.service
          enable: true
          scope: system
    eval:
        - id: qemu-ga-config
          file: /etc/qemu/qemu-ga.conf
          contains: "fsfreeze-hook"
        - id: qemu-ga-fsfreeze-hook
          file: /etc/qemu/fsfreeze-hook
          contains: "fsfreeze-hook.d"
