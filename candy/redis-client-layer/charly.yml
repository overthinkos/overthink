candy:
    version: 2026.144.1443
    name: redis-client-layer
    description:
        feature: harness-redis-client — installs redis-cli for cross-pod redis access
        narrative: |
            Provides /usr/bin/redis-cli so the harness can run
            `redis-cli -h charly-redis SET ...` and verify cross-pod connectivity.
            No redis service is started in this image — it acts purely as a client.
        tag: [working]
    distro:
        fedora:
            package:
                - redis
                - iproute
                - procps-ng
    service:
        - name: keep-alive
          exec: "/usr/bin/sleep infinity"
          restart: always
          priority: 10
          enable: true
          scope: system
    scenario:
        # DETERMINISTIC build-scope steps — embedded check verbs run inside the
        # built image (`podman run --rm`); each fails if the candy installed nothing.
        - name: redis-cli-and-connectivity-tools-installed
          step:
            - then: the redis-cli client binary is installed at /usr/bin/redis-cli
              file: /usr/bin/redis-cli
              exists: true
            - and: the redis package that provides redis-cli is installed (valkey-compat-redis on Fedora 43)
              package: valkey-compat-redis
              installed: true
            - and: redis-cli actually runs and reports a version
              command: redis-cli --version
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+"
            - and: the ss socket-inspection tool from iproute is installed at /usr/sbin/ss
              file: /usr/sbin/ss
              exists: true
            - and: the pgrep process tool from procps-ng is installed at /usr/bin/pgrep
              file: /usr/bin/pgrep
              exists: true
        # DEPLOY-scope deterministic step (needs the running pod) + a prose-only
        # resilience step graded by the agent against the live deployment.
        - name: keep-alive-keeps-the-client-pod-running
          step:
            - then: the keep-alive supervised service is running in the deployed pod
              service: keep-alive
              running: true
              context:
                - runtime
            - and: the keep-alive service keeps the client pod alive, auto-restarting (restart=always) if it exits, so the harness can keep issuing cross-pod redis-cli probes against a separate redis pod
        - name: harness-redis-client-cli
          step:
            - id: harness-redis-client-cli
              file: /usr/bin/redis-cli
              exists: true
        - name: harness-redis-client-package
          step:
            - id: harness-redis-client-package
              package: valkey-compat-redis
              installed: true
        - name: harness-redis-client-version
          step:
            - id: harness-redis-client-version
              command: redis-cli --version
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+"
        - name: harness-redis-client-iproute-ss
          step:
            - id: harness-redis-client-iproute-ss
              file: /usr/sbin/ss
              exists: true
        - name: harness-redis-client-procps-pgrep
          step:
            - id: harness-redis-client-procps-pgrep
              file: /usr/bin/pgrep
              exists: true
        - name: harness-redis-client-keepalive
          step:
            - id: harness-redis-client-keepalive
              service: keep-alive
              running: true
              context:
                - runtime
