candy:
    version: 2026.144.1443
    name: redis-client-layer
    description: |
        harness-redis-client — installs redis-cli for cross-pod redis access
        Provides /usr/bin/redis-cli so the harness can run
        `redis-cli -h charly-redis SET ...` and verify cross-pod connectivity.
        No redis service is started in this image — it acts purely as a client.
    distro:
        fedora:
            package:
                - redis
                - iproute
                - procps-ng
    service:
        - name: keep-alive
          exec: "/usr/bin/sleep infinity"
          restart: always
          priority: 10
          enable: true
          scope: system
    plan:
        - check: the redis-cli client binary is installed at /usr/bin/redis-cli
          file: /usr/bin/redis-cli
          exists: true
        - check: the redis package that provides redis-cli is installed (valkey-compat-redis on Fedora 43)
          package: valkey-compat-redis
          installed: true
        - check: redis-cli actually runs and reports a version
          command: redis-cli --version
          exit_status: 0
          stdout:
            - matches: "[0-9]+\\.[0-9]+"
        - check: the ss socket-inspection tool from iproute is installed at /usr/sbin/ss
          file: /usr/sbin/ss
          exists: true
        - check: the pgrep process tool from procps-ng is installed at /usr/bin/pgrep
          file: /usr/bin/pgrep
          exists: true
        - check: the keep-alive supervised service is running in the deployed pod
          service: keep-alive
          running: true
          context:
            - runtime
        - agent-check: the keep-alive service keeps the client pod alive, auto-restarting (restart=always) if it exits, so the harness can keep issuing cross-pod redis-cli probes against a separate redis pod
