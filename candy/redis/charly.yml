redis:
    candy:
        version: 2026.144.1531
        description: |
            A Redis-compatible key-value server (redis-server + redis-cli) supervised on 127.0.0.1:6379
            Installs the Redis server and CLI — the `redis` package on Fedora,
            and `valkey` (which provides /usr/bin/redis-server and
            /usr/bin/redis-cli) on Arch/CachyOS. A supervised redis-server binds
            127.0.0.1:6379 with a ${HOME}/.redis data dir and a 60s/1-key RDB
            snapshot policy, so the running service answers `redis-cli ping` with
            PONG and accepts TCP on its published host port. Every claim below is
            verifiable: binaries on disk, the providing package installed, and a
            live PING/PONG + reachable-port probe against the running deployment.
    redis-require:
        require: []
    redis-distro:
        distro:
            arch:
                # No `redis` package on Arch/CachyOS — valkey provides /usr/bin/redis-server
                # and /usr/bin/redis-cli (the paths the service exec + checks below use).
                package:
                    - valkey
            fedora:
                package:
                    - redis
    redis-env:
        env:
            REDIS_URL: "redis://127.0.0.1:6379"
    redis-port:
        port:
            - 6379
    redis-service:
        service:
            - name: redis
              exec: "/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --dir %(ENV_HOME)s/.redis --save 60 1"
              restart: always
              priority: 20
              enable: true
              scope: system
    redis-step-0:
        run: mkdir=${HOME}/.redis
        mkdir: "${HOME}/.redis"
        run_as: "${USER}"
    redis-step-1:
        check: the redis-server daemon binary is installed at /usr/bin/redis-server
        plugin: file
        plugin_input:
            file: /usr/bin/redis-server
            exists: true
    redis-step-2:
        check: the redis-cli client binary is installed at /usr/bin/redis-cli
        plugin: file
        plugin_input:
            file: /usr/bin/redis-cli
            exists: true
    redis-step-3:
        check: the providing package is installed (redis on Fedora, valkey on Arch/CachyOS)
        plugin: package
        plugin_input:
            package: valkey-compat-redis
            package_map:
                arch: valkey
            installed: true
    redis-step-4:
        check: redis-cli ping returns PONG against the supervised redis-server
        stdout: PONG
        context:
            - runtime
        plugin: command
        plugin_input:
            command: redis-cli -h 127.0.0.1 -p 6379 ping
    redis-step-5:
        check: the redis port accepts a TCP connection from the host
        context:
            - runtime
        plugin: addr
        plugin_input:
            addr: 127.0.0.1:${HOST_PORT:6379}
            reachable: true
    redis-step-6:
        agent-check: the supervised redis service is running and keeps answering clients, restarting automatically (restart=always) if the redis-server process exits
    redis-responds:
        check: redis answers PONG to redis-cli inside the container (host-independent probe)
        id: redis-responds
        stdout: PONG
        context:
            - runtime
        plugin: command
        plugin_input:
            command: redis-cli -h 127.0.0.1 -p 6379 ping
            in_container: true
    redis-port-open:
        check: addr=127.0.0.1:${HOST_PORT:6379}
        id: redis-port-open
        context:
            - runtime
        plugin: addr
        plugin_input:
            addr: 127.0.0.1:${HOST_PORT:6379}
