candy:
    version: 2026.144.1443
    name: ripgrep
    description:
        feature: Fast recursive text search (rg)
        narrative: |
            Installs the ripgrep package, which provides the `rg` binary at
            /usr/bin/rg — a fast recursive grep that honours .gitignore by
            default. Verifiable end to end: the binary lands at a fixed path,
            `rg --version` reports a parseable version on stdout, and `rg`
            returns the matching line (exit 0) for a present pattern and
            exit 1 for an absent one.
        tag: [working]
    package:
        - ripgrep
    scenario:
        - name: ripgrep-binary-installed
          step:
            - then: the rg binary is installed at /usr/bin/rg
              file: /usr/bin/rg
              exists: true
            - then: rg reports a parseable ripgrep version on stdout
              command: rg --version
              exit_status: 0
              stdout:
                - matches: "ripgrep [0-9]"
        - name: ripgrep-matches-pattern
          step:
            - then: rg prints the matching line for a pattern present in piped input
              command: printf 'alpha\nbeta\ngamma\n' | rg beta
              exit_status: 0
              stdout:
                - contains: beta
            - then: rg exits 1 (no match) when the pattern is absent, never matching spuriously
              command: printf 'alpha\nbeta\n' | rg ZZZ-no-such-pattern; test $? -eq 1
              exit_status: 0
        - name: ripgrep-binary
          step:
            - id: ripgrep-binary
              file: /usr/bin/rg
              exists: true
        - name: ripgrep-package
          step:
            - id: ripgrep-package
              package: ripgrep
              installed: true
        - name: ripgrep-version
          step:
            - id: ripgrep-version
              command: rg --version
              exit_status: 0
              stdout:
                - matches: "ripgrep [0-9]"
        - name: ripgrep-search-matches
          step:
            - id: ripgrep-search-matches
              command: printf 'needle-in-haystack\nother-line\n' | rg needle
              exit_status: 0
              stdout:
                - contains: needle-in-haystack
