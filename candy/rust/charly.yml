candy:
    version: 2026.144.1443
    name: rust
    description:
        feature: Rust toolchain (rustc compiler + cargo package manager) installed from distro repositories
        narrative: |
            Installs the Rust compiler (rustc) and the Cargo package manager from
            the distro repositories: the rust + cargo packages on Arch and Fedora,
            rustc + cargo on Debian and Ubuntu, with ~/.cargo/bin appended to PATH.
            Both binaries land at /usr/bin and report a version string, so a
            developer can compile and build Rust crates inside the image.
        tag: [working]
        scenario:
            - name: rustc-compiler-present
              step:
                - then: the rustc compiler binary is installed at /usr/bin/rustc
                  file: /usr/bin/rustc
                  exists: true
                - then: rustc reports a version string and exits cleanly
                  command: /usr/bin/rustc --version
                  exit_status: 0
                  stdout:
                    - matches: "rustc [0-9]"
            - name: cargo-builder-present
              step:
                - then: the cargo package manager binary is installed at /usr/bin/cargo
                  file: /usr/bin/cargo
                  exists: true
                - then: cargo reports a version string and exits cleanly
                  command: /usr/bin/cargo --version
                  exit_status: 0
                  stdout:
                    - matches: "cargo [0-9]"
    path_append:
        - "~/.cargo/bin"
    distro:
        arch:
            package:
                - rust
        debian:
            package:
                - rustc
                - cargo
        fedora:
            package:
                - rust
                - cargo
        ubuntu:
            package:
                - rustc
                - cargo
    eval:
        - id: rustc-binary
          file: /usr/bin/rustc
          exists: true
        - id: rustc-version
          command: /usr/bin/rustc --version
          exit_status: 0
        - id: cargo-binary
          file: /usr/bin/cargo
          exists: true
        - id: cargo-version
          command: /usr/bin/cargo --version
          exit_status: 0
        - id: rust-compiler-package
          package: rust
          package_map:
            arch: rust
            fedora: rust
            debian: rustc
            ubuntu: rustc
          installed: true
