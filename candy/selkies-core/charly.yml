candy:
    version: 2026.155.2227
    name: selkies-core
    description: |
        Compositor-agnostic core of the selkies streaming desktop: the pixelflux
        WebRTC transport (selkies) plus the shared desktop fixings every flavor
        (labwc, KDE Plasma) needs — Chrome + CDP, fonts, the wl-* pixelflux
        screenshot/record/overlay tooling, accessibility introspection, an X
        terminal, the terminal-recording stack, and sshd. There is NO compositor
        here and NO compositor-specific panel/notifier — those live in the
        per-flavor metalayer (selkies-desktop for labwc; selkies-kde-desktop for
        KDE Plasma). This is the single shared spine consumed by BOTH flavors
        across ALL GPU configs, so the streaming transport + fixings are defined
        exactly once (R3 — no duplication, no -host/-pod siblings).
    candy:
        - selkies
        - pipewire
        - chrome
        - chrome-cdp
        - desktop-fonts
        - wl-tools
        - wl-screenshot-pixelflux
        - wl-overlay
        - wl-record-pixelflux
        - a11y-tools
        - xterm
        - tmux
        - asciinema
        - fastfetch
        - sshd
    service:
        # Chrome is launched + SUPERVISED here for BOTH selkies flavors (labwc +
        # KDE), instead of the former fire-once launch from each per-flavor
        # compositor autostart. Root cause it fixes: the selkies flavors nest the
        # compositor inside pixelflux's wayland-1, and a Chrome started during the
        # nested compositor's startup-race self-exits (~39s, clean exit 0 — the
        # window-less browser's sole window goes away on the early color-manager
        # re-init) with nothing to relaunch it; the bed only ever passed by racing
        # that ~39s alive window. supervisord relaunches Chrome post-settle, where
        # it stays up indefinitely. chrome-wrapper itself polls for wayland-0 (the
        # nested compositor's client socket, created by labwc / startplasma-wayland),
        # so autostart=true is self-synchronizing — no per-flavor handoff needed.
        # restart: always relaunches on the clean exit (autorestart=true); start_secs
        # makes the >5s run reset the retry budget so the one startup-race exit
        # never trips FATAL. SELKIES-ONLY: sway-browser-vnc launches Chrome via
        # chrome-sway (not selkies-core) and is unaffected — it is not
        # pixelflux-nested and does not hit the race.
        - name: chrome
          exec: "%(ENV_HOME)s/.local/bin/chrome-wrapper --force-renderer-accessibility --no-first-run --start-maximized"
          env:
            WAYLAND_DISPLAY: wayland-0
          restart: always
          start_sec: 5
          start_retry: 3
          priority: 30
          stdout: file:/tmp/chrome.log
          enable: true
          scope: system
    eval:
        # Regression guard for the fire-once-Chrome class (the bed used to pass
        # only by racing Chrome's brief alive window): assert Chrome is alive AND
        # CDP responds AFTER the startup-race settles + any supervised relaunch.
        - id: selkies-chrome-supervised-alive
          scope: deploy
          command: |
            sleep 25
            pgrep -f "/opt/google/chrome/chrome" >/dev/null 2>&1 || { echo "FAIL: chrome not running 25s after deploy"; exit 1; }
            curl -sf --max-time 5 http://127.0.0.1:9223/json/version >/dev/null 2>&1 || { echo "FAIL: chrome CDP not responding"; exit 1; }
            echo "ok: chrome supervised + alive + CDP responsive"
          exit_status: 0
          in_container: true
          stdout:
            - contains: "ok: chrome supervised"
