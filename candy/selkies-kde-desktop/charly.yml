candy:
    version: 2026.152.2006
    name: selkies-kde-desktop
    description: |
        The KDE Plasma flavor of the selkies streaming desktop — composes selkies-core with the kde-selkies nested-compositor primitive into a headless, WebRTC-streamed Plasma pod.
        Full KDE Plasma edition of the selkies streaming desktop, ALWAYS run as a
        headless pod (directly on a host, or nested inside a VM with GPU
        passthrough). Composes the shared selkies-core (pixelflux WebRTC transport
        + Chrome/CDP + wl-* tooling + fonts + a11y + terminal-recording + sshd)
        with the kde-selkies flavor primitive (startplasma-wayland nested in
        pixelflux's wayland-1, de-SDDM, started by a supervisord poll-for-wayland-1
        service). The SDDM-free Plasma session packages (kde-shell) are pulled
        transitively via kde-selkies's require. KDE Plasma ships its own audio
        applet (plasma-pa), panel, and notifier, so there is NO waybar / swaync /
        pavucontrol here — that UI belongs to the labwc flavor (selkies-desktop).
        This is the KDE sibling of selkies-desktop; the two flavors differ ONLY in
        the nested compositor, sharing selkies-core unchanged (R3).

        This metalayer installs nothing of its own — its observable behaviour IS
        the union of the two children it composes, so the scenarios below assert
        the KEY ARTIFACTS each child contributes: the kde-selkies launcher + the
        kde-shell Plasma session binaries (the KDE seam) AND the selkies-core
        streaming spine (Chrome + pipewire), proven live by the streamed Plasma
        desktop answering on the selkies HTTPS port.
    candy:
        - selkies-core
        - kde-selkies
    plan:
        - check: the kde-selkies flavor primitive's nested-session launcher is installed and executable in the deploy user's PATH
          file: ${HOME}/.local/bin/kde-selkies-session
          exists: true
          mode: "0755"
        - check: the launcher execs startplasma-wayland — the KDE Plasma session entrypoint that distinguishes this flavor from labwc
          file: ${HOME}/.local/bin/kde-selkies-session
          contains:
            - contains: "startplasma-wayland"
        - check: the KWin Wayland compositor (pulled transitively via kde-shell) that renders the nested Plasma session into pixelflux is present
          file: /usr/bin/kwin_wayland
          exists: true
        - check: the Plasma shell composed from kde-shell is present
          file: /usr/bin/plasmashell
          exists: true
        - check: Google Chrome — the supervised browser the shared selkies-core spine streams — is present
          file: /usr/bin/google-chrome-stable
          exists: true
        - check: the pipewire audio daemon shared by the streamed session is present
          file: /usr/bin/pipewire
          exists: true
        - check: the composed nested KDE Plasma session reaches RUNNING under supervisord without crash-looping
          command: |
            sleep 20
            supervisorctl status kde-selkies-session
          stdout:
            - matches: "RUNNING"
          in_container: true
        - check: the selkies web UI streams the live KDE Plasma desktop over HTTPS on port 3000
          http: https://127.0.0.1:${HOST_PORT:3000}/
          status: 200
          allow_insecure: true
          timeout: 10s
        - agent-check: the streamed frames show a real KWin-composited KDE Plasma desktop (panel + wallpaper), not a black frame and not the labwc flavor's waybar UI
        - check: file=/usr/bin/startplasma-wayland
          id: selkies-kde-desktop-plasma-session
          file: /usr/bin/startplasma-wayland
          exists: true
        - check: package=plasma-desktop
          id: selkies-kde-desktop-plasma-package
          package: plasma-desktop
          installed: true
        - check: http=https://127.0.0.1:${HOST_PORT:3000}/
          id: selkies-kde-desktop-stream-https
          http: https://127.0.0.1:${HOST_PORT:3000}/
          status: 200
          allow_insecure: true
          timeout: 10s
          context:
            - runtime
