candy:
    version: 2026.144.1443
    name: shortbread
    description:
        feature: Generate Shortbread-schema OSM vector tiles with a source-built Tilemaker plus the official shortbread config bundle.
        narrative: |
            Builds systemed/tilemaker (C++/Lua) from source — there is no Arch/Fedora
            package and no release binary — and installs it at /usr/local/bin/tilemaker.
            Clones the official shortbread-tiles/shortbread-tilemaker bundle (the
            process.lua per-feature classifier + the config.json layer/zoom schema)
            to /opt/shortbread-tilemaker with its .git history stripped. With both in
            place the notebook DAG can convert an OSM PBF into monaco-shortbread.pmtiles
            under the versatiles-watched /workspace/tiles/shortbread directory. The
            Shortbread schema is the de-facto general-purpose OSM vector-tile schema
            documented at https://shortbread-tiles.org.
        tag: [working]
    require:
        - supervisord
    distro:
        arch:
            package:
                # Tilemaker's build deps. On Arch the gcc package supplies the
                # C++ frontend (no -devel split). lua is the embedding runtime
                # the shortbread process.lua hooks into. boost-libs / protobuf
                # / shapelib / sqlite / zlib are the linkage-level deps the
                # tilemaker Makefile expects.
                - git
                - make
                - gcc
                - lua
                - sqlite
                - boost-libs
                - boost # headers — tilemaker's Makefile includes <boost/...>
                - protobuf
                - shapelib
                - rapidjson # tilemaker's include/shared_data.h: #include "rapidjson/document.h"
                # NOTE: no explicit zlib (CachyOS ships zlib-ng-compat which
                # provides the same ABI; tippecanoe in osm-tools-layer follows
                # the same pattern).
        fedora:
            package:
                - git
                - make
                - gcc-c++
                - lua-devel
                - sqlite-devel
                - zlib-devel
                - boost-devel
                - protobuf-devel
                - shapelib-devel
                - rapidjson-devel
    task:
        # ---- tilemaker (C++ + Lua OSM → vector-tile generator) ----
        # systemed/tilemaker has no Arch package and no GitHub release
        # binaries — build from source. The C++ + Lua build is ~2-3 min
        # on a warm package cache. Pattern mirrors the existing tippecanoe
        # build in /charly-versa:osm-tools-layer: shallow clone → make -j →
        # `make install PREFIX=/usr/local` → cleanup.
        - command: |
            set -euo pipefail
            git clone --depth 1 https://github.com/systemed/tilemaker /tmp/tilemaker
            cd /tmp/tilemaker
            # Boost 1.91+ (CachyOS / Arch as of 2026-Q1) made
            # boost::system a HEADER-ONLY library: `libboost_system.so`
            # no longer exists. tilemaker's Makefile still ships
            # `-lboost_system` in its link line, which fails with
            # `cannot find -lboost_system`. Strip the flag — the
            # boost::system functionality lives in headers, no link
            # step needed. boost_filesystem + boost_program_options
            # still ship as .so libraries, so we keep those.
            sed -i 's/-lboost_system//g' Makefile
            make -j"$(nproc)"
            make install PREFIX=/usr/local
            cd /
            rm -rf /tmp/tilemaker
          run_as: root
        # ---- shortbread-tilemaker config bundle ----
        # The official shortbread-tiles/shortbread-tilemaker repo ships
        # process.lua (the per-feature classifier) + config.json (the
        # layer/zoom schema definition). Drop the entire repo at
        # /opt/shortbread-tilemaker/ minus the .git/ directory so the
        # notebook's DAG can invoke tilemaker with --process + --config
        # pointing at those files.
        - command: |
            set -euo pipefail
            git clone --depth 1 https://github.com/shortbread-tiles/shortbread-tilemaker /opt/shortbread-tilemaker
            rm -rf /opt/shortbread-tilemaker/.git
          run_as: root
        # ---- output directory (versatiles serve watches it) ----
        # versatiles serve (in /charly-versa:versatiles) is configured to
        # watch /workspace/tiles/shortbread/. Pre-creating the directory
        # at build time means versatiles starts cleanly on a fresh deploy
        # even before any DAG runs (otherwise versatiles errors on the
        # missing directory).
        - mkdir: /workspace/tiles/shortbread
          run_as: root
          mode: "0755"
    scenario:
        - name: tilemaker-built-from-source
          step:
            - then: the tilemaker binary built from systemed/tilemaker source is installed under /usr/local/bin
              file: /usr/local/bin/tilemaker
              exists: true
            - then: tilemaker resolves on PATH so the notebook DAG can invoke it (tilemaker ships no --version flag, so resolve by name)
              command: command -v tilemaker
              exit_status: 0
        - name: shortbread-config-bundle-dropped
          step:
            - then: the shortbread per-feature Lua classifier is bundled for tilemaker --process
              file: /opt/shortbread-tilemaker/process.lua
              exists: true
            - then: the shortbread layer and zoom schema definition is bundled for tilemaker --config
              file: /opt/shortbread-tilemaker/config.json
              exists: true
            - then: the cloned bundle has its .git history stripped to keep the image small
              file: /opt/shortbread-tilemaker/.git
              exists: false
        - name: shortbread-output-directory-precreated
          step:
            - then: the versatiles-watched output directory is pre-created at build time so versatiles serve starts cleanly on a fresh deploy
              file: /workspace/tiles/shortbread
              exists: true
            - then: a tilemaker run converts an OSM PBF into a monaco-shortbread.pmtiles archive in that directory using the bundled config.json and process.lua
        - name: shortbread-lua-runtime
          step:
            # Build-scope: the Lua embedding runtime tilemaker's process.lua hooks
            # into is installed. Cross-distro: Arch ships `lua`, Fedora `lua-devel`.
            - id: shortbread-lua-runtime
              package: lua
              package_map:
                fedora: lua-devel
              installed: true
        - name: shortbread-tiles-dir-runtime
          step:
            # Deploy-scope: the versatiles-watched directory is present on a
            # fresh deploy (the mkdir above lands at image-build time; the
            # workspace volume seed preserves it).
            - id: shortbread-tiles-dir-runtime
              command: test -d /workspace/tiles/shortbread
              exit_status: 0
              in_container: true
              context:
                - runtime
