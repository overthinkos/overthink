shortbread:
    candy:
        version: 2026.144.1443
        description: |
            Generate Shortbread-schema OSM vector tiles with a source-built Tilemaker plus the official shortbread config bundle.
            Builds systemed/tilemaker (C++/Lua) from source — there is no Arch/Fedora
            package and no release binary — and installs it at /usr/local/bin/tilemaker.
            Clones the official shortbread-tiles/shortbread-tilemaker bundle (the
            process.lua per-feature classifier + the config.json layer/zoom schema)
            to /opt/shortbread-tilemaker with its .git history stripped. With both in
            place the notebook DAG can convert an OSM PBF into monaco-shortbread.pmtiles
            under the versatiles-watched /workspace/tiles/shortbread directory. The
            Shortbread schema is the de-facto general-purpose OSM vector-tile schema
            documented at https://shortbread-tiles.org.
    shortbread-require:
        require:
            - supervisord
    shortbread-distro:
        distro:
            arch:
                package:
                    # Tilemaker's build deps. On Arch the gcc package supplies the
                    # C++ frontend (no -devel split). lua is the embedding runtime
                    # the shortbread process.lua hooks into. boost-libs / protobuf
                    # / shapelib / sqlite / zlib are the linkage-level deps the
                    # tilemaker Makefile expects.
                    - git
                    - make
                    - gcc
                    - lua
                    - sqlite
                    - boost-libs
                    - boost # headers — tilemaker's Makefile includes <boost/...>
                    - protobuf
                    - shapelib
                    - rapidjson # tilemaker's include/shared_data.h: #include "rapidjson/document.h"
                    # NOTE: no explicit zlib (CachyOS ships zlib-ng-compat which
                    # provides the same ABI; tippecanoe in osm-tools-layer follows
                    # the same pattern).
            fedora:
                package:
                    - git
                    - make
                    - gcc-c++
                    - lua-devel
                    - sqlite-devel
                    - zlib-devel
                    - boost-devel
                    - protobuf-devel
                    - shapelib-devel
                    - rapidjson-devel
    shortbread-step-0:
        run: |
            command=set -euo pipefail
            git clone --depth 1 https://github.com/systemed/tilemaker /tmp/tilemaker
            cd /tmp/tilemaker
            # Boost 1.91+ (CachyOS / Arch as of 2026-Q1) made
            # boost::system a HEADER-ONLY library: `libboost_system.so`
            # no longer exists. tilemaker's Makefile still ships
            # `-lboost_system` in its link line, which fails with
            # `cannot find -lboost_system`. Strip the flag — the
            # boost::system functionality lives in headers, no link
            # step needed. boost_filesystem + boost_program_options
            # still ship as .so libraries, so we keep those.
            sed -i 's/-lboost_system//g' Makefile
            make -j"$(nproc)"
            make install PREFIX=/usr/local
            cd /
            rm -rf /tmp/tilemaker
        run_as: root
        plugin: command
        plugin_input:
            command: |
                set -euo pipefail
                git clone --depth 1 https://github.com/systemed/tilemaker /tmp/tilemaker
                cd /tmp/tilemaker
                # Boost 1.91+ (CachyOS / Arch as of 2026-Q1) made
                # boost::system a HEADER-ONLY library: `libboost_system.so`
                # no longer exists. tilemaker's Makefile still ships
                # `-lboost_system` in its link line, which fails with
                # `cannot find -lboost_system`. Strip the flag — the
                # boost::system functionality lives in headers, no link
                # step needed. boost_filesystem + boost_program_options
                # still ship as .so libraries, so we keep those.
                sed -i 's/-lboost_system//g' Makefile
                make -j"$(nproc)"
                make install PREFIX=/usr/local
                cd /
                rm -rf /tmp/tilemaker
    shortbread-step-1:
        run: |
            command=set -euo pipefail
            git clone --depth 1 https://github.com/shortbread-tiles/shortbread-tilemaker /opt/shortbread-tilemaker
            rm -rf /opt/shortbread-tilemaker/.git
        run_as: root
        plugin: command
        plugin_input:
            command: |
                set -euo pipefail
                git clone --depth 1 https://github.com/shortbread-tiles/shortbread-tilemaker /opt/shortbread-tilemaker
                rm -rf /opt/shortbread-tilemaker/.git
    shortbread-step-2:
        run: mkdir=/workspace/tiles/shortbread
        mkdir: /workspace/tiles/shortbread
        run_as: root
        mode: "0755"
    shortbread-step-3:
        check: the tilemaker binary built from systemed/tilemaker source is installed under /usr/local/bin
        plugin: file
        plugin_input:
            file: /usr/local/bin/tilemaker
            exists: true
    shortbread-step-4:
        check: tilemaker resolves on PATH so the notebook DAG can invoke it (tilemaker ships no --version flag, so resolve by name)
        exit_status: 0
        plugin: command
        plugin_input:
            command: command -v tilemaker
    shortbread-step-5:
        check: the shortbread per-feature Lua classifier is bundled for tilemaker --process
        plugin: file
        plugin_input:
            file: /opt/shortbread-tilemaker/process.lua
            exists: true
    shortbread-step-6:
        check: the shortbread layer and zoom schema definition is bundled for tilemaker --config
        plugin: file
        plugin_input:
            file: /opt/shortbread-tilemaker/config.json
            exists: true
    shortbread-step-7:
        check: the cloned bundle has its .git history stripped to keep the image small
        plugin: file
        plugin_input:
            file: /opt/shortbread-tilemaker/.git
            exists: false
    shortbread-step-8:
        check: the versatiles-watched output directory is pre-created at build time so versatiles serve starts cleanly on a fresh deploy
        plugin: file
        plugin_input:
            file: /workspace/tiles/shortbread
            exists: true
    shortbread-step-9:
        agent-check: a tilemaker run converts an OSM PBF into a monaco-shortbread.pmtiles archive in that directory using the bundled config.json and process.lua
    shortbread-lua-runtime:
        check: package=lua
        id: shortbread-lua-runtime
        plugin: package
        plugin_input:
            package: lua
            package_map:
                fedora: lua-devel
            installed: true
    shortbread-tiles-dir-runtime:
        check: command=test -d /workspace/tiles/shortbread
        id: shortbread-tiles-dir-runtime
        exit_status: 0
        context:
            - runtime
        plugin: command
        plugin_input:
            command: test -d /workspace/tiles/shortbread
            in_container: true
