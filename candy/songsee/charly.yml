candy:
    version: 2026.144.1443
    name: songsee
    description:
        feature: Generates spectral visualizations (spectrogram, mel, chroma) from an audio file
        narrative: |
            Installs the songsee CLI via `go install
            github.com/steipete/songsee/cmd/songsee@latest` into ~/go/bin (the
            GOPATH bin dir, appended to PATH). songsee is a kong-based Go binary
            that renders an input audio file into a spectral image. Verifiable
            without an audio fixture: the binary lands at ~/go/bin/songsee, and
            `songsee --version` execs the kong CLI and exits 0.
        tag: [working]
        scenario:
            - name: songsee-binary-installed
              step:
                - then: the songsee binary is installed at ~/go/bin/songsee
                  file: ${HOME}/go/bin/songsee
                  exists: true
            - name: songsee-version-flag-responds
              step:
                - then: running `songsee --version` execs the kong CLI and exits 0
                  command: ${HOME}/go/bin/songsee --version
                  exit_status: 0
    require:
        - golang
    env:
        GOPATH: "~/go"
    path_append:
        - "~/go/bin"
    task:
        - cmd: |
            go install github.com/steipete/songsee/cmd/songsee@latest
            go clean -cache
          user: "${USER}"
    eval:
        - id: songsee-binary
          file: ${HOME}/go/bin/songsee
          exists: true
        - id: songsee-version-runs
          command: ${HOME}/go/bin/songsee --version
          exit_status: 0
