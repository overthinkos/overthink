candy:
    version: 2026.144.1443
    name: sqlite
    description:
        feature: Provides the sqlite3 command-line shell for creating and querying self-contained SQLite databases.
        narrative: |
            The sqlite candy installs the sqlite package, which ships the
            sqlite3 CLI at /usr/bin/sqlite3. The binary runs SQL against an
            in-memory or on-disk SQLite database, so its behaviour is verifiable
            by executing a real query and asserting the returned row.
        tag: [working]
    distro:
        arch:
            package:
                - sqlite
        fedora:
            package:
                - sqlite
    scenario:
        - name: sqlite3-cli-installed
          step:
            - then: the sqlite3 binary is installed at /usr/bin/sqlite3
              file: /usr/bin/sqlite3
              exists: true
            - then: the sqlite package is present in the image
              package: sqlite
              installed: true
        - name: sqlite3-executes-sql
          step:
            - then: sqlite3 reports a 3.x version string
              command: sqlite3 --version
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+\\.[0-9]+"
            - then: sqlite3 runs SQL against an in-memory database and returns the stored row
              command: 'sqlite3 :memory: "CREATE TABLE t(x INTEGER); INSERT INTO t VALUES(42); SELECT x FROM t;"'
              stdout:
                - equals: "42"
