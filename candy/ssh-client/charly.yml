candy:
    version: 2026.144.1443
    name: ssh-client
    description: OpenSSH client tools for SSH agent forwarding
    distro:
        arch:
            package:
                - openssh
        debian:
            package:
                - openssh-client
        fedora:
            package:
                - openssh-clients
        ubuntu:
            package:
                - openssh-client
    eval:
        - id: ssh-binary
          file: /usr/bin/ssh
          exists: true
        - id: ssh-add-binary
          file: /usr/bin/ssh-add
          exists: true
        - id: ssh-version
          command: /usr/bin/ssh -V
          exit_status: 0
          stderr:
            - contains: "OpenSSH"
