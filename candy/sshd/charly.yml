candy:
    version: 2026.144.1443
    name: sshd
    description:
        feature: SSH server with key-based login and passwordless sudo for the uid-1000 account
        narrative: |
            Installs the OpenSSH server (openssh-server / openssh on Arch) plus a
            sshd-wrapper launcher, publishes the SSH port, and drops a NOPASSWD
            sudoers rule for the build's uid-1000 account. Every artifact is
            directly observable in the built image: the daemon binary, the wrapper
            script, the installed package, and the effective sudo grant.
        tag: [working]
    env_accept:
        - name: SSH_AUTHORIZED_KEYS
          description: "SSH public key(s) for authorized access (one per line). Set via: charly config <image> --ssh-key auto"
    package:
        - sudo
    distro:
        arch:
            package:
                - openssh
        debian:
            package:
                - openssh-server
                - openssh-client
        fedora:
            package:
                - openssh-server
                - openssh-clients
        ubuntu:
            package:
                - openssh-server
                - openssh-client
    port:
        - tcp:2222
    # Supervisord service (containers)
    task:
        - copy: sshd-wrapper
          to: /usr/local/bin/sshd-wrapper
          mode: "0755"
          run_as: root
        # Sudoers file targets the ACTUAL uid-1000 account, not a hardcoded
        # literal. System-discovery via `getent passwd 1000` works uniformly
        # across both paths: create mode (Fedora/Arch/plain Debian — the account
        # is named "user") and adopt mode (Ubuntu — the account is named
        # "ubuntu" per the base_user declaration in build.yml). Note: we can't
        # use ${USER} here because the generator doesn't substitute in cmd: body
        # (per layer-authoring docs) and RUN shells don't have $USER set by
        # default. getent is the reliable path.
        - command: |
            account=$(getent passwd 1000 | cut -d: -f1)
            if [ -z "$account" ]; then
              echo "sshd layer: no uid-1000 account found — refusing to write sudoers" >&2
              exit 1
            fi
            printf '%s ALL=(ALL) NOPASSWD: ALL\n' "$account" > /etc/sudoers.d/charly-user
            chmod 0440 /etc/sudoers.d/charly-user
          run_as: root
    service:
        - name: sshd
          use_packaged: sshd.service
          enable: true
          scope: system
        - name: sshd
          exec: /usr/local/bin/sshd-wrapper
          restart: always
          priority: 3
          start_sec: 1
          enable: true
          scope: system
    scenario:
        - name: openssh-server-installed
          step:
            - then: the OpenSSH sshd daemon binary is installed at /usr/sbin/sshd
              file: /usr/sbin/sshd
              exists: true
            - then: the OpenSSH server package is installed (openssh on Arch)
              package: openssh-server
              package_map:
                arch: openssh
                fedora: openssh-server
              installed: true
        - name: supervisord-wrapper-executable
          step:
            - then: the sshd-wrapper launcher is present and world-executable
              file: /usr/local/bin/sshd-wrapper
              exists: true
              mode: "0755"
        - name: uid-1000-has-passwordless-sudo
          step:
            - then: the uid-1000 account can run sudo with no password (NOPASSWD rule in effect)
              command: |
                if [ "$(id -u)" = "0" ]; then runuser -u user -- sudo -n -l; else sudo -n -l; fi
              exit_status: 0
              stdout:
                - contains: "NOPASSWD"
        - name: ssh-key-login-accepted
          step:
            - then: a client presenting a key from SSH_AUTHORIZED_KEYS can open an interactive session on the published SSH port
        - name: sshd-binary
          step:
            - id: sshd-binary
              file: /usr/sbin/sshd
              exists: true
        - name: sshd-wrapper
          step:
            - id: sshd-wrapper
              file: /usr/local/bin/sshd-wrapper
              exists: true
              mode: "0755"
        - name: openssh-server-package
          step:
            - id: openssh-server-package
              package: openssh-server
              package_map:
                arch: openssh
                fedora: openssh-server
                fedora:43: openssh-server
              installed: true
        - name: sudoers-charly-user
          step:
            # /etc/sudoers.d/* is root:root 0750 — unreadable to the non-root user the
            # disposable test runs as. Verify via `sudo -n -l` instead, which exercises
            # the rule's effect without needing to stat the file directly. Bootc images
            # keep USER=root (systemd handles user sessions), so drop to `user` first
            # when running as root so we always probe the uid=1000 sudoers entry.
            - id: sudoers-charly-user
              command: |
                if [ "$(id -u)" = "0" ]; then runuser -u user -- sudo -n -l; else sudo -n -l; fi
              exit_status: 0
              stdout:
                - contains: "NOPASSWD"
        - name: sshd-service-running
          step:
            - id: sshd-service-running
              service: sshd
              running: true
              context:
                - runtime
        - name: sshd-port-reachable
          step:
            - id: sshd-port-reachable
              addr: 127.0.0.1:${HOST_PORT:2222}
              reachable: true
              timeout: 5s
              context:
                - runtime
