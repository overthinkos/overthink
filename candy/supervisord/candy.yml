candy:
    version: 2026.149.1500
    name: supervisord
    # XDG_RUNTIME_DIR for the CONTAINER. A container has no logind /run/user/<uid>,
    # so the per-user runtime dir is /tmp; supervisord (PID 1) + every program it
    # starts inherit this image ENV. It lives HERE — on the container init layer —
    # not hardcoded in each desktop/wayland layer, so that on a systemd target
    # (host/vm) where this supervisord layer is pruned (systemd is the only init),
    # the systemd user manager provides the correct /run/user/<uid> instead. This
    # is what lets pipewire/selkies/the nested compositor reach the user session
    # bus on a VM while keeping the container behavior unchanged.
    env:
        XDG_RUNTIME_DIR: "/tmp"
    package:
        - supervisor
    eval:
        - id: supervisord-binary
          file: /usr/bin/supervisord
          exists: true
        - id: supervisorctl-binary
          file: /usr/bin/supervisorctl
          exists: true
        - id: supervisor-package
          package: supervisor
          installed: true
        # Using supervisorctl rather than `process: supervisord` because pgrep
        # isn't in the minimal image set. `supervisorctl pid` confirms the
        # supervisord socket is reachable without tripping on intentionally-stopped
        # programs (some layers ship autostart=false services like hermes-whatsapp,
        # which make `supervisorctl status` return exit 3).
        - id: supervisorctl-responds
          scope: deploy
          command: supervisorctl pid
          exit_status: 0
          in_container: true
