candy:
    version: 2026.144.1443
    name: sway
    description:
        feature: A headless Sway Wayland compositor, staged with a launcher wrapper and config and run as a supervised service.
        narrative: |
            The sway candy installs the Sway compositor (plus Xwayland, fuzzel, and
            Mesa GL/Vulkan drivers) on Fedora, strips the cap_sys_nice file capability
            so the binary can exec inside a rootless user namespace, and stages a
            sway-wrapper launcher plus a config file under the user's home. A
            supervisord service runs the wrapper headless (WLR_BACKENDS=headless).
            Every claim below is observable: the binary, the package, the staged
            files, and the live service.
        tag: [working]
    require:
        - dbus
    env:
        WLR_BACKENDS: "headless"
        WLR_HEADLESS_OUTPUTS: "1"
        WLR_LIBINPUT_NO_DEVICES: "1"
        XDG_RUNTIME_DIR: "/tmp"
        WAYLAND_DISPLAY: "wayland-0"
        EGL_LOG_LEVEL: "fatal"
        XKB_DEFAULT_LAYOUT: "us"
    env_accept:
        - name: XKB_DEFAULT_LAYOUT
          description: "XKB keyboard layout (e.g., us, de, fr, gb). Default: us"
        - name: XKB_DEFAULT_VARIANT
          description: "XKB keyboard variant (e.g., dvorak, nodeadkeys). Default: none"
    distro:
        fedora:
            package:
                - sway
                - xorg-x11-server-Xwayland
                - fuzzel
                - mesa-dri-drivers
                - mesa-vulkan-drivers
                - libglvnd-egl
                - libglvnd-gles
                - egl-wayland
                - wlr-randr
    task:
        # sway ships with cap_sys_nice file capability which prevents execution
        # in rootless containers (kernel blocks exec of binaries with file caps
        # in user namespaces). Strip it — not needed for headless compositor.
        - setcap: /usr/bin/sway
        - mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - mkdir: "${HOME}/.config/sway"
          run_as: "${USER}"
        - mkdir: "${HOME}/.config/sway/config.d"
          run_as: "${USER}"
        - copy: sway-wrapper
          to: "${HOME}/.local/bin/sway-wrapper"
          mode: "0755"
          run_as: "${USER}"
        - copy: config
          to: "${HOME}/.config/sway/config"
          mode: "0644"
          run_as: "${USER}"
    service:
        - name: sway
          exec: "%(ENV_HOME)s/.local/bin/sway-wrapper"
          env:
            WAYLAND_DISPLAY: wayland-0
            WLR_BACKENDS: headless
            WLR_HEADLESS_OUTPUTS: 1
            WLR_LIBINPUT_NO_DEVICES: 1
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 10
          start_sec: 3
          enable: true
          scope: system
    scenario:
        - name: compositor-binary-installed
          step:
            - then: the Sway compositor binary is installed at /usr/bin/sway
              file: /usr/bin/sway
              exists: true
            - then: the sway package is registered in the package database
              package: sway
              installed: true
        - name: launcher-and-config-staged
          step:
            - then: the sway-wrapper launcher is installed and executable
              file: ${HOME}/.local/bin/sway-wrapper
              exists: true
              mode: "0755"
            - then: the Sway config file is staged in the user's home
              file: ${HOME}/.config/sway/config
              exists: true
        - name: compositor-service-runs
          step:
            - then: the sway compositor service is running under supervisord
              service: sway
              running: true
              context:
                - runtime
        - name: sway-binary
          step:
            - id: sway-binary
              file: /usr/bin/sway
              exists: true
        - name: sway-package
          step:
            - id: sway-package
              package: sway
              installed: true
        - name: sway-wrapper
          step:
            - id: sway-wrapper
              file: ${HOME}/.local/bin/sway-wrapper
              exists: true
              mode: "0755"
        - name: sway-config
          step:
            - id: sway-config
              file: ${HOME}/.config/sway/config
              exists: true
        - name: sway-service-running
          step:
            - id: sway-service-running
              service: sway
              running: true
              context:
                - runtime
