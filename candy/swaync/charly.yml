candy:
    version: 2026.144.1443
    name: swaync
    description:
        feature: Desktop notification center (swaync) for wlroots compositors
        narrative: |
            Installs SwayNotificationCenter, which provides the swaync daemon and
            the swaync-client control CLI. Stages a Catppuccin-themed config.json
            and style.css into the user's ~/.config/swaync and installs a
            wayland-aware wrapper run as a supervisord service. The build also
            removes the D-Bus auto-activation service files so a single
            supervisord-managed instance owns the notification bus name (no
            competing daemon spawned via D-Bus activation).
        tag: [working]
    require:
        - dbus
    distro:
        arch:
            package:
                - swaync
        fedora:
            package:
                - SwayNotificationCenter
    task:
        # Remove D-Bus auto-activation service files to prevent D-Bus from spawning
        # competing swaync instances. In supervisord-managed containers, swaync is
        # started by supervisord — D-Bus activation races with it, causing the
        # supervisord instance to lose its bus name and exit with status 1.
        - command: |
            rm -f /usr/share/dbus-1/services/org.erikreider.swaync.service
            rm -f /usr/share/dbus-1/services/org.erikreider.swaync.cc.service
          run_as: root
        - mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - mkdir: "${HOME}/.config/swaync"
          run_as: "${USER}"
        - copy: swaync-wrapper
          to: "${HOME}/.local/bin/swaync-wrapper"
          mode: "0755"
          run_as: "${USER}"
        - copy: config.json
          to: "${HOME}/.config/swaync/config.json"
          mode: "0644"
          run_as: "${USER}"
        - copy: style.css
          to: "${HOME}/.config/swaync/style.css"
          mode: "0644"
          run_as: "${USER}"
    service:
        - name: swaync
          exec: "%(ENV_HOME)s/.local/bin/swaync-wrapper"
          env:
            WAYLAND_DISPLAY: wayland-0
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 14
          start_sec: 2
          enable: true
          scope: system
    scenario:
        - name: notification-daemon-installed
          step:
            - then: the swaync notification daemon binary is installed
              file: /usr/bin/swaync
              exists: true
            - then: the swaync-client control CLI is installed
              file: /usr/bin/swaync-client
              exists: true
        - name: themed-config-staged
          step:
            - then: the swaync config.json is staged in the user config dir
              file: ${HOME}/.config/swaync/config.json
              exists: true
            - then: the Catppuccin style.css is staged alongside it
              file: ${HOME}/.config/swaync/style.css
              exists: true
            - then: the wayland-aware wrapper script is installed
              file: ${HOME}/.local/bin/swaync-wrapper
              exists: true
        - name: dbus-autoactivation-disabled
          step:
            - then: the daemon D-Bus auto-activation unit is removed so it cannot spawn a competing instance
              file: /usr/share/dbus-1/services/org.erikreider.swaync.service
              exists: false
            - then: the control-center D-Bus auto-activation unit is also removed
              file: /usr/share/dbus-1/services/org.erikreider.swaync.cc.service
              exists: false
        - name: swaync-binary
          step:
            - id: swaync-binary
              file: /usr/bin/swaync
              exists: true
        - name: swaync-config
          step:
            - id: swaync-config
              file: ${HOME}/.config/swaync/config.json
              exists: true
        - name: swaync-style
          step:
            - id: swaync-style
              file: ${HOME}/.config/swaync/style.css
              exists: true
        - name: swaync-client-binary
          step:
            - id: swaync-client-binary
              file: /usr/bin/swaync-client
              exists: true
        - name: swaync-package
          step:
            - id: swaync-package
              package: SwayNotificationCenter
              package_map:
                arch: swaync
                fedora: SwayNotificationCenter
              installed: true
        - name: swaync-dbus-activation-removed
          step:
            - id: swaync-dbus-activation-removed
              file: /usr/share/dbus-1/services/org.erikreider.swaync.service
              exists: false
