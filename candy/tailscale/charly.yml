candy:
    version: 2026.144.1443
    name: tailscale
    description:
        feature: Tailscale mesh VPN daemon baked in as an enabled systemd service.
        narrative: |
            Installs the tailscale package (the `tailscale` CLI plus the
            `tailscaled` daemon) and enables `tailscaled.service` at build
            time, so the image boots as its own tailnet node. Bringing the
            mesh up (`tailscale up --authkey=...`) is a runtime concern, so
            every check here is a build-time fact: the binaries land on PATH,
            the CLI runs offline, and the unit is enabled.
        tag: [working]
    package:
        - tailscale
    distro:
        arch: {}
        debian-13:
            repo:
                - name: tailscale
                  url: "https://pkgs.tailscale.com/stable/debian"
                  key: "https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg"
                  suite: trixie
                  components: main
        fedora:
            repo:
                - name: tailscale-stable
                  url: "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
        ubuntu-24.04:
            repo:
                - name: tailscale
                  url: "https://pkgs.tailscale.com/stable/ubuntu"
                  key: "https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg"
                  suite: noble
                  components: main
    task:
        - command: systemctl enable tailscaled.service 2>/dev/null || true
          run_as: root
    scenario:
        - name: tailscale-cli-on-path
          step:
            - then: the tailscale CLI is installed and executable at /usr/bin/tailscale
              file: /usr/bin/tailscale
              exists: true
            - then: the tailscale CLI reports its version without contacting the daemon
              command: tailscale version
              exit_status: 0
        - name: tailscaled-daemon-installed
          step:
            - then: the tailscaled daemon binary is installed at /usr/sbin/tailscaled
              file: /usr/sbin/tailscaled
              exists: true
        - name: tailscaled-service-enabled
          step:
            - then: the tailscaled systemd unit is enabled so the node joins its tailnet at boot
              command: systemctl is-enabled tailscaled.service
              exit_status: 0
        - name: tailscale-binary
          step:
            - id: tailscale-binary
              command: test -x /usr/bin/tailscale && test -x /usr/sbin/tailscaled
              exit_status: 0
        - name: tailscaled-unit-enabled
          step:
            - id: tailscaled-unit-enabled
              command: systemctl is-enabled tailscaled.service
              exit_status: 0
        - name: tailscale-package
          step:
            - id: tailscale-package
              package: tailscale
              installed: true
        - name: tailscale-cli-runs
          step:
            - id: tailscale-cli-runs
              command: tailscale version
              exit_status: 0
