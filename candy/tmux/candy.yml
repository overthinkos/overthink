candy:
    version: 2026.144.1443
    name: tmux
    description: Terminal multiplexer
    package:
        - tmux
    eval:
        - id: tmux-binary
          file: /usr/bin/tmux
          exists: true
        - id: tmux-package
          package: tmux
          installed: true
        - id: tmux-version
          command: /usr/bin/tmux -V
          exit_status: 0
          stdout:
            - matches: "^tmux"
