candy:
    version: 2026.144.1443
    name: tmux
    description:
        feature: Terminal multiplexer providing persistent, detachable terminal sessions inside containers
        narrative: |
            The tmux candy installs the tmux package (same name on RPM, DEB, and PAC
            distros) so the binary lands at /usr/bin/tmux. tmux is the multiplexer
            behind `charly tmux run/shell`: it starts a detached session server with no
            controlling TTY and lets sessions outlive disconnects. It is verifiable by
            asserting the binary exists, the package is registered, the version banner
            prints, and a real detached session can be created, confirmed live, and killed.
        tag: [working]
    package:
        - tmux
    scenario:
        - name: tmux-binary-installed
          step:
            - then: the tmux multiplexer binary is installed at /usr/bin/tmux
              file: /usr/bin/tmux
              exists: true
            - then: the tmux package is registered with the system package manager
              package: tmux
              installed: true
        - name: tmux-reports-version
          step:
            - then: invoking tmux -V exits cleanly and prints a tmux version banner
              command: /usr/bin/tmux -V
              exit_status: 0
              stdout:
                - matches: "^tmux"
        - name: tmux-multiplexes-detached-sessions
          step:
            - then: tmux starts a detached session with no TTY, confirms it is live, then tears it down
              command: tmux new-session -d -s charly-ade-probe && tmux has-session -t charly-ade-probe && tmux kill-session -t charly-ade-probe
              exit_status: 0
        - name: tmux-binary
          step:
            - id: tmux-binary
              file: /usr/bin/tmux
              exists: true
        - name: tmux-package
          step:
            - id: tmux-package
              package: tmux
              installed: true
        - name: tmux-version
          step:
            - id: tmux-version
              command: /usr/bin/tmux -V
              exit_status: 0
              stdout:
                - matches: "^tmux"
