tmux:
    candy:
        version: 2026.144.1443
        description: |
            Terminal multiplexer providing persistent, detachable terminal sessions inside containers
            The tmux candy installs the tmux package (same name on RPM, DEB, and PAC
            distros) so the binary lands at /usr/bin/tmux. tmux is the multiplexer
            behind `charly tmux run/shell`: it starts a detached session server with no
            controlling TTY and lets sessions outlive disconnects. It is verifiable by
            asserting the binary exists, the package is registered, the version banner
            prints, and a real detached session can be created, confirmed live, and killed.
    tmux-package:
        package:
            - tmux
    tmux-step-0:
        check: the tmux multiplexer binary is installed at /usr/bin/tmux
        plugin: file
        plugin_input:
            file: /usr/bin/tmux
            exists: true
    tmux-step-1:
        check: the tmux package is registered with the system package manager
        plugin: package
        plugin_input:
            package: tmux
            installed: true
    tmux-step-2:
        check: invoking tmux -V exits cleanly and prints a tmux version banner
        exit_status: 0
        stdout:
            - matches: "^tmux"
        plugin: command
        plugin_input:
            command: /usr/bin/tmux -V
    tmux-step-3:
        check: tmux starts a detached session with no TTY, confirms it is live, then tears it down
        exit_status: 0
        plugin: command
        plugin_input:
            command: tmux new-session -d -s charly-ade-probe && tmux has-session -t charly-ade-probe && tmux kill-session -t charly-ade-probe
