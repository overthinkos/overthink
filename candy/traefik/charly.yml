candy:
    version: 2026.144.1443
    name: traefik
    description:
        feature: Reverse proxy with TLS termination, HTTP-to-HTTPS redirect, and dynamic file-provider routing
        narrative: |
            traefik downloads the pinned v3.4.0 release binary to /usr/local/bin/traefik
            and stages a static config at /etc/traefik/traefik.yml: a web entrypoint on
            :8000 that redirects to HTTPS, a websecure entrypoint on :443 backed by the
            letsencrypt ACME resolver, an insecure API/dashboard on :8080, and a watched
            dynamic-provider directory at /etc/traefik/dynamic. It runs as a supervisord
            service, so every install artifact and the live API are independently verifiable.
        tag: [working]
    require:
        - supervisord
    var:
        TRAEFIK_VERSION: v3.4.0
    port:
        - 8000
        - 8080
        - 443
    volume:
        - name: certs
          path: "~/.traefik/acme"
    task:
        # Download the traefik binary for the target platform. ${ARCH} is the
        # BuildKit TARGETARCH value (amd64/arm64) emitted via ENV at the top of
        # this layer's section; Docker substitutes it in the RUN that emitDownload
        # produces at build time.
        - download: "https://github.com/traefik/traefik/releases/download/${TRAEFIK_VERSION}/traefik_${TRAEFIK_VERSION}_linux_${ARCH}.tar.gz"
          extract: tar.gz
          to: /usr/local/bin
          include: [traefik]
          run_as: root
        - mkdir: /etc/traefik/dynamic
          run_as: root
        - copy: traefik.yml
          to: /etc/traefik/traefik.yml
          mode: "0644"
          run_as: root
    service:
        - name: traefik
          exec: "/usr/local/bin/traefik --configFile=/etc/traefik/traefik.yml"
          restart: always
          enable: true
          scope: system
    scenario:
        - name: binary-installed-and-versioned
          step:
            - then: the traefik release binary is installed at /usr/local/bin/traefik
              file: /usr/local/bin/traefik
              exists: true
            - then: running the binary reports the pinned 3.4.0 release
              command: /usr/local/bin/traefik version
              exit_status: 0
              stdout:
                - contains: "3.4.0"
        - name: static-config-staged
          step:
            - then: the static configuration is staged at /etc/traefik/traefik.yml with mode 0644 and the letsencrypt resolver
              file: /etc/traefik/traefik.yml
              mode: "0644"
              contains:
                - contains: "certResolver: letsencrypt"
            - then: the watched dynamic-provider directory exists
              file: /etc/traefik/dynamic
              filetype: directory
        - name: reverse-proxy-serves-live
          step:
            - then: the insecure API and dashboard answer with HTTP 200 on the API port
              http: http://127.0.0.1:${HOST_PORT:8080}/api/version
              status: 200
              context:
                - runtime
            - then: a plain HTTP request to the web entrypoint is redirected to the TLS websecure entrypoint
        - name: traefik-service-running
          step:
            # Deploy-scope: the live reverse proxy reached via the resolved host ports.
            - id: traefik-service-running
              service: traefik
              running: true
              context:
                - runtime
        - name: traefik-web-port-open
          step:
            - id: traefik-web-port-open
              addr: 127.0.0.1:${HOST_PORT:8000}
              reachable: true
              context:
                - runtime
