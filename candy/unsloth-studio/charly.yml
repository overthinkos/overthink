candy:
    version: 2026.144.1443
    name: unsloth-studio
    description: |
        Unsloth Studio web UI for GPU LLM fine-tuning, backed by a pixi PyTorch/transformers environment and composed llama.cpp GGUF export tools
        unsloth-studio owns the pixi fine-tuning environment (Python 3.13 +
        PyTorch/CUDA + transformers + PEFT/TRL) and composes the llama-cpp and
        unsloth candies, then runs the Unsloth Studio web UI as a supervisord
        service on port 8888. Every owned artifact lands at a fixed path -- the
        pixi interpreter at ~/.pixi/envs/default and the composed llama.cpp CLI
        at ~/llama.cpp -- so the environment and the composition's effect are
        directly checkable.
    require:
        - cuda
        - supervisord
    candy:
        - llama-cpp
        - unsloth
    env:
        NVIDIA_PYTHON_PROJECT: "~/.pixi"
        LD_LIBRARY_PATH: "/usr/lib64:$HOME/llama.cpp"
    port:
        - 8888
        - 8000
    volume:
        - name: workspace
          path: "/workspace"
    service:
        - name: unsloth-studio
          exec: "pixi run start-studio"
          restart: always
          working_directory: "%(ENV_HOME)s"
          enable: true
          scope: system
    plan:
        - check: the pixi fine-tuning environment provides a Python interpreter at ~/.pixi/envs/default
          file: ${HOME}/.pixi/envs/default/bin/python
          exists: true
        - check: PyTorch imports successfully inside that environment
          command: ${HOME}/.pixi/envs/default/bin/python -c "import torch; print('torch', torch.__version__)"
          stdout:
            - contains: torch
        - check: the composed llama.cpp CLI binary is present so fine-tuned models can be exported to GGUF
          file: ${HOME}/llama.cpp/llama-cli
          exists: true
        - agent-check: the Unsloth Studio web UI is served on port 8888 and is usable for interactive LLM fine-tuning
        - check: command=${HOME}/.pixi/envs/default/bin/python -c "import transformers, peft, trl; print('finetune-stack-ok')"
          id: unsloth-studio-finetuning-stack
          command: ${HOME}/.pixi/envs/default/bin/python -c "import transformers, peft, trl; print('finetune-stack-ok')"
          stdout:
            - contains: finetune-stack-ok
        - check: service=unsloth-studio
          id: unsloth-studio-service-running
          service: unsloth-studio
          running: true
          context:
            - runtime
        - check: addr=127.0.0.1:${HOST_PORT:8888}
          id: unsloth-studio-ui-reachable
          addr: 127.0.0.1:${HOST_PORT:8888}
          reachable: true
          context:
            - runtime
