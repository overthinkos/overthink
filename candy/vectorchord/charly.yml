candy:
    version: 2026.144.1531
    name: vectorchord
    description:
        feature: VectorChord vector-search extension installed into the PostgreSQL layer
        narrative: |
            VectorChord (vchord) is a PostgreSQL extension for vector similarity
            search. This candy downloads the per-Postgres-major release zip and
            installs the vchord.so shared library into the server's pkglibdir plus
            the vchord.control manifest and vchord--*.sql migration files into the
            extension sharedir, then sets POSTGRES_SHARED_PRELOAD_LIBRARIES=vchord.so
            so the running server preloads it. The control manifest and shared
            library are concrete, distro-agnostic artifacts whose presence proves
            the download-and-install ran; CREATE EXTENSION vchord against the live
            server proves it is actually loadable.
        tag: [working]
    require:
        - postgresql
    distro:
        arch:
            package:
                - unzip
        fedora:
            package:
                - unzip
    env:
        VECTORCHORD_VERSION: "1.1.1"
        POSTGRES_SHARED_PRELOAD_LIBRARIES: "vchord.so"
    var:
        # Also expose the version as a task-context var so the URL template below
        # reads naturally. Keep in sync with env.VECTORCHORD_VERSION above — this
        # duplication is unfortunate but separates build-time (vars:) from
        # runtime (env:). A future enhancement could unify them.
        VCHORD_VERSION: "1.1.1"
    task:
        # VectorChord ships per-PostgreSQL-major zipped builds. Detect the installed
        # Postgres major + extension dirs WITHOUT pg_config (absent on Fedora —
        # it ships only in -devel packages the postgresql layer doesn't install;
        # present on Arch via postgresql-libs, but we stay pg_config-free for both):
        # `postgres --version` for the major, `find plpgsql.so` for pkglibdir
        # (Fedora /usr/lib64/pgsql, Arch /usr/lib/postgresql), and a candidate
        # loop for sharedir (Fedora /usr/share/pgsql, Arch /usr/share/postgresql).
        - command: |
            PG_MAJOR=$(postgres --version | awk '{print $NF}' | cut -d. -f1)
            PKGLIBDIR=$(dirname "$(find /usr/lib* -name plpgsql.so -print -quit 2>/dev/null)")
            SHAREDIR=""
            for d in /usr/share/pgsql /usr/share/postgresql; do
                [ -d "$d/extension" ] && SHAREDIR="$d" && break
            done

            if [ -z "$PKGLIBDIR" ] || [ ! -d "$PKGLIBDIR" ]; then
                echo "Error: Could not detect PostgreSQL pkglibdir (plpgsql.so not found)" >&2
                exit 1
            fi
            if [ ! -d "$SHAREDIR/extension" ]; then
                echo "Error: PostgreSQL sharedir not found at $SHAREDIR/extension" >&2
                exit 1
            fi

            echo "Detected PostgreSQL ${PG_MAJOR}: pkglibdir=${PKGLIBDIR}, sharedir=${SHAREDIR}"

            VCHORD_URL="https://github.com/tensorchord/VectorChord/releases/download/${VCHORD_VERSION}/postgresql-${PG_MAJOR}-vchord_${VCHORD_VERSION}_${BUILD_ARCH}-linux-gnu.zip"
            echo "Downloading VectorChord ${VCHORD_VERSION} for PostgreSQL ${PG_MAJOR} (${BUILD_ARCH})..."
            curl -fsSL "$VCHORD_URL" -o /tmp/vchord.zip

            cd /tmp
            unzip -q vchord.zip

            cp /tmp/pkglibdir/vchord.so "$PKGLIBDIR/"
            chmod 755 "$PKGLIBDIR/vchord.so"

            cp /tmp/sharedir/extension/vchord.control "$SHAREDIR/extension/"
            cp /tmp/sharedir/extension/vchord--*.sql "$SHAREDIR/extension/"

            rm -rf /tmp/vchord.zip /tmp/pkglibdir /tmp/sharedir

            echo "VectorChord ${VCHORD_VERSION} installed:"
            ls -la "$PKGLIBDIR/vchord.so"
            ls "$SHAREDIR/extension/vchord.control"
          run_as: root
    scenario:
        - name: vchord-extension-control-registered
          step:
            - then: the vchord.control extension manifest is registered in the PostgreSQL extension sharedir
              command: 'SD=$(for d in /usr/share/pgsql /usr/share/postgresql; do [ -d "$d/extension" ] && echo "$d" && break; done); test -f "$SD/extension/vchord.control"'
              exit_status: 0
        - name: vchord-shared-library-installed
          step:
            - then: the vchord.so shared library is installed alongside the server's plpgsql.so in pkglibdir
              command: 'PL=$(dirname "$(find /usr/lib* -name plpgsql.so -print -quit 2>/dev/null)"); test -f "$PL/vchord.so"'
              exit_status: 0
        - name: vchord-loadable-as-postgres-extension
          step:
            - then: CREATE EXTENSION vchord succeeds against the running PostgreSQL server, exposing the vchord vector index access methods
        - name: vchord-control-file
          step:
            - id: vchord-control-file
              command: SD=$(for d in /usr/share/pgsql /usr/share/postgresql; do [ -d "$d/extension" ] && echo "$d" && break; done); test -f "$SD/extension/vchord.control"
              exit_status: 0
        - name: vchord-shared-library
          step:
            - id: vchord-shared-library
              command: PL=$(dirname "$(find /usr/lib* -name plpgsql.so -print -quit 2>/dev/null)"); test -f "$PL/vchord.so"
              exit_status: 0
        - name: vchord-shared-preload-env
          step:
            - id: vchord-shared-preload-env
              command: printenv POSTGRES_SHARED_PRELOAD_LIBRARIES
              exit_status: 0
              stdout:
                - contains: "vchord.so"
              context:
                - runtime
