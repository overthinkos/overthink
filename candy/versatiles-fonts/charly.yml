candy:
    version: 2026.144.1443
    name: versatiles-fonts
    description:
        feature: Pre-rendered SDF glyph PBFs for the 10 VersaTiles font families, installed locally for MapLibre GL JS label rendering.
        narrative: |
            Installs the versatiles-org/versatiles-fonts release bundle
            (fonts.tar.gz — all 10 families: Fira Sans, Lato, Libre Baskerville,
            Merriweather Sans, Noto Sans, Nunito, Open Sans, PT Sans, Roboto,
            Source Sans 3) into /opt/versatiles-fonts as signed-distance-field
            PBFs laid out per MapLibre's {fontstack}/{range}.pbf glyph-URL
            convention. Serving the glyphs locally lets the shortbread MapLibre
            cell render labels without hitting tiles.versatiles.org as a runtime
            font CDN; the bundle is re-exported by versatiles-frontend at /fonts/.
        tag: [working]
    require:
        - supervisord
    distro:
        arch:
            package:
                - curl
                - jq
        fedora:
            package:
                - curl
                - jq
    task:
        - mkdir: /opt/versatiles-fonts
          run_as: root
        # ---- versatiles-fonts SDF glyphs ----
        # versatiles-org/versatiles-fonts ships `fonts.tar.gz` on each
        # release with all 10 font families bundled. Resolve the asset
        # URL via the GitHub release API rather than the static
        # `releases/latest/download/` endpoint so a future asset-name
        # change surfaces cleanly. The tarball lays out as
        # `<font-family>/<zoom>-<range>.pbf` per MapLibre's standard
        # glyph-URL convention.
        - command: |
            set -euo pipefail
            ASSET=$(curl -fsSL "https://api.github.com/repos/versatiles-org/versatiles-fonts/releases/latest" \
              | jq -r '.assets[].browser_download_url' \
              | grep -E '/fonts\.tar\.gz$' \
              | head -1)
            if [ -z "$ASSET" ]; then
              echo "ERROR: could not find fonts.tar.gz on versatiles-fonts latest release" >&2
              curl -fsSL "https://api.github.com/repos/versatiles-org/versatiles-fonts/releases/latest" \
                | jq -r '.assets[].name' >&2
              exit 1
            fi
            TMPDIR=$(mktemp -d)
            cd "$TMPDIR"
            curl -fsSL "$ASSET" -o fonts.tar.gz
            tar -xzf fonts.tar.gz -C /opt/versatiles-fonts
            cd /
            rm -rf "$TMPDIR"
          run_as: root
    scenario:
        - name: sdf-glyph-bundle-installed
          step:
            - then: the install directory /opt/versatiles-fonts exists
              file: /opt/versatiles-fonts
              filetype: directory
            - then: at least one signed-distance-field glyph PBF was unpacked from the release tarball
              command: |
                find /opt/versatiles-fonts -name '*.pbf' -size +1c | head -1 | grep -q .
              exit_status: 0
            - then: the default MapLibre font Noto Sans Regular is present
              command: |
                find /opt/versatiles-fonts -path '*noto_sans_regular*' -name '*.pbf' | head -1 | grep -q .
              exit_status: 0
        - name: maplibre-glyph-range-layout
          step:
            - then: glyphs follow MapLibre's {range}.pbf naming so the base 0-255.pbf range file exists
              command: |
                find /opt/versatiles-fonts -name '0-255.pbf' | head -1 | grep -q .
              exit_status: 0
            - then: a MapLibre GL JS client can fetch any installed family's glyph ranges via the standard {fontstack}/{range}.pbf glyph-URL template
        - name: versatiles-fonts-curl
          step:
            # Build-scope: the build dependencies this candy declares are installed
            # in the image. curl + jq resolve and fetch the GitHub release asset;
            # both carry the same package name on arch and fedora (no package_map).
            - id: versatiles-fonts-curl
              package: curl
              installed: true
        - name: versatiles-fonts-jq
          step:
            - id: versatiles-fonts-jq
              package: jq
              installed: true
