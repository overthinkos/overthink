candy:
    version: 2026.144.1443
    name: versatiles-frontend
    description:
        feature: VersaTiles frontend SPA served by a permissive-CORS static server on port 8002 (host 28002), re-exporting the style/fonts/styler bundles single-origin
        narrative: |
            The pre-built versatiles-org/versatiles-frontend TypeScript SPA (the
            `frontend` full-feature release variant) unpacked at
            /opt/versatiles-frontend/ with index.html at the root — same family
            as the upstream pmtiles.io viewer but for the VersaTiles tile-server
            ecosystem. It is served by a custom permissive-CORS python-stdlib
            static server on port 8002 (host 28002), mirroring the sibling
            maputnik (8000) and pmtiles-viewer (8001) static-SPA services. The
            same server re-exports the sibling layers' bundles under /style/
            (versatiles-style), /fonts/ (versatiles-fonts SDF glyphs) and /styler/
            (maplibre-versatiles-styler) so the notebook's MapLibre iframe loads
            every asset single-origin without a CDN. Verifiable: the SPA index,
            the CORS server script and the three re-exported bundles land at their
            paths, and the live service answers GET / with 200 plus an
            Access-Control-Allow-Origin header (the reason this layer ships a
            custom server instead of plain `python -m http.server`).
        tag: [working]
        scenario:
            # Build-scope deterministic steps — checkable under
            # `charly box feature run` in podman run --rm AND at deploy scope.
            - name: frontend-spa-and-cors-server-installed
              step:
                - then: the pre-built frontend SPA is unpacked with its index.html at the layer root
                  file: /opt/versatiles-frontend/index.html
                  exists: true
                - then: the CORS-enabled static server script is installed and executable
                  file: /opt/versatiles-frontend-cors-server.py
                  exists: true
                  mode: "0755"
            # Build-scope deterministic steps — the three re-exported bundles
            # land under the http.server root (proving the cross-layer cp ran).
            - name: companion-bundles-re-exported
              step:
                - then: the versatiles-style bundle is co-located under the http.server root at /style/
                  command: |
                    find /opt/versatiles-frontend/style -maxdepth 3 -name 'versatiles-style*.js' -size +1c | head -1 | grep -q .
                  exit_status: 0
                - then: the SDF font glyphs are re-exported under /fonts/
                  command: |
                    find /opt/versatiles-frontend/fonts -name '*.pbf' -size +1c | head -1 | grep -q .
                  exit_status: 0
                - then: the maplibre-versatiles-styler bundle is re-exported under /styler/
                  command: |
                    find /opt/versatiles-frontend/styler -maxdepth 4 -name '*.js' -size +1c | head -1 | grep -q .
                  exit_status: 0
            # Deploy-scope deterministic steps — the live CORS server answers
            # GET / with 200 AND every response carries the
            # Access-Control-Allow-Origin header that distinguishes this layer
            # from a plain http.server.
            - name: served-with-cors-headers
              step:
                - then: the running versatiles-frontend service answers GET / with HTTP 200
                  scope: deploy
                  http: "http://127.0.0.1:${HOST_PORT:8002}/"
                  status: 200
                - then: every response carries an Access-Control-Allow-Origin header so browser map clients fetch the re-exported /style/, /fonts/ and /styler/ assets cross-origin
                  scope: deploy
                  command: |
                    curl -fsSI http://localhost:8002/ | grep -i 'access-control-allow-origin'
                  in_container: true
                  exit_status: 0
    require:
        - supervisord
        - versatiles-style # the http.server re-exports its bundle at /style/
        - versatiles-fonts # re-exported at /fonts/
        - maplibre-versatiles-styler # re-exported at /styler/
    distro:
        arch:
            package:
                - curl
                - jq
        fedora:
            package:
                - curl
                - jq
    port:
        - 8002 # versatiles-frontend SPA (host-mapped 28002)
    # Two browser-side URLs derived from the same container port — the
    # versatiles-frontend layer re-exports /style/ (the versatiles-style
    # bundle) and / (raw asset root). The notebook's shortbread map cell
    # reads both: STYLE_PUBLIC_URL for the MapLibre style JSON, and
    # ASSETS_PUBLIC_URL as the asset-root prefix for font glyphs and
    # sprites referenced from the style.
    env_provide:
        VERSATILES_STYLE_PUBLIC_URL: "http://127.0.0.1:{{.HostPort 8002}}/style"
        VERSATILES_ASSETS_PUBLIC_URL: "http://127.0.0.1:{{.HostPort 8002}}"
    task:
        - mkdir: /opt/versatiles-frontend
          user: root
        # ---- Pre-built frontend.tar.gz ----
        # versatiles-org/versatiles-frontend ships four release variants:
        # frontend (full), frontend-dev, frontend-min, frontend-tiny.
        # We pick `frontend` (full feature set) since the versa image
        # serves it for interactive exploration, not minimal embedding.
        # The asset URL is resolved via the GitHub release API rather
        # than the static `releases/latest/download/` endpoint because
        # the asset filename includes the version + the `latest`
        # endpoint sometimes redirects oddly for multi-asset releases.
        - cmd: |
            set -euo pipefail
            ASSET=$(curl -fsSL "https://api.github.com/repos/versatiles-org/versatiles-frontend/releases/latest" \
              | jq -r '.assets[].browser_download_url' \
              | grep -E '/frontend\.tar\.gz$' \
              | head -1)
            if [ -z "$ASSET" ]; then
              echo "ERROR: could not find frontend.tar.gz on versatiles-frontend latest release" >&2
              curl -fsSL "https://api.github.com/repos/versatiles-org/versatiles-frontend/releases/latest" \
                | jq -r '.assets[].name' >&2
              exit 1
            fi
            TMPDIR=$(mktemp -d)
            cd "$TMPDIR"
            curl -fsSL "$ASSET" -o frontend.tar.gz
            # The tarball expands directly at the layer root (index.html
            # at top-level), per the upstream packaging.
            tar -xzf frontend.tar.gz -C /opt/versatiles-frontend
            cd /
            rm -rf "$TMPDIR"
          user: root
        # ---- Re-export versatiles-style + fonts + styler under /style/, /fonts/, /styler/ ----
        # The notebook's shortbread MapLibre cell uses `mo.iframe` whose
        # srcdoc-loaded HTML can only fetch absolute URLs. Co-locating
        # the versatiles-style bundle + fonts + styler under the SAME
        # http.server keeps the iframe's <script src> / glyphs URL
        # single-origin against the frontend service and avoids three
        # parallel http.server processes. The cp commands run AFTER the
        # source layers' tasks have populated /opt/versatiles-* (box.yml
        # layer order ensures correct dependency sequencing).
        - cmd: |
            set -euo pipefail
            mkdir -p /opt/versatiles-frontend/style \
                     /opt/versatiles-frontend/fonts \
                     /opt/versatiles-frontend/styler
            cp -r /opt/versatiles-style/.              /opt/versatiles-frontend/style/
            cp -r /opt/versatiles-fonts/.              /opt/versatiles-frontend/fonts/
            cp -r /opt/maplibre-versatiles-styler/.    /opt/versatiles-frontend/styler/
          user: root
        # ---- CORS-enabled static server ----
        # The /style/, /fonts/ and /styler/ re-exports above are fetched
        # CROSS-ORIGIN by browser map clients (e.g. a marimo notebook's
        # MapLibre iframe served from a different port/origin loads SDF
        # glyph .pbf files from /fonts/). The stdlib `python -m http.server`
        # sends no Access-Control-Allow-Origin header, so the browser
        # blocks those fetches — silently breaking glyph loading and any
        # other cross-origin asset use. This drop-in subclass adds
        # permissive CORS headers (the assets are public + uncredentialed).
        - write: /opt/versatiles-frontend-cors-server.py
          user: root
          mode: "0755"
          content: |
            #!/usr/bin/env python3
            """Static file server with permissive CORS headers.

            Drop-in for `python3 -m http.server` for the versatiles-frontend
            layer. Browser map clients fetch this server's /style/, /fonts/
            and /styler/ re-exports cross-origin, so responses MUST carry
            Access-Control-Allow-Origin or the browser blocks the fetch.

            Usage: versatiles-frontend-cors-server.py <port> <directory>
            """
            from __future__ import annotations

            import sys
            from functools import partial
            from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer


            class CORSRequestHandler(SimpleHTTPRequestHandler):
                def end_headers(self) -> None:
                    self.send_header("Access-Control-Allow-Origin", "*")
                    self.send_header(
                        "Access-Control-Allow-Methods", "GET, HEAD, OPTIONS"
                    )
                    self.send_header("Access-Control-Allow-Headers", "*")
                    super().end_headers()

                def do_OPTIONS(self) -> None:  # CORS preflight
                    self.send_response(204)
                    self.end_headers()


            def main() -> None:
                port = int(sys.argv[1])
                directory = sys.argv[2]
                handler = partial(CORSRequestHandler, directory=directory)
                with ThreadingHTTPServer(("", port), handler) as httpd:
                    httpd.serve_forever()


            if __name__ == "__main__":
                main()
    eval:
        # Build-scope: the frontend SPA's index.html landed at the
        # expected path.
        - id: versatiles-frontend-index-html
          file: /opt/versatiles-frontend/index.html
          exists: true
        # Build-scope: the re-exported versatiles-style bundle is present
        # under the http.server root.
        - id: versatiles-frontend-style-bundle
          command: |
            find /opt/versatiles-frontend/style -maxdepth 3 -name 'versatiles-style*.js' -size +1c | head -1 | grep -q .
          exit_status: 0
        # Build-scope: re-exported fonts + styler bundles also present.
        - id: versatiles-frontend-fonts-bundle
          command: |
            find /opt/versatiles-frontend/fonts -name '*.pbf' -size +1c | head -1 | grep -q .
          exit_status: 0
        - id: versatiles-frontend-styler-bundle
          command: |
            find /opt/versatiles-frontend/styler -maxdepth 4 -name '*.js' -size +1c | head -1 | grep -q .
          exit_status: 0
        # Build-scope: the custom CORS-enabled static server script (the reason
        # this layer ships its own server, not plain http.server) is installed
        # and executable.
        - id: versatiles-frontend-cors-server-script
          file: /opt/versatiles-frontend-cors-server.py
          exists: true
          mode: "0755"
        # Deploy-scope: service running + endpoints reachable.
        - id: versatiles-frontend-running
          scope: deploy
          service: versatiles-frontend
          running: true
        - id: versatiles-frontend-port-reachable
          scope: deploy
          addr: "127.0.0.1:${HOST_PORT:8002}"
          reachable: true
          timeout: 10s
        - id: versatiles-frontend-http-up
          scope: deploy
          http: "http://127.0.0.1:${HOST_PORT:8002}/"
          status: 200
          timeout: 10s
        # Deploy-scope: the re-exported versatiles-style bundle is fetchable.
        # 200 verifies python http.server serves the file (and an iframe
        # in the notebook can import it via the absolute URL pattern).
        - id: versatiles-frontend-style-fetchable
          scope: deploy
          command: |
            curl -fsS http://localhost:8002/style/ | grep -qi 'versatiles\|index\|<html'
          in_container: true
          exit_status: 0
        # Deploy-scope: every response carries the Access-Control-Allow-Origin
        # header — without it a browser map client on another origin silently
        # fails to fetch the /style/, /fonts/ and /styler/ re-exports. Proves the
        # custom CORS server (not a plain http.server) is the one running.
        - id: versatiles-frontend-cors-header
          scope: deploy
          command: |
            curl -fsSI http://localhost:8002/ | grep -i 'access-control-allow-origin'
          in_container: true
          exit_status: 0
    service:
        - name: versatiles-frontend
          # CORS-enabled static server (see the write: task above) — same
          # python-stdlib pattern as pmtiles-viewer / maputnik but with
          # Access-Control-Allow-Origin so the /style/, /fonts/, /styler/
          # re-exports work when fetched cross-origin by a browser map
          # client. priority 38 places versatiles-frontend AFTER
          # pmtiles-viewer (35) and maputnik (34); the ordering is
          # cosmetic (no inter-service deps).
          exec: /usr/bin/python3 /opt/versatiles-frontend-cors-server.py 8002 /opt/versatiles-frontend
          restart: always
          working_directory: /opt/versatiles-frontend
          priority: 38
          enable: true
          scope: system
