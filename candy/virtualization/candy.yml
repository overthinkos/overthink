candy:
    version: 2026.157.0640
    name: virtualization
    description: |
        QEMU/KVM/libvirt stack that runs identically on container/pod
        targets (under supervisord) AND on host/bootc/local targets
        (under systemd) via the mixed-`service:` schema pattern. Each
        daemon (virtqemud, virtnetworkd) carries TWO entries with the
        same name: a `use_packaged:` form for systemd init, and a
        custom `exec:` form for supervisord init. The init system at
        deploy time renders only the matching form. NEVER author a
        `virtualization-host` sibling — see CLAUDE.md "Init-system
        polymorphism via mixed `service:` entries".
    distro:
        arch:
            package:
                - qemu-full
                - qemu-img
                - virtiofsd
                - libvirt
                - libguestfs
                - dnsmasq
        debian:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                # libvirt-daemon-driver-network is NOT listed: on Debian it is a
                # Depends of libvirt-daemon-system (pulled transitively); on Ubuntu
                # noble it is not a separate package (bundled in libvirt-daemon-system),
                # so listing it fails apt with "Unable to locate package".
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
        fedora:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libvirt-client
                - libvirt-daemon
                - libvirt-daemon-config-network
                - libvirt-daemon-driver-network
                - libvirt-daemon-driver-qemu
                - libvirt-nss
                - passt
                - qemu-guest-agent
                - qemu-img
                - qemu-kvm
                - qemu-system-aarch64
                - qemu-system-arm
                - qemu-system-x86-core
                - tigervnc
                - virt-manager
                - virt-viewer
            option:
                - --allowerasing
        ubuntu:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                # libvirt-daemon-driver-network is NOT listed: on Debian it is a
                # Depends of libvirt-daemon-system (pulled transitively); on Ubuntu
                # noble it is not a separate package (bundled in libvirt-daemon-system),
                # so listing it fails apt with "Unable to locate package".
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
        ubuntu-24.04:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
    # Add the deploying user to the libvirt group on host targets so
    # qemu:///system access works without prompting. Harmless on
    # container deploys: libvirt group exists from the libvirt package
    # postinst, the user gets added, and qemu:///session (the default
    # for in-container charly vm operations) doesn't consult the group at
    # all. Same task, both targets.
    task:
        - cmd: |
            if getent group libvirt >/dev/null && id -u "${USER:-user}" >/dev/null 2>&1; then
              usermod -aG libvirt "$(getent passwd 1000 | cut -d: -f1)"
            fi
          user: root
    eval:
        - id: libvirt-qemu-driver-package
          package: libvirt-daemon-driver-qemu
          package_map:
            arch: libvirt
            fedora: libvirt-daemon-driver-qemu
            fedora:43: libvirt-daemon-driver-qemu
            debian: libvirt-daemon-system
            ubuntu: libvirt-daemon-system
          installed: true
        - id: virsh-binary
          file: /usr/bin/virsh
          exists: true
        - id: qemu-system-x86-binary
          file: /usr/bin/qemu-system-x86_64
          exists: true
        - id: qemu-img-binary
          file: /usr/bin/qemu-img
          exists: true
    # Mixed-entry `service:` pattern (CLAUDE.md "Init-system
    # polymorphism via mixed `service:` entries"). Each daemon
    # appears twice with the same `name:` — one entry rendered by
    # systemd-init (use_packaged), the other by supervisord-init
    # (custom exec). The init system picks at deploy time. The
    # canonical reference for this pattern is `/charly-coder:sshd`.
    service:
        # ----- virtqemud -----
        # systemd render: enables the packaged socket+service unit so
        # virsh -c qemu:///system works on host targets.
        - name: virtqemud
          use_packaged: virtqemud.socket
          enable: true
          scope: system
        # supervisord render: foreground daemon (--timeout 0 keeps it
        # alive instead of self-exiting on idle). priority=5 places it
        # ahead of every desktop service. No `user=` directive — the
        # daemon inherits supervisord's uid (root on charly-fedora/charly-arch,
        # user on openclaw-desktop); qemu:///session keys off
        # $XDG_RUNTIME_DIR so both work.
        - name: virtqemud
          exec: "/usr/sbin/virtqemud --timeout 0"
          restart: always
          priority: 5
          start_sec: 2
          enable: true
          scope: system
        # ----- virtnetworkd -----
        - name: virtnetworkd
          use_packaged: virtnetworkd.socket
          enable: true
          scope: system
        - name: virtnetworkd
          exec: "/usr/sbin/virtnetworkd --timeout 0"
          restart: always
          priority: 6
          start_sec: 2
          enable: true
          scope: system
