candy:
    version: 2026.162.1430
    name: virtualization
    description:
        feature: QEMU/KVM/libvirt virtualization stack for both supervisord and systemd init systems
        narrative: |
            Installs the QEMU/KVM emulators, qemu-img, and the split libvirt
            daemons (virtqemud + virtnetworkd) across Fedora, Arch, Debian and
            Ubuntu. The daemons ship as MIXED service: entries — a
            use_packaged: socket form rendered on systemd targets and a custom
            exec: form rendered on supervisord targets — so one candy serves
            container/pod deploys AND host/bootc/VM deploys without a
            virtualization-host sibling (CLAUDE.md "Init-system polymorphism
            via mixed service: entries"). Verifiable: the virsh,
            qemu-system-x86_64 and qemu-img binaries land at fixed paths, the
            libvirt qemu driver package is installed on every distro, and the
            rootless qemu:///session daemon answers once deployed.
        tag: [working]
    distro:
        arch:
            package:
                - qemu-full
                - qemu-img
                - virtiofsd
                - libvirt
                - libguestfs
                - dnsmasq
        debian:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                # libvirt-daemon-driver-network is NOT listed: on Debian it is a
                # Depends of libvirt-daemon-system (pulled transitively); on Ubuntu
                # noble it is not a separate package (bundled in libvirt-daemon-system),
                # so listing it fails apt with "Unable to locate package".
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
        fedora:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libvirt-client
                - libvirt-daemon
                - libvirt-daemon-config-network
                - libvirt-daemon-driver-network
                - libvirt-daemon-driver-qemu
                - libvirt-nss
                - passt
                - qemu-guest-agent
                - qemu-img
                - qemu-kvm
                - qemu-system-aarch64
                - qemu-system-arm
                - qemu-system-x86-core
                - tigervnc
                - virt-manager
                - virt-viewer
            option:
                - --allowerasing
        ubuntu:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                # libvirt-daemon-driver-network is NOT listed: on Debian it is a
                # Depends of libvirt-daemon-system (pulled transitively); on Ubuntu
                # noble it is not a separate package (bundled in libvirt-daemon-system),
                # so listing it fails apt with "Unable to locate package".
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
        ubuntu-24.04:
            package:
                - bindfs
                - dnsmasq
                - genisoimage
                - guestfs-tools
                - libguestfs-tools
                - libnss-libvirt
                - libvirt-clients
                - libvirt-daemon
                - libvirt-daemon-config-network
                - libvirt-daemon-driver-qemu
                - libvirt-daemon-system
                - passt
                - qemu-guest-agent
                - qemu-system-x86
                - qemu-utils
                - virt-viewer
                - virtinst
    # Add the deploying user to the libvirt group on host targets so
    # qemu:///system access works without prompting. Harmless on
    # container deploys: libvirt group exists from the libvirt package
    # postinst, the user gets added, and qemu:///session (the default
    # for in-container charly vm operations) doesn't consult the group at
    # all. Same task, both targets.
    task:
        - command: |
            if getent group libvirt >/dev/null && id -u "${USER:-user}" >/dev/null 2>&1; then
              usermod -aG libvirt "$(getent passwd 1000 | cut -d: -f1)"
            fi
          run_as: root
    # Mixed-entry `service:` pattern (CLAUDE.md "Init-system
    # polymorphism via mixed `service:` entries"). Each daemon
    # appears twice with the same `name:` — one entry rendered by
    # systemd-init (use_packaged), the other by supervisord-init
    # (custom exec). The init system picks at deploy time. The
    # canonical reference for this pattern is `/charly-coder:sshd`.
    service:
        # ----- virtqemud -----
        # systemd render: enables the packaged socket+service unit so
        # virsh -c qemu:///system works on host targets.
        - name: virtqemud
          use_packaged: virtqemud.socket
          enable: true
          scope: system
        # supervisord render: foreground daemon (--timeout 0 keeps it
        # alive instead of self-exiting on idle). priority=5 places it
        # ahead of every desktop service. No `user=` directive — the
        # daemon inherits supervisord's uid (root on charly-fedora/charly-arch,
        # user on openclaw-desktop); qemu:///session keys off
        # $XDG_RUNTIME_DIR so both work.
        - name: virtqemud
          exec: "/usr/sbin/virtqemud --timeout 0"
          restart: always
          priority: 5
          start_sec: 2
          enable: true
          scope: system
        # ----- virtnetworkd -----
        - name: virtnetworkd
          use_packaged: virtnetworkd.socket
          enable: true
          scope: system
        - name: virtnetworkd
          exec: "/usr/sbin/virtnetworkd --timeout 0"
          restart: always
          priority: 6
          start_sec: 2
          enable: true
          scope: system
    scenario:
        - name: qemu-libvirt-binaries-installed
          step:
            - then: the libvirt client virsh is installed at its fixed path
              file: /usr/bin/virsh
              exists: true
            - then: the QEMU x86_64 system emulator binary is present
              file: /usr/bin/qemu-system-x86_64
              exists: true
            - then: the qemu-img disk-image tool is present
              file: /usr/bin/qemu-img
              exists: true
        - name: libvirt-qemu-driver-package-present
          step:
            - then: the libvirt qemu driver package is installed (cross-distro name resolution)
              package: libvirt-daemon-driver-qemu
              package_map:
                arch: libvirt
                fedora: libvirt-daemon-driver-qemu
                debian: libvirt-daemon-system
                ubuntu: libvirt-daemon-system
              installed: true
        - name: rootless-libvirt-session-answers
          step:
            - then: virsh reaches the rootless qemu:///session daemon and lists domains
              command: virsh -c qemu:///session list --all
              in_container: true
              exit_status: 0
              context:
                - runtime
        - name: mixed-init-service-polymorphism
          step:
            - then: the same virtqemud and virtnetworkd daemons come up under whichever init system the target runs (supervisord in containers, systemd on host/bootc) with no virtualization-host sibling candy
        - name: libvirt-qemu-driver-package
          step:
            - id: libvirt-qemu-driver-package
              package: libvirt-daemon-driver-qemu
              package_map:
                arch: libvirt
                fedora: libvirt-daemon-driver-qemu
                fedora:43: libvirt-daemon-driver-qemu
                debian: libvirt-daemon-system
                ubuntu: libvirt-daemon-system
              installed: true
        - name: virsh-binary
          step:
            - id: virsh-binary
              file: /usr/bin/virsh
              exists: true
        - name: qemu-system-x86-binary
          step:
            - id: qemu-system-x86-binary
              file: /usr/bin/qemu-system-x86_64
              exists: true
        - name: qemu-img-binary
          step:
            - id: qemu-img-binary
              file: /usr/bin/qemu-img
              exists: true
        - name: libvirt-session-list
          step:
            # The rootless libvirt session this candy's virtqemud serves — checked
            # HERE so one check covers every box composing virtualization (directly
            # or via the charly toolchain), instead of the box re-declaring it.
            - id: libvirt-session-list
              command: virsh -c qemu:///session list --all
              in_container: true
              exit_status: 0
              context:
                - runtime
