candy:
    version: 2026.144.1443
    name: waybar
    require:
        - sway
    description: |
        Waybar status bar and Sway auto-tiling for the Sway desktop
        Installs the waybar package, stages the waybar-wrapper launcher and the
        sway-autotile helper into the user's ~/.local/bin, and stages the shared
        Catppuccin Mocha waybar config + stylesheet under ~/.config/waybar. Two
        supervisord services then run the bar and the auto-tiler against the Sway
        Wayland session. Every installed artifact is file-verifiable at build scope.
    distro:
        fedora:
            package:
                - waybar
    service:
        - name: waybar
          exec: "%(ENV_HOME)s/.local/bin/waybar-wrapper"
          env:
            WAYLAND_DISPLAY: wayland-0
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 15
          start_sec: 0
          enable: true
          scope: system
        - name: sway-autotile
          exec: "%(ENV_HOME)s/.local/bin/sway-autotile"
          env:
            WAYLAND_DISPLAY: wayland-0
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 16
          start_sec: 0
          enable: true
          scope: system
    plan:
        - run: mkdir=${HOME}/.local/bin
          mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - run: mkdir=${HOME}/.config/waybar
          mkdir: "${HOME}/.config/waybar"
          run_as: "${USER}"
        - run: copy=waybar-wrapper
          copy: waybar-wrapper
          to: "${HOME}/.local/bin/waybar-wrapper"
          mode: "0755"
          run_as: "${USER}"
        - run: copy=sway-autotile
          copy: sway-autotile
          to: "${HOME}/.local/bin/sway-autotile"
          mode: "0755"
          run_as: "${USER}"
        - run: copy=config.json
          copy: config.json
          to: "${HOME}/.config/waybar/config"
          mode: "0644"
          run_as: "${USER}"
        - run: copy=style.css
          copy: style.css
          to: "${HOME}/.config/waybar/style.css"
          mode: "0644"
          run_as: "${USER}"
        - check: the waybar status-bar binary is installed from the distro package
          file: /usr/bin/waybar
          exists: true
        - check: waybar is recorded as installed in the package database
          package: waybar
          installed: true
        - check: the waybar-wrapper launcher script is installed under the user's bin
          file: ${HOME}/.local/bin/waybar-wrapper
          exists: true
        - check: the sway-autotile helper script is installed under the user's bin
          file: ${HOME}/.local/bin/sway-autotile
          exists: true
        - check: the waybar module-layout config is staged for the user
          file: ${HOME}/.config/waybar/config
          exists: true
        - check: the Catppuccin Mocha stylesheet is staged for the user
          file: ${HOME}/.config/waybar/style.css
          exists: true
        - agent-check: the waybar status bar appears on the running Sway desktop showing the taskbar, Chrome-restart, and notification toggle modules
