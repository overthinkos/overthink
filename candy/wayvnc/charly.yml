candy:
    version: 2026.144.1443
    name: wayvnc
    description:
        feature: WayVNC headless VNC server exposing a wlroots Wayland desktop on TCP 5900
        narrative: |
            Installs the wayvnc package (the /usr/bin/wayvnc server) plus a
            launcher wrapper under ~/.local/bin, run as a supervised service that
            publishes the Wayland desktop over VNC on port 5900. Verifiable: the
            server binary and wrapper exist and the package is installed at build
            scope; at deploy scope the wayvnc service runs and the VNC port
            accepts a TCP connection.
        tag: [working]
        scenario:
            - name: wayvnc-server-installed
              step:
                - then: the wayvnc server binary is installed at /usr/bin/wayvnc
                  file: /usr/bin/wayvnc
                  exists: true
                - then: the wayvnc launcher wrapper is installed and executable
                  file: ${HOME}/.local/bin/wayvnc-wrapper
                  exists: true
                  mode: "0755"
            - name: wayvnc-serves-vnc
              step:
                - then: the supervised wayvnc service is running
                  scope: deploy
                  service: wayvnc
                  running: true
                - then: the VNC port accepts a TCP connection on the published host port
                  scope: deploy
                  addr: 127.0.0.1:${HOST_PORT:5900}
                  reachable: true
    require:
        - supervisord
    port:
        - tcp:5900
    distro:
        fedora:
            package:
                - wayvnc
    task:
        - mkdir: "${HOME}/.local/bin"
          user: "${USER}"
        - copy: wayvnc-wrapper
          to: "${HOME}/.local/bin/wayvnc-wrapper"
          mode: "0755"
          user: "${USER}"
    eval:
        - id: wayvnc-binary
          file: /usr/bin/wayvnc
          exists: true
        - id: wayvnc-wrapper
          file: ${HOME}/.local/bin/wayvnc-wrapper
          exists: true
          mode: "0755"
        - id: wayvnc-package
          package: wayvnc
          installed: true
        - id: wayvnc-service-running
          scope: deploy
          service: wayvnc
          running: true
        - id: wayvnc-port-reachable
          scope: deploy
          addr: 127.0.0.1:${HOST_PORT:5900}
          reachable: true
          timeout: 5s
    service:
        - name: wayvnc
          exec: "%(ENV_HOME)s/.local/bin/wayvnc-wrapper"
          env:
            WAYLAND_DISPLAY: wayland-0
            XDG_RUNTIME_DIR: /tmp
          restart: always
          priority: 20
          start_sec: 0
          enable: true
          scope: system
