candy:
    version: 2026.144.1443
    name: wf-recorder
    description:
        feature: Wayland screen recorder for wlroots compositors
        narrative: |
            Installs wf-recorder, the wlroots screen-capture recorder. Verifiable:
            the wf-recorder binary lands at /usr/bin/wf-recorder and the package
            is registered.
        tag: [working]
    distro:
        fedora:
            package:
                - wf-recorder
    scenario:
        - name: wf-recorder-installed
          step:
            - then: the wf-recorder binary is installed at /usr/bin/wf-recorder
              file: /usr/bin/wf-recorder
              exists: true
            - then: the wf-recorder package is registered with the package manager
              package: wf-recorder
              installed: true
        - name: wf-recorder-binary
          step:
            - id: wf-recorder-binary
              file: /usr/bin/wf-recorder
              exists: true
        - name: wf-recorder-package
          step:
            - id: wf-recorder-package
              package: wf-recorder
              installed: true
