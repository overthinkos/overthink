wf-recorder:
    candy:
        version: 2026.144.1443
        description: |
            Wayland screen recorder for wlroots compositors
            Installs wf-recorder, the wlroots screen-capture recorder. Verifiable:
            the wf-recorder binary lands at /usr/bin/wf-recorder and the package
            is registered.
    wf-recorder-distro:
        distro:
            fedora:
                package:
                    - wf-recorder
    wf-recorder-step-0:
        check: the wf-recorder binary is installed at /usr/bin/wf-recorder
        file: /usr/bin/wf-recorder
        exists: true
    wf-recorder-step-1:
        check: the wf-recorder package is registered with the package manager
        plugin: package
        plugin_input:
            package: wf-recorder
            installed: true
