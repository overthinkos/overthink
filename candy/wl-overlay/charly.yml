candy:
    version: 2026.144.1443
    name: wl-overlay
    description: |
        Wayland overlay windows via gtk4-layer-shell (for screen recordings)
        Installs gtk4 + gtk4-layer-shell + PyGObject and a charly-overlay
        helper script under ~/.local/bin that draws layer-shell overlay
        windows (e.g. recording indicators). Verifiable: the helper script is
        installed and executable and the gtk4-layer-shell package is present.
    require:
        - dbus
    distro:
        arch:
            package:
                - gtk4
                - gtk4-layer-shell
                - python-gobject
        fedora:
            package:
                - gtk4
                - gtk4-layer-shell
                - python3-gobject
    plan:
        - run: mkdir=${HOME}/.local/bin
          mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - run: copy=charly-overlay
          copy: charly-overlay
          to: "${HOME}/.local/bin/charly-overlay"
          mode: "0755"
          run_as: "${USER}"
        - check: the charly-overlay helper script is installed and executable
          file: ${HOME}/.local/bin/charly-overlay
          exists: true
          mode: "0755"
        - check: the gtk4-layer-shell library package is installed
          package: gtk4-layer-shell
          installed: true
