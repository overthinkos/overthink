candy:
    version: 2026.144.1443
    name: wl-overlay
    description:
        feature: Wayland overlay windows via gtk4-layer-shell (for screen recordings)
        narrative: |
            Installs gtk4 + gtk4-layer-shell + PyGObject and a charly-overlay
            helper script under ~/.local/bin that draws layer-shell overlay
            windows (e.g. recording indicators). Verifiable: the helper script is
            installed and executable and the gtk4-layer-shell package is present.
        tag: [working]
        scenario:
            - name: wl-overlay-installed
              step:
                - then: the charly-overlay helper script is installed and executable
                  file: ${HOME}/.local/bin/charly-overlay
                  exists: true
                  mode: "0755"
                - then: the gtk4-layer-shell library package is installed
                  package: gtk4-layer-shell
                  installed: true
    require:
        - dbus
    distro:
        arch:
            package:
                - gtk4
                - gtk4-layer-shell
                - python-gobject
        fedora:
            package:
                - gtk4
                - gtk4-layer-shell
                - python3-gobject
    task:
        - mkdir: "${HOME}/.local/bin"
          user: "${USER}"
        - copy: charly-overlay
          to: "${HOME}/.local/bin/charly-overlay"
          mode: "0755"
          user: "${USER}"
    eval:
        - id: charly-overlay-script
          file: ${HOME}/.local/bin/charly-overlay
          exists: true
          mode: "0755"
        - id: gtk4-layer-shell-installed
          package: gtk4-layer-shell
          installed: true
