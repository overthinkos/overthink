candy:
    version: 2026.144.1443
    name: wl-record-pixelflux
    description:
        feature: Desktop video recorder via the selkies pixelflux H.264 pipeline
        narrative: |
            Installs the pixelflux-record wrapper script under ~/.local/bin, which
            drives the selkies pixelflux capture pipeline through ffmpeg to record
            the desktop as H.264. Verifiable: the wrapper script is installed and
            executable.
        tag: [working]
    require:
        - selkies
        - ffmpeg
    task:
        - mkdir: "${HOME}/.local/bin"
          run_as: "${USER}"
        - copy: pixelflux-record
          to: "${HOME}/.local/bin/pixelflux-record"
          mode: "0755"
          run_as: "${USER}"
    scenario:
        - name: pixelflux-record-script-installed
          step:
            - then: the pixelflux-record wrapper is installed and executable
              file: ${HOME}/.local/bin/pixelflux-record
              exists: true
              mode: "0755"
