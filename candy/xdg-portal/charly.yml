candy:
    version: 2026.144.1443
    name: xdg-portal
    description:
        feature: XDG desktop portal (wlroots backend) for screencast/screenshot on sway
        narrative: |
            Installs xdg-desktop-portal with the wlroots + GTK backends and slurp
            (region selector), plus the sway config.d and portal config that wire
            screencasting through PipeWire on a sway session. Verifiable: the
            portal packages and slurp are installed and the portal/sway config
            files land at their expected paths.
        tag: [working]
        scenario:
            - name: xdg-portal-installed
              step:
                - then: the xdg-desktop-portal package is installed
                  package: xdg-desktop-portal
                  installed: true
                - then: the wlroots portal backend package is installed
                  package: xdg-desktop-portal-wlr
                  installed: true
                - then: the slurp region selector binary is installed
                  file: /usr/bin/slurp
                  exists: true
            - name: xdg-portal-config-present
              step:
                - then: the wlroots portal config file is installed in the user config
                  file: ${HOME}/.config/xdg-desktop-portal-wlr/config
                  exists: true
    require:
        - dbus
        - sway
        - pipewire
    env:
        XDG_CURRENT_DESKTOP: "sway"
    distro:
        fedora:
            package:
                - xdg-desktop-portal
                - xdg-desktop-portal-wlr
                - xdg-desktop-portal-gtk
                - slurp
    task:
        - mkdir: "${HOME}/.config/sway/config.d"
          user: "${USER}"
        - copy: portal.conf
          to: "${HOME}/.config/sway/config.d/portal.conf"
          mode: "0644"
          user: "${USER}"
        - mkdir: "${HOME}/.config/xdg-desktop-portal-wlr"
          user: "${USER}"
        - copy: xdg-desktop-portal-wlr-config
          to: "${HOME}/.config/xdg-desktop-portal-wlr/config"
          mode: "0644"
          user: "${USER}"
    eval:
        - id: xdg-desktop-portal-package
          package: xdg-desktop-portal
          installed: true
        - id: xdg-portal-wlr-package
          package: xdg-desktop-portal-wlr
          installed: true
        - id: slurp-binary
          file: /usr/bin/slurp
          exists: true
        - id: xdg-portal-wlr-config
          file: ${HOME}/.config/xdg-desktop-portal-wlr/config
          exists: true
        - id: xdg-portal-sway-conf
          file: ${HOME}/.config/sway/config.d/portal.conf
          exists: true
