candy:
    version: 2026.144.1443
    name: xfce4-terminal
    description:
        feature: Xfce4 terminal emulator wired into the sway session
        narrative: |
            Installs xfce4-terminal and a sway config.d snippet so the terminal
            is available in the desktop. Verifiable: the xfce4-terminal binary is
            installed and the sway config snippet lands at its expected path.
        tag: [working]
    require:
        - sway
    distro:
        fedora:
            package:
                - xfce4-terminal
    task:
        - mkdir: "${HOME}/.config/sway/config.d"
          run_as: "${USER}"
        - copy: xfce4-terminal.conf
          to: "${HOME}/.config/sway/config.d/xfce4-terminal.conf"
          mode: "0644"
          run_as: "${USER}"
    scenario:
        - name: xfce4-terminal-installed
          step:
            - then: the xfce4-terminal binary is installed at /usr/bin/xfce4-terminal
              file: /usr/bin/xfce4-terminal
              exists: true
            - then: the sway config snippet for the terminal is installed
              file: ${HOME}/.config/sway/config.d/xfce4-terminal.conf
              exists: true
        - name: xfce4-terminal-binary
          step:
            - id: xfce4-terminal-binary
              file: /usr/bin/xfce4-terminal
              exists: true
        - name: xfce4-terminal-sway-conf
          step:
            - id: xfce4-terminal-sway-conf
              file: ${HOME}/.config/sway/config.d/xfce4-terminal.conf
              exists: true
