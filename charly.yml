# candy/plugin-example-deploy (recognized at parse time via the plugin-declaration
# pre-scan, connected at deploy time via loadDeployPlugins). Add Invokes the plugin
# out-of-process; it dials back through the SDK Executor to write markers on the host
# venue under a disposable /tmp scratch dir, and returns a plugin-script reverse op
# the host records + replays at teardown. Zero operator side-effect (markers under
# /tmp, removed by `charly bundle del`).
check-exampledeploy:
    exampledeploy:
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the external (out-of-process) deploy-target lifecycle (Add/Test/Update/Del) over the E3b ExecutorService reverse channel, AND of the F2 executable deploy channel AND the F3 build channel. Composes plugin-example-deploy as an external deploy: substrate (plus examplebuild-localpkg for the F3 leg); Add Invokes the host-built plugin out-of-process with the deployment's InstallPlan views — carrying the serializable per-step IR. The plugin dials back through the SDK Executor to (a) write an apply + a probe marker, (b) WALK + EXECUTE the plan's steps on the host venue (a file-write step lands /tmp/charly-exampledeploy-steps/written and a shell-hook env step lands env.d/plugin-example-deploy.env), (c) PUSH /tmp/charly-exampledeploy-steps/pushed via the reverse-channel PutFile leg, and (d) drive the RunHostStep host-engine reverse leg on examplebuild-localpkg's LocalPkgInstallStep — the host runs the EXISTING build engine (makepkg + pacman -U) and installs charly-f3-witness so /opt/charly-f3-witness/marker lands on the venue. Host-side command probes assert the probe marker, the executed-step effects, the pushed file, and the F3-built package marker; the fresh-rebuild (charly update) re-applies idempotently; teardown (charly bundle del) replays the recorded plugin-script reverse ops so every scratch dir is gone and the charly-f3-witness package is pacman -R'd (zero residue).
    check-exampledeploy-add_candy:
        add_candy:
            - plugin-example-deploy
            - examplebuild-localpkg
    exampledeploy-applied:
        check: command=test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT
        id: exampledeploy-applied
        description: the external deploy plugin applied its probe marker on the host venue via the E3b reverse channel
        stdout:
            - contains: EXAMPLEDEPLOY-PROBE-PRESENT
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT"
            in_container: false
    exampledeploy-step-write:
        check: the external deploy plugin EXECUTED the file-write step from the round-tripped per-step IR — the authored dest holds the step's content
        id: exampledeploy-step-write
        description: F2 — the serializable InstallPlan.Steps round-tripped to the plugin, which executed the Op write step on the venue
        stdout:
            - contains: EXAMPLEDEPLOY-STEP-WRITE-OK
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "cat /tmp/charly-exampledeploy-steps/written"
