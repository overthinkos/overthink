        context:
            - runtime
        plugin: command
        plugin_input:
            command: "cat /tmp/charly-exampledeploy-steps/env.d/plugin-example-deploy.env"
            in_container: false
    exampledeploy-putfile:
        check: the external deploy plugin PUSHED a file via the new reverse-channel PutFile leg — the pushed file landed on the venue with its content
        id: exampledeploy-putfile
        description: F2 — the ExecutorService PutFile RPC placed plugin-originated content on the venue
        stdout:
            - contains: EXAMPLEDEPLOY-PUTFILE-OK
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "cat /tmp/charly-exampledeploy-steps/pushed"
            in_container: false
    exampledeploy-f3-buildstep:
        check: F3 — the external deploy plugin drove the RunHostStep reverse leg on examplebuild-localpkg's LocalPkgInstallStep; the host built charly-f3-witness with makepkg and installed it with pacman -U, so its marker file is present on the venue
        id: exampledeploy-f3-buildstep
        description: F3 build channel — the host ran the EXISTING build engine (makepkg + pacman -U) over the reverse channel and installed the built package's artifact onto the venue
        stdout:
            - contains: EXAMPLEBUILD-LOCALPKG-OK
        context:
