            externalized `charly preempt` CLI host-side.
    check-preempt-candy:
        candy:
            - plugin-preempt
check-preempt-local:
    local:
        from: check-preempt-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the externalized `charly preempt` COMMAND (candy/plugin-preempt,
            command:preempt), the second welded-command externalization in the
            core-externalization program. A disposable kind:local deploy on host: local runs
            `charly preempt status` host-side: the host charly resolves the `preempt` word via
            the discovered candy/plugin-preempt prescan and syscall.Exec's the plugin binary,
            which shells back to the in-core resource arbiter via the hidden
            `charly __preempt-status` verb (newResourceArbiter().Status()). On a fresh, GPU-less,
            lease-free bed host the command exits 0 and reports no active preemption leases —
            proving the externalized command + the hidden-command shell-back dispatch end-to-end.
    preempt-status-runs:
        check: command=charly preempt status exits 0 and reports a clean arbiter (no active leases) on a fresh GPU-less host
        id: preempt-status-runs
        exit_status: 0
        stdout:
            - contains: 'No active preemption leases.'
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly preempt status
            in_container: false

