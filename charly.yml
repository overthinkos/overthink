version: 2026.174.1100
# Canonical repo identity. After the 2026-06 box inversion main imports the three
# active distro submodules (arch / cachyos / fedora) ONE-DIRECTIONALLY to reference
# their relocated boxes; the submodules no longer import main as a namespace (they
# reach main's shared candies via @github refs), so the former mutual cycle is
# dissolved. See /charly-internals:go.
repo: github.com/overthinkos/overthink
import:
    # After the 2026-06 box inversion main owns NO boxes — it imports the three
    # active distro submodules ONE-DIRECTIONALLY to reference their relocated boxes
    # in the inline check/vm/local/k8s/android orchestration below (e.g. the
    # check-cross-* mechanism beds reference `fedora.web` / `fedora.chrome-headless`).
    # Each submodule owns its own base stack: arch + fedora are self-contained
    # (import: []) and cachyos imports the `arch` namespace; none imports main back
    # (they reach main's shared candies via @github refs), so the former
    # main↔cachyos / main↔fedora mutual cycles are dissolved.
    - arch: '@github.com/overthinkos/arch:v2026.162.0906'
    - cachyos: '@github.com/overthinkos/cachyos:v2026.162.0912'
    - fedora: '@github.com/overthinkos/fedora:v2026.162.0855'
# Main owns NO boxes after the 2026-06 box inversion — only the shared candy
# library + the inline check/vm/local/k8s orchestration. Discover candies only.
discover:
    - path: candy
      recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    # No defaults.builder: main owns no boxes after the box inversion, so there is
    # nothing to build multi-stage formats for. Each submodule box declares its own
    # builder map (arch.arch-builder / fedora.fedora-builder / cachyos via arch).
    # Build-speed tunables (project-wide). Precedence: CLI flag / env wins,
    # then these defaults, then a built-in fallback. See /charly-build:build.
    jobs: 4 # outer: concurrent IMAGE builds per DAG level (--jobs / CHARLY_BUILD_JOBS)
    podman_jobs: 0 # inner: stages per `podman build`; 0 = auto = min(NCPU, podman_jobs_cap)
    podman_jobs_cap: 8 # ceiling for the auto calc — proven safe on podman 5.8.2 (20-run race gate)
    # Heavy directories never COPYed by any Containerfile — merged into the
    # generated .containerignore/.dockerignore on top of the built-in baseline
    # (.git, bin, charly, *.md, editor/python/node cache-bust globs).
    context_ignore:
        - box
        - .check
        - output
        - dist
        - pkg
        - tests
        - .regression-snapshot
    cache: image # default build cache mode (image local read / registry read+write)
    # Reusable-artifact retention (auto-pruned at creation; also via `charly clean`).
    # 0 disables. See /charly-core:clean.
    keep_images: 3 # newest CalVer tags to keep per image after `charly box build`
    keep_check_runs: 3 # newest run dirs to keep per bed/score after `charly check run`
vm:
    vm:
        source:
            kind: cloud_image
            url: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
            checksum:
                type: sha256
                value: 6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2
            base_user: fedora
        disk_size: 6G
        ram: 2G
        cpu: 2
        firmware: bios
        network:
            mode: user
        ssh:
            user: fedora
            port: 12222
            key_source: generate
        cloud_init:
            package:
                - qemu-guest-agent
                - curl
            runcmd:
                - "setenforce 0 || true"
                - "sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config || true"
                - "echo '10.89.0.1 charly-web' >> /etc/hosts"
                - "systemctl enable --now qemu-guest-agent"
                - "for c in 21 33 46 82 124 196 208 220 1 5; do printf '\\033[48;5;%dm                    \\033[0m\\n' $c >> /dev/tty1; done || true"
vm-libvirt:
    vm: {}
    vm-libvirt-libvirt:
        libvirt:
            devices:
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                      path: '{{.VmStateDir}}/qga.sock'
                graphics:
                    - type: spice
                      autoport: "yes"
                      listen: 127.0.0.1
                video:
                    - model: virtio
                      heads: 1
                      accel3d: false
k3s-vm:
    vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            # `port_forwards` (plural) is the canonical key — VmNetwork.PortForwards
            # (yaml:"port_forwards"), a kept-plural key in the field-singular cutover.
            # The original bed used the singular `port_forward:`, which YAML silently
            # dropped → no host:16443 forward → the k8s probes hit
            # `dial 127.0.0.1:16443: connection refused`.
            port_forwards:
                - "16443:6443"
        ssh:
            # port_auto auto-allocates the host SSH port at create (was a fixed
            # 2225 chosen to dodge collisions — port_auto does that automatically).
            # This bed is also the R10 for the ssh.port_auto feature: the entire
            # k3s deploy connects over SSH on the auto-allocated port.
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
            charly_install:
                strategy: auto
    k3s-vm-libvirt:
        libvirt:
            devices:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
# Arch Cloud VM backing check-charly-vm — the pac localpkg deploy witness. Plain
# disposable VM (no port forwards / k3s); charly is installed onto it by the bed's
# localpkg deploy, so the VM itself carries no opencharly layers.
charly-vm:
    vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
vm-k3s-vm:
    k8s:
        box: ""
        kubeconfig_context: vm-k3s-vm
claude:
    agent:
        description: Anthropic Claude Code CLI — autonomous coding agent.
        # --verbose + --output-format stream-json emit one JSON object per
        # message in the agent loop (system / assistant / user / tool_use /
        # tool_result / result). The harness parses each line, embeds it
        # into result-{calver}.yml under iteration[].runner_event, and tees
        # the raw NDJSON to .harness/<score>/runs/<run-id>/iter<k>/runner.ndjson
        # for byte-exact debugging. See /charly-check:check for the score
        # runner and its stream-json wire format.
        command: [claude, -p, --verbose, --output-format, stream-json, --dangerously-skip-permissions, "${PROMPT}"]
        output_format: stream-json
        version_command: [claude, --version]
        credential:
            - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}
codex:
    agent:
        description: OpenAI Codex CLI — coding agent.
        command: [codex, exec, "${PROMPT}"]
        version_command: [codex, --version]
        credential:
            - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}
gemini:
    agent:
        description: Google Gemini CLI.
        command: [gemini, chat, "${PROMPT}"]
        version_command: [gemini, --version]
        credential:
            - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}
# =============================================================================
# kind: check — disposable, zero-operator-side-effect R10 test beds.
# =============================================================================
# Each entry is a disposable deployment (a BundleNode), folded into the
# Bundle map at load time so every deploy verb resolves it by name. Run the
# full R10 acceptance sequence on any of them — build → check box → deploy →
# check live → fresh update (R10 gate) → tear down — with:
#
#     charly check run <bed>          # one bed
#     charly check run --all-beds     # every bed, name-sorted
#
# `disposable: true` is the SOLE authorization for that unattended destroy +
# rebuild (see /charly-internals:disposable). Naming: check-<descriptor>-<kind>,
# dropping a redundant suffix when descriptor == kind AND the short form is
# free (check-local, check-pod). The harness AI-sandbox pod is named
# `check-sandbox` (the score `pod:` target), kept disjoint from these beds.
#
# Bed-to-verb coverage map:
#   check-k3s-vm               (vm)  — k8s (all 13 methods) + guest-side
#                                     file/service/port/process, http via
#                                     port-forward, VmDeployTarget end-to-end
#   check-pod                  (pod) — combined: kind:image build + kind:layer
#                                     composition order + kind:pod runtime
#                                     (nc :18794 + supervisord) + every
#                                     DeployTarget rendering path
#   check-local                (local) — kind:local layer apply via ShellExecutor
#   check-jupyter-pod          (pod) — jupyter-mcp regression coverage
#   check-jupyter-ml-pod       (pod) — jupyter-ml spacy/quarto + GPU MCP probes
#   check-versa-pod            (pod) — versa OSM analytics + vector-tile + marimo MCP
#   check-android-emulator-pod (pod) — Android 16 emulator (/dev/kvm) + adb/appium
#   check-openclaw-pod         (pod) — minimal openclaw gateway on the cachyos base
#   check-openclaw-full-pod    (pod) — maximal openclaw-full on cachyos (AUR chrome,
#                                     gogcli@latest, ffmpeg/sqlite arch coverage)
#   check-openclaw-desktop-pod (pod) — all-in-one: selkies desktop + openclaw-full
#                                     (claude-code/codex/gemini) + CPU ollama +
#                                     nested charly toolchain (charly+container-nesting)
#
# Zero-operator-side-effect: pod beds → rootless podman; check-k3s-vm → libvirt
# qcow2; check-local → a disposable scratch dir. No test writes to ~/.local/bin,
# ~/.config/opencharly, /etc, /usr, or any operator-side directory.
# =============================================================================
# check-k3s-vm — disposable libvirt VM running k3s-server. Kubeconfig is
# pulled back for host-side k8s: probes (all 13 methods) via the forwarded
# :6443. A VM (native kernel + cgroup tree) sidesteps the rootless-podman
# cpuset-delegation blocker that makes a pod-hosted k3s impossible.
# References the vm: entity `k3s-vm` (defined below).
check-k3s-vm:
    vm:
        from: k3s-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole deterministic proof of the VmDeployTarget->k8s end-to-end path and the full 13-method k8s probe surface against a real k3s control plane, and the R10 for ssh.port_auto. A disposable libvirt Arch cloud VM (host 16443->guest 6443 forward, charly installed via cloud-init) overlays k3s-server over SSH, then runs guest command/process/port/file probes plus the full k8s suite (nodes/wait-nodes/pods/wait-ready/addons/ingressclass/storageclass/raw/service) against cluster vm-k3s-vm, an agent-check matching probe, and a host-side charly status --json (status-shows-vm).
    check-k3s-vm-add_candy:
        add_candy:
            - k3s-server
    check-k3s-vm-env:
        env:
            - K3S_SERVER_HOSTNAME=127.0.0.1
            # Host port 16443 forwards into the guest's :6443; the retrieved
            # kubeconfig's server: line is rewritten to this URL.
            - K3S_KUBECONFIG_SERVER=https://127.0.0.1:16443
    check-k3s-vm-install_opts:
        install_opts:
            with_service: true
            allow_repo_changes: true # pacman sync / repo key import
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
    kv-guest-identity:
        check: command=id
        id: kv-guest-identity
        stdout: {contains: "uid=1000(arch)"}
        context: [runtime]
        plugin: command
        plugin_input:
            command: id
    kv-guest-os-release:
        check: command=cat /etc/os-release
        id: kv-guest-os-release
        stdout: {contains: "ID=arch"}
        context: [runtime]
        plugin: command
        plugin_input:
            command: "cat /etc/os-release"
    kv-k3s-process:
        check: process=k3s-server
        id: kv-k3s-process
        context: [runtime]
        plugin: process
        plugin_input:
            process: "k3s-server"
            running: true
    kv-port-6443-listening:
        check: port=6443
        id: kv-port-6443-listening
        context: [runtime]
        plugin: port
        plugin_input:
            port: 6443
            listening: true
    kv-kubeconfig-file:
        check: file=/etc/rancher/k3s/k3s.yaml
        id: kv-kubeconfig-file
        context: [runtime]
        plugin: file
        plugin_input:
            file: /etc/rancher/k3s/k3s.yaml
            exists: true
    kv-k8s-nodes:
        check: k8s=nodes
        id: kv-k8s-nodes
        kube: nodes
        cluster: "vm-k3s-vm"
        context: [runtime]
    kv-k8s-wait-nodes:
        check: k8s=wait-nodes
        id: kv-k8s-wait-nodes
        kube: "wait-nodes"
        cluster: "vm-k3s-vm"
        kube_count: 1
        timeout: "300s"
        context: [runtime]
    kv-k8s-pods:
        check: k8s=pods
        id: kv-k8s-pods
        kube: pods
        cluster: "vm-k3s-vm"
        namespace: kube-system
        context: [runtime]
    kv-k8s-wait-ready:
        check: k8s=wait-ready
        id: kv-k8s-wait-ready
        kube: "wait-ready"
        cluster: "vm-k3s-vm"
        kube_kind: Deployment
        namespace: kube-system
        name: coredns
        timeout: "180s"
        context: [runtime]
    kv-k8s-addons:
        check: k8s=addons
        id: kv-k8s-addons
        kube: addons
        cluster: "vm-k3s-vm"
        context: [runtime]
    kv-k8s-ingressclass-traefik:
        check: k8s=ingressclass
        id: kv-k8s-ingressclass-traefik
        kube: ingressclass
        cluster: "vm-k3s-vm"
        stdout: {contains: "traefik"}
        context: [runtime]
    kv-k8s-storageclass-localpath:
        check: k8s=storageclass
        id: kv-k8s-storageclass-localpath
        kube: storageclass
        cluster: "vm-k3s-vm"
        stdout: {contains: "local-path"}
        context: [runtime]
    kv-k8s-raw:
        check: k8s=raw — the raw escape hatch lists an arbitrary resource (namespaces)
        id: kv-k8s-raw
        kube: raw
        cluster: "vm-k3s-vm"
        kube_resource: namespaces
        context: [runtime]
        stdout:
            - contains: kube-system
    kv-k8s-service-kubernetes:
        check: k8s=service
        id: kv-k8s-service-kubernetes
        kube: service
        cluster: "vm-k3s-vm"
        namespace: default
        name: kubernetes
        context: [runtime]
    kv-charly-version:
        check: command=/tmp/charly-build/charly version || charly version
        id: kv-charly-version
        stdout: {matches: "[0-9]{4}\\.[0-9]+"}
        context: [runtime]
        plugin: command
        plugin_input:
            command: "/tmp/charly-build/charly version || charly version"
            in_container: false
    kv-matching:
        agent-check: agent-check
        id: kv-matching
        context: [runtime]
    status-shows-vm:
        check: command=charly status --json
        id: status-shows-vm
        stdout:
            - contains: '"kind": "vm"'
            - contains: k3s-vm
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly status --json
            in_container: false
check-local:
    local:
        from: check-local-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the kind:local layer-application path via ShellExecutor + HostDeployTarget, and the fastest bed. Applies check-local-layer to the operator host (host: local), dropping /etc/check-local-marker, then runs host-side command/file probes plus charly status --json asserting kind:local + source:ledger (status-shows-local). ALSO the witness for the STEP DEPLOY-EXECUTE leg of external plugin execution: add_candy composes examplestep-deploy-consumer (a DEPLOY-context `run: plugin: examplestep` step) + plugin-example-step (the out-of-tree examplestep verb), so at local deploy charly lowers the run-step to an ExternalPluginStep and Invokes the plugin's OpExecute over the E3b ExecutorService reverse channel — the plugin writes /tmp/charly-examplestep/examplestep-deploy/{applied,probe} on the host venue and returns a plugin-script reverse op the host records; the fresh-rebuild (charly update) re-applies idempotently and teardown (charly bundle del) replays the recorded reverse op so the markers are gone (zero operator side-effect). The deploy-context counterpart of check-pod's build-context examplestep-build-baked.
    check-local-add_candy:
        add_candy:
            # The out-of-tree examplestep verb (host-built + connected out-of-process via
            # loadDeployPlugins) and its DEPLOY-context consumer step — drives the STEP
            # DEPLOY-EXECUTE leg over the E3b reverse channel (ExternalPluginStep).
            - plugin-example-step
            - examplestep-deploy-consumer
    status-shows-local:
        check: command=charly status --json
        id: status-shows-local
        stdout:
            # local deploy-ids are content hashes (not the bed name), so assert
            # the substrate renders via the kind discriminator + ledger source.
            - contains: '"kind": "local"'
            - contains: '"source": "ledger"'
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly status --json
            in_container: false
    examplestep-deploy-marker:
        check: the external examplestep verb-as-step EXECUTED at local deploy — its OpExecute wrote the probe marker on the host venue over the E3b reverse channel (proves ExternalPluginStep → InvokeWithExecutor(OpExecute))
        id: examplestep-deploy-marker
        stdout:
            - contains: EXAMPLESTEP-DEPLOY-PROBE-PRESENT
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "test -f /tmp/charly-examplestep/examplestep-deploy/probe && echo EXAMPLESTEP-DEPLOY-PROBE-PRESENT"
            in_container: false
# External (out-of-process) deploy-target lifecycle witness over the E3b reverse
# channel. The substrate is the `exampledeploy` word served by the out-of-tree
# candy/plugin-example-deploy (recognized at parse time via the plugin-declaration
# pre-scan, connected at deploy time via loadDeployPlugins). Add Invokes the plugin
# out-of-process; it dials back through the SDK Executor to write markers on the host
# venue under a disposable /tmp scratch dir, and returns a plugin-script reverse op
# the host records + replays at teardown. Zero operator side-effect (markers under
# /tmp, removed by `charly bundle del`).
check-exampledeploy:
    exampledeploy:
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the external (out-of-process) deploy-target lifecycle (Add/Test/Update/Del) over the E3b ExecutorService reverse channel. Composes plugin-example-deploy as an external deploy: substrate; Add Invokes the host-built plugin out-of-process, which dials back through the SDK Executor to write an apply marker + a probe marker on the host venue under a disposable /tmp scratch dir; a host-side command probe asserts the probe marker; the fresh-rebuild (charly update) re-applies idempotently; teardown (charly bundle del) replays the recorded plugin-script reverse op so the markers are gone (zero operator side-effect).
    check-exampledeploy-add_candy:
        add_candy:
            - plugin-example-deploy
    exampledeploy-applied:
        check: command=test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT
        id: exampledeploy-applied
        description: the external deploy plugin applied its probe marker on the host venue via the E3b reverse channel
        stdout:
            - contains: EXAMPLEDEPLOY-PROBE-PRESENT
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT"
            in_container: false
# pac localpkg AUTO-RESOLVE witness against the LOCAL charly candy (no @github):
# deploys candy/charly to a disposable Arch Cloud VM, where the layer's localpkg
# builds the opencharly-git package from pkg/arch (makepkg on the host) and
# `pacman -U`'s it onto the guest — pacman -U AUTO-RESOLVES the mandatory repo
# deps. This is main's own live proof of the localpkg DEPLOY path (the rpm/deb
# legs are proven by the fedora/debian/ubuntu submodule VM beds).
check-charly-vm:
    vm:
        from: charly-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the pac localpkg DEPLOY auto-resolve path on Arch — opencharly-git built via makepkg and installed with pacman -U auto-resolving the mandatory repo deps. A disposable libvirt Arch cloud VM (ssh.port_auto) overlays the LOCAL candy/charly whose localpkg builds opencharly-git on the host and pacman -U's it into the guest; one command probe asserts opencharly-git/podman/libvirt/tailscale/gocryptfs present, charly resolves to /usr/bin/charly, and charly version runs (LOCALPKG-PAC-AUTORESOLVE-OK).
    check-charly-vm-add_candy:
        add_candy:
            - charly
    check-charly-vm-install_opts:
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
    localpkg-pac-autoresolve:
        check: |
            command=pacman -Q opencharly-git >/dev/null 2>&1 &&
            pacman -Q podman >/dev/null 2>&1 &&
            pacman -Q libvirt >/dev/null 2>&1 &&
            pacman -Q tailscale >/dev/null 2>&1 &&
            pacman -Q gocryptfs >/dev/null 2>&1 &&
            test "$(command -v charly)" -ef /usr/bin/charly &&
            charly version &&
            echo LOCALPKG-PAC-AUTORESOLVE-OK
        id: localpkg-pac-autoresolve
        description: charly installed as the opencharly-git pacman package via localpkg, mandatory repo deps auto-resolved by pacman -U
        stdout:
            - contains: LOCALPKG-PAC-AUTORESOLVE-OK
        exit_status: 0
        context:
            - runtime
        plugin: command
        plugin_input:
            command: |
                pacman -Q opencharly-git >/dev/null 2>&1 &&
                pacman -Q podman >/dev/null 2>&1 &&
                pacman -Q libvirt >/dev/null 2>&1 &&
                pacman -Q tailscale >/dev/null 2>&1 &&
                pacman -Q gocryptfs >/dev/null 2>&1 &&
                test "$(command -v charly)" -ef /usr/bin/charly &&
                charly version &&
                echo LOCALPKG-PAC-AUTORESOLVE-OK
charly-cli:
    group:
        description: AI check — an agent operates the charly management command surface (build → deploy → status) end-to-end.
    charly-cli-iterate:
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — a fresh per-run clone of the OpenCharly
                project, bind-mounted into this freshly-rebuilt ${TARGET_NAME}. You
                have FULL sudo + nested podman + the `charly` CLI. Host services are
                invisible; you cannot conflict with them.

                == Bed purpose ==
                This bed proves an agent can OPERATE the charly management command
                surface end-to-end. Use `charly box build os` to build the `os` image,
                then `charly bundle add os os` (or `charly start os`) to bring it up as a
                running pod, and `charly status` to confirm it. The bed's `check:` steps
                assert the `os` pod is running with its predetermined marker file —
                satisfy them by driving the real charly commands, not by hand-crafting
                state. The full `charly` CLI + the MCP surface (`charly mcp serve` on
                ${TARGET_NAME}) are available; how you satisfy the spec is your call.
            note: false
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
    os:
        pod:
            agent_provisioned: true
        charly-cli-step-0:
            check: the os pod the agent built with `charly box build` + started with charly is running
            plugin: process
            plugin_input:
                process: supervisord
                running: true
        charly-cli-step-1:
            check: the built os image's predetermined marker file is present
            plugin: file
            plugin_input:
                file: /etc/charly-os-marker
                contains: ["charly-os-content-marker"]
default:
    group:
        description: Default benchmark — progressive verb-coverage curriculum across the full `charly check` surface (system state → network → cross-pod → MCP → Kubernetes → desktop → VM → nested).
    default-iterate:
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — the project tree, bind-mounted from the host
                into this freshly-rebuilt ${TARGET_NAME}. You have FULL sudo + nested
                podman + every package the plan needs. Host services are completely
                invisible; you cannot conflict with them.

                Your `/workspace` is a fresh per-run clone of the OpenCharly
                source repository — the full git tree (with submodules
                initialized), the `charly` CLI binary, and every layer, image,
                pod, VM, and Kubernetes cluster definition the project
                already ships (`candy/`, `box/<name>/charly.yml`, plus the
                pod/vm/k8s/check kinds inline in `charly.yml`). Your session has the project's plugin skills
                loaded (`/charly-check:check`, `/charly-core:deploy`, `/charly-image:image`, `/charly-image:layer`,
                `/charly-build:build`, plus per-pod plugins (`/charly-jupyter:*`, `/charly-coder:*`, etc.) and foundation plugins (`/charly-distros:*`, `/charly-infrastructure:*`, `/charly-tools:*`), …). All of these
                are available to be used if you decide to do so — they may
                be useful for most of the steps. The plan specifies
                what each pod must do; how you satisfy each specification
                is entirely your call.

                == Phase progression — curriculum-style ==
                ${PHASE_INTRO}
                You are in PHASE ${PHASE} of ${PHASE_TOTAL}. The benchmark adds one
                include: block per phase: phase 1 starts with the easiest, each later phase
                brings the previous plan segments BACK plus one new one. State persists
                across phases — pods you deployed in phase 1 stay running for phase
                2's scoring. Several later plan segments EXPLICITLY consume earlier
                phases' fixtures (phase 6 and phase 7 both reach back to phase 2's
                HTTP fixture across the pod network) — keeping every phase's pods
                healthy is part of the contract.

                == Iteration semantics within this phase — NO RUSHING ==
                Iteration ${ITERATION} of an UNBOUNDED loop within phase ${PHASE}.
                Score progression: ${BEST_SCORE} (last delta: ${SCORE_DELTA})

                The phase ends when:
                  - every in-scope check: step passes (solved-all → next phase begins), OR
                  - you fail to improve your score for ${PLATEAU_ITERATION} iterations
                    in a row (genuine plateau → next phase begins anyway).

                There is NO maximum iteration count per phase. Take all the time you
                need. A complete solution in iteration 7 outscores a partial solution
                in iteration 1. Correctness > speed. NO shortcuts. NO "ship something
                and hope" — every check the harness probes you can re-probe
                yourself the same way before exiting.

                == Plan you must solve — IN-SCOPE FOR THIS PHASE ==
                ${PLAN}

                The plan is a TREE of agent-provisioned nodes: each node's NAME
                is the container you must deploy, and the steps nested under it
                run in that container — the step's venue comes from its TREE
                POSITION, not a `pod:` field. Read the tree; collect the node
                names; deploy a container named `charly-<node>` for each. A nested
                node (`a.b.c`) is a container deployed inside its parent (reached
                by a dotted venue). Some `include:` steps splice fixture plans
                whose nodes (e.g. `charly-web`) are reached from other nodes'
                steps across the pod network — those fixtures must remain running
                across phases.

                Some steps carry `depends_on: [...]` — they only run after the
                named upstream steps pass. If you see a step marked
                `verdict: skipped` with `skipped_reason: "dep-unmet: <name>"`, the
                upstream <name> failed; fix that one first.

                Notes: ${NOTES}

                == Ground rules ==
                  - The bed's plan steps are immutable — they live in the check: block of the project charly.yml.
                  - The ${TARGET_NAME} sandbox was rebuilt FRESH for this run; it persists
                    across iters but is destroyed + recreated NEXT run.
                  - Every pod a step references MUST be running at exit (that's
                    what gets scored). Fixtures from earlier phases must STAY
                    running for later phases' consumer probes.
                  - There is NO premium on speed. There IS a premium on every
                    check: step you can make pass.

                == How harness scoring relates to your iteration ==
                The harness scorer is AUTHORITATIVE. At iter end it physically
                re-runs every probe against the live system EXCEPT for the
                state-dependent capture probes listed below — for those, the
                harness validates the artifact YOUR iteration produced (the file
                at the step's `artifact:` path), with a strict mtime freshness
                check that rejects pre-staged or stale files.

                Re-run by harness independently (you cannot influence the verdict):
                  - Status / evaluation / listing verbs (cdp:status, cdp:eval,
                    wl:status, libvirt:info, libvirt:domain-xml, libvirt:guest/
                    ping, libvirt:guest/exec, k8s:nodes/wait-ready/addons/raw,
                    mcp:ping/list-tools/call/read, dbus:list/call/notify).
                  - File / process / package / port / service / command /
                    matching / http / dns / addr / interface / mount / kernel-
                    param / user / group probes.
                  - All deploy-tree resolution probes.

                Validates YOUR iteration's artifact (state-dependent capture only):
                  - cdp:screenshot, wl:screenshot, vnc:screenshot,
                    libvirt:screenshot, spice:screenshot, spice:cursor, record:stop.
                  - For these the harness validates artifact_min_bytes /
                    artifact_min_dimensions / artifact_not_uniform /
                    artifact_min_cast_events against the file at the step-
                    declared `artifact:` path, with mtime ≥ iter start.

                == MANDATORY before exiting this iteration ==
                Run `charly check self-evaluate` and read its output BEFORE you
                exit. It runs every in-scope probe against live systems via the
                SAME code path the harness scorer will invoke at iter end. The
                verdict it prints (pass / fail / skipped per step) is what
                the harness will record.

                Why this is mandatory: for state-dependent capture probes,
                self-evaluate's invocation IS what writes the canonical artifact
                the harness then validates. Skipping self-evaluate means missing
                or stale artifacts → those steps fail. For other probes,
                self-evaluate gives you a chance to see the harness's verdict
                and fix your deployment BEFORE the iter ends.

                Do not consider the iteration complete until self-evaluate
                prints the verdict you intended.

                == When a source-code fix can't apply mid-run ==
                The harness loop runs as a long-lived Go process (PID inside
                ${TARGET_NAME}). Source fixes you make to /workspace/charly/*.go and
                rebuilds appear on disk via the bind-mount, BUT the running
                harness PID has the OLD binary mmap'd and CANNOT hot-reload Go
                code. Your fix takes effect on the NEXT harness run — not the
                current one. Recommended response: record the fix in your
                iteration notes and exit this iteration cleanly; the next run
                will fork a fresh PID and pick up the new binary. Do NOT loop
                iterations 3+ trying to make the running PID see your on-disk
                fix; the score won't change this run.
            note: true
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
