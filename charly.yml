# (candy/plugin-doctor, command:doctor) — the FIFTH welded-command externalization.
# A disposable kind:local deploy on host: local that runs the deterministic `charly doctor`
# host-side:
#   - `charly doctor` → exits 0 and prints the host-dependency report; the externalized command
#     resolves the `doctor` word via the discovered candy/plugin-doctor prescan, syscall.Exec's
#     the plugin binary (host-built, or baked at /usr/lib/charly/plugins by pkg/arch), and the
#     plugin raw-forwards to the hidden in-core `charly __doctor` command, whose DoctorCmd.Run
#     handler drives the package-main host-detection symbols (credentialHealth / DetectGPU /
#     DetectVFIO …) that cannot cross the process boundary. The output is asserted to contain the
#     stable "Container Engine" group header (always printed), proving the externalized command +
#     the hidden-command raw-forward dispatch end-to-end. `charly doctor` exits 0 whenever a
#     container engine (podman/docker) is present — the sole required group — which holds on any
#     charly host, so the bed's exit-0 assertion is deterministic.
# =================================================================
check-doctor-app:
    local:
        description: |-
            Minimal kind:local template for the check-doctor-local bed — composes the
            command-only candy/plugin-doctor (no install content) so the bed exercises the
            externalized `charly doctor` CLI host-side.
