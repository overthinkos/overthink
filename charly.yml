scaffolding-selftest:
    group:
        description: End-to-end self-test of the harness benchmark scaffolding chain — loader + composition + cross-namespace deps + live scoring against AI-deployed pods.
    scaffolding-selftest-iterate:
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — the project tree, bind-mounted from the
                host into this freshly-rebuilt ${TARGET_NAME}. You have FULL sudo +
                nested podman + every package the plan needs. Host services are
                completely invisible; you cannot conflict with them.

                Your `/workspace` is a fresh per-run clone of the OpenCharly
                source repository — the full git tree (with submodules
                initialized), the `charly` CLI binary, and every layer, image,
                pod, VM, and Kubernetes cluster definition the project
                already ships (`candy/`, `box/<name>/charly.yml`, plus the
                pod/vm/k8s/check kinds inline in `charly.yml`). Your session has the project's plugin skills
                loaded (`/charly-check:check`, `/charly-core:deploy`, `/charly-image:image`, `/charly-image:layer`,
                `/charly-build:build`, plus per-pod plugins (`/charly-jupyter:*`, `/charly-coder:*`, etc.) and foundation plugins (`/charly-distros:*`, `/charly-infrastructure:*`, `/charly-tools:*`), …). All of these
                are available to be used if you decide to do so — they may
                be useful for most of the steps. The plan specifies
                what each pod must do; how you satisfy each specification
                is entirely your call.

                == Bed purpose ==
                This bed's single plan exercises the harness scaffolding chain
                end-to-end: the plan loader, the `include: <kind>:<name>` composition step,
                the tag/id filter pipeline, the
                cross-namespace `depends_on:` resolver, AND the live-state scoring
                path. To prove every link works, the included probes must run AND
                turn green — which requires you to deploy the pods the plan's
                steps target, with the binaries, files, and modes those
                probes assert against.

                == Iteration semantics — NO RUSHING ==
                Iteration ${ITERATION} of an UNBOUNDED loop. Score progression:
                ${BEST_SCORE} (last delta: ${SCORE_DELTA}). The run ends when
                every check: step passes (solved-all) OR when you fail to improve
                for ${PLATEAU_ITERATION} iterations in a row (plateau). There is
                NO maximum iteration count. Take the time you need. Correctness
                over speed.

                == Plan in scope ==
                ${PLAN}

                The plan is a TREE of agent-provisioned nodes: each node's NAME
                is the container you must deploy, whose filesystem satisfies the
                probes nested under it — the step's venue comes from its TREE
                POSITION, not a `pod:` field. Read the tree; collect the node
                names; deploy a container named `charly-<node>` for each. Some
                steps carry `depends_on: [...]` — they only run after the
                named upstream steps pass.

                == Ground rules ==
                  - The bed's plan steps are immutable — they live in the check: block of the project charly.yml.
                  - Every pod a step references MUST be running at exit
                    (that's what gets scored).
                  - Included probes are scored identically to hand-written
                    probes — one check: step = one point.

                == When a source-code fix can't apply mid-run ==
                The harness loop runs as a long-lived Go process. Source fixes
                to /workspace/charly/*.go appear on disk via the bind-mount but the
                running harness PID has the OLD binary mmap'd and CANNOT
                hot-reload Go code. Your fix takes effect on the NEXT harness
                run, not the current one. Record the fix in your iteration
                notes and exit cleanly; the next run picks up the new binary.
            note: false
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
    composition-app:
        pod:
            agent_provisioned: true
        scaffolding-selftest-step-0:
            include: candy:sshd
        scaffolding-selftest-step-1:
            include: box:fedora.composition-source
        scaffolding-selftest-step-2:
            check: a marker file written during the composition self-test is present
            plugin: file
            plugin_input:
                file: /etc/charly-composition-selftest
                exists: true
