scaffolding-selftest:
    group:
        description: End-to-end self-test of the harness benchmark scaffolding chain — loader + composition + cross-namespace deps + live scoring against AI-deployed pods.
    scaffolding-selftest-iterate:
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — the project tree, bind-mounted from the
                host into this freshly-rebuilt ${TARGET_NAME}. You have FULL sudo +
                nested podman + every package the plan needs. Host services are
                completely invisible; you cannot conflict with them.

                Your `/workspace` is a fresh per-run clone of the OpenCharly
                source repository — the full git tree (with submodules
                initialized), the `charly` CLI binary, and every layer, image,
                pod, VM, and Kubernetes cluster definition the project
                already ships (`candy/`, `box/<name>/charly.yml`, plus the
                pod/vm/k8s/check kinds inline in `charly.yml`). Your session has the project's plugin skills
                loaded (`/charly-check:check`, `/charly-core:deploy`, `/charly-image:image`, `/charly-image:layer`,
                `/charly-build:build`, plus per-pod plugins (`/charly-jupyter:*`, `/charly-coder:*`, etc.) and foundation plugins (`/charly-distros:*`, `/charly-infrastructure:*`, `/charly-tools:*`), …). All of these
                are available to be used if you decide to do so — they may
                be useful for most of the steps. The plan specifies
                what each pod must do; how you satisfy each specification
                is entirely your call.

                == Bed purpose ==
                This bed's single plan exercises the harness scaffolding chain
                end-to-end: the plan loader, the `include: <kind>:<name>` composition step,
                the tag/id filter pipeline, the
                cross-namespace `depends_on:` resolver, AND the live-state scoring
                path. To prove every link works, the included probes must run AND
                turn green — which requires you to deploy the pods the plan's
                steps target, with the binaries, files, and modes those
                probes assert against.

                == Iteration semantics — NO RUSHING ==
                Iteration ${ITERATION} of an UNBOUNDED loop. Score progression:
                ${BEST_SCORE} (last delta: ${SCORE_DELTA}). The run ends when
                every check: step passes (solved-all) OR when you fail to improve
                for ${PLATEAU_ITERATION} iterations in a row (plateau). There is
                NO maximum iteration count. Take the time you need. Correctness
                over speed.

                == Plan in scope ==
                ${PLAN}

                The plan is a TREE of agent-provisioned nodes: each node's NAME
                is the container you must deploy, whose filesystem satisfies the
                probes nested under it — the step's venue comes from its TREE
                POSITION, not a `pod:` field. Read the tree; collect the node
                names; deploy a container named `charly-<node>` for each. Some
                steps carry `depends_on: [...]` — they only run after the
                named upstream steps pass.

                == Ground rules ==
                  - The bed's plan steps are immutable — they live in the check: block of the project charly.yml.
                  - Every pod a step references MUST be running at exit
                    (that's what gets scored).
                  - Included probes are scored identically to hand-written
                    probes — one check: step = one point.

                == When a source-code fix can't apply mid-run ==
                The harness loop runs as a long-lived Go process. Source fixes
                to /workspace/charly/*.go appear on disk via the bind-mount but the
                running harness PID has the OLD binary mmap'd and CANNOT
                hot-reload Go code. Your fix takes effect on the NEXT harness
                run, not the current one. Record the fix in your iteration
                notes and exit cleanly; the next run picks up the new binary.
            note: false
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
    composition-app:
        pod:
            agent_provisioned: true
        scaffolding-selftest-step-0:
            include: candy:sshd
        scaffolding-selftest-step-1:
            include: box:fedora.composition-source
        scaffolding-selftest-step-2:
            check: a marker file written during the composition self-test is present
            plugin: file
            plugin_input:
                file: /etc/charly-composition-selftest
                exists: true
# =================================================================
# check-local — per-kind R10 smoke template for kind:local.
# Applied via the check-local bed (kind:check) in this file's check: block. Single layer
# (check-local-layer) drops a marker file the deploy-scope check probe
# verifies on the host (not in a container).
# =================================================================
check-local-app:
    local:
        description: |-
            Fast check bed for kind:local layer-application smoke
            Minimal kind:local template applying check-local-layer to the operator's host.
    check-local-candy:
        candy:
            - check-local-layer
    check-local-marker:
        check: command=test -f /etc/check-local-marker
        id: check-local-marker
        context:
            - runtime
        plugin: command
        plugin_input:
            command: "test -f /etc/check-local-marker"
            in_container: false
# =================================================================
# check-udev-local — R10 witness for the externalized `charly udev` COMMAND
# (candy/plugin-udev, command:udev) — the first externalizable-command precedent.
# A disposable kind:local deploy on host: local that runs the two GPU-less,
# deterministic udev sub-commands host-side:
#   - `charly udev generate` → asserts the exact 99-charly-container-access rule lines on stdout
#   - `charly udev status`   → exits 0 (graceful device + rule report on a GPU-less host)
# The host `charly` resolves the `udev` word via the discovered candy/plugin-udev
# prescan and syscall.Exec's the plugin binary (host-built, or baked at
# /usr/lib/charly/plugins by pkg/arch). install/remove (sudo + udevadm, host-mutating)
# stay out of the bed — the Go e2e (TestExternalCommandExecPlan_Udev) + plugin-udev's
# build-context ADE check cover the dispatch + module-builds legs.
# =================================================================
check-udev-app:
    local:
        description: |-
            Minimal kind:local template for the check-udev-local bed — composes the
            command-only candy/plugin-udev (no install content) so the bed exercises the
            externalized `charly udev` CLI host-side.
    check-udev-candy:
        candy:
            - plugin-udev
check-udev-local:
    local:
        from: check-udev-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the externalized `charly udev` COMMAND (candy/plugin-udev,
            command:udev), the first externalizable-command precedent in the
            core-externalization program. A disposable kind:local deploy on host: local runs
            the two GPU-less udev sub-commands host-side: `charly udev generate` asserts the
            exact 99-charly-container-access rule lines on stdout (the host charly resolves the
            `udev` word via the discovered candy/plugin-udev prescan and syscall.Exec's the
            plugin binary), and `charly udev status` exits 0 with a graceful device + rule
            report on a GPU-less host.
    udev-generate-rules:
        check: command=charly udev generate prints the exact 99-charly-container-access rule lines
        id: udev-generate-rules
        stdout:
            - contains: 'SUBSYSTEM=="drm", KERNEL=="card[0-9]*", GROUP="render", MODE="0660"'
            - contains: 'SUBSYSTEM=="kfd", KERNEL=="kfd", GROUP="render", MODE="0660"'
            - contains: 'SUBSYSTEM=="vfio", GROUP="kvm", MODE="0660"'
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly udev generate
            in_container: false
    udev-status-runs:
        check: command=charly udev status exits 0 and reports device + rule status (GPU-less graceful)
        id: udev-status-runs
        exit_status: 0
        stdout:
            - contains: 'GPU Devices:'
            - contains: 'Udev Rules:'
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly udev status
            in_container: false

# =================================================================
# check-preempt-local — R10 witness for the externalized `charly preempt` COMMAND
# (candy/plugin-preempt, command:preempt) — the SECOND welded-command externalization.
# A disposable kind:local deploy on host: local that runs the GPU-less, deterministic
# `charly preempt status` host-side:
#   - `charly preempt status` → exits 0 and (on a fresh, lease-free bed host) prints
#     "No active preemption leases." — proving the externalized command + the hidden-command
#     shell-back dispatch end-to-end: the host charly resolves the `preempt` word via the
#     discovered candy/plugin-preempt prescan, syscall.Exec's the plugin binary (host-built,
#     or baked at /usr/lib/charly/plugins by pkg/arch), and the plugin shells back to the
#     in-core arbiter via `charly __preempt-status` (newResourceArbiter().Status()).
# `restore` needs a live GPU-preemption scenario (a running preemptible holder + an exclusive
# claimant) — out of scope for this bed; its dispatch is covered by the Go e2e
# (TestExternalCommandExecPlan_Preempt) + the hidden-command arbiter test
# (TestPreemptStatusInternal_RendersArbiterLeases).
# =================================================================
check-preempt-app:
    local:
        description: |-
            Minimal kind:local template for the check-preempt-local bed — composes the
            command-only candy/plugin-preempt (no install content) so the bed exercises the
            externalized `charly preempt` CLI host-side.
    check-preempt-candy:
        candy:
            - plugin-preempt
check-preempt-local:
    local:
        from: check-preempt-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the externalized `charly preempt` COMMAND (candy/plugin-preempt,
            command:preempt), the second welded-command externalization in the
            core-externalization program. A disposable kind:local deploy on host: local runs
            `charly preempt status` host-side: the host charly resolves the `preempt` word via
            the discovered candy/plugin-preempt prescan and syscall.Exec's the plugin binary,
            which shells back to the in-core resource arbiter via the hidden
            `charly __preempt-status` verb (newResourceArbiter().Status()). On a fresh, GPU-less,
            lease-free bed host the command exits 0 and reports no active preemption leases —
            proving the externalized command + the hidden-command shell-back dispatch end-to-end.
    preempt-status-runs:
        check: command=charly preempt status exits 0 and reports a clean arbiter (no active leases) on a fresh GPU-less host
        id: preempt-status-runs
        exit_status: 0
        stdout:
            - contains: 'No active preemption leases.'
        context:
            - runtime
        plugin: command
        plugin_input:
            command: charly preempt status
            in_container: false

# =================================================================
