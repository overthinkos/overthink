// The charly plugin gRPC contract.
//
// Design (matches the unified Provider model in charly/provider.go): the wire
// carries JSON payloads for the domain types (Op / CheckResult / InstallPlan /
// decoded entities) so the generated `spec` Go structs stay the SINGLE source of
// truth — there is no parallel proto type system to drift (R3). Only the
// control / streaming / handshake envelopes are typed proto.
//
// ONE Provider service mirrors the ONE in-proc Provider interface: a uniform
// Invoke(reserved-word, op, params) keyed by reserved word, plus a streaming
// form for the genuinely-streaming verbs (record / logcat / execute). PluginMeta
// is read once on connect for capability advertisement + CalVer gating.
syntax = "proto3";
package charlyplugin;
option go_package = "github.com/overthinkos/overthink/charly/plugin/proto";

message Empty {}

// PluginMeta — read once on connect.
service PluginMeta {
  rpc Describe(Empty) returns (Capabilities);
}
message Capabilities {
  string calver = 1;                        // the plugin's CalVer (CalVer is the version authority)
  uint32 protocol_version = 2;              // thin secondary gate; never duplicates CalVer
  repeated ProvidedCapability provided = 3; // the unit's capabilities + the def validating each input
  string schema_cue = 4;                    // the unit's package-less, SELF-CONTAINED .cue source text
}

// ProvidedCapability — one served capability plus the CUE def that validates its
// plugin_input. The schema travels with the plugin over Describe (the same channel
// for in-proc builtin and out-of-proc external — zero distinction), so the host
// validates authored plugin_input against `base ++ served` without ever reading a
// candy's schema/ dir. `input_def` is explicit (no Title-case naming convention).
message ProvidedCapability {
  string class = 1;       // "verb" / "kind" / "deploy" / "step" / "builder"
  string word = 2;        // the reserved word, e.g. "externalprobe"
  string input_def = 3;   // the CUE def for this word's plugin_input, e.g. "#ExternalprobeInput"
}

// Provider — the ONE uniform capability service. `reserved` is the reserved word
// (the registry key); `op` selects the operation for that word's class
// (load/validate/run/emit/render/resolve); params_json + env_json carry the
// CUE-typed params + the serializable invocation context (snapshotCheckEnv).
service Provider {
  rpc Invoke(InvokeRequest) returns (InvokeReply);          // single-shot (the common path)
  rpc InvokeStream(InvokeRequest) returns (stream Frame);   // streaming (record/logcat/execute)
}
message InvokeRequest {
  string reserved = 1;     // the reserved word, e.g. "exampleprobe","cdp","local"
  string op = 2;           // operation selector for the word's class
  bytes  params_json = 3;  // the CUE-generated params (Op for verbs/steps; entity for kinds)
  bytes  env_json = 4;     // snapshotCheckEnv / venue descriptor (serializable invocation ctx)
  string class = 5;        // the ProviderClass ("verb"/"kind"/...) — words aren't unique across classes
  uint32 executor_broker_id = 6; // E3b: the go-plugin broker id the host serves ExecutorService on for a deploy/step/builder op; 0 = none (verb/kind ops need no executor)
}
message InvokeReply { bytes result_json = 1; }   // CheckResult / InstallPlan / Diagnostics, JSON
message Frame       { bytes result_json = 1; }   // one streamed result frame (single-shot sends one)

// ExecutorService — the HOST-SERVED reverse channel (E3b). A provider's live
// DeployExecutor (shell/SSH on the venue) cannot cross the process boundary, so an
// OUT-OF-PROCESS provider drives it by calling BACK to the host: the host serves this
// service on the go-plugin GRPCBroker, passes its broker id in
// InvokeRequest.executor_broker_id, and the plugin dials that id to run ops against the
// real venue. Built-in providers use the typed DeployExecutor directly (no wire).
// RunSystem/RunUser/Venue are the deploy/step/builder legs (fire-a-script, error-only);
// PutFile is the deploy/step file-PLACEMENT leg — an out-of-process deploy/step plugin
// that EXECUTES an InstallPlan's steps pushes file content (units, env.d, the charly
// binary, builder artifacts) onto the venue, the kit.Executor.PutFile surface made
// wire-backed (the host materializes the carried bytes to a temp file, then delegates
// to the live DeployExecutor.PutFile). RunCapture/GetFile are the CHECK-VERB legs — an
// out-of-process exec-based check verb (record — and dbus/wl when they externalize)
// probes the live container by capturing stdout/stderr/exit or pulling a venue file (a
// screenshot/recording artifact), the kit.Executor.RunCapture/GetFile surface made
// wire-backed.
service ExecutorService {
  rpc Venue(Empty) returns (VenueReply);
  rpc RunSystem(RunRequest) returns (RunReply);
  rpc RunUser(RunRequest) returns (RunReply);
  rpc PutFile(PutFileRequest) returns (PutFileReply);    // place file content on the venue (binary-safe; owner_root → root:root via sudo)
  rpc RunCapture(RunRequest) returns (CaptureReply);     // capture stdout/stderr/exit (no root escalation — callers add sudo)
  rpc GetFile(GetFileRequest) returns (GetFileReply);    // read a venue file (e.g. a record/screenshot artifact pulled back to the host)
}
message VenueReply { string venue = 1; }
message RunRequest { string script = 1; bytes opts_json = 2; } // opts_json = EmitOpts, JSON
message RunReply   { string error = 1; }                       // empty error = success
message PutFileRequest { string path = 1; bytes content = 2; uint32 mode = 3; bool owner_root = 4; bytes opts_json = 5; } // content placed at path; mode = octal perms; opts_json = EmitOpts
message PutFileReply { string error = 1; }                     // empty error = success
message CaptureReply { string stdout = 1; string stderr = 2; int32 exit_code = 3; string error = 4; } // error = execution failure, NOT a non-zero exit
message GetFileRequest { string path = 1; bool as_root = 2; bytes opts_json = 3; }
message GetFileReply { bytes content = 1; string error = 2; }
