version: 2026.174.1100
dev-workstation:
    local:
        description: Dev workstation
    dev-workstation-candy:
        candy: [ripgrep, direnv]
    dev-workstation-install_opts:
        install_opts: {with_services: false, allow_repo_changes: true}
    dev-workstation-env:
        env: [EDITOR=vim]
ci-runner:
    local:
        description: CI runner profile
    ci-runner-candy:
        candy: [ripgrep, pre-commit]
    ci-runner-install_opts:
        install_opts: {with_services: true, allow_root_tasks: true}
charly-cachyos:
    local:
        description: charly-cachyos (placeholder)
    charly-cachyos-candy:
        # Empty placeholder — `layers: []` is a load-time WARNING (allowed
        # for staged name reservation); a missing `layers:` field would be
        # a hard error.
        candy: []
    charly-cachyos-install_opts:
        install_opts: {}
my-laptop:
    bundle:
        local: dev-workstation
    my-laptop-add_candy:
        add_candy: [sshkeys]
my-laptop-explicit:
    bundle:
        local: dev-workstation
        host: local
ci-runner-3:
    bundle:
        local: ci-runner
        host: ubuntu@ci-runner-3.lan
via-bastion:
    bundle:
        local: dev-workstation
        host: target.internal
        user: ops
    via-bastion-ssh_arg:
        ssh_arg:
            - "-o"
            - "ProxyJump=ops@bastion.example.com"
