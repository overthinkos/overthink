defaults:
    base: quay.io/fedora/fedora:43
    platform:
        - linux/amd64
        - linux/arm64
    tag: auto
    registry: ghcr.io/test
    build:
        - rpm
box:
    base:
        candy:
            - pixi
    bazzite:
        base: ghcr.io/ublue-os/bazzite:stable
        bootc: true
        platform:
            - linux/amd64
        candy:
            - custom-packages
    cuda:
        platform:
            - linux/amd64
        candy:
            - pixi
            - cuda
    disabled-image:
        enabled: false
        candy:
            - nonexistent-layer
    inference:
        base: ml-cuda
        tag: nightly
        candy:
            - supervisord
            - ollama
    ml-cuda:
        base: cuda
        candy:
            - python
            - ml-libs
    ubuntu-dev:
        base: ubuntu:24.04
        build:
            - deb
        candy:
            - pixi
            - nodejs
