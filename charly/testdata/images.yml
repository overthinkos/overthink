defaults:
    base: quay.io/fedora/fedora:43
    platform:
        - linux/amd64
        - linux/arm64
    tag: auto
    registry: ghcr.io/test
    build:
        - rpm
base:
    candy:
        base: quay.io/fedora/fedora:43
    base-candy:
        candy:
            - pixi
bazzite:
    candy:
        base: ghcr.io/ublue-os/bazzite:stable
        bootc: true
        platform:
            - linux/amd64
    bazzite-candy:
        candy:
            - custom-packages
cuda:
    candy:
        base: quay.io/fedora/fedora:43
        platform:
            - linux/amd64
    cuda-candy:
        candy:
            - pixi
            - cuda
disabled-image:
    candy:
        base: quay.io/fedora/fedora:43
        enabled: false
    disabled-image-candy:
        candy:
            - nonexistent-layer
inference:
    candy:
        base: ml-cuda
        tag: nightly
    inference-candy:
        candy:
            - supervisord
            - ollama
ml-cuda:
    candy:
        base: cuda
    ml-cuda-candy:
        candy:
            - python
            - ml-libs
ubuntu-dev:
    candy:
        base: ubuntu:24.04
        build:
            - deb
    ubuntu-dev-candy:
        candy:
            - pixi
            - nodejs
