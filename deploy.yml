# =============================================================================
# deploy.yml — Schema v4, disposable-only, zero-operator-side-effect test beds
# =============================================================================
#
# Four disposable deployments, one per target kind (host / vm / pod / k8s),
# together exercising every ov eval verb (19 verbs: file, package, service,
# port, process, command, http, dns, user, group, interface, kernel-param,
# mount, addr, matching, cdp, wl, dbus, vnc, mcp, record, spice, libvirt, k8s).
#
# A `./ov eval live openclaw-sway-browser-pod && ./ov eval live k3s-vm` smoke run
# catches regressions across the ov stack. (The Arch beds — vm + nested host —
# moved to the overthinkos/arch submodule at image/arch.)
#
# Bed-to-verb coverage map (the Arch beds — vm + nested host — moved to the
# overthinkos/arch submodule at image/arch):
#   openclaw-sway-browser-pod      (target: pod)  — cdp, wl, vnc, dbus, mcp, record,
#                                  file/service/port/process/http (pod-side)
#   k3s-vm        (target: vm)   — k8s (all 13 methods), file/service/
#                                  port/process (guest-side), http via
#                                  port-forward, VmDeployTarget end-to-end
#                                  (k3s-server layer applied over SSH).
#                                  Pod target cannot run k3s: rootless
#                                  podman's user-slice doesn't delegate
#                                  the cpuset cgroup controller, and
#                                  /sys/fs/cgroup/kubepods is unwritable
#                                  even under --privileged. A VM has a
#                                  native kernel + cgroup tree and the
#                                  whole problem class disappears.
#
# Per-kind R10 smoke beds (fast fedora-minimal:43 base, one bed per kind):
#   eval-image-pod    (target: pod)   — exercises `image build` + `eval image`
#                                       + pod deploy (single-layer composition)
#   eval-layer-pod    (target: pod)   — exercises layer composition order
#                                       (eval-image-layer → eval-layer-layer)
#   eval-pod-pod      (target: pod)   — exercises pod runtime + ports + the
#                                       supervisord render path (nc on :18794)
#   eval-deploy-pod   (target: pod)   — exercises every DeployTarget rendering
#                                       path (Containerfile + supervisord +
#                                       service eval probe)
#   eval-local-deploy (target: local) — exercises kind:local layer application
#                                       via ShellExecutor on the operator host
#
# Zero-operator-side-effect audit:
#   openclaw-sway-browser-pod           ~/.local/share/containers/        (rootless podman)
#   k3s-vm             libvirt /var/lib/libvirt/images/  (standard qcow2)
#
# No test writes to ~/.local/bin/, ~/.config/overthink/, /etc, /usr, or any
# other operator-side directory. `ls ~/.local/bin/ ~/.config/overthink/`
# should be byte-identical before and after a full four-bed run.
#
# Naming convention: <descriptor>-<target-kind>. Identifiers are
# hyphen-separated, lowercase, no colons, no underscores.
# Target values: host | vm | pod | k8s (schema v3). Legacy spellings
# container / kubernetes are still accepted during the Phase 4 transition.
#
# Plan: /home/atrawog/.claude/plans/can-you-have-a-recursive-axolotl.md
# =============================================================================

version: 2026.141.1600
deploy:
    debian-debootstrap-vm:
        target: vm
        vm: debian-debootstrap
        disposable: true
        lifecycle: dev
    ubuntu-debootstrap-vm:
        target: vm
        vm: ubuntu-debootstrap
        disposable: true
        lifecycle: dev
    # =================================================================
    # Bed 1: openclaw-sway-browser-pod (target: pod)
    # ---------------------------------------------------------------
    # Disposable rootless podman container running the full Sway desktop
    # + Chrome + wayvnc stack. Exercises every live-container test verb
    # (cdp, wl, vnc, dbus, mcp, record) plus in-container health probes.
    # =================================================================
    openclaw-sway-browser-pod:
        target: pod
        image: openclaw-sway-browser
        disposable: true
        lifecycle: dev
        # Maps host ports so operator-side probes can reach them.
        # HOST_PORT:N substitution is available for `http:` tests.
        port:
            - 18790:18789 # openclaw gateway
            - 5901:5900 # wayvnc
            - 9223:9222 # chrome devtools
        eval:
            # --- Pod-runtime health (in-container) -------------------
            - {id: sp-sway-running, scope: deploy, process: sway, running: true}
            - {id: sp-chrome-present, scope: deploy, command: "command -v google-chrome || command -v chromium"}
            - {id: sp-port-9222-listening, scope: deploy, port: 9222, listening: true}
            - {id: sp-port-5900-listening, scope: deploy, port: 5900, listening: true}
            - {id: sp-port-18789-listening, scope: deploy, port: 18789, listening: true}
            # --- http: (operator-side, via HOST_PORT substitution) ---
            - id: sp-http-cdp-json-version
              scope: deploy
              http: "http://127.0.0.1:${HOST_PORT:9222}/json/version"
              status: 200
            # --- cdp: verb (Chrome DevTools Protocol) ----------------
            - {id: sp-cdp-status, scope: deploy, cdp: status}
            - {id: sp-cdp-list, scope: deploy, cdp: list}
            - {id: sp-cdp-open-blank, scope: deploy, cdp: open, url: "about:blank",}
            # eval + screenshot require a tab id. Use sp-cdp-list first
            # to enumerate tabs; skip these deeper cdp checks here since
            # targeting a specific tab requires multi-step orchestration
            # beyond a single declarative probe.

            # --- wl: verb (Wayland + sway IPC) -----------------------
            - {id: sp-wl-status, scope: deploy, wl: status}
            - id: sp-wl-screenshot
              scope: deploy
              wl: screenshot
              artifact: /tmp/openclaw-sway-browser-pod-wl.png
              artifact_min_bytes: 1024
            - {id: sp-wl-sway-tree, scope: deploy, wl: "sway-tree"}
            - {id: sp-wl-sway-workspaces, scope: deploy, wl: "sway-workspaces"}
            - {id: sp-wl-sway-outputs, scope: deploy, wl: "sway-outputs"}
            # --- vnc: verb (RFB wire to wayvnc) ----------------------
            - {id: sp-vnc-status, scope: deploy, vnc: status}
            - id: sp-vnc-screenshot
              scope: deploy
              vnc: screenshot
              artifact: /tmp/openclaw-sway-browser-pod-vnc.png
              artifact_min_bytes: 1024
            # --- dbus: verb (D-Bus calls into container) -------------
            - {id: sp-dbus-list, scope: deploy, dbus: list}
            # --- mcp: verb (Model Context Protocol) ------------------
            - {id: sp-mcp-ping, scope: deploy, mcp: ping}
            - {id: sp-mcp-servers, scope: deploy, mcp: servers}
            - {id: sp-mcp-list-tools, scope: deploy, mcp: "list-tools"}
            # --- record: verb (asciinema / pixelflux) ----------------
            # start exercises the verb surface; cmd+stop require
            # multi-step orchestration state that doesn't survive
            # the declarative-probe boundary. Use `ov eval record`
            # CLI interactively for full record→cmd→stop cycles.
            - {id: sp-record-terminal-start, scope: deploy, record: start, record_name: test-term, record_mode: terminal}
            # --- matching: verb smoke -----------------------------
            - {id: sp-matching, scope: deploy, matching: "sway", equals: "sway"}
    # =================================================================
    # Bed 2: k3s-vm (target: vm, k3s-server inside the VM)
    # ---------------------------------------------------------------
    # Disposable libvirt-backed VM running k3s-server. The kubeconfig
    # artifact is pulled back to the operator for host-side `k8s:`
    # probes (all 13 methods) via the forwarded :6443 port. Unlike the
    # abandoned k3s-pod approach, a VM has its own kernel + cgroup
    # tree so the rootless-podman-user-slice-can't-delegate-cpuset
    # blocker simply doesn't exist: k3s bootstraps natively with no
    # SecurityArgs tricks, no fuse-overlayfs workaround, and no
    # KubeletInUserNamespace feature gate.
    # =================================================================
    k3s-vm:
        target: vm
        vm: k3s-vm
        disposable: true
        lifecycle: dev
        add_layer:
            - k3s-server
        env:
            - K3S_SERVER_HOSTNAME=127.0.0.1
            # Host port 16443 forwards into the guest's :6443. The
            # retrieved kubeconfig's server: line gets rewritten to this
            # URL so operator-side kubectl talks to the forwarded port.
            - K3S_KUBECONFIG_SERVER=https://127.0.0.1:16443
        install_opts:
            with_service: true
            allow_repo_changes: true # pacman sync / repo key import
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
        eval:
            # --- Guest identity + VM health --------------------------
            - {id: kv-guest-identity, scope: deploy, command: id, stdout: {contains: "uid=1000(arch)"}}
            - {id: kv-guest-os-release, scope: deploy, command: "cat /etc/os-release", stdout: {contains: "ID=arch"}}
            # --- k3s-server in-guest health --------------------------
            # Process name: the k3s binary re-execs into `k3s-server`
            # (visible via `systemctl show` Main PID — "k3s-server").
            # Matching against the original `k3s` binary name only works
            # if the process verb falls back to argv[0]; "k3s-server"
            # is the unambiguous post-exec comm name.
            - {id: kv-k3s-process, scope: deploy, process: "k3s-server", running: true}
            - {id: kv-port-6443-listening, scope: deploy, port: 6443, listening: true}
            - {id: kv-kubeconfig-file, scope: deploy, file: /etc/rancher/k3s/k3s.yaml, exists: true}
            # NOTE: no separate http: /healthz probe — k3s v1.31 gates
            # /healthz behind authn (returns 401 to anonymous), so a
            # strict `status: 200` check fails. `kv-k8s-raw-version`
            # already exercises the authenticated API path end-to-end
            # via the retrieved kubeconfig, which is the test we actually
            # want (proves TLS + auth + API server).
            # --- k8s: verb (all 13 methods) --------------------------
            - {id: kv-k8s-nodes, scope: deploy, k8s: nodes, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-wait-nodes, scope: deploy, k8s: "wait-nodes", cluster: "vm-k3s-vm", k8s_count: 1, timeout: "300s"}
            - {id: kv-k8s-pods, scope: deploy, k8s: pods, cluster: "vm-k3s-vm", namespace: kube-system}
            - {id: kv-k8s-wait-ready, scope: deploy, k8s: "wait-ready", cluster: "vm-k3s-vm", k8s_kind: Deployment, namespace: kube-system, name: coredns, timeout: "180s"}
            - {id: kv-k8s-ingressclass-traefik, scope: deploy, k8s: ingressclass, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-storageclass-localpath, scope: deploy, k8s: storageclass, cluster: "vm-k3s-vm", stdout: {contains: "local-path"}}
            - {id: kv-k8s-addons, scope: deploy, k8s: addons, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-raw-version, scope: deploy, k8s: raw, cluster: "vm-k3s-vm", text: "version -o json"}
            - {id: kv-k8s-service-kubernetes, scope: deploy, k8s: service, cluster: "vm-k3s-vm", namespace: default, name: kubernetes}
            # --- command: ov-specific operator-side smoke ------------
            - {id: kv-ov-version, scope: deploy, command: "/tmp/ov-build/ov version || ov version", stdout: {matches: "[0-9]{4}\\.[0-9]+"}, in_container: false}
            # --- matching: verb smoke --------------------------------
            # contains: operator-map form for substring matching (scalar
            # shorthand under `contains:` is parsed as equals).
            - {id: kv-matching, scope: deploy, matching: "k3s-vm up", contains: {contains: "k3s"}}
    # =================================================================
    # Per-kind R10 smoke beds — disposable, fast (fedora-minimal:43).
    # One bed per kind so a single `ov eval live <bed>` end-to-end runs
    # smoke-tests every kind path without rebuilding heavy images.
    # =================================================================
    eval-image-pod:
        target: pod
        image: eval-image
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising kind:image
            tag: [working]
    eval-layer-pod:
        target: pod
        image: eval-layer
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising kind:layer composition
            tag: [working]
    eval-pod-pod:
        target: pod
        image: eval-pod
        disposable: true
        lifecycle: dev
        port:
            - 18794:18794
        description:
            feature: Fast pod bed exercising kind:pod runtime
            tag: [working]
    eval-deploy-pod:
        target: pod
        image: eval-deploy
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising DeployTarget rendering
            tag: [working]
    eval-local-deploy:
        target: local
        local: eval-local
        host: local
        disposable: true
        lifecycle: dev
        description:
            feature: Fast local bed exercising kind:local layer application
            tag: [working]
    jupyter-pod:
        target: pod
        image: jupyter
        disposable: true
        lifecycle: dev
        port:
            - 28888:8888
        description:
            feature: R10 bed for jupyter-mcp regression coverage (auto-attach, canonicalization, idle-room sweep, cell_update id-preservation)
            tag: [working]
    jupyter-ml-pod:
        target: pod
        image: jupyter-ml
        disposable: true
        lifecycle: dev
        port:
            - 28889:8888
        description:
            feature: R10 bed for jupyter-ml — exercises spacy-import, jupyterlab-quarto-enabled build-scope checks plus deploy-scope MCP probes against the GPU-backed image
            tag: [testing]
    versa:
        target: pod
        image: versa
        disposable: true
        lifecycle: dev
        # 2026-05 cutover: was a 7-element explicit `port:` list (host
        # port = container port + 20000 mostly, with 22718 as the one
        # port that needed an offset). With `port: [auto]` the ov
        # config step allocates free host ports at deploy time and
        # writes the expansion to `resolved_port:` below this entry on
        # save. The env_provides templates ({{.HostPort N}}) on the
        # producer layers (osm-tools/airflow/versatiles/versatiles-
        # frontend/pmtiles-viewer) substitute against the resolved
        # expansion so the browser-bound *_PUBLIC_URL env vars track
        # whatever ports actually got allocated.
        port: [auto]
        # env: block deleted — the eight URL env vars (MARTIN_PUBLIC_URL,
        # AIRFLOW_PUBLIC_URL, AIRFLOW_API_INTERNAL_URL, AIRFLOW_DAGS_DIR,
        # VERSATILES_PUBLIC_URL, VERSATILES_STYLE_PUBLIC_URL,
        # VERSATILES_ASSETS_PUBLIC_URL, PMTILES_VIEWER_PUBLIC_URL) flow
        # from the producer layers' env_provides blocks. To verify the
        # resolved values, run the notebook — its diagnostic cell #2
        # renders a table.
        description:
            feature: "R10 bed for versa — exercises the full OSM analytics + vector-tile pipeline (quackosm PBF→GeoParquet, tippecanoe→PMTiles, martin serve, maputnik editor) plus the marimo MCP server (10 read-only notebook-inspection tools) plus the marimo-team/learn curriculum import surface plus the polars-st/geopolars/geoarrow/lonboard geospatial extensions. The 2026-05 cutover replaced an 8-element explicit port list + 4-entry env block with `port: [auto]` and per-producing-layer env_provides templates. Followup 2026-05-12: removed the airflow MCP wrapper (no Airflow-3 v2 release of mcp-server-apache-airflow exists); consumers drive Airflow via direct REST /api/v2 calls."
            tag: [testing]
    # =================================================================
    # R10 bed for android-emulator (target: pod, requires /dev/kvm).
    # ---------------------------------------------------------------
    # Disposable rootless podman container running Android 14 (API 34)
    # under the selkies-desktop streaming chain. /dev/kvm passthrough
    # is declared on the android-emulator-layer's security block and
    # round-trips through the OCI label into the quadlet (this image
    # is the first in the repo to exercise that code path). Host ports
    # 35000-35003 picked to avoid the heavy selkies-desktop sidecar
    # port pressure on this host.
    # =================================================================
    android-emulator-pod:
        target: pod
        image: android-emulator
        disposable: true
        lifecycle: dev
        port:
            - 35000:3000  # Selkies HTTPS web UI
            - 35001:4723  # Appium WebDriver
            - 35002:5037  # ADB server
            - 35003:2222  # SSH
        description:
            feature: "R10 bed for android-emulator — Android 14 (API 34 x86_64 google_apis) emulator with /dev/kvm passthrough, Selkies web UI on https://localhost:35000, Appium WebDriver on http://localhost:35001/wd/hub, ADB via ANDROID_ADB_SERVER_SOCKET=tcp:localhost:35002 adb devices. R10 of adb/appium eval verbs uses host-path `apk:` for adb: install and a pre-staged /tmp/ApiDemos-debug.apk for appium: install-app (podman cp before `ov eval live`)."
            tag: [testing]
# =============================================================================
# Top-level vm: section — kind:vm entity definitions.
# Each entity is a build-time spec; deploy-time properties (disposable,
# lifecycle, layers, env, ports, tests) live on the matching deployments:
# entry. Disposability FIELDS ARE A DEPLOY PROPERTY (see /ov-internals:disposable);
# =============================================================================
vm:
    # =================================================================
    # k3s-vm entity — dedicated VM for the k3s-vm deployment bed.
    # Cloud-image Arch (same base as `arch`) because a k3s server
    # needs nothing Arch-specific — any distro with systemd + iptables
    # + conntrack + kernel overlayfs works. Sized for a single-node
    # control-plane + traefik + coredns + local-path-provisioner:
    # 2 cpus / 4G RAM / 20G disk is comfortable, not tight. Port-
    # forwards :6443 to the host so the operator can reach the
    # kubernetes API from `kubectl` using the kubeconfig pulled back
    # by the k3s-server layer's artifacts: block.
    # =================================================================
    k3s-vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        # `backend: libvirt` matches arch — `ov eval kind k8s` shares
        # the dispatcher path with `ov eval kind vm` and reaches the
        # same libvirt-RPC eval list. See the matching note on the
        # arch: VM template above.
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            port_forward:
                # host 16443 → guest 6443. Host port 6443 is often
                # already held by an operator-level service (passt on
                # Tailscale exit nodes binds :6443 for quic-forward),
                # so the guest-side canonical port is kept at 6443 but
                # exposed on the host as 16443. Matches the prior
                # k3s-pod bed's host-port choice.
                - "16443:6443"
        ssh:
            port: 2225 # non-default host SSH port for the k3s-vm bed
            key_source: generate
        cloud_init:
            # Minimal. Arch cloud image ships pacman-key populated, so
            # no runcmd is needed to bootstrap pacman. We don't ship
            # qemu-guest-agent: the bed's tests use command:/http:/k8s:
            # exclusively (no libvirt guest/* verbs), and the VM has no
            # virtio-serial channel for the agent anyway.
            timezone: UTC
            package:
                - sudo
            ov_install:
                strategy: auto
        libvirt:
            device:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
    aurora-bootc:
        source:
            kind: bootc
            image: aurora
        disk_size: 80 GiB
        ram: 12G
        cpu: 4
    bazzite-ai-bootc:
        source:
            kind: bootc
            image: bazzite-ai
    openclaw-browser-bootc-bootc:
        source:
            kind: bootc
            image: openclaw-browser-bootc
        disk_size: 20 GiB
        ram: 4G
        cpu: 2
        ssh:
            user: root
            port: 2222
    selkies-desktop-bootc-bootc:
        source:
            kind: bootc
            image: selkies-desktop-bootc
        disk_size: 40 GiB
        ram: 8G
        cpu: 4
        ssh:
            user: root
            port: 2250
# ============================================================================
# kind:k8s entity — used by `k8s:` test verbs (cluster: "vm-k3s-vm")
# to resolve the kubectl context that K3sPostProvision merged into
# ~/.kube/config during `ov deploy add k3s-vm`. Without this entity,
# `cluster: <name>` falls through to the kubectl current-context, which
# on a shared operator host is whatever kubeconfig was last used — not
# the freshly-provisioned k3s VM.
# ============================================================================
k8s:
    vm-k3s-vm:
        # Minimal: only kubeconfig_context is load-bearing for the
        # test-k8s lookup path. Image is a required field for WORKLOAD
        # deployments against this cluster; left empty because this
        # entity is only used as a cluster reference by test probes.
        image: ""
        kubeconfig_context: vm-k3s-vm
