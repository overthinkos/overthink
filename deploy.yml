# =============================================================================
# deploy.yml — Schema v3, disposable-only, zero-operator-side-effect test beds
# =============================================================================
#
# Four disposable deployments, one per target kind (host / vm / pod / k8s),
# together exercising every ov test verb (19 verbs: file, package, service,
# port, process, command, http, dns, user, group, interface, kernel-param,
# mount, addr, matching, cdp, wl, dbus, vnc, mcp, record, spice, libvirt, k8s).
#
# A `./ov test arch-vm && ./ov test arch-host && ./ov test sway-pod &&
# ./ov test k3s-pod` smoke run catches regressions across the entire ov stack.
#
# Bed-to-verb coverage map:
#   arch-vm       (target: vm)   — libvirt, spice, command (SSH-in-guest),
#                                  file/service/port/process/package/user/
#                                  group/interface/kernel-param/mount (guest),
#                                  addr, dns, http, matching
#   arch-vm.arch-host
#                 (target: host) — command (nested SSH), file, package (proof
#                                  of user-space install), process, port,
#                                  matching  (exercises HostDeployTarget code
#                                  path inside the VM guest's FS)
#   sway-pod      (target: pod)  — cdp, wl, vnc, dbus, mcp, record,
#                                  file/service/port/process/http (pod-side)
#   k3s-pod       (target: pod)  — k8s (all 13 methods), file/service/
#                                  port/process (pod-side), http, command
#                                  (host-side `ov deploy from-image`)
#
# Zero-operator-side-effect audit:
#   arch-vm            libvirt /var/lib/libvirt/images/  (standard qcow2)
#   arch-vm.arch-host  INSIDE arch-vm guest — zero operator FS writes
#   sway-pod           ~/.local/share/containers/        (rootless podman)
#   k3s-pod            ~/.local/share/containers/        (rootless podman)
#
# No test writes to ~/.local/bin/, ~/.config/overthink/, /etc, /usr, or any
# other operator-side directory. `ls ~/.local/bin/ ~/.config/overthink/`
# should be byte-identical before and after a full four-bed run.
#
# Naming convention: <descriptor>-<target-kind>. Identifiers are
# hyphen-separated, lowercase, no colons, no underscores.
# Target values: host | vm | pod | k8s (schema v3). Legacy spellings
# container / kubernetes are still accepted during the Phase 4 transition.
#
# Plan: /home/atrawog/.claude/plans/can-you-have-a-recursive-axolotl.md
# =============================================================================

version: 3

deployments:
    images:

        # =================================================================
        # Bed 1: arch-vm (target: vm)
        # ---------------------------------------------------------------
        # Disposable Arch Linux VM. Exercises the VM lifecycle + libvirt +
        # spice + ssh + cloud-init + qemu-guest-agent + in-guest OS probes.
        # No k3s here (moved to k3s-pod); no heavy layer application here
        # (moved to arch-vm.arch-host child).
        # =================================================================
        arch-vm:
            target: vm
            vm_source: arch
            disposable: true
            lifecycle: dev

            # Minimal in-guest tooling so arch-host (child) has something
            # to depend on, and so the command: probes have ripgrep/uv/
            # pre-commit versions to verify.
            add_layers:
                - ripgrep
                - uv
                - pre-commit

            install_opts:
                with_services: true
                allow_repo_changes: true   # pacman-key + mirror tweaks
                skip_incompatible: true    # skip rpm:/deb:-only layer sections
                verify: true

            env:
                - OVERTHINK_DEV=true

            tests:

                # --- C.1  Guest identity + SSH connectivity ---------------
                - {id: guest-identity-uid, scope: deploy, command: id, stdout: {contains: "uid=1000(arch)"}}
                - {id: guest-identity-wheel, scope: deploy, command: id, stdout: {contains: wheel}}
                - {id: guest-hostname-nonempty, scope: deploy, command: "cat /etc/hostname", stdout: {matches: ".+"}}
                - {id: guest-os-release-arch, scope: deploy, command: "cat /etc/os-release", stdout: {contains: "ID=arch"}}
                - {id: guest-sudo-nopasswd, scope: deploy, command: "sudo -n whoami", stdout: {equals: root}}
                - {id: guest-kernel-release, scope: deploy, command: "uname -r", stdout: {matches: "[0-9]+\\.[0-9]+"}}

                # --- C.2  Cloud-init completion ---------------------------
                - {id: cloud-init-status-done, scope: deploy, command: "cloud-init status --wait --long", stdout: {contains: "status: done"}}
                - {id: cloud-init-instance-dir, scope: deploy, command: "test -d /var/lib/cloud/instance"}
                - {id: cloud-init-no-errors, scope: deploy, command: "cat /var/lib/cloud/data/result.json", stdout: {contains: "\"errors\": []"}}

                # --- C.3  spice-vdagent + virtio-gpu (in guest) ----------
                - {id: spice-vdagentd-active, scope: deploy, command: "systemctl is-active spice-vdagentd", stdout: {equals: active}}
                - {id: spice-vdagentd-enabled, scope: deploy, command: "systemctl is-enabled spice-vdagentd", stdout: {matches: "^(enabled|static)"}}
                - {id: virtio-gpu-module, scope: deploy, command: "lsmod | grep -q virtio_gpu"}
                - {id: dri-card0-present, scope: deploy, command: "test -e /dev/dri/card0"}

                # --- C.4  SPICE wire (host-side via spice: verb) ---------
                - {id: spice-status-main, scope: deploy, spice: status, stdout: {contains: display}}
                - id: spice-framebuffer-nonzero
                  scope: deploy
                  spice: screenshot
                  artifact: /tmp/arch-vm-spice.png
                  artifact_min_bytes: 1024

                # --- C.5  libvirt domain (host-side via libvirt: verb) ---
                - {id: libvirt-domain-running, scope: deploy, libvirt: info, stdout: {contains: running}}
                - {id: libvirt-domain-xml-q35, scope: deploy, libvirt: "domain-xml", stdout: {contains: q35}}
                - {id: libvirt-domain-xml-virtio, scope: deploy, libvirt: "domain-xml", stdout: {contains: "type='virtio'"}}
                - {id: libvirt-qmp-query-status, scope: deploy, libvirt: qmp, text: query-status, stdout: {contains: running}}
                - {id: libvirt-guest-agent-ping, scope: deploy, libvirt: "guest/ping", stderr: {contains: responsive}}
                - {id: libvirt-guest-hostname, scope: deploy, libvirt: "guest/hostname", stdout: {matches: ".+"}}
                - {id: libvirt-guest-os-info, scope: deploy, libvirt: "guest/os-info", stdout: {contains: arch}}
                - {id: libvirt-guest-interfaces, scope: deploy, libvirt: "guest/interfaces", stdout: {contains: lo}}

                # --- C.6  Pacman + repo health ---------------------------
                - {id: pacman-key-populated, scope: deploy, command: "pacman-key --list-keys archlinux 2>&1 | grep -q pub"}
                - {id: pacman-repos-reachable, scope: deploy, command: "sudo pacman -Sy --noconfirm"}

                # --- C.7  SSH key injection ------------------------------
                - {id: ssh-authorized-keys, scope: deploy, command: "test -f /home/arch/.ssh/authorized_keys"}
                - {id: ssh-ed25519-key-count, scope: deploy, command: "grep -c ssh-ed25519 /home/arch/.ssh/authorized_keys", stdout: {matches: "[1-9]"}}

                # --- C.8  Resource sizing (4 cpus, 8G mem, 40G disk) -----
                - {id: cpu-count-4, scope: deploy, command: nproc, stdout: {matches: "^4"}}
                - {id: mem-8g-ballpark, scope: deploy, command: "awk '/MemTotal/ {print int($2/1024/1024)}' /proc/meminfo", stdout: {matches: "^[78]"}}
                - {id: disk-ballpark, scope: deploy, command: "df -BG / | awk 'NR==2 {gsub(\"G\",\"\",$2); print int($2)}'", stdout: {matches: "^([1-9][0-9]|[1-9][0-9][0-9])"}}

                # --- C.9  Layer-applied tooling + ov itself --------------
                - {id: ov-binary-present, scope: deploy, command: "command -v ov"}
                - {id: ov-version, scope: deploy, command: "ov version", stdout: {matches: "[0-9]{4}\\.[0-9]+"}}
                - {id: ov-help-works, scope: deploy, command: "ov --help 2>&1 | head -1", stdout: {contains: ov}}
                - {id: ripgrep-version, scope: deploy, command: "rg --version", stdout: {contains: ripgrep}}
                - {id: uv-version, scope: deploy, command: "uv --version", stdout: {contains: "uv "}}
                - {id: pre-commit-version, scope: deploy, command: "pre-commit --version", stdout: {contains: pre-commit}}
                - {id: tooling-on-path, scope: deploy, command: "command -v rg uv pre-commit"}

                # --- C.10 Structured probes (package/service/port/process/
                #          user/group/interface/kernel-param/mount) -------
                - {id: pkg-base-devel-present, scope: deploy, package: base-devel, installed: true}
                - {id: pkg-git-present, scope: deploy, package: git, installed: true}
                - {id: svc-spice-vdagentd-running, scope: deploy, service: spice-vdagentd, running: true}
                - {id: svc-sshd-running, scope: deploy, service: sshd, running: true}
                - {id: port-22-listening, scope: deploy, port: 22, listening: true}
                - {id: proc-sshd-running, scope: deploy, process: sshd, running: true}
                - {id: user-arch-present, scope: deploy, user: arch, uid: 1000}
                - {id: group-wheel-present, scope: deploy, group: wheel}
                - {id: iface-lo-up, scope: deploy, interface: lo, mtu: 65536}
                - {id: mount-root-mounted, scope: deploy, mount: /}

                # --- C.11 Network / DNS (host-side + guest-side) ---------
                - {id: dns-archlinux-org, scope: deploy, command: "getent hosts archlinux.org"}
                - {id: https-archlinux-org, scope: deploy, command: "curl -sfo /dev/null -w '%{http_code}' https://archlinux.org/", stdout: {matches: "^(20[0-9]|30[0-9])"}}
                - {id: dns-check-operator-side, scope: deploy, dns: archlinux.org, resolvable: true}
                - {id: addr-ssh-reachable, scope: deploy, addr: "127.0.0.1:2224", reachable: true, timeout: "5s"}

                # --- C.12 matching: verb smoke ---------------------------
                # matching: <literal> checks the literal against contains/equals
                # operators. Input is the matching: field itself.
                - {id: matching-smoke, scope: deploy, matching: "arch", equals: "arch"}

            # -----------------------------------------------------------------
            # Bed 2: arch-host (target: host, nested in arch-vm)
            # -----------------------------------------------------------------
            # Exercises HostDeployTarget / InstallPlan / ReverseOps / ledger
            # code path INSIDE arch-vm's guest FS via the existing
            # parent-child NestedExecutor plumbing. Zero operator-side writes.
            # Layers chosen for dotfile-only side effects so the bed is about
            # exercising the code path, not installing services.
            # -----------------------------------------------------------------
            children:
                arch-host:
                    target: host
                    disposable: true
                    lifecycle: dev

                    add_layers:
                        - direnv

                    tests:
                        # Nested command runs: SSH into arch-vm → exec as arch user.
                        - {id: ah-ov-deploy-list, scope: deploy, command: "ov deploy list"}
                        - {id: ah-direnv-version, scope: deploy, command: "direnv --version"}

                        # Ledger entries land in guest ~/.config/overthink/installed/
                        # (NOT operator-side).
                        - {id: ah-ledger-deploys-dir, scope: deploy, command: "test -d /home/arch/.config/overthink/installed/deploys"}
                        - {id: ah-ledger-layers-dir, scope: deploy, command: "test -d /home/arch/.config/overthink/installed/layers"}
                        - {id: ah-ledger-has-direnv-record, scope: deploy, command: "ls /home/arch/.config/overthink/installed/layers/direnv.json 2>&1"}

                        # Proof: direnv NOT installed via pacman — it's user-
                        # space-only via host-deploy.
                        - {id: ah-direnv-not-pacman, scope: deploy, package: direnv, installed: false}

                        # Nothing listening (host overlay runs no services).
                        - {id: ah-no-listeners, scope: deploy, command: "ss -tlnp 2>/dev/null | wc -l", stdout: {matches: "^[0-9]+"}}

                        # matching: verb — ov deploy list mentions the bed.
                        - {id: ah-matching-list, scope: deploy, matching: "arch-host in list", contains: "arch"}


        # =================================================================
        # Bed 3: sway-pod (target: pod)
        # ---------------------------------------------------------------
        # Disposable rootless podman container running the full Sway desktop
        # + Chrome + wayvnc stack. Exercises every live-container test verb
        # (cdp, wl, vnc, dbus, mcp, record) plus in-container health probes.
        # =================================================================
        sway-pod:
            target: pod
            image: openclaw-sway-browser
            disposable: true
            lifecycle: dev

            # Maps host ports so operator-side probes can reach them.
            # HOST_PORT:N substitution is available for `http:` tests.
            ports:
                - 18790:18789     # openclaw gateway
                - 5901:5900       # wayvnc
                - 9223:9222       # chrome devtools

            tests:

                # --- Pod-runtime health (in-container) -------------------
                - {id: sp-sway-running, scope: deploy, process: sway, running: true}
                - {id: sp-chrome-present, scope: deploy, command: "command -v google-chrome || command -v chromium"}
                - {id: sp-port-9222-listening, scope: deploy, port: 9222, listening: true}
                - {id: sp-port-5900-listening, scope: deploy, port: 5900, listening: true}
                - {id: sp-port-18789-listening, scope: deploy, port: 18789, listening: true}

                # --- http: (operator-side, via HOST_PORT substitution) ---
                - id: sp-http-cdp-json-version
                  scope: deploy
                  http: "http://127.0.0.1:${HOST_PORT:9222}/json/version"
                  status: 200

                # --- cdp: verb (Chrome DevTools Protocol) ----------------
                - {id: sp-cdp-status, scope: deploy, cdp: status}
                - {id: sp-cdp-list, scope: deploy, cdp: list}
                - {id: sp-cdp-open-blank, scope: deploy, cdp: open, url: "about:blank"}
                # eval + screenshot require a tab id. Use sp-cdp-list first
                # to enumerate tabs; skip these deeper cdp checks here since
                # targeting a specific tab requires multi-step orchestration
                # beyond a single declarative probe.

                # --- wl: verb (Wayland + sway IPC) -----------------------
                - {id: sp-wl-status, scope: deploy, wl: status}
                - id: sp-wl-screenshot
                  scope: deploy
                  wl: screenshot
                  artifact: /tmp/sway-pod-wl.png
                  artifact_min_bytes: 1024
                - {id: sp-wl-sway-tree, scope: deploy, wl: "sway-tree"}
                - {id: sp-wl-sway-workspaces, scope: deploy, wl: "sway-workspaces"}
                - {id: sp-wl-sway-outputs, scope: deploy, wl: "sway-outputs"}

                # --- vnc: verb (RFB wire to wayvnc) ----------------------
                - {id: sp-vnc-status, scope: deploy, vnc: status}
                - id: sp-vnc-screenshot
                  scope: deploy
                  vnc: screenshot
                  artifact: /tmp/sway-pod-vnc.png
                  artifact_min_bytes: 1024

                # --- dbus: verb (D-Bus calls into container) -------------
                - {id: sp-dbus-list, scope: deploy, dbus: list}

                # --- mcp: verb (Model Context Protocol) ------------------
                - {id: sp-mcp-ping, scope: deploy, mcp: ping}
                - {id: sp-mcp-servers, scope: deploy, mcp: servers}
                - {id: sp-mcp-list-tools, scope: deploy, mcp: "list-tools"}

                # --- record: verb (asciinema / pixelflux) ----------------
                # start exercises the verb surface; cmd+stop require
                # multi-step orchestration state that doesn't survive
                # the declarative-probe boundary. Use `ov test record`
                # CLI interactively for full record→cmd→stop cycles.
                - {id: sp-record-terminal-start, scope: deploy, record: start, record_name: test-term, record_mode: terminal}

                # --- matching: verb smoke -----------------------------
                - {id: sp-matching, scope: deploy, matching: "sway", equals: "sway"}


        # =================================================================
        # Bed 4: k3s-pod (target: pod, k3s-server inside the pod)
        # ---------------------------------------------------------------
        # Disposable rootless podman container running k3s-server. The
        # kubeconfig artifact is pulled back to the operator for host-side
        # `k8s:` probes (all 13 methods). k3s inside a pod — NOT a VM — so
        # the cluster lifecycle is bounded by pod teardown.
        # =================================================================
        k3s-pod:
            target: pod
            image: fedora-ov
            disposable: true
            lifecycle: dev

            add_layers:
                - k3s-server

            ports:
                - 16443:6443      # kubernetes API (host 16443 to avoid
                                   # conflict with any concurrent VM
                                   # port_forwards on 6443)

            env:
                - K3S_SERVER_HOSTNAME=127.0.0.1

            install_opts:
                with_services: true
                allow_repo_changes: true

            tests:

                # --- Pod-runtime health (k3s-server in-container) --------
                - {id: kp-k3s-process, scope: deploy, process: k3s, running: true}
                - {id: kp-port-6443-listening, scope: deploy, port: 6443, listening: true}
                - {id: kp-kubeconfig-file, scope: deploy, file: /etc/rancher/k3s/k3s.yaml, exists: true}

                # --- http: API healthz (operator-side via host port) -----
                - id: kp-http-api-healthz
                  scope: deploy
                  http: "https://127.0.0.1:${HOST_PORT:16443}/healthz"
                  status: 200
                  allow_insecure: true

                # --- k8s: verb (all 13 methods) --------------------------
                - {id: kp-k8s-nodes, scope: deploy, k8s: nodes, cluster: "k3s-pod-cluster"}
                - {id: kp-k8s-wait-nodes, scope: deploy, k8s: "wait-nodes", cluster: "k3s-pod-cluster", k8s_count: 1, timeout: "60s"}
                - {id: kp-k8s-pods, scope: deploy, k8s: pods, cluster: "k3s-pod-cluster", namespace: kube-system}
                - {id: kp-k8s-wait-ready, scope: deploy, k8s: "wait-ready", cluster: "k3s-pod-cluster", k8s_kind: Deployment, namespace: kube-system, name: coredns, timeout: "90s"}
                - {id: kp-k8s-ingressclass-traefik, scope: deploy, k8s: ingressclass, cluster: "k3s-pod-cluster"}
                - {id: kp-k8s-storageclass-localpath, scope: deploy, k8s: storageclass, cluster: "k3s-pod-cluster", stdout: {contains: "local-path"}}
                - {id: kp-k8s-addons, scope: deploy, k8s: addons, cluster: "k3s-pod-cluster"}
                - {id: kp-k8s-raw-version, scope: deploy, k8s: raw, cluster: "k3s-pod-cluster", text: "version -o json"}
                - {id: kp-k8s-service-kubernetes, scope: deploy, k8s: service, cluster: "k3s-pod-cluster", namespace: default, name: kubernetes}

                # --- command: ov-specific operator-side smoke ------------
                - {id: kp-ov-version, scope: deploy, command: "/tmp/ov-build/ov version || ov version", stdout: {matches: "[0-9]{4}\\.[0-9]+"}, in_container: false}
                - id: kp-ov-deploy-from-image
                  scope: deploy
                  command: "rm -rf /tmp/k3s-probe-manifest && /tmp/ov-build/ov deploy from-image fedora-ov k3s-probe --out /tmp/k3s-probe-manifest 2>&1 || ov deploy from-image fedora-ov k3s-probe --out /tmp/k3s-probe-manifest 2>&1"
                  in_container: false
                - {id: kp-manifest-kustomization, scope: deploy, file: /tmp/k3s-probe-manifest/kustomization.yaml, exists: true, in_container: false}

                # --- matching: verb smoke -----------------------------
                - {id: kp-matching, scope: deploy, matching: "k3s-pod up", contains: "k3s"}


# =============================================================================
# Top-level vm: section — kind:vm entity definitions.
# Each entity is a build-time spec; deploy-time properties (disposable,
# lifecycle, layers, env, ports, tests) live on the matching deployments:
# entry. Disposability FIELDS ARE A DEPLOY PROPERTY (see /ov-dev:disposable);
# the `vm.arch.disposable` entry below is retained for backward compatibility
# during the Phase 6 migration — the load-bearing copy is in
# deployments.images.arch-vm.disposable.
# =============================================================================
vm:
    arch:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch

        # Retained for Phase 6 migration; load-bearing copy is on
        # deployments.images.arch-vm (deploy-level property).
        disposable: true
        lifecycle: dev

        disk_size: 40G
        ram: 8G
        cpus: 4
        machine: q35
        firmware: bios

        network:
            mode: user
            port_forwards:
                - "6443:6443"   # reserved for in-VM k3s experiments

        ssh:
            port: 2224
            key_source: generate

        cloud_init:
            timezone: UTC
            packages:
                - sudo
                - spice-vdagent
                - qemu-guest-agent
                - git
                - go
                - base-devel
            runcmd:
                - systemctl enable --now spice-vdagentd
                - systemctl enable --now qemu-guest-agent
                # Build and install ov from the repo's PKGBUILD so
                # `command: ov version` and related probes work in-guest.
                - |
                  bash -lc '
                  set -euxo pipefail
                  rm -rf /home/arch/ov-src
                  sudo -u arch -H git clone --depth 1 --recurse-submodules --shallow-submodules \
                      https://github.com/overthinkos/overthink.git /home/arch/ov-src
                  sudo -u arch -H bash -lc "cd /home/arch/ov-src/pkg/arch && makepkg -s --noconfirm --needed"
                  cd /home/arch/ov-src/pkg/arch && pacman -U --noconfirm ov-git-*-x86_64.pkg.tar.zst
                  '
            ov_install:
                strategy: skip

        libvirt:
            devices:
                channels:
                    - type: spicevmc
                      name: com.redhat.spice.0
                graphics:
                    - type: spice
                      listen:
                        - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
            snippets:
                - "<channel type='unix'><target type='virtio' name='org.qemu.guest_agent.0'/></channel>"

    aurora-bootc:
        source:
            kind: bootc
            image: aurora
        disk_size: 80 GiB
        ram: 12G
        cpus: 4

    bazzite-ai-bootc:
        source:
            kind: bootc
            image: bazzite-ai

    openclaw-browser-bootc-bootc:
        source:
            kind: bootc
            image: openclaw-browser-bootc
        disk_size: 20 GiB
        ram: 4G
        cpus: 2
        ssh:
            user: root
            port: 2222

    selkies-desktop-bootc-bootc:
        source:
            kind: bootc
            image: selkies-desktop-bootc
        disk_size: 40 GiB
        ram: 8G
        cpus: 4
        ssh:
            user: root
            port: 2250


# =============================================================================
# Top-level cluster: section — named Kubernetes clusters. Used by
# target: k8s deployments and by k8s: test verbs (cluster: <name>).
# =============================================================================
cluster:
    k3s-pod-cluster:
        # kubeconfig is produced by the k3s-server layer inside k3s-pod
        # and pulled back to the operator via the layer artifacts: block.
        from: k3s-pod
