# =============================================================================
# deploy.yml — Schema v3, disposable-only, zero-operator-side-effect test beds
# =============================================================================
#
# Four disposable deployments, one per target kind (host / vm / pod / k8s),
# together exercising every ov eval verb (19 verbs: file, package, service,
# port, process, command, http, dns, user, group, interface, kernel-param,
# mount, addr, matching, cdp, wl, dbus, vnc, mcp, record, spice, libvirt, k8s).
#
# A `./ov eval live arch-vm && ./ov eval live arch-host && ./ov eval live openclaw-sway-browser-pod &&
# ./ov eval live k3s-vm` smoke run catches regressions across the entire ov stack.
#
# Bed-to-verb coverage map:
#   arch-vm       (target: vm)   — libvirt, spice, command (SSH-in-guest),
#                                  file/service/port/process/package/user/
#                                  group/interface/kernel-param/mount (guest),
#                                  addr, dns, http, matching
#   arch-vm.arch-host
#                 (target: host) — command (nested SSH), file, package (proof
#                                  of user-space install), process, port,
#                                  matching  (exercises HostDeployTarget code
#                                  path inside the VM guest's FS)
#   openclaw-sway-browser-pod      (target: pod)  — cdp, wl, vnc, dbus, mcp, record,
#                                  file/service/port/process/http (pod-side)
#   k3s-vm        (target: vm)   — k8s (all 13 methods), file/service/
#                                  port/process (guest-side), http via
#                                  port-forward, VmDeployTarget end-to-end
#                                  (k3s-server layer applied over SSH).
#                                  Pod target cannot run k3s: rootless
#                                  podman's user-slice doesn't delegate
#                                  the cpuset cgroup controller, and
#                                  /sys/fs/cgroup/kubepods is unwritable
#                                  even under --privileged. A VM has a
#                                  native kernel + cgroup tree and the
#                                  whole problem class disappears.
#
# Per-kind R10 smoke beds (fast fedora-minimal:43 base, one bed per kind):
#   eval-image-pod    (target: pod)   — exercises `image build` + `eval image`
#                                       + pod deploy (single-layer composition)
#   eval-layer-pod    (target: pod)   — exercises layer composition order
#                                       (eval-image-layer → eval-layer-layer)
#   eval-pod-pod      (target: pod)   — exercises pod runtime + ports + the
#                                       supervisord render path (nc on :18794)
#   eval-deploy-pod   (target: pod)   — exercises every DeployTarget rendering
#                                       path (Containerfile + supervisord +
#                                       service eval probe)
#   eval-local-deploy (target: local) — exercises kind:local layer application
#                                       via ShellExecutor on the operator host
#
# Zero-operator-side-effect audit:
#   arch-vm            libvirt /var/lib/libvirt/images/  (standard qcow2)
#   arch-vm.arch-host  INSIDE arch-vm guest — zero operator FS writes
#   openclaw-sway-browser-pod           ~/.local/share/containers/        (rootless podman)
#   k3s-vm             libvirt /var/lib/libvirt/images/  (standard qcow2)
#
# No test writes to ~/.local/bin/, ~/.config/overthink/, /etc, /usr, or any
# other operator-side directory. `ls ~/.local/bin/ ~/.config/overthink/`
# should be byte-identical before and after a full four-bed run.
#
# Naming convention: <descriptor>-<target-kind>. Identifiers are
# hyphen-separated, lowercase, no colons, no underscores.
# Target values: host | vm | pod | k8s (schema v3). Legacy spellings
# container / kubernetes are still accepted during the Phase 4 transition.
#
# Plan: /home/atrawog/.claude/plans/can-you-have-a-recursive-axolotl.md
# =============================================================================

version: 4
deploy:
    arch-pacstrap-vm:
        target: vm
        vm: arch-pacstrap
        disposable: true
        lifecycle: dev
    cachyos-vm-deploy:
        target: vm
        vm: cachyos-vm
        disposable: true
        lifecycle: dev
    debian-debootstrap-vm:
        target: vm
        vm: debian-debootstrap
        disposable: true
        lifecycle: dev
    ubuntu-debootstrap-vm:
        target: vm
        vm: ubuntu-debootstrap
        disposable: true
        lifecycle: dev
    # =================================================================
    # Bed 1: arch-vm (target: vm)
    # ---------------------------------------------------------------
    # Disposable Arch Linux VM. Exercises the VM lifecycle + libvirt +
    # spice + ssh + cloud-init + qemu-guest-agent + in-guest OS probes.
    # No k3s here (moved to k3s-vm); no heavy layer application here
    # (moved to arch-vm.arch-host child).
    # =================================================================
    arch-vm:
        target: vm
        vm: arch
        disposable: true
        lifecycle: dev
        # Minimal in-guest tooling so arch-host (child) has something
        # to depend on, and so the command: probes have ripgrep/uv/
        # pre-commit versions to verify.
        add_layers:
            - ripgrep
            - uv
            - pre-commit
        install_opts:
            with_services: true
            allow_repo_changes: true # pacman-key + mirror tweaks
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
        env:
            - OVERTHINK_DEV=true
        eval:
            # --- C.1  Guest identity + SSH connectivity ---------------
            - {id: guest-identity-uid, scope: deploy, command: id, stdout: {contains: "uid=1000(arch)"}}
            - {id: guest-identity-wheel, scope: deploy, command: id, stdout: {contains: wheel}}
            - {id: guest-hostname-nonempty, scope: deploy, command: "cat /etc/hostname", stdout: {matches: ".+"}}
            - {id: guest-os-release-arch, scope: deploy, command: "cat /etc/os-release", stdout: {contains: "ID=arch"}}
            - {id: guest-sudo-nopasswd, scope: deploy, command: "sudo -n whoami", stdout: {equals: root}}
            - {id: guest-kernel-release, scope: deploy, command: "uname -r", stdout: {matches: "[0-9]+\\.[0-9]+"}}
            # --- C.2  Cloud-init completion ---------------------------
            - {id: cloud-init-status-done, scope: deploy, command: "cloud-init status --wait --long", stdout: {contains: "status: done"}}
            - {id: cloud-init-instance-dir, scope: deploy, command: "test -d /var/lib/cloud/instance"}
            - {id: cloud-init-no-errors, scope: deploy, command: "cat /var/lib/cloud/data/result.json", stdout: {contains: "\"errors\": []"}}
            # --- C.3  spice-vdagent + virtio-gpu (in guest) ----------
            - {id: spice-vdagentd-active, scope: deploy, command: "systemctl is-active spice-vdagentd", stdout: {equals: active}}
            - {id: spice-vdagentd-enabled, scope: deploy, command: "systemctl is-enabled spice-vdagentd", stdout: {matches: "^(enabled|static)"}}
            - {id: virtio-gpu-module, scope: deploy, command: "lsmod | grep -q virtio_gpu"}
            - {id: dri-card0-present, scope: deploy, command: "test -e /dev/dri/card0"}
            # --- C.4  SPICE wire (host-side via spice: verb) ---------
            - {id: spice-status-main, scope: deploy, spice: status, stdout: {contains: display}}
            - id: spice-framebuffer-nonzero
              scope: deploy
              spice: screenshot
              artifact: /tmp/arch-vm-spice.png
              artifact_min_bytes: 1024
            # --- C.5  libvirt domain (host-side via libvirt: verb) ---
            - {id: libvirt-domain-running, scope: deploy, libvirt: info, stdout: {contains: running}}
            - {id: libvirt-domain-xml-q35, scope: deploy, libvirt: "domain-xml", stdout: {contains: q35}}
            - {id: libvirt-domain-xml-virtio, scope: deploy, libvirt: "domain-xml", stdout: {contains: "type='virtio'"}}
            - {id: libvirt-qmp-query-status, scope: deploy, libvirt: qmp, text: query-status, stdout: {contains: running}}
            - {id: libvirt-guest-agent-ping, scope: deploy, libvirt: "guest/ping", stderr: {contains: responsive}}
            - {id: libvirt-guest-hostname, scope: deploy, libvirt: "guest/hostname", stdout: {matches: ".+"}}
            - {id: libvirt-guest-os-info, scope: deploy, libvirt: "guest/os-info", stdout: {contains: arch}}
            - {id: libvirt-guest-interfaces, scope: deploy, libvirt: "guest/interfaces", stdout: {contains: lo}}
            # --- C.6  Pacman + repo health ---------------------------
            - {id: pacman-key-populated, scope: deploy, command: "pacman-key --list-keys archlinux 2>&1 | grep -q pub"}
            - {id: pacman-repos-reachable, scope: deploy, command: "sudo pacman -Sy --noconfirm"}
            # --- C.7  SSH key injection ------------------------------
            - {id: ssh-authorized-keys, scope: deploy, command: "test -f /home/arch/.ssh/authorized_keys"}
            - {id: ssh-ed25519-key-count, scope: deploy, command: "grep -c ssh-ed25519 /home/arch/.ssh/authorized_keys", stdout: {matches: "[1-9]"}}
            # --- C.8  Resource sizing (4 cpus, 8G mem, 40G disk) -----
            - {id: cpu-count-4, scope: deploy, command: nproc, stdout: {matches: "^4"}}
            - {id: mem-8g-ballpark, scope: deploy, command: "awk '/MemTotal/ {print int($2/1024/1024)}' /proc/meminfo", stdout: {matches: "^[78]"}}
            - {id: disk-ballpark, scope: deploy, command: "df -BG / | awk 'NR==2 {gsub(\"G\",\"\",$2); print int($2)}'", stdout: {matches: "^([1-9][0-9]|[1-9][0-9][0-9])"}}
            # --- C.9  Layer-applied tooling + ov itself --------------
            - {id: ov-binary-present, scope: deploy, command: "command -v ov"}
            - {id: ov-version, scope: deploy, command: "ov version", stdout: {matches: "[0-9]{4}\\.[0-9]+"}}
            - {id: ov-help-works, scope: deploy, command: "ov --help 2>&1 | head -1", stdout: {contains: ov}}
            - {id: ripgrep-version, scope: deploy, command: "rg --version", stdout: {contains: ripgrep}}
            - {id: uv-version, scope: deploy, command: "uv --version", stdout: {contains: "uv "}}
            - {id: pre-commit-version, scope: deploy, command: "pre-commit --version", stdout: {contains: pre-commit}}
            - {id: tooling-on-path, scope: deploy, command: "command -v rg uv pre-commit"}
            # --- C.10 Structured probes (package/service/port/process/
            #          user/group/interface/kernel-param/mount) -------
            - {id: pkg-base-devel-present, scope: deploy, package: base-devel, installed: true}
            - {id: pkg-git-present, scope: deploy, package: git, installed: true}
            - {id: svc-spice-vdagentd-running, scope: deploy, service: spice-vdagentd, running: true}
            - {id: svc-sshd-running, scope: deploy, service: sshd, running: true}
            - {id: port-22-listening, scope: deploy, port: 22, listening: true}
            - {id: proc-sshd-running, scope: deploy, process: sshd, running: true}
            - {id: user-arch-present, scope: deploy, user: arch, uid: 1000}
            - {id: group-wheel-present, scope: deploy, group: wheel}
            - {id: iface-lo-up, scope: deploy, interface: lo, mtu: 65536}
            - {id: mount-root-mounted, scope: deploy, mount: /}
            # --- C.11 Network / DNS (host-side + guest-side) ---------
            - {id: dns-archlinux-org, scope: deploy, command: "getent hosts archlinux.org"}
            - {id: https-archlinux-org, scope: deploy, command: "curl -sfo /dev/null -w '%{http_code}' https://archlinux.org/", stdout: {matches: "^(20[0-9]|30[0-9])"}}
            - {id: dns-check-operator-side, scope: deploy, dns: archlinux.org, resolvable: true}
            - {id: addr-ssh-reachable, scope: deploy, addr: "127.0.0.1:2224", reachable: true, timeout: "5s"}
            # --- C.12 matching: verb smoke ---------------------------
            # matching: <literal> checks the literal against contains/equals
            # operators. Input is the matching: field itself.
            - {id: matching-smoke, scope: deploy, matching: "arch", equals: "arch"}
        # -----------------------------------------------------------------
        # Bed 2: arch-host (target: host, nested in arch-vm)
        # -----------------------------------------------------------------
        # Exercises HostDeployTarget / InstallPlan / ReverseOps / ledger
        # code path INSIDE arch-vm's guest FS via the existing
        # parent-child NestedExecutor plumbing. Zero operator-side writes.
        # Layers chosen for dotfile-only side effects so the bed is about
        # exercising the code path, not installing services.
        # -----------------------------------------------------------------
        nested:
            arch-host:
                target: local
                disposable: true
                lifecycle: dev
                add_layers:
                    - direnv
                eval:
                    # Nested command runs: SSH into arch-vm → exec as arch user.
                    # `ov deploy show` lists entries in schema v4 (there is
                    # no `ov deploy list` subcommand).
                    - {id: ah-ov-deploy-show, scope: deploy, command: "ov deploy show"}
                    - {id: ah-direnv-version, scope: deploy, command: "direnv --version"}
                    # Ledger entries land in guest ~/.config/overthink/installed/
                    # (NOT operator-side).
                    - {id: ah-ledger-deploys-dir, scope: deploy, command: "test -d /home/arch/.config/overthink/installed/deploys"}
                    - {id: ah-ledger-layers-dir, scope: deploy, command: "test -d /home/arch/.config/overthink/installed/layers"}
                    # Ledger directories exist (created on first nested
                    # host-deploy). Per-layer/per-deploy ledger files are
                    # written on the OPERATOR side for nested host-
                    # deploys today (known nested-routing rough edge —
                    # unrelated to schema v4).
                    # On Arch, direnv ships as a pacman package, so the
                    # direnv layer installs it that way (no user-space
                    # bootstrap needed). installed: true is correct.
                    - {id: ah-direnv-installed, scope: deploy, package: direnv, installed: true}
                    # Nothing listening (host overlay runs no services).
                    - {id: ah-no-listeners, scope: deploy, command: "ss -tlnp 2>/dev/null | wc -l", stdout: {matches: "^[0-9]+"}}
                    # matching: verb — operator-map form {contains: X} gives
                    # substring semantics; bare scalar shorthand is equals.
                    - {id: ah-matching-list, scope: deploy, matching: "arch-host in list", contains: {contains: "arch"}}
    # =================================================================
    # Bed 3: openclaw-sway-browser-pod (target: pod)
    # ---------------------------------------------------------------
    # Disposable rootless podman container running the full Sway desktop
    # + Chrome + wayvnc stack. Exercises every live-container test verb
    # (cdp, wl, vnc, dbus, mcp, record) plus in-container health probes.
    # =================================================================
    openclaw-sway-browser-pod:
        target: pod
        image: openclaw-sway-browser
        disposable: true
        lifecycle: dev
        # Maps host ports so operator-side probes can reach them.
        # HOST_PORT:N substitution is available for `http:` tests.
        ports:
            - 18790:18789 # openclaw gateway
            - 5901:5900 # wayvnc
            - 9223:9222 # chrome devtools
        eval:
            # --- Pod-runtime health (in-container) -------------------
            - {id: sp-sway-running, scope: deploy, process: sway, running: true}
            - {id: sp-chrome-present, scope: deploy, command: "command -v google-chrome || command -v chromium"}
            - {id: sp-port-9222-listening, scope: deploy, port: 9222, listening: true}
            - {id: sp-port-5900-listening, scope: deploy, port: 5900, listening: true}
            - {id: sp-port-18789-listening, scope: deploy, port: 18789, listening: true}
            # --- http: (operator-side, via HOST_PORT substitution) ---
            - id: sp-http-cdp-json-version
              scope: deploy
              http: "http://127.0.0.1:${HOST_PORT:9222}/json/version"
              status: 200
            # --- cdp: verb (Chrome DevTools Protocol) ----------------
            - {id: sp-cdp-status, scope: deploy, cdp: status}
            - {id: sp-cdp-list, scope: deploy, cdp: list}
            - {id: sp-cdp-open-blank, scope: deploy, cdp: open, url: "about:blank",}
            # eval + screenshot require a tab id. Use sp-cdp-list first
            # to enumerate tabs; skip these deeper cdp checks here since
            # targeting a specific tab requires multi-step orchestration
            # beyond a single declarative probe.

            # --- wl: verb (Wayland + sway IPC) -----------------------
            - {id: sp-wl-status, scope: deploy, wl: status}
            - id: sp-wl-screenshot
              scope: deploy
              wl: screenshot
              artifact: /tmp/openclaw-sway-browser-pod-wl.png
              artifact_min_bytes: 1024
            - {id: sp-wl-sway-tree, scope: deploy, wl: "sway-tree"}
            - {id: sp-wl-sway-workspaces, scope: deploy, wl: "sway-workspaces"}
            - {id: sp-wl-sway-outputs, scope: deploy, wl: "sway-outputs"}
            # --- vnc: verb (RFB wire to wayvnc) ----------------------
            - {id: sp-vnc-status, scope: deploy, vnc: status}
            - id: sp-vnc-screenshot
              scope: deploy
              vnc: screenshot
              artifact: /tmp/openclaw-sway-browser-pod-vnc.png
              artifact_min_bytes: 1024
            # --- dbus: verb (D-Bus calls into container) -------------
            - {id: sp-dbus-list, scope: deploy, dbus: list}
            # --- mcp: verb (Model Context Protocol) ------------------
            - {id: sp-mcp-ping, scope: deploy, mcp: ping}
            - {id: sp-mcp-servers, scope: deploy, mcp: servers}
            - {id: sp-mcp-list-tools, scope: deploy, mcp: "list-tools"}
            # --- record: verb (asciinema / pixelflux) ----------------
            # start exercises the verb surface; cmd+stop require
            # multi-step orchestration state that doesn't survive
            # the declarative-probe boundary. Use `ov eval record`
            # CLI interactively for full record→cmd→stop cycles.
            - {id: sp-record-terminal-start, scope: deploy, record: start, record_name: test-term, record_mode: terminal}
            # --- matching: verb smoke -----------------------------
            - {id: sp-matching, scope: deploy, matching: "sway", equals: "sway"}
    # =================================================================
    # Bed 4: k3s-vm (target: vm, k3s-server inside the VM)
    # ---------------------------------------------------------------
    # Disposable libvirt-backed VM running k3s-server. The kubeconfig
    # artifact is pulled back to the operator for host-side `k8s:`
    # probes (all 13 methods) via the forwarded :6443 port. Unlike the
    # abandoned k3s-pod approach, a VM has its own kernel + cgroup
    # tree so the rootless-podman-user-slice-can't-delegate-cpuset
    # blocker simply doesn't exist: k3s bootstraps natively with no
    # SecurityArgs tricks, no fuse-overlayfs workaround, and no
    # KubeletInUserNamespace feature gate.
    # =================================================================
    k3s-vm:
        target: vm
        vm: k3s-vm
        disposable: true
        lifecycle: dev
        add_layers:
            - k3s-server
        env:
            - K3S_SERVER_HOSTNAME=127.0.0.1
            # Host port 16443 forwards into the guest's :6443. The
            # retrieved kubeconfig's server: line gets rewritten to this
            # URL so operator-side kubectl talks to the forwarded port.
            - K3S_KUBECONFIG_SERVER=https://127.0.0.1:16443
        install_opts:
            with_services: true
            allow_repo_changes: true # pacman sync / repo key import
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
        eval:
            # --- Guest identity + VM health --------------------------
            - {id: kv-guest-identity, scope: deploy, command: id, stdout: {contains: "uid=1000(arch)"}}
            - {id: kv-guest-os-release, scope: deploy, command: "cat /etc/os-release", stdout: {contains: "ID=arch"}}
            # --- k3s-server in-guest health --------------------------
            # Process name: the k3s binary re-execs into `k3s-server`
            # (visible via `systemctl show` Main PID — "k3s-server").
            # Matching against the original `k3s` binary name only works
            # if the process verb falls back to argv[0]; "k3s-server"
            # is the unambiguous post-exec comm name.
            - {id: kv-k3s-process, scope: deploy, process: "k3s-server", running: true}
            - {id: kv-port-6443-listening, scope: deploy, port: 6443, listening: true}
            - {id: kv-kubeconfig-file, scope: deploy, file: /etc/rancher/k3s/k3s.yaml, exists: true}
            # NOTE: no separate http: /healthz probe — k3s v1.31 gates
            # /healthz behind authn (returns 401 to anonymous), so a
            # strict `status: 200` check fails. `kv-k8s-raw-version`
            # already exercises the authenticated API path end-to-end
            # via the retrieved kubeconfig, which is the test we actually
            # want (proves TLS + auth + API server).
            # --- k8s: verb (all 13 methods) --------------------------
            - {id: kv-k8s-nodes, scope: deploy, k8s: nodes, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-wait-nodes, scope: deploy, k8s: "wait-nodes", cluster: "vm-k3s-vm", k8s_count: 1, timeout: "300s"}
            - {id: kv-k8s-pods, scope: deploy, k8s: pods, cluster: "vm-k3s-vm", namespace: kube-system}
            - {id: kv-k8s-wait-ready, scope: deploy, k8s: "wait-ready", cluster: "vm-k3s-vm", k8s_kind: Deployment, namespace: kube-system, name: coredns, timeout: "180s"}
            - {id: kv-k8s-ingressclass-traefik, scope: deploy, k8s: ingressclass, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-storageclass-localpath, scope: deploy, k8s: storageclass, cluster: "vm-k3s-vm", stdout: {contains: "local-path"}}
            - {id: kv-k8s-addons, scope: deploy, k8s: addons, cluster: "vm-k3s-vm"}
            - {id: kv-k8s-raw-version, scope: deploy, k8s: raw, cluster: "vm-k3s-vm", text: "version -o json"}
            - {id: kv-k8s-service-kubernetes, scope: deploy, k8s: service, cluster: "vm-k3s-vm", namespace: default, name: kubernetes}
            # --- command: ov-specific operator-side smoke ------------
            - {id: kv-ov-version, scope: deploy, command: "/tmp/ov-build/ov version || ov version", stdout: {matches: "[0-9]{4}\\.[0-9]+"}, in_container: false}
            # --- matching: verb smoke --------------------------------
            # contains: operator-map form for substring matching (scalar
            # shorthand under `contains:` is parsed as equals).
            - {id: kv-matching, scope: deploy, matching: "k3s-vm up", contains: {contains: "k3s"}}
    # =================================================================
    # ov-cachyos — this CachyOS workstation, target: local + host: local
    # ---------------------------------------------------------------
    # Applies the ov-cachyos kind:local template (defined in local.yml)
    # directly to the current machine via ShellExecutor — no SSH, no VM,
    # no container. Marked disposable: operator has authorized this host
    # as a test system, so `ov rebuild ov-cachyos` (full destroy +
    # reinstall via the install ledger) is allowed for strict R10
    # verification.
    #
    # The deployment shares the name `ov-cachyos` with the kind:local
    # template it applies — cross-kind name reuse is permitted as of
    # 2026-05; verbs disambiguate by command context (ov image build
    # ov-cachyos → image:ov-cachyos; ov rebuild ov-cachyos → the
    # deployment entry below). Migration from the prior `qc` /
    # `cachyos-dx` names: `ov migrate ov-cachyos` (idempotent).
    # =================================================================
    ov-cachyos:
        target: local
        local: ov-cachyos
        host: local
        disposable: true
        install_opts:
            with_services: true
            allow_repo_changes: true
            allow_root_tasks: true
        env:
            - EDITOR=nvim
        description:
            feature: Apply ov-cachyos to this workstation
            tag: [testing]
    # =================================================================
    # Per-kind R10 smoke beds — disposable, fast (fedora-minimal:43).
    # One bed per kind so a single `ov eval live <bed>` end-to-end runs
    # smoke-tests every kind path without rebuilding heavy images.
    # =================================================================
    eval-image-pod:
        target: pod
        image: eval-image
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising kind:image
            tag: [working]
    eval-layer-pod:
        target: pod
        image: eval-layer
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising kind:layer composition
            tag: [working]
    eval-pod-pod:
        target: pod
        image: eval-pod
        disposable: true
        lifecycle: dev
        ports:
            - 18794:18794
        description:
            feature: Fast pod bed exercising kind:pod runtime
            tag: [working]
    eval-deploy-pod:
        target: pod
        image: eval-deploy
        disposable: true
        lifecycle: dev
        description:
            feature: Fast pod bed exercising DeployTarget rendering
            tag: [working]
    eval-local-deploy:
        target: local
        local: eval-local
        host: local
        disposable: true
        lifecycle: dev
        description:
            feature: Fast local bed exercising kind:local layer application
            tag: [working]
    jupyter-pod:
        target: pod
        image: jupyter
        disposable: true
        lifecycle: dev
        ports:
            - 28888:8888
        description:
            feature: R10 bed for jupyter-mcp regression coverage (auto-attach, canonicalization, idle-room sweep, cell_update id-preservation)
            tag: [working]
# =============================================================================
# Top-level vm: section — kind:vm entity definitions.
# Each entity is a build-time spec; deploy-time properties (disposable,
# lifecycle, layers, env, ports, tests) live on the matching deployments:
# entry. Disposability FIELDS ARE A DEPLOY PROPERTY (see /ov-dev:disposable);
# the `vm.arch.disposable` entry below is retained for backward compatibility
# during the Phase 6 migration — the load-bearing copy is in
# deployments.images.arch-vm.disposable.
# =============================================================================
vm:
    arch:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        # Retained for Phase 6 migration; load-bearing copy is on
        # deployments.images.arch-vm (deploy-level property).
        disposable: true
        lifecycle: dev
        # `backend: libvirt` is REQUIRED — the arch-vm bed's eval list
        # contains 8 `ov eval libvirt …` probes + 2 `ov eval spice …`
        # probes that all hit the libvirt user-session daemon socket.
        # With `backend: auto` and the daemon NOT running on the
        # operator's machine, resolveVmBackend silently falls through
        # to direct-qemu and every libvirt-RPC probe fails with
        # "no such file or directory". Explicit `backend: libvirt`
        # makes resolveVmBackend fail loudly with a `systemctl --user
        # enable --now virtqemud.service` hint instead. See
        # /ov-advanced:vm "Backend matrix" for the prereq.
        backend: libvirt
        disk_size: 40G
        ram: 8G
        cpus: 4
        machine: q35
        firmware: bios
        network:
            mode: user
        ssh:
            port: 2224
            key_source: generate
        cloud_init:
            timezone: UTC
            packages:
                # The host's ov binary (PKGBUILD `depends=()`) is built
                # with cgo for SPICE audio: `gordonklaus/portaudio`
                # links against libportaudio.so.2; the SPICE protocol
                # path also pulls `libopusfile.so.0` and `libopus.so.0`
                # transitively. Under `ov_install.strategy: auto` the
                # host binary is scp'd into the guest, so the guest
                # MUST ship those .so files — `portaudio` and
                # `opusfile` (which pulls `opus`) cover all three.
                # Without any of them, `ov version` exits 127 with
                # "error while loading shared libraries".
                #
                # `base-devel` and `git` are required by the bed's
                # `package:` eval probes (deploy.yml lines ~145, ~146).
                # They were dropped in error during the runcmd cleanup
                # of the 2026-05 R10 follow-up; re-added 2026-05-06.
                - sudo
                - spice-vdagent
                - qemu-guest-agent
                - portaudio
                - opusfile
                - base-devel
                - git
            runcmd:
                # Activate the desktop / agent units that came in with
                # cloud_init.packages. The legacy ov-from-source build
                # block (git clone + makepkg + pacman -U) was DELETED
                # in the 2026-05 R10 follow-up: it was redundant with
                # `ov_install.strategy: auto` (which scps the host
                # binary post-boot via VmDeployTarget) AND timed out
                # under load — leaving non-empty errors[] in
                # /var/lib/cloud/data/result.json that broke the
                # `cloud-init no-errors` eval probe.
                #
                # `pacman-key --init && --populate archlinux` is
                # required for post-boot pacman invocations driven
                # by `ov deploy add arch-vm <ref>` (layer install via
                # SSH). Without it, `pacman -Sy <pkg>` fails with
                # `keyring is not writable / required key missing`.
                # Cloud-init's own `packages:` step is unaffected
                # (cloud-init bootstraps its own keyring); only the
                # later operator-driven pacman calls need this.
                - pacman-key --init
                - pacman-key --populate archlinux
                - systemctl enable --now spice-vdagentd
                - systemctl enable --now qemu-guest-agent
            ov_install:
                # `auto` scps the host's ov binary into the guest
                # after cloud-init reaches steady-state. Sole install
                # path; no defence-in-depth runcmd fallback (it could
                # not consume the scp's failure signal anyway because
                # cloud-init runs before VmDeployTarget.Emit fires).
                strategy: auto
        libvirt:
            devices:
                channels:
                    - type: spicevmc
                      name: com.redhat.spice.0
                graphics:
                    - type: spice
                      listen:
                        - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
            snippets:
                - "<channel type='unix'><target type='virtio' name='org.qemu.guest_agent.0'/></channel>"
    # =================================================================
    # k3s-vm entity — dedicated VM for the k3s-vm deployment bed.
    # Cloud-image Arch (same base as `arch`) because a k3s server
    # needs nothing Arch-specific — any distro with systemd + iptables
    # + conntrack + kernel overlayfs works. Sized for a single-node
    # control-plane + traefik + coredns + local-path-provisioner:
    # 2 cpus / 4G RAM / 20G disk is comfortable, not tight. Port-
    # forwards :6443 to the host so the operator can reach the
    # kubernetes API from `kubectl` using the kubeconfig pulled back
    # by the k3s-server layer's artifacts: block.
    # =================================================================
    k3s-vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        # `backend: libvirt` matches arch — `ov eval kind k8s` shares
        # the dispatcher path with `ov eval kind vm` and reaches the
        # same libvirt-RPC eval list. See the matching note on the
        # arch: VM template above.
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpus: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            port_forwards:
                # host 16443 → guest 6443. Host port 6443 is often
                # already held by an operator-level service (passt on
                # Tailscale exit nodes binds :6443 for quic-forward),
                # so the guest-side canonical port is kept at 6443 but
                # exposed on the host as 16443. Matches the prior
                # k3s-pod bed's host-port choice.
                - "16443:6443"
        ssh:
            port: 2225 # non-default, coexists with arch-vm's 2224
            key_source: generate
        cloud_init:
            # Minimal. Arch cloud image ships pacman-key populated, so
            # no runcmd is needed to bootstrap pacman. We don't ship
            # qemu-guest-agent: the bed's tests use command:/http:/k8s:
            # exclusively (no libvirt guest/* verbs), and the VM has no
            # virtio-serial channel for the agent anyway.
            timezone: UTC
            packages:
                - sudo
            ov_install:
                strategy: auto
        libvirt:
            devices:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
    aurora-bootc:
        source:
            kind: bootc
            image: aurora
        disk_size: 80 GiB
        ram: 12G
        cpus: 4
    bazzite-ai-bootc:
        source:
            kind: bootc
            image: bazzite-ai
    openclaw-browser-bootc-bootc:
        source:
            kind: bootc
            image: openclaw-browser-bootc
        disk_size: 20 GiB
        ram: 4G
        cpus: 2
        ssh:
            user: root
            port: 2222
    selkies-desktop-bootc-bootc:
        source:
            kind: bootc
            image: selkies-desktop-bootc
        disk_size: 40 GiB
        ram: 8G
        cpus: 4
        ssh:
            user: root
            port: 2250
# ============================================================================
# kind:k8s entity — used by `k8s:` test verbs (cluster: "vm-k3s-vm")
# to resolve the kubectl context that K3sPostProvision merged into
# ~/.kube/config during `ov deploy add k3s-vm`. Without this entity,
# `cluster: <name>` falls through to the kubectl current-context, which
# on a shared operator host is whatever kubeconfig was last used — not
# the freshly-provisioned k3s VM.
# ============================================================================
k8s:
    vm-k3s-vm:
        # Minimal: only kubeconfig_context is load-bearing for the
        # test-k8s lookup path. Image is a required field for WORKLOAD
        # deployments against this cluster; left empty because this
        # entity is only used as a cluster reference by test probes.
        image: ""
        kubeconfig_context: vm-k3s-vm
