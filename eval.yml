# =============================================================================
# vm: — kind:vm entity backing the eval-k3s-vm bed (referenced via `vm: k3s-vm`).
# Cloud-image Arch; single-node control-plane sizing (2 cpu / 4G / 20G).
# Port-forwards guest :6443 to host :16443 for operator-side kubectl.
# =============================================================================
vm:
    k3s-vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            # `port_forwards` (plural) is the canonical key — VmNetwork.PortForwards
            # (yaml:"port_forwards"), a kept-plural key in the field-singular cutover.
            # The original bed used the singular `port_forward:`, which YAML silently
            # dropped → no host:16443 forward → the k8s probes hit
            # `dial 127.0.0.1:16443: connection refused`.
            port_forwards:
                - "16443:6443"
        ssh:
            # port_auto auto-allocates the host SSH port at create (was a fixed
            # 2225 chosen to dodge collisions — port_auto does that automatically).
            # This bed is also the R10 for the ssh.port_auto feature: the entire
            # k3s deploy connects over SSH on the auto-allocated port.
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
            ov_install:
                strategy: auto
        libvirt:
            devices:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
    # Arch Cloud VM backing eval-charly-vm — the pac localpkg deploy witness. Plain
    # disposable VM (no port forwards / k3s); charly is installed onto it by the bed's
    # localpkg deploy, so the VM itself carries no opencharly layers.
    charly-vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
# =============================================================================
# k8s: — kind:k8s entity resolving the kubectl context (cluster: "vm-k3s-vm")
# that K3sPostProvision merged into ~/.kube/config during the eval-k3s-vm
# deploy. Without it, cluster: <name> falls through to the current-context.
# =============================================================================
k8s:
    vm-k3s-vm:
        box: ""
        kubeconfig_context: vm-k3s-vm
