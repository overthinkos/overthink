            tag: [working]
    eval-android-emulator-pod:
        target: pod
        box: android-emulator
        disposable: true
        lifecycle: dev
        port:
            - 35000:3000 # Selkies HTTPS web UI
            - 35001:4723 # Appium WebDriver
            - 35002:5037 # ADB server
            - 35003:2222 # SSH
        # Nested kind:android devices, deployed onto the STARTED emulator pod
        # (the bed runner deploys nested children after `charly start`, then runs
        # eval-live). `device` is the in-pod emulator (apkeep in-pod installs
        # the android-test-apps layer's F-Droid); `device-net` addresses the
        # SAME emulator as a remote adb ENDPOINT (goadb push installs the
        # android-apidemos committed APK), exercising the remote/physical
        # device code path with no hardware. App presence is asserted by the
        # android-emulator-layer baked eval (apk-fdroid-* / apk-net-apidemos-*).
        nested:
            device:
                target: android
                android: pixel9a-36
                add_candy:
                    - android-test-apps
            device-net:
                target: android
                android: pixel9a-endpoint
                add_candy:
                    - android-apidemos
        description:
            feature: "R10 bed for android-emulator — Android 16 (API 36 x86_64 google_apis_playstore) emulator on pixel_9a with /dev/kvm passthrough, Selkies web UI on https://localhost:35000, Appium WebDriver on http://localhost:35001/wd/hub, ADB via ANDROID_ADB_SERVER_SOCKET=tcp:localhost:35002 adb devices. Play Store + GMS + Chrome preinstalled (asserted present + launchable). Nested kind:android devices install apps via the `apk:` package format: an in-pod emulator device installs F-Droid (apkeep in-pod), and a remote adb-ENDPOINT device installs the committed ApiDemos (goadb over the published 35002 port) — proving target:android + nested deployment for both device kinds. CPU/RAM auto-size from the host."
            tag: [testing]
        eval:
            # eval-coverage gate for the unified `charly status` ANDROID substrate +
            # the nested-deploy tree: the android device row(s) must render, and
            # the nested structure must overlay under the emulator pod. Fails if
            # AndroidCollector or status_nested regress.
            - id: status-shows-android
              scope: deploy
              command: charly status --json
              in_container: false
              stdout:
                - contains: '"kind": "android"'
            - id: status-shows-nested
              scope: deploy
              command: charly status --json
              in_container: false
              stdout:
                # The pod→android nested tree renders as a JSON `nested:[…]`
                # array under the emulator pod (children bare-keyed device/
                # device-net; the parent context comes from the nesting, so
                # there is no flattened dotted path). Assert the overlay
                # structure. Fails if status_nested stops nesting the
                # AndroidCollector rows under their parent pod.
                - contains: '"nested"'
