#  SINGLE SOURCE OF TRUTH for the Fedora base stack — `fedora`, `fedora-builder`,
#  and `fedora-nonfree`. There is exactly ONE copy of these three definitions —
#  they are NOT also in image.yml — so there is no duplication.
#
#  Included by BOTH this repo's overthink.yml (locally) AND the
#  `overthinkos/fedora` submodule (remotely, via
#  `include: '@github.com/overthinkos/overthink/fedora-base.yml:<tag>'`).
#
#  fedora is the ecosystem default base: most main images root on `fedora` /
#  `fedora-nonfree` (jupyter, immich, hermes, nvidia, the eval beds, …) and
#  `fedora-builder` is main's defaults.builder. (selkies-desktop and the
#  openclaw family moved to the cachyos base — see CHANGELOG.md.) The base
#  stack therefore STAYS in main — only the Fedora
#  consumer showcase images (fedora-coder / fedora-ov / fedora-test) moved to
#  the submodule. There is NO main → fedora coupling: main owns this file
#  locally and remote-includes nothing from the new repo.
#
#  fedora-builder's + fedora-nonfree's layer: lists use github references (not
#  plain names) so the SAME file resolves in both contexts: a remotely-included
#  file's plain layer names would resolve against the CONSUMING project's layers/
#  (which the submodule does not have). With github refs, BOTH main and the
#  submodule fetch these layers from this repo by reference — github references
#  everywhere, one definition.
#
#  Every github ref MUST pin to the SAME tag arch-base.yml + the submodule pin
#  their other refs to (CollectRemoteRefs rejects one bare ref appearing at two
#  versions; fedora-base.yml + arch-base.yml share pixi/nodejs/build-toolchain).
version: 2026.141.1600
image:
    fedora:
        base: quay.io/fedora/fedora:43
        distro:
            - fedora:43
            - fedora
        builder:
            cargo: fedora-builder
            npm: fedora-builder
            pixi: fedora-builder
        produce:
            - pixi
            - npm
            - cargo
    fedora-builder:
        base: fedora
        layer:
            - '@github.com/overthinkos/overthink/layers/rpmfusion:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/pixi:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.141.1600'
            - '@github.com/overthinkos/overthink/layers/build-toolchain:v2026.141.1600'
        produce:
            - pixi
            - npm
            - cargo
    fedora-nonfree:
        base: fedora
        # Explicit builder map (like `fedora` above + cachyos-base.yml's cachyos):
        # fedora-nonfree is a base that consumers compile on (e.g. fedora-coder),
        # and builder maps do NOT propagate transitively through the base chain.
        # In the main repo this is redundant with defaults.builder, but the
        # overthinkos/fedora submodule declares no defaults.builder, so consumers
        # there inherit their builders from this map.
        builder:
            cargo: fedora-builder
            npm: fedora-builder
            pixi: fedora-builder
        layer:
            - '@github.com/overthinkos/overthink/layers/rpmfusion:v2026.141.1600'
