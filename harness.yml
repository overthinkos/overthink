# harness.yml — AI catalog (kind:ai) + harness recipes (kind:recipe).
# Produced by `ov migrate harness`.
#
# Edit recipe.default.pod / .vm / .host below to point the harness at
# the deployment that should run iterations.

ai:
  claude:
    description:
      feature: "Anthropic Claude Code CLI — autonomous coding agent."
    command: [claude, -p, --dangerously-skip-permissions, "${PROMPT}"]
    version_command: [claude, --version]
    credential:
      - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}

  codex:
    description:
      feature: "OpenAI Codex CLI — coding agent."
    command: [codex, exec, "${PROMPT}"]
    version_command: [codex, --version]
    credential:
      - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}

  gemini:
    description:
      feature: "Google Gemini CLI."
    command: [gemini, chat, "${PROMPT}"]
    version_command: [gemini, --version]
    credential:
      - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}

recipe:
  r10-solve:
    description:
      feature: "R10 verification — host target solving the bench-target scenario."
    host: true
    disposable: true
    ai: [claude]
    plateau_iteration: 1
    max_iteration: 1
    target_image: "bench-target"
    notes: false
    mcp_endpoint: ""
    env: {}
    prompt: |
      You are running iteration ${ITERATION} of the ov harness against the
      bench-target image. The single failing BDD scenario is:

         Then the marker file /etc/ov-bench-marker exists with content "ov benchmark target"

      Your cwd is ${WORKSPACE} (a per-run git clone). Edit the file
      layers/bench-target-layer/layer.yml — under its existing tasks: list,
      add a write: task that creates /etc/ov-bench-marker with the exact
      content "ov benchmark target". The task should look like:

         - write: /etc/ov-bench-marker
           user: root
           mode: "0644"
           content: |
             ov benchmark target

      Just make that one edit and exit. Do NOT touch the description block
      (changing scenario text counts as tampering, not solving).

  default:
    description:
      feature: "Default recipe migrated from legacy benchmark: block."
    # Where to run this recipe — exactly ONE of pod / vm / host:
    #   pod:  <name>   # name of a running pod deployment (ov start <name>)
    #   vm:   <name>   # name of a running VM (ov vm start <name>)
    #   host: true     # run on this host directly (requires disposable: true)
    pod: ""             # ← fill in the pod deployment name
    ai: [claude, codex, gemini]
    plateau_iteration: 3
    max_iteration: 50
    tag: ""
    target_image: ""
    notes: true
    mcp_endpoint: "http://localhost:18765/mcp"
    env: {}
    prompt: |
      == Memory ==
      Notes from previous runs (read-only context — do not edit by hand):
      
      ${NOTES}
      
      If you discover something worth remembering for future runs of this recipe — a subtle
      convention, a fragile test, a mis-tagged scenario, a workaround that took an hour to find —
      append a brief note via:
          ov harness note append "<one-paragraph note>"
      
      Notes are persistent across runs of recipe ${RECIPE_NAME}. Be terse. Future-you reads them.
      
      You are benchmarking BDD-scenario-solving inside an overthink project.
      This is iteration ${ITERATION} of up to ${MAX_ITERATION}. Your current
      best score is ${BEST_SCORE}; plateau counter is ${PLATEAU_COUNTER} of
      ${PLATEAU_ITERATION}.
      
      Your cwd is the git worktree at ${WORKSPACE}. Edits you make are
      captured per-iteration as git commits on branch ovbench/${RUN_ID}.
      
      MCP tools: ${MCP_ENDPOINT} (if non-empty — 190 tools).
      
      Read scope:              ov harness scope
      Inspect scenario:        ov feature list <origin>
      Validate edits:          ov feature validate <origin>
      See prior test output:   ov image test $(ov harness last-test-tag) --format yaml
      
      Ground rules:
        - Do NOT edit scenario text (fingerprint change = tampered, not solved).
        - Do NOT add new scenarios (they don't count).
        - Partial progress counts.
        - Across iterations, your worktree keeps prior edits.
      
      Exit when done with this iteration.
