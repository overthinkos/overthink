# harness.yml — three kinds:
#   kind: ai     — reusable AI-CLI catalog
#   kind: recipe — pure spec; every scenario carries `pod:` declaring
#                  the one container its steps probe
#   kind: score  — runner config (target bench-pod, AI, plateau, prompt)
#                  referencing one or more recipes via `recipes:`
#
# Architecture: the harness owns the bench-pod (rebuilt fresh per run);
# the AI inside bench-pod owns everything else (image builds, deployments,
# state edits). The harness scores the live state per recipe scenarios
# after each iteration — `containerName := "ov-" + scenario.pod`,
# `podman exec` against bench-pod's nested podman.

ai:
  claude:
    description:
      feature: "Anthropic Claude Code CLI — autonomous coding agent."
    # --verbose + --output-format stream-json emit one JSON object per
    # message in the agent loop (system / assistant / user / tool_use /
    # tool_result / result). The harness parses each line, embeds it
    # into result-{calver}.yml under iteration[].runner_event, and tees
    # the raw NDJSON to .harness/<score>/runs/<run-id>/iter<k>/runner.ndjson
    # for byte-exact debugging. See plugins/ov/skills/harness/SKILL.md
    # "stream-json runner output" for the wire format.
    command: [claude, -p, --verbose, --output-format, stream-json,
              --dangerously-skip-permissions, "${PROMPT}"]
    output_format: stream-json
    version_command: [claude, --version]
    credential:
      - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}

  codex:
    description:
      feature: "OpenAI Codex CLI — coding agent."
    command: [codex, exec, "${PROMPT}"]
    version_command: [codex, --version]
    credential:
      - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}

  gemini:
    description:
      feature: "Google Gemini CLI."
    command: [gemini, chat, "${PROMPT}"]
    version_command: [gemini, --version]
    credential:
      - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}

# kind: recipe — every scenario carries `pod:` declaring its scoring target.
recipe:
  tier1-easy:
    description:
      feature: "Tier 1 — marker file in tier1's own pod."
    scenario:
      - name: marker-file-exists
        pod: harness-tier1
        steps:
          - then: "/etc/ov-bench-marker exists"
            file: /etc/ov-bench-marker
            exists: true
      - name: marker-file-content
        pod: harness-tier1
        steps:
          - then: "/etc/ov-bench-marker contains 'ov benchmark target'"
            file: /etc/ov-bench-marker
            contains: [ov benchmark target]

  tier2-medium:
    description:
      feature: "Tier 2 — HTTP service on port 8080 (shared pod with tier3)."
    scenario:
      - name: http-port-listening
        pod: harness-tier23
        steps:
          - then: "port 8080 is listening"
            port: 8080
            listening: true
      - name: http-200-body
        pod: harness-tier23
        steps:
          - then: "GET / returns 200 with 'ov benchmark' in body"
            http: "http://localhost:8080/"
            status: 200
            body: { contains: [ov benchmark] }

  tier3-hard:
    description:
      feature: "Tier 3 — package + persistent file (shared pod with tier2)."
    scenario:
      - name: curl-installed
        pod: harness-tier23
        steps:
          - then: "curl is installed"
            command: "command -v curl"
            exit_code: 0
      - name: version-file
        pod: harness-tier23
        steps:
          - then: "/srv/bench/version.txt contains 'tier3-ok'"
            file: /srv/bench/version.txt
            exists: true
            contains: [tier3-ok]

  tier4-redis:
    description:
      feature: "Tier 4 — redis-client writes a randomized key cross-pod (no shortcuts)."
      narrative: |
        The harness drives a SET from redis-client → redis at scoring time
        using a freshly-generated random nonce that the AI never sees. The
        AI must wire redis to listen on a network interface (not just
        loopback) and ensure redis-client can reach ov-redis:6379.
        Pre-setting the key won't work — the harness generates the key and
        value AFTER the AI exits; the AI only ever sees ${HARNESS_NONCE_*}
        placeholders in its prompt. The only viable path is wiring the
        cross-pod connection genuinely.
    scenario:
      - name: redis-server-running
        pod: redis
        steps:
          - then: "redis-server process is running"
            process: redis-server
            running: true

      - name: redis-listens-on-network
        pod: redis
        steps:
          - then: "redis listens on a network interface (not loopback only)"
            command: "ss -tln | grep ':6379' | grep -v '127.0.0.1'"
            exit_code: 0

      - name: redis-client-has-cli
        pod: redis-client
        steps:
          - then: "redis-cli is installed"
            command: "command -v redis-cli"
            exit_code: 0

      - name: redis-cross-pod-set-from-client
        pod: redis-client
        steps:
          - then: "redis-client SETs bench:${HARNESS_NONCE_KEY} = ${HARNESS_NONCE_VALUE} on the redis pod"
            command: "redis-cli -h ov-redis SET bench:${HARNESS_NONCE_KEY} ${HARNESS_NONCE_VALUE}"
            stdout: { contains: [OK] }

      - name: redis-cross-pod-readback-on-server
        pod: redis
        depends_on: [redis-cross-pod-set-from-client]
        steps:
          - then: "the random key landed in redis with the correct value"
            command: "redis-cli get bench:${HARNESS_NONCE_KEY}"
            stdout: { contains: ["${HARNESS_NONCE_VALUE}"] }

  # ---------------------------------------------------------------------------
  # Self-test recipes for the `from:` composition primitive.
  # These exercise per-kind expansion and multi-kind composition end-to-end
  # against real entities in this repo (sshd layer + arch-coder image).
  # See plugins/ov/skills/harness/SKILL.md "Composition with from:" for
  # the authoring reference.
  # ---------------------------------------------------------------------------

  from-single-kind-selftest:
    description:
      feature: |
        Self-test of per-kind `from:` expansion. Pulls 2 specific tests
        from the sshd layer and 1 from the arch-coder image in
        ISOLATION (each onto its own dedicated harness container).
        Failure here means per-kind expansion is broken.
    from:
      - kind: layer
        name: sshd
        pod:  selftest-layer
        select: [sshd-binary, sshd-wrapper]
      - kind: image
        name: arch-coder
        pod:  selftest-image
        scope: [image]
        select: [arch-coder-ov]

  from-composition-selftest:
    description:
      feature: |
        Self-test of multi-kind composition: TWO `from:` entries onto
        the SAME container (composition-app), filter pipeline with
        select+exclude, plus a hand-written scenario whose
        `depends_on:` crosses the imported/hand-written namespace
        boundary. Failure here means composition wiring or
        namespace resolution is broken.
    from:
      # Two from: entries onto the SAME pod — composition demonstration.
      - kind: layer
        name: sshd
        pod:  composition-app
        select: [sshd-binary]
      - kind: image
        name: arch-coder
        pod:  composition-app                # SAME pod as the layer above
        scope: [image]
        select: [arch-coder-ov, arch-coder-languages]
        exclude: [arch-coder-languages]      # exercise the exclude filter
        prefix: img                           # → "img-arch-coder-ov" scenario name
    scenario:
      # Hand-written scenario that depends_on an imported test —
      # exercises cross-namespace dep resolution (Section-5 invariant:
      # imported and hand-written scenarios share one ScenarioID
      # namespace).
      - name: composition-handwritten-probe
        pod: composition-app
        depends_on: [sshd-binary]            # ← imported scenario name
        steps:
          - then: "marker file written during composition self-test is present"
            file: /etc/ov-composition-selftest
            exists: true

  # ---------------------------------------------------------------------------
  # Phase 7 — deeply nested topology: VM containing a pod containing a
  # nested pod, with cross-hop nonce-protected end-to-end traffic.
  #
  # Probes use dotted scenario.pod ("nested-bench-vm.inner-app-pod.nested-redis-pod")
  # which the harness scorer walks via ResolveDeployChain (deploy_chain.go,
  # 2026-04 cutover) — same code path as `ov deploy add` and `ov test
  # parent.child`. The harness builds a four-deep DeployExecutor chain for
  # the deepest scenarios:
  #
  #   bench-pod (LocalDeployExecutor)
  #     → SSH into nested-bench-vm
  #         → podman exec into ov-inner-app-pod
  #             → podman exec into ov-inner-app-pod_nested-redis-pod
  #
  # Bench-pod prerequisite (image.yml): the virtualization layer + /dev/kvm
  # so the AI can actually spawn a nested VM under libvirt.
  # ---------------------------------------------------------------------------
  nested-vm-pod-pod:
    description:
      feature: "Deeply nested — VM containing a pod containing a nested pod, with cross-hop traffic."
      narrative: |
        Maximum-nesting topology you've ever seen the harness probe:

          bench-pod  →  VM  →  inner pod  →  nested pod

        Goal for the AI: build this topology end-to-end and prove the
        chain works with a HARNESS_NONCE-protected probe that the AI
        never sees the value of. Pre-setting the key won't work — the
        nonce is generated AFTER the AI exits the iteration.

        Workflow inside the bench-pod:
          1. `ov vm create nested-bench-vm` — spawn a real VM via libvirt
             (KVM-accelerated; bench-pod has /dev/kvm exposed).
          2. `ov deploy add nested-bench-vm <vm-image>` — register the VM
             as a deployment so ResolveDeployChain can walk it.
          3. `ov deploy add nested-bench-vm.inner-app-pod <pod-image>` —
             nested pod inside the VM (deploys via SSH + nested podman).
          4. `ov deploy add nested-bench-vm.inner-app-pod.nested-redis-pod redis` —
             pod nested inside the inner pod (requires nested podman in
             the inner pod's image).
          5. Wire redis-cli inside ov-inner-app-pod to reach
             ov-inner-app-pod_nested-redis-pod.

        Every scenario probes through the chain — there is no shortcut.
    scenario:
      # ─── Layer 1: VM exists and is reachable ─────────────────────────
      - name: vm-running
        pod: nested-bench-vm
        steps:
          - then: "VM has booted and SSH responds"
            command: "uptime"
            exit_code: 0

      - name: vm-has-kvm-acceleration
        pod: nested-bench-vm
        depends_on: [vm-running]
        steps:
          - then: "guest sees /dev/kvm (nested KVM enabled in bench-pod)"
            file: /dev/kvm
            exists: true

      # ─── Layer 2: pod inside the VM ──────────────────────────────────
      - name: inner-pod-running
        pod: nested-bench-vm.inner-app-pod
        depends_on: [vm-running]
        steps:
          - then: "inner pod's primary process is running"
            process: nginx
            running: true

      - name: inner-pod-listens-8080
        pod: nested-bench-vm.inner-app-pod
        depends_on: [inner-pod-running]
        steps:
          - then: "port 8080 listens inside the inner pod"
            port: 8080
            listening: true

      # ─── Layer 3: pod nested inside the inner pod ────────────────────
      - name: nested-pod-running
        pod: nested-bench-vm.inner-app-pod.nested-redis-pod
        depends_on: [inner-pod-running]
        steps:
          - then: "nested redis-server is running"
            process: redis-server
            running: true

      - name: nested-pod-listens-network
        pod: nested-bench-vm.inner-app-pod.nested-redis-pod
        depends_on: [nested-pod-running]
        steps:
          - then: "nested redis listens on a network interface (not loopback)"
            command: "ss -tln | grep ':6379' | grep -v '127.0.0.1'"
            exit_code: 0

      # ─── End-to-end nonce-protected probe (the real test) ────────────
      - name: nested-set-from-inner
        pod: nested-bench-vm.inner-app-pod
        depends_on: [nested-pod-listens-network]
        steps:
          - then: "inner pod SETs bench:${HARNESS_NONCE_KEY} = ${HARNESS_NONCE_VALUE} on the nested redis"
            command: "redis-cli -h ov-inner-app-pod_nested-redis-pod SET bench:${HARNESS_NONCE_KEY} ${HARNESS_NONCE_VALUE}"
            stdout: { contains: [OK] }

      - name: nested-readback-on-deepest
        pod: nested-bench-vm.inner-app-pod.nested-redis-pod
        depends_on: [nested-set-from-inner]
        steps:
          - then: "the random key landed in the nested redis with the correct value"
            command: "redis-cli get bench:${HARNESS_NONCE_KEY}"
            stdout: { contains: ["${HARNESS_NONCE_VALUE}"] }

      # ─── Cross-hop reachability (VM-to-tier4-redis on bench-pod) ─────
      - name: vm-can-reach-bench-redis
        pod: nested-bench-vm
        depends_on: [vm-running]
        steps:
          - then: "VM guest can reach the bench-pod-side redis from tier4"
            command: "redis-cli -h ov-redis ping"
            stdout: { contains: [PONG] }

# kind: score — runner config. References recipes by name; the harness
# concatenates their scenarios in order and scores against each
# scenario's `pod:` field.
score:
  default:
    description:
      feature: "Default benchmark — progressive recipe disclosure across four tier recipes."
    pod: bench-pod                    # iterations + scoring run inside ov-bench-pod
    ai: [claude]
    plateau_iteration: 3
    progressive: true                 # curriculum-style: phase N adds recipe N
    target_image: "bench-target"      # informational prompt token (${TARGET_IMAGE})
    deployment: "harness-default"     # informational prompt token (${DEPLOYMENT})
    notes: true
    mcp_endpoint: "http://localhost:18765/mcp"
    env: {}
    recipes:
      - tier1-easy
      - tier2-medium
      - tier3-hard
      - tier4-redis
      - from-single-kind-selftest         # phase 5 — per-kind `from:` expansion
      - from-composition-selftest         # phase 6 — multi-kind composition + filters + cross-namespace deps
      - nested-vm-pod-pod                 # phase 7 — VM/pod/pod chain via dotted scenario.pod (deploy_chain.go)
    prompt: |
      == Where you are ==
      Your cwd is /workspace (= the project tree, bind-mounted from the host
      into this freshly-rebuilt bench-pod). You have FULL sudo + nested podman
      + every package the recipes need. Host services are completely invisible;
      you cannot conflict with them.

      == Phase progression — curriculum-style ==
      ${PHASE_INTRO}
      You are in PHASE ${PHASE} of ${PHASE_TOTAL}. The benchmark adds one
      recipe per phase: phase 1 starts with the easiest, each later phase
      brings the previous recipes BACK plus one new one. State persists
      across phases — pods you deployed in phase 1 stay running for phase
      2's scoring. Solve every IN-SCOPE recipe before the next phase widens
      the surface; partial work is fine, but every scenario the harness
      probes will be probed every phase from now on.

      == Iteration semantics within this phase — NO RUSHING ==
      Iteration ${ITERATION} of an UNBOUNDED loop within phase ${PHASE}.
      Score progression: ${BEST_SCORE} (last delta: ${SCORE_DELTA})

      The phase ends when:
        - every in-scope scenario passes (solved-all → next phase begins), OR
        - you fail to improve your score for ${PLATEAU_ITERATION} iterations
          in a row (genuine plateau → next phase begins anyway).

      There is NO maximum iteration count per phase. Take all the time you
      need. A complete solution in iteration 7 outscores a partial solution
      in iteration 1. Correctness > speed. NO shortcuts. NO "ship something
      and hope" — every scenario the harness will probe, you can probe
      yourself with the SAME verbs (see step 3 below).

      == Recipes you must solve — IN-SCOPE FOR THIS PHASE ==
      ${RECIPES}

      Each scenario has a `pod:` field — the container the harness will
      probe its steps in. Read every scenario; collect the unique set of
      pod names; deploy a container with each name. Within ONE recipe,
      different scenarios may target different pods (e.g. tier4-redis
      probes both `redis` and `redis-client`). Across recipes, multiple
      recipes may share a pod name (e.g. tier2 + tier3 both use
      `harness-tier23`) — same container, more scenarios scored against it.

      Some scenarios carry `depends_on: [...]` — they only run after the
      named upstream scenarios pass. If you see a scenario marked
      `verdict: skipped` with `skipped_reason: "dep-unmet: <name>"`, the
      upstream <name> failed; fix that one first.

      == Workflow ==
      For each unique pod name across all scenarios:

      1. Build (or reuse) an image satisfying every scenario that targets
         that pod:
            bin/ov image build <your-image-name>
      2. On iter1: bin/ov deploy add <pod-name> <your-image-name> --disposable
         On iter2+: bin/ov update <pod-name>     (image swap, container kept)
      3. VERIFY YOUR OWN WORK — run the SAME scenarios the harness will score:
            bin/ov test <pod-name>
         If ANY verb returns fail, FIX IT before exiting. Don't exit on
         partial work hoping; make every probe green that you can.
      4. Notes:    bin/ov harness note append ${SCORE_NAME} "<short learning>"
      5. Exit only after step 3 returned all-green for every pod you spawned.

      MCP tools (if any): ${MCP_ENDPOINT}

      == Ground rules ==
        - Recipe scenarios are immutable — they live in harness.yml.
        - The bench-pod was rebuilt FRESH for this run; it persists across
          iters but is destroyed + recreated NEXT run.
        - Every pod a scenario references MUST be running at exit (that's
          what gets scored).
        - There is NO premium on speed. There IS a premium on every scenario
          you can make pass.

      Informational hints (NOT requirements):
        ${TARGET_IMAGE}    conventional image name (your call to use it)
        ${DEPLOYMENT}      conventional primary pod name (your call to use it)

      == Composition-derived scenarios (phases 5 + 6) ==
      Starting in phase 5, some scenarios listed under ${SCENARIOS} are
      AUTO-GENERATED from existing layer/image entity tests via the
      recipe's `from:` block (see plugins/ov/skills/harness/SKILL.md
      "Composition with from:"). Treat them IDENTICALLY to hand-written
      scenarios — same `pod:` semantics, same `depends_on:` namespace,
      same `bin/ov test <pod>` self-eval flow, same exit gate. The
      harness scorer cannot tell them apart and counts every check as
      one ScenarioID = one point (Section-5 scoring invariant).

      == Dotted-path scenario.pod (phase 7) ==
      Starting in phase 7, some scenarios carry DOTTED `pod:` values
      like `nested-bench-vm.inner-app-pod.nested-redis-pod`. The harness
      walks the dotted path through your `deploy.yml` tree via
      ResolveDeployChain (same code path `ov deploy add` and `ov test
      parent.child` use) and constructs a multi-hop chain to reach the
      leaf. To make these probes pass:

        1. `ov vm create nested-bench-vm` — spawn a real VM under
           libvirt. Bench-pod has /dev/kvm exposed for nested KVM.
        2. `ov deploy add nested-bench-vm <vm-image>` — register the VM
           as a top-level deployment. Required for ResolveDeployChain
           to walk the path.
        3. `ov deploy add nested-bench-vm.inner-app-pod <pod-image>` —
           deploy a pod INSIDE the VM (over SSH + nested podman).
        4. `ov deploy add nested-bench-vm.inner-app-pod.nested-redis-pod redis` —
           deploy ANOTHER pod inside the inner pod. Requires the inner
           pod's image to ship rootless nested podman.
        5. Wire redis-cli inside `ov-inner-app-pod` to reach the
           container literally named `ov-inner-app-pod_nested-redis-pod`
           (NestedContainerName flattens dots → underscores).

      Each scenario's `pod:` field tells you where the harness probe
      lands. Deeply-nested `pod:` values mean deeply-nested topology —
      no shortcuts; the chain has to be built genuinely.

      == When a source-code fix can't apply mid-run ==
      The harness loop runs as a long-lived Go process (PID inside
      bench-pod). Source fixes you make to /workspace/ov/*.go and
      `go build -o ../bin/ov` rebuilds appear on disk via the
      bind-mount, BUT the running harness PID has the OLD binary
      mmap'd and CANNOT hot-reload Go code. Your fix takes effect on
      the NEXT `ov harness run <score>` invocation — not the current
      one. Recommended response: record the fix via
      `bin/ov harness note append default "<short note>"` and exit
      this iteration cleanly; the next run will fork a fresh PID and
      pick up the new binary. Do NOT loop iterations 3+ trying to
      make the running PID see your on-disk fix; the score won't
      change this run.
