# harness.yml — AI catalog (kind:ai) + harness recipes (kind:recipe).
# Produced by `ov migrate harness`.
#
# Edit recipe.default.pod / .vm / .host below to point the harness at
# the deployment that should run iterations.

ai:
  claude:
    description:
      feature: "Anthropic Claude Code CLI — autonomous coding agent."
    command: [claude, -p, --dangerously-skip-permissions, "${PROMPT}"]
    version_command: [claude, --version]
    credential:
      - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}

  codex:
    description:
      feature: "OpenAI Codex CLI — coding agent."
    command: [codex, exec, "${PROMPT}"]
    version_command: [codex, --version]
    credential:
      - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}

  gemini:
    description:
      feature: "Google Gemini CLI."
    command: [gemini, chat, "${PROMPT}"]
    version_command: [gemini, --version]
    credential:
      - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}

recipe:
  default:
    description:
      feature: "Default benchmark — BDD scenario solved by live deployment."
    # Target: where the harness runs the AI. Exactly one of pod / vm / host:
    #   pod:  <name>   # name of a running pod deployment (ov start <name>)
    #   vm:   <name>   # name of a running VM (ov vm start <name>)
    #   host: true     # run on this host directly (requires disposable: true)
    host: true
    disposable: true
    ai: [claude]
    plateau_iteration: 3
    max_iteration: 5
    target_image: "bench-target"
    deployment: "harness-default"   # AI must `ov deploy add harness-default <ref>`
    notes: true
    mcp_endpoint: "http://localhost:18765/mcp"
    env: {}
    # The BDD scenarios the AI must make pass. The harness scores these
    # against the live ov-<deployment> container the AI created — the
    # recipe IS the spec, no scaffold expected.
    scenario:
      - name: "marker file is present with expected content"
        steps:
          - then: "the marker file /etc/ov-bench-marker exists with content 'ov benchmark target'"
            file: /etc/ov-bench-marker
            exists: true
            contains:
              - ov benchmark target
    prompt: |
      You are running iteration ${ITERATION} of up to ${MAX_ITERATION} of recipe ${RECIPE_NAME}.
      Best score so far: ${BEST_SCORE}; plateau ${PLATEAU_COUNTER}/${PLATEAU_ITERATION}.

      == BDD scenarios you must make pass ==
      ${SCENARIOS}

      == Workflow ==
      Your cwd is the per-run git clone at ${WORKSPACE}.
      Image to build: ${TARGET_IMAGE}
      Deployment to create: ${DEPLOYMENT}

      1. Edit layers/images as needed so ${TARGET_IMAGE} produces a container that
         satisfies the scenarios above.
      2. Build:    bin/ov image build ${TARGET_IMAGE}
      3. Deploy:   bin/ov deploy add ${DEPLOYMENT} ${TARGET_IMAGE}
      4. Verify:   bin/ov test ${DEPLOYMENT}    (inspect the live container)
      5. Notes:    bin/ov harness note append ${RECIPE_NAME} "<short learning>"
      6. Exit. The harness scores recipe scenarios against ov-${DEPLOYMENT}.

      MCP tools (if any): ${MCP_ENDPOINT}

      Ground rules:
        - The recipe scenarios are immutable — do NOT try to edit them, they
          live in harness.yml and the harness ignores image-baked scenarios.
        - The deployment must be running when you exit (this is what gets scored).
        - Partial progress across iterations counts; your worktree carries edits.
