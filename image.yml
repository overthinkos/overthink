defaults:
  registry: ghcr.io/overthinkos
  tag: auto

  platforms:
    - linux/amd64
  build: [rpm]
  builder:
    pixi: fedora-builder
    npm: fedora-builder
    cargo: fedora-builder
  merge:
    auto: false
    max_mb: 128
    max_total_mb: 0    # 0 = no limit; set to e.g. 2048 on CI runners with limited RAM
  format_config: build.yml

images:

  fedora:
    base: "quay.io/fedora/fedora:43"
    distro: ["fedora:43", fedora]
    builds: [pixi, npm, cargo]

  fedora-nonfree:
    base: fedora
    layers:
      - rpmfusion

  fedora-builder:
    base: fedora
    builds: [pixi, npm, cargo]
    layers:
      - rpmfusion          # Enables x264-devel / ffmpeg-devel for cargo builds of pixelflux_wayland
      - pixi
      - nodejs
      - build-toolchain

  ubuntu:
    enabled: false
    base: "ubuntu:24.04"
    build: [deb]

  debian:
    enabled: false
    base: "debian:13"
    build: [deb]

  archlinux:
    base: "docker.io/library/archlinux:latest"
    distro: [archlinux]
    build: [pac]
    builds: [pixi, npm, cargo, aur]
    builder:
      pixi: archlinux-builder
      npm: archlinux-builder
      cargo: archlinux-builder
      aur: archlinux-builder

  archlinux-builder:
    base: archlinux
    builds: [pixi, npm, cargo, aur]
    layers:
      - pixi
      - nodejs
      - build-toolchain
      - yay

  arch-test:
    base: archlinux
    build: [pac, aur]
    layers:
      - agent-forwarding
      - arch-pac-test
      - arch-aur-test

  arch-ov:
    base: archlinux
    uid: 0
    gid: 0
    user: root
    network: host
    layers:
      - agent-forwarding
      - ov-full
      - golang
      - gh
      - sshd
      - container-nesting
      - nvidia

  fedora-ov:
    base: fedora
    uid: 0
    gid: 0
    user: root
    network: host
    layers:
      - agent-forwarding
      - ov-full
      - golang
      - gh
      - sshd
      - container-nesting
      - nvidia

  fedora-test:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - traefik
      - testapi
    ports:
      - "8000:8000"
      - "8080:8080"

  valkey-test:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - supervisord
      - valkey
    ports:
      - "6379:6379"

  filebrowser:
    base: fedora
    layers:
      - agent-forwarding
      - filebrowser
      - dbus
      - ov
    ports:
      - "8085:8080"
    tests:
      # Composition: ov + dbus + filebrowser all coexist in the assembled image.
      - id: filebrowser-composed-binaries
        command: test -x /usr/local/bin/filebrowser && test -x /usr/local/bin/ov && test -x /usr/bin/dbus-daemon
        exit_status: 0
      - id: filebrowser-volumes-exist
        scope: deploy
        file: ${VOLUME_CONTAINER_PATH:data}
        filetype: directory

  openclaw:
    base: fedora
    layers:
      - agent-forwarding
      - openclaw
      - dbus
      - ov
    ports:
      - "18789:18789"

  openclaw-sway-browser:
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
      - sway-desktop-vnc
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser:
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw-full-ml
      - sway-desktop-vnc
      - ollama
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
      - "11434:11434"
    platforms:
      - linux/amd64

  sway-browser-vnc:
    base: fedora
    layers:
      - agent-forwarding
      - sway-desktop-vnc
      - dbus
      - ov
    ports:
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
    platforms:
      - linux/amd64
    tests:
      # Composition: core desktop binaries, VNC, and CDP coexist.
      - id: sway-browser-vnc-binaries
        command: test -x /usr/bin/sway && test -x /usr/bin/wayvnc && test -x /usr/bin/google-chrome-stable
        exit_status: 0
      # Deploy: sway + wayvnc both up under supervisord.
      - id: sway-browser-vnc-services
        scope: deploy
        command: supervisorctl status sway wayvnc | awk '{print $2}' | sort -u
        exit_status: 0
        in_container: true
        stdout:
          - equals: RUNNING

  nvidia:
    base: fedora-nonfree
    layers:
      - agent-forwarding
      - nvidia
      - cuda
    platforms:
      - linux/amd64

  python-ml:
    base: nvidia
    layers:
      - agent-forwarding
      - python-ml
    platforms:
      - linux/amd64

  jupyter:
    base: fedora
    layers:
      - agent-forwarding
      - jupyter
      - notebook-templates
      - dbus
      - ov
    ports:
      - "8888:8888"
    tests:
      # Composition: jupyter + notebook-templates provisioned together.
      - id: jupyter-notebook-templates-provisioned
        scope: deploy
        command: find ${HOME}/workspace -maxdepth 3 -name "*.ipynb" | head -n 1
        exit_status: 0
        in_container: true
        stdout:
          - matches: "\\.ipynb"
      - id: jupyter-mcp-extension-enabled
        command: ${HOME}/.pixi/envs/default/bin/jupyter server extension list 2>&1 | grep -i jupyter_mcp
        exit_status: 0

  jupyter-ml:
    base: nvidia
    layers:
      - agent-forwarding
      - jupyter-ml
      - notebook-templates
      - dbus
      - ov
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  jupyter-ml-notebook:
    base: nvidia
    layers:
      - agent-forwarding
      - jupyter-ml
      - notebook-templates
      - notebook-finetuning
      - notebook-ollama
      - notebook-llm-on-supercomputers
      - notebook-openrouter
      - dbus
      - ov
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  ollama:
    base: nvidia
    layers:
      - agent-forwarding
      - ollama
      - dbus
      - ov
    ports:
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama:
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw
      - ollama
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "11434:11434"
    platforms:
      - linux/amd64

  comfyui:
    base: nvidia
    layers:
      - agent-forwarding
      - comfyui
      - dbus
      - ov
    ports:
      - "8188:8188"
    platforms:
      - linux/amd64

  unsloth-studio:
    base: nvidia
    layers:
      - agent-forwarding
      - unsloth-studio
      - notebook-finetuning
      - dbus
      - ov
    ports:
      - "8888:8888"
      - "8000:8000"
    platforms:
      - linux/amd64

  githubrunner:
    base: fedora
    layers:
      - agent-forwarding
      - github-runner
      - ov-full
      - dbus
    platforms:
      - linux/amd64
    uid: 0
    gid: 0
    user: root
    network: host

  openclaw-browser-bootc:
    enabled: false
    base: "quay.io/fedora/fedora-bootc:43"
    bootc: true
    layers:
      - agent-forwarding
      - bootc-base
      - openclaw
      - pipewire
      - wayvnc
      - chrome-sway
    platforms:
      - linux/amd64
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
    vm:
      ssh_port: 2222
      disk_size: "20 GiB"
      ram: "4G"
      cpus: 2

  bazzite-ai:
    enabled: false
    base: "ghcr.io/ublue-os/bazzite-nvidia-open:stable-43.20260120.1"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - agent-forwarding
      - build-toolchain
      - language-runtimes
      - ujust
      - dev-tools
      - github-actions
      - virtualization
      - kubernetes
      - docker-ce
      - google-cloud
      - vr-streaming
      - cuda
      - devops-tools
      - grafana-tools
      - desktop-apps
      - vscode
      - typst
      - copr-desktop
      - os-config
      - os-system-files

  immich:
    base: fedora-nonfree
    layers:
      - agent-forwarding
      - nodejs24
      - supervisord
      - postgresql
      - vectorchord
      - redis
      - immich
      - dbus
      - ov
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64

  aurora:
    enabled: false
    base: "ghcr.io/ublue-os/aurora-dx-nvidia-open:stable-daily-43.20260305"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - agent-forwarding
      - sshd
      - ov-full
      - golang
    vm:
      disk_size: "80 GiB"
      ram: "12G"
      cpus: 4

  fedora-remote:
    base: "quay.io/fedora/fedora:43"
    layers:
      - "@github.com/overthinkos/overthink/layers/dev-tools:main"
      - "@github.com/overthinkos/overthink/layers/build-toolchain:v2026.64.1937"
      - "@github.com/overthinkos/overthink/layers/nodejs"
    platforms:
      - linux/amd64

  openclaw-full:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
    ports:
      - "18789:18789"
      - "9222:9222"
      - "9224:9224"

  openclaw-full-sway:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
      - sway-desktop-vnc
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
    platforms:
      - linux/amd64

  openclaw-full-ml:
    enabled: false
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw-full-ml
      - sway-desktop-vnc
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "9224:9224"
      - "11434:11434"
    platforms:
      - linux/amd64

  selkies-desktop:
    base: fedora-nonfree
    layers:
      - agent-forwarding
      - selkies-desktop
      - dbus
      - ov
    ports:
      - "3000:3000"
      - "9222:9222"
      - "9224:9224"
      - "2222:2222"
    platforms:
      - linux/amd64
    tests:
      # Composition: full desktop stack present.
      - id: selkies-desktop-binaries
        command: test -x /usr/bin/labwc && test -x /usr/bin/google-chrome-stable && test -x /usr/local/bin/traefik && test -x /usr/sbin/sshd
        exit_status: 0
      # Deploy: all four primary services reachable on their host ports.
      # Using per-port `addr` verbs rather than a single nc loop — nc isn't
      # in the minimal container set, and the `addr` verb natively does a
      # Go-native TCP dial (no external tool needed).
      - id: selkies-desktop-chrome-devtools-mcp-port
        scope: deploy
        addr: 127.0.0.1:${HOST_PORT:9224}
        reachable: true
        timeout: 5s

  selkies-desktop-nvidia:
    base: nvidia
    layers:
      - agent-forwarding
      - selkies-desktop
      - dbus
      - ov
    ports:
      - "3000:3000"
      - "9222:9222"
      - "9224:9224"
      - "2222:2222"
    platforms:
      - linux/amd64

  immich-ml:
    base: fedora
    layers:
      - agent-forwarding
      - nodejs24
      - cuda
      - python-ml
      - supervisord
      - postgresql
      - vectorchord
      - redis
      - immich
      - immich-ml
      - dbus
      - ov
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64
    tests:
      # Composition: every layer's primary binary lands in the final image.
      - id: immich-ml-stack-binaries
        command: test -x /usr/bin/postgres && test -x /usr/bin/redis-server && test -x /opt/immich/machine-learning/.venv/bin/python && test -f /opt/immich/server/dist/main.js
        exit_status: 0
      # Deploy: supervisord orchestrates every required program. The process
      # list must include all 4 long-running services (excluding the one-shot
      # immich-db-init which runs and exits).
      - id: immich-ml-services-running
        scope: deploy
        command: supervisorctl status postgresql redis immich-server immich-ml | awk '{print $2}' | sort -u
        exit_status: 0
        in_container: true
        stdout:
          - equals: RUNNING
      # Deploy: ML endpoint (internal port 3003) is reachable from the server side.
      - id: immich-ml-internal-ping
        scope: deploy
        command: curl -fsS http://127.0.0.1:3003/ping
        exit_status: 0
        in_container: true

  openwebui:
    base: fedora
    layers:
      - agent-forwarding
      - openwebui
      - dbus
      - ov
    ports:
      - "8080:8080"
    tests:
      # Composition: entrypoint, python env, ov all together.
      - id: openwebui-composition
        command: test -x ${HOME}/.local/bin/openwebui-entrypoint && test -x ${HOME}/.pixi/envs/default/bin/python && test -x /usr/local/bin/ov
        exit_status: 0
      # Deploy: required env var from env_requires is injected.
      - id: openwebui-required-env-injected
        scope: deploy
        command: printenv WEBUI_ADMIN_EMAIL
        exit_status: 0
        in_container: true

  hermes:
    base: fedora
    layers:
      - agent-forwarding
      - hermes-full
      - dbus
    tests:
      # Composition: all 4 AI CLIs + hermes binary end up in PATH-accessible locations.
      - id: hermes-all-clis-present
        command: test -x ${HOME}/.npm-global/bin/claude && test -x ${HOME}/.npm-global/bin/codex && test -x ${HOME}/.npm-global/bin/gemini && test -x ${HOME}/.pixi/envs/default/bin/hermes
        exit_status: 0
      # Deploy: hermes service is up.
      - id: hermes-service-up
        scope: deploy
        service: hermes
        running: true

  hermes-playwright:
    base: fedora
    layers:
      - agent-forwarding
      - hermes
      - hermes-playwright
      - dbus
      - ov

