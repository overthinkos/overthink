            - command: grep -E '^userns\s*=\s*"host"' /etc/containers/containers.conf
              id: selkies-desktop-ov-containers-conf-userns-host
              exit_status: 0
            - command: grep -E '^userns\s*=\s*"host"' /home/user/.config/containers/containers.conf
              id: selkies-desktop-ov-user-containers-conf-userns-host
