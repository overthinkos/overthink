              scope: deploy
              stdout:
                - contains: org.freedesktop.Notifications
            - vnc: screenshot
              id: sway-browser-vnc-vnc-framebuffer
              scope: deploy
              artifact: /tmp/sway-browser-vnc-fb.png
              artifact_min_bytes: 5000
    # Dedicated DISPOSABLE eval twin of sway-browser-vnc — the canonical pod bed
    # for the live-container verb surface (cdp/wl/vnc/dbus/mcp/record). Same layer
    # list as sway-browser-vnc (shares the auto-intermediate → ~zero marginal
    # build); carries the comprehensive baked deploy-scope eval so the
    # eval-sway-browser-vnc-pod bed stays thin. See /ov-eval:eval-sway-browser-vnc.
    eval-sway-browser-vnc:
        base: fedora
        platform:
            - linux/amd64
        layer:
            - agent-forwarding
            - sway-desktop-vnc
            - dbus
            - ov
        # Isolated host ports (not the canonical 5900/9222/9224) so this
        # disposable eval bed coexists with production sway/selkies/android
        # containers on a shared host. Probes resolve HOST_PORT dynamically.
        port:
            - 15900:5900
            - 19222:9222
            - 19224:9224
        eval:
            - command: test -x /usr/bin/sway && test -x /usr/bin/wayvnc && test -x /usr/bin/google-chrome-stable
              id: eval-sway-browser-vnc-binaries
              exit_status: 0
            - command: supervisorctl status sway wayvnc | awk '{print $2}' | sort -u
              id: eval-sway-browser-vnc-services
              scope: deploy
              in_container: true
              exit_status: 0
              stdout:
                - RUNNING
            - cdp: status
              id: eval-sway-browser-vnc-cdp-up
              scope: deploy
              stdout:
                - contains: ok
            - cdp: list
              id: eval-sway-browser-vnc-cdp-list
              scope: deploy
            - http: "http://127.0.0.1:${HOST_PORT:9222}/json/version"
              id: eval-sway-browser-vnc-http-cdp
              scope: deploy
              status: 200
            - vnc: status
              id: eval-sway-browser-vnc-vnc-up
              scope: deploy
              stdout:
                - contains: ok
            - vnc: screenshot
              id: eval-sway-browser-vnc-vnc-framebuffer
              scope: deploy
              artifact: /tmp/eval-sway-browser-vnc-fb.png
