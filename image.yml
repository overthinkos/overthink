    # phase5 selftest: minimal sshd-only image for selftest-layer pod.
    selftest-layer:
        base: fedora
        layer:
            - sshd
    # phase5 selftest: minimal ov-only image for selftest-image pod.
    selftest-image:
        base: fedora
        layer:
            - ov
    # phase6 selftest: combines sshd + ov + composition marker for composition-app pod.
    composition-app:
        base: fedora
        layer:
            - sshd
            - ov
            - eval-composition-layer
    # composition self-test SOURCE — a stable in-main image whose two
    # image-scope eval probes are consumed (read, filtered, re-run on the
    # selftest target pods) by the eval.yml `composition-import-selftest`
    # recipe's `from:` expander. Replaces the relocated `fedora-coder`. The
    # keep probe (`composition-source-ov`) tests `ov` presence, which passes on
    # both the `selftest-image` and `composition-app` target pods (both ship the
    # `ov` layer) AND on this image itself; `composition-source-marker` exists
    # only to exercise the `exclude:` filter (it is never imported/run).
    composition-source:
        base: fedora
        layer:
            - ov
        eval:
            - command: test -x /usr/local/bin/ov
              id: composition-source-ov
              exit_status: 0
            - command: test -d /etc
              id: composition-source-marker
              exit_status: 0
    # =================================================================
    # Per-kind R10 smoke beds (eval-image / eval-layer / eval-pod /
    # eval-deploy). All four use fedora-minimal:43 for fast rebuild
    # cycles. Together with the eval-local kind:local template, they
    # exercise one entity per kind so a single
    # `ov eval live <bed>` run smoke-tests every kind path end-to-end.
    # =================================================================
    eval-image:
        base: quay.io/fedora/fedora-minimal:43
        distro:
            - fedora:43
            - fedora
        produce: []
        description:
            feature: Fast eval bed for kind:image smoke
            narrative: Single-layer fedora-minimal image used as the kind:image bed for `ov eval kind image`.
            tag:
                - working
        layer:
            - eval-image-layer
    eval-layer:
        base: quay.io/fedora/fedora-minimal:43
        distro:
            - fedora:43
            - fedora
        produce: []
        description:
            feature: Fast eval bed for kind:layer composition smoke
            narrative: Two-layer fedora-minimal image asserting the composition order works.
            tag:
                - working
        layer:
            - eval-image-layer
            - eval-layer-layer
    eval-pod:
        base: quay.io/fedora/fedora-minimal:43
        distro:
            - fedora:43
            - fedora
        produce: []
        description:
            feature: Fast eval bed for kind:pod runtime smoke
            narrative: Minimal pod target — listens on 18794 via nc, exercises supervisord render path.
            tag:
                - working
        layer:
            - eval-image-layer
            - eval-pod-layer
        port:
            - 18794:18794
    eval-deploy:
        base: quay.io/fedora/fedora-minimal:43
        distro:
            - fedora:43
            - fedora
        produce: []
        description:
            feature: Fast eval bed for kind:deploy DeployTarget interface smoke
            narrative: Minimal pod target with a supervisord-managed sleep service — exercises ALL DeployTarget rendering paths.
            tag:
                - working
        layer:
            - eval-image-layer
            - eval-deploy-layer
    android-emulator:
        base: selkies-desktop
        platform:
            - linux/amd64
        layer:
            - nodejs
            - java-openjdk
            - android-sdk
            - appium-server
            - android-emulator-layer
        port:
            - "3000:3000"
            - "4723:4723"
            - "5037:5037"
            - "2222:2222"
            # Inherited from the selkies-desktop layer chain — chrome-cdp
            # publishes 9222 (Chrome DevTools Protocol) and chrome-devtools-mcp
            # publishes 9224 (Streamable HTTP MCP). The mcp-provides OCI label
            # baked into selkies-desktop expects these ports published; declare
            # them here so inherited eval probes resolve correctly.
            - "9222:9222"
            - "9224:9224"
        env:
            - EMULATOR_NAME=ov_avd_14
            - EMULATOR_API_LEVEL=34
            - EMULATOR_DEVICE=pixel_6
        status: testing
        info: |
            Android 14 (API 34, Google APIs x86_64) emulator on top of the
            selkies-desktop streaming chain. Browser UI on https://localhost:3000
            (Selkies WebRTC), Appium WebDriver on :4723, ADB server on :5037
            (set ANDROID_ADB_SERVER_SOCKET=tcp:localhost:5037 to drive from
            host). Requires /dev/kvm + kvm-group passthrough for hardware
            acceleration; the layer declares this via security.devices so the
            quadlet auto-emits AddDevice=/dev/kvm.
        eval:
            - id: image-emulator-binary
              file: /opt/android-sdk/emulator/emulator
              exists: true
            - id: image-adb-binary
              file: /opt/android-sdk/platform-tools/adb
              exists: true
            - id: image-appium-binary
              file: /usr/local/bin/appium
              exists: true
            - id: image-java-binary
              file: /usr/bin/java
              exists: true
            - id: image-start-emulator-script
              file: /usr/local/bin/start-emulator
              exists: true
              mode: "0755"
