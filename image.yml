    valkey-test:
        enabled: false
        base: fedora
        layers:
            - agent-forwarding
            - supervisord
            - valkey
        ports:
            - 6379:6379

    # Throwaway benchmark target used by `ov benchmark run bench-target`.
    # The bench-target layer ships a deliberately-failing BDD scenario
    # that an AI solves by adding a write: task. Fedora base + minimal
    # layer stack keeps per-iteration rebuild fast.
    bench-target:
        base: fedora
        layers:
            - claude-code
            - ov-mcp
            - bench-target-layer
        ports:
            - 18765:18765

    # ov harness `default` score — per-pod target images.
    bench-fixture-os:
        base: fedora
        layers:
            - supervisord
            - fixture-os-layer
    bench-fixture-web:
        base: fedora
        layers:
            - supervisord
            - fixture-web-layer
        ports:
            - 8080:8080
    bench-tier1:
        enabled: false
        base: fedora
        layers:
            - bench-tier1-layer
    bench-tier23:
        enabled: false
        base: fedora
        layers:
            - supervisord
            - bench-tier23-layer
        ports:
            - 8080:8080
    bench-redis:
        enabled: false
        base: fedora
        layers:
            - supervisord
            - redis
            - bench-redis-init-layer
        ports:
            - 6379:6379
    # tier4-redis: server bound to 0.0.0.0 for cross-pod access (deploys as `redis`).
    bench-redis-server:
        base: fedora
        layers:
            - supervisord
            - harness-redis-server-layer
        ports:
            - 6379:6379
    # tier4-redis: client pod with redis-cli only (deploys as `redis-client`).
    bench-redis-client:
        base: fedora
        layers:
            - supervisord
            - harness-redis-client-layer
    # mcp-protocol-probe: full Jupyter image (deploys as `fixture-mcp`).
    bench-fixture-mcp:
        base: fedora
        layers:
            - agent-forwarding
            - jupyter
            - notebook-templates
            - dbus
            - ov
        ports:
            - 8888:8888
    # kubernetes-cluster: fake k8s API server (deploys as `fixture-k8s`).
    bench-fixture-k8s:
        base: fedora
        layers:
            - supervisord
            - harness-k8s-fixture-layer
        ports:
            - 6443:6443
    # phase5 selftest: minimal sshd-only image for selftest-layer pod.
    bench-selftest-layer:
        base: fedora
        layers:
            - sshd
    # phase5 selftest: minimal ov-only image for selftest-image pod.
    bench-selftest-image:
        base: fedora
        layers:
            - ov
    # phase6 selftest: combines sshd + ov + composition marker for composition-app pod.
    bench-composition-app:
        base: fedora
        layers:
            - sshd
            - ov
            - bench-composition-layer
