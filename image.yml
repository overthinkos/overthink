        base: nvidia
        platforms:
            - linux/amd64
        layers:
            - agent-forwarding
            - selkies-desktop
            - ov-full
            - container-nesting
            - golang
            - gh
            - dbus
            - ov
        ports:
            - 3000:3000
            - 9222:9222
            - 9224:9224
            - 2222:2222
        tests:
            - command: test -x /usr/bin/podman && test -x /usr/bin/buildah && test -x /usr/bin/skopeo && test -x /usr/bin/newuidmap && test -x /usr/bin/newgidmap
              id: selkies-desktop-ov-nested-binaries
              exit_status: 0
            - command: test -x /usr/local/bin/ov && test -x /usr/bin/gocryptfs && test -x /usr/bin/socat
              id: selkies-desktop-ov-ov-binaries
              exit_status: 0
            - command: grep -cE '^user:[0-9]+:[0-9]+$' /etc/subuid
              id: selkies-desktop-ov-subuid-user-two-ranges
              exit_status: 0
              stdout:
                - matches: ^2
            - command: getcap /usr/bin/newuidmap | grep -c cap_setuid
              id: selkies-desktop-ov-newuidmap-cap
              exit_status: 0
            - file: /etc/containers/policy.json
              id: selkies-desktop-ov-policy-json
              exists: true
            - command: grep -E '^userns\s*=\s*"host"' /etc/containers/containers.conf
              id: selkies-desktop-ov-containers-conf-userns-host
              exit_status: 0
            - command: grep -E '^userns\s*=\s*"host"' /home/user/.config/containers/containers.conf
              id: selkies-desktop-ov-user-containers-conf-userns-host
              exit_status: 0
            - command: sh -c 'env | grep -q "^_CONTAINERS_USERNS_CONFIGURED="'
              id: selkies-desktop-ov-env-containers-userns-configured
              exit_status: 0
            - command: sh -c 'env | grep -qx "BUILDAH_ISOLATION=chroot"'
              id: selkies-desktop-ov-env-buildah-isolation
              exit_status: 0
            - command: podman run --rm quay.io/libpod/alpine:latest /bin/true
              id: selkies-desktop-ov-nested-podman-run
              timeout: 60s
              scope: deploy
              in_container: true
            - command: virsh -c qemu:///session list --all
              id: selkies-desktop-ov-libvirt-session-list
              scope: deploy
              in_container: true
              exit_status: 0
            - command: virsh -c qemu:///session domcapabilities 2>/dev/null | grep -c '<domain>kvm</domain>'
              id: selkies-desktop-ov-libvirt-kvm-domain
              scope: deploy
              in_container: true
              stdout:
                - matches: ^[1-9]
            - command: ov version
              id: selkies-desktop-ov-ov-version
              scope: deploy
              in_container: true
            - command: ov doctor
              id: selkies-desktop-ov-ov-doctor
              scope: deploy
