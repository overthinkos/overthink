defaults:
  registry: ghcr.io/overthinkos
  tag: auto

  platforms:
    - linux/amd64
  pkg: rpm
  merge:
    auto: true
    max_mb: 128
  builder: fedora-builder

images:

  fedora:
    base: "quay.io/fedora/fedora:43"
    pkg: rpm

  fedora-nonfree:
    base: fedora
    layers:
      - rpmfusion

  fedora-builder:
    base: fedora
    layers:
      - pixi
      - nodejs
      - build-toolchain

  ubuntu:
    enabled: false
    base: "ubuntu:24.04"
    pkg: deb

  debian:
    enabled: false
    base: "debian:13"
    pkg: deb

  fedora-test:
    enabled: false
    base: fedora
    layers:
      - traefik
      - testapi
    ports:
      - "8000:8000"
      - "8080:8080"

  valkey-test:
    enabled: false
    base: fedora
    layers:
      - supervisord
      - valkey
    ports:
      - "6379:6379"

  openclaw:
    base: fedora
    layers:
      - openclaw
    ports:
      - "18789:18789"

  openclaw-sway-browser:
    base: fedora
    layers:
      - openclaw-full
      - sway-desktop-vnc
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser:
    base: nvidia
    layers:
      - openclaw-full-ml
      - sway-desktop-vnc
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  sway-browser-vnc:
    base: fedora
    layers:
      - sway-desktop-vnc
    ports:
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  sway-browser-vnc-moonlight:
    base: fedora
    layers:
      - sway-desktop-vnc
      - moonlight
    ports:
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  sway-browser-sunshine:
    status: broken
    info: "Sway input broken — fake-udev injects virtual devices (vendor 0xBEEF) but libinput doesn't pick them up, mouse/keyboard passthrough non-functional"
    base: nvidia
    layers:
      - sway-desktop-sunshine
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sunshine-desktop-x11:
    status: broken
    info: "X11 input broken — Sunshine XTest injection not delivering mouse/keyboard events to applications"
    base: nvidia
    layers:
      - x11-desktop-sunshine
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sunshine-desktop-niri:
    status: broken
    info: "Niri capture broken — doesn't expose wlr-screencopy protocol, screen capture non-functional, input untested"
    base: nvidia
    layers:
      - niri-desktop-sunshine
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sunshine-desktop-kwin:
    enabled: false
    status: broken
    info: "KWin capture broken — screencast protocol missing in virtual mode, capture and input non-functional"
    base: nvidia
    layers:
      - kwin-desktop-sunshine
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sunshine-desktop-mutter:
    status: broken
    info: "Mutter input broken — portal capture works but input-bridge doesn't inject mouse/keyboard events into Mutter compositor"
    base: nvidia
    layers:
      - mutter-desktop-sunshine
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sway-browser-sunshine-steam:
    status: broken
    info: "Sway input broken — fake-udev virtual device injection non-functional, mouse/keyboard passthrough broken"
    base: nvidia
    layers:
      - sway-desktop-sunshine
      - steam
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  sway-browser-sunshine-steam-heroic:
    status: broken
    info: "Sway input broken — fake-udev virtual device injection non-functional, mouse/keyboard passthrough broken"
    base: nvidia
    layers:
      - sway-desktop-sunshine
      - steam
      - heroic
    ports:
      - "9222:9222"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-sunshine:
    status: broken
    info: "Sway input broken — fake-udev virtual device injection non-functional, mouse/keyboard passthrough broken"
    base: nvidia
    layers:
      - openclaw-full-ml
      - sway-desktop-sunshine
      - ollama
    ports:
      - "18789:18789"
      - "9222:9222"
      - "11434:11434"
      - "47984:47984"
      - "47989:47989"
      - "47990:47990"
      - "48010:48010"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
    platforms:
      - linux/amd64

  wolf:
    base: fedora-nonfree
    layers:
      - wolf
    ports:
      - "47984:47984"
      - "47989:47989"
      - "47999:47999/udp"
      - "48010:48010"
      - "48100:48100/udp"
      - "48200:48200/udp"
    platforms:
      - linux/amd64

  nvidia:
    base: fedora-nonfree
    layers:
      - cuda
    platforms:
      - linux/amd64

  python-ml:
    base: nvidia
    layers:
      - python-ml
    platforms:
      - linux/amd64

  jupyter:
    base: nvidia
    layers:
      - jupyter
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  ollama:
    base: nvidia
    layers:
      - ollama
    ports:
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama:
    base: nvidia
    layers:
      - openclaw
      - ollama
    ports:
      - "18789:18789"
      - "11434:11434"
    platforms:
      - linux/amd64

  comfyui:
    base: nvidia
    layers:
      - comfyui
    ports:
      - "8188:8188"
    platforms:
      - linux/amd64

  githubrunner:
    base: fedora
    layers:
      - github-runner
      - ov-full
    platforms:
      - linux/amd64
    uid: 0
    gid: 0
    user: root
    network: host

  openclaw-browser-bootc:
    enabled: false
    base: "quay.io/fedora/fedora-bootc:43"
    bootc: true
    layers:
      - bootc-base
      - openclaw
      - pipewire
      - wayvnc
      - chrome-sway
    platforms:
      - linux/amd64
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    vm:
      ssh_port: 2222
      disk_size: "20 GiB"
      ram: "4G"
      cpus: 2

  bazzite-ai:
    enabled: false
    base: "ghcr.io/ublue-os/bazzite-nvidia-open:stable-43.20260120.1"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - build-toolchain
      - language-runtimes
      - ujust
      - dev-tools
      - github-actions
      - virtualization
      - kubernetes
      - docker-ce
      - google-cloud
      - vr-streaming
      - cuda
      - devops-tools
      - grafana-tools
      - desktop-apps
      - vscode
      - typst
      - copr-desktop
      - os-config
      - os-system-files

  immich:
    base: fedora-nonfree
    layers:
      - nodejs24
      - supervisord
      - postgresql
      - redis
      - immich
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64

  aurora:
    enabled: false
    base: "ghcr.io/ublue-os/aurora-dx-nvidia-open:stable-daily-43.20260305"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - sshd
      - ov-full
      - golang
    vm:
      disk_size: "80 GiB"
      ram: "12G"
      cpus: 4

  fedora-remote:
    base: "quay.io/fedora/fedora:43"
    layers:
      - "@github.com/overthinkos/overthink/layers/dev-tools:main"
      - "@github.com/overthinkos/overthink/layers/build-toolchain:v2026.64.1937"
      - "@github.com/overthinkos/overthink/layers/nodejs"
    platforms:
      - linux/amd64

  openclaw-full:
    enabled: false
    base: fedora
    layers:
      - openclaw-full
    ports:
      - "18789:18789"
      - "9222:9222"

  openclaw-full-sway:
    enabled: false
    base: fedora
    layers:
      - openclaw-full
      - sway-desktop-vnc
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-full-ml:
    enabled: false
    base: nvidia
    layers:
      - openclaw-full-ml
      - sway-desktop-vnc
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  selkies-desktop:
    base: fedora-nonfree
    layers:
      - selkies-desktop
    ports:
      - "3000:3000"
      - "9222:9222"
    platforms:
      - linux/amd64

  selkies-desktop-nvidia:
    base: nvidia
    layers:
      - selkies-desktop
    ports:
      - "3000:3000"
      - "9222:9222"
    platforms:
      - linux/amd64

  immich-cuda:
    base: fedora
    layers:
      - nodejs24
      - cuda
      - python-ml
      - supervisord
      - postgresql
      - redis
      - immich
      - immich-ml
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64
