defaults:
  registry: ghcr.io/overthinkos
  tag: auto

  platforms:
    - linux/amd64
  pkg: rpm
  merge:
    auto: false
    max_mb: 128
  builder: fedora-builder

images:

  fedora:
    base: "quay.io/fedora/fedora:43"
    pkg: rpm

  fedora-nonfree:
    base: fedora
    layers:
      - rpmfusion

  fedora-builder:
    base: fedora
    layers:
      - pixi
      - nodejs
      - build-toolchain

  ubuntu:
    enabled: false
    base: "ubuntu:24.04"
    pkg: deb

  debian:
    enabled: false
    base: "debian:13"
    pkg: deb

  fedora-test:
    base: fedora
    layers:
      - traefik
      - testapi
    ports:
      - "8000:8000"
      - "8080:8080"

  openclaw:
    base: fedora
    layers:
      - openclaw
    ports:
      - "18789:18789"

  openclaw-browser:
    base: fedora
    layers:
      - openclaw
      - wayvnc
      - google-chrome
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-sway-browser:
    base: fedora
    layers:
      - openclaw
      - sway-desktop
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser:
    base: nvidia
    layers:
      - openclaw
      - sway-desktop
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser-dank:
    base: nvidia
    layers:
      - openclaw
      - sway-desktop-dank
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser-noctalia:
    base: nvidia
    layers:
      - openclaw
      - sway-desktop-noctalia
      - ollama
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  nvidia:
    base: fedora
    layers:
      - cuda
    platforms:
      - linux/amd64

  python-ml:
    base: nvidia
    layers:
      - python-ml
    platforms:
      - linux/amd64

  jupyter:
    base: nvidia
    layers:
      - jupyter
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  ollama:
    base: nvidia
    layers:
      - ollama
    ports:
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama:
    base: nvidia
    layers:
      - openclaw
      - ollama
    ports:
      - "18789:18789"
      - "11434:11434"
    platforms:
      - linux/amd64

  comfyui:
    base: nvidia
    layers:
      - comfyui
    ports:
      - "8188:8188"
    platforms:
      - linux/amd64

  githubrunner:
    base: fedora
    layers:
      - github-runner
      - ov-cli
      - bcvk
    platforms:
      - linux/amd64
    uid: 0
    gid: 0
    user: root

  openclaw-browser-bootc:
    base: "quay.io/fedora/fedora-bootc:43"
    bootc: true
    layers:
      - bootc-base
      - openclaw
      - pipewire
      - wayvnc
      - google-chrome-sway
    platforms:
      - linux/amd64
    vm:
      ssh_port: 2222

  bazzite-ai:
    enabled: false
    base: "ghcr.io/ublue-os/bazzite-nvidia-open:stable-43.20260120.1"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - build-toolchain
      - language-runtimes
      - ujust
      - dev-tools
      - github-actions
      - virtualization
      - kubernetes
      - docker-ce
      - google-cloud
      - vr-streaming
      - cuda
      - devops-tools
      - grafana-tools
      - desktop-apps
      - vscode
      - typst
      - copr-desktop
      - os-config
      - os-system-files

  immich:
    base: fedora-nonfree
    layers:
      - node24
      - supervisord
      - postgresql
      - redis
      - immich
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64

  aurora:
    base: "ghcr.io/ublue-os/aurora-dx-nvidia-open:stable-daily-43.20260305"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - sshd
      - ov-cli
      - golang
      - bcvk
      - gocryptfs
      - socat
    vm:
      disk_size: "30 GiB"
      ram: "8G"
      cpus: 4

  fedora-remote:
    base: "quay.io/fedora/fedora:43"
    layers:
      - "@github.com/overthinkos/overthink/layers/dev-tools:main"
      - "@github.com/overthinkos/overthink/layers/build-toolchain:v2026.64.1937"
      - "@github.com/overthinkos/overthink/layers/nodejs"
    platforms:
      - linux/amd64

  immich-cuda:
    base: fedora
    layers:
      - node24
      - cuda
      - python-ml
      - supervisord
      - postgresql
      - redis
      - immich
      - immich-ml
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64
