defaults:
  registry: ghcr.io/overthinkos
  tag: auto

  platforms:
    - linux/amd64
  build: [rpm]
  builders:
    pixi: fedora-builder
    npm: fedora-builder
    cargo: fedora-builder
  merge:
    auto: true
    max_mb: 128
    max_total_mb: 0    # 0 = no limit; set to e.g. 2048 on CI runners with limited RAM
  format_config:
    distro: distro.yml
    builder: builder.yml
    init: init.yml

images:

  fedora:
    base: "quay.io/fedora/fedora:43"
    distro: ["fedora:43", fedora]
    builds: [pixi, npm, cargo]

  fedora-nonfree:
    base: fedora
    layers:
      - rpmfusion

  fedora-builder:
    base: fedora
    builds: [pixi, npm, cargo]
    layers:
      - pixi
      - nodejs
      - build-toolchain

  ubuntu:
    enabled: false
    base: "ubuntu:24.04"
    build: [deb]

  debian:
    enabled: false
    base: "debian:13"
    build: [deb]

  archlinux:
    base: "docker.io/library/archlinux:latest"
    distro: [archlinux]
    build: [pac]
    builds: [pixi, npm, cargo, aur]
    builders:
      pixi: archlinux-builder
      npm: archlinux-builder
      cargo: archlinux-builder
      aur: archlinux-builder

  archlinux-builder:
    base: archlinux
    builds: [pixi, npm, cargo, aur]
    layers:
      - pixi
      - nodejs
      - build-toolchain
      - yay

  arch-test:
    base: archlinux
    build: [pac, aur]
    layers:
      - agent-forwarding
      - arch-pac-test
      - arch-aur-test

  arch-ov:
    base: archlinux
    uid: 0
    gid: 0
    user: root
    network: host
    layers:
      - agent-forwarding
      - ov-full
      - golang
      - gh
      - sshd
      - container-nesting
      - nvidia

  fedora-ov:
    base: fedora
    uid: 0
    gid: 0
    user: root
    network: host
    layers:
      - agent-forwarding
      - ov-full
      - golang
      - gh
      - sshd
      - container-nesting
      - nvidia

  fedora-test:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - traefik
      - testapi
    ports:
      - "8000:8000"
      - "8080:8080"

  valkey-test:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - supervisord
      - valkey
    ports:
      - "6379:6379"

  openclaw:
    base: fedora
    layers:
      - agent-forwarding
      - openclaw
      - dbus
      - ov
    ports:
      - "18789:18789"

  openclaw-sway-browser:
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
      - sway-desktop-vnc
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-ollama-sway-browser:
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw-full-ml
      - sway-desktop-vnc
      - ollama
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
      - "11434:11434"
    platforms:
      - linux/amd64

  sway-browser-vnc:
    base: fedora
    layers:
      - agent-forwarding
      - sway-desktop-vnc
      - dbus
      - ov
    ports:
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  nvidia:
    base: fedora-nonfree
    layers:
      - agent-forwarding
      - nvidia
      - cuda
    platforms:
      - linux/amd64

  python-ml:
    base: nvidia
    layers:
      - agent-forwarding
      - python-ml
    platforms:
      - linux/amd64

  jupyter:
    base: nvidia
    layers:
      - agent-forwarding
      - jupyter
      - dbus
      - ov
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  jupyter-colab:
    base: fedora
    layers:
      - agent-forwarding
      - jupyter-colab
      - notebook-templates
      - dbus
      - ov
    ports:
      - "8888:8888"

  jupyter-colab-ml:
    base: nvidia
    layers:
      - agent-forwarding
      - jupyter-colab-ml
      - notebook-templates
      - dbus
      - ov
    ports:
      - "8888:8888"
    platforms:
      - linux/amd64

  ollama:
    base: nvidia
    layers:
      - agent-forwarding
      - ollama
      - dbus
      - ov
    ports:
      - "11434:11434"
    platforms:
      - linux/amd64

  openclaw-ollama:
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw
      - ollama
      - dbus
      - ov
    ports:
      - "18789:18789"
      - "11434:11434"
    platforms:
      - linux/amd64

  comfyui:
    base: nvidia
    layers:
      - agent-forwarding
      - comfyui
      - dbus
      - ov
    ports:
      - "8188:8188"
    platforms:
      - linux/amd64

  unsloth-studio:
    base: nvidia
    layers:
      - agent-forwarding
      - unsloth-studio
      - dbus
      - ov
    ports:
      - "8888:8888"
      - "8000:8000"
    platforms:
      - linux/amd64

  githubrunner:
    base: fedora
    layers:
      - agent-forwarding
      - github-runner
      - ov-full
      - dbus
    platforms:
      - linux/amd64
    uid: 0
    gid: 0
    user: root
    network: host

  openclaw-browser-bootc:
    enabled: false
    base: "quay.io/fedora/fedora-bootc:43"
    bootc: true
    layers:
      - agent-forwarding
      - bootc-base
      - openclaw
      - pipewire
      - wayvnc
      - chrome-sway
    platforms:
      - linux/amd64
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    vm:
      ssh_port: 2222
      disk_size: "20 GiB"
      ram: "4G"
      cpus: 2

  bazzite-ai:
    enabled: false
    base: "ghcr.io/ublue-os/bazzite-nvidia-open:stable-43.20260120.1"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - agent-forwarding
      - build-toolchain
      - language-runtimes
      - ujust
      - dev-tools
      - github-actions
      - virtualization
      - kubernetes
      - docker-ce
      - google-cloud
      - vr-streaming
      - cuda
      - devops-tools
      - grafana-tools
      - desktop-apps
      - vscode
      - typst
      - copr-desktop
      - os-config
      - os-system-files

  immich:
    base: fedora-nonfree
    layers:
      - agent-forwarding
      - nodejs24
      - supervisord
      - postgresql
      - vectorchord
      - redis
      - immich
      - dbus
      - ov
    ports:
      - "2283:2283"
    platforms:
      - linux/amd64

  aurora:
    enabled: false
    base: "ghcr.io/ublue-os/aurora-dx-nvidia-open:stable-daily-43.20260305"
    bootc: true
    platforms:
      - linux/amd64
    layers:
      - agent-forwarding
      - sshd
      - ov-full
      - golang
    vm:
      disk_size: "80 GiB"
      ram: "12G"
      cpus: 4

  fedora-remote:
    base: "quay.io/fedora/fedora:43"
    layers:
      - "@github.com/overthinkos/overthink/layers/dev-tools:main"
      - "@github.com/overthinkos/overthink/layers/build-toolchain:v2026.64.1937"
      - "@github.com/overthinkos/overthink/layers/nodejs"
    platforms:
      - linux/amd64

  openclaw-full:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
    ports:
      - "18789:18789"
      - "9222:9222"

  openclaw-full-sway:
    enabled: false
    base: fedora
    layers:
      - agent-forwarding
      - openclaw-full
      - sway-desktop-vnc
    ports:
      - "18789:18789"
      - "5900:5900"
      - "9222:9222"
    platforms:
      - linux/amd64

  openclaw-full-ml:
    enabled: false
    base: nvidia
    layers:
      - agent-forwarding
      - openclaw-full-ml
      - sway-desktop-vnc
