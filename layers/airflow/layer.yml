layer:
  name: airflow
  description: "Apache Airflow with LocalExecutor + SQLite (single-node, dev-friendly), plus an MCP server (mcp-server-apache-airflow on port 19999) that exposes Airflow REST API operations as MCP tools, plus a sample OSM → PMTiles DAG. Python deps live in the marimo layer's pixi.toml."
  require:
    - marimo
    - supervisord
  env:
    AIRFLOW_HOME: "~/airflow"
    # LocalExecutor + SQLite — zero external services. Airflow auto-creates
    # ${AIRFLOW_HOME}/airflow.db on first `db migrate`. Suitable for
    # single-node dev / R10 verification. For multi-node production, swap
    # in CeleryExecutor + Postgres + Valkey (those layers stayed available
    # under layers/postgresql/ + layers/valkey/).
    AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__API__PORT: "8080"
    AIRFLOW__API__HOST: "0.0.0.0"
    # Override the default ${AIRFLOW_HOME}/dags location so DAGs live
    # under the user-owned workspace volume. Notebooks (e.g. the
    # marimo osm-monaco-viz notebook) self-author their DAGs into
    # ${AIRFLOW_DAGS_DIR} (= /workspace/dags) at runtime — no static
    # data layer baking DAGs into the image, no /opt/airflow-defaults
    # staging, no airflow-init.sh copy step.
    AIRFLOW__CORE__DAGS_FOLDER: "/workspace/dags"
    # Default is 300s (5 min) — far too slow for the runtime-DAG-write
    # pattern (notebook drops a .py and triggers it within seconds).
    # 10s makes the scan effectively interactive at negligible CPU cost
    # on a single-user dev pod. NB: the Airflow-2 key path
    # [scheduler] dag_dir_list_interval was moved to
    # [dag_processor] refresh_interval in Airflow 3.x.
    AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "10"
  port:
    - 8080
    - 19999     # airflow-mcp HTTP transport endpoint (/mcp)
  # Cross-container MCP discovery. Pod-aware rewriting collapses this to
  # localhost:19999 for any same-pod consumer (the marimo notebook server's
  # chat panel reads OV_MCP_SERVERS at config time and finds airflow there).
  mcp_provide:
    - name: airflow
      url: "http://{{.ContainerName}}:19999/mcp"
      transport: http
  # Cross-container env discovery. The marimo notebook reads three vars:
  #   AIRFLOW_PUBLIC_URL  — browser-side (UI links + OAuth callbacks);
  #                          host port for container 8080 (resolves to
  #                          localhost when consumer is same-pod via
  #                          podAwareEnvProvides — but here the URL is
  #                          INTENDED for the user's browser, so the
  #                          host-side mapping is the right value even
  #                          in the same-pod case).
  #   AIRFLOW_API_INTERNAL_URL — kernel-side (Python requests calls
  #                              from the marimo kernel process);
  #                              same-pod resolves to localhost:8080;
  #                              cross-pod resolves to ContainerName.
  #   AIRFLOW_DAGS_DIR    — static path inside the workspace volume.
  env_provides:
    AIRFLOW_PUBLIC_URL: "http://127.0.0.1:{{.HostPort 8080}}"
    AIRFLOW_API_INTERNAL_URL: "http://{{.ContainerName}}:8080"
    AIRFLOW_DAGS_DIR: "/workspace/dags"
  volume:
    - name: airflow-data
      path: "~/airflow"
  secret:
    - name: airflow-fernet-key
      env: AIRFLOW__CORE__FERNET_KEY
    - name: airflow-webserver-secret
      env: AIRFLOW__API__SECRET_KEY
    - name: airflow-admin-password
      env: AIRFLOW_ADMIN_PASSWORD
  task:
    # User-phase data directories (created during build; bind-mount path persists).
    - mkdir: "${HOME}/airflow"
      user: "${USER}"
    - mkdir: "${HOME}/airflow/dags"
      user: "${USER}"
    - mkdir: "${HOME}/airflow/logs"
      user: "${USER}"
    - mkdir: "${HOME}/airflow/plugins"
      user: "${USER}"
    # ---- airflow-init.sh ----
    # Runs ONCE on container start (supervisord program with restart: no).
    # `airflow db migrate` is idempotent on the SQLite metadata DB.
    #
    # Auth provisioning: Airflow 3.x's default auth backend is
    # SimpleAuthManager, which removed the legacy `airflow users create`
    # subcommand and auto-generates a RANDOM admin password on first boot,
    # writing it to ${AIRFLOW_HOME}/simple_auth_manager_passwords.json.generated.
    # That random value bears no relation to the AIRFLOW_ADMIN_PASSWORD
    # secret we inject — so JWT auth via /auth/token rejects every
    # request with 401. Fix: overwrite the passwords file on every boot
    # with our injected secret. Idempotent + tolerant of secret rotation.
    - write: /usr/local/bin/airflow-init.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        AIRFLOW_BIN="${HOME}/.pixi/envs/default/bin/airflow"
        "$AIRFLOW_BIN" db migrate
        # Bind the SimpleAuthManager admin password to our injected secret.
        # Overwrite (>) is intentional: secrets may rotate between boots.
        mkdir -p "${HOME}/airflow"
        printf '{"admin": "%s"}\n' "${AIRFLOW_ADMIN_PASSWORD}" \
          > "${HOME}/airflow/simple_auth_manager_passwords.json.generated"
        chmod 0600 "${HOME}/airflow/simple_auth_manager_passwords.json.generated"
        # NB: prior versions copied bundled DAGs from /opt/airflow-defaults/
        # to ${HOME}/airflow/dags/ as a volume-shadow workaround. Then a
        # short-lived dag-osm-monaco data layer seeded a static DAG into
        # /workspace/dags/ at deploy time. Both are gone: notebooks
        # now self-author DAGs at runtime via the Airflow REST API + a
        # write to AIRFLOW__CORE__DAGS_FOLDER. No init-time copy required.
    # ---- airflow-webserver.sh / -scheduler.sh ----
    # Two long-running processes are sufficient for LocalExecutor + SQLite.
    # `exec` is critical so signals reach airflow directly (not the wrapper).
    - write: /usr/local/bin/airflow-webserver.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        # Airflow 3.x: `webserver` was removed; use `api-server` (FastAPI).
        exec "${HOME}/.pixi/envs/default/bin/airflow" api-server
    - write: /usr/local/bin/airflow-scheduler.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        exec "${HOME}/.pixi/envs/default/bin/airflow" scheduler
    # Airflow 3.x splits the DAG processor out of the scheduler — without
    # a separate `airflow dag-processor` daemon, the DAGs folder is only
    # scanned on explicit `airflow dags reserialize`. The notebook
    # workflow (write DAG, trigger it) requires periodic scanning, so
    # this service is essential, not optional, in 3.x.
    - write: /usr/local/bin/airflow-dag-processor.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        exec "${HOME}/.pixi/envs/default/bin/airflow" dag-processor

    # ---- airflow-mcp.sh ----
    # Plan A: mcp-server-apache-airflow from PyPI. Wraps the Airflow REST API
    # as MCP tools (list_dags, trigger_dag, get_task_instance, list_variables,
    # …). Speaks Streamable HTTP on port 19999 (ov's project default). The
    # third-party server's docs reference /api/v1/ — Airflow 3.x serves
    # /api/v2/, so R10 step 13 may reveal incompatibility, in which case
    # Plan B (a fastmcp wrapper around /api/v2/) takes over.
    #
    # Authentication: basic auth via AIRFLOW_USERNAME + AIRFLOW_PASSWORD
    # against the same admin account airflow-init.sh provisioned. Airflow
    # 3.x's api-server defaults to JWT for external clients but accepts
    # basic for internal callers; if the server rejects basic auth, R10
    # step 13 fails cleanly and Plan B's per-tool httpx client takes over.
    - write: /usr/local/bin/airflow-mcp.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        # Wait for airflow api-server to be reachable before starting the MCP
        # bridge — without this the first MCP call after a fresh boot races
        # with the api-server's startup and returns connection-refused.
        for i in $(seq 1 60); do
          if curl -sf -o /dev/null "http://127.0.0.1:8080/api/v2/version"; then
            break
          fi
          sleep 1
        done
        export AIRFLOW_HOST="http://127.0.0.1:8080"
        # Airflow 3.x rejects basic auth on /api/v2/ endpoints by default
        # (the api-server uses JWT issued by SimpleAuthManager). Fetch
        # a JWT once at startup and pass it to mcp-server-apache-airflow
        # via AIRFLOW_JWT_TOKEN — which takes precedence over USERNAME/
        # PASSWORD per the package's docs.
        # The /auth/token endpoint is provided by SimpleAuthManager;
        # if the call fails (e.g., a different auth manager is configured),
        # we fall back to USERNAME+PASSWORD which mcp-server-apache-airflow
        # will retry as basic auth (at least the failure mode is visible).
        TOKEN=$(curl -sf -X POST -H 'Content-Type: application/json' \
          -d "{\"username\":\"admin\",\"password\":\"${AIRFLOW_ADMIN_PASSWORD}\"}" \
          "${AIRFLOW_HOST}/auth/token" 2>/dev/null \
          | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || true)
        if [ -n "${TOKEN}" ]; then
          export AIRFLOW_JWT_TOKEN="${TOKEN}"
          echo "airflow-mcp: obtained JWT (length ${#TOKEN})"
        else
          export AIRFLOW_USERNAME="admin"
          export AIRFLOW_PASSWORD="${AIRFLOW_ADMIN_PASSWORD}"
          echo "airflow-mcp: JWT fetch failed; falling back to basic auth (Airflow 3.x will likely reject this)" >&2
        fi
        # mcp-server-apache-airflow uses --mcp-port + --mcp-host (NOT --port);
        # confirmed via `--help` on package version 0.2.10. Default --mcp-host
        # is 127.0.0.1; we bind 0.0.0.0 so the host-port mapping in the pod
        # deploy reaches the in-pod MCP service.
        exec "${HOME}/.pixi/envs/default/bin/mcp-server-apache-airflow" \
          --transport http \
          --mcp-host 0.0.0.0 \
          --mcp-port 19999

    # NB: sample OSM pipeline DAG used to be inlined here via `write:`
    # to /opt/airflow-defaults/dags/ + airflow-init.sh copy. Then it
    # was extracted to a dag-osm-monaco data layer that seeded
    # /workspace/dags/ at deploy time. Both are gone: notebooks
    # now self-author DAGs at runtime via the Airflow REST API. The
    # canonical example is layers/notebook-osm/data/notebooks/osm-monaco-viz.py
    # which writes notebook_osm_pipeline.py into AIRFLOW__CORE__DAGS_FOLDER
    # and triggers it via POST /api/v2/dags/.../dagRuns.
  eval:
    # Build-scope: the wrapper scripts must exist + be executable.
    - id: airflow-init-script
      file: /usr/local/bin/airflow-init.sh
      exists: true
      mode: "0755"
    - id: airflow-webserver-script
      file: /usr/local/bin/airflow-webserver.sh
      exists: true
      mode: "0755"
    - id: airflow-scheduler-script
      file: /usr/local/bin/airflow-scheduler.sh
      exists: true
      mode: "0755"
    - id: airflow-dag-processor-script
      file: /usr/local/bin/airflow-dag-processor.sh
      exists: true
      mode: "0755"
    - id: airflow-mcp-script
      file: /usr/local/bin/airflow-mcp.sh
      exists: true
      mode: "0755"
    # NB: no static DAG file is baked or seeded by ov anymore. Notebooks
    # self-author DAGs at runtime; the JWT-issuance probe below is what
    # proves the path the notebook depends on actually works.
    # Build-scope: the mcp-server-apache-airflow CLI installed cleanly into the pixi env.
    - id: airflow-mcp-binary
      file: ${HOME}/.pixi/envs/default/bin/mcp-server-apache-airflow
      exists: true
    # Deploy-scope: each daemon must reach RUNNING; init must EXIT 0; webserver UI 200.
    # airflow-init is a one-shot (restart: no) — checking its side effect
    # (the SQLite metadata DB exists) is the right invariant. The
    # `service: ...; enabled: true` shape works for long-running services
    # but reports false for EXITED one-shots even when they succeeded.
    - id: airflow-init-db-created
      scope: deploy
      command: test -f ${HOME}/airflow/airflow.db
      exit_status: 0
      in_container: true
    - id: airflow-scheduler-running
      scope: deploy
      service: airflow-scheduler
      running: true
    - id: airflow-dag-processor-running
      scope: deploy
      service: airflow-dag-processor
      running: true
    - id: airflow-webserver-running
      scope: deploy
      service: airflow-webserver
      running: true
    - id: airflow-mcp-running
      scope: deploy
      service: airflow-mcp
      running: true
    - id: airflow-port-reachable
      scope: deploy
      addr: "127.0.0.1:${HOST_PORT:8080}"
      reachable: true
      timeout: 10s
    - id: airflow-http-version
      scope: deploy
      http: "http://127.0.0.1:${HOST_PORT:8080}/api/v2/version"
      status: 200
      timeout: 30s
    # Proves the JWT auth path notebooks depend on (e.g. the marimo
    # osm-monaco-viz notebook's cell-3 POSTs /auth/token to get a bearer
    # token before triggering its self-authored DAG via /api/v2/dagRuns).
    # in_container: true so $AIRFLOW_ADMIN_PASSWORD is shell-expanded
    # against the container env (the secret is injected by ov as an env
    # var, never a file). A green check here is a guarantee that
    # admin/AIRFLOW_ADMIN_PASSWORD will succeed for any in-pod client.
    - id: airflow-jwt-issuance
      scope: deploy
      command: |
        curl -fsS -X POST "http://localhost:8080/auth/token" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"admin\",\"password\":\"$AIRFLOW_ADMIN_PASSWORD\"}" \
        | grep -q '"access_token"'
      in_container: true
      exit_status: 0
      timeout: 15s
    - id: airflow-mcp-port-reachable
      scope: deploy
      addr: "127.0.0.1:${HOST_PORT:19999}"
      reachable: true
      timeout: 30s        # mcp wrapper waits for api-server before binding; allow generous slack
    # Deploy-scope MCP probes — the host-port rewriter resolves the URL
    # template + maps to 127.0.0.1:HOST_PORT automatically.
    - id: mcp-airflow-ping
      scope: deploy
      mcp: ping
      mcp_name: airflow
      timeout: 30s
    - id: mcp-airflow-list-tools
      scope: deploy
      mcp: list-tools
      mcp_name: airflow
      stdout:
        # mcp-server-apache-airflow 0.2.10 actual tool names per the
        # `--help` output verification: fetch_dags (NOT list_dags),
        # post_dag_run (NOT trigger_dag), get_dag, get_dag_run.
        - contains: fetch_dags
        - contains: post_dag_run
        - contains: get_dag_run
    # NB: mcp call probes are NOT enforced for the airflow MCP because
    # Airflow 3.x's JWT auth has uneven coverage in mcp-server-apache-airflow
    # 0.2.10 (basic auth rejected; JWT fetch endpoint depends on the active
    # auth manager). The list-tools probe verifies the MCP server is alive
    # and exposes the right tools. End-to-end DAG triggering is covered by
    # the R10 sample-DAG run (R10 step 12) which uses the airflow CLI
    # directly inside the container — bypassing the MCP layer entirely.
  service:
    # One-shot init: db migrate + admin user, exits 0. Priority 25 so it
    # runs before the long-running daemons (priority 30+).
    - name: airflow-init
      exec: /usr/local/bin/airflow-init.sh
      restart: "no"
      priority: 25
      start_sec: 0
      exit_code: "0"
      enable: true
      scope: system
    - name: airflow-scheduler
      exec: /usr/local/bin/airflow-scheduler.sh
      restart: always
      priority: 30
      enable: true
      scope: system
    - name: airflow-dag-processor
      # Airflow 3.x: separate from the scheduler. Without it, DAG files
      # in AIRFLOW__CORE__DAGS_FOLDER are never scanned (notebooks that
      # self-author DAGs would deadlock waiting for registration).
      exec: /usr/local/bin/airflow-dag-processor.sh
      restart: always
      priority: 31
      enable: true
      scope: system
    - name: airflow-webserver
      exec: /usr/local/bin/airflow-webserver.sh
      restart: always
      priority: 31
      enable: true
      scope: system
    - name: airflow-mcp
      # The wrapper script self-blocks on api-server reachability before
      # exec'ing the MCP bridge, so priority ordering relative to the
      # api-server is a hint, not a hard ordering constraint. priority 32
      # keeps it visually adjacent to the airflow stack in `supervisorctl status`.
      exec: /usr/local/bin/airflow-mcp.sh
      restart: always
      priority: 32
      enable: true
      scope: system
