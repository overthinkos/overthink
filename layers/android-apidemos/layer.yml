layer:
    version: 2026.145.1700
    name: android-apidemos
    description:
        feature: |
            The committed ApiDemos APK (io.appium.android.apis) installed onto a
            `kind: android` device via the `apk:` package format's committed-file
            path (`apk: <path>`, NOT an apkeep download). Pushed via the goadb
            sync protocol — so it works against a remote/physical adb endpoint
            with no host apkeep/adb binaries, exercising the endpoint device path.
            The APK ships in tests/data/ (the same fixture the adb/appium eval
            verbs use).
        tag: [testing]
    apk:
        # Committed local APK (project-root-relative) → goadb push + pm install.
        # No source: — committed files don't use apkeep.
        - apk: tests/data/ApiDemos-debug.apk
