layer:
    version: 2026.145.0900
    name: android-sdk
    description: |
        Android SDK installed from CachyOS/AUR packages under /opt/android-sdk:
        cmdline-tools (sdkmanager/avdmanager), platform-tools (adb), build-tools
        34 (aapt2), platform android-34, and the emulator. Every AUR package
        installs into /opt/android-sdk (verified PKGBUILD prefixes), so they
        coexist with the one sdkmanager-fetched component. The Android 14
        (API 34, google_apis x86_64) SYSTEM IMAGE has NO package anywhere — it
        is the single component sdkmanager fetches (using the AUR cmdline-tools),
        cached in a persistent build mount. requires java-openjdk for sdkmanager
        + emulator runtime. cachyos (Arch-derived) consumes the arch: section and
        routes aur → arch-builder; the consuming image must declare
        build:[pac,aur] (android-emulator inherits it from the selkies-desktop
        chain).
    require:
        - java-openjdk
    env:
        ANDROID_HOME: "/opt/android-sdk"
        ANDROID_SDK_ROOT: "/opt/android-sdk"
    path_append:
        - "/opt/android-sdk/cmdline-tools/latest/bin"
        - "/opt/android-sdk/platform-tools"
        - "/opt/android-sdk/emulator"
    var:
        EMULATOR_API_LEVEL: "34"
        EMULATOR_SYS_IMG: "x86_64"
        EMULATOR_IMG_TYPE: "google_apis"
    distro:
        arch:
            # Emulator runtime libs (Qt/GL/audio): the AUR packages provide the
            # SDK TOOLS, these provide the shared libs the emulator dlopens.
            # Qt 6.5+ (bundled in the emulator) needs xcb-util-cursor to load the
            # xcb platform plugin even with -no-window, else the process exits
            # before AVD boot. pacman --needed skips libs already in the base.
            package:
                - unzip
                - which
                - gcc-libs
                - mesa
                - libglvnd
                - libx11
                - libxrandr
                - libxi
                - libxcursor
                - libxrender
                - libxxf86vm
                - libxfixes
                - libxcomposite
                - libxkbcommon-x11
                - alsa-lib
                - libpulse
                - xcb-util-cursor
            aur:
                # SDK toolchain via AUR — all install under /opt/android-sdk.
                # build-tools-34 brings aapt2 (absent before this layer; Appium's
                # ADB badging probe logged "Could not find 'aapt2'").
                package:
                    - android-sdk-cmdline-tools-latest
                    - android-sdk-platform-tools
                    - android-sdk-build-tools-34
                    - android-platform-34
                    - android-emulator
    task:
        # The ONE component with no package anywhere: the API-34 google_apis
        # x86_64 system image. sdkmanager (from the AUR cmdline-tools) fetches it
        # into a persistent cache mount, then it is copied into /opt/android-sdk
        # alongside the AUR-installed tools. The cache survives a base-image
        # cache-miss so a rebuild does NOT re-pull Google's ~1.5GB image (whose
        # CDN intermittently serves corrupt zips). The .complete sentinel is
        # written only after a fully successful download.
        - cmd: |
            set -euo pipefail
            export JAVA_HOME=/usr/lib/jvm/ov-jdk21
            export PATH="$JAVA_HOME/bin:/opt/android-sdk/cmdline-tools/latest/bin:$PATH"
            SDK_CACHE=/var/cache/ov-android-sysimg
            SYSIMG="system-images;android-${EMULATOR_API_LEVEL};${EMULATOR_IMG_TYPE};${EMULATOR_SYS_IMG}"
            if [ ! -f "${SDK_CACHE}/.ov-sysimg-complete" ]; then
              # Bounded for-loop emits enough y's for the license prompts without
              # the SIGPIPE that `yes | sdkmanager` triggers under pipefail.
              for _ in $(seq 1 100); do echo y; done | sdkmanager --sdk_root="${SDK_CACHE}" --licenses >/dev/null
              sdkmanager --sdk_root="${SDK_CACHE}" "${SYSIMG}"
              touch "${SDK_CACHE}/.ov-sysimg-complete"
            fi
            mkdir -p /opt/android-sdk/system-images
            cp -a "${SDK_CACHE}/system-images/." /opt/android-sdk/system-images/
          user: root
          cache:
            - /var/cache/ov-android-sysimg
    eval:
        - id: sdkmanager-binary
          file: /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager
          exists: true
        - id: avdmanager-binary
          file: /opt/android-sdk/cmdline-tools/latest/bin/avdmanager
          exists: true
        - id: adb-binary
          file: /opt/android-sdk/platform-tools/adb
          exists: true
        - id: aapt2-binary
          file: /opt/android-sdk/build-tools/34.0.0/aapt2
          exists: true
        - id: emulator-binary
          file: /opt/android-sdk/emulator/emulator
          exists: true
        - id: platform-34-installed
          file: /opt/android-sdk/platforms/android-34
          exists: true
          filetype: directory
        - id: system-image-installed
          file: /opt/android-sdk/system-images/android-34/google_apis/x86_64
          exists: true
          filetype: directory
        - id: adb-runs
          command: /opt/android-sdk/platform-tools/adb version
          exit_status: 0
          stdout:
            - contains: "Android Debug Bridge"
