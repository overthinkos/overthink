layer:
    version: 2026.145.0900
    name: appium-server
    description: |
        Appium 3.x WebDriver server from the CachyOS/AUR `appium` package (binary
        at /usr/bin/appium; depends on the pacman nodejs the nodejs layer already
        pulls via npm) with the uiautomator2 driver installed per-user into
        ~/.appium. Also pre-bakes a pinned chromedriver matching the API-34
        google_apis System WebView (Chrome 113) at /opt/chromedriver/113, so
        WebView context switching works offline via the session cap
        appium:chromedriverExecutableDir — no runtime autodownload, no
        --allow-insecure (autodownload was verified slow/hanging). cachyos
        consumes the arch: section and routes aur → arch-builder; the consuming
        image declares build:[pac,aur].
    require:
        - nodejs
        - java-openjdk
        - android-sdk
        - supervisord
    var:
        # Tracks the API-34 google_apis System WebView Chrome major (113). Bump
        # in lockstep with the system image's WebView version.
        WEBVIEW_CHROMEDRIVER_VERSION: "113.0.5672.63"
    distro:
        arch:
            aur:
                package:
                    - appium
    task:
        - cmd: |
            set -euo pipefail
            # Driver installs per-user (writes ~/.appium/node_modules). JAVA_HOME
            # + ANDROID_HOME come from upstream layer ENV baked into the image.
            export JAVA_HOME=/usr/lib/jvm/ov-jdk21
            export ANDROID_HOME=/opt/android-sdk
            export PATH="$JAVA_HOME/bin:$PATH"
            /usr/bin/appium driver install uiautomator2
          user: "${USER}"
        - mkdir: /opt/chromedriver/113
          user: root
          mode: "0755"
        - download: "https://chromedriver.storage.googleapis.com/${WEBVIEW_CHROMEDRIVER_VERSION}/chromedriver_linux64.zip"
          extract: zip
          to: /opt/chromedriver/113
          user: root
        - cmd: chmod 0755 /opt/chromedriver/113/chromedriver
          user: root
    service:
        - name: appium
          exec: "/usr/bin/appium --address 0.0.0.0 --port 4723 --base-path /wd/hub --log-level info"
          env:
            ANDROID_HOME: /opt/android-sdk
            ANDROID_SDK_ROOT: /opt/android-sdk
            JAVA_HOME: /usr/lib/jvm/ov-jdk21
            HOME: /home/user
          restart: always
          priority: 40
          start_sec: 3
          enable: true
          scope: system
    port:
        - 4723
    eval:
        - id: appium-binary
          file: /usr/bin/appium
          exists: true
        - id: appium-runs
          command: /usr/bin/appium --version
          exit_status: 0
          stdout:
            - matches: "^[0-9]+\\."
        - id: uiautomator2-driver
          file: ${HOME}/.appium/node_modules/appium-uiautomator2-driver
          exists: true
          filetype: directory
        - id: chromedriver-113-baked
          file: /opt/chromedriver/113/chromedriver
          exists: true
        - id: appium-status-endpoint
          scope: deploy
          http: http://127.0.0.1:${HOST_PORT:4723}/wd/hub/status
          status: 200
          timeout: 10s
        - id: appium-status-ready
          scope: deploy
          appium: status
          stdout:
            - contains: '"ready":true'
