pac:
  packages:
    # Build
    - base-devel
    - go
    - git
    # Container engines
    - podman
    - buildah
    - docker
    # Rootless container support
    - shadow
    - fuse-overlayfs
    # VM support
    - qemu-full
    - qemu-img
    - virtiofsd
    - libvirt
    # Encryption
    - gocryptfs
    - fuse3
    # Merge & registry
    - skopeo
    # Tunnels
    - tailscale
    # Credentials & SSH
    - libsecret
    - openssh
    # Shell utilities
    - util-linux

volumes:
  - name: storage
    path: /var/lib/containers/storage

security:
  privileged: true

env:
  OV_BUILD_ENGINE: "podman"
  OV_RUN_ENGINE: "podman"
