layer:
  name: asciinema
  description: Terminal session recorder (asciinema)
  packages:
    - asciinema
  eval:
    - id: asciinema-binary
      file: /usr/bin/asciinema
      exists: true
    - id: asciinema-version
      command: /usr/bin/asciinema --version
      exit_status: 0
      stdout:
        - contains: "asciinema"
