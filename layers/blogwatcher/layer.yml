layer:
    version: 2026.144.1443
    name: blogwatcher
    description: Blog/RSS feed monitor CLI
    require:
        - golang
    env:
        GOPATH: "~/go"
    path_append:
        - "~/go/bin"
    task:
        - cmd: |
            go install github.com/Hyaxia/blogwatcher/cmd/blogwatcher@latest
            go clean -cache
          user: "${USER}"
