# Bootc system configuration: autologin, systemd user session, RPM service enablement
version: '3'

tasks:
  all:
    cmds:
      # Configure autologin on tty1
      - |
        mkdir -p /etc/systemd/system/getty@tty1.service.d
        cat > /etc/systemd/system/getty@tty1.service.d/autologin.conf <<'CONF'
        [Service]
        ExecStart=
        ExecStart=-/sbin/agetty --autologin user --noclear %I $TERM
        CONF
      # Set graphical target as default
      - |
        systemctl set-default graphical.target 2>/dev/null || true
      # Enable RPM-provided user services globally (pipewire, wireplumber)
      - |
        systemctl --global enable pipewire.socket 2>/dev/null || true
        systemctl --global enable wireplumber.service 2>/dev/null || true
