layer:
  name: build-toolchain
  env:
    CCACHE_DISABLE: "1"
  package:
    - autoconf
    - automake
    - binutils
    - bison
    - ccache
    - cmake
    - flex
    - gdb
    - git
    - libtool
    - nasm
    - patch
  distro:
    arch:
      package:
        - clang
        - ffmpeg
        - gcc
        - glibc
        - libdrm
        - libinput
        - libjpeg-turbo
        - seatd
        - libva
        - libxkbcommon
        - make
        - mesa
        - ninja
        - opusfile
        - pixman
        - pkgconf
        - portaudio
        - rust
        - systemd
        - wayland
        - x264
    debian:
      package:
        - build-essential
        - cargo
        - clang
        - libavcodec-dev
        - libavformat-dev
        - libavutil-dev
        - libclang-dev
        - libdrm-dev
        - libgbm-dev
        - libinput-dev
        - libturbojpeg0-dev
        - libpixman-1-dev
        - libseat-dev
        - libsystemd-dev
        - libswscale-dev
        - libudev-dev
        - libva-dev
        - libwayland-dev
        - libx264-dev
        - libxkbcommon-dev
        - ninja-build
        - libopusfile-dev
        - pkg-config
        - portaudio19-dev
        - rustc
    fedora:
      package:
        - cargo
        - clang-devel
        - cli11-devel
        - ffmpeg-devel
        - gcc
        - gcc-c++
        - glibc-devel
        - libdrm-devel
        - libinput-devel
        - libjpeg-turbo-devel
        - libseat-devel
        - libudev-devel
        - libva-devel
        - libxkbcommon-devel
        - make
        - mesa-libgbm-devel
        - ninja-build
        - opusfile-devel
        - pixman-devel
        - portaudio-devel
        - pkgconf
        - pkgconf-m4
        - pkgconf-pkg-config
        - redhat-rpm-config
        - rpm-build
        - rpm-sign
        - rust
        - systemd-devel
        - wayland-devel
        - x264-devel
    ubuntu:
      package:
        - build-essential
        - cargo
        - clang
        - libavcodec-dev
        - libavformat-dev
        - libavutil-dev
        - libclang-dev
        - libdrm-dev
        - libgbm-dev
        - libinput-dev
        - libturbojpeg0-dev
        - libpixman-1-dev
        - libseat-dev
        - libsystemd-dev
        - libswscale-dev
        - libudev-dev
        - libva-dev
        - libwayland-dev
        - libx264-dev
        - libxkbcommon-dev
        - ninja-build
        - libopusfile-dev
        - pkg-config
        - portaudio19-dev
        - rustc
  eval:
    - id: gcc-binary
      file: /usr/bin/gcc
      exists: true
    - id: gcc-version
      command: /usr/bin/gcc --version
      exit_status: 0
    - id: make-binary
      file: /usr/bin/make
      exists: true
    - id: make-version
      command: /usr/bin/make --version
      exit_status: 0
    - id: cmake-binary
      file: /usr/bin/cmake
      exists: true
    - id: cmake-version
      command: /usr/bin/cmake --version
      exit_status: 0
