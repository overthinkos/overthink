depends:
  - supervisord

env:
  WLR_BACKENDS: "headless"
  WLR_HEADLESS_OUTPUTS: "1"
  WLR_LIBINPUT_NO_DEVICES: "1"
  XDG_RUNTIME_DIR: "/tmp"
  WAYLAND_DISPLAY: "wayland-0"

rpm:
  packages:
    - cage
    - wlr-randr

service: |
  [program:cage]
  command=%(ENV_HOME)s/.local/bin/cage-wrapper
  autostart=true
  autorestart=true
  priority=10
  startsecs=3
  environment=WLR_BACKENDS="headless",WLR_HEADLESS_OUTPUTS="1",WLR_LIBINPUT_NO_DEVICES="1",XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
