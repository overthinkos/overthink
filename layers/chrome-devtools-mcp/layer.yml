description: Chrome DevTools MCP server via mcp-proxy (Streamable HTTP on port 9224)

depends:
  - nodejs
  - supervisord

ports:
  - 9224

mcp_provides:
  - name: chrome-devtools
    url: "http://{{.ContainerName}}:9224/mcp"
    transport: http

service: |
  [program:chrome-devtools-mcp]
  command=%(ENV_HOME)s/.pixi/envs/default/bin/mcp-proxy --host 0.0.0.0 --port 9224 -- %(ENV_HOME)s/.npm-global/bin/chrome-devtools-mcp --browser-url http://127.0.0.1:9222 --no-usage-statistics
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0

tests:
  - id: chrome-devtools-mcp-binary
    file: ${HOME}/.npm-global/bin/chrome-devtools-mcp
    exists: true
  - id: mcp-proxy-binary
    file: ${HOME}/.pixi/envs/default/bin/mcp-proxy
    exists: true
  - id: chrome-devtools-mcp-service
    scope: deploy
    service: chrome-devtools-mcp
    running: true
  - id: chrome-devtools-mcp-port
    scope: deploy
    addr: 127.0.0.1:${HOST_PORT:9224}
    reachable: true
    timeout: 5s
  # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
  # Runs only under `ov test <image>` (deploy-scope). No `call` test — the
  # chrome-devtools tools need a live Chrome session; ping + tool-catalog are
  # safe non-destructive probes.
  - id: mcp-chrome-devtools-ping
    scope: deploy
    mcp: ping
    timeout: 10s
  - id: mcp-chrome-devtools-list-tools
    scope: deploy
    mcp: list-tools
    stdout:
      - contains: navigate_page
      - contains: take_screenshot
