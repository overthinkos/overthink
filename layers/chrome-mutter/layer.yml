layer:
  name: chrome-mutter
  depends:
    - mutter
    - supervisord

  layers:
    - chrome
    - chrome-cdp

  tasks:
    - mkdir: "${HOME}/.local/bin"
      user: "${USER}"
    - copy: chrome-mutter-wrapper
      to: "${HOME}/.local/bin/chrome-mutter-wrapper"
      mode: "0755"
      user: "${USER}"

  service:
    - name: chrome
      exec: "%(ENV_HOME)s/.local/bin/chrome-mutter-wrapper"
      env:
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/tmp/dbus-session"
        WAYLAND_DISPLAY: wayland-0
        XDG_RUNTIME_DIR: /tmp
      restart: no
      priority: 15
      start_secs: 0
      enable: true
      scope: system


