depends:
  - socat

path_append:
  - "~/.local/bin"

env:
  CHROME_FLAGS: "--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks"
  BROWSER: "browser-open"

security:
  shm_size: "1g"

rpm:
  packages:
    - vulkan-loader
    - mesa-dri-drivers
    - alsa-lib
    - at-spi2-core
    - cups-libs
    - gtk3
    - libdrm
    - libxkbcommon
    - nss
    - procps-ng
    - iproute
    - libva-utils

env_provides:
  BROWSER_CDP_URL: "http://{{.ContainerName}}:9222"

ports:
  - 9222

port_relay:
  - 9222

volumes:
  - name: chrome-data
    path: "~/.chrome-debug"
