depends:
  - supervisord

layers:
  - chrome-devtools-mcp

path_append:
  - "~/.local/bin"

env:
  CHROME_FLAGS: "--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks"
  BROWSER: "browser-open"

env_accepts:
  - name: HTTP_PROXY
    description: "HTTP proxy URL for Chrome (e.g., http://proxy:8080)"
  - name: HTTPS_PROXY
    description: "HTTPS proxy URL for Chrome (e.g., http://proxy:8080)"
  - name: NO_PROXY
    description: "Comma-separated bypass list (e.g., localhost,127.0.0.1,.internal)"

security:
  shm_size: "1g"

rpm:
  packages:
    - vulkan-loader
    - mesa-dri-drivers
    - alsa-lib
    - at-spi2-core
    - cups-libs
    - gtk3
    - libdrm
    - libxkbcommon
    - nss
    - procps-ng
    - iproute
    - libva-utils

env_provides:
  BROWSER_CDP_URL: "http://{{.ContainerName}}:9222"

ports:
  - 9222

service: |
  [program:cdp-proxy]
  command=%(ENV_HOME)s/.local/bin/cdp-proxy
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0

volumes:
  - name: chrome-data
    path: "~/.chrome-debug"
