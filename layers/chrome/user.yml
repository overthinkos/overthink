version: '3'

tasks:
  all:
    cmds:
      - mkdir -p ~/.local/bin
      - cp /ctx/chrome-wrapper ~/.local/bin/chrome-wrapper
      - chmod +x ~/.local/bin/chrome-wrapper
      - cp /ctx/chrome-restart ~/.local/bin/chrome-restart
      - chmod +x ~/.local/bin/chrome-restart
      # Ensure Chrome always launches through chrome-wrapper (CDP flags, user-agent,
      # etc.) regardless of how it's started (sway exec, desktop file, app menu,
      # or Chrome's own self-restart after close/crash).
      - ln -sf chrome-wrapper ~/.local/bin/google-chrome-stable
      - cp /ctx/browser-open ~/.local/bin/browser-open
      - chmod +x ~/.local/bin/browser-open
      - cp /ctx/cdp-proxy ~/.local/bin/cdp-proxy
      - chmod +x ~/.local/bin/cdp-proxy
      - cp /ctx/chrome-crash-listener ~/.local/bin/chrome-crash-listener
      - chmod +x ~/.local/bin/chrome-crash-listener
      - mkdir -p ~/.local/share/chrome-windows
      - cp /ctx/chrome-windows/manifest.json ~/.local/share/chrome-windows/
      - cp /ctx/chrome-windows/rules.json ~/.local/share/chrome-windows/
      - cp /ctx/chrome-windows/content.js ~/.local/share/chrome-windows/
      - mkdir -p ~/.config
      - BROWSER= xdg-settings set default-web-browser google-chrome.desktop
