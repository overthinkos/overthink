layer:
  name: cloud-init
  depends:
    - sshd

  rpm:
    packages:
      - cloud-init
      - cloud-utils-growpart

  deb:
    packages:
      - cloud-init
      - cloud-guest-utils

  pac:
    packages:
      - cloud-init
      - cloud-guest-utils


  tasks:
    - mkdir: /etc/cloud/cloud.cfg.d
      user: root
    - write: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
      mode: "0644"
      user: root
      content: |
        datasource_list: [ NoCloud, None ]

  service:
    - name: cloud-init-local
      use_packaged: cloud-init-local.service
      enable: true
      scope: system

    - name: cloud-init
      use_packaged: cloud-init.service
      enable: true
      scope: system

    - name: cloud-config
      use_packaged: cloud-config.service
      enable: true
      scope: system

    - name: cloud-final
      use_packaged: cloud-final.service
      enable: true
      scope: system


