layer:
  name: cloud-init
  requires:
    - sshd
  packages:
    - cloud-init
  distros:
    archlinux:
      packages:
        - cloud-guest-utils
    debian:
      packages:
        - cloud-guest-utils
    fedora:
      packages:
        - cloud-utils-growpart
    ubuntu:
      packages:
        - cloud-guest-utils
  tasks:
    - mkdir: /etc/cloud/cloud.cfg.d
      user: root
    - write: /etc/cloud/cloud.cfg.d/99-nocloud.cfg
      mode: "0644"
      user: root
      content: |
        datasource_list: [ NoCloud, None ]
  service:
    - name: cloud-init-local
      use_packaged: cloud-init-local.service
      enable: true
      scope: system
    - name: cloud-init
      use_packaged: cloud-init.service
      enable: true
      scope: system
    - name: cloud-config
      use_packaged: cloud-config.service
      enable: true
      scope: system
    - name: cloud-final
      use_packaged: cloud-final.service
      enable: true
      scope: system
