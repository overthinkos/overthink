version: '3'

tasks:
  all:
    cmds:
      # Rootless podman: subuid/subgid for root user
      - echo "root:100000:65536" >> /etc/subuid
      - echo "root:100000:65536" >> /etc/subgid

      # File capabilities for rootless user namespace mapping
      - |
        if [ -f /usr/bin/newuidmap ]; then
          setcap cap_setuid=ep /usr/bin/newuidmap
          setcap cap_setgid=ep /usr/bin/newgidmap
        fi

      # Nested podman config for container-in-container support:
      # - cgroups=disabled: cgroup filesystem is read-only at nesting depth 2+
      # - netns=host: netavark can't create network namespaces inside containers
      # - userns=host: newuidmap fails in nested user namespaces
      # - cgroup_manager=cgroupfs: systemd cgroup manager unavailable in containers
      - |
        mkdir -p /etc/containers
        cat > /etc/containers/containers.conf <<'TOML'
        [engine]
        cgroup_manager = "cgroupfs"

        [containers]
        cgroups = "disabled"
        netns = "host"
        userns = "host"
        TOML
