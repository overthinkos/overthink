depends:
  - nvidia
  - ffmpeg

env:
  CUDA_HOME: "/usr"

rpm:
  packages:
    - onnxruntime
    - libaio-devel
    - cpio
    - cuda-nvcc
    - cuda-cudart-devel
    - cuda-cudart-static
    - cuda-nvrtc-devel
    - cuda-cupti-devel
    - libcurand-devel
    - cuda-cccl-devel
    - cuda-cudnn
    - libcufile-devel
  exclude:
    - "nvidia-driver*"
