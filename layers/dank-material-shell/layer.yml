depends:
  - sway

rpm:
  copr:
    - avengemedia/dms
    - avengemedia/danklinux
  packages:
    - dms
    - cava
    - cliphist
    - wl-clipboard
    - dgop
    - danksearch
    - matugen
    - qt6-qtmultimedia
    - accountsservice

env:
  QT_QPA_PLATFORM: "wayland"
  QT_QPA_PLATFORMTHEME: "gtk3"
  ELECTRON_OZONE_PLATFORM_HINT: "auto"

service: |
  [program:dms]
  command=%(ENV_HOME)s/.local/bin/dms-wrapper
  autostart=true
  autorestart=true
  priority=15
  startsecs=3
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
