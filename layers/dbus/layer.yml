depends:
  - supervisord

env:
  DBUS_SESSION_BUS_ADDRESS: "unix:path=/tmp/dbus-session"

rpm:
  packages:
    - dbus-daemon

service: |
  [program:dbus]
  command=dbus-daemon --session --nofork --address=unix:path=/tmp/dbus-session
  autostart=true
  autorestart=true
  priority=2
  startsecs=1
  environment=XDG_RUNTIME_DIR="/tmp"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

tests:
  - id: dbus-daemon-binary
    file: /usr/bin/dbus-daemon
    exists: true
  - id: dbus-daemon-package
    package: dbus-daemon
    installed: true
  - id: dbus-session-env
    scope: deploy
    command: printenv DBUS_SESSION_BUS_ADDRESS
    exit_status: 0
    stdout:
      - contains: "unix:path=/tmp/dbus-session"
  - id: dbus-service-running
    scope: deploy
    service: dbus
    running: true
