layer:
  name: dbus
  requires:
    - supervisord
  env:
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/tmp/dbus-session"
  distros:
    archlinux:
      packages:
        - dbus
    debian:
      packages:
        - dbus
    fedora:
      packages:
        - dbus-daemon
    ubuntu:
      packages:
        - dbus
  eval:
    - id: dbus-daemon-binary
      file: /usr/bin/dbus-daemon
      exists: true
    - id: dbus-daemon-package
      package: dbus-daemon
      package_map:
        archlinux: dbus
      installed: true
    - id: dbus-session-env
      scope: deploy
      command: printenv DBUS_SESSION_BUS_ADDRESS
      exit_status: 0
      stdout:
        - contains: "unix:path=/tmp/dbus-session"
    - id: dbus-service-running
      scope: deploy
      service: dbus
      running: true
  service:
    - name: dbus
      exec: "dbus-daemon --session --nofork --address=unix:path=/tmp/dbus-session"
      env:
        XDG_RUNTIME_DIR: /tmp
      restart: always
      priority: 2
      enable: true
      scope: system
