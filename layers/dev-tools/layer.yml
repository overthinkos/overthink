layer:
  name: dev-tools
  packages:
    - bat
    - bpftrace
    - fdupes
    - html2text
    - htop
    - mosh
    - neovim
    - podman-compose
    - rclone
    - restic
    - ripgrep
    - squashfuse
    - strace
    - sysstat
    - yamllint
    - yq
    - zoxide
  distros:
    archlinux:
      packages:
        - android-tools
        - arch-install-scripts
        - asciinema
        - bcc
        - direnv
        - fastfetch
        - fd
        - fuse2
        - fuse3
        - qemu-desktop
        - shellcheck
    debian:
      packages:
        - android-sdk-platform-tools
        - bridge-utils
        - debootstrap
        - fastfetch
        - fd-find
        - libfuse-dev
        - libfuse3-dev
        - qemu-system-x86
        - qemu-user-static
        - qemu-utils
        - shellcheck
    fedora:
      packages:
        - android-tools
        - apptainer
        - apptainer-suid
        - arch-install-scripts
        - asciinema
        - bcc
        - bpftop
        - bridge-utils
        - debootstrap
        - direnv
        - dislocker
        - ecryptfs-utils
        - fastfetch
        - fd-find
        - fuse-devel
        - fuse-dislocker
        - fuse3-devel
        - jdupes
        - podman-machine
        - podman-remote
        - podman-tui
        - qemu-kvm
        - qemu-user-binfmt
        - qemu-user-static
        - ShellCheck
        - thefuck
      options:
        - "--setopt=tsflags=noscripts"
    ubuntu:
      packages:
        - android-sdk-platform-tools
        - bridge-utils
        - debootstrap
        - fastfetch
        - fd-find
        - libfuse-dev
        - libfuse3-dev
        - qemu-system-x86
        - qemu-user-static
        - qemu-utils
        - shellcheck
    ubuntu-24.04:
      packages:
        - android-sdk-platform-tools
        - bridge-utils
        - debootstrap
        - fd-find
        - libfuse-dev
        - libfuse3-dev
        - qemu-system-x86
        - qemu-user-static
        - qemu-utils
        - shellcheck
  # Distro-tolerant post-install: Debian/Ubuntu package `bat` installs the
  # binary as /usr/bin/batcat (the `bat` name collides with a legacy Debian
  # utility). Provide /usr/bin/bat as a symlink so downstream docs, scripts,
  # and declarative tests that reference /usr/bin/bat work uniformly. On
  # Fedora/Arch this task is a no-op: /usr/bin/bat already exists from their
  # packages and the `[ ! -e ]` guard short-circuits.
  tasks:
    - cmd: |
        if [ -f /usr/bin/batcat ] && [ ! -e /usr/bin/bat ]; then
          ln -sf /usr/bin/batcat /usr/bin/bat
        fi
      user: root
  eval:
    - id: ripgrep-binary
      file: /usr/bin/rg
      exists: true
    - id: bat-binary
      file: /usr/bin/bat
      exists: true
    # fastfetch is not in Ubuntu 24.04 noble main (Debian 13 trixie ships it
    # under the same name, as does Fedora/Arch). Skip the probe on Ubuntu
    # 24.04 — the ubuntu:24.04 tag section in this layer deliberately drops
    # fastfetch from the package list on that distro. exclude_distros: is
    # honored by ov/testrun.go; matches any of the image's distro tags.
    - id: fastfetch-binary
      file: /usr/bin/fastfetch
      exists: true
      exclude_distros:
        - ubuntu:24.04
    - id: neovim-binary
      file: /usr/bin/nvim
      exists: true
    - id: htop-binary
      file: /usr/bin/htop
      exists: true
