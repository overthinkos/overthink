layer:
  name: direnv
  description: direnv — automatic environment variable loading from .envrc files

  rpm:
    packages:
      - direnv

  pac:
    packages:
      - direnv

  deb:
    packages:
      - direnv

  eval:
    - id: direnv-binary
      file: /usr/bin/direnv
      exists: true
    - id: direnv-version
      command: /usr/bin/direnv version
      exit_status: 0

