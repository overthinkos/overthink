layer:
    version: 2026.144.1443
    name: eval-base-layer
    description:
        feature: Drop /etc/eval-base-marker as the first layer of the eval-pod stack
        narrative: |
            Single-file marker layer — the build-scope smoke target AND the
            composition-order anchor for the combined eval-pod bed
            (`ov eval run eval-pod`). It writes /etc/eval-base-marker; the
            eval-stack-layer that composes on top asserts this marker is still
            present, proving layer-composition order survives the build pipeline.
        tag: [working]
    task:
        - write: /etc/eval-base-marker
          user: root
          mode: "0644"
          content: |
            eval-base v1
    eval:
        - id: eval-base-marker-exists
          file: /etc/eval-base-marker
          exists: true
