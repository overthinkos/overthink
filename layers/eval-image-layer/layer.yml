layer:
  name: eval-image-layer
  description:
    feature: Drop /etc/eval-image-marker for kind:image smoke probes
    narrative: |
      Single-file marker layer used as the build-scope smoke target for
      the eval-image-pod bed (`ov eval run eval-image-pod`). Composes alone
      in the eval-image image and as the first layer of the eval-layer
      composition test.
    tag: [working]
  task:
    - write: /etc/eval-image-marker
      user: root
      mode: "0644"
      content: |
        eval-image v1
  eval:
    - id: eval-image-marker-exists
      file: /etc/eval-image-marker
      exists: true
