layer:
  name: eval-target-layer
  description:
    feature: bench-target — demonstrates ov benchmark with a real AI
    narrative: |
      Minimal synthetic layer used solely to exercise ov benchmark
      end-to-end against a real Claude Code runner. The single scenario
      below checks for a marker file the layer does NOT currently create,
      so baseline always fails. An AI solves it by adding a write: task
      to this layer.yml that creates /etc/ov-bench-marker containing the
      string "ov benchmark target".
    tag: [bench, throwaway]
    scenario:
      - name: marker file is present with expected content
        tag: ["@skeleton"]
        step:
          # Single Then step (no narrative-only Given) so the scenario
          # has zero pending steps and Classify can return VerdictSolved
          # when the AI's edit makes it pass.
          - then: the marker file exists with the expected content
            file: /etc/ov-bench-marker
            exists: true
            contains:
              - ov benchmark target

  # Placeholder task. Exists only to satisfy `ov image validate`'s
  # "layer must have at least one install artifact" rule. The AI's job
  # during `ov benchmark run` is to ADD a `write:` task here that
  # creates /etc/ov-bench-marker with the expected content.
  task:
    - mkdir: /etc/ov-bench
      user: root
      mode: "0755"
