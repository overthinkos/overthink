version: '3'

tasks:
  all:
    cmds:
      - |
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH=amd64;;
          aarch64) ARCH=arm64;;
          *) echo "Unsupported: $ARCH" >&2; exit 1;;
        esac
        curl -fsSL "https://github.com/gtsteffaniak/filebrowser/releases/download/v1.2.4-stable/linux-${ARCH}-filebrowser" \
          -o /usr/local/bin/filebrowser
        chmod 755 /usr/local/bin/filebrowser
      - mkdir -p /etc/filebrowser
      - cp /ctx/config.yaml /etc/filebrowser/config.yaml
