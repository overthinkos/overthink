layer:
  name: fixture-web-layer
  description:
    feature: fixture-web — predictable HTTP fixture for harness phase 2
    narrative: |
      Installs nginx, writes /srv/fixture/index.html containing the
      predetermined web content marker, ships an nginx.conf that listens
      on 8080 and serves /srv/fixture/, plus curl for the self-curl
      probe. Combined with a fedora base + supervisord this satisfies
      every scenario in the network-and-http recipe.

  depends:
    - supervisord

  rpm:
    packages:
      - nginx
      - curl
      - iproute
      - procps-ng

  ports:
    - 8080

  tasks:
    - mkdir: /srv/fixture
      user: root
      mode: "0755"
    - write: /srv/fixture/index.html
      user: root
      mode: "0644"
      content: |
        ov-fixture-web-content-marker
    - write: /etc/nginx/nginx.conf
      user: root
      mode: "0644"
      content: |
        worker_processes 1;
        error_log /tmp/nginx-error.log;
        pid /tmp/nginx.pid;

        events {
            worker_connections 1024;
        }

        http {
            access_log /tmp/nginx-access.log;
            client_body_temp_path /tmp/nginx-client-body;
            proxy_temp_path /tmp/nginx-proxy;
            fastcgi_temp_path /tmp/nginx-fastcgi;
            uwsgi_temp_path /tmp/nginx-uwsgi;
            scgi_temp_path /tmp/nginx-scgi;
            server {
                listen 8080 default_server;
                server_name _;
                root /srv/fixture;
                index index.html;
                location / {
                    try_files $uri $uri/ =404;
                }
            }
        }

  service:
    - name: fixture-web-nginx
      exec: "/usr/sbin/nginx -g 'daemon off;'"
      restart: always
      priority: 50
      enable: true
      scope: system

  tests:
    - id: fixture-web-nginx-installed
      package: nginx
      installed: true
    - id: fixture-web-curl-installed
      package: curl
      installed: true
    - id: fixture-web-content-file
      file: /srv/fixture/index.html
      exists: true
      contains:
        - ov-fixture-web-content-marker
