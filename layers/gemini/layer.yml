layer:
  name: gemini
  description: Google Gemini CLI for AI coding assistance and search
  requires:
    - nodejs
  eval:
    - id: gemini-binary
      file: ${HOME}/.npm-global/bin/gemini
      exists: true
    - id: gemini-version
      command: ${HOME}/.npm-global/bin/gemini --version
      exit_status: 0
