layer:
    version: 2026.144.1443
    name: gh
    description: GitHub CLI, git, and git-lfs
    package:
        - git
        - git-lfs
    distro:
        arch:
            package:
                - github-cli
        debian:
            package:
                - gh
            repo:
                - name: github-cli
                  url: "https://cli.github.com/packages"
                  key: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
                  suite: "stable"
                  components: "main"
        fedora:
            package:
                - gh
            option:
                - "--setopt=tsflags=noscripts"
        ubuntu:
            package:
                - gh
            repo:
                - name: github-cli
                  url: "https://cli.github.com/packages"
                  key: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
                  suite: "stable"
                  components: "main"
    task:
        # git-lfs post-install config (package installed with noscripts above so
        # the systemd-triggered git-lfs install step doesn't run in the build).
        - cmd: /usr/bin/git-lfs install --system --skip-repo 2>/dev/null || true
          user: root
    eval:
        - id: gh-binary
          file: /usr/bin/gh
          exists: true
        - id: gh-version
          command: /usr/bin/gh --version
          exit_status: 0
        - id: git-binary
          file: /usr/bin/git
          exists: true
        - id: git-version
          command: /usr/bin/git --version
          exit_status: 0
        - id: git-lfs-binary
          file: /usr/bin/git-lfs
          exists: true
        - id: git-lfs-version
          command: /usr/bin/git-lfs --version
          exit_status: 0
