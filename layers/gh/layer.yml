layer:
  name: gh
  description: GitHub CLI, git, and git-lfs

  rpm:
    packages:
      - gh
      - git
      - git-lfs
    options:
      - "--setopt=tsflags=noscripts"

  pac:
    packages:
      - github-cli
      - git
      - git-lfs

  # Debian / Ubuntu: gh is not in Debian main. Use the official GitHub CLI apt
  # repo (cli.github.com). The repo suite is a fixed "stable" (distro-agnostic).
  deb:
    repos:
      - name: github-cli
        url: "https://cli.github.com/packages"
        key: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
        suite: "stable"
        components: "main"
    packages:
      - gh
      - git
      - git-lfs

  tasks:
    # git-lfs post-install config (package installed with noscripts above so
    # the systemd-triggered git-lfs install step doesn't run in the build).
    - cmd: /usr/bin/git-lfs install --system --skip-repo 2>/dev/null || true
      user: root

  tests:
    - id: gh-binary
      file: /usr/bin/gh
      exists: true
    - id: gh-version
      command: /usr/bin/gh --version
      exit_status: 0
    - id: git-binary
      file: /usr/bin/git
      exists: true
    - id: git-version
      command: /usr/bin/git --version
      exit_status: 0
    - id: git-lfs-binary
      file: /usr/bin/git-lfs
      exists: true
    - id: git-lfs-version
      command: /usr/bin/git-lfs --version
      exit_status: 0

