description: GnuPG encryption and signing tools for GPG agent forwarding

rpm:
  packages:
    - gnupg2

pac:
  packages:
    - gnupg

tests:
  - id: gpg-binary
    file: /usr/bin/gpg
    exists: true
  - id: gpg-version
    command: /usr/bin/gpg --version
    exit_status: 0
    stdout:
      - contains: "gpg (GnuPG)"
