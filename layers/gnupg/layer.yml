layer:
  name: gnupg
  description: GnuPG encryption and signing tools for GPG agent forwarding
  distros:
    archlinux:
      packages:
        - gnupg
    debian:
      packages:
        - gnupg
    fedora:
      packages:
        - gnupg2
    ubuntu:
      packages:
        - gnupg
  eval:
    - id: gpg-binary
      file: /usr/bin/gpg
      exists: true
    - id: gpg-version
      command: /usr/bin/gpg --version
      exit_status: 0
      stdout:
        - contains: "gpg (GnuPG)"
