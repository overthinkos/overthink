layer:
  name: gocryptfs
  description: Encrypted filesystem (gocryptfs) for ov config encrypted volume operations
  packages:
    - gocryptfs
  eval:
    - id: gocryptfs-binary
      file: /usr/bin/gocryptfs
      exists: true
    - id: gocryptfs-version
      command: /usr/bin/gocryptfs -version
      exit_status: 0
