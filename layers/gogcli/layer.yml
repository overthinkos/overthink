layer:
  name: gogcli
  description: Google Workspace CLI (Gmail, Calendar, Drive, Contacts, Sheets, Docs)
  require:
    - golang
  env:
    GOPATH: "~/go"
  path_append:
    - "~/go/bin"
  task:
    - cmd: |
        # Pinned to v0.4.2 — go 1.25 compat (v0.13.0 requires go 1.26.2,
        # which the current builder toolchain doesn't carry).
        go install github.com/steipete/gogcli/cmd/gog@v0.4.2
        go clean -cache
      user: "${USER}"
