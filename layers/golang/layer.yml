layer:
  name: golang
  description: Go programming language compiler

  rpm:
    packages:
      - golang-bin

  pac:
    packages:
      - go

  deb:
    packages:
      - golang-go

  tests:
    - id: go-binary
      file: /usr/bin/go
      exists: true
    - id: go-version
      command: /usr/bin/go version
      exit_status: 0

