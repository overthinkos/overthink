layer:
  name: golang
  description: Go programming language compiler
  distros:
    archlinux:
      packages:
        - go
    debian:
      packages:
        - golang-go
    fedora:
      packages:
        - golang-bin
    ubuntu:
      packages:
        - golang-go
  eval:
    - id: go-binary
      file: /usr/bin/go
      exists: true
    - id: go-version
      command: /usr/bin/go version
      exit_status: 0
