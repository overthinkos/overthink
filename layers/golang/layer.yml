layer:
    version: 2026.144.1443
    name: golang
    description: Go programming language compiler
    distro:
        arch:
            package:
                - go
        debian:
            package:
                - golang-go
        fedora:
            package:
                - golang-bin
        ubuntu:
            package:
                - golang-go
    eval:
        - id: go-binary
          file: /usr/bin/go
          exists: true
        - id: go-version
          command: /usr/bin/go version
          exit_status: 0
