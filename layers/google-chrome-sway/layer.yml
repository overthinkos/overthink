depends:
  - sway
  - socat

layers:
  - chrome-deps

path_append:
  - "~/.local/bin"

env:
  CHROME_FLAGS: "--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks"
  BROWSER: "browser-open"

ports:
  - 9222

port_relay:
  - 9222

volumes:
  - name: chrome-data
    path: "~/.chrome-debug"

service: |
  [program:google-chrome]
  command=%(ENV_HOME)s/.local/bin/chrome-wrapper
  autostart=true
  autorestart=true
  priority=30
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
