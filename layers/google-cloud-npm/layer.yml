layer:
    version: 2026.144.1443
    name: google-cloud-npm
    require:
        - google-cloud
        - nodejs
    eval:
        - id: firebase-binary
          file: ${HOME}/.npm-global/bin/firebase
          exists: true
        - id: firebase-version
          command: ${HOME}/.npm-global/bin/firebase --version
          exit_status: 0
