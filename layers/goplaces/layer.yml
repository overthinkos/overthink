layer:
  name: goplaces
  description: Google Places API CLI for location search
  requires:
    - golang
  env:
    GOPATH: "~/go"
  path_append:
    - "~/go/bin"
  tasks:
    - cmd: |
        go install github.com/steipete/goplaces/cmd/goplaces@latest
        go clean -cache
      user: "${USER}"
