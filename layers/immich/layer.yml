depends:
  - supervisord
  - nodejs24
  - postgresql
  - redis

env:
  IMMICH_VERSION: "v2.5.6"
  IMMICH_HOST: "0.0.0.0"
  IMMICH_PORT: "2283"
  IMMICH_MEDIA_LOCATION: "~/.immich/library"
  IMMICH_MACHINE_LEARNING_ENABLED: "false"
  SHARP_FORCE_GLOBAL_LIBVIPS: "1"
  DB_HOSTNAME: "127.0.0.1"
  DB_PORT: "5432"
  DB_USERNAME: "immich"
  DB_PASSWORD: "immich"
  DB_DATABASE_NAME: "immich"
  REDIS_HOSTNAME: "127.0.0.1"
  REDIS_PORT: "6379"
  NODE_ENV: "production"

rpm:
  repos:
    - name: fedora-multimedia
      url: "https://negativo17.org/repos/fedora-multimedia.repo"
      gpgkey: "https://negativo17.org/repos/RPM-GPG-KEY-slaanesh"
  packages:
    - vips
    - vips-devel
    - ffmpeg
    - perl-Image-ExifTool
    - libheif
    - LibRaw
    - gcc-c++
    - make
    - unzip

ports:
  - 2283

volumes:
  - name: library
    path: "~/.immich/library"
  - name: cache
    path: "~/.immich/cache"

route:
  host: "immich.localhost"
  port: 2283

service: |
  [program:immich-db-init]
  command=bash -c 'for i in $(seq 1 30); do psql -h %(ENV_HOME)s/.postgresql -U user -d postgres -c "SELECT 1" >/dev/null 2>&1 && break; sleep 1; done; psql -h %(ENV_HOME)s/.postgresql -U user -d postgres -c "SELECT 1 FROM pg_database WHERE datname='"'"'immich'"'"'" | grep -q 1 || psql -h %(ENV_HOME)s/.postgresql -U user -d postgres -f %(ENV_HOME)s/.postgresql/init.sql; psql -h %(ENV_HOME)s/.postgresql -U user -d immich -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;"'
  autostart=true
  autorestart=false
  startsecs=0
  exitcodes=0
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=20

  [program:immich-server]
  command=node /opt/immich/server/dist/main
  directory=/opt/immich/server
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=30
