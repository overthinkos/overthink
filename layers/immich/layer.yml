depends:
  - supervisord
  - nodejs24
  - postgresql
  - redis

env:
  IMMICH_VERSION: "v2.6.3"
  IMMICH_HOST: "0.0.0.0"
  IMMICH_PORT: "2283"
  IMMICH_MEDIA_LOCATION: "~/.immich/library"
  IMMICH_MACHINE_LEARNING_ENABLED: "false"
  SHARP_FORCE_GLOBAL_LIBVIPS: "1"
  POSTGRES_USER: "immich"
  POSTGRES_DB: "immich"
  DB_HOSTNAME: "127.0.0.1"
  DB_PORT: "5432"
  DB_USERNAME: "immich"
  DB_DATABASE_NAME: "immich"
  REDIS_HOSTNAME: "127.0.0.1"
  REDIS_PORT: "6379"
  NODE_ENV: "production"

rpm:
  repos:
    - name: fedora-multimedia
      url: "https://negativo17.org/repos/fedora-multimedia.repo"
      gpgkey: "https://negativo17.org/repos/RPM-GPG-KEY-slaanesh"
  packages:
    - vips
    - vips-devel
    - ffmpeg
    - perl-Image-ExifTool
    - libheif
    - LibRaw
    - gcc-c++
    - make
    - unzip

ports:
  - 2283

volumes:
  - name: library
    path: "~/.immich/library"
  - name: cache
    path: "~/.immich/cache"
  - name: import
    path: "~/.immich/import"
  - name: external
    path: "~/.immich/external"

secrets:
  - name: db-password
    env: DB_PASSWORD
  - name: db-password
    env: POSTGRES_PASSWORD

route:
  host: "immich.localhost"
  port: 2283

service: |
  [program:immich-db-init]
  command=/usr/local/bin/immich-db-migrate.sh
  autostart=true
  autorestart=false
  startsecs=0
  exitcodes=0
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=15

  [program:immich-server]
  command=/usr/local/bin/immich-server-start.sh
  directory=/opt/immich/server
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=30
