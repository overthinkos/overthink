depends:
  - supervisord
  - node24
  - python
  - postgresql
  - redis

env:
  IMMICH_VERSION: "v2.5.6"
  IMMICH_HOST: "0.0.0.0"
  IMMICH_PORT: "2283"
  IMMICH_MEDIA_LOCATION: "~/.immich/library"
  IMMICH_MACHINE_LEARNING_URL: "http://127.0.0.1:3003"
  SHARP_FORCE_GLOBAL_LIBVIPS: "1"
  DB_HOSTNAME: "127.0.0.1"
  DB_PORT: "5432"
  DB_USERNAME: "immich"
  DB_PASSWORD: "immich"
  DB_DATABASE_NAME: "immich"
  REDIS_HOSTNAME: "127.0.0.1"
  REDIS_PORT: "6379"
  NODE_ENV: "production"
  MACHINE_LEARNING_HOST: "0.0.0.0"
  MACHINE_LEARNING_PORT: "3003"
  MACHINE_LEARNING_WORKERS: "1"
  MACHINE_LEARNING_WORKER_TIMEOUT: "120"
  TRANSFORMERS_CACHE: "~/.immich/models"

rpm:
  packages:
    - vips
    - vips-devel
    - ffmpeg
    - perl-Image-ExifTool
    - libheif
    - libraw
    - gcc-c++
    - make

ports:
  - 2283
  - 3003

volumes:
  - name: library
    path: "~/.immich/library"
  - name: cache
    path: "~/.immich/cache"
  - name: models
    path: "~/.immich/models"

route:
  host: "immich.localhost"
  port: 2283

service: |
  [program:immich-db-init]
  command=bash -c 'for i in $(seq 1 30); do psql -h %(ENV_HOME)s/.postgresql -U postgres -d postgres -c "SELECT 1" >/dev/null 2>&1 && break; sleep 1; done; if [ -f %(ENV_HOME)s/.postgresql/init.sql ] && ! psql -h %(ENV_HOME)s/.postgresql -U postgres -d postgres -c "SELECT 1 FROM pg_database WHERE datname='"'"'immich'"'"'" | grep -q 1; then psql -h %(ENV_HOME)s/.postgresql -U postgres -d postgres -f %(ENV_HOME)s/.postgresql/init.sql; fi'
  autostart=true
  autorestart=false
  startsecs=0
  exitcodes=0
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=20

  [program:immich-server]
  command=node /opt/immich/server/dist/main
  directory=/opt/immich/server
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=30

  [program:immich-ml]
  command=/opt/immich/machine-learning/.venv/bin/python -m immich_ml
  directory=/opt/immich/machine-learning
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=40
