depends:
  - supervisord
  - nodejs24
  - postgresql
  - redis

env:
  IMMICH_VERSION: "v2.5.6"
  IMMICH_HOST: "0.0.0.0"
  IMMICH_PORT: "2283"
  IMMICH_MEDIA_LOCATION: "~/.immich/library"
  IMMICH_MACHINE_LEARNING_ENABLED: "false"
  SHARP_FORCE_GLOBAL_LIBVIPS: "1"
  POSTGRES_USER: "immich"
  POSTGRES_DB: "immich"
  DB_HOSTNAME: "127.0.0.1"
  DB_PORT: "5432"
  DB_USERNAME: "immich"
  DB_DATABASE_NAME: "immich"
  REDIS_HOSTNAME: "127.0.0.1"
  REDIS_PORT: "6379"
  NODE_ENV: "production"

rpm:
  repos:
    - name: fedora-multimedia
      url: "https://negativo17.org/repos/fedora-multimedia.repo"
      gpgkey: "https://negativo17.org/repos/RPM-GPG-KEY-slaanesh"
  packages:
    - vips
    - vips-devel
    - ffmpeg
    - perl-Image-ExifTool
    - libheif
    - LibRaw
    - gcc-c++
    - make
    - unzip

ports:
  - 2283

volumes:
  - name: library
    path: "~/.immich/library"
  - name: cache
    path: "~/.immich/cache"

secrets:
  - name: db-password
    env: DB_PASSWORD
  - name: db-password
    env: POSTGRES_PASSWORD

route:
  host: "immich.localhost"
  port: 2283

service: |
  [program:immich-db-init]
  command=bash -c 'for i in $(seq 1 120); do pg_isready -h %(ENV_HOME)s/.postgresql -U %(ENV_POSTGRES_USER)s >/dev/null 2>&1 && exit 0; sleep 1; done; echo "PostgreSQL timed out after 120s" >&2; exit 1'
  autostart=true
  autorestart=false
  startsecs=0
  exitcodes=0
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=15

  [program:immich-server]
  command=node /opt/immich/server/dist/main
  directory=/opt/immich/server
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=30
