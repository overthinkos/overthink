version: '3'
tasks:
  all:
    vars:
      IMMICH_VERSION: v2.5.6
    cmds:
      # Download and extract immich source
      - curl -L https://github.com/immich-app/immich/archive/refs/tags/{{.IMMICH_VERSION}}.tar.gz | tar xz -C /tmp
      - mv /tmp/immich-$(echo {{.IMMICH_VERSION}} | sed 's/^v//') /tmp/immich

      # Build server with pnpm
      - cd /tmp/immich && pnpm install --frozen-lockfile
      - cd /tmp/immich && pnpm --filter immich build
      - cd /tmp/immich && pnpm --filter immich deploy --prod /opt/immich/server

      # Download geodata for reverse geocoding
      - |
        mkdir -p /build/geodata
        cd /build/geodata
        curl -sL https://download.geonames.org/export/dump/admin1CodesASCII.txt -o admin1CodesASCII.txt
        curl -sL https://download.geonames.org/export/dump/admin2Codes.txt -o admin2Codes.txt
        curl -sL https://download.geonames.org/export/dump/cities500.zip -o cities500.zip && unzip -o cities500.zip && rm cities500.zip
        curl -sL "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_0_countries.geojson" -o ne_10m_admin_0_countries.geojson
        date -I > geodata-date.txt
        echo '{}' > /build/build-lock.json
        mkdir -p /build/corePlugin/dist
        cp /tmp/immich/plugins/manifest.json /build/corePlugin/manifest.json

      # Build web UI
      - cd /tmp/immich && pnpm --filter @immich/sdk --filter immich-web build
      - cp -r /tmp/immich/web/build /build/www

      # Clean up
      - rm -rf /tmp/immich
