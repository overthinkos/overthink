depends:
  - cuda
  - supervisord

layers:
  - llama-cpp
  - unsloth
  - jupyter-mcp

env:
  NVIDIA_PYTHON_PROJECT: "~/.pixi"
  LD_LIBRARY_PATH: "/usr/lib64:$HOME/llama.cpp"

rpm:
  packages:
    - git
    - gcc      # Required by triton 3.6+ for JIT kernel compilation during training
    - gcc-c++  # Required for C++ extensions (flash-attn, custom CUDA kernels)

ports:
  - 8888

mcp_provides:
  - name: jupyter
    url: "http://{{.ContainerName}}:8888/mcp"
    transport: http

volumes:
  - name: workspace
    path: ~/workspace

service: |
  [program:jupyter-ml]
  command=bash -c 'if [ -n "${JUPYTER_TOKEN_FILE:-}" ] && [ -f "${JUPYTER_TOKEN_FILE}" ]; then TOKEN=$(cat "${JUPYTER_TOKEN_FILE}"); exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token="$TOKEN" --ServerApp.allow_origin="*" --ServerApp.base_url="/" --ServerApp.allow_root=True; else exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token="" --ServerApp.password="" --ServerApp.allow_origin="*" --ServerApp.base_url="/" --ServerApp.allow_root=True; fi'
  directory=%(ENV_HOME)s
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0

tests:
  # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
  # Runs only under `ov test <image>` (deploy-scope). Build-scope and
  # functional HTTP checks are contributed by the composed jupyter-mcp layer.
  - id: mcp-jupyter-ml-ping
    scope: deploy
    mcp: ping
    timeout: 10s
  - id: mcp-jupyter-ml-list-tools
    scope: deploy
    mcp: list-tools
    stdout:
      - contains: insert_cell
      - contains: execute_cell
  - id: mcp-jupyter-ml-list-notebooks
    scope: deploy
    mcp: call
    tool: list_notebooks
    input: "{}"
    exit_status: 0
