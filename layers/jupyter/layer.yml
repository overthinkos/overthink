layer:
  name: jupyter
  requires:
    - supervisord
  layers:
    - jupyter-mcp
  env:
    MCP_SERVER_NAME: "jupyter"
  distros:
    fedora:
      packages:
        - git
  ports:
    - 8888
  mcp_provides:
    - name: jupyter
      url: "http://{{.ContainerName}}:8888/mcp"
      transport: http
  volumes:
    - name: workspace
      path: ~/workspace
  eval:
    # Workspace mount is created by the deploy volume — only present at runtime.
    - id: workspace-dir
      scope: deploy
      file: ${HOME}/workspace
      filetype: directory
    - id: jupyter-lab-binary
      file: ${HOME}/.pixi/envs/default/bin/jupyter-lab
      exists: true
    # Verify spacy + en_core_web_sm model load — build-scope smoke for the NLP
    # additions in pixi.toml. The verify-spacy pixi task does the actual import.
    - id: spacy-import
      command: ${HOME}/.pixi/envs/default/bin/python -c "import spacy; spacy.load('en_core_web_sm')"
      exit_code: 0
    - id: jupyter-service
      scope: deploy
      service: jupyter
      running: true
    - id: jupyter-port
      scope: deploy
      addr: 127.0.0.1:${HOST_PORT:8888}
      reachable: true
      timeout: 5s
    # Service answers on its routed port at deploy time. The HOST_PORT
    # substitution means remapping in deploy.yml just works.
    - id: jupyter-api
      scope: deploy
      http: http://127.0.0.1:${HOST_PORT:8888}/api
      status: 200
      body:
        - contains: "version"
    # MCP server exercised live via github.com/modelcontextprotocol/go-sdk.
    # Runs only under `ov test <image>` (deploy-scope).
    - id: mcp-jupyter-ping
      scope: deploy
      mcp: ping
      timeout: 10s
    # Assert every JupyterLab MCP tool name is present in list-tools.
    # See plugins/ov-jupyter/skills/jupyter-mcp/SKILL.md for the
    # documented 15-tool surface this MCP server provides.
    # Naming convention: <noun>_<verb> with notebook_*/cell_*/room_* prefixes.
    - id: mcp-jupyter-list-tools
      scope: deploy
      mcp: list-tools
      stdout:
        - contains: notebook_list
        - contains: notebook_create
        - contains: notebook_get
        - contains: notebook_watch
        - contains: cell_get
        - contains: cell_update
        - contains: cell_insert
        - contains: cell_delete
        - contains: cell_execute
        - contains: room_open
        - contains: room_close
        - contains: room_close_all
        - contains: room_pick
        - contains: room_list
        - contains: room_list_users
    - id: mcp-jupyter-list-notebooks
      scope: deploy
      mcp: call
      tool: notebook_list
      input: "{}"
      exit_status: 0
  service:
    - name: jupyter
      exec: "bash -c 'if [ -n \"${JUPYTER_TOKEN_FILE:-}\" ] && [ -f \"${JUPYTER_TOKEN_FILE}\" ]; then TOKEN=$(cat \"${JUPYTER_TOKEN_FILE}\"); exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token=\"$TOKEN\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; else exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token=\"\" --ServerApp.password=\"\" --ServerApp.allow_origin=\"*\" --ServerApp.base_url=\"/\" --ServerApp.allow_root=True; fi'"
      restart: always
      working_directory: "%(ENV_HOME)s"
      enable: true
      scope: system
