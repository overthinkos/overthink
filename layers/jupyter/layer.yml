depends:
  - supervisord

layers:
  - jupyter-mcp

env:
  MCP_SERVER_NAME: "jupyter"

rpm:
  packages:
    - git

ports:
  - 8888

mcp_provides:
  - name: jupyter
    url: "http://{{.ContainerName}}:8888/mcp"
    transport: http

volumes:
  - name: workspace
    path: ~/workspace

service: |
  [program:jupyter]
  command=bash -c 'if [ -n "${JUPYTER_TOKEN_FILE:-}" ] && [ -f "${JUPYTER_TOKEN_FILE}" ]; then TOKEN=$(cat "${JUPYTER_TOKEN_FILE}"); exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token="$TOKEN" --ServerApp.allow_origin="*" --ServerApp.base_url="/" --ServerApp.allow_root=True; else exec jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --notebook-dir=$HOME/workspace --IdentityProvider.token="" --ServerApp.password="" --ServerApp.allow_origin="*" --ServerApp.base_url="/" --ServerApp.allow_root=True; fi'
  directory=%(ENV_HOME)s
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0

tests:
  # Workspace mount is created by the deploy volume — only present at runtime.
  - id: workspace-dir
    scope: deploy
    file: ${HOME}/workspace
    filetype: directory
  - id: jupyter-lab-binary
    file: ${HOME}/.pixi/envs/default/bin/jupyter-lab
    exists: true
  - id: jupyter-service
    scope: deploy
    service: jupyter
    running: true
  - id: jupyter-port
    scope: deploy
    addr: 127.0.0.1:${HOST_PORT:8888}
    reachable: true
    timeout: 5s
  # Service answers on its routed port at deploy time. The HOST_PORT
  # substitution means remapping in deploy.yml just works.
  - id: jupyter-api
    scope: deploy
    http: http://127.0.0.1:${HOST_PORT:8888}/api
    status: 200
    body:
      - contains: "version"
