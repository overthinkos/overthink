layer:
  name: k3s-server
  description: k3s control-plane (server) node — ships with ServiceLB, Traefik, local-path-provisioner enabled by default

  depends:
    - k3s

  # K3S_CLUSTER_TOKEN is the shared pre-shared token that authorizes
  # k3s-agent nodes to join this server. Must be set identically on the
  # server and every agent. Operator one-time setup:
  #   ov secrets set ov/secret/K3S_CLUSTER_TOKEN $(openssl rand -hex 32)
  # The resolver in ov/layer_secrets.go injects the value into the
  # server's setup task env BEFORE it writes /etc/rancher/k3s/config.yaml.
  secret_requires:
    - name: K3S_CLUSTER_TOKEN
      description: Pre-shared token used by k3s-agent nodes to join the cluster. Must match on server + every agent.

  # K3S_SERVER_HOSTNAME is the DNS name or IP by which the server is
  # reachable from the operator's machine AND from every agent. Goes into
  # tls-san: so the emitted kubeconfig server URL is valid.
  env_accepts:
    - name: K3S_SERVER_HOSTNAME
      description: Public hostname/IP of the k3s server (used for tls-san and kubeconfig rewrite). Defaults to the hostname seen by uname -n.

  # The kubeconfig ends up at /etc/rancher/k3s/k3s.yaml after k3s boots.
  # We publish it back to the operator via the new artifacts: mechanism
  # (ov/layer_artifacts.go), rewriting the server URL from 127.0.0.1 to
  # the reachable K3S_SERVER_HOSTNAME so the retrieved kubeconfig works
  # directly from the operator's machine. Mode 0600 because kubeconfig
  # contains the cluster admin cert + key.
  artifacts:
    - name: kubeconfig
      path: /etc/rancher/k3s/k3s.yaml
      mode: "0600"
      rewrite:
        - find: "127.0.0.1"
          replace: "${K3S_SERVER_HOSTNAME}"
      retrieve_to: ~/.cache/ov/clusters/${deploy_name}/kubeconfig.yaml

  tasks:
    # 1. Render the k3s server config. write-kubeconfig-mode 0644 allows
    # the unprivileged deploy user to scp the kubeconfig back in the
    # artifact-retrieval step. disable:[] is explicit — ServiceLB,
    # Traefik, and local-path-provisioner must all install as default
    # addons; if an operator needs to disable them they should override
    # this layer, not monkey-patch the config.
    - cmd: |
        set -euo pipefail
        mkdir -p /etc/rancher/k3s
        cat >/etc/rancher/k3s/config.yaml <<YAML
        write-kubeconfig-mode: "0644"
        token: "${K3S_CLUSTER_TOKEN}"
        tls-san:
          - "${K3S_SERVER_HOSTNAME:-$(uname -n)}"
        disable: []
        YAML
        chmod 0600 /etc/rancher/k3s/config.yaml
      user: root
      # K3S_CLUSTER_TOKEN comes from ResolveLayerSecrets via
      # InjectSecretsIntoPlans (deploy_add_cmd.go) — do NOT declare it
      # here or the "layer env takes precedence" rule would block the
      # injection. K3S_SERVER_HOSTNAME is a plain env from deploy.yml.

    # 2. Emit the systemd unit directly. We could declare this via the
    # layer's `service:` block with `exec:` form, but the ov service
    # renderer (ov/service_render.go) currently only runs on container
    # OCI builds (generate.go) — not on host/VM deploys where the install
    # plan executes directly. Until service rendering lands in those
    # paths, the robust cross-substrate approach is a hand-written unit.
    - cmd: |
        set -euo pipefail
        cat >/etc/systemd/system/k3s.service <<'UNIT'
        [Unit]
        Description=Lightweight Kubernetes (server)
        Documentation=https://k3s.io
        Wants=network-online.target
        After=network-online.target

        [Service]
        Type=notify
        ExecStart=/usr/local/bin/k3s server
        KillMode=process
        Delegate=yes
        LimitNOFILE=1048576
        LimitNPROC=infinity
        LimitCORE=infinity
        TasksMax=infinity
        TimeoutStartSec=0
        Restart=always
        RestartSec=5s

        [Install]
        WantedBy=multi-user.target
        UNIT
        systemctl daemon-reload
        systemctl enable --now k3s.service
      user: root

  tests:
    # Build-scope tests: emitted config files exist and are sane. Run
    # during `ov image test` — verifies the layer's setup did its job
    # before we start it.
    - id: k3s-config-file
      scope: build
      file: /etc/rancher/k3s/config.yaml
      exists: true
      mode: "0600"

    # The systemd unit itself is generated by ov from the service: block
    # above, so there is no build-scope file check for it — the service
    # running at deploy time (next tests) is the real invariant.

    # Deploy-scope tests: hit the running cluster via the new ov test k8s
    # verb. These run during `ov deploy add vm:k3s-srv` after the k3s
    # service reaches Active and kubeconfig artifact retrieval has
    # written ~/.cache/ov/clusters/<deploy>/kubeconfig.yaml (the cluster
    # flag value that ClusterProfile resolution uses).
    - id: cluster-nodes-ready
      scope: deploy
      k8s: wait-nodes
      cluster: "${deploy_name}"
      k8s_count: 1
      timeout: 180s
      stdout:
        contains: "Ready"

    - id: traefik-ingressclass-default
      scope: deploy
      k8s: ingressclass
      cluster: "${deploy_name}"
      stdout:
        contains: "traefik"

    - id: local-path-storageclass-default
      scope: deploy
      k8s: storageclass
      cluster: "${deploy_name}"
      stdout:
        contains: "local-path"

    - id: addons-healthy
      scope: deploy
      k8s: addons
      cluster: "${deploy_name}"
      timeout: 240s
      exit_status: 0
