layer:
  name: k3s
  description: k3s binary installer (common base for k3s-server and k3s-agent)

  # Runtime packages k3s needs (R9: every runtime dep must be installed via
  # the distro package manager, never a manual curl). conntrack and iptables
  # are required by k3s's networking stack; socat is used by `kubectl port-
  # forward`; ethtool is used by k3s's cloud-controller-manager; ca-certs
  # are required for the binary to validate registry TLS.
  rpm:
    packages:
      - ca-certificates
      - conntrack-tools
      - ethtool
      - iptables
      - socat

  pac:
    packages:
      - ca-certificates
      - conntrack-tools
      - ethtool
      - iptables-nft
      - socat

  deb:
    packages:
      - ca-certificates
      - conntrack
      - ethtool
      - iptables
      - socat

  tasks:
    # Download the k3s binary. Version pinned in-line in the script below
    # — updating it is a deliberate authoring change, not an implicit
    # "latest". The k3s project publishes SHA256 sums next to each binary
    # at the GitHub release; we download both and verify before
    # installing, per R1 (no silent failures on an integrity check).
    # Binary lands at /usr/local/bin/k3s so the k3s-server and k3s-agent
    # layers can emit systemd units pointing at an absolute path.
    - cmd: |
        set -euo pipefail
        # Pinned version — update when cutting over.
        K3S_VERSION="v1.31.11+k3s1"
        K3S_VERSION_URL="v1.31.11%2Bk3s1"
        MACHINE="$(uname -m)"
        case "${MACHINE}" in
          x86_64) BIN_SUFFIX=""; SHA_SUFFIX="amd64";;
          aarch64) BIN_SUFFIX="-arm64"; SHA_SUFFIX="arm64";;
          *) echo "unsupported arch: ${MACHINE}" >&2; exit 1;;
        esac
        BASE="https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION_URL}"
        TMPDIR="$(mktemp -d)"
        trap 'rm -rf "${TMPDIR}"' EXIT
        curl -fsSL --retry 3 "${BASE}/k3s${BIN_SUFFIX}" -o "${TMPDIR}/k3s"
        curl -fsSL --retry 3 "${BASE}/sha256sum-${SHA_SUFFIX}.txt" -o "${TMPDIR}/sha256.txt"
        EXPECTED_SHA="$(awk -v b="k3s${BIN_SUFFIX}" '$2==b{print $1}' "${TMPDIR}/sha256.txt")"
        if [ -z "${EXPECTED_SHA}" ]; then
          echo "could not find sha256 for k3s${BIN_SUFFIX} in release checksum file" >&2
          exit 1
        fi
        ACTUAL_SHA="$(sha256sum "${TMPDIR}/k3s" | awk '{print $1}')"
        if [ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]; then
          echo "sha256 mismatch: got ${ACTUAL_SHA}, want ${EXPECTED_SHA}" >&2
          exit 1
        fi
        install -D -m 0755 -o root -g root "${TMPDIR}/k3s" /usr/local/bin/k3s
        # Symlinks for kubectl / crictl / ctr — k3s is multi-call and
        # dispatches on argv[0].
        ln -sf /usr/local/bin/k3s /usr/local/bin/kubectl
        ln -sf /usr/local/bin/k3s /usr/local/bin/crictl
        ln -sf /usr/local/bin/k3s /usr/local/bin/ctr
      user: root

  tests:
    - id: k3s-binary
      file: /usr/local/bin/k3s
      exists: true
    - id: k3s-binary-mode
      file: /usr/local/bin/k3s
      mode: "0755"
    - id: k3s-version
      command: /usr/local/bin/k3s --version
      exit_status: 0
      stdout:
        contains: "k3s version v1."
    - id: kubectl-symlink
      file: /usr/local/bin/kubectl
      exists: true
      filetype: symlink
    - id: conntrack-installed
      package: conntrack-tools
      installed: true
      package_map:
        debian: conntrack
        ubuntu: conntrack
    - id: iptables-installed
      package: iptables
      installed: true
      package_map:
        archlinux: iptables-nft
