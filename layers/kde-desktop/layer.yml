layer:
    version: 2026.149.1210
    name: kde-desktop
    description: |
        KDE Plasma desktop for a graphical workstation (host or VM guest with a
        real GPU). `plasma-desktop` is the dependency-pulling top package — it
        drags in the full plasma-workspace / kwin / kf6 / qt6 stack as deps, so
        we name it (plus a curated app set the CachyOS KDE-Desktop netinstall
        ships) rather than enumerating leaves or installing the giant
        `kde-applications` group. SDDM is the display manager; the layer sets the
        systemd default to graphical.target so a real GPU output lights up a KDE
        login. Wayland-native (kwin_wayland); xorg-xwayland is included for X11
        apps. CachyOS theming/settings live in the separate cachyos-kde-settings
        layer; audio in pipewire; fonts in desktop-fonts.

        Only meaningful on a systemd target with a real display (bare host / VM
        guest with GPU). On supervisord-init containers the sddm use_packaged
        entry is skipped (warn) by design.
    require:
        - dbus
        - pipewire
    distro:
        arch:
            package:
                # Dependency-pulling top package: plasma-desktop pulls
                # plasma-workspace + kwin + kf6 + qt6 + breeze as deps.
                - plasma-desktop
                - sddm
                - xorg-xwayland
                # Plasma session components the CachyOS KDE-Desktop netinstall ships.
                - plasma-pa
                - plasma-nm
                - plasma-systemmonitor
                - plasma-browser-integration
                - plasma-firewall
                - plasma-thunderbolt
                - powerdevil
                - kscreen
                - kde-gtk-config
                - kdeplasma-addons
                - kwallet-pam
                - kwalletmanager
                - bluedevil
                - breeze-gtk
                - kinfocenter
                - xsettingsd
                # Curated KDE applications (the netinstall KDE-Desktop set).
                - ark
                - dolphin
                - konsole
                - kate
                - kcalc
                - gwenview
                - spectacle
                - filelight
                - partitionmanager
                - kdeconnect
                - kdialog
                - kio-admin
                - kdegraphics-thumbnailers
                - ffmpegthumbs
                - phonon-qt6-vlc
                - haruna
    task:
        # A graphical workstation boots into the display manager. On a fresh
        # systemd guest the default is often multi-user.target; flip it so SDDM
        # starts a KDE login on the real GPU output. Tolerant of an image-build
        # chroot (no running systemd).
        - cmd: |
            systemctl set-default graphical.target || true
          user: root
    service:
        - name: sddm
          use_packaged: sddm.service
          enable: true
          scope: system
    eval:
        - id: plasma-desktop-installed
          package: plasma-desktop
          installed: true
        - id: plasmashell-binary
          file: /usr/bin/plasmashell
          exists: true
        - id: kwin-wayland-binary
          file: /usr/bin/kwin_wayland
          exists: true
        - id: sddm-binary
          file: /usr/bin/sddm
          exists: true
        - id: dolphin-binary
          file: /usr/bin/dolphin
          exists: true
        - id: konsole-binary
          file: /usr/bin/konsole
          exists: true
        - id: sddm-enabled
          scope: deploy
          service: sddm
          enabled: true
        - id: graphical-target-default
          scope: deploy
          command: systemctl get-default
          exit_status: 0
          stdout:
            - matches: "graphical.target"
