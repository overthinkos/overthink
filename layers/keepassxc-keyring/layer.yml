layer:
  name: keepassxc-keyring
  description: |
    Configure KeePassXC as the freedesktop.org Secret Service provider on a
    target:local host:
      * Enable the FdoSecrets plugin in keepassxc.ini.
      * Autostart KeePassXC on session login.
      * Disable competing Secret Service daemons (gnome-keyring + kwallet)
        at the per-user XDG-autostart and systemd-user-unit layers — fully
        reversible, never touches the system package.
      * Install the runtime packages (pinentry, libsecret) the
        .secrets + direnv + GPG + KeePassXC chain depends on.
      * Install generic direnv shell hooks for bash, zsh, and fish so .envrc
        activates on `cd` regardless of the user's chosen shell.

    Marking a specific .kdbx group as "Secret Service exposed" is per-database
    state INSIDE the kdbx file — that is a one-time GUI step when the user
    first opens their database; this layer cannot do it.
  require:
    - keepassxc
    - gnupg
    - direnv
  distro:
    arch:
      package:
        - pinentry
        - libsecret
    debian:
      package:
        - pinentry-qt
        - libsecret-tools
    fedora:
      package:
        - pinentry-qt
        - libsecret
    ubuntu:
      package:
        - pinentry-qt
        - libsecret-tools
  # Shell-init exports for KeePassXC-as-Secret-Service-provider. Mirrors
  # what ~/.config/environment.d/ssh-agent.conf already provides for
  # systemd-bootstrapped sessions; this block covers shells that aren't
  # spawned via pam_systemd (tmux from a screen-locked session, ssh-in
  # shells without graphical login, container-spawned shells, scripts).
  # The two paths coexist with no conflict — environment.d wins when
  # systemd is in the loop, the shell-rc lines fill the gap otherwise.
  shell:
    init: |
      # KeePassXC as freedesktop.org Secret Service + ssh-agent host:
      # point SSH_AUTH_SOCK at the systemd-user ssh-agent socket
      # KeePassXC integrates with as a client (no socket of its own).
      if [ -z "${SSH_AUTH_SOCK:-}" ] && [ -S "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/ssh-agent.socket" ]; then
        export SSH_AUTH_SOCK="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/ssh-agent.socket"
      fi
      # GPG_TTY for the pinentry-qt → libsecret → KeePassXC chain when
      # gpg-agent falls back to TTY mode.
      export GPG_TTY="$(tty 2>/dev/null || echo /dev/tty)"
    fish:
      init: |
        # KeePassXC ssh-agent socket (fish syntax — set/test idiom).
        if test -z "$SSH_AUTH_SOCK"
            set -l _kpx_sock "$XDG_RUNTIME_DIR/ssh-agent.socket"
            if test -z "$XDG_RUNTIME_DIR"
                set _kpx_sock "/run/user/"(id -u)"/ssh-agent.socket"
            end
            if test -S "$_kpx_sock"
                set -gx SSH_AUTH_SOCK "$_kpx_sock"
            end
        end
        set -gx GPG_TTY (tty 2>/dev/null; or echo /dev/tty)
  task:
    - mkdir: "${HOME}/.config/keepassxc"
      user: "${USER}"
    # Merge our [FdoSecrets] + auto-open settings into keepassxc.ini WITHOUT
    # clobbering user state (specifically [General] LastOpenedDatabases that
    # KeePassXC writes itself). Python configparser preserves unknown keys.
    - cmd: |
        set -eu
        python3 - <<'PY'
        import configparser, os
        p = os.path.expanduser("~/.config/keepassxc/keepassxc.ini")
        cp = configparser.ConfigParser()
        cp.optionxform = str  # preserve key case
        if os.path.exists(p):
            cp.read(p)
        for section in ("FdoSecrets", "SSHAgent", "General", "GUI"):
            if section not in cp:
                cp[section] = {}
        cp["FdoSecrets"].update({
            "Enabled": "true",
            "ShowNotification": "true",
            "ConfirmAccessItem": "false",
            "UnlockBeforeSearch": "true",
        })
        cp["SSHAgent"].update({
            "Enabled": "true",
            "UseOpenSSH": "true",
        })
        cp["General"].update({
            "RememberLastDatabases": "true",
            "OpenPreviousDatabasesOnStartup": "true",
        })
        cp["GUI"].update({
            "MinimizeOnStartup": "false",
            "MinimizeOnClose": "false",
            "ShowTrayIcon": "true",
        })
        os.makedirs(os.path.dirname(p), exist_ok=True)
        with open(p, "w") as f:
            cp.write(f, space_around_delimiters=False)
        PY
      user: "${USER}"
      comment: Merge KeePassXC FdoSecrets + auto-open + tray-friendly settings (preserves user state like LastOpenedDatabases)
    - mkdir: "${HOME}/.config/autostart"
      user: "${USER}"
    - write: "${HOME}/.config/autostart/keepassxc.desktop"
      mode: "0644"
      user: "${USER}"
      content: |
        [Desktop Entry]
        Type=Application
        Name=KeePassXC
        Exec=keepassxc
        Icon=keepassxc
        Terminal=false
        X-GNOME-Autostart-enabled=true
        Hidden=false
        NoDisplay=false
    - cmd: |
        set -eu
        autostart_dir="${HOME}/.config/autostart"
        mkdir -p "$autostart_dir"
        for name in \
            gnome-keyring-secrets \
            gnome-keyring-ssh \
            gnome-keyring-pkcs11 \
            org.kde.kwalletd6 \
            org.kde.kwalletd5 \
            kwalletd \
            kwalletd5 \
            kwalletd6 \
            pam_kwallet_init \
            ksecretd ; do
          src="/etc/xdg/autostart/${name}.desktop"
          dst="${autostart_dir}/${name}.desktop"
          if [ -f "$src" ]; then
            cp "$src" "$dst"
          else
            cat > "$dst" <<EOF
        [Desktop Entry]
        Type=Application
        Name=${name} (disabled by ov keepassxc-keyring)
        Exec=/bin/true
        Hidden=true
        NoDisplay=true
        EOF
          fi
          if grep -q '^Hidden=' "$dst"; then
            sed -i 's/^Hidden=.*/Hidden=true/' "$dst"
          else
            printf 'Hidden=true\n' >> "$dst"
          fi
          if grep -q '^X-GNOME-Autostart-enabled=' "$dst"; then
            sed -i 's/^X-GNOME-Autostart-enabled=.*/X-GNOME-Autostart-enabled=false/' "$dst"
          else
            printf 'X-GNOME-Autostart-enabled=false\n' >> "$dst"
          fi
        done
      user: "${USER}"
      comment: Override system XDG autostart for known Secret Service competitors
    - cmd: |
        set -eu
        for unit in \
            gnome-keyring-daemon.socket \
            gnome-keyring-daemon.service \
            kwalletd6.service \
            kwalletd5.service \
            org.kde.kwalletd6.service \
            org.kde.kwalletd5.service \
            plasma-kwallet-pam.service \
            ksecretd.service ; do
          if systemctl --user is-enabled "$unit" >/dev/null 2>&1; then
            systemctl --user disable --now "$unit" >/dev/null 2>&1 || true
          fi
          if systemctl --user is-active "$unit" >/dev/null 2>&1; then
            systemctl --user stop "$unit" >/dev/null 2>&1 || true
          fi
        done
        # Stop any currently-running competitor processes — they hold
        # `org.freedesktop.secrets` until killed, blocking KeePassXC from
        # claiming the bus name. PAM relaunches them at next session, but
        # the autostart override above (`pam_kwallet_init`) prevents that.
        for proc in ksecretd kwalletd6 kwalletd5 gnome-keyring-daemon ; do
          pkill -x "$proc" >/dev/null 2>&1 || true
        done
      user: "${USER}"
      comment: Disable systemd --user units + kill running competitor processes for the current session
    # Direnv shell hooks now live in the direnv layer's `shell:` block
    # (post-2026-05 cutover). keepassxc-keyring depends on direnv via
    # `requires:`, so the hook lands automatically.
    # gpg-agent.conf: pinentry-qt + 8h cache. Mirrors what `ov secrets gpg
    # setup` step 2 writes. Independent of whether the user has a GPG key
    # yet — once they import or generate one, this config is in place.
    - mkdir: "${HOME}/.gnupg"
      mode: "0700"
      user: "${USER}"
    - write: "${HOME}/.gnupg/gpg-agent.conf"
      mode: "0600"
      user: "${USER}"
      content: |
        # Managed by ov keepassxc-keyring layer.
        pinentry-program /usr/bin/pinentry-qt
        default-cache-ttl 28800
        max-cache-ttl 43200
        allow-preset-passphrase
    - cmd: |
        set -eu
        systemctl --user enable --now gpg-agent.socket gpg-agent-extra.socket >/dev/null 2>&1 || true
        gpg-connect-agent reloadagent /bye >/dev/null 2>&1 || true
      user: "${USER}"
      comment: Enable gpg-agent socket + reload to pick up the new gpg-agent.conf
    # SSH agent: KeePassXC is a CLIENT to an existing OpenSSH-compatible
    # agent (per upstream docs:
    # https://github.com/keepassxreboot/keepassxc/blob/develop/docs/topics/SSHAgent.adoc).
    # Enable the systemd-user ssh-agent.service so a socket is always
    # available at $XDG_RUNTIME_DIR/ssh-agent.socket. KeePassXC adds keys
    # marked "Add to agent" into THAT agent — no socket of its own.
    - cmd: |
        set -eu
        systemctl --user enable --now ssh-agent.service >/dev/null 2>&1 || true
      user: "${USER}"
      comment: Enable ssh-agent.service (KeePassXC integrates AS A CLIENT to it)
    # Export SSH_AUTH_SOCK to the user-session env via systemd-user
    # environment.d. This propagates to all child processes started by
    # systemd-user (including keepassxc.service AND PAM-spawned shells),
    # so KeePassXC + ssh + git all see the same socket without per-shell
    # rc fiddling. Sshd-forwarded sessions override SSH_AUTH_SOCK with
    # their forwarded socket — that takes precedence (correct behavior).
    - mkdir: "${HOME}/.config/environment.d"
      user: "${USER}"
    - write: "${HOME}/.config/environment.d/ssh-agent.conf"
      mode: "0644"
      user: "${USER}"
      content: |
        # Managed by ov keepassxc-keyring layer.
        # Point session SSH_AUTH_SOCK at the systemd-user ssh-agent socket.
        SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket
    # Cleanup: an earlier version of this layer wrote shell-rc hooks
    # pointing at a nonexistent ${XDG_RUNTIME_DIR}/keepassxc/ssh-agent.socket
    # path (KeePassXC does NOT create such a socket — it uses ssh-agent's).
    # Strip those obsolete fenced blocks if present. Idempotent — does
    # nothing on installs that never had them.
    - cmd: |
        set -eu
        for rc in "${HOME}/.bashrc" "${HOME}/.zshrc"; do
          if [ -f "$rc" ] && grep -qF '# overthink:begin ssh-auth-sock' "$rc"; then
            sed -i '/# overthink:begin ssh-auth-sock/,/# overthink:end ssh-auth-sock/d' "$rc"
          fi
        done
        rm -f "${HOME}/.config/fish/conf.d/ssh-auth-sock.fish"
      user: "${USER}"
      comment: Strip obsolete ssh-auth-sock shell-rc hooks (replaced by environment.d)
    # Cleanup: pre-2026-05 versions of this layer wrote direnv-hook
    # fenced blocks via inline cmd: heredoc. The 2026-05 cutover moved
    # direnv hook installation to the direnv layer's `shell:` schema
    # (new fence marker = `direnv`, old marker = `direnv-hook`). On
    # hosts that had a prior deploy of the legacy version, strip the
    # orphaned `direnv-hook` blocks so they don't shadow the new
    # `direnv` blocks. Idempotent — does nothing on hosts that never
    # had the legacy version, AND does nothing on a second run after
    # cleanup. Targets the bash/zsh fenced blocks AND the legacy fish
    # `~/.config/fish/conf.d/direnv.fish` (the new path is
    # `ov-direnv.fish` written by the direnv layer's shell: emitter).
    - cmd: |
        set -eu
        for rc in "${HOME}/.bashrc" "${HOME}/.zshrc"; do
          if [ -f "$rc" ] && grep -qF '# overthink:begin direnv-hook' "$rc"; then
            sed -i '/# overthink:begin direnv-hook/,/# overthink:end direnv-hook/d' "$rc"
          fi
        done
        # Legacy fish drop-in path (no ov- prefix) — DELETED in the
        # cutover; the direnv layer's shell: schema writes to
        # ~/.config/fish/conf.d/ov-direnv.fish instead.
        legacy_fish="${HOME}/.config/fish/conf.d/direnv.fish"
        if [ -f "$legacy_fish" ] && grep -qF '# overthink:begin direnv-hook' "$legacy_fish"; then
          rm -f "$legacy_fish"
        fi
      user: "${USER}"
      comment: "Strip pre-2026-05 direnv-hook shell-rc hooks (now provided by direnv layer's shell: schema)"
    # systemd user service for KeePassXC: more robust auto-launch than the
    # XDG autostart entry alone — adds Restart=on-failure, journalctl logs,
    # and explicit dependency on graphical-session.target. KeePassXC
    # enforces single-instance via D-Bus, so the .desktop autostart entry
    # AND this service can both fire safely; the second-launch attempt
    # focuses the existing window instead of double-running.
    - mkdir: "${HOME}/.config/systemd/user"
      user: "${USER}"
    - write: "${HOME}/.config/systemd/user/keepassxc.service"
      mode: "0644"
      user: "${USER}"
      content: |
        [Unit]
        Description=KeePassXC Password Manager (managed by ov keepassxc-keyring)
        After=graphical-session.target
        PartOf=graphical-session.target

        [Service]
        Type=simple
        ExecStart=/usr/bin/keepassxc
        Restart=on-failure
        RestartSec=5

        [Install]
        WantedBy=graphical-session.target
    - cmd: |
        set -eu
        systemctl --user daemon-reload
        systemctl --user enable keepassxc.service >/dev/null 2>&1 || true
      user: "${USER}"
      comment: Reload systemd --user + enable keepassxc.service
    # Best-effort: launch KeePassXC in the CURRENT graphical session via
    # systemd --user so the user doesn't have to logout/login to test.
    # Inherits DISPLAY/WAYLAND_DISPLAY from the systemd --user instance.
    # If no graphical session is up (TTY-only deploy, no display server),
    # this no-ops cleanly; the autostart .desktop fires at next login.
    - cmd: |
        set -eu
        if pgrep -x keepassxc >/dev/null 2>&1; then
          exit 0
        fi
        if systemctl --user --quiet is-active graphical-session.target 2>/dev/null \
           || [ -n "${WAYLAND_DISPLAY:-}" ] || [ -n "${DISPLAY:-}" ] \
           || [ -S "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/wayland-0" ]; then
          systemd-run --user --quiet --no-block \
            --unit=keepassxc-keyring-launch \
            /usr/bin/keepassxc >/dev/null 2>&1 || true
        fi
      user: "${USER}"
      comment: Best-effort start KeePassXC in the current session (no-op if no display)
  eval:
    - id: keepassxc-binary
      command: test -x /usr/bin/keepassxc
      exit_status: 0
    - id: pinentry-qt-installed
      command: command -v pinentry-qt || command -v pinentry-qt5 || command -v pinentry-qt6
      exit_status: 0
    - id: secret-tool-installed
      command: command -v secret-tool
      exit_status: 0
    - id: keepassxc-ini-fdosecrets
      command: grep -q '^Enabled=true' ${HOME}/.config/keepassxc/keepassxc.ini
      scope: deploy
      exit_status: 0
    - id: keepassxc-ini-auto-open
      command: grep -q '^OpenPreviousDatabasesOnStartup=true' ${HOME}/.config/keepassxc/keepassxc.ini
      scope: deploy
      exit_status: 0
    - id: keepassxc-autostart
      command: test -r ${HOME}/.config/autostart/keepassxc.desktop
      scope: deploy
      exit_status: 0
    - id: gpg-agent-conf-installed
      command: grep -q '^pinentry-program /usr/bin/pinentry-qt' ${HOME}/.gnupg/gpg-agent.conf
      scope: deploy
      exit_status: 0
    - id: gpg-agent-socket-active
      command: systemctl --user is-active gpg-agent.socket
      scope: deploy
      exit_status: 0
    - id: ssh-agent-ini-enabled
      command: |
        python3 -c "import configparser,os; cp=configparser.ConfigParser(); cp.optionxform=str; cp.read(os.path.expanduser('~/.config/keepassxc/keepassxc.ini')); exit(0 if cp.get('SSHAgent','Enabled',fallback='false')=='true' else 1)"
      scope: deploy
      exit_status: 0
    - id: keepassxc-systemd-unit-enabled
      command: systemctl --user is-enabled keepassxc.service
      scope: deploy
      exit_status: 0
    - id: ssh-agent-service-active
      command: systemctl --user is-active ssh-agent.service
      scope: deploy
      exit_status: 0
    - id: environment-d-ssh-auth-sock
      command: grep -q '^SSH_AUTH_SOCK=' ${HOME}/.config/environment.d/ssh-agent.conf
      scope: deploy
      exit_status: 0
    - id: gnome-keyring-secrets-disabled
      command: |
        f=${HOME}/.config/autostart/gnome-keyring-secrets.desktop
        ! test -f "$f" || grep -q '^Hidden=true' "$f"
      scope: deploy
      exit_status: 0
    - id: direnv-fish-hook
      command: grep -q 'direnv hook fish' ${HOME}/.config/fish/conf.d/direnv.fish
      scope: deploy
      exit_status: 0
    - id: direnv-bash-hook
      command: grep -q 'direnv hook bash' ${HOME}/.bashrc
      scope: deploy
      exit_status: 0
