layer:
  name: language-runtimes
  require:
    - nodejs
    - rust
  distro:
    arch:
      package:
        - dotnet-sdk
        - go
        - icu
        - php
        - python
    debian:
      package:
        - golang-go
        - libicu-dev
        - php-cli
        - python3-dev
    debian-13:
      package:
        - golang-go
        - libicu-dev
        - php-cli
        - python3-dev
    fedora:
      package:
        - dotnet-sdk-9.0
        - golang-bin
        - golang-bazil-fuse-devel
        - libicu
        - php
        - python3-devel
        - python3-ramalama
        - nodejs-devel
    ubuntu:
      package:
        - golang-go
        - libicu-dev
        - php-cli
        - python3-dev
    ubuntu-24.04:
      package:
        - golang-go
        - libicu-dev
        - php-cli
        - python3-dev
  task:
    # dotnet-sdk-9.0 installer — distro-agnostic gate.
    #
    # No-op on Fedora/Arch — their rpm:/pac: blocks already installed
    # dotnet-sdk-9.0 via distro repos.
    #
    # On Debian/Ubuntu, neither Canonical's archive nor Microsoft's apt repo
    # reliably ship dotnet-sdk-9.0 (verified 2026-04: Canonical noble ships
    # 8.0 and 10.0 only; Microsoft's noble apt repo ships only 10.0; Debian
    # 13 via Microsoft's repo does have 9.0, but relying on that cross-distro
    # asymmetry invites future drift). Microsoft's official dotnet-install.sh
    # downloads a specific channel's tarball to an arbitrary prefix — the
    # canonical cross-distro install method. We install to /usr/share/dotnet
    # and symlink into /usr/bin so the standard test probes /usr/bin/dotnet
    # successfully.
    #
    # The outer `command -v dotnet` guard makes the task idempotent across
    # tag-only rebuilds and skips Fedora/Arch where the package installed
    # dotnet already.
    - cmd: |
        if command -v dotnet >/dev/null 2>&1; then
          exit 0
        fi
        if ! command -v apt-get >/dev/null 2>&1; then
          # Not a Debian-family distro — defer to the distro's declarative
          # package section (or accept it's intentionally unavailable).
          exit 0
        fi
        # Microsoft's dotnet-install.sh needs libicu at runtime but doesn't
        # bring transitive dependencies. libicu-dev is already installed by
        # this layer's deb: section.
        install -d /usr/share/dotnet
        curl -fsSL https://builds.dotnet.microsoft.com/dotnet/scripts/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        chmod +x /tmp/dotnet-install.sh
        /tmp/dotnet-install.sh --channel 9.0 --install-dir /usr/share/dotnet
        ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
        rm -f /tmp/dotnet-install.sh
      user: root
  eval:
    - id: dotnet-binary
      file: /usr/bin/dotnet
      exists: true
    - id: dotnet-version
      command: /usr/bin/dotnet --version
      exit_status: 0
    - id: php-binary
      file: /usr/bin/php
      exists: true
    - id: php-version
      command: /usr/bin/php --version
      exit_status: 0
    - id: system-python3
      file: /usr/bin/python3
      exists: true
    - id: system-python3-version
      command: /usr/bin/python3 --version
      exit_status: 0
