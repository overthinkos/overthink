layer:
    version: 2026.150.2158
    name: looking-glass-host
    description: |
        Looking Glass GUEST side for a GPU-passthrough VM: the Linux "host"
        capture app (looking-glass-host-git — pushes the guest framebuffer into
        the IVSHMEM device) + the kvmfr kernel module (exposes the libvirt
        <shmem name='looking-glass'> PCI device as /dev/kvmfr0) so the operator's
        CachyOS host can view the SAME KDE session in looking-glass-client with
        near-zero latency. (The client is operator-side, installed on the host,
        not in this layer.)

        Requires the libvirt domain to carry an IVSHMEM <shmem> device + a dummy
        <video> scanout (declared on the cachyos-gpu vm entity) so the GPU has
        a framebuffer to capture with no physical monitor attached.

        kvmfr is a DKMS module → pulls the matching linux-cachyos-headers + dkms;
        built in-guest at deploy time against the running cachyos kernel. The
        kvmfr + IVSHMEM wiring is session-independent and in place — capture is
        the catch: this Arch build compiles only XCB (needs an X11 root window)
        and PipeWire (needs a headless ScreenCast-portal grant KDE does not give
        unattended). ov runs Wayland-only sessions, so NEITHER backend can
        capture headlessly, and the ov-lg-host-or-skip wrapper makes the service
        SKIP cleanly (exit 0) instead of crash-looping into a failed unit. The
        host binary + kvmfr/IVSHMEM stay wired for the operator-side
        looking-glass-client and a future headless-Wayland capture backend. Only
        meaningful on a VM guest with the GPU + IVSHMEM.
    require:
        - build-toolchain
        - yay
    distro:
        arch:
            package:
                # kvmfr DKMS needs headers matching the guest cachyos kernel.
                - linux-cachyos-headers
                - dkms
            aur:
                package:
                    - looking-glass-host-git
                    - looking-glass-module-dkms-git
    task:
        # Graceful-skip wrapper for the looking-glass-host service (see the
        # service: block) — copied first so the service exec path exists.
        - copy: ov-lg-host-or-skip
          to: /usr/local/bin/ov-lg-host-or-skip
          mode: "0755"
          user: root
        # Load kvmfr at boot. On a libvirt VM guest the <shmem> ivshmem PCI
        # device IS the shared Looking Glass region; kvmfr auto-binds to it as
        # /dev/kvmfr0 with NO module options. We deliberately do NOT set
        # static_size_mb: a static region creates a SEPARATE guest-local
        # /dev/kvmfr0 that shadows the shared PCI BAR, so the host-side
        # looking-glass-client never sees the guest's frames (CHANGELOG:
        # static-shadow RCA). The <shmem> size lives on the vm entity (>=128 MiB).
        - write: /etc/modprobe.d/ov-kvmfr.conf
          user: root
          mode: "0644"
          content: |
            # kvmfr auto-binds to the ivshmem PCI device as /dev/kvmfr0.
            # Do NOT add `options kvmfr static_size_mb=...`: a static region
            # shadows the shared PCI BAR and breaks guest->host frame flow.
        - write: /etc/modules-load.d/ov-kvmfr.conf
          user: root
          mode: "0644"
          content: |
            kvmfr
        # /dev/kvmfr0 readable/writable by the desktop user (kvm group).
        - write: /etc/udev/rules.d/99-ov-kvmfr.rules
          user: root
          mode: "0644"
          content: |
            SUBSYSTEM=="kvmfr", OWNER="root", GROUP="kvm", MODE="0660"
        - write: /etc/tmpfiles.d/ov-looking-glass.conf
          user: root
          mode: "0644"
          content: |
            # Fallback /dev/shm region perms when ivshmem-plain is used without kvmfr.
            f /dev/shm/looking-glass 0660 root kvm -
    service:
        # Capture the active KDE session and push frames to the IVSHMEM device.
        # User-scope + WantedBy=graphical-session.target: it must run INSIDE the
        # logged-in graphical session (PipeWire ScreenCast portal + Wayland
        # display access), so it is pulled WHEN the session starts — NOT at early
        # user-manager start (default.target), where the portal/display don't yet
        # exist and looking-glass-host fail-loops "No supported capture interface"
        # until it hits the start limit. Requires an auto-logged-in session
        # (SDDM autologin) so graphical-session.target actually activates headless.
        - name: looking-glass-host
          # Wrapped in ov-lg-host-or-skip: ov sessions are Wayland-only and
          # neither compiled capture backend works headlessly there (XCB needs
          # an X11 root, PipeWire stalls on the KDE ScreenCast portal). The
          # wrapper exits 0 cleanly so the unit records a clean "skipped" state
          # instead of crash-looping into a failed unit. restart: on-failure
          # (not always) so the clean skip does not loop.
          exec: /usr/local/bin/ov-lg-host-or-skip
          restart: on-failure
          scope: user
          enable: true
          after: [graphical-session.target]
          wanted_by: [graphical-session.target]
    eval:
        - id: kvmfr-modprobe-conf
          file: /etc/modprobe.d/ov-kvmfr.conf
          contains: "kvmfr"
        - id: looking-glass-host-binary
          file: /usr/bin/looking-glass-host
          exists: true
        - id: kvmfr-modules-load
          file: /etc/modules-load.d/ov-kvmfr.conf
          contains: "kvmfr"
