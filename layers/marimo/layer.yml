layer:
  name: marimo
  description: "marimo reactive notebook server (also runs as MCP server via --mcp), GPU-accelerated OSM analytics deps (Polars-GPU/cuDF, geopandas, quackosm), Apache Airflow Python deps (the airflow layer ships no pixi env), and the marimo-team/learn curriculum + marimo-team/skills bundle for AI agents."
  requires:
    - cuda
    - supervisord
  env:
    NVIDIA_PYTHON_PROJECT: "~/.pixi"
    LD_LIBRARY_PATH: "/usr/lib64"
    # Stable, well-known path for any AI agent (driving marimo via MCP) to
    # discover the marimo-team/skills bundle. Mirrors the Anthropic-style
    # SKILL.md discovery used by overthink's own plugins/<plugin>/skills/.
    MARIMO_SKILLS_DIR: "/opt/marimo-skills"
  distros:
    fedora:
      packages:
        - git           # required by the marimo-team/skills tarball extract validation step
        - gcc
        - gcc-c++
  ports:
    - 2718
  # marimo runs `--mcp --mcp-allow-remote` (see service exec below), which
  # exposes its editor tools as an MCP HTTP server on the SAME port that
  # serves the notebook UI. Marimo's docs put the endpoint at /mcp/server
  # (NOT /mcp — that's the convention for ov-mcp / jupyter-mcp / chrome-
  # devtools-mcp). The mcp_provides URL must reflect the actual path.
  mcp_provides:
    - name: marimo
      url: "http://{{.ContainerName}}:2718/mcp/server"
      transport: http
  volumes:
    - name: workspace
      path: "~/workspace"
  tasks:
    # User-phase data dir for notebooks (bind-mount target for the workspace volume).
    - mkdir: "${HOME}/workspace"
      user: "${USER}"

    # ---- marimo-team/skills bundle ----
    # Anthropic-style "skills folder" of instructions/scripts/resources that
    # AI agents (driving marimo over MCP) load dynamically to improve task
    # performance. Shipped read-only at /opt/marimo-skills/. The MARIMO_SKILLS_DIR
    # env var (above) points consumers at this path.
    - mkdir: /opt/marimo-skills
      user: root
    - download: "https://github.com/marimo-team/skills/archive/refs/heads/main.tar.gz"
      extract: tar.gz
      to: /opt/marimo-skills
      strip_components: 1
      user: root

    # ---- marimo client-side MCP config ----
    # Wires marimo's chat panel (which acts as an MCP CLIENT) to the in-pod
    # airflow-mcp server (which runs at localhost:19999/mcp from marimo's
    # POV because they share a container). The exact [mcp.servers.<name>]
    # schema isn't documented in the marimo MCP guide we read (only `presets =`
    # was shown), so R10 step 14 is the empirical confirmation; if the schema
    # is different we adjust based on the live error and re-run.
    - mkdir: "${HOME}/.config/marimo"
      user: "${USER}"
    - write: "${HOME}/.config/marimo/marimo.toml"
      mode: "0644"
      user: "${USER}"
      content: |
        # Auto-generated by ov layers/marimo/layer.yml at build time.
        # Configures marimo's editor as an MCP CLIENT consuming the
        # in-pod airflow-mcp server. localhost is correct because marimo
        # and airflow-mcp run in the SAME container (single-pod model).
        [mcp]
        presets = ["marimo"]

        [mcp.servers.airflow]
        url = "http://localhost:19999/mcp"
        transport = "http"

    # ---- Sample notebook for the OSM end-to-end demo ----
    # Bundled into the workspace at build time so a fresh `ov rebuild` of
    # marimo-ml-pod immediately surfaces the example without operator setup.
    # Demonstrates: Polars-GPU aggregation on the GeoParquet output of the
    # osm-monaco-pipeline DAG + MapLibre rendering of the resulting PMTiles
    # served by martin (port 3000 inside the pod).
    - write: "${HOME}/workspace/osm-monaco-viz.py"
      mode: "0644"
      user: "${USER}"
      content: |
        import marimo

        __generated_with = "0.16.0"
        app = marimo.App(width="medium")

        @app.cell
        def __():
            import polars as pl
            import folium
            return pl, folium

        @app.cell
        def __(pl):
            # Demonstrate Polars-GPU on the parquet output of the osm-monaco-pipeline DAG.
            # collect(engine="gpu") routes through cudf-polars-cu12; falls back to CPU
            # automatically if any operator isn't GPU-accelerated.
            df = (
                pl.scan_parquet("/tmp/osm-monaco/monaco.parquet")
                .group_by("tags")
                .agg(pl.len().alias("n"))
                .sort("n", descending=True)
                .head(20)
                .collect(engine="gpu")
            )
            return (df,)

        @app.cell
        def __(folium):
            # Render the Monaco PMTiles served by martin (in-pod localhost:3000).
            m = folium.Map(location=[43.7384, 7.4246], zoom_start=14, tiles=None)
            folium.TileLayer(
                tiles="http://localhost:3000/monaco/{z}/{x}/{y}",
                attr="OSM via QuackOSM + tippecanoe + martin",
                name="Monaco OSM",
            ).add_to(m)
            return (m,)

        if __name__ == "__main__":
            app.run()
  eval:
    # Build-scope smoke for the lean ML + curriculum + airflow union.
    # One import line per topic group catches resolver drift at image build,
    # not at first notebook open.
    - id: marimo-ml-curriculum-imports
      command: ${HOME}/.pixi/envs/default/bin/python -c "import marimo, torch, transformers, polars, scipy, altair, plotly, statsmodels, duckdb, sqlalchemy, sqlglot, cvxpy, clarabel, daft, wigglystuff, drawdata, marimo_learn, simpy"
      exit_status: 0
    - id: marimo-binary
      file: ${HOME}/.pixi/envs/default/bin/marimo
      exists: true
    - id: airflow-binary
      file: ${HOME}/.pixi/envs/default/bin/airflow
      exists: true
    # Build-scope: confirm the geospatial + MCP + GPU additions installed cleanly.
    # cudf-polars-cu13 is imported as cudf_polars; geoparquet-io as geoparquet_io.
    # mcp-server-apache-airflow is intentionally CLI-only (no clean Python
    # import); its presence is verified by the airflow-mcp-binary check in
    # the airflow layer instead.
    - id: marimo-ml-osm-mcp-imports
      command: ${HOME}/.pixi/envs/default/bin/python -c "import geopandas, shapely, fiona, pyproj, quackosm, geoparquet_io, pmtiles, h3, mercantile, folium, contextily, mapclassify, fastmcp, cudf_polars"
      exit_status: 0
    # Build-scope: marimo-team/skills bundle landed and is non-empty.
    - id: marimo-skills-installed
      file: /opt/marimo-skills/skills
      exists: true
      filetype: directory
    # Build-scope: client-side MCP config landed.
    - id: marimo-toml-installed
      file: ${HOME}/.config/marimo/marimo.toml
      exists: true
    # Build-scope: sample notebook landed (build-scope is OK because the
    # workspace volume isn't mounted yet, but the file lives directly in
    # the image at the same path the volume bind-mount targets).
    - id: marimo-osm-notebook-installed
      file: ${HOME}/workspace/osm-monaco-viz.py
      exists: true
    # Deploy-scope smoke — port reachable + HTTP 200 from marimo edit.
    - id: marimo-port-reachable
      scope: deploy
      addr: "127.0.0.1:${HOST_PORT:2718}"
      reachable: true
      timeout: 5s
    - id: marimo-http-up
      scope: deploy
      http: "http://127.0.0.1:${HOST_PORT:2718}/"
      status: 200
      timeout: 10s
    # Deploy-scope: marimo's --mcp server responds. The endpoint lives at
    # /mcp/server (per marimo docs) which is what mcp_provides above declares,
    # so `ov eval mcp ping marimo-ml --name marimo` resolves the URL correctly
    # via the host-port rewriter.
    - id: mcp-marimo-ping
      scope: deploy
      mcp: ping
      mcp_name: marimo
      timeout: 10s
    - id: mcp-marimo-list-tools
      scope: deploy
      mcp: list-tools
      mcp_name: marimo
      stdout:
        # marimo's MCP tool catalog isn't fully documented; just assert
        # that SOME marimo-flavored tool surfaces (the tool list contains
        # at least one line, and one of the standard editor tools is present).
        - matches: "."
  service:
    - name: marimo
      # `--mcp` enables the MCP HTTP server on the same port as the editor.
      # `--mcp-allow-remote` is mandatory because we bind 0.0.0.0 (the marimo
      # docs explicitly call this out — without it the MCP endpoint refuses
      # non-localhost requests, which means our host-port rewriter can't
      # reach it from 127.0.0.1:HOST_PORT). `--no-token` keeps the editor
      # itself token-free for the dev posture.
      exec: "%(ENV_HOME)s/.pixi/envs/default/bin/marimo edit --host 0.0.0.0 --port 2718 --no-token --headless --mcp --mcp-allow-remote %(ENV_HOME)s/workspace"
      restart: always
      working_directory: "%(ENV_HOME)s"
      priority: 30
      enable: true
      scope: system
