depends:
  - mutter
  - supervisord

rpm:
  packages:
    - gnome-terminal
    - nautilus

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - copy: mutter-app-wrapper
    to: "${HOME}/.local/bin/mutter-app-wrapper"
    mode: "0755"
    user: "${USER}"

service: |
  [program:gnome-terminal]
  command=%(ENV_HOME)s/.local/bin/mutter-app-wrapper gnome-terminal --wait
  autostart=true
  autorestart=false
  priority=16
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0",DBUS_SESSION_BUS_ADDRESS="unix:path=/tmp/dbus-session"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:nautilus]
  command=%(ENV_HOME)s/.local/bin/mutter-app-wrapper nautilus
  autostart=true
  autorestart=false
  priority=16
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0",DBUS_SESSION_BUS_ADDRESS="unix:path=/tmp/dbus-session"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
