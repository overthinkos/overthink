depends:
  - dbus
  - rust
  - build-toolchain

env:
  XDG_RUNTIME_DIR: "/tmp"
  WAYLAND_DISPLAY: "wayland-1"
  XDG_CURRENT_DESKTOP: "niri"
  EGL_LOG_LEVEL: "fatal"

rpm:
  options:
    - --allowerasing
  packages:
    # Runtime dependencies (mesa-libEGL, mesa-libgbm already in nvidia base)
    - xorg-x11-server-Xwayland
    - mesa-dri-drivers
    - mesa-vulkan-drivers
    - libglvnd-egl
    - libglvnd-gles
    - egl-wayland
    - wl-clipboard
    - fuzzel
    - mako
    - libwayland-server
    - libinput
    - libxkbcommon
    - pango
    - cairo-gobject
    - libdisplay-info
    - libseat
    - pipewire-libs
    # Build dependencies (cleaned up at end of root.yml)
    - clang-devel
    - libudev-devel
    - mesa-libgbm-devel.x86_64
    - libxkbcommon-devel
    - wayland-devel
    - libinput-devel
    - dbus-devel
    - systemd-devel
    - libseat-devel
    - pipewire-devel
    - pango-devel
    - cairo-gobject-devel
    - libdisplay-info-devel

vars:
  NIRI_BRANCH: feat/virtual

tasks:
  # Build niri from QaidVoid/niri feat/virtual branch (virtual output support).
  # Based on niri main + virtual output commits. Provides NIRI_BACKEND=headless
  # and `niri msg create-virtual-output`.
  - cmd: |
      git clone --depth 1 --branch ${NIRI_BRANCH} https://github.com/QaidVoid/niri.git /tmp/niri-src
      cd /tmp/niri-src
      cargo build --release
      install -m 755 target/release/niri /usr/local/bin/niri
      rm -rf /tmp/niri-src
    user: root

  # Clean up build dependencies to shrink the final image.
  - cmd: |
      dnf remove -y \
        clang-devel libudev-devel mesa-libgbm-devel libxkbcommon-devel \
        wayland-devel libinput-devel dbus-devel systemd-devel \
        libseat-devel pipewire-devel pango-devel cairo-gobject-devel \
        libdisplay-info-devel || true
      rm -rf /root/.cargo/registry /root/.cargo/git
    user: root

  # User-phase setup: wrapper + config.kdl
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - mkdir: "${HOME}/.config/niri"
    user: "${USER}"

  - copy: niri-wrapper
    to: "${HOME}/.local/bin/niri-wrapper"
    mode: "0755"
    user: "${USER}"
  - copy: config.kdl
    to: "${HOME}/.config/niri/config.kdl"
    mode: "0644"
    user: "${USER}"

service: |
  [program:niri]
  command=%(ENV_HOME)s/.local/bin/niri-wrapper
  autostart=true
  autorestart=true
  priority=10
  startsecs=3
  environment=XDG_RUNTIME_DIR="/tmp"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
