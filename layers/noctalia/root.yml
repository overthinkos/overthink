version: '3'

tasks:
  install:
    cmds:
      - |
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH=amd64;;
          *) echo "unsupported arch: $ARCH" >&2; exit 1;;
        esac
        curl -fsSL "https://github.com/sentriz/cliphist/releases/download/v0.7.0/v0.7.0-linux-${ARCH}" -o /usr/local/bin/cliphist
        chmod +x /usr/local/bin/cliphist
