# Enable title bars for desktop-like window management
default_border normal 2

# Title bar: middle-click to minimize (move to scratchpad)
bindsym --border button2 move scratchpad

# Super+Down = minimize, Super+Up = restore (GNOME/KDE convention)
bindsym Mod4+Down move scratchpad
bindsym Mod4+Up scratchpad show

# Safety net: hide any unexpected quickshell xdg_shell popups (e.g. privacy dialog)
# Noctalia bar uses layer-shell so this only catches stray FloatingWindow instances
for_window [app_id="org.quickshell"] move scratchpad
