version: '3'

tasks:
  install:
    cmds:
      - mkdir -p ~/.local/bin ~/.config/quickshell/noctalia-shell
      - curl -sL https://github.com/noctalia-dev/noctalia-shell/releases/latest/download/noctalia-latest.tar.gz | tar -xz --strip-components=1 -C ~/.config/quickshell/noctalia-shell
      - cp /ctx/noctalia-wrapper ~/.local/bin/noctalia-wrapper
      - chmod +x ~/.local/bin/noctalia-wrapper
      - mkdir -p ~/.config/noctalia
      - cp /ctx/settings.json ~/.config/noctalia/settings.json
      # Suppress privacy/telemetry dialog by pre-seeding changelog state
      - mkdir -p ~/.cache/noctalia
      - cp /ctx/shell-state.json ~/.cache/noctalia/shell-state.json
      # Sway drop-in: hide stray quickshell xdg_shell popups
      - mkdir -p ~/.config/sway/config.d
      - cp /ctx/sway.conf ~/.config/sway/config.d/noctalia.conf
