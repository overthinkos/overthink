env:
  NPM_CONFIG_PREFIX: "~/.npm-global"
  npm_config_cache: "~/.cache/npm"

path_append:
  - "~/.npm-global/bin"

rpm:
  packages:
    - nodejs
    - npm

deb:
  packages:
    - nodejs
    - npm

pac:
  packages:
    - nodejs
    - npm

tests:
  - id: node-binary
    file: /usr/bin/node
    exists: true
  - id: node-version
    command: /usr/bin/node --version
    exit_status: 0
  - id: npm-binary
    file: /usr/bin/npm
    exists: true
  - id: npm-version
    command: /usr/bin/npm --version
    exit_status: 0
