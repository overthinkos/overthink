layer:
    version: 2026.144.1443
    name: nodejs24
    require: []
    env:
        NPM_CONFIG_PREFIX: "~/.npm-global"
        npm_config_cache: "~/.cache/npm"
    path_append:
        - "~/.npm-global/bin"
    distro:
        fedora:
            package:
                - nodejs24
                - nodejs24-npm
    task:
        - link: /usr/local/bin/node
          target: /usr/bin/node-24
          user: root
        - link: /usr/local/bin/npm
          target: /usr/bin/npm-24
          user: root
        - link: /usr/local/bin/npx
          target: /usr/bin/npx-24
          user: root
    eval:
        - id: node24-binary
          file: /usr/local/bin/node
          exists: true
        - id: npm24-binary
          file: /usr/local/bin/npm
          exists: true
        - id: npx24-binary
          file: /usr/local/bin/npx
          exists: true
        - id: node24-version
          command: /usr/local/bin/node --version
          exit_status: 0
          stdout:
            - matches: "^v24\\."
        - id: nodejs24-package
          package: nodejs24
          installed: true
