depends:
  - cuda
  - supervisord

env:
  OLLAMA_HOST: "0.0.0.0"
  OLLAMA_MODELS: "~/.ollama/models"

env_provides:
  OLLAMA_HOST: "http://{{.ContainerName}}:11434"

ports:
  - 11434

volumes:
  - name: models
    path: "~/.ollama"

aliases:
  - name: ollama
    command: ollama

tasks:
  # Ollama binary release tarball (no systemd)
  - download: "https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst"
    extract: tar.zst
    to: /usr
    user: root

service: |
  [program:ollama]
  command=ollama serve
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0
