depends:
  - xorg-headless

rpm:
  packages:
    - openbox
    - xterm

service: |
  [program:openbox]
  command=%(ENV_HOME)s/.local/bin/openbox-wrapper
  autostart=true
  autorestart=true
  priority=12
  startsecs=1
  environment=DISPLAY=":0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
