depends:
  - xorg-headless

rpm:
  packages:
    - openbox
    - xterm

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - mkdir: "${HOME}/.config/openbox"
    user: "${USER}"
  - copy: openbox-wrapper
    to: "${HOME}/.local/bin/openbox-wrapper"
    mode: "0755"
    user: "${USER}"
  - copy: rc.xml
    to: "${HOME}/.config/openbox/rc.xml"
    mode: "0644"
    user: "${USER}"

service: |
  [program:openbox]
  command=%(ENV_HOME)s/.local/bin/openbox-wrapper
  autostart=true
  autorestart=true
  priority=12
  startsecs=1
  environment=DISPLAY=":0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
