description: Open WebUI with auto-configured LLM providers, MCP servers, and Jupyter

depends:
  - python
  - supervisord

env:
  DATA_DIR: "/opt/data"
  PORT: "8080"
  DOCKER: "true"
  ENABLE_DIRECT_CONNECTIONS: "true"
  ENABLE_CODE_EXECUTION: "true"
  ENABLE_PERSISTENT_CONFIG: "false"
  ENABLE_VERSION_UPDATE_CHECK: "false"

env_requires:
  - name: WEBUI_ADMIN_EMAIL
    description: "Admin account email (identifier, not a credential) — pass via: ov config openwebui -e WEBUI_ADMIN_EMAIL=you@example.com"

env_accepts:
  - name: OLLAMA_HOST
    description: "Local Ollama server URL (auto-injected by ollama layer env_provides)"
  - name: OPENAI_API_BASE_URL
    description: "OpenAI-compatible API base URL"
  - name: WEBUI_AUTH
    description: "Enable authentication (default: true)"
  - name: OV_MCP_SERVERS
    description: "JSON array of MCP servers (auto-injected by mcp_provides layers)"
  - name: IMMICH_API_URL
    description: "Immich HTTP API URL (auto-injected by immich layer env_provides)"

# Credential-store-backed env vars. Values live in the user's credential
# backend (keyring/kdbx/config) and are injected at runtime via podman
# secrets (Secret=<name>,type=env,target=<var>). Never land in deploy.yml
# or the quadlet file as plaintext. See /ov:secrets and /ov:layer.
secret_requires:
  - name: WEBUI_ADMIN_PASSWORD
    description: "Initial admin account password for Open WebUI first-run setup"

secret_accepts:
  - name: OPENROUTER_API_KEY
    description: "API key for OpenRouter (maps to OPENAI_API_KEY with OpenRouter base URL)"
    key: ov/api-key/openrouter
  - name: OLLAMA_API_KEY
    description: "API key for Ollama Cloud inference"
    key: ov/api-key/ollama
  - name: OPENAI_API_KEY
    description: "Direct OpenAI API key"
    key: ov/api-key/openai
  - name: IMMICH_API_KEY
    description: "Immich API key for programmatic access to the running immich instance"
    key: ov/api-key/immich

mcp_accepts:
  - name: jupyter
    description: "JupyterLab CRDT MCP server for notebook manipulation"
  - name: chrome-devtools
    description: "Chrome DevTools MCP server for browser automation"

ports:
  - 8080

volumes:
  - name: data
    path: "/opt/data"

aliases:
  - name: open-webui
    command: open-webui

secrets:
  - name: webui-secret-key
    env: WEBUI_SECRET_KEY

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - copy: openwebui-entrypoint
    to: "${HOME}/.local/bin/openwebui-entrypoint"
    mode: "0755"
    user: "${USER}"

service: |
  [program:openwebui]
  command=%(ENV_HOME)s/.local/bin/openwebui-entrypoint
  directory=%(ENV_HOME)s
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0
