layer:
  name: os-layer
  description:
    feature: os — predictable system-state fixture for harness phase 1
    narrative: |
      Writes /etc/ov-os-marker containing the predetermined content
      marker `ov-os-content-marker`, and registers a long-lived bash
      service so that `pgrep -x bash` succeeds. Combined with a fedora
      base + supervisord this satisfies every scenario in the
      single-pod-system-state recipe.

  rpm:
    packages:
      - bash
      - procps-ng
      - iproute
      - util-linux

  tasks:
    - mkdir: /etc
      user: root
      mode: "0755"
    - write: /etc/ov-os-marker
      user: root
      mode: "0644"
      content: |
        ov-os-content-marker

  service:
    - name: os-bash
      exec: "/usr/bin/bash -c 'while true; do sleep 60; done'"
      restart: always
      priority: 50
      enable: true
      scope: system

  eval:
    - id: os-marker-exists
      file: /etc/ov-os-marker
      exists: true
    - id: os-marker-content
      file: /etc/ov-os-marker
      contains:
        - ov-os-content-marker
    - id: os-bash-installed
      package: bash
      installed: true
