layer:
  name: os-system-files
  description: System files overlay + justfile imports for bazzite bootc images

  task:
    # Stage the system_files/ subtree and bazzite just fragments from the
    # layer directory into their canonical system paths.
    - cmd: |
        cp -a /ctx/system_files/* / 2>/dev/null || true
        mkdir -p /usr/share/bazzite/just
        cp -a /ctx/just/* /usr/share/bazzite/just/ 2>/dev/null || true
      user: root

    # Auto-generated ublue-os just include pointing at the bazzite entry.
    # mkdir is explicit so write's parent-dir auto-insert stays a no-op.
    - mkdir: /usr/share/ublue-os/just
      user: root
    - write: /usr/share/ublue-os/just/60-custom.just
      user: root
      mode: "0644"
      content: |
        # Auto-generated bazzite imports
        import "/usr/share/bazzite/just/_entry.just"

