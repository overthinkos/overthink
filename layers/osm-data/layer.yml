layer:
  name: osm-data
  description: "OpenStreetMap data pipeline tooling: tippecanoe (GeoJSON → MBTiles/PMTiles), osmium-tool (PBF inspection/filtering), gdal CLI (ogr2ogr/ogrinfo for format conversion), pmtiles CLI (PMTiles inspection/conversion), and martin (Rust tile server). Martin reads tiles from ${HOME}/workspace/tiles/pmtiles/ — the user-owned workspace volume — so DAG output and tile-server input share one persistent location with no chown / volume-shadow tricks."
  require:
    - supervisord
  distro:
    fedora:
      package:
        # osmium-tool — OSM PBF inspection, filtering, transformation
        - osmium-tool
        # gdal CLI — ogr2ogr / ogrinfo. Used by the sample DAG to convert
        # quackosm's GeoParquet output to GeoJSON for tippecanoe input.
        - gdal
        # jq — used by the dynamic-version pmtiles download below to parse
        # the GitHub release API response. Also useful for inspecting
        # martin's /catalog endpoint and for pipeline scripts.
        - jq
        # Build deps for tippecanoe (which has no Fedora package — felt/
        # tippecanoe is OSS but ships only source; the build below installs
        # it). git is also needed for the clone.
        - git
        - make
        - gcc-c++
        - sqlite-devel
        - zlib-devel
  port:
    - 3000      # martin tile server HTTP
  task:
    # ---- tippecanoe (GeoJSON → MBTiles/PMTiles) ----
    # NOT in Fedora repos and upstream (felt/tippecanoe) ships only source —
    # no GitHub release binaries exist. Build from source in-image. The
    # build is small (~200 MB git clone, <1 min `make -j`); cleanup keeps
    # the image lean. Build deps (git/make/gcc-c++/sqlite-devel/zlib-devel)
    # are declared in distros.fedora.packages above.
    - cmd: |
        set -euo pipefail
        git clone --depth 1 https://github.com/felt/tippecanoe /tmp/tippecanoe
        cd /tmp/tippecanoe
        make -j"$(nproc)"
        make install PREFIX=/usr/local
        cd /
        rm -rf /tmp/tippecanoe
      user: root

    # ---- martin (tile server) ----
    # Static-musl Rust binary (the gnu build hard-depends on libicuuc.so.74
    # / libicui18n.so.74 which aren't on Fedora 43 — it ships libicu 77;
    # musl is self-contained). releases/latest/download/ redirect resolves
    # to the newest tag; ${BUILD_ARCH} is auto-injected at the start of the
    # download RUN.
    - download: "https://github.com/maplibre/martin/releases/latest/download/martin-${BUILD_ARCH}-unknown-linux-musl.tar.gz"
      extract: tar.gz
      to: /usr/local/bin
      include: [martin]
      user: root

    # ---- pmtiles CLI (protomaps/go-pmtiles) ----
    # Asset filenames embed the version (`go-pmtiles_<v>_Linux_x86_64.tar.gz`),
    # so the releases/latest/download/ static-redirect trick can't reach them.
    # Resolve the latest tag via the GitHub API, then download + extract +
    # install in one shell. jq comes from the rpm: list above; curl is
    # always present in fedora minimal.
    - cmd: |
        set -euo pipefail
        LATEST=$(curl -fsSL "https://api.github.com/repos/protomaps/go-pmtiles/releases/latest" | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        TMPDIR=$(mktemp -d)
        cd "$TMPDIR"
        curl -fsSL "https://github.com/protomaps/go-pmtiles/releases/download/${LATEST}/go-pmtiles_${VERSION}_Linux_${BUILD_ARCH}.tar.gz" \
          -o pmtiles.tar.gz
        tar -xzf pmtiles.tar.gz pmtiles
        install -m 0755 pmtiles /usr/local/bin/pmtiles
        cd / && rm -rf "$TMPDIR"
      user: root

    # ---- martin wrapper ----
    # Tiny shell wrapper that pre-creates the tile source directory under
    # the user-owned workspace volume before exec'ing martin. The directory
    # may not exist yet on first deploy (the DAG hasn't run); without
    # mkdir -p, martin would error or warn. With it, martin starts with
    # an empty source dir and auto-discovers tiles as the DAG produces
    # them. `exec` keeps PID 1 ownership for proper signal handling.
    - write: /usr/local/bin/martin-wrapper.sh
      mode: "0755"
      user: root
      content: |
        #!/usr/bin/env bash
        set -euo pipefail
        DIR="${HOME}/workspace/tiles/pmtiles"
        mkdir -p "$DIR"
        exec /usr/local/bin/martin --listen-addresses 0.0.0.0:3000 "$DIR"
  eval:
    # Build-scope: every CLI binary present + responds to --version.
    - id: tippecanoe-installed
      command: tippecanoe --version
      exit_status: 0
    - id: osmium-installed
      command: osmium --version
      exit_status: 0
    - id: gdal-installed
      command: ogr2ogr --version
      exit_status: 0
    - id: jq-installed
      command: jq --version
      exit_status: 0
    - id: martin-installed
      command: martin --version
      exit_status: 0
    - id: pmtiles-installed
      command: pmtiles version
      exit_status: 0
    - id: martin-wrapper-installed
      file: /usr/local/bin/martin-wrapper.sh
      exists: true
      mode: "0755"
    # Deploy-scope: martin service running + HTTP catalog endpoint responsive.
    # Pre-DAG the catalog is empty (no PMTiles published yet); post-DAG it
    # lists the monaco tile set. R10 step 16 re-verifies post-DAG.
    - id: martin-running
      scope: deploy
      service: martin
      running: true
    - id: martin-port-reachable
      scope: deploy
      addr: "127.0.0.1:${HOST_PORT:3000}"
      reachable: true
      timeout: 10s
    - id: martin-http-catalog
      scope: deploy
      http: "http://127.0.0.1:${HOST_PORT:3000}/catalog"
      status: 200
      timeout: 10s
    - id: martin-tiles-dir-runtime
      scope: deploy
      command: test -d ${HOME}/workspace/tiles/pmtiles
      exit_status: 0
      in_container: true
  service:
    - name: martin
      # Wrapper script ensures the tile source dir exists under the
      # user-owned workspace volume before exec-ing martin. Service
      # runs as the container user (supervisord default); the workspace
      # volume's first-mount seeding (via --userns=keep-id) means the
      # dir lands user-owned, so DAG tasks (also user) can write tile
      # output that martin then auto-discovers.
      exec: /usr/local/bin/martin-wrapper.sh
      restart: always
      priority: 33
      enable: true
      scope: system
