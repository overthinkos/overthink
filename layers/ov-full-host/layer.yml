layer:
  name: ov-full-host
  description: |
    Full ov toolchain for target:local host installs. Uses
    /ov-foundation:virtualization-host (native systemd) instead of
    /ov-foundation:virtualization (supervisord-managed daemons), so the
    OS keeps native libvirt management. Drops gvisor-tap-vsock and
    podman-machine — both are container/podman-machine artifacts that
    are unneeded on a real Linux host.
  layers:
    - ov
    - virtualization-host
    - gocryptfs
    - socat
