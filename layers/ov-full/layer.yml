description: Full ov toolchain (CLI + VM + crypto + console + podman machine)

rpm:
  packages:
    - gvisor-tap-vsock
    - podman-machine

pac:
  packages: []

# Debian / Ubuntu: gvisor-tap-vsock and podman-machine are not packaged
# upstream. podman-machine is bundled inside Debian's `podman` (as the
# `podman machine` subcommand), and gvisor-tap-vsock has no deb package —
# users needing rootless VM-socket passthrough would install it separately.
# For the coder use case, this is acceptable: the container-nesting layer
# already provides the rootless nested podman fallback path.
deb:
  packages: []

layers:
  - ov
  - virtualization
  - gocryptfs
  - socat
