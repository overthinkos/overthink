layer:
  name: ov
  description: Overthink CLI (ov) binary
  distros:
    archlinux:
      packages:
        - portaudio
        - opusfile
    debian:
      packages:
        - libportaudio2
        - libopusfile0
    fedora:
      packages:
        - portaudio
        - opusfile
    ubuntu:
      packages:
        - libportaudio2
        - libopusfile0
  tasks:
    - copy: bin/ov
      to: /usr/local/bin/ov
      mode: "0755"
      user: root
  eval:
    - id: ov-binary
      file: /usr/local/bin/ov
      exists: true
      mode: "0755"
    - id: ov-version
      command: /usr/local/bin/ov version
      exit_status: 0
      stdout:
        - matches: "[0-9]{4}\\.[0-9]+"
