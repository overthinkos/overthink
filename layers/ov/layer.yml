layer:
    version: 2026.155.0001
    name: ov
    description: Overthink CLI (ov) binary
    distro:
        arch:
            package:
                - portaudio
                - opusfile
        debian:
            package:
                - libportaudio2
                - libopusfile0
        fedora:
            package:
                - portaudio
                - opusfile
        ubuntu:
            package:
                - libportaudio2
                - libopusfile0
    # On an Arch/CachyOS DEPLOY target (target:local on a pac host, target:vm
    # into a pac guest) ov is installed as the proper `overthink-git` pacman
    # package: built from the repo's bundled PKGBUILD on the HOST via makepkg,
    # then pacman -U'd onto the target (LocalPkgInstallStep). The PKGBUILD lives
    # at the SUPERPROJECT root's pkg/arch — resolved by walking UP from the deploy
    # project dir, so a consumer nested under image/<distro> still finds it
    # (../../pkg/arch). Skipped at image build (no makepkg in a container) and on
    # any non-pac target; the cmd: task below is the fallback there.
    localpkg: pkg/arch
    task:
        # Install the ov binary. Resolution order:
        #   1. overthink-git already pacman-installed (the localpkg step ran first
        #      on an Arch deploy target) → do nothing. The package's /usr/bin/ov is
        #      authoritative; we must NOT curl a /usr/local/bin/ov, which would
        #      shadow it on $PATH with a stale, pacman-untracked binary.
        #   2. /ctx/bin/ov present (`task build:ov` ships bin/ov in the layer dir,
        #      image builds) → install it directly.
        #   3. otherwise (remote github-ref composition: bin/ov is a gitignored
        #      build artifact absent from a git clone) → download the published
        #      release asset. Keeps the 38 MB binary out of git while making the
        #      layer remote-composable.
        - cmd: |
            if command -v pacman >/dev/null 2>&1 && pacman -Q overthink-git >/dev/null 2>&1; then
              : # overthink-git is the proper package at /usr/bin/ov — nothing to do
            elif [ -f /ctx/bin/ov ]; then
              install -m 0755 /ctx/bin/ov /usr/local/bin/ov
            else
              curl -fsSL "https://github.com/overthinkos/overthink/releases/download/v2026.141.1600/ov-linux-${ARCH}" -o /usr/local/bin/ov
              chmod 0755 /usr/local/bin/ov
            fi
          user: root
    # The ov binary is at /usr/bin/ov (overthink-git package, on an Arch deploy)
    # OR /usr/local/bin/ov (image build / non-pac deploy curl/COPY). Probe via
    # PATH (`command -v ov`) so the eval passes regardless of which path placed it.
    eval:
        - id: ov-binary
          command: command -v ov
          exit_status: 0
          stdout:
            - matches: "/(usr/bin|usr/local/bin)/ov"
        - id: ov-version
          command: ov version
          exit_status: 0
          stdout:
            - matches: "[0-9]{4}\\.[0-9]+"
