layer:
  name: pixi
  # env: + path_append: moved to build.yml's pixi BUILDER definition
  # in 2026-04-29 so images that consume pixi via pixi.toml-triggered
  # builds (and don't list `pixi` as a top-level layer for sibling-
  # grouped auto-intermediate inheritance) still get the runtime env
  # contract. See `runtime_env:` and `path_contributions:` on the
  # pixi block in build.yml.
  tasks:
    # pixi upstream releases use uname-style arch (x86_64/aarch64), not BuildKit form.
    - download: "https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${BUILD_ARCH}-unknown-linux-musl.tar.gz"
      extract: tar.gz
      to: /usr/local/bin
      user: root

  eval:
    - id: pixi-binary
      file: /usr/local/bin/pixi
      exists: true
    - id: pixi-version
      command: /usr/local/bin/pixi --version
      exit_status: 0

