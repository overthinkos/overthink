layer:
  name: pixi
  env:
    PIXI_CACHE_DIR: "~/.cache/pixi"
    RATTLER_CACHE_DIR: "~/.cache/rattler"

  path_append:
    - "~/.pixi/bin"
    - "~/.pixi/envs/default/bin"

  tasks:
    # pixi upstream releases use uname-style arch (x86_64/aarch64), not BuildKit form.
    - download: "https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${BUILD_ARCH}-unknown-linux-musl.tar.gz"
      extract: tar.gz
      to: /usr/local/bin
      user: root

  eval:
    - id: pixi-binary
      file: /usr/local/bin/pixi
      exists: true
    - id: pixi-version
      command: /usr/local/bin/pixi --version
      exit_status: 0

