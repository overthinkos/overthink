depends: []

rpm:
  packages:
    - postgresql-server
    - postgresql-contrib
    - pgvector

env:
  PGDATA: "~/.postgresql/data"
  POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"

env_provides:
  PGHOST: "{{.ContainerName}}"
  PGPORT: "5432"

ports:
  - 5432

volumes:
  - name: pgdata
    path: "~/.postgresql/data"

service: |
  [program:postgresql]
  command=/usr/local/bin/postgresql-entrypoint.sh
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=10
