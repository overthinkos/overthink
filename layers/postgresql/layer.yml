depends: []

rpm:
  packages:
    - postgresql-server
    - postgresql-contrib
    - pgvector

env:
  PGDATA: "~/.postgresql/data"
  POSTGRES_DB: "immich"
  POSTGRES_USER: "immich"
  POSTGRES_PASSWORD: "immich"

ports:
  - 5432

volumes:
  - name: pgdata
    path: "~/.postgresql/data"

service: |
  [program:postgresql]
  command=/usr/bin/postgres -D %(ENV_PGDATA)s -c unix_socket_directories=%(ENV_HOME)s/.postgresql -c listen_addresses=127.0.0.1
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=10
  environment=PGDATA="%(ENV_PGDATA)s",HOME="%(ENV_HOME)s"
