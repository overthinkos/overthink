depends: []

rpm:
  packages:
    - redis

env:
  REDIS_URL: "redis://127.0.0.1:6379"

ports:
  - 6379

service: |
  [program:redis]
  command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --dir %(ENV_HOME)s/.redis --save 60 1
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=20
