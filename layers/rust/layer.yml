layer:
  name: rust
  path_append:
    - "~/.cargo/bin"
  distro:
    arch:
      package:
        - rust
    debian:
      package:
        - rustc
        - cargo
    fedora:
      package:
        - rust
        - cargo
    ubuntu:
      package:
        - rustc
        - cargo
  eval:
    - id: rustc-binary
      file: /usr/bin/rustc
      exists: true
    - id: rustc-version
      command: /usr/bin/rustc --version
      exit_status: 0
    - id: cargo-binary
      file: /usr/bin/cargo
      exists: true
    - id: cargo-version
      command: /usr/bin/cargo --version
      exit_status: 0
