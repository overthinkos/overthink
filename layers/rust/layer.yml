path_append:
  - "~/.cargo/bin"

rpm:
  packages:
    - rust
    - cargo

pac:
  packages:
    - rust

deb:
  packages:
    - rustc
    - cargo

tests:
  - id: rustc-binary
    file: /usr/bin/rustc
    exists: true
  - id: rustc-version
    command: /usr/bin/rustc --version
    exit_status: 0
  - id: cargo-binary
    file: /usr/bin/cargo
    exists: true
  - id: cargo-version
    command: /usr/bin/cargo --version
    exit_status: 0
