depends:
  - supervisord
  - python
  - pipewire

env:
  LANG: "C.UTF-8"
  PIXELFLUX_WAYLAND: "true"
  PULSE_SERVER: "unix:/tmp/pulse/native"

ports:
  - "https+insecure:3000"

security:
  shm_size: "1g"

volumes:
  - name: selkies-config
    path: "~/.config/selkies"

rpm:
  packages:
    - wl-clipboard
    - libICE
    - libSM
    - pulseaudio-libs
    - pulseaudio-utils
    - mesa-va-drivers
    - libva
    - libva-utils
    - procps-ng
    - iproute
    - iputils
    - strace
    - htop
    - file
    - lsof

service: |
  [program:traefik]
  command=/usr/local/bin/traefik --configFile=/usr/local/share/selkies/traefik.yml
  autostart=true
  autorestart=true
  priority=18
  startsecs=1
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:selkies-fileserver]
  command=python3 %(ENV_HOME)s/.local/bin/selkies-fileserver
  autostart=true
  autorestart=true
  priority=19
  startsecs=1
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:selkies]
  command=%(ENV_HOME)s/.local/bin/selkies-wrapper
  autostart=true
  autorestart=true
  priority=8
  startsecs=3
  environment=XDG_RUNTIME_DIR="/tmp",PIXELFLUX_WAYLAND="true"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
