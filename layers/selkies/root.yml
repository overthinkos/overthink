version: '3'

tasks:
  install:
    cmds:
      # Download selkies source, strip av/cryptography deps (not needed for websocket mode),
      # then install. This is the same approach as the LSIO Dockerfile.
      - |
        cd /tmp
        curl -sL https://github.com/selkies-project/selkies/archive/af1a1c252563d2f136d641b81d6b1dd38a3a0d93.tar.gz | tar xzf -
        cd selkies-*
        sed -i '/"av>/d' pyproject.toml
        sed -i '/cryptography/d' pyproject.toml
        /home/user/.pixi/envs/default/bin/pip install .
      # Build web UI dashboard
      - |
        cd /tmp/selkies-*/addons/gst-web-core
        npm install && npm run build
        cd ../selkies-dashboard
        cp ../gst-web-core/dist/selkies-core.js src/
        npm install && npm run build
        mkdir -p /usr/local/share/selkies/web
        cp -r dist/* /usr/local/share/selkies/web/
        cp ../gst-web-core/dist/selkies-core.js /usr/local/share/selkies/web/src/ 2>/dev/null || true
        rm -rf /tmp/selkies-*
      # Create NVRTC symlinks for pixelflux NVENC (pip installs libnvrtc.so.13 but no unversioned symlink)
      - |
        NVRTC_DIR=/home/user/.pixi/envs/default/lib/python3.13/site-packages/nvidia/cu13/lib
        if [ -f "$NVRTC_DIR/libnvrtc.so.13" ] && [ ! -f "$NVRTC_DIR/libnvrtc.so" ]; then
          ln -s libnvrtc.so.13 "$NVRTC_DIR/libnvrtc.so"
          ln -s libnvrtc-builtins.so.13.2 "$NVRTC_DIR/libnvrtc-builtins.so" 2>/dev/null || true
        fi
      # Remove build deps (only needed during install)
      - dnf remove -y nodejs npm gcc python3-devel libxkbcommon-devel libevdev-devel kernel-headers || true
