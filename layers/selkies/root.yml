version: '3'

tasks:
  all:
    cmds:
      # Move web UI from pixi build stage output to system directory
      - |
        mkdir -p /usr/local/share/selkies/web
        cp -r /home/user/.local/share/selkies-build/web/* /usr/local/share/selkies/web/
        rm -rf /home/user/.local/share/selkies-build
      # Download traefik binary
      - |
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH=amd64;;
          aarch64) ARCH=arm64;;
          *) echo "Unsupported: $ARCH" >&2; exit 1;;
        esac
        curl -fsSL "https://github.com/traefik/traefik/releases/download/v3.4.0/traefik_v3.4.0_linux_${ARCH}.tar.gz" | tar -xzf - -C /usr/local/bin traefik
      # Generate self-signed certificate (dev use — enables HTTPS secure context)
      - |
        mkdir -p /usr/local/share/selkies/certs
        openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
          -keyout /usr/local/share/selkies/certs/selkies.key \
          -out /usr/local/share/selkies/certs/selkies.crt \
          -days 3650 -nodes \
          -subj "/CN=selkies" \
          -addext "subjectAltName=DNS:localhost,DNS:selkies.localhost,DNS:*.localhost,DNS:ov-selkies-desktop,IP:127.0.0.1"
        chmod 644 /usr/local/share/selkies/certs/selkies.crt /usr/local/share/selkies/certs/selkies.key
      # Install traefik configs
      - cp /ctx/traefik.yml /usr/local/share/selkies/traefik.yml
      - cp /ctx/traefik-dynamic.yml /usr/local/share/selkies/traefik-dynamic.yml
