layer:
  name: socat
  description: Socket relay tool for VM console access and port relays
  packages:
    - socat
  distros:
    archlinux:
      packages:
        - iproute2
    debian:
      packages:
        - iproute2
    fedora:
      packages:
        - iproute
    ubuntu:
      packages:
        - iproute2
  tasks:
    - copy: relay-wrapper
      to: /usr/local/bin/relay-wrapper
      mode: "0755"
      user: root
  eval:
    - id: socat-binary
      file: /usr/bin/socat
      exists: true
    - id: socat-version
      command: /usr/bin/socat -V
      exit_status: 0
    - id: relay-wrapper
      file: /usr/local/bin/relay-wrapper
      exists: true
      mode: "0755"
