description: Socket relay tool for VM console access and port relays

rpm:
  packages:
    - socat
    - iproute

pac:
  packages:
    - socat
    - iproute2

tasks:
  - copy: relay-wrapper
    to: /usr/local/bin/relay-wrapper
    mode: "0755"
    user: root

tests:
  - id: socat-binary
    file: /usr/bin/socat
    exists: true
  - id: socat-version
    command: /usr/bin/socat -V
    exit_status: 0
  - id: relay-wrapper
    file: /usr/local/bin/relay-wrapper
    exists: true
    mode: "0755"
