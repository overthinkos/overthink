env_accepts:
  - name: SSH_AUTHORIZED_KEYS
    description: "SSH public key(s) for authorized access (one per line). Set via: ov config <image> --ssh-key auto"

rpm:
  packages:
    - openssh-server
    - openssh-clients
    - sudo

pac:
  packages:
    - openssh
    - sudo

ports:
  - tcp:2222

# Supervisord service (containers)
service: |
  [program:sshd]
  command=/usr/local/bin/sshd-wrapper
  autostart=true
  autorestart=true
  priority=3
  startsecs=1
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

tasks:
  - copy: sshd-wrapper
    to: /usr/local/bin/sshd-wrapper
    mode: "0755"
    user: root

  - write: /etc/sudoers.d/ov-user
    mode: "0440"
    user: root
    content: |
      user ALL=(ALL) NOPASSWD: ALL

# Systemd service (bootc images)
system_services:
  - sshd

tests:
  - id: sshd-binary
    file: /usr/sbin/sshd
    exists: true
  - id: sshd-wrapper
    file: /usr/local/bin/sshd-wrapper
    exists: true
    mode: "0755"
  - id: openssh-server-package
    package: openssh-server
    installed: true
  # /etc/sudoers.d/* is root:root 0750 — unreadable to the non-root user the
  # disposable test runs as. Verify via `sudo -n -l` instead, which exercises
  # the rule's effect without needing to stat the file directly.
  - id: sudoers-ov-user
    command: sudo -n -l
    exit_status: 0
    stdout:
      - contains: "NOPASSWD"
  - id: sshd-service-running
    scope: deploy
    service: sshd
    running: true
  - id: sshd-port-reachable
    scope: deploy
    addr: 127.0.0.1:${HOST_PORT:2222}
    reachable: true
    timeout: 5s
