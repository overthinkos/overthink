layer:
    version: 2026.144.1443
    name: steam
    require:
        - sway
    env:
        STEAM_RUNTIME_PREFER_HOST_LIBRARIES: "0"
    distro:
        fedora:
            package:
                - steam
                - gamescope
            option:
                - --allowerasing
    security:
        shm_size: "1g"
    volume:
        - name: steam-data
          path: "~/.local/share/Steam"
