layer:
  name: steam
  requires:
    - sway
  env:
    STEAM_RUNTIME_PREFER_HOST_LIBRARIES: "0"
  distros:
    fedora:
      packages:
        - steam
        - gamescope
      options:
        - --allowerasing
  security:
    shm_size: "1g"
  volumes:
    - name: steam-data
      path: "~/.local/share/Steam"
