depends:
  - dbus

env:
  WLR_BACKENDS: "headless"
  WLR_HEADLESS_OUTPUTS: "1"
  WLR_LIBINPUT_NO_DEVICES: "1"
  XDG_RUNTIME_DIR: "/tmp"
  WAYLAND_DISPLAY: "wayland-0"
  EGL_LOG_LEVEL: "fatal"

rpm:
  packages:
    - sway
    - xorg-x11-server-Xwayland
    - fuzzel
    - mesa-dri-drivers
    - mesa-vulkan-drivers
    - libglvnd-egl
    - libglvnd-gles
    - egl-wayland
    - wlr-randr

service: |
  [program:sway]
  command=%(ENV_HOME)s/.local/bin/sway-wrapper
  autostart=true
  autorestart=true
  priority=10
  startsecs=3
  environment=WLR_BACKENDS="headless",WLR_HEADLESS_OUTPUTS="1",WLR_LIBINPUT_NO_DEVICES="1",XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
