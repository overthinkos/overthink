depends:
  - supervisord

env:
  WLR_BACKENDS: "headless"
  WLR_HEADLESS_OUTPUTS: "1"
  WLR_LIBINPUT_NO_DEVICES: "1"
  XDG_RUNTIME_DIR: "/tmp"
  WAYLAND_DISPLAY: "wayland-0"
  DBUS_SESSION_BUS_ADDRESS: "unix:path=/tmp/dbus-session"
  EGL_LOG_LEVEL: "fatal"

rpm:
  packages:
    - sway
    - foot
    - fuzzel
    - mako
    - mesa-dri-drivers
    - mesa-vulkan-drivers
    - libglvnd-egl
    - libglvnd-gles
    - egl-wayland
    - wlr-randr
    - dbus-daemon

service: |
  [program:dbus]
  command=dbus-daemon --session --nofork --address=unix:path=/tmp/dbus-session
  autostart=true
  autorestart=true
  priority=2
  startsecs=1
  environment=XDG_RUNTIME_DIR="/tmp"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:sway]
  command=%(ENV_HOME)s/.local/bin/sway-wrapper
  autostart=true
  autorestart=true
  priority=10
  startsecs=3
  environment=WLR_BACKENDS="headless",WLR_HEADLESS_OUTPUTS="1",WLR_LIBINPUT_NO_DEVICES="1",XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
