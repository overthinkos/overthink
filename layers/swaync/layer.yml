depends:
  - dbus

rpm:
  packages:
    - SwayNotificationCenter

service: |
  [program:swaync]
  command=%(ENV_HOME)s/.local/bin/swaync-wrapper
  autostart=true
  autorestart=true
  priority=14
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
