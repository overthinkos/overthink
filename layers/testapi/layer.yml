depends:
  - supervisord

ports:
  - 9090

route:
  host: testapi.localhost
  port: 9090

tasks:
  - mkdir: "${HOME}/testapi"
    user: "${USER}"
  - copy: app.py
    to: "${HOME}/testapi/app.py"
    mode: "0644"
    user: "${USER}"

service: |
  [program:testapi]
  command=/home/user/.pixi/envs/default/bin/uvicorn app:app --host 0.0.0.0 --port 9090
  directory=/home/user/testapi
  autostart=true
  autorestart=true
  redirect_stderr=true
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
