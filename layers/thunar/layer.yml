layer:
    version: 2026.144.1443
    name: thunar
    require:
        - sway
    distro:
        fedora:
            package:
                - thunar
    task:
        - mkdir: "${HOME}/.config/sway/config.d"
          user: "${USER}"
        - copy: thunar.conf
          to: "${HOME}/.config/sway/config.d/thunar.conf"
          mode: "0644"
          user: "${USER}"
    eval:
        - id: thunar-binary
          file: /usr/bin/thunar
          exists: true
        - id: thunar-sway-conf
          file: ${HOME}/.config/sway/config.d/thunar.conf
          exists: true
