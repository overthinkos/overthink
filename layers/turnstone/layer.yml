depends:
  - supervisord

env:
  TURNSTONE_HOST: "0.0.0.0"
  TURNSTONE_PORT: "8080"
  TURNSTONE_CONSOLE_PORT: "8090"
  TURNSTONE_DATA_DIR: "~/.turnstone"

ports:
  - 8080
  - 8090

volumes:
  - name: data
    path: "~/.turnstone"

aliases:
  - name: turnstone
    command: turnstone

route:
  host: turnstone.localhost
  port: 8080

service: |
  [program:turnstone-server]
  command=/home/user/.pixi/envs/default/bin/turnstone-server --port %(ENV_TURNSTONE_PORT)s --host %(ENV_TURNSTONE_HOST)s
  directory=%(ENV_HOME)s/.turnstone
  autostart=true
  autorestart=true
  redirect_stderr=true
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0

  [program:turnstone-console]
  command=/home/user/.pixi/envs/default/bin/turnstone-console --port %(ENV_TURNSTONE_CONSOLE_PORT)s
  directory=%(ENV_HOME)s/.turnstone
  autostart=true
  autorestart=true
  redirect_stderr=true
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
