description: Typst document processor binary (fetched from GitHub releases)

tasks:
  # Typst release naming uses uname-style arch (x86_64/aarch64). Version
  # pinned via runtime GitHub API lookup so the layer tracks latest releases
  # without manual bumps.
  - cmd: |
      VER=$(curl -fsSL https://api.github.com/repos/typst/typst/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
      curl -fsSL "https://github.com/typst/typst/releases/download/v${VER}/typst-${BUILD_ARCH}-unknown-linux-musl.tar.xz" -o /tmp/typst.tar.xz
      tar -xJf /tmp/typst.tar.xz -C /tmp/
      find /tmp -name "typst" -type f -executable | head -1 | xargs -I{} mv {} /usr/local/bin/typst
      chmod +x /usr/local/bin/typst
      rm -rf /tmp/typst.tar.xz /tmp/typst-*
    user: root
