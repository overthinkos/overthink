description: Just task runner + ujust wrapper (Universal Blue convention)

vars:
  JUST_VERSION: "1.46.0"

tasks:
  # just binary from GitHub releases — upstream naming uses uname-style arch.
  - cmd: |
      curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-${BUILD_ARCH}-unknown-linux-musl.tar.gz" \
        -o /tmp/just.tar.gz
      mkdir -p /tmp/just-extract
      tar -xzf /tmp/just.tar.gz -C /tmp/just-extract/
      mv /tmp/just-extract/just /usr/bin/just
      chmod +x /usr/bin/just
      rm -rf /tmp/just.tar.gz /tmp/just-extract
    user: root

  # ujust wrapper for pod images that lack the bazzite provisioning.
  # Guard avoids clobbering a pre-existing ujust from a parent layer.
  - cmd: |
      if [ ! -f /usr/bin/ujust ]; then
        cat > /usr/bin/ujust << 'UJUST'
      #!/usr/bin/bash
      /usr/bin/just --justfile /usr/share/ublue-os/justfile "${@}"
      UJUST
        chmod +x /usr/bin/ujust
        mkdir -p /usr/share/ublue-os/just
        cat > /usr/share/ublue-os/justfile << 'JF'
      set allow-duplicate-recipes := true
      set ignore-comments := true
      import "/usr/share/bazzite-ai/just/_entry.just"
      JF
      fi
    user: root
