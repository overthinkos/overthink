# vLLM wheel + runtime deps + unsloth + unsloth-zoo (--no-deps)
version: '3'

tasks:
  all:
    cmds:
      # Install vLLM cu130 nightly wheel (--no-deps: runtime deps in pixi-owning layer's pixi.toml)
      - |
        ~/.pixi/envs/default/bin/python -m pip install --no-deps \
          'https://wheels.vllm.ai/f53fa26e05c476a43f6db048a9e3b43bcb2b72fb/vllm-0.19.1rc1.dev39%2Bgf53fa26e0.cu130-cp38-abi3-manylinux_2_35_x86_64.whl'
      # Patch vLLM _decompose_size_nodes bug (upstream: vllm-project/vllm#38360)
      - ~/.pixi/envs/default/bin/python patch_vllm_size_nodes.py
      # Install vLLM runtime deps that conflict with pixi conda/PyPI resolver
      - |
        ~/.pixi/envs/default/bin/python -m pip install --no-deps \
          'opentelemetry-sdk>=1.27.0' \
          'opentelemetry-api>=1.27.0' \
          'opentelemetry-exporter-otlp>=1.27.0' \
          'opentelemetry-semantic-conventions-ai>=0.4.1'
      # Install unsloth + unsloth-zoo (--no-deps: incompatible with transformers 5.x in pixi solve)
      - |
        ~/.pixi/envs/default/bin/python -m pip install --no-deps unsloth unsloth-zoo
