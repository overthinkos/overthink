layer:
  name: uv
  description: uv Python package manager (astral-sh/uv, standalone Rust binary)

  task:
    # uv releases nest binaries under uv-${ARCH}-unknown-linux-gnu/ inside the
    # tarball, so --strip-components=1 is needed to land uv + uvx directly at
    # /usr/local/bin/*.
    - download: "https://github.com/astral-sh/uv/releases/latest/download/uv-${BUILD_ARCH}-unknown-linux-gnu.tar.gz"
      extract: tar.gz
      strip_components: 1
      to: /usr/local/bin
      user: root
      # Explicit uninstall list so `ov deploy del` removes just the
      # binaries this archive drops in /usr/local/bin, not the whole
      # shared dir (which would wipe every system-local binary).
      uninstall:
        - /usr/local/bin/uv
        - /usr/local/bin/uvx

  eval:
    - id: uv-binary
      file: /usr/local/bin/uv
      exists: true
    - id: uv-version
      command: /usr/local/bin/uv --version
      exit_status: 0
    - id: uvx-binary
      file: /usr/local/bin/uvx
      exists: true

