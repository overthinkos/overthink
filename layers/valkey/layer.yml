description: "Valkey 9.x key-value store (via Remi modular repo)"
depends: []

rpm:
  repos:
    - name: remi-modular
      rpm: "https://rpms.remirepo.net/fedora/remi-release-$(rpm -E %fedora).rpm"
  modules:
    - "valkey:remi-9.0"
  packages:
    - valkey

env:
  VALKEY_URL: "redis://127.0.0.1:6379"

env_provides:
  REDIS_URL: "redis://{{.ContainerName}}:6379"

ports:
  - 6379

volumes:
  - name: valkey-data
    path: "~/.valkey"

service: |
  [program:valkey]
  command=/usr/bin/valkey-server --bind 0.0.0.0 --port 6379 --protected-mode no --dir %(ENV_HOME)s/.valkey --save 60 1 --loglevel notice
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  redirect_stderr=true
  priority=20
