layer:
    version: 2026.144.1443
    name: valkey
    description: "Valkey 9.x key-value store (via Remi modular repo)"
    require: []
    distro:
        fedora:
            package:
                - valkey
            module:
                - "valkey:remi-9.0"
            repo:
                - name: remi-modular
                  rpm: "https://rpms.remirepo.net/fedora/remi-release-$(rpm -E %fedora).rpm"
    env:
        VALKEY_URL: "redis://127.0.0.1:6379"
    port:
        - 6379
    volume:
        - name: valkey-data
          path: "~/.valkey"
    task:
        - mkdir: "${HOME}/.valkey"
          user: "${USER}"
    service:
        - name: valkey
          exec: "/usr/bin/valkey-server --bind 0.0.0.0 --port 6379 --protected-mode no --dir %(ENV_HOME)s/.valkey --save 60 1 --loglevel notice"
          restart: always
          priority: 20
          enable: true
          scope: system
