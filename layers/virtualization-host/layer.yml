layer:
  name: virtualization-host
  description: |
    Host install of QEMU/KVM/libvirt that uses the OS-native systemd
    units (virtqemud.socket, virtnetworkd.socket) instead of overriding
    them with supervisord-managed daemons. Designed for target:local
    deployments where the OS already manages libvirt natively. Sibling
    of /ov-foundation:virtualization (which is for container images).
  distros:
    archlinux:
      packages:
        - qemu-full
        - qemu-img
        - virtiofsd
        - libvirt
        - libguestfs
        - dnsmasq
    debian:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libnss-libvirt
        - libvirt-clients
        - libvirt-daemon-system
        - passt
        - qemu-guest-agent
        - qemu-system-x86
        - qemu-utils
    fedora:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libguestfs-tools
        - libvirt-client
        - libvirt-daemon
        - libvirt-daemon-config-network
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-driver-network
        - libvirt-nss
        - passt
        - qemu-guest-agent
        - qemu-img
        - qemu-kvm
        - qemu-system-x86-core
      options:
        - --allowerasing
    ubuntu:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libnss-libvirt
        - libvirt-clients
        - libvirt-daemon-system
        - passt
        - qemu-guest-agent
        - qemu-system-x86
        - qemu-utils
  tasks:
    - cmd: usermod -aG libvirt ${USER}
      user: root
    - cmd: systemctl enable --now virtqemud.socket virtnetworkd.socket
      user: root
  eval:
    - id: libvirt-package-installed
      package: libvirt
      package_map:
        archlinux: libvirt
        fedora: libvirt-daemon
        debian: libvirt-daemon-system
        ubuntu: libvirt-daemon-system
      installed: true
    - id: virsh-binary
      file: /usr/bin/virsh
      exists: true
    - id: virtqemud-socket-active
      scope: deploy
      command: systemctl is-active virtqemud.socket
      exit_status: 0
      stdout:
        - matches: "^active"
    - id: virtnetworkd-socket-active
      scope: deploy
      command: systemctl is-active virtnetworkd.socket
      exit_status: 0
      stdout:
        - matches: "^active"
