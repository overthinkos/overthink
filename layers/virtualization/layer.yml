layer:
  name: virtualization
  description: QEMU/KVM/libvirt stack with a rootless-friendly libvirt session daemon (virtqemud) under supervisord.
  requires:
    - supervisord
  distros:
    archlinux:
      packages:
        - qemu-full
        - qemu-img
        - virtiofsd
        - libvirt
    debian:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libguestfs-tools
        - libnss-libvirt
        - libvirt-clients
        - libvirt-daemon
        - libvirt-daemon-config-network
        - libvirt-daemon-driver-network
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-system
        - passt
        - qemu-guest-agent
        - qemu-system-x86
        - qemu-utils
        - virt-viewer
        - virtinst
    fedora:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libguestfs-tools
        - libvirt-client
        - libvirt-daemon
        - libvirt-daemon-config-network
        - libvirt-daemon-driver-qemu
        - libvirt-nss
        - passt
        - qemu-guest-agent
        - qemu-img
        - qemu-kvm
        - qemu-system-aarch64
        - qemu-system-arm
        - qemu-system-x86-core
        - tigervnc
        - virt-manager
        - virt-viewer
      options:
        - --allowerasing
    ubuntu:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libguestfs-tools
        - libnss-libvirt
        - libvirt-clients
        - libvirt-daemon
        - libvirt-daemon-config-network
        - libvirt-daemon-driver-network
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-system
        - passt
        - qemu-guest-agent
        - qemu-system-x86
        - qemu-utils
        - virt-viewer
        - virtinst
    ubuntu-24.04:
      packages:
        - bindfs
        - genisoimage
        - guestfs-tools
        - libguestfs-tools
        - libnss-libvirt
        - libvirt-clients
        - libvirt-daemon
        - libvirt-daemon-config-network
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-system
        - passt
        - qemu-guest-agent
        - qemu-system-x86
        - qemu-utils
        - virt-viewer
        - virtinst
  # virtqemud + virtnetworkd run under supervisord. No `user=` directive —
  # they inherit the parent supervisord's uid (root on fedora-ov/arch-ov/
  # githubrunner; `user` on selkies-desktop-ov). virtqemud honors the
  # qemu:///session path keyed by $XDG_RUNTIME_DIR at either uid.
  #
  # priority=5/6 places these ahead of desktop priorities (labwc=12,
  # selkies=18) so the libvirt socket is available when later services or
  # interactive `ov vm` calls try to connect.
  #
  # --timeout 0 keeps the daemons alive instead of exiting on idle.
  eval:
    # virtqemud / virtnetworkd ship as separate binaries on Fedora and Arch,
    # but on Debian / Ubuntu the libvirt-daemon-driver-qemu package ships
    # a plugin library instead — the monolithic `libvirtd` absorbs the QEMU
    # and network drivers. Test by package install, not binary path, so the
    # probe is honest across all distros.
    - id: libvirt-qemu-driver-package
      package: libvirt-daemon-driver-qemu
      package_map:
        archlinux: libvirt
        fedora: libvirt-daemon-driver-qemu
        fedora:43: libvirt-daemon-driver-qemu
        debian: libvirt-daemon-driver-qemu
        ubuntu: libvirt-daemon-driver-qemu
      installed: true
    - id: virsh-binary
      file: /usr/bin/virsh
      exists: true
    - id: qemu-system-x86-binary
      file: /usr/bin/qemu-system-x86_64
      exists: true
    - id: qemu-img-binary
      file: /usr/bin/qemu-img
      exists: true
    # Deploy-scope service checks: virtqemud / virtnetworkd launched by
    # supervisord on Fedora / Arch where those binaries exist. On Debian /
    # Ubuntu these programs fail at supervisord start-up because the binaries
    # aren't separate — accept this gap as documented. The libvirt-session
    # tests below still validate functional behavior through virsh.
    - id: virtqemud-running
      scope: deploy
      service: virtqemud
      running: true
    - id: virtnetworkd-running
      scope: deploy
      service: virtnetworkd
      running: true
    - id: libvirt-session-list
      scope: deploy
      command: virsh -c qemu:///session list --all
      exit_status: 0
      in_container: true
    - id: libvirt-kvm-acceleration
      scope: deploy
      command: virsh -c qemu:///session domcapabilities 2>/dev/null | grep -c '<domain>kvm</domain>'
      exit_status: 0
      in_container: true
      stdout:
        - matches: "^[1-9]"
  service:
    - name: virtqemud
      exec: "/usr/sbin/virtqemud --timeout 0"
      restart: always
      priority: 5
      start_secs: 2
      enable: true
      scope: system
    - name: virtnetworkd
      exec: "/usr/sbin/virtnetworkd --timeout 0"
      restart: always
      priority: 6
      start_secs: 2
      enable: true
      scope: system
