depends:
  - labwc

rpm:
  packages:
    - waybar
    - dejavu-sans-mono-fonts
    - google-noto-sans-mono-fonts

service: |
  [program:waybar]
  command=%(ENV_HOME)s/.local/bin/waybar-labwc-wrapper
  autostart=true
  autorestart=true
  priority=15
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
