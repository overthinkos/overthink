depends:
  - labwc

rpm:
  packages:
    - waybar

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - mkdir: "${HOME}/.config/waybar"
    user: "${USER}"

  - copy: waybar-labwc-wrapper
    to: "${HOME}/.local/bin/waybar-labwc-wrapper"
    mode: "0755"
    user: "${USER}"

  - copy: config.json
    to: "${HOME}/.config/waybar/config"
    mode: "0644"
    user: "${USER}"
  - copy: style.css
    to: "${HOME}/.config/waybar/style.css"
    mode: "0644"
    user: "${USER}"

service: |
  [program:waybar]
  command=%(ENV_HOME)s/.local/bin/waybar-labwc-wrapper
  autostart=true
  autorestart=true
  priority=15
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
