depends:
  - sway

rpm:
  packages:
    - waybar

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - mkdir: "${HOME}/.config/waybar"
    user: "${USER}"

  - copy: waybar-wrapper
    to: "${HOME}/.local/bin/waybar-wrapper"
    mode: "0755"
    user: "${USER}"
  - copy: sway-autotile
    to: "${HOME}/.local/bin/sway-autotile"
    mode: "0755"
    user: "${USER}"

  - copy: config.json
    to: "${HOME}/.config/waybar/config"
    mode: "0644"
    user: "${USER}"
  - copy: style.css
    to: "${HOME}/.config/waybar/style.css"
    mode: "0644"
    user: "${USER}"

service: |
  [program:waybar]
  command=%(ENV_HOME)s/.local/bin/waybar-wrapper
  autostart=true
  autorestart=true
  priority=15
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:sway-autotile]
  command=%(ENV_HOME)s/.local/bin/sway-autotile
  autostart=true
  autorestart=true
  priority=16
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

tests:
  - id: waybar-binary
    file: /usr/bin/waybar
    exists: true
  - id: waybar-wrapper
    file: ${HOME}/.local/bin/waybar-wrapper
    exists: true
  - id: waybar-config
    file: ${HOME}/.config/waybar/config
    exists: true
  - id: sway-autotile-script
    file: ${HOME}/.local/bin/sway-autotile
    exists: true
