depends:
  - sway

rpm:
  packages:
    - waybar

tasks:
  - &user_mkdir
    user: "${USER}"
    mkdir: "${HOME}/.local/bin"
  - <<: *user_mkdir
    mkdir: "${HOME}/.config/waybar"

  - &user_exec
    user: "${USER}"
    mode: "0755"
    copy: waybar-wrapper
    to: "${HOME}/.local/bin/waybar-wrapper"
  - <<: *user_exec
    copy: sway-autotile
    to: "${HOME}/.local/bin/sway-autotile"

  - &user_cfg
    user: "${USER}"
    mode: "0644"
    copy: config.json
    to: "${HOME}/.config/waybar/config"
  - <<: *user_cfg
    copy: style.css
    to: "${HOME}/.config/waybar/style.css"

service: |
  [program:waybar]
  command=%(ENV_HOME)s/.local/bin/waybar-wrapper
  autostart=true
  autorestart=true
  priority=15
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

  [program:sway-autotile]
  command=%(ENV_HOME)s/.local/bin/sway-autotile
  autostart=true
  autorestart=true
  priority=16
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
