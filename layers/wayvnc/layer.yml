depends:
  - supervisord

ports:
  - tcp:5900

rpm:
  packages:
    - wayvnc

tasks:
  - mkdir: "${HOME}/.local/bin"
    user: "${USER}"
  - copy: wayvnc-wrapper
    to: "${HOME}/.local/bin/wayvnc-wrapper"
    mode: "0755"
    user: "${USER}"

service: |
  [program:wayvnc]
  command=%(ENV_HOME)s/.local/bin/wayvnc-wrapper
  autostart=true
  autorestart=true
  priority=20
  startsecs=0
  environment=XDG_RUNTIME_DIR="/tmp",WAYLAND_DISPLAY="wayland-0"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true

tests:
  - id: wayvnc-binary
    file: /usr/bin/wayvnc
    exists: true
  - id: wayvnc-wrapper
    file: ${HOME}/.local/bin/wayvnc-wrapper
    exists: true
    mode: "0755"
  - id: wayvnc-package
    package: wayvnc
    installed: true
  - id: wayvnc-service-running
    scope: deploy
    service: wayvnc
    running: true
  - id: wayvnc-port-reachable
    scope: deploy
    addr: 127.0.0.1:${HOST_PORT:5900}
    reachable: true
    timeout: 5s
