version: '3'

tasks:
  install:
    cmds:
      - mkdir -p ~/.local/bin ~/.config/sway
      - cp /ctx/wayvnc-wrapper ~/.local/bin/wayvnc-wrapper
      - chmod +x ~/.local/bin/wayvnc-wrapper
      # wayvnc needs pixman on NVIDIA headless (ext-image-copy-capture
      # upstream bug with gles2 produces gray framebuffer)
      - echo "pixman" > ~/.config/sway/renderer
