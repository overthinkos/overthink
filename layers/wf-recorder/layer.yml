layer:
  name: wf-recorder
  description: Wayland screen recorder for wlroots compositors
  distros:
    fedora:
      packages:
        - wf-recorder
  eval:
    - id: wf-recorder-binary
      file: /usr/bin/wf-recorder
      exists: true
    - id: wf-recorder-package
      package: wf-recorder
      installed: true
