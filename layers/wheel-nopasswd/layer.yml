layer:
  name: wheel-nopasswd
  description: |
    Passwordless sudo for the wheel group. Installs sudo, ensures the
    wheel group exists, adds the uid-1000 account to wheel, and writes
    /etc/sudoers.d/20-nopasswd-wheel with `%wheel ALL=(ALL:ALL) NOPASSWD: ALL`
    at mode 0440. Mirrors the convention used inside AUR-builder containers
    by ov/deploy_target_local.go renderAurScript.
  package:
    - sudo
  task:
    - write: /etc/sudoers.d/20-nopasswd-wheel
      content: |
        %wheel ALL=(ALL:ALL) NOPASSWD: ALL
      mode: "0440"
      user: root
    # Wheel group + membership. Shell logic required: idempotent group
    # creation (the `|| groupadd` form mirrors renderAurScript at
    # ov/deploy_target_local.go:1435), dynamic uid-1000 lookup via
    # `getent passwd 1000` (matches the sshd layer pattern — works for
    # both create-mode `user` and adopt-mode `ubuntu`), and a defensive
    # verify step that fails loudly rather than silently leaving the
    # operator without sudo.
    - cmd: |
        set -e
        getent group wheel >/dev/null || groupadd wheel
        account=$(getent passwd 1000 | cut -d: -f1)
        if [ -z "$account" ]; then
          echo "wheel-nopasswd: no uid-1000 account found — refusing to add to wheel" >&2
          exit 1
        fi
        usermod -aG wheel "$account"
        id -nG "$account" | tr ' ' '\n' | grep -qx wheel || {
          echo "wheel-nopasswd: FATAL: $account not in wheel after usermod" >&2
          exit 1
        }
      user: root
  eval:
    - id: sudo-package
      package: sudo
      installed: true
    # /etc/sudoers.d/* is root:root 0440 — unreadable to the non-root
    # user the disposable test runs as. Verify via `sudo -n -l` instead,
    # which exercises the rule's effect without needing to stat the file.
    # Mirrors the sshd layer's sudoers-ov-user eval pattern.
    - id: nopasswd-wheel-policy
      command: |
        if [ "$(id -u)" = "0" ]; then
          account=$(getent passwd 1000 | cut -d: -f1)
          runuser -u "$account" -- sudo -n -l
        else
          sudo -n -l
        fi
      exit_status: 0
      stdout:
        - contains: "NOPASSWD"
