depends:
  - supervisord
  - rust
  - build-toolchain

ports:
  - tcp:47984
  - 47989
  - udp:47999
  - tcp:48010
  - udp:48100
  - udp:48200

security:
  devices:
    - /dev/uinput
    - /dev/uhid
  cap_add:
    - NET_ADMIN
  group_add:
    - keep-groups
  mounts:
    - /run/user/1000/podman/podman.sock:/var/run/docker.sock:rw
    - /dev/input:/dev/input:rw
    - tmpfs:/run/udev:rw,size=1m
    - tmpfs:/run/user/1000/wolf:rw,size=10m

env:
  WOLF_LOG_LEVEL: "INFO"
  WOLF_CFG_FILE: "~/.config/wolf/config.toml"
  WOLF_PRIVATE_KEY_FILE: "~/.config/wolf/key.pem"
  WOLF_PRIVATE_CERT_FILE: "~/.config/wolf/cert.pem"
  XDG_RUNTIME_DIR: "/run/user/1000/wolf"
  GST_GL_API: "gles2"
  GST_GL_WINDOW: "surfaceless"
  GST_PLUGIN_PATH: "/usr/local/lib64/gstreamer-1.0"

rpm:
  options:
    - --skip-unavailable
  packages:
    # Runtime
    - gstreamer1
    - gstreamer1-plugins-base
    - gstreamer1-plugins-good
    - gstreamer1-plugins-bad-freeworld
    - gstreamer1-plugins-ugly
    - gstreamer1-vaapi
    - gstreamer1-plugin-libav
    - libinput
    - libevdev
    - pulseaudio-libs
    - libdrm
    - libwayland-server
    - libxkbcommon
    - mesa-libEGL
    - mesa-libgbm
    - pciutils-libs
    - libunwind
    - libatomic
    # Build deps (cleaned up at end of root.yml)
    - clang-devel
    - libstdc++-static
    - glibc-static
    - boost-devel
    - boost-static
    - gstreamer1-devel
    - gstreamer1-plugins-base-devel
    - gstreamer1-plugins-bad-free-devel
    - openssl-devel
    - libcurl-devel
    - pulseaudio-libs-devel
    - libevdev-devel
    - libinput-devel
    - wayland-devel
    - libxkbcommon-devel
    - mesa-libEGL-devel
    - mesa-libgbm-devel
    - libdrm-devel
    - pciutils-devel
    - libunwind-devel
    - glib2-devel

volumes:
  - name: wolf-config
    path: "~/.config/wolf"
  - name: wolf-state
    path: /var/lib/wolf

service: |
  [program:wolf]
  command=%(ENV_HOME)s/.local/bin/wolf-wrapper
  autostart=true
  autorestart=true
  priority=20
  startsecs=5
  environment=XDG_RUNTIME_DIR="/run/user/1000/wolf"
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
