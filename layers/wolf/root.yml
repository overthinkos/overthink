version: '3'

tasks:
  install:
    cmds:
      # 1. Install cargo-c for building gst-wayland-display
      - cargo install cargo-c

      # 2. Build gst-wayland-display (Rust GStreamer plugin — Smithay compositor)
      - |
        git clone --depth 1 https://github.com/games-on-whales/gst-wayland-display /tmp/gst-wayland-display
        cd /tmp/gst-wayland-display
        cargo cinstall --release --libdir=/usr/local/lib64/gstreamer-1.0 --prefix=/usr/local
        rm -rf /tmp/gst-wayland-display

      # 3. Build Wolf from source
      - |
        git clone --depth 1 --recurse-submodules https://github.com/games-on-whales/wolf /tmp/wolf-src
        cd /tmp/wolf-src
        cmake -G Ninja -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_CXX_EXTENSIONS=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DBoost_USE_STATIC_LIBS=ON \
          -DBUILD_FAKE_UDEV_CLI=ON \
          -DBUILD_TESTING=OFF
        ninja -C build wolf fake-udev
        install -m 755 build/src/moonlight-server/wolf /usr/local/bin/wolf
        install -m 755 build/src/fake-udev/fake-udev /usr/local/bin/wolf-fake-udev
        rm -rf /tmp/wolf-src

      # 4. Udev rules for Wolf virtual input devices (vendor 0xAB00)
      - |
        mkdir -p /etc/udev/rules.d
        cat > /etc/udev/rules.d/85-wolf-virtual-inputs.rules << 'EOF'
        SUBSYSTEM=="misc", KERNEL=="uinput", MODE="0660", GROUP="input", TAG+="uaccess"
        SUBSYSTEM=="misc", KERNEL=="uhid", MODE="0660", GROUP="input", TAG+="uaccess"
        SUBSYSTEM=="input", ATTRS{id/vendor}=="ab00", MODE="0660", GROUP="input", TAG+="uaccess", ENV{WL_SEAT}="seat9"
        EOF

      # 5. Clean up build dependencies to reduce image size
      - |
        dnf remove -y \
          clang-devel libstdc++-static glibc-static \
          boost-devel boost-static \
          gstreamer1-devel gstreamer1-plugins-base-devel gstreamer1-plugins-bad-free-devel \
          openssl-devel libcurl-devel pulseaudio-libs-devel \
          libevdev-devel libinput-devel libwayland-devel libxkbcommon-devel \
          mesa-libEGL-devel mesa-libgbm-devel libdrm-devel pciutils-devel \
          libunwind-devel glib2-devel || true
        cargo uninstall cargo-c || true
        rm -rf /root/.cargo/registry /root/.cargo/git
