depends:
  - dbus
  - mutter
  - pipewire

env:
  XDG_CURRENT_DESKTOP: "GNOME"

rpm:
  packages:
    - xdg-desktop-portal
    - xdg-desktop-portal-gnome
    - xdg-desktop-portal-gtk
    - python3-gobject

tasks:
  - mkdir: "${HOME}/.config/xdg-desktop-portal"
    user: "${USER}"
  - copy: portals.conf
    to: "${HOME}/.config/xdg-desktop-portal/portals.conf"
    mode: "0644"
    user: "${USER}"
