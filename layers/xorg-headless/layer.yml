depends:
  - dbus

env:
  DISPLAY: ":0"

rpm:
  packages:
    - xorg-x11-server-Xorg
    - xorg-x11-drv-dummy
    - xorg-x11-drv-libinput
    - xrandr
    - xdotool
    - xdpyinfo

tasks:
  - mkdir: /etc/X11
    user: root

  # Allow non-console users to run Xorg (Fedora's Xorg.wrap restriction)
  - write: /etc/X11/Xwrapper.config
    user: root
    mode: "0644"
    content: |
      allowed_users=anybody

  # Xorg config for headless dummy driver at 1920x1080
  - write: /etc/X11/xorg.conf
    user: root
    mode: "0644"
    content: |
      Section "ServerFlags"
        Option "DontVTSwitch" "true"
        Option "AutoAddDevices" "true"
        Option "AutoEnableDevices" "true"
      EndSection

      Section "Monitor"
        Identifier "Monitor0"
        HorizSync 28.0-80.0
        VertRefresh 48.0-75.0
        Modeline "1920x1080_60.00" 172.80 1920 2040 2248 2576 1080 1081 1084 1118 -HSync +Vsync
      EndSection

      Section "Device"
        Identifier "Card0"
        Driver "dummy"
        VideoRam 256000
      EndSection

      Section "Screen"
        Identifier "Screen0"
        Device "Card0"
        Monitor "Monitor0"
        DefaultDepth 24
        SubSection "Display"
          Depth 24
          Modes "1920x1080_60.00"
        EndSubSection
      EndSection

      Section "ServerLayout"
        Identifier "Layout0"
        Screen "Screen0"
      EndSection

service: |
  [program:xorg]
  command=Xorg :0 -noreset +extension GLX +extension RANDR +extension RENDER
  autostart=true
  autorestart=true
  priority=10
  startsecs=2
  stdout_logfile=/dev/fd/1
  stdout_logfile_maxbytes=0
  redirect_stderr=true
