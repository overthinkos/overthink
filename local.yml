version: 4

local:
  ov-cachyos:
    layers:
      # Establish passwordless wheel sudo before any other root task
      # runs. On a fresh CachyOS install this turns a one-time `sudo -v`
      # password prompt into durable passwordless sudo; on the existing
      # ov-cachyos host it's idempotent (file already present, atrawog
      # already in wheel) and serves as a self-healing regression guard.
      - wheel-nopasswd
      # yay AUR helper — required by pkg/arch/PKGBUILD's mandatory
      # AUR deps (cloudflared-bin, gvisor-tap-vsock); the
      # taskfiles/Build.yml install task drives package builds via
      # `yay -Bi pkg/arch` so AUR deps resolve unattended.
      - yay
      - dev-tools
      - gh
      - pre-commit
      - tmux
      - direnv
      - gnupg
      - keepassxc
      - keepassxc-keyring
      - tailscale
      - build-toolchain
      - golang
      - rust
      - nodejs
      - uv
      - claude-code
      - codex
      - gemini
      - oracle
      - forgecode
      - devops-tools
      - docker-ce
      - kubernetes
      - vscode
      - ghostty
      - chrome
      # ov-full now provides the full ov toolchain for BOTH host and
      # container targets — the previous host-specific ov-full-host
      # was deleted in the 2026-05 init-system-polymorphism cutover.
      # See CLAUDE.md "Init-system polymorphism via mixed `service:`
      # entries" for the unification mechanism.
      - ov-full

    # 2026-05 deploy-fetch-narrowing cutover: 'images:' field removed.
    # The deploy now fetches NOTHING speculative — host packages and
    # configs only. Test-bed container images are ensured by
    # `ov eval run` preflight, sourced from each score's
    # `target_image:` + scenario `pod:` declarations. The historical
    # list (eval-target, openclaw-sway-browser, fedora-coder) is
    # discoverable through any score that already declares them as
    # `pod:` or `target_image:` — no operator action is needed to
    # keep `ov eval run --on-host ov-cachyos` working.

    install_opts:
      with_services: true
      allow_repo_changes: true
      allow_root_tasks: true
      # Use the locally-cached archlinux-builder for cargo/npm/pixi steps.
      # FQDN form bypasses the need for podman unqualified-search-registries
      # config, and archlinux-builder is more appropriate than the project
      # default fedora-builder for an Arch/CachyOS host.
      builder_image: ghcr.io/overthinkos/archlinux-builder:2026.122.2252

    env:
      - EDITOR=nvim
      - PAGER=less

    description:
      feature: CachyOS Developer Experience profile
      narrative: |
        Kitchen-sink dev workstation: core CLI tools, full Arch build
        toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
        fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
        DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
        Targets the operator's CachyOS host via direct local exec.
      tag: [working]

    # Deploy-scope eval probe. The wheel-nopasswd layer (first in the
    # layers list above) declaratively writes /etc/sudoers.d/20-nopasswd-wheel
    # and adds the uid-1000 account to wheel — so passwordless sudo is
    # established by the deploy itself, not assumed from CachyOS installer
    # state. This probe catches regressions BETWEEN deploys (e.g. someone
    # manually deletes the drop-in or removes the user from wheel) so
    # `ov test ov-cachyos` flags them before the next `ov rebuild
    # ov-cachyos` aborts mid-flight on a sudo prompt. The same %wheel
    # ALL=(ALL:ALL) NOPASSWD: ALL convention is mirrored inside ephemeral
    # AUR-builder containers by ov/deploy_target_local.go renderAurScript.
    eval:
      - id: passwordless-sudo-host
        scope: deploy
        command: sudo -n true
        exit_status: 0
        in_container: false
