version: 2026.159.1912
local:
    # =================================================================
    # eval-local — per-kind R10 smoke template for kind:local.
    # Applied via the eval-local bed (kind:eval) in eval.yml. Single layer
    # (eval-local-layer) drops a marker file the deploy-scope eval probe
    # verifies on the host (not in a container).
    # =================================================================
    eval-local:
        candy:
            - eval-local-layer
        description:
            feature: Fast eval bed for kind:local layer-application smoke
            narrative: Minimal kind:local template applying eval-local-layer to the operator's host.
            tag: [working]
        eval:
            - id: eval-local-marker
              scope: deploy
              command: "test -f /etc/eval-local-marker"
              in_container: false
    # =================================================================
    # eval-cross-local-driver — host venue for the eval-cross-local-http bed's
    # local DRIVER peer (cross-deployment, pod→ ... no: LOCAL driver → pod
    # subject). USER-level only (no sudo), so bringUpPeers applies it unattended.
    # =================================================================
    eval-cross-local-driver:
        candy:
            - eval-cross-local-driver-layer
        description:
            feature: Host venue for a cross-deployment local DRIVER peer
            narrative: Minimal kind:local template establishing a host venue an `on:` check drives.
            tag: [working]
