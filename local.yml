version: 4

local:
  cachyos-dx:
    layers:
      - dev-tools
      - gh
      - pre-commit
      - tmux
      - direnv
      - gnupg
      - keepassxc
      - keepassxc-keyring
      - tailscale
      - build-toolchain
      - golang
      - rust
      - nodejs
      - uv
      - claude-code
      - codex
      - gemini
      - oracle
      - forgecode
      - devops-tools
      - docker-ce
      - kubernetes
      - vscode
      - chrome
      - ov-full-host

    install_opts:
      with_services: true
      allow_repo_changes: true
      allow_root_tasks: true
      # Use the locally-cached archlinux-builder for cargo/npm/pixi steps.
      # FQDN form bypasses the need for podman unqualified-search-registries
      # config, and archlinux-builder is more appropriate than the project
      # default fedora-builder for an Arch/CachyOS host.
      builder_image: ghcr.io/overthinkos/archlinux-builder:2026.122.2252

    env:
      - EDITOR=nvim
      - PAGER=less

    description:
      feature: CachyOS Developer Experience profile
      narrative: |
        Kitchen-sink dev workstation: core CLI tools, full Arch build
        toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
        fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
        DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
        Targets the qc CachyOS host via direct local exec.
      tag: [working]

    # Deploy-scope eval probes. allow_root_tasks: true above implies the
    # operator has passwordless sudo on the host; the AUR builder install
    # path also depends on this (the renderAurScript drops to the
    # unprivileged `user` inside the container after writing
    # /etc/sudoers.d/20-nopasswd-wheel — but that only matters in the
    # container, not on the host). This check verifies host passwordless
    # sudo so a later regression (e.g. accidentally removing
    # /etc/sudoers.d/20-nopasswd-wheel on the host) is caught by `ov test`
    # before the next `ov rebuild qc` aborts mid-flight on a sudo prompt.
    eval:
      - id: passwordless-sudo-host
        scope: deploy
        command: sudo -n true
        exit_status: 0
        in_container: false
