layer:
  name: pac-tool
  distro:
    archlinux:
      package:
        - neovim
        - ripgrep
      option:
        - --needed
      repo:
        - name: custom-repo
          server: https://example.com/repo/$arch
          siglevel: Optional TrustAll
      aur:
        package:
          - yay-bin
          - neovim-nightly-bin
