layer:
  name: pac-tool
  distros:
    archlinux:
      packages:
        - neovim
        - ripgrep
      options:
        - --needed
      repos:
        - name: custom-repo
          server: https://example.com/repo/$arch
          siglevel: Optional TrustAll
      aur:
        packages:
          - yay-bin
          - neovim-nightly-bin
