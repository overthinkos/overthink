version: 4
includes:
    - eval.yml
    - deploy.yml
    - local.yml
discover:
    layers:
      - path: layers
        recursive: true
defaults:
    platforms:
      - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
      - rpm
    merge:
        auto: true
        max_mb: 128
    builder:
        cargo: fedora-builder
        npm: fedora-builder
        pixi: fedora-builder
images:
    arch-coder:
        base: archlinux
        layers:
          - agent-forwarding
          - sshd
          - ov-full
          - ov-mcp
          - container-nesting
          - dbus
          - tmux
          - language-runtimes
          - golang
          - nodejs
          - rust
          - pixi
          - uv
          - build-toolchain
          - dev-tools
          - pre-commit
          - direnv
          - gh
          - typst
          - asciinema
          - claude-code
          - codex
          - gemini
          - forgecode
          - oracle
          - devops-tools
          - kubernetes
          - docker-ce
          - github-actions
          - google-cloud
          - google-cloud-npm
          - grafana-tools
        ports:
          - 2222:2222
          - 18765:18765
        eval:
          - command: test -x ${HOME}/.npm-global/bin/claude && test -x ${HOME}/.npm-global/bin/codex
                && test -x ${HOME}/.npm-global/bin/gemini && test -x ${HOME}/.npm-global/bin/forge
            id: arch-coder-ai-clis
            exit_status: 0
          - command: test -x /usr/bin/go && test -x /usr/bin/node && { test -x ${HOME}/.cargo/bin/cargo
                || test -x /usr/bin/cargo; }
            id: arch-coder-languages
            exit_status: 0
          - command: test -x /usr/bin/kubectl && test -x /usr/bin/docker && test -x
                /usr/local/bin/aws && test -x /usr/bin/gcloud && test -x /usr/local/bin/tofu
            id: arch-coder-devops
            exit_status: 0
          - command: test -x /usr/local/bin/ov
            id: arch-coder-ov
            exit_status: 0
          - addr: 127.0.0.1:${HOST_PORT:2222}
            id: arch-coder-sshd-port
            timeout: 5s
            scope: deploy
            reachable: true
          - command: ov version
            id: arch-coder-ov-version
            scope: deploy
            in_container: true
            exit_status: 0
          - addr: 127.0.0.1:${HOST_PORT:18765}
            id: arch-coder-mcp-port
            timeout: 5s
            scope: deploy
            reachable: true
    arch-ov:
        enabled: false
        base: archlinux
        layers:
          - agent-forwarding
          - ov-full
          - ov-mcp
          - golang
          - gh
          - sshd
          - container-nesting
          - nvidia
        ports:
          - 2222:2222
          - 18765:18765
