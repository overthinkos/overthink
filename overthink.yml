version: 4
includes:
    - build.yml
    - image.yml
    - deploy.yml
discover:
    layers:
        - path: layers
          recursive: true
benchmark:
    # Runner registry: each entry plugs an AI CLI into `ov benchmark run`.
    # Defaults applied by ResolveRunner when omitted: timeout=30m,
    # prompt_via=argv. See /ov:benchmark.
    #
    # Credentials sync the minimum file the AI CLI needs to authenticate
    # non-interactively — typically a single refresh-token file. Syncing
    # whole config directories bloats the copy (~.claude alone is ~430MB)
    # and leaks unnecessary state into the deploy.
    runners:
        - name: claude
          # --dangerously-skip-permissions lets claude edit files + run
          # commands autonomously without stopping to ask. The benchmark
          # runs in a disposable deploy, so this is the correct mode for
          # this context. See /ov:benchmark for safety rationale.
          command: [claude, -p, --dangerously-skip-permissions, "${PROMPT}"]
          credentials:
              - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}
        - name: codex
          command: [codex, exec, "${PROMPT}"]
          credentials:
              - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}
        - name: gemini
          command: [gemini, chat, "${PROMPT}"]
          credentials:
              - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}
    prompt: |
        You are benchmarking BDD-scenario-solving inside an overthink project.
        This is iteration ${ITERATION} of up to ${MAX_ITERATIONS}. Your current
        best score is ${BEST_SCORE}; plateau counter is ${PLATEAU_COUNTER} of
        ${PLATEAU_ITERATIONS}.

        Your cwd is the git worktree at ${WORKSPACE}. Edits you make are
        captured per-iteration as git commits on branch ovbench/${RUN_ID}.

        MCP tools: ${MCP_ENDPOINT} (if non-empty — 190 tools).

        Read scope:              ov benchmark scope
        Inspect scenario:        ov feature list <origin>
        Validate edits:          ov feature validate <origin>
        See prior test output:   ov image test $(ov benchmark last-test-tag) --format yaml

        Ground rules:
          - Do NOT edit scenario text (fingerprint change = tampered, not solved).
          - Do NOT add new scenarios (they don't count).
          - Partial progress counts.
          - Across iterations, your worktree keeps prior edits.

        Exit when done with this iteration.
