version: 2026.143.844
import:
    # Flat imports (root namespace) — this repo's own per-kind files + the
    # combined base.yml (arch + fedora stacks). eval.yml carries kind:ai/recipe/
    # score AND the kind:eval disposable R10 beds (+ supporting vm:/k8s:
    # entities); operator deployments live in the per-host ~/.config/ov/deploy.yml.
    - eval.yml
    - local.yml
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
    - build.yml
    # arch + fedora base stacks (arch/arch-builder/fedora/fedora-builder/
    # fedora-nonfree). Combined from arch-base.yml + fedora-base.yml in the
    # 2026-05 import-namespace cutover.
    - base.yml
    # cachyos base image — owned by the overthinkos/cachyos submodule. Mounted
    # under the `cachyos` import namespace and referenced as `cachyos.cachyos`
    # (main's `versa` image is `base: cachyos.cachyos`). This is the deliberate
    # main → cachyos coupling. The cachyos repo, in turn, imports this repo under
    # the `ov` namespace for ov.arch-builder (mutual import; cycle-broken at load).
    - cachyos: '@github.com/overthinkos/cachyos:v2026.143.844'
discover:
    layer:
        - path: layers
          recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    builder:
        cargo: fedora-builder
        npm: fedora-builder
        pixi: fedora-builder
