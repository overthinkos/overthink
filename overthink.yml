version: 2026.141.1600
include:
    - eval.yml
    - deploy.yml
    - local.yml
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
    - build.yml
    - arch-base.yml
discover:
    layer:
        - path: layers
          recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    builder:
        cargo: fedora-builder
        npm: fedora-builder
        pixi: fedora-builder
