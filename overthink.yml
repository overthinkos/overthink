version: 2026.141.1600
include:
    - eval.yml
    - deploy.yml
    - local.yml
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
    - build.yml
    - arch-base.yml
    # cachyos base image — owned by the overthinkos/cachyos submodule (the
    # CachyOS family was split out 2026-05); pulled back by github reference
    # because main's `versa` image is `base: cachyos`. This is the deliberate
    # main → cachyos coupling (see image/cachyos/README.md).
    - '@github.com/overthinkos/cachyos/cachyos-base.yml:v2026.141.1747'
discover:
    layer:
        - path: layers
          recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    builder:
        cargo: fedora-builder
        npm: fedora-builder
        pixi: fedora-builder
