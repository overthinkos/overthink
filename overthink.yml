    arch-pacstrap:
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: archlinux-pacstrap-builder
            distro: archlinux
            packages:
              - sudo
              - openssh
              - qemu-guest-agent
              - cloud-init
              - grub
              - efibootmgr
