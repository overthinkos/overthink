version: 2026.141.1600
include:
    # eval.yml carries kind:ai/recipe/score AND the kind:eval disposable R10
    # beds (+ their supporting vm:/k8s: entities). deploy.yml was deleted in
    # the 2026-05 kind:eval cutover — the repo ships only eval beds; operator
    # deployments live in the per-host ~/.config/ov/deploy.yml.
    - eval.yml
    - local.yml
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
    - build.yml
    - arch-base.yml
    # fedora base stack (fedora + fedora-builder + fedora-nonfree) — the
    # ecosystem default base. Lives here (single source of truth) and is
    # remote-included by the overthinkos/fedora submodule; the Fedora consumer
    # showcase images (fedora-coder/ov/test) were split out 2026-05. No
    # main → fedora coupling (main remote-includes nothing from that repo).
    - fedora-base.yml
    # cachyos base image — owned by the overthinkos/cachyos submodule (the
    # CachyOS family was split out 2026-05); pulled back by github reference
    # because main's `versa` image is `base: cachyos`. This is the deliberate
    # main → cachyos coupling (see image/cachyos/README.md).
    - '@github.com/overthinkos/cachyos/cachyos-base.yml:v2026.141.1747'
discover:
    layer:
        - path: layers
          recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    builder:
        cargo: fedora-builder
        npm: fedora-builder
        pixi: fedora-builder
