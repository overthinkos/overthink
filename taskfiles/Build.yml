version: '3'

tasks:
  ov:
    desc: Build ov from source
    dir: "{{.ROOT_DIR}}"
    cmds:
      - mkdir -p bin layers/ov-cli/bin
      - cd ov && go build -o ../bin/ov .
      - cp bin/ov layers/ov-cli/bin/ov

  install:
    desc: Build and install ov to ~/.local/bin
    dir: "{{.ROOT_DIR}}"
    cmds:
      - mkdir -p ~/.local/bin
      - cd ov && go build -o ~/.local/bin/ov .

  all:
    desc: Build all images (respects dependency order, auto-merges if enabled)
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov build"

  local:
    desc: Build images for host platform only (auto-merges if enabled)
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov build {{.CLI_ARGS}}"

  push:
    desc: Build and push all images
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov build --push"

  merge:
    desc: "Merge small layers in a built image. Usage: task build:merge -- <image>"
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov merge {{.CLI_ARGS}}"

  iso:
    desc: "Build ISO disk image (bootc only). Usage: task build:iso -- <image>"
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm build --type iso {{.CLI_ARGS}}"

  qcow2:
    desc: "Build QCOW2 virtual machine image (bootc only). Usage: task build:qcow2 -- <image>"
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm build {{.CLI_ARGS}}"

  raw:
    desc: "Build RAW disk image (bootc only). Usage: task build:raw -- <image>"
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm build --type raw {{.CLI_ARGS}}"
