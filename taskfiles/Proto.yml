version: '3'

vars:
  # Pinned protoc — the C++ compiler that drives the Go codegen plugins. A
  # download whose digest differs is a tampering / wrong-artifact signal and
  # HARD-FAILS the bootstrap (mirrors taskfiles/Cue.yml's pinned-cue contract).
  PROTOC_VERSION: 28.3
  PROTOC_SHA256_amd64: 0ad949f04a6a174da83cdcbdb36dee0a4925272a5b6d83f79a6bf9852076d53f
  # protoc-gen-go matches the protobuf runtime; protoc-gen-go-grpc v1.3.0 emits
  # the SupportPackageIsVersion7 API compatible with grpc v1.61.0 (charly/go.mod) —
  # NOT v1.5.x, which emits the v1.64+ generics API (StaticMethod / generic
  # streaming) that grpc v1.61.0 lacks.
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.3.0

tasks:
  # ---------------------------------------------------------------------------
  # proto:gen — regenerate the charly plugin gRPC stubs from plugin.proto.
  #
  #   charly/plugin/proto/plugin.pb.go       (messages)
  #   charly/plugin/proto/plugin_grpc.pb.go  (services)
  #
  # Self-bootstraps a checksum-pinned protoc + the two pinned Go codegen plugins
  # into ./bin (gitignored). Reproducible — verify with:
  #   rm -f bin/protoc bin/protoc-gen-go bin/protoc-gen-go-grpc
  #   task proto:gen && git diff --exit-code charly/plugin/proto
  # ---------------------------------------------------------------------------
  gen:
    desc: Regenerate charly/plugin/proto/*.pb.go (self-bootstraps pinned protoc + gen plugins into ./bin)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: bootstrap-protoc
      - |
        set -euo pipefail
        export PATH="$PWD/bin:$PATH"
        bin/protoc \
          --go_out=charly --go_opt=module=github.com/overthinkos/overthink/charly \
          --go-grpc_out=charly --go-grpc_opt=module=github.com/overthinkos/overthink/charly \
          --proto_path=charly/plugin/proto charly/plugin/proto/plugin.proto
        gofmt -w charly/plugin/proto/plugin.pb.go charly/plugin/proto/plugin_grpc.pb.go
        echo "proto:gen: regenerated charly/plugin/proto/{plugin.pb.go,plugin_grpc.pb.go}"

  bootstrap-protoc:
    desc: Ensure ./bin has the pinned protoc + protoc-gen-go + protoc-gen-go-grpc
    dir: "{{.ROOT_DIR}}"
    status:
      - test -x bin/protoc && bin/protoc --version 2>/dev/null | grep -q '{{.PROTOC_VERSION}}'
      - test -x bin/protoc-gen-go
      - test -x bin/protoc-gen-go-grpc && bin/protoc-gen-go-grpc --version 2>/dev/null | grep -q '{{.PROTOC_GEN_GO_GRPC_VERSION | trimPrefix "v"}}'
    cmds:
      - |
        set -euo pipefail
        mkdir -p bin
        ZIP="protoc-{{.PROTOC_VERSION}}-linux-x86_64.zip"
        URL="https://github.com/protocolbuffers/protobuf/releases/download/v{{.PROTOC_VERSION}}/$ZIP"
        TMP="$(mktemp -d)"; trap 'rm -rf "$TMP"' EXIT
        curl -fsSL "$URL" -o "$TMP/$ZIP"
        echo "{{.PROTOC_SHA256_amd64}}  $TMP/$ZIP" | sha256sum -c - \
          || { echo "proto:bootstrap: protoc checksum mismatch — refusing tampered/wrong artifact" >&2; exit 1; }
        python3 -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])" "$TMP/$ZIP" "$TMP/x"
        cp "$TMP/x/bin/protoc" bin/protoc && chmod +x bin/protoc
        # The two Go codegen plugins, pinned, installed into ./bin (protoc finds them on PATH).
        GOBIN="$PWD/bin" go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        GOBIN="$PWD/bin" go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
