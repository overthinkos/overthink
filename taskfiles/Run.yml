version: '3'

tasks:
  container:
    desc: "Run a built image. Usage: task run:container -- <image>"
    cmds:
      - docker run --rm -it $({{.ROOT_DIR}}/bin/ov inspect --format tag {{.CLI_ARGS}})

  shell:
    desc: "Shell into a built image. Usage: task run:shell -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov shell {{.CLI_ARGS}}"

  enable:
    desc: "Enable a service. Usage: task run:enable -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov enable {{.CLI_ARGS}}"

  disable:
    desc: "Disable a service. Usage: task run:disable -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov disable {{.CLI_ARGS}}"

  start:
    desc: "Start a service. Usage: task run:start -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov start {{.CLI_ARGS}}"

  stop:
    desc: "Stop a service. Usage: task run:stop -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov stop {{.CLI_ARGS}}"

  status:
    desc: "Show service status. Usage: task run:status -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov status {{.CLI_ARGS}}"

  logs:
    desc: "Show service logs. Usage: task run:logs -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov logs {{.CLI_ARGS}}"

  update:
    desc: "Update image and restart. Usage: task run:update -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov update {{.CLI_ARGS}}"

  remove:
    desc: "Remove a service. Usage: task run:remove -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov remove {{.CLI_ARGS}}"

  alias-install:
    desc: "Install aliases for an image. Usage: task run:alias-install -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov alias install {{.CLI_ARGS}}"

  alias-uninstall:
    desc: "Remove aliases for an image. Usage: task run:alias-uninstall -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov alias uninstall {{.CLI_ARGS}}"

  vm:
    desc: "Create and start a VM. Usage: task run:vm -- <image>"
    preconditions:
      - sh: test -x {{.ROOT_DIR}}/bin/ov
        msg: "ov not found -- run 'task build:ov' first"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm create {{.CLI_ARGS}}"

  vm-start:
    desc: "Start an existing VM. Usage: task run:vm-start -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm start {{.CLI_ARGS}}"

  vm-stop:
    desc: "Stop a running VM. Usage: task run:vm-stop -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm stop {{.CLI_ARGS}}"

  vm-destroy:
    desc: "Destroy a VM. Usage: task run:vm-destroy -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm destroy {{.CLI_ARGS}}"

  vm-list:
    desc: "List VMs"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm list"

  vm-console:
    desc: "Attach to VM console. Usage: task run:vm-console -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm console {{.CLI_ARGS}}"

  vm-ssh:
    desc: "SSH into a VM. Usage: task run:vm-ssh -- <image>"
    cmds:
      - "{{.ROOT_DIR}}/bin/ov vm ssh {{.CLI_ARGS}}"
