[supervisord]
nodaemon=true
# Write to a real file rather than /dev/stdout: when supervisord runs under a
# systemd user service (bootc desktop autostart), /dev/stdout is a symlink to
# /proc/self/fd/1 which points at the journal pipe. supervisord opens the
# logfile before systemd's stdio redirection is fully plumbed, producing
# `OSError: [Errno 6] No such device or address: '/dev/stdout'` at startup.
# A writable path works in both container mode (nodaemon still sends child
# stdout through container stdio) and bootc mode (log file in /tmp).
logfile=/tmp/supervisord.log
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock
