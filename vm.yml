#  Per-kind file for vm entries. Sibling of charly.yml — included via
#  charly.yml's `includes:` list. The schema kind discriminator is
#  `kind: vm` for kind-keyed entries; root-shape map is `vm:` (this file).
#  2026-05 kind-files cutover.
version: 2026.159.1912
vm:
    vm:
        source:
            kind: cloud_image
            url: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
            checksum:
                type: sha256
                value: 6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2
            base_user: fedora
        disk_size: 6G
        ram: 2G
        cpu: 2
        firmware: bios
        network:
            mode: user
        ssh:
            user: fedora
            port: 12222
            key_source: generate
        cloud_init:
            package:
                - qemu-guest-agent
                - curl
            runcmd:
                - "setenforce 0 || true"
                - "sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config || true"
                - "echo '10.89.0.1 charly-web' >> /etc/hosts"
                - "systemctl enable --now qemu-guest-agent"
                - "for c in 21 33 46 82 124 196 208 220 1 5; do printf '\\033[48;5;%dm                    \\033[0m\\n' $c >> /dev/tty1; done || true"
        libvirt:
            devices:
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                      path: '{{.VmStateDir}}/qga.sock'
                graphics:
                    - type: spice
                      autoport: "yes"
                      listen: 127.0.0.1
                video:
                    - model: virtio
                      heads: 1
                      accel3d: false
    # Webserver-in-a-VM SUBJECT for the local→VM cross-deployment bed
    # (eval-cross-vm-http): nginx serves a fixture marker on guest :80. A LOCAL
    # (host) DRIVER peer reaches it via ${PEER_ENDPOINT:eval-cross-vm-http:80} →
    # resolveEvalEndpoint's VM branch → `ssh -L 127.0.0.1:<rand>:127.0.0.1:80`
    # over the managed charly-web-vm alias (the SAME host-vantage port resolver the
    # pod beds use; the guest's :80 is reached through the SSH tunnel, never
    # exposed on the host — strictly more secure than a host port-forward).
    # ssh.port_auto picks a free host SSH port (the existing auto-port mechanism);
    # backend: libvirt so the managed-alias SSH path is exercised, not a qemu
    # fallthrough.
    web-vm:
        source:
            kind: cloud_image
            url: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
            checksum:
                type: sha256
                value: 6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2
            base_user: fedora
        disk_size: 6G
        ram: 2G
        cpu: 2
        firmware: bios
        backend: libvirt
        network:
            mode: user
        ssh:
            user: fedora
            port_auto: true
            key_source: generate
        cloud_init:
            package:
                - nginx
                - curl
                - qemu-guest-agent
            runcmd:
                - "setenforce 0 || true"
                - "sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config || true"
                - "echo 'charly-fixture-vm-content-marker' > /usr/share/nginx/html/index.html"
                - "systemctl enable --now nginx"
                - "systemctl enable --now qemu-guest-agent"
        libvirt:
            devices:
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                      path: '{{.VmStateDir}}/qga.sock'
                graphics:
                    - type: spice
                      autoport: "yes"
                      listen: 127.0.0.1
                video:
                    - model: virtio
                      heads: 1
                      accel3d: false
