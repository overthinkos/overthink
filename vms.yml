# vms.yml — kind:vm entity definitions for the repo.
#
# Produced (or extended) by `ov migrate vm-spec` from legacy
# `bootc: true` image entries + layer-level `libvirt: [<xml>, …]`
# snippets. Hand-edit welcome; subsequent `ov migrate vm-spec` runs
# preserve pre-existing `vms:` keys and never clobber customizations.
#
# Resolved through overthink.yml includes: alongside images.yml.

vms:
    arch-cloud-base:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        disk_size: 40G
        ram: 8G
        cpus: 4
        machine: q35
        firmware: bios
        network:
            mode: user
        ssh:
            port: 2224
            key_source: generate
        cloud_init:
            timezone: UTC
            packages:
                - sudo
                - spice-vdagent
            runcmd:
                - pacman-key --init
                - pacman-key --populate archlinux
                - systemctl enable --now spice-vdagentd
            ov_install:
                strategy: auto
        libvirt:
            devices:
                channels:
                    - type: spicevmc
                      name: com.redhat.spice.0
                graphics:
                    - type: spice
                      autoport: "yes"
                      listen: 127.0.0.1
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
    aurora-bootc:
        source:
            kind: bootc
            image: aurora
        disk_size: 80 GiB
        ram: 12G
        cpus: 4
    bazzite-ai-bootc:
        source:
            kind: bootc
            image: bazzite-ai
    openclaw-browser-bootc-bootc:
        source:
            kind: bootc
            image: openclaw-browser-bootc
        disk_size: 20 GiB
        ram: 4G
        cpus: 2
        ssh:
            user: root
            port: 2222
    selkies-desktop-bootc-bootc:
        source:
            kind: bootc
            image: selkies-desktop-bootc
        disk_size: 40 GiB
        ram: 8G
        cpus: 4
        ssh:
            user: root
            port: 2250
